<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="32" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Fourier Analysis: Decomposing a Signal into Components</text>

  <!-- Composite signal (top left) -->
  <rect x="30" y="50" width="300" height="130" rx="8" fill="#7C2530" fill-opacity="0.07" stroke="#7C2530" stroke-width="1.5"/>
  <text x="180" y="72" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Composite Signal</text>
  <!-- Complex waveform: sum of three sinusoids -->
  <polyline points="45,130 55,108 65,95 75,100 85,118 95,140 105,148 115,138 125,115 135,98 145,96 155,108 165,128 175,145 185,148 195,135 205,112 215,98 225,100 235,115 245,135 255,148 265,145 275,128 285,108 295,98 305,100 315,118" fill="none" stroke="#5C3D1E" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="40" y1="160" x2="320" y2="160" stroke="#5C3D1E" stroke-width="1"/>
  <text x="180" y="175" text-anchor="middle" fill="#5C3D1E" font-size="11">x(t) = sum of hidden frequencies</text>

  <!-- Equals / decomposition arrow -->
  <text x="365" y="120" text-anchor="middle" fill="#7C2530" font-size="28" font-weight="bold">=</text>

  <!-- Component 1: Low frequency sine (top right) -->
  <rect x="410" y="50" width="170" height="80" rx="6" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="495" y="68" text-anchor="middle" fill="#2D5A8E" font-size="11" font-weight="bold">Low Frequency</text>
  <!-- Slow sine wave -->
  <polyline points="420,100 435,90 450,85 465,88 480,98 495,110 510,115 525,110 540,98 555,88 565,85" fill="none" stroke="#2D5A8E" stroke-width="2" stroke-linejoin="round"/>
  <line x1="418" y1="120" x2="572" y2="120" stroke="#2D5A8E" stroke-width="0.5"/>

  <!-- Plus sign -->
  <text x="598" y="95" text-anchor="middle" fill="#5C3D1E" font-size="22" font-weight="bold">+</text>

  <!-- Component 2: Mid frequency sine -->
  <rect x="620" y="50" width="160" height="80" rx="6" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="700" y="68" text-anchor="middle" fill="#7C2530" font-size="11" font-weight="bold">Mid Frequency</text>
  <!-- Medium sine wave -->
  <polyline points="630,100 640,90 650,85 660,90 670,100 680,110 690,115 700,110 710,100 720,90 730,85 740,90 750,100 760,110 770,115" fill="none" stroke="#7C2530" stroke-width="2" stroke-linejoin="round"/>
  <line x1="628" y1="120" x2="772" y2="120" stroke="#7C2530" stroke-width="0.5"/>

  <!-- Component 3: High frequency sine (below, spanning right side) -->
  <rect x="410" y="145" width="170" height="70" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="495" y="162" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">High Frequency</text>
  <!-- Fast sine wave -->
  <polyline points="420,185 427,177 434,175 441,177 448,185 455,193 462,195 469,193 476,185 483,177 490,175 497,177 504,185 511,193 518,195 525,193 532,185 539,177 546,175 553,177 560,185 567,193" fill="none" stroke="#C4A87A" stroke-width="2" stroke-linejoin="round"/>

  <!-- Plus sign for component 3 -->
  <text x="598" y="185" text-anchor="middle" fill="#5C3D1E" font-size="22" font-weight="bold">+</text>

  <!-- Cosine component -->
  <rect x="620" y="145" width="160" height="70" rx="6" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="700" y="162" text-anchor="middle" fill="#2D5A8E" font-size="11" font-weight="bold">Cosine Component</text>
  <polyline points="630,185 640,178 650,175 660,178 670,185 680,192 690,195 700,192 710,185 720,178 730,175 740,178 750,185 760,192 770,195" fill="none" stroke="#2D5A8E" stroke-width="2" stroke-linejoin="round" stroke-dasharray="6,3"/>

  <!-- Frequency spectrum (bottom left) -->
  <rect x="30" y="235" width="300" height="140" rx="8" fill="#2D5A8E" fill-opacity="0.07" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="180" y="258" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Frequency Spectrum |X(f)|</text>
  <!-- Frequency axis -->
  <line x1="55" y1="345" x2="310" y2="345" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="180" y="365" text-anchor="middle" fill="#5C3D1E" font-size="11">frequency (f)</text>
  <!-- Amplitude axis -->
  <line x1="55" y1="270" x2="55" y2="345" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="45" y="310" text-anchor="middle" fill="#5C3D1E" font-size="10" transform="rotate(-90,45,310)">amplitude</text>
  <!-- Spectrum peaks -->
  <rect x="85" y="280" width="18" height="65" rx="3" fill="#2D5A8E"/>
  <text x="94" y="355" text-anchor="middle" fill="#2D5A8E" font-size="9">f&#x2081;</text>
  <rect x="155" y="295" width="18" height="50" rx="3" fill="#7C2530"/>
  <text x="164" y="355" text-anchor="middle" fill="#7C2530" font-size="9">f&#x2082;</text>
  <rect x="225" y="310" width="18" height="35" rx="3" fill="#C4A87A"/>
  <text x="234" y="355" text-anchor="middle" fill="#5C3D1E" font-size="9">f&#x2083;</text>
  <rect x="275" y="318" width="18" height="27" rx="3" fill="#2D5A8E" fill-opacity="0.6"/>
  <text x="284" y="355" text-anchor="middle" fill="#2D5A8E" font-size="9">f&#x2084;</text>

  <!-- Key formulas (bottom right) -->
  <rect x="360" y="235" width="415" height="62" rx="6" fill="#7C2530" fill-opacity="0.07" stroke="#7C2530" stroke-width="1.5"/>
  <text x="567" y="258" text-anchor="middle" fill="#7C2530" font-size="12" font-weight="bold">Discrete Fourier Transform</text>
  <text x="567" y="280" text-anchor="middle" fill="#5C3D1E" font-size="13">X[k] = &#x2211; x[n] &#xB7; e^(-i2&#x3C0;kn/N)</text>

  <rect x="360" y="307" width="200" height="55" rx="6" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="460" y="327" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">FFT Complexity</text>
  <text x="460" y="348" text-anchor="middle" fill="#5C3D1E" font-size="13">O(N log N)</text>

  <rect x="575" y="307" width="200" height="55" rx="6" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="675" y="327" text-anchor="middle" fill="#2D5A8E" font-size="12" font-weight="bold">Convolution Theorem</text>
  <text x="675" y="348" text-anchor="middle" fill="#5C3D1E" font-size="13">F{f*g} = F{f}&#xB7;F{g}</text>

  <text x="400" y="392" text-anchor="middle" fill="#C4A87A" font-size="11">Any signal is a sum of sines and cosines at different frequencies</text>
</svg>