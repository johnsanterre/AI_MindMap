<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="13" fill="#5C3D1E" letter-spacing="1.5">SUPERVISED LEARNING PIPELINE</text>

  <!-- ═══ LABELED DATA SECTION ═══ -->
  <rect x="40" y="60" width="160" height="240" rx="5" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="120" y="80" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Labeled Data</text>

  <!-- Data rows -->
  <rect x="55" y="95" width="130" height="28" rx="3" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="100" y="113" text-anchor="middle" font-size="9" fill="#5C3D1E">x₁ = [3.2, 1.1]</text>
  <text x="172" y="113" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">y₁=cat</text>

  <rect x="55" y="130" width="130" height="28" rx="3" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="100" y="148" text-anchor="middle" font-size="9" fill="#5C3D1E">x₂ = [0.5, 4.7]</text>
  <text x="172" y="148" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">y₂=dog</text>

  <rect x="55" y="165" width="130" height="28" rx="3" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="100" y="183" text-anchor="middle" font-size="9" fill="#5C3D1E">x₃ = [2.8, 3.3]</text>
  <text x="172" y="183" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">y₃=cat</text>

  <text x="120" y="210" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">...</text>

  <rect x="55" y="220" width="130" height="28" rx="3" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="100" y="238" text-anchor="middle" font-size="9" fill="#5C3D1E">xₙ = [1.9, 2.1]</text>
  <text x="172" y="238" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">yₙ=dog</text>

  <!-- Annotation: features vs labels -->
  <text x="95" y="275" text-anchor="middle" font-size="8" fill="#2D5A8E">features (input)</text>
  <text x="168" y="275" text-anchor="middle" font-size="8" fill="#7C2530">label</text>

  <!-- ═══ ARROW: Data → Model ═══ -->
  <line x1="210" y1="180" x2="280" y2="180" stroke="#7C2530" stroke-width="2" marker-end="url(#arr)"/>
  <text x="245" y="170" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">train</text>

  <!-- ═══ MODEL BOX ═══ -->
  <rect x="290" y="110" width="180" height="140" rx="8" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="380" y="140" text-anchor="middle" font-size="13" fill="#2D5A8E" font-weight="bold">Model f(x; θ)</text>
  <text x="380" y="165" text-anchor="middle" font-size="10" fill="#5C3D1E">Learns mapping</text>
  <text x="380" y="182" text-anchor="middle" font-size="10" fill="#5C3D1E">x → y</text>

  <!-- Loss function feedback loop -->
  <rect x="320" y="205" width="120" height="30" rx="4" fill="#FDFAF4" stroke="#7C2530" stroke-width="1"/>
  <text x="380" y="224" text-anchor="middle" font-size="9" fill="#7C2530">Loss L(ŷ, y)</text>

  <!-- Feedback arrow (loss back to model) -->
  <path d="M 380 235 L 380 260 L 290 260 L 290 195" fill="none" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="310" y="272" text-anchor="middle" font-size="8" fill="#7C2530" font-style="italic">update θ</text>

  <!-- ═══ ARROW: Model → Predictions ═══ -->
  <line x1="480" y1="180" x2="550" y2="180" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="515" y="170" text-anchor="middle" font-size="9" fill="#5C3D1E" font-style="italic">predict</text>

  <!-- ═══ PREDICTIONS SECTION ═══ -->
  <rect x="560" y="90" width="200" height="200" rx="5" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="660" y="115" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Predictions</text>

  <!-- Classification output -->
  <rect x="580" y="130" width="160" height="55" rx="4" fill="#EDE5D0" stroke="#7C2530" stroke-width="1"/>
  <text x="660" y="148" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Classification</text>
  <text x="660" y="165" text-anchor="middle" font-size="9" fill="#5C3D1E">ŷ = "cat" or "dog"</text>
  <text x="660" y="178" text-anchor="middle" font-size="8" fill="#6B5D4F">discrete class labels</text>

  <!-- Regression output -->
  <rect x="580" y="195" width="160" height="55" rx="4" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="1"/>
  <text x="660" y="213" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Regression</text>
  <text x="660" y="230" text-anchor="middle" font-size="9" fill="#5C3D1E">ŷ = 24.7</text>
  <text x="660" y="243" text-anchor="middle" font-size="8" fill="#6B5D4F">continuous value</text>

  <!-- ═══ BOTTOM ANNOTATION ═══ -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="400" y="365" text-anchor="middle" font-size="10" fill="#5C3D1E">
    The model learns from input–output pairs (x, y), then generalizes to unseen inputs
  </text>
  <text x="400" y="385" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">
    Key question: does the learned mapping generalize beyond the training set?
  </text>
</svg>
