<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="36" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Layer Normalization vs Batch Normalization</text>

  <!-- Grid labels -->
  <text x="60" y="80" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">Samples</text>
  <text x="210" y="58" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">Features</text>

  <!-- Batch Norm side -->
  <text x="210" y="275" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle" font-weight="bold">Batch Norm</text>
  <text x="210" y="295" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">normalizes down columns</text>
  <text x="210" y="311" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">(across batch, per feature)</text>

  <!-- BN Grid -->
  <rect x="130" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="175" y="70" width="40" height="30" rx="3" fill="#7C2530" stroke="#7C2530" stroke-width="1" opacity="0.25"/>
  <rect x="220" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="265" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <rect x="130" y="105" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="175" y="105" width="40" height="30" rx="3" fill="#7C2530" stroke="#7C2530" stroke-width="1" opacity="0.25"/>
  <rect x="220" y="105" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="265" y="105" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <rect x="130" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="175" y="140" width="40" height="30" rx="3" fill="#7C2530" stroke="#7C2530" stroke-width="1" opacity="0.25"/>
  <rect x="220" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="265" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <rect x="130" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="175" y="175" width="40" height="30" rx="3" fill="#7C2530" stroke="#7C2530" stroke-width="1" opacity="0.25"/>
  <rect x="220" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="265" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <!-- BN arrow -->
  <line x1="195" y1="68" x2="195" y2="210" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="195,215 190,207 200,207" fill="#7C2530"/>

  <!-- Sample labels left side -->
  <text x="118" y="90" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s1</text>
  <text x="118" y="125" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s2</text>
  <text x="118" y="160" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s3</text>
  <text x="118" y="195" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s4</text>

  <!-- Feature labels top BN -->
  <text x="150" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f1</text>
  <text x="195" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f2</text>
  <text x="240" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f3</text>
  <text x="285" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f4</text>

  <!-- Layer Norm side -->
  <text x="580" y="275" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Layer Norm</text>
  <text x="580" y="295" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">normalizes across rows</text>
  <text x="580" y="311" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">(across features, per sample)</text>

  <!-- LN Grid -->
  <rect x="500" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="545" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="590" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="635" y="70" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <rect x="500" y="105" width="40" height="30" rx="3" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1" opacity="0.2"/>
  <rect x="545" y="105" width="40" height="30" rx="3" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1" opacity="0.2"/>
  <rect x="590" y="105" width="40" height="30" rx="3" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1" opacity="0.2"/>
  <rect x="635" y="105" width="40" height="30" rx="3" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1" opacity="0.2"/>

  <rect x="500" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="545" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="590" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="635" y="140" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <rect x="500" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="545" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="590" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <rect x="635" y="175" width="40" height="30" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <!-- LN arrow -->
  <line x1="498" y1="120" x2="678" y2="120" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="683,120 675,115 675,125" fill="#2D5A8E"/>

  <!-- Sample labels left side LN -->
  <text x="488" y="90" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s1</text>
  <text x="488" y="125" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s2</text>
  <text x="488" y="160" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s3</text>
  <text x="488" y="195" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">s4</text>

  <!-- Feature labels top LN -->
  <text x="520" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f1</text>
  <text x="565" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f2</text>
  <text x="610" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f3</text>
  <text x="655" y="65" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f4</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="250" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Bottom comparison boxes -->
  <rect x="80" y="330" width="260" height="50" rx="8" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="210" y="352" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Needs large batches</text>
  <text x="210" y="370" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Train/inference mismatch</text>

  <rect x="460" y="330" width="260" height="50" rx="8" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="590" y="352" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Batch-size independent</text>
  <text x="590" y="370" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Same at train and inference</text>
</svg>