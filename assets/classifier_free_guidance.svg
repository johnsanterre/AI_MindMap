<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="35" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Classifier-Free Guidance: Interpolating Conditional and Unconditional Scores</text>

  <defs>
    <marker id="arr-cfg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-brn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Noisy image box -->
  <rect x="30" y="130" width="100" height="100" rx="10" fill="#C4A87A" opacity="0.5"/>
  <rect x="42" y="142" width="18" height="14" fill="#aaa" opacity="0.5"/>
  <rect x="65" y="148" width="22" height="16" fill="#999" opacity="0.4"/>
  <rect x="50" y="170" width="25" height="18" fill="#bbb" opacity="0.6"/>
  <rect x="80" y="165" width="15" height="20" fill="#aaa" opacity="0.5"/>
  <text x="80" y="260" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">x_t (noisy)</text>

  <!-- Two branches -->
  <!-- Unconditional branch -->
  <line x1="135" y1="160" x2="220" y2="110" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#arr-cfg)"/>
  <rect x="225" y="75" width="160" height="55" rx="8" fill="#2D5A8E"/>
  <text x="305" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Unconditional</text>
  <text x="305" y="118" text-anchor="middle" fill="white" font-size="12">score: s(x_t)</text>

  <!-- Conditional branch -->
  <line x1="135" y1="200" x2="220" y2="245" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <rect x="225" y="220" width="160" height="55" rx="8" fill="#7C2530"/>
  <text x="305" y="245" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Conditional</text>
  <text x="305" y="263" text-anchor="middle" fill="white" font-size="12">score: s(x_t | c)</text>

  <!-- Merge arrows -->
  <line x1="388" y1="102" x2="460" y2="170" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-cfg)"/>
  <line x1="388" y1="248" x2="460" y2="185" stroke="#7C2530" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>

  <!-- Interpolation box -->
  <rect x="465" y="145" width="190" height="65" rx="10" fill="#5C3D1E"/>
  <text x="560" y="170" text-anchor="middle" fill="white" font-size="12" font-weight="bold">CFG Combination</text>
  <text x="560" y="192" text-anchor="middle" fill="#FDFAF4" font-size="12">s + w * (s(x|c) - s(x))</text>

  <!-- Output arrow -->
  <line x1="658" y1="178" x2="700" y2="178" stroke="#5C3D1E" stroke-width="2.5" marker-end="url(#arr-brn)"/>

  <!-- Output image -->
  <rect x="705" y="140" width="75" height="75" rx="10" fill="#C4A87A"/>
  <text x="742" y="185" text-anchor="middle" fill="#5C3D1E" font-size="28">&#9733;</text>
  <text x="742" y="240" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">guided output</text>

  <!-- Guidance scale annotation -->
  <text x="560" y="310" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Guidance Scale w</text>
  <line x1="330" y1="330" x2="790" y2="330" stroke="#C4A87A" stroke-width="2"/>
  <!-- Scale ticks -->
  <line x1="370" y1="325" x2="370" y2="335" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="370" y="352" text-anchor="middle" fill="#2D5A8E" font-size="11">w=0</text>
  <text x="370" y="368" text-anchor="middle" fill="#2D5A8E" font-size="10">unconditional</text>

  <line x1="520" y1="325" x2="520" y2="335" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="520" y="352" text-anchor="middle" fill="#5C3D1E" font-size="11">w=1</text>
  <text x="520" y="368" text-anchor="middle" fill="#5C3D1E" font-size="10">standard</text>

  <line x1="700" y1="325" x2="700" y2="335" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="700" y="352" text-anchor="middle" fill="#7C2530" font-size="11">w=7.5</text>
  <text x="700" y="368" text-anchor="middle" fill="#7C2530" font-size="10">high fidelity</text>

  <!-- Arrow showing tradeoff -->
  <text x="130" y="340" text-anchor="middle" fill="#C4A87A" font-size="11">diversity</text>
  <text x="130" y="358" text-anchor="middle" fill="#C4A87A" font-size="18">&#8592;</text>
  <text x="130" y="378" text-anchor="middle" fill="#C4A87A" font-size="11">quality</text>
  <text x="130" y="392" text-anchor="middle" fill="#C4A87A" font-size="18">&#8594;</text>
</svg>