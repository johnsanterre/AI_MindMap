<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Center divider -->
  <line x1="400" y1="20" x2="400" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== LEFT SIDE: Eulerian Path ===== -->
  <text x="200" y="38" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#7C2530" text-anchor="middle">Eulerian Path</text>
  <text x="200" y="56" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Visit every edge exactly once</text>

  <!-- Graph nodes (house shape: 5 nodes) -->
  <!-- Bottom-left A -->
  <circle cx="100" cy="260" r="16" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="100" y="265" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">A</text>
  <!-- Bottom-right B -->
  <circle cx="300" cy="260" r="16" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="300" y="265" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">B</text>
  <!-- Mid-left C -->
  <circle cx="100" cy="150" r="16" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="100" y="155" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">C</text>
  <!-- Mid-right D -->
  <circle cx="300" cy="150" r="16" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="300" y="155" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">D</text>
  <!-- Top E -->
  <circle cx="200" cy="90" r="16" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="200" y="95" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">E</text>

  <!-- Edges (drawn underneath as gray) -->
  <line x1="100" y1="260" x2="300" y2="260" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="100" y1="260" x2="100" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="300" y1="260" x2="300" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="100" y1="150" x2="300" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="100" y1="260" x2="300" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="300" y1="260" x2="100" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="100" y1="150" x2="200" y2="90" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="300" y1="150" x2="200" y2="90" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Euler path trace: A-B-C-D-A-C-E-D-B (visiting all 8 edges) -->
  <polyline points="100,260 300,260 100,150 300,150 100,260 300,150 200,90 100,150 300,260"
    fill="none" stroke="#7C2530" stroke-width="3" stroke-dasharray="8,4"
    marker-end="url(#arrowRed)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Degree annotation box -->
  <rect x="48" y="300" width="304" height="60" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="200" y="318" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Euler&#8217;s Theorem</text>
  <text x="200" y="334" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Path exists &#8660; 0 or 2 odd-degree vertices</text>
  <text x="200" y="350" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Here: deg(A)=4, deg(B)=4, deg(C)=4, deg(D)=4, deg(E)=2</text>

  <!-- ===== RIGHT SIDE: Hamiltonian Path ===== -->
  <text x="600" y="38" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Hamiltonian Path</text>
  <text x="600" y="56" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Visit every vertex exactly once</text>

  <!-- Pentagon of 5 nodes -->
  <!-- Node 1 (top) -->
  <circle cx="600" cy="90" r="16" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="600" y="95" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">1</text>
  <!-- Node 2 (upper right) -->
  <circle cx="710" cy="150" r="16" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="710" y="155" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">2</text>
  <!-- Node 3 (lower right) -->
  <circle cx="670" cy="260" r="16" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="670" y="265" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">3</text>
  <!-- Node 4 (lower left) -->
  <circle cx="530" cy="260" r="16" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="530" y="265" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">4</text>
  <!-- Node 5 (upper left) -->
  <circle cx="490" cy="150" r="16" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="490" y="155" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">5</text>

  <!-- All edges (gray) -->
  <line x1="600" y1="90" x2="710" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="710" y1="150" x2="670" y2="260" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="670" y1="260" x2="530" y2="260" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="530" y1="260" x2="490" y2="150" stroke="#D4C5A9" stroke-width="3"/>
  <line x1="490" y1="150" x2="600" y2="90" stroke="#D4C5A9" stroke-width="3"/>
  <!-- Diagonals -->
  <line x1="600" y1="90" x2="670" y2="260" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="600" y1="90" x2="530" y2="260" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="710" y1="150" x2="530" y2="260" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="490" y1="150" x2="670" y2="260" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="710" y1="150" x2="490" y2="150" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Hamiltonian path trace: 1-2-3-4-5 -->
  <polyline points="600,90 710,150 670,260 530,260 490,150"
    fill="none" stroke="#2D5A8E" stroke-width="3.5" stroke-dasharray="8,4"
    marker-end="url(#arrowNavy)"/>

  <!-- Step labels -->
  <text x="668" y="118" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">1st</text>
  <text x="704" y="212" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">2nd</text>
  <text x="600" y="280" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">3rd</text>
  <text x="496" y="212" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">4th</text>

  <!-- Annotation box -->
  <rect x="448" y="300" width="304" height="60" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="600" y="318" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">NP-Complete Problem</text>
  <text x="600" y="334" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">No simple degree condition suffices</text>
  <text x="600" y="350" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Related: Travelling Salesman Problem (TSP)</text>

  <!-- Bottom caption -->
  <text x="400" y="390" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Euler: traverse every edge &#8226; Hamilton: visit every vertex &#8226; Same graphs, fundamentally different complexity</text>
</svg>