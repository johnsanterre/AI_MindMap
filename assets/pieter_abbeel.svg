<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Pieter Abbeel</text>

  <!-- Center hub -->
  <ellipse cx="400" cy="200" rx="90" ry="40" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" font-family="Georgia, serif" font-size="15" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Pieter</text>
  <text x="400" y="213" font-family="Georgia, serif" font-size="15" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Abbeel</text>

  <!-- Spoke 1: Apprenticeship Learning (top-left) -->
  <line x1="330" y1="175" x2="160" y2="95" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="130" cy="85" rx="100" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="130" y="80" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Apprenticeship</text>
  <text x="130" y="96" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Learning</text>

  <!-- Spoke 2: Deep RL for Robotics (top-right) -->
  <line x1="470" y1="175" x2="640" y2="95" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="670" cy="85" rx="105" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="670" y="80" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Deep RL for</text>
  <text x="670" y="96" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Robotics</text>

  <!-- Spoke 3: UC Berkeley (left) -->
  <line x1="310" y1="200" x2="155" y2="220" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="110" cy="225" rx="85" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="110" y="220" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">UC Berkeley</text>
  <text x="110" y="236" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">BAIR</text>

  <!-- Spoke 4: Covariant.ai (right) -->
  <line x1="490" y1="200" x2="650" y2="220" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="690" cy="225" rx="85" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="690" y="220" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Covariant.ai</text>
  <text x="690" y="236" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Warehouse Robotics</text>

  <!-- Spoke 5: Helicopter Aerobatics (bottom-center) -->
  <line x1="400" y1="240" x2="400" y2="320" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="400" cy="345" rx="105" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="340" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Helicopter</text>
  <text x="400" y="356" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Aerobatics</text>

  <!-- Decorative sub-labels -->
  <text x="235" y="140" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">Inverse RL</text>
  <text x="565" y="140" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">Sim-to-Real</text>
  <text x="200" y="270" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">CS 285</text>
  <text x="590" y="270" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">Founded 2017</text>
  <text x="500" y="300" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">Autonomous Flight</text>
</svg>