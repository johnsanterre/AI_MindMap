<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Backpropagation: Forward Pass and Backward Pass</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="fwd" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#2D5A8E"/>
    </marker>
    <marker id="bwd" markerWidth="8" markerHeight="8" refX="2" refY="4" orient="auto">
      <path d="M8,0 L8,8 L0,4 z" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- === FORWARD PASS (top) === -->
  <text x="400" y="62" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Forward Pass</text>

  <!-- Input node -->
  <circle cx="80" cy="120" r="30" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="80" y="117" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Input</text>
  <text x="80" y="131" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">x</text>

  <!-- Hidden 1 -->
  <circle cx="240" cy="120" r="30" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="240" y="117" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Hidden 1</text>
  <text x="240" y="131" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">h1</text>

  <!-- Hidden 2 -->
  <circle cx="400" cy="120" r="30" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="400" y="117" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Hidden 2</text>
  <text x="400" y="131" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">h2</text>

  <!-- Hidden 3 -->
  <circle cx="560" cy="120" r="30" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="560" y="117" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Hidden 3</text>
  <text x="560" y="131" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">h3</text>

  <!-- Output / Loss -->
  <circle cx="720" cy="120" r="30" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="720" y="117" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Output</text>
  <text x="720" y="131" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Loss L</text>

  <!-- Forward arrows -->
  <line x1="112" y1="120" x2="206" y2="120" stroke="#2D5A8E" stroke-width="2" marker-end="url(#fwd)"/>
  <text x="160" y="112" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">W1</text>

  <line x1="272" y1="120" x2="366" y2="120" stroke="#2D5A8E" stroke-width="2" marker-end="url(#fwd)"/>
  <text x="320" y="112" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">W2</text>

  <line x1="432" y1="120" x2="526" y2="120" stroke="#2D5A8E" stroke-width="2" marker-end="url(#fwd)"/>
  <text x="480" y="112" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">W3</text>

  <line x1="592" y1="120" x2="686" y2="120" stroke="#2D5A8E" stroke-width="2" marker-end="url(#fwd)"/>
  <text x="640" y="112" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">W4</text>

  <!-- === Divider === -->
  <line x1="40" y1="175" x2="760" y2="175" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === BACKWARD PASS (bottom) === -->
  <text x="400" y="202" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530" text-anchor="middle">Backward Pass (Gradient Flow)</text>

  <!-- Gradient nodes -->
  <circle cx="720" cy="270" r="28" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="2"/>
  <text x="720" y="267" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">dL/dL</text>
  <text x="720" y="281" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">= 1</text>

  <circle cx="560" cy="270" r="28" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="2"/>
  <text x="560" y="267" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">dL/dh3</text>
  <text x="560" y="281" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">chain rule</text>

  <circle cx="400" cy="270" r="28" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="2"/>
  <text x="400" y="267" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">dL/dh2</text>
  <text x="400" y="281" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">chain rule</text>

  <circle cx="240" cy="270" r="28" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="2"/>
  <text x="240" y="267" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">dL/dh1</text>
  <text x="240" y="281" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">chain rule</text>

  <circle cx="80" cy="270" r="28" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="2"/>
  <text x="80" y="267" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">dL/dx</text>
  <text x="80" y="281" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">chain rule</text>

  <!-- Backward arrows (right to left) -->
  <line x1="690" y1="270" x2="592" y2="270" stroke="#7C2530" stroke-width="2.5" marker-end="url(#bwd)"/>
  <text x="640" y="260" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">dL/dW4</text>

  <line x1="530" y1="270" x2="432" y2="270" stroke="#7C2530" stroke-width="2.5" marker-end="url(#bwd)"/>
  <text x="480" y="260" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">dL/dW3</text>

  <line x1="370" y1="270" x2="272" y2="270" stroke="#7C2530" stroke-width="2.5" marker-end="url(#bwd)"/>
  <text x="320" y="260" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">dL/dW2</text>

  <line x1="210" y1="270" x2="112" y2="270" stroke="#7C2530" stroke-width="2.5" marker-end="url(#bwd)"/>
  <text x="160" y="260" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">dL/dW1</text>

  <!-- Vertical connection arrows showing gradient feeds weight update -->
  <line x1="560" y1="150" x2="560" y2="240" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="400" y1="150" x2="400" y2="240" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="240" y1="150" x2="240" y2="240" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="80" y1="150" x2="80" y2="240" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Bottom summary -->
  <rect x="40" y="320" width="720" height="60" rx="5" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="400" y="340" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Chain Rule: dL/dW_i = dL/dh_i * dh_i/dW_i   (each gradient depends on the one downstream)</text>
  <text x="400" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Forward: compute activations left-to-right  |  Backward: propagate gradients right-to-left</text>
  <text x="400" y="374" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Rumelhart, Hinton &amp; Williams (1986) — the algorithm that made deep learning possible</text>
</svg>