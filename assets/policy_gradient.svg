<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Policy Gradient: Learning Actions Directly</text>

  <!-- ── Agent ── -->
  <rect x="60" y="130" width="140" height="80" rx="8" fill="#7C2530" fill-opacity="0.13" stroke="#7C2530" stroke-width="2"/>
  <text x="130" y="157" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530" text-anchor="middle">Agent</text>
  <text x="130" y="176" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Policy  pi_theta(a|s)</text>
  <text x="130" y="194" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">parameterised by theta</text>

  <!-- ── Environment ── -->
  <rect x="580" y="130" width="160" height="80" rx="8" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="660" y="157" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Environment</text>
  <text x="660" y="176" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">state s, reward r</text>
  <text x="660" y="194" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">transition dynamics</text>

  <!-- Arrow: Agent to Environment (action) -->
  <line x1="200" y1="152" x2="575" y2="152" stroke="#7C2530" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="390" y="143" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">action  a ~ pi_theta(.|s)</text>

  <!-- Arrow: Environment to Agent (state + reward) -->
  <line x1="575" y1="190" x2="200" y2="190" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="390" y="207" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">state s', reward r</text>

  <!-- ── Gradient Update Box ── -->
  <rect x="250" y="268" width="300" height="72" rx="8" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="2"/>
  <text x="400" y="290" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Policy Gradient Update</text>
  <text x="400" y="310" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">theta = theta + alpha nabla log pi(a|s) G_t</text>
  <text x="400" y="328" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#5C3D1E" text-anchor="middle">increase probability of actions that led to high return</text>

  <!-- Arrow: Agent down to Gradient box -->
  <line x1="130" y1="210" x2="130" y2="302" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="130" y1="302" x2="245" y2="302" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrBrown)"/>

  <!-- Arrow: Gradient box back up to Agent (weight update) -->
  <path d="M250,280 Q220,260 160,230 Q140,220 130,210" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrTan)"/>
  <text x="180" y="248" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">update theta</text>

  <!-- ── Trajectory rollout label ── -->
  <rect x="265" y="55" width="270" height="30" rx="5" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.2"/>
  <text x="400" y="75" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">tau = (s0, a0, r0, s1, a1, r1, ...)</text>
  <text x="400" y="50" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Collect Trajectory</text>

  <!-- Arrows from trajectory to loop -->
  <line x1="330" y1="85" x2="180" y2="130" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <line x1="470" y1="85" x2="610" y2="130" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrBlue)"/>

  <!-- ── Variance note ── -->
  <rect x="580" y="268" width="170" height="72" rx="6" fill="#2D5A8E" fill-opacity="0.10" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="665" y="289" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Variance Reduction</text>
  <text x="665" y="306" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">baseline  b(s)</text>
  <text x="665" y="321" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">G_t - b(s_t)</text>
  <text x="665" y="336" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#2D5A8E" text-anchor="middle">reduces noise, same expectation</text>

  <!-- Arrow: Variance box to gradient box -->
  <line x1="580" y1="304" x2="555" y2="304" stroke="#2D5A8E" stroke-width="1.3" marker-end="url(#arrBlue)"/>

  <!-- ── Key insight banner ── -->
  <rect x="170" y="365" width="462" height="26" rx="5" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.5"/>
  <text x="401" y="382" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Directly optimise the policy -- no value function required</text>

  <!-- ── Arrowhead markers ── -->
  <defs>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrBrown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrTan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>