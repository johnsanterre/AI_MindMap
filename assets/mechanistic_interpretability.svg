<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <!-- Border -->
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Mechanistic Interpretability</text>
  <text x="400" y="56" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Reverse-engineering neural networks into weights, circuits, and algorithms</text>

  <!-- ===== LEFT SIDE: Black Box ===== -->
  <!-- Black box outer rect -->
  <rect x="40" y="75" width="230" height="210" fill="#2D2D2D" stroke="#5C3D1E" stroke-width="2" rx="8"/>
  <text x="155" y="96" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#C4A87A" text-anchor="middle">"What is this doing?"</text>

  <!-- Neural network nodes (3 layers) -->
  <!-- Input layer -->
  <circle cx="85" cy="135" r="10" fill="#C4A87A" stroke="#FDFAF4" stroke-width="1.5"/>
  <circle cx="85" cy="175" r="10" fill="#C4A87A" stroke="#FDFAF4" stroke-width="1.5"/>
  <circle cx="85" cy="215" r="10" fill="#C4A87A" stroke="#FDFAF4" stroke-width="1.5"/>
  <circle cx="85" cy="255" r="10" fill="#C4A87A" stroke="#FDFAF4" stroke-width="1.5"/>
  <!-- Hidden layer -->
  <circle cx="155" cy="145" r="10" fill="#888" stroke="#FDFAF4" stroke-width="1.5"/>
  <circle cx="155" cy="185" r="10" fill="#888" stroke="#FDFAF4" stroke-width="1.5"/>
  <circle cx="155" cy="225" r="10" fill="#888" stroke="#FDFAF4" stroke-width="1.5"/>
  <!-- Output layer -->
  <circle cx="225" cy="165" r="10" fill="#C4A87A" stroke="#FDFAF4" stroke-width="1.5"/>
  <circle cx="225" cy="225" r="10" fill="#C4A87A" stroke="#FDFAF4" stroke-width="1.5"/>

  <!-- Edges (input → hidden) -->
  <line x1="95" y1="135" x2="145" y2="145" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="135" x2="145" y2="185" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="175" x2="145" y2="145" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="175" x2="145" y2="185" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="175" x2="145" y2="225" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="215" x2="145" y2="185" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="215" x2="145" y2="225" stroke="#555" stroke-width="1"/>
  <line x1="95" y1="255" x2="145" y2="225" stroke="#555" stroke-width="1"/>
  <!-- Edges (hidden → output) -->
  <line x1="165" y1="145" x2="215" y2="165" stroke="#555" stroke-width="1"/>
  <line x1="165" y1="185" x2="215" y2="165" stroke="#555" stroke-width="1"/>
  <line x1="165" y1="185" x2="215" y2="225" stroke="#555" stroke-width="1"/>
  <line x1="165" y1="225" x2="215" y2="165" stroke="#555" stroke-width="1"/>
  <line x1="165" y1="225" x2="215" y2="225" stroke="#555" stroke-width="1"/>

  <!-- Question marks -->
  <text x="155" y="284" font-family="Georgia, serif" font-size="22" fill="#888" text-anchor="middle">? ? ?</text>

  <!-- LEFT label -->
  <text x="155" y="310" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Black Box</text>

  <!-- ===== ARROW: Reverse Engineering ===== -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
  </defs>
  <line x1="285" y1="180" x2="465" y2="180" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="375" y="168" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Reverse</text>
  <text x="375" y="183" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Engineering</text>

  <!-- ===== RIGHT SIDE: Opened Network ===== -->
  <rect x="475" y="75" width="295" height="210" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2" rx="8"/>
  <text x="622" y="96" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Identified Circuits</text>

  <!-- Attention head box 1 -->
  <rect x="490" y="105" width="120" height="54" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="1.5" rx="5"/>
  <text x="550" y="120" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Attention Head</text>
  <text x="550" y="134" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">"induction head"</text>
  <text x="550" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">in-context learning</text>

  <!-- Attention head box 2 -->
  <rect x="625" y="105" width="130" height="54" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="1.5" rx="5"/>
  <text x="690" y="120" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Attention Head</text>
  <text x="690" y="134" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">"name mover"</text>
  <text x="690" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">copies subject token</text>

  <!-- MLP box 1 -->
  <rect x="490" y="175" width="120" height="54" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.5" rx="5"/>
  <text x="550" y="190" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">MLP Layer</text>
  <text x="550" y="204" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">"curve detector"</text>
  <text x="550" y="218" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">visual feature</text>

  <!-- MLP box 2 -->
  <rect x="625" y="175" width="130" height="54" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.5" rx="5"/>
  <text x="690" y="190" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">MLP Layer</text>
  <text x="690" y="204" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">"capital city token"</text>
  <text x="690" y="218" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">factual recall</text>

  <!-- RIGHT label -->
  <text x="622" y="310" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Opened Network</text>

  <!-- ===== BOTTOM: Features → Circuits → Algorithms ===== -->
  <line x1="40" y1="328" x2="760" y2="328" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Features box -->
  <rect x="90" y="340" width="140" height="36" fill="#EAF0F8" stroke="#2D5A8E" stroke-width="1.5" rx="5"/>
  <text x="160" y="356" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Features</text>
  <text x="160" y="369" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">meaningful directions</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>
  <line x1="233" y1="358" x2="277" y2="358" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead2)"/>

  <!-- Circuits box -->
  <rect x="280" y="340" width="140" height="36" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.5" rx="5"/>
  <text x="350" y="356" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Circuits</text>
  <text x="350" y="369" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">subgraphs of weights</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowhead3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>
  <line x1="423" y1="358" x2="467" y2="358" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead3)"/>

  <!-- Algorithms box -->
  <rect x="470" y="340" width="140" height="36" fill="#F0EDE6" stroke="#5C3D1E" stroke-width="1.5" rx="5"/>
  <text x="540" y="356" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Algorithms</text>
  <text x="540" y="369" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">full computations</text>

</svg>
