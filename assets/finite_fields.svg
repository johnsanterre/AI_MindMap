<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="26" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Finite Fields: Arithmetic That Wraps Around</text>

  <!-- ═══════════════════════════════════════
       PANEL 1: GF(5) Addition/Multiplication
       Left panel x: 18–260
  ════════════════════════════════════════ -->
  <rect x="18" y="38" width="242" height="322" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="139" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">GF(5) = {0, 1, 2, 3, 4}</text>

  <!-- Clock-like circle for mod 5 -->
  <circle cx="139" cy="150" r="60" fill="none" stroke="#2D5A8E" stroke-width="2"/>

  <!-- Elements on the circle -->
  <circle cx="139" cy="88" r="14" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="139" y="93" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">0</text>

  <circle cx="196" cy="119" r="14" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="196" y="124" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">1</text>

  <circle cx="174" cy="186" r="14" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="174" y="191" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">2</text>

  <circle cx="104" cy="186" r="14" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="104" y="191" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">3</text>

  <circle cx="82" cy="119" r="14" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="82" y="124" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">4</text>

  <!-- Curved arrow from 3 to 0 showing 3+2=0 -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>
  <path d="M112,174 Q70,140 88,107" fill="none" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowR)" stroke-dasharray="4,2"/>
  <path d="M88,107 Q110,70 133,90" fill="none" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowR)" stroke-dasharray="4,2"/>
  <text x="60" y="145" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">3+2</text>
  <text x="60" y="156" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">= 0</text>

  <!-- Example operations -->
  <rect x="30" y="218" width="218" height="130" rx="5" fill="#E8E0D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="139" y="236" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Arithmetic mod 5</text>
  <text x="42" y="256" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">3 + 4 = 7 mod 5 = 2</text>
  <text x="42" y="274" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">2 × 3 = 6 mod 5 = 1</text>
  <text x="42" y="292" font-family="Georgia, serif" font-size="10" fill="#7C2530">2⁻¹ = 3  (since 2×3 = 1)</text>
  <text x="42" y="310" font-family="Georgia, serif" font-size="10" fill="#7C2530">4⁻¹ = 4  (since 4×4 = 1)</text>
  <text x="139" y="335" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Every nonzero element has an inverse</text>

  <!-- ═══════════════════════════════════════
       PANEL 2: Field Extensions GF(2^n)
       Middle panel x: 270–530
  ════════════════════════════════════════ -->
  <rect x="270" y="38" width="260" height="322" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="400" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Extension Fields: GF(2ⁿ)</text>

  <!-- Binary polynomial representation -->
  <rect x="282" y="68" width="236" height="70" rx="5" fill="#E8E0D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="86" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">GF(2⁸) for AES Encryption</text>
  <text x="400" y="102" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Polynomials over GF(2) mod irreducible p(x)</text>
  <text x="400" y="118" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">p(x) = x⁸ + x⁴ + x³ + x + 1</text>
  <text x="400" y="132" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle">256 elements, each an 8-bit byte</text>

  <!-- Polynomial addition example -->
  <rect x="282" y="148" width="236" height="84" rx="5" fill="#E8E0D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="166" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Polynomial Arithmetic in GF(2³)</text>
  <text x="295" y="184" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E">  (x²+1) + (x²+x) = x + 1</text>
  <text x="295" y="198" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">  coefficients: add mod 2 (XOR)</text>
  <text x="295" y="216" font-family="Georgia, serif" font-size="9.5" fill="#7C2530">  (x+1) × (x+1) = x² + 1  mod p(x)</text>

  <!-- Application boxes -->
  <rect x="282" y="242" width="110" height="50" rx="5" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="337" y="260" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">AES</text>
  <text x="337" y="275" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle">GF(2⁸) S-box</text>
  <text x="337" y="287" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle">MixColumns</text>

  <rect x="408" y="242" width="110" height="50" rx="5" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="463" y="260" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">QR Codes</text>
  <text x="463" y="275" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E" text-anchor="middle">Reed-Solomon</text>
  <text x="463" y="287" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E" text-anchor="middle">over GF(2⁸)</text>

  <!-- Key property -->
  <rect x="282" y="302" width="236" height="48" rx="5" fill="#E8E0D0" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="320" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Key Property</text>
  <text x="400" y="336" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">|GF(q)| = pⁿ for some prime p, integer n</text>

  <!-- ═══════════════════════════════════════
       PANEL 3: Applications
       Right panel x: 540–782
  ════════════════════════════════════════ -->
  <rect x="540" y="38" width="244" height="322" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="662" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Applications</text>

  <!-- Error correction -->
  <rect x="552" y="68" width="220" height="70" rx="5" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="662" y="86" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Error Correcting Codes</text>
  <text x="662" y="102" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Reed-Solomon: evaluate polynomial</text>
  <text x="662" y="116" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">at points in GF(2⁸) to encode data</text>
  <text x="662" y="130" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">CDs, DVDs, QR codes, deep space</text>

  <!-- Cryptography -->
  <rect x="552" y="148" width="220" height="70" rx="5" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="662" y="166" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Cryptography</text>
  <text x="662" y="182" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">Elliptic curves over GF(p)</text>
  <text x="662" y="196" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">Discrete log problem in GF(p)*</text>
  <text x="662" y="210" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">RSA uses arithmetic in Z/nZ</text>

  <!-- Secret sharing -->
  <rect x="552" y="228" width="220" height="56" rx="5" fill="#E8E0D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="662" y="246" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Shamir Secret Sharing</text>
  <text x="662" y="262" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Split secret into shares using</text>
  <text x="662" y="276" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">polynomial interpolation over GF(p)</text>

  <!-- Hash / CS -->
  <rect x="552" y="294" width="220" height="56" rx="5" fill="#E8E0D0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="662" y="312" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Hashing &amp; Randomness</text>
  <text x="662" y="328" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Universal hashing: h(x) = ax+b</text>
  <text x="662" y="342" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">over GF(p) gives perfect uniformity</text>

  <!-- Bottom credit -->
  <text x="400" y="392" font-family="Georgia, serif" font-size="9" fill="#A09080" text-anchor="middle">Galois (1830): finite fields exist only for prime-power orders</text>
</svg>