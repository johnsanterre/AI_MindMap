<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Union-Find: Disjoint Set Forest</text>

  <!-- Before: separate trees -->
  <text x="160" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7C2530" font-style="italic">Before Union</text>

  <!-- Tree A -->
  <circle cx="100" cy="120" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="2"/>
  <text x="100" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">A</text>
  <line x1="80" y1="138" x2="55" y2="175" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="120" y1="138" x2="145" y2="175" stroke="#5C3D1E" stroke-width="2"/>
  <circle cx="55" cy="192" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="55" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">B</text>
  <circle cx="145" cy="192" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="145" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">C</text>
  <line x1="55" y1="208" x2="55" y2="245" stroke="#5C3D1E" stroke-width="2"/>
  <circle cx="55" cy="262" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="55" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">D</text>

  <!-- Tree E -->
  <circle cx="260" cy="120" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="260" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">E</text>
  <line x1="240" y1="138" x2="215" y2="175" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="280" y1="138" x2="305" y2="175" stroke="#5C3D1E" stroke-width="2"/>
  <circle cx="215" cy="192" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="215" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">F</text>
  <circle cx="305" cy="192" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="305" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">G</text>

  <!-- Arrow in middle -->
  <text x="400" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#7C2530">&#x27A1;</text>
  <text x="400" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Union(C, F)</text>

  <!-- After: merged tree with path compression -->
  <text x="620" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-style="italic">After Union + Path Compression</text>

  <!-- Merged root A -->
  <circle cx="600" cy="120" r="20" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="600" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FDFAF4" font-weight="bold">A</text>

  <!-- Children of A: B, C, E, D all flattened -->
  <line x1="560" y1="138" x2="490" y2="195" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="575" y1="140" x2="555" y2="195" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="615" y1="140" x2="645" y2="195" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="635" y1="138" x2="710" y2="195" stroke="#5C3D1E" stroke-width="2"/>

  <circle cx="490" cy="212" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="490" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">B</text>
  <circle cx="555" cy="212" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="555" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">D</text>
  <circle cx="645" cy="212" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="645" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">C</text>
  <circle cx="710" cy="212" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="710" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">E</text>

  <!-- E's children now also point to A -->
  <line x1="640" y1="138" x2="755" y2="195" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="620" y1="140" x2="770" y2="260" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="5,3"/>

  <circle cx="755" cy="212" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="755" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">F</text>
  <circle cx="770" cy="275" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="770" y="281" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">G</text>
  <line x1="755" y1="228" x2="770" y2="259" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="40" y="310" width="720" height="70" rx="8" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">Two Key Optimizations</text>
  <text x="220" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530">Union by Rank: attach smaller tree under larger root</text>
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E">Path Compression: flatten tree during Find</text>
</svg>