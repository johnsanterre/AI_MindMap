<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Bayes' Theorem: Prior to Posterior Update</text>

  <!-- Prior Distribution -->
  <rect x="40" y="70" width="200" height="260" rx="10" fill="none" stroke="#C4A87A" stroke-width="2"/>
  <text x="140" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" font-weight="bold">Prior P(H)</text>

  <!-- Prior bell curve (wide, uncertain) -->
  <path d="M 60,280 Q 80,270 100,240 Q 120,170 140,155 Q 160,170 180,240 Q 200,270 220,280" fill="none" stroke="#2D5A8E" stroke-width="3"/>
  <line x1="60" y1="280" x2="220" y2="280" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="140" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-style="italic">Wide = uncertain</text>
  <text x="140" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Initial belief</text>

  <!-- Arrow: Prior to Likelihood -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
  </defs>
  <line x1="250" y1="200" x2="292" y2="200" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="271" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">x</text>

  <!-- Likelihood -->
  <rect x="300" y="70" width="200" height="260" rx="10" fill="none" stroke="#C4A87A" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" font-weight="bold">Likelihood P(D|H)</text>

  <!-- Likelihood curve (asymmetric, data-driven) -->
  <path d="M 320,280 Q 345,275 365,255 Q 385,195 395,145 Q 405,165 425,225 Q 445,265 480,280" fill="none" stroke="#7C2530" stroke-width="3"/>
  <line x1="320" y1="280" x2="480" y2="280" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-style="italic">Evidence from data</text>
  <text x="400" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">How well H explains D</text>

  <!-- Arrow: Likelihood to Posterior -->
  <line x1="510" y1="200" x2="552" y2="200" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="531" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">=</text>

  <!-- Posterior Distribution -->
  <rect x="560" y="70" width="200" height="260" rx="10" fill="none" stroke="#C4A87A" stroke-width="2"/>
  <text x="660" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" font-weight="bold">Posterior P(H|D)</text>

  <!-- Ghost of prior (dashed) -->
  <path d="M 590,280 Q 610,270 630,240 Q 650,180 660,165 Q 670,180 690,240 Q 710,270 730,280" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Posterior bell curve (narrow, more certain, shifted) -->
  <path d="M 610,280 Q 625,278 638,268 Q 650,220 657,155 Q 664,220 680,268 Q 693,278 710,280" fill="none" stroke="#2D5A8E" stroke-width="3"/>
  <line x1="590" y1="280" x2="730" y2="280" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="660" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-style="italic">Narrow = more certain</text>
  <text x="660" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Updated belief</text>

  <!-- Formula bar at bottom -->
  <rect x="120" y="352" width="560" height="34" rx="6" fill="#5C3D1E" opacity="0.08"/>
  <text x="400" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" font-weight="bold">P(H|D) = P(D|H) . P(H) / P(D)</text>
</svg>
