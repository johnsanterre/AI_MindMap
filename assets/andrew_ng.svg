<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Andrew Ng: Democratizing AI</text>

  <!-- Central hub -->
  <circle cx="400" cy="200" r="52" fill="#F5EFE4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="400" y="193" font-family="Georgia,serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">Andrew</text>
  <text x="400" y="210" font-family="Georgia,serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">Ng</text>

  <!-- Spoke lines -->
  <line x1="348" y1="200" x2="170" y2="110" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="348" y1="200" x2="170" y2="290" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="400" y1="148" x2="400" y2="62"  stroke="#7C2530" stroke-width="1.5"/>
  <line x1="452" y1="200" x2="630" y2="110" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="452" y1="200" x2="630" y2="290" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="400" y1="252" x2="400" y2="338" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Node 1: Stanford AI Lab (top-left) -->
  <rect x="60" y="80" width="160" height="56" rx="6" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="140" y="100" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Stanford AI Lab</text>
  <text x="140" y="115" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle">Director, 2003 onward</text>
  <text x="140" y="129" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-style="italic">sparse autoencoders, ML courses</text>

  <!-- Node 2: Google Brain (top-center) -->
  <rect x="310" y="30" width="180" height="45" rx="6" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="50" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Google Brain</text>
  <text x="400" y="66" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-style="italic">co-founder, 2011 — cat neurons</text>

  <!-- Node 3: Coursera / ML MOOC (top-right) -->
  <rect x="555" y="80" width="190" height="56" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="650" y="100" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Coursera / ML MOOC</text>
  <text x="650" y="115" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle">co-founder, 2012</text>
  <text x="650" y="129" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-style="italic">5M+ enrolled in ML course</text>

  <!-- Node 4: Baidu AI (bottom-left) -->
  <rect x="60" y="262" width="160" height="56" rx="6" fill="#F5EFE4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="140" y="282" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Baidu AI Group</text>
  <text x="140" y="297" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle">Chief Scientist, 2014-17</text>
  <text x="140" y="311" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-style="italic">speech recognition at scale</text>

  <!-- Node 5: DeepLearning.AI (bottom-right) -->
  <rect x="555" y="262" width="190" height="56" rx="6" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="650" y="282" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">DeepLearning.AI</text>
  <text x="650" y="297" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle">founded 2017</text>
  <text x="650" y="311" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-style="italic">DL specialization, short courses</text>

  <!-- Node 6: Landing AI (bottom-center) -->
  <rect x="310" y="325" width="180" height="45" rx="6" fill="#F5EFE4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="345" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Landing AI</text>
  <text x="400" y="361" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-style="italic">data-centric AI for manufacturing</text>

  <!-- Bottom caption -->
  <text x="400" y="392" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">"AI is the new electricity." — Andrew Ng</text>
</svg>