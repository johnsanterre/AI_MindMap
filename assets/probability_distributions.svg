<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>
  <text x="400" y="35" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Family Tree of Probability Distributions</text>

  <!-- Defs for arrowheads -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrow-navy" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- === DISCRETE SIDE (left) === -->
  <text x="200" y="65" text-anchor="middle" fill="#7C2530" font-size="13" font-style="italic">Discrete</text>

  <!-- Bernoulli -->
  <rect x="130" y="75" width="140" height="36" rx="8" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="200" y="98" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Bernoulli</text>

  <!-- Binomial -->
  <rect x="50" y="155" width="130" height="36" rx="8" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="115" y="178" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Binomial</text>

  <!-- Categorical -->
  <rect x="210" y="155" width="130" height="36" rx="8" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="275" y="178" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Categorical</text>

  <!-- Multinomial -->
  <rect x="210" y="240" width="130" height="36" rx="8" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="275" y="263" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Multinomial</text>

  <!-- Poisson -->
  <rect x="50" y="240" width="130" height="36" rx="8" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="115" y="263" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Poisson</text>

  <!-- Normal (CLT bridge) -->
  <rect x="50" y="325" width="130" height="36" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="115" y="348" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Normal (CLT)</text>

  <!-- Arrows: Bernoulli -> Binomial -->
  <line x1="175" y1="111" x2="130" y2="155" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="130" y="137" text-anchor="middle" fill="#5C3D1E" font-size="10" font-style="italic">n trials</text>

  <!-- Arrows: Bernoulli -> Categorical -->
  <line x1="225" y1="111" x2="260" y2="155" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="265" y="137" text-anchor="middle" fill="#5C3D1E" font-size="10" font-style="italic">k outcomes</text>

  <!-- Arrows: Categorical -> Multinomial -->
  <line x1="275" y1="191" x2="275" y2="240" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="300" y="220" text-anchor="start" fill="#5C3D1E" font-size="10" font-style="italic">n trials</text>

  <!-- Arrows: Binomial -> Normal (CLT) -->
  <line x1="115" y1="276" x2="115" y2="325" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow-navy)" stroke-dasharray="5,3"/>
  <text x="135" y="305" text-anchor="start" fill="#2D5A8E" font-size="10" font-style="italic">n large (CLT)</text>

  <!-- Arrows: Binomial -> Poisson -->
  <line x1="115" y1="191" x2="115" y2="240" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="135" y="220" text-anchor="start" fill="#5C3D1E" font-size="10" font-style="italic">n large, p small</text>

  <!-- === CONTINUOUS SIDE (right) === -->
  <text x="590" y="65" text-anchor="middle" fill="#2D5A8E" font-size="13" font-style="italic">Continuous</text>

  <!-- Exponential -->
  <rect x="520" y="75" width="140" height="36" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="590" y="98" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Exponential</text>

  <!-- Gamma -->
  <rect x="520" y="155" width="140" height="36" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="590" y="178" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Gamma</text>

  <!-- Beta -->
  <rect x="390" y="155" width="110" height="36" rx="8" fill="#C4A87A" fill-opacity="0.3" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="445" y="178" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Beta</text>

  <!-- Dirichlet -->
  <rect x="390" y="240" width="110" height="36" rx="8" fill="#C4A87A" fill-opacity="0.3" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="445" y="263" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Dirichlet</text>

  <!-- Normal (right copy) -->
  <rect x="520" y="240" width="140" height="36" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="590" y="263" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Gaussian</text>

  <!-- Multivariate Normal -->
  <rect x="520" y="325" width="140" height="36" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="590" y="348" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Multivariate Normal</text>

  <!-- Arrows: Exponential -> Gamma -->
  <line x1="590" y1="111" x2="590" y2="155" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow-navy)"/>
  <text x="610" y="137" text-anchor="start" fill="#5C3D1E" font-size="10" font-style="italic">sum of k</text>

  <!-- Arrows: Gamma -> Gaussian -->
  <line x1="590" y1="191" x2="590" y2="240" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow-navy)" stroke-dasharray="5,3"/>
  <text x="610" y="220" text-anchor="start" fill="#2D5A8E" font-size="10" font-style="italic">k large</text>

  <!-- Arrows: Gaussian -> Multivariate Normal -->
  <line x1="590" y1="276" x2="590" y2="325" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow-navy)"/>
  <text x="610" y="305" text-anchor="start" fill="#5C3D1E" font-size="10" font-style="italic">d dimensions</text>

  <!-- Arrows: Beta -> Dirichlet -->
  <line x1="445" y1="191" x2="445" y2="240" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="220" text-anchor="start" fill="#5C3D1E" font-size="10" font-style="italic">k categories</text>

  <!-- Cross-link: Bernoulli conjugate to Beta -->
  <path d="M270,97 C350,90 380,130 430,155" fill="none" stroke="#C4A87A" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="370" y="108" text-anchor="middle" fill="#C4A87A" font-size="9" font-style="italic">conjugate prior</text>

  <!-- Cross-link: Categorical conjugate to Dirichlet -->
  <path d="M340,175 C370,200 400,230 430,240" fill="none" stroke="#C4A87A" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="365" y="228" text-anchor="middle" fill="#C4A87A" font-size="9" font-style="italic">conjugate prior</text>

  <!-- Legend -->
  <line x1="50" y1="388" x2="75" y2="388" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="80" y="392" fill="#5C3D1E" font-size="10">generalization</text>
  <line x1="180" y1="388" x2="205" y2="388" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="210" y="392" fill="#2D5A8E" font-size="10">limit (CLT)</text>
  <line x1="310" y1="388" x2="335" y2="388" stroke="#C4A87A" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="340" y="392" fill="#C4A87A" font-size="10">conjugate prior</text>
</svg>