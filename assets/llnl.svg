<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#7C2530"/>
  <text x="400" y="32" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Lawrence Livermore National Laboratory</text>

  <!-- Panel dividers -->
  <line x1="240" y1="48" x2="240" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="540" y1="48" x2="540" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ═══ LEFT PANEL: Identity Facts ═══ -->
  <text x="120" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Identity</text>

  <!-- Fact rows -->
  <rect x="18" y="84" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="101" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Agency:</text>
  <text x="28" y="101" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">
    <tspan dx="50">DOE / NNSA</tspan>
  </text>

  <rect x="18" y="116" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="133" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Managed by:</text>
  <text x="104" y="133" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">UC / Bechtel (LLNS)</text>

  <rect x="18" y="148" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="165" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Founded:</text>
  <text x="92" y="165" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">1952 (Lawrence &amp; Teller)</text>

  <rect x="18" y="180" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="197" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Location:</text>
  <text x="90" y="197" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Livermore, CA</text>

  <rect x="18" y="212" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="229" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Staff:</text>
  <text x="66" y="229" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">~7,500 employees</text>

  <rect x="18" y="244" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="261" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Budget:</text>
  <text x="80" y="261" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">~$2.4B / year</text>

  <!-- Mission box -->
  <rect x="18" y="282" width="204" height="100" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="120" y="299" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Core Mission</text>
  <text x="28" y="316" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; Nuclear stockpile stewardship</text>
  <text x="28" y="331" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; National security research</text>
  <text x="28" y="346" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; Energy &amp; biosecurity</text>
  <text x="28" y="361" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; Intelligence community support</text>

  <!-- ═══ CENTER PANEL: AI + HPC Convergence ═══ -->
  <text x="390" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">AI + HPC Convergence</text>

  <!-- El Capitan supercomputer box (top center) -->
  <rect x="300" y="86" width="180" height="50" rx="6" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="2"/>
  <text x="390" y="106" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">El Capitan (2024)</text>
  <text x="390" y="122" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">World-class HPC supercomputer</text>

  <!-- Arrow down from El Capitan -->
  <line x1="390" y1="136" x2="390" y2="156" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LBANN box -->
  <rect x="300" y="158" width="180" height="40" rx="6" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="390" y="174" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">LBANN Framework</text>
  <text x="390" y="189" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">HPC-optimized deep learning</text>

  <!-- Two branches from LBANN -->
  <line x1="340" y1="198" x2="310" y2="222" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="440" y1="198" x2="468" y2="222" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Physics-informed ML -->
  <rect x="258" y="222" width="104" height="42" rx="5" fill="#5C3D1E" fill-opacity="0.10" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="310" y="239" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Physics-Informed</text>
  <text x="310" y="253" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">ML</text>

  <!-- Simulation Surrogates -->
  <rect x="418" y="222" width="104" height="42" rx="5" fill="#5C3D1E" fill-opacity="0.10" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="470" y="239" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Simulation</text>
  <text x="470" y="253" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Surrogates</text>

  <!-- CASC label -->
  <rect x="300" y="278" width="180" height="36" rx="5" fill="#C4A87A" fill-opacity="0.20" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="390" y="293" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">CASC</text>
  <text x="390" y="307" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Center for Applied Scientific Computing</text>

  <!-- UQ note -->
  <rect x="300" y="324" width="180" height="30" rx="5" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="390" y="337" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Uncertainty Quantification (UQ)</text>
  <text x="390" y="349" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Critical for nuclear-grade ML confidence</text>

  <!-- Supercomputer history strip -->
  <rect x="258" y="362" width="264" height="28" rx="4" fill="#2D5A8E" fill-opacity="0.10" stroke="#2D5A8E" stroke-width="1"/>
  <text x="390" y="375" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle" font-style="italic">BlueGene/L #1 (2004) · Sequoia #1 (2012) · Sierra #3 (2018) · El Capitan (2024)</text>
  <text x="390" y="386" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">History of world-leading supercomputers</text>

  <!-- ═══ RIGHT PANEL: National Security Applications ═══ -->
  <text x="670" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">National Security Applications</text>

  <!-- App boxes -->
  <rect x="552" y="86" width="232" height="66" rx="5" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.5"/>
  <text x="668" y="103" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Nuclear Stockpile Stewardship</text>
  <text x="562" y="119" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">ML surrogates replace expensive physics</text>
  <text x="562" y="133" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">simulations; ensure safety w/o live testing</text>

  <rect x="552" y="162" width="232" height="58" rx="5" fill="#2D5A8E" fill-opacity="0.10" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="668" y="179" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Biosurveillance</text>
  <text x="562" y="195" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Genomics ML, pathogen detection,</text>
  <text x="562" y="209" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">biodefense early warning systems</text>

  <rect x="552" y="230" width="232" height="58" rx="5" fill="#5C3D1E" fill-opacity="0.10" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="668" y="247" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Seismic Detection</text>
  <text x="562" y="263" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">ML distinguishes nuclear tests from</text>
  <text x="562" y="277" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">natural earthquakes globally</text>

  <rect x="552" y="298" width="232" height="58" rx="5" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="668" y="315" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Energy Security</text>
  <text x="562" y="331" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Grid resilience ML, fusion energy</text>
  <text x="562" y="345" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">modeling (NIF inertial confinement)</text>

  <!-- Cognitive simulation note -->
  <rect x="552" y="366" width="232" height="24" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="668" y="382" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Cognitive simulation: ML as thinking lab partner</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>
