<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Rademacher Complexity: Fitting Random Labels</text>

  <!-- Left panel: Simple hypothesis class -->
  <rect x="40" y="60" width="230" height="260" fill="none" stroke="#D4C5A9" stroke-width="1" rx="6"/>
  <text x="155" y="82" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Low Complexity H</text>

  <!-- Random labels: +1 / -1 scattered -->
  <circle cx="80" cy="130" r="12" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="80" y="135" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">+1</text>

  <circle cx="140" cy="170" r="12" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="140" y="175" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">-1</text>

  <circle cx="200" cy="120" r="12" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="200" y="125" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">-1</text>

  <circle cx="110" cy="220" r="12" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="110" y="225" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">+1</text>

  <circle cx="190" cy="240" r="12" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="190" y="245" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">+1</text>

  <circle cx="230" cy="180" r="12" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="230" y="185" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">-1</text>

  <!-- Simple linear boundary that fails -->
  <line x1="55" y1="280" x2="255" y2="100" stroke="#C4A87A" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Correlation score -->
  <text x="155" y="305" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Correlation: 0.2</text>
  <text x="155" y="318" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5C3D1E" text-anchor="middle">Can't fit random noise</text>

  <!-- Right panel: Rich hypothesis class -->
  <rect x="310" y="60" width="230" height="260" fill="none" stroke="#D4C5A9" stroke-width="1" rx="6"/>
  <text x="425" y="82" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">High Complexity H</text>

  <!-- Same random labels -->
  <circle cx="350" cy="130" r="12" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="350" y="135" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">+1</text>

  <circle cx="410" cy="170" r="12" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="410" y="175" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">-1</text>

  <circle cx="470" cy="120" r="12" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="470" y="125" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">-1</text>

  <circle cx="380" cy="220" r="12" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="380" y="225" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">+1</text>

  <circle cx="460" cy="240" r="12" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="460" y="245" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">+1</text>

  <circle cx="500" cy="180" r="12" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="500" y="185" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">-1</text>

  <!-- Complex boundary that perfectly fits -->
  <path d="M 325,280 C 340,200 355,150 365,140 C 375,130 385,160 400,180 C 415,200 425,140 440,110 C 455,130 465,260 480,250 C 495,240 505,160 520,280"
        fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Correlation score -->
  <text x="425" y="305" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Correlation: 0.95</text>
  <text x="425" y="318" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#7C2530" text-anchor="middle">Fits random noise perfectly</text>

  <!-- Right side: Formula box -->
  <rect x="570" y="60" width="210" height="120" fill="#2D5A8E" fill-opacity="0.06" stroke="#2D5A8E" stroke-width="1" rx="6"/>
  <text x="675" y="85" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Empirical Rademacher</text>
  <text x="675" y="103" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Complexity</text>

  <text x="675" y="132" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle">R(H) = E [ sup  1/n</text>
  <text x="675" y="152" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle">   sum  sigma_i * h(x_i) ]</text>
  <text x="675" y="170" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">sigma_i ~ Uniform{-1, +1}</text>

  <!-- Key insight box -->
  <rect x="570" y="200" width="210" height="120" fill="#7C2530" fill-opacity="0.06" stroke="#7C2530" stroke-width="1" rx="6"/>
  <text x="675" y="225" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Key Insight</text>
  <text x="675" y="248" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Higher R(H) means H can</text>
  <text x="675" y="264" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">correlate with pure noise.</text>
  <text x="675" y="284" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">This directly bounds the</text>
  <text x="675" y="300" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">gap between train and</text>
  <text x="675" y="316" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">test error.</text>

  <!-- Bottom labels -->
  <text x="155" y="350" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Linear classifiers</text>
  <text x="425" y="350" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Deep neural networks</text>

  <!-- Arrow between panels -->
  <line x1="275" y1="190" x2="305" y2="190" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="305,185 315,190 305,195" fill="#C4A87A"/>

  <!-- Bottom annotation -->
  <text x="400" y="385" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#C4A87A" text-anchor="middle">Random +1/-1 labels assigned to same data points — only hypothesis class changes</text>
</svg>