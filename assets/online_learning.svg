<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Online Learning: Sequential Prediction with Regret</text>

  <!-- Timeline axis -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="746,200 732,195 732,205" fill="#5C3D1E"/>
  <text x="760" y="204" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">t</text>

  <!-- Round markers -->
  <circle cx="140" cy="200" r="6" fill="#2D5A8E"/>
  <text x="140" y="225" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">t=1</text>
  <circle cx="300" cy="200" r="6" fill="#2D5A8E"/>
  <text x="300" y="225" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">t=2</text>
  <circle cx="460" cy="200" r="6" fill="#2D5A8E"/>
  <text x="460" y="225" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">t=3</text>
  <circle cx="620" cy="200" r="6" fill="#2D5A8E"/>
  <text x="620" y="225" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">...</text>

  <!-- Per-round loop: Predict -> Observe -> Update -->
  <!-- Round 1 detail -->
  <rect x="90" y="80" width="100" height="34" rx="6" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="140" y="101" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Predict w&#x2080;</text>

  <path d="M 190,97 L 220,97" fill="none" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>

  <rect x="220" y="80" width="100" height="34" rx="6" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.2"/>
  <text x="270" y="101" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Observe loss</text>

  <path d="M 320,97 L 350,97" fill="none" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>

  <rect x="350" y="80" width="100" height="34" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="101" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Update w&#x2081;</text>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrowBrown" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Regret curve (cumulative regret growing sublinearly) -->
  <text x="600" y="75" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Cumulative Regret</text>

  <!-- Axes for regret mini-plot -->
  <line x1="500" y1="85" x2="500" y2="170" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="500" y1="170" x2="720" y2="170" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="610" y="185" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Rounds T</text>
  <text x="493" y="130" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="end" transform="rotate(-90,493,130)">Regret</text>

  <!-- Linear regret line (bad) -->
  <line x1="500" y1="170" x2="710" y2="90" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="715" y="88" font-family="Georgia, serif" font-size="9" fill="#C4A87A">O(T)</text>

  <!-- Sublinear sqrt(T) curve (good) -->
  <path d="M 500,170 C 540,155 580,135 620,125 C 660,118 690,114 710,112" fill="none" stroke="#7C2530" stroke-width="2"/>
  <text x="718" y="110" font-family="Georgia, serif" font-size="9" fill="#7C2530">O(&#x221A;T)</text>

  <!-- Three algorithm boxes at bottom -->
  <rect x="60" y="260" width="200" height="70" rx="8" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="160" y="282" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Multiplicative</text>
  <text x="160" y="298" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Weights</text>
  <text x="160" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Expert advice setting</text>

  <rect x="300" y="260" width="200" height="70" rx="8" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="282" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Follow the</text>
  <text x="400" y="298" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Regularized Leader</text>
  <text x="400" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Convex optimization setting</text>

  <rect x="540" y="260" width="200" height="70" rx="8" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="640" y="282" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Bandit</text>
  <text x="640" y="298" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Algorithms</text>
  <text x="640" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Partial feedback setting</text>

  <!-- Connecting lines from timeline to boxes -->
  <line x1="160" y1="210" x2="160" y2="260" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="210" x2="400" y2="260" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="640" y1="210" x2="640" y2="260" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Label on timeline -->
  <text x="400" y="245" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5C3D1E" text-anchor="middle">Each round: predict, suffer loss, update</text>

  <!-- Sublinear regret annotation -->
  <text x="400" y="370" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Goal: Regret / T &#x2192; 0 as T &#x2192; &#x221E;  (no-regret learning)</text>
</svg>
