<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" font-weight="bold">Dynamic Array: Cost Per Insertion</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="740" y2="320" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="80" y1="320" x2="80" y2="60" stroke="#5C3D1E" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" transform="rotate(-90,30,190)">Cost</text>

  <!-- X-axis label -->
  <text x="410" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E">Operation Number</text>

  <!-- Y-axis ticks -->
  <text x="70" y="324" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">0</text>
  <text x="70" y="289" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">1</text>
  <text x="70" y="254" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">2</text>
  <text x="70" y="219" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">4</text>
  <text x="70" y="149" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">8</text>
  <text x="70" y="79" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">16</text>

  <!-- Y-axis grid lines (light) -->
  <line x1="80" y1="285" x2="740" y2="285" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="250" x2="740" y2="250" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="215" x2="740" y2="215" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="145" x2="740" y2="145" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="75" x2="740" y2="75" stroke="#D4C5A9" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Bars: operations 1-16, costs: 1,2,1,4,1,1,1,8,1,1,1,1,1,1,1,16 -->
  <!-- Bar width=30, gap=10, starting at x=100 -->

  <!-- Op 1: cost 1 -->
  <rect x="100" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="115" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>

  <!-- Op 2: cost 2 (insert + copy 1) -->
  <rect x="140" y="250" width="30" height="70" fill="#7C2530" rx="2"/>
  <text x="155" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">2</text>

  <!-- Op 3: cost 1 -->
  <rect x="180" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="195" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">3</text>

  <!-- Op 4: cost 4 (insert + copy 3) — approximate -->
  <rect x="220" y="215" width="30" height="105" fill="#7C2530" rx="2"/>
  <text x="235" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">4</text>

  <!-- Op 5: cost 1 -->
  <rect x="260" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="275" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">5</text>

  <!-- Op 6: cost 1 -->
  <rect x="300" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="315" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">6</text>

  <!-- Op 7: cost 1 -->
  <rect x="340" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="355" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">7</text>

  <!-- Op 8: cost 8 (insert + copy 7) — approximate -->
  <rect x="380" y="145" width="30" height="175" fill="#7C2530" rx="2"/>
  <text x="395" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">8</text>

  <!-- Op 9: cost 1 -->
  <rect x="420" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="435" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">9</text>

  <!-- Op 10: cost 1 -->
  <rect x="460" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="475" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">10</text>

  <!-- Op 11: cost 1 -->
  <rect x="500" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="515" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">11</text>

  <!-- Op 12: cost 1 -->
  <rect x="540" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="555" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">12</text>

  <!-- Op 13: cost 1 -->
  <rect x="580" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="595" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">13</text>

  <!-- Op 14: cost 1 -->
  <rect x="620" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="635" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">14</text>

  <!-- Op 15: cost 1 -->
  <rect x="660" y="285" width="30" height="35" fill="#2D5A8E" rx="2"/>
  <text x="675" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">15</text>

  <!-- Op 16: cost 16 (insert + copy 15) — approximate -->
  <rect x="700" y="75" width="30" height="245" fill="#7C2530" rx="2"/>
  <text x="715" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">16</text>

  <!-- Amortized average line at cost ~3 (O(1) amortized) -->
  <line x1="80" y1="275" x2="740" y2="275" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="742" y="271" text-anchor="start" font-family="Georgia, serif" font-size="11" fill="#C4A87A" font-style="italic"></text>

  <!-- Legend -->
  <rect x="440" y="55" width="290" height="62" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <rect x="452" y="68" width="14" height="14" fill="#2D5A8E" rx="2"/>
  <text x="472" y="80" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">O(1) insertion (no resize)</text>
  <rect x="452" y="90" width="14" height="14" fill="#7C2530" rx="2"/>
  <text x="472" y="102" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">O(n) insertion (resize + copy)</text>
  <line x1="452" y1="112" x2="466" y2="112" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="472" y="116" font-family="Georgia, serif" font-size="12" fill="#C4A87A">Amortized cost: O(1)</text>
</svg>