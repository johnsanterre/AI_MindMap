<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Concentration Inequalities: Hierarchy of Tail Bounds</text>

  <!-- Central distribution curve -->
  <path d="M 140,300 C 180,298 220,290 260,270 C 300,240 340,180 370,120 C 385,85 395,65 400,58 C 405,65 415,85 430,120 C 460,180 500,240 540,270 C 580,290 620,298 660,300" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="2"/>

  <!-- Baseline -->
  <line x1="120" y1="300" x2="680" y2="300" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Mean line -->
  <line x1="400" y1="50" x2="400" y2="310" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="400" y="325" font-family="Georgia, serif" font-size="12" fill="#C4A87A" text-anchor="middle">E[X]</text>

  <!-- Deviation region: Markov (widest) -->
  <rect x="155" y="270" width="490" height="24" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1" rx="3"/>
  <text x="152" y="286" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="end">Markov</text>

  <!-- Deviation region: Chebyshev -->
  <rect x="215" y="240" width="370" height="24" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1" rx="3"/>
  <text x="212" y="256" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="end">Chebyshev</text>

  <!-- Deviation region: Chernoff / Hoeffding -->
  <rect x="280" y="210" width="240" height="24" fill="#7C2530" fill-opacity="0.18" stroke="#7C2530" stroke-width="1" rx="3"/>
  <text x="277" y="226" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="end">Chernoff / Hoeffding</text>

  <!-- Deviation region: Sub-Gaussian -->
  <rect x="325" y="180" width="150" height="24" fill="#7C2530" fill-opacity="0.25" stroke="#7C2530" stroke-width="1" rx="3"/>
  <text x="322" y="196" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="end">Sub-Gaussian</text>

  <!-- Arrow showing "tighter bound" -->
  <line x1="710" y1="290" x2="710" y2="185" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="710,180 705,192 715,192" fill="#5C3D1E"/>
  <text x="710" y="305" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Tighter</text>
  <text x="710" y="318" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">bounds</text>

  <!-- Arrow showing "stronger assumptions" -->
  <line x1="740" y1="290" x2="740" y2="185" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="740,180 735,192 745,192" fill="#2D5A8E"/>
  <text x="740" y="305" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Stronger</text>
  <text x="740" y="318" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">assumptions</text>

  <!-- Tail probability annotations -->
  <path d="M 580,270 Q 620,250 640,240" fill="none" stroke="#7C2530" stroke-width="1"/>
  <text x="645" y="238" font-family="Georgia, serif" font-size="11" fill="#7C2530">P(X &gt; t)</text>

  <!-- Key formulas in boxes -->
  <rect x="30" y="340" width="170" height="42" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="115" y="357" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Markov: P(X &gt; t) &lt; E[X]/t</text>
  <text x="115" y="373" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Only needs X &gt; 0</text>

  <rect x="215" y="340" width="185" height="42" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="307" y="357" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Chebyshev: P(|X-u| &gt; t) &lt; Var/t^2</text>
  <text x="307" y="373" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Needs finite variance</text>

  <rect x="415" y="340" width="175" height="42" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="502" y="357" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Hoeffding: exp(-2nt^2/R^2)</text>
  <text x="502" y="373" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Bounded random variables</text>

  <rect x="605" y="340" width="175" height="42" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="692" y="357" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">McDiarmid: bounded diffs</text>
  <text x="692" y="373" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Functions of indep. vars</text>
</svg>
