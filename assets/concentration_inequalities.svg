<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">

  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="19" font-weight="bold"
        fill="#5C3D1E" text-anchor="middle">Concentration Inequalities: Tighter Bounds, Stronger Assumptions</text>

  <!-- Central distribution curve (bell shape) -->
  <path d="M 100,290 C 140,288 180,280 220,260 C 260,230 300,175 340,120
           C 360,90 380,68 400,58
           C 420,68 440,90 460,120
           C 500,175 540,230 580,260
           C 620,280 660,288 700,290"
        fill="#2D5A8E" fill-opacity="0.07" stroke="#2D5A8E" stroke-width="2"/>

  <!-- Baseline / x-axis -->
  <line x1="80" y1="290" x2="720" y2="290" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Mean vertical dashed line -->
  <line x1="400" y1="50" x2="400" y2="300" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="400" y="312" font-family="Georgia, serif" font-size="13" fill="#C4A87A" text-anchor="middle">E[X]</text>

  <!-- ===== Bound regions: widest (loosest) to narrowest (tightest) ===== -->

  <!-- Markov bound region (widest) -->
  <rect x="130" y="260" width="540" height="22" fill="#C4A87A" fill-opacity="0.2"
        stroke="#C4A87A" stroke-width="1.2" rx="3"/>
  <text x="127" y="276" font-family="Georgia, serif" font-size="12" fill="#5C3D1E"
        text-anchor="end" font-weight="bold">Markov</text>

  <!-- Chebyshev bound region -->
  <rect x="200" y="233" width="400" height="22" fill="#5C3D1E" fill-opacity="0.12"
        stroke="#5C3D1E" stroke-width="1.2" rx="3"/>
  <text x="197" y="249" font-family="Georgia, serif" font-size="12" fill="#5C3D1E"
        text-anchor="end" font-weight="bold">Chebyshev</text>

  <!-- Hoeffding bound region -->
  <rect x="275" y="206" width="250" height="22" fill="#2D5A8E" fill-opacity="0.15"
        stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="272" y="222" font-family="Georgia, serif" font-size="12" fill="#2D5A8E"
        text-anchor="end" font-weight="bold">Hoeffding</text>

  <!-- Sub-Gaussian bound region (tightest) -->
  <rect x="335" y="179" width="130" height="22" fill="#7C2530" fill-opacity="0.18"
        stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="332" y="195" font-family="Georgia, serif" font-size="12" fill="#7C2530"
        text-anchor="end" font-weight="bold">Sub-Gaussian</text>

  <!-- Arrows: tighter bounds / stronger assumptions -->
  <defs>
    <marker id="arrDown" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M 1,0 L 4,8 L 7,0" fill="none" stroke="#5C3D1E" stroke-width="1.2"/>
    </marker>
    <marker id="arrUp" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M 1,8 L 4,0 L 7,8" fill="none" stroke="#2D5A8E" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Left arrow: tighter bounds going up -->
  <line x1="730" y1="275" x2="730" y2="185" stroke="#5C3D1E" stroke-width="1.5"
        marker-end="url(#arrUp)"/>
  <text x="730" y="293" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">Tighter</text>
  <text x="730" y="305" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">bounds</text>

  <!-- Right arrow: stronger assumptions going up -->
  <line x1="760" y1="275" x2="760" y2="185" stroke="#2D5A8E" stroke-width="1.5"
        marker-end="url(#arrUp)"/>
  <text x="760" y="293" font-family="Georgia, serif" font-size="11" fill="#2D5A8E"
        text-anchor="middle" font-style="italic">Stronger</text>
  <text x="760" y="305" font-family="Georgia, serif" font-size="11" fill="#2D5A8E"
        text-anchor="middle" font-style="italic">assumptions</text>

  <!-- Tail probability shading on right tail -->
  <path d="M 580,260 C 620,280 660,288 700,290 L 700,290 L 580,290 Z"
        fill="#7C2530" fill-opacity="0.15"/>
  <path d="M 600,268 Q 640,250 665,240" fill="none" stroke="#7C2530" stroke-width="1"/>
  <text x="670" y="237" font-family="Georgia, serif" font-size="12" fill="#7C2530"
        font-style="italic">P(X &gt; t)</text>

  <!-- Formula boxes at bottom -->
  <rect x="25" y="330" width="175" height="52" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1" rx="4"/>
  <text x="112" y="350" font-family="Georgia, serif" font-size="11" fill="#C4A87A"
        text-anchor="middle" font-weight="bold">Markov</text>
  <text x="112" y="365" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle">P(X&#8805;t) &#8804; E[X]/t</text>
  <text x="112" y="378" font-family="Georgia, serif" font-size="10" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">X &#8805; 0 only</text>

  <rect x="212" y="330" width="185" height="52" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1" rx="4"/>
  <text x="304" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle" font-weight="bold">Chebyshev</text>
  <text x="304" y="365" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle">P(|X-&#956;|&#8805;t) &#8804; &#963;&#178;/t&#178;</text>
  <text x="304" y="378" font-family="Georgia, serif" font-size="10" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">Finite variance</text>

  <rect x="409" y="330" width="185" height="52" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1" rx="4"/>
  <text x="501" y="350" font-family="Georgia, serif" font-size="11" fill="#2D5A8E"
        text-anchor="middle" font-weight="bold">Hoeffding</text>
  <text x="501" y="365" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle">P(|S&#8345;-&#956;|&#8805;t) &#8804; 2e&#8315;&#178;&#8319;&#116;&#178;/&#82;&#178;</text>
  <text x="501" y="378" font-family="Georgia, serif" font-size="10" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">Bounded variables</text>

  <rect x="606" y="330" width="175" height="52" fill="#FDFAF4" stroke="#7C2530" stroke-width="1" rx="4"/>
  <text x="693" y="350" font-family="Georgia, serif" font-size="11" fill="#7C2530"
        text-anchor="middle" font-weight="bold">Sub-Gaussian</text>
  <text x="693" y="365" font-family="Georgia, serif" font-size="11" fill="#5C3D1E"
        text-anchor="middle">P(X-&#956;&#8805;t) &#8804; e&#8315;&#116;&#178;/&#178;&#963;&#178;</text>
  <text x="693" y="378" font-family="Georgia, serif" font-size="10" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">MGF control</text>

</svg>