<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Satisfiability (SAT)</text>

  <!-- CNF Formula Section -->
  <text x="30" y="72" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">CNF Formula:</text>
  <!-- Clause boxes -->
  <rect x="30" y="82" width="180" height="36" rx="6" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="120" y="105" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle">(x&#x2081; &#x2228; &#x00AC;x&#x2082; &#x2228; x&#x2083;)</text>

  <text x="220" y="105" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle">&#x2227;</text>

  <rect x="230" y="82" width="180" height="36" rx="6" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="320" y="105" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle">(&#x00AC;x&#x2081; &#x2228; x&#x2082; &#x2228; x&#x2084;)</text>

  <text x="420" y="105" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle">&#x2227;</text>

  <rect x="430" y="82" width="180" height="36" rx="6" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="520" y="105" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle">(x&#x2082; &#x2228; &#x00AC;x&#x2083; &#x2228; &#x00AC;x&#x2084;)</text>

  <!-- Labels -->
  <text x="680" y="92" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle" font-style="italic">clauses</text>
  <text x="680" y="108" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle" font-style="italic">joined by AND</text>

  <!-- Divider -->
  <line x1="30" y1="130" x2="770" y2="130" stroke="#D4C5A9" stroke-width="1"/>

  <!-- DPLL Search Tree -->
  <text x="280" y="155" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">DPLL Search Tree</text>

  <!-- Root node -->
  <circle cx="280" cy="185" r="18" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="280" y="190" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">?</text>

  <!-- Level 1 branches -->
  <line x1="265" y1="200" x2="170" y2="240" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="295" y1="200" x2="390" y2="240" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="210" y="218" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x&#x2081;=T</text>
  <text x="340" y="218" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x&#x2081;=F</text>

  <!-- Level 1 nodes -->
  <circle cx="170" cy="255" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="170" y="259" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">x&#x2081;</text>
  <circle cx="390" cy="255" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="390" y="259" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">x&#x2081;</text>

  <!-- Level 2 branches from left -->
  <line x1="157" y1="268" x2="110" y2="305" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="183" y1="268" x2="230" y2="305" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="122" y="286" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x&#x2082;=T</text>
  <text x="212" y="286" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x&#x2082;=F</text>

  <!-- Level 2 branches from right -->
  <line x1="377" y1="268" x2="340" y2="305" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="403" y1="268" x2="440" y2="305" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="348" y="286" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x&#x2082;=T</text>
  <text x="428" y="286" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x&#x2082;=F</text>

  <!-- Leaf nodes -->
  <!-- SAT leaf (green-ish via navy fill) -->
  <rect x="85" y="310" width="50" height="26" rx="5" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="110" y="328" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">SAT</text>

  <!-- UNSAT leaf -->
  <rect x="205" y="310" width="55" height="26" rx="5" fill="#7C2530" stroke="#7C2530" stroke-width="1.5"/>
  <text x="232" y="328" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">UNSAT</text>

  <!-- Pruned X -->
  <line x1="330" y1="312" x2="350" y2="336" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="350" y1="312" x2="330" y2="336" stroke="#7C2530" stroke-width="2.5"/>
  <text x="340" y="355" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">pruned</text>

  <!-- SAT leaf right -->
  <rect x="415" y="310" width="50" height="26" rx="5" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="440" y="328" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">SAT</text>

  <!-- Right side: key concepts panel -->
  <rect x="530" y="140" width="240" height="245" rx="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="650" y="165" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">Key Concepts</text>

  <line x1="545" y1="174" x2="755" y2="174" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Unit propagation -->
  <circle cx="555" cy="196" r="6" fill="#2D5A8E"/>
  <text x="570" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Unit Propagation</text>

  <!-- Pure literal -->
  <circle cx="555" cy="224" r="6" fill="#2D5A8E"/>
  <text x="570" y="228" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Pure Literal Elimination</text>

  <!-- Conflict-driven -->
  <circle cx="555" cy="252" r="6" fill="#7C2530"/>
  <text x="570" y="256" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Conflict Analysis (CDCL)</text>

  <!-- Backjumping -->
  <circle cx="555" cy="280" r="6" fill="#7C2530"/>
  <text x="570" y="284" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Non-chronological Backjump</text>

  <!-- Phase transition -->
  <circle cx="555" cy="308" r="6" fill="#C4A87A"/>
  <text x="570" y="312" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Phase Transition ~4.27</text>

  <!-- Cook-Levin -->
  <circle cx="555" cy="336" r="6" fill="#C4A87A"/>
  <text x="570" y="340" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Cook-Levin: NP-complete</text>

  <!-- 2-SAT -->
  <circle cx="555" cy="364" r="6" fill="#5C3D1E"/>
  <text x="570" y="368" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">2-SAT &#x2208; P (polynomial)</text>

  <!-- Bottom annotation -->
  <text x="280" y="388" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">DPLL: branch, propagate, backtrack</text>
</svg>