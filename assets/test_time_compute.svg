<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Test-Time Compute Scaling</text>
  <text x="400" y="48" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">More compute at inference = better answers</text>

  <!-- ── LEFT PANEL: Best-of-N ── -->
  <rect x="20" y="60" width="340" height="260" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1.5" rx="4"/>
  <text x="190" y="82" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Best-of-N Sampling</text>

  <!-- Generator box -->
  <rect x="130" y="92" width="120" height="30" fill="#7C2530" rx="3"/>
  <text x="190" y="112" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">Generator Model</text>

  <!-- N arrows down to candidates -->
  <line x1="110" y1="122" x2="60"  y2="158" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="122" x2="130" y2="158" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="122" x2="190" y2="158" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="122" x2="250" y2="158" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="270" y1="122" x2="320" y2="158" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Candidate solution boxes -->
  <rect x="32"  y="158" width="52" height="24" fill="#2D5A8E" rx="2"/>
  <text x="58"  y="174" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">Sol. 1</text>

  <rect x="102" y="158" width="52" height="24" fill="#2D5A8E" rx="2"/>
  <text x="128" y="174" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">Sol. 2</text>

  <rect x="165" y="158" width="52" height="24" fill="#2D5A8E" rx="2"/>
  <text x="191" y="174" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">Sol. 3</text>

  <rect x="228" y="158" width="52" height="24" fill="#2D5A8E" rx="2"/>
  <text x="254" y="174" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">Sol. 4</text>

  <rect x="294" y="158" width="52" height="24" fill="#2D5A8E" rx="2"/>
  <text x="320" y="174" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">Sol. N</text>

  <text x="268" y="172" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">…</text>

  <!-- Reward model -->
  <rect x="100" y="206" width="180" height="28" fill="#C4A87A" rx="3"/>
  <text x="190" y="225" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Reward / Verifier Model</text>

  <!-- arrows into reward model -->
  <line x1="58"  y1="182" x2="145" y2="206" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="128" y1="182" x2="168" y2="206" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="191" y1="182" x2="191" y2="206" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="254" y1="182" x2="215" y2="206" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="320" y1="182" x2="240" y2="206" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arr2)"/>

  <!-- Best answer box -->
  <rect x="130" y="254" width="120" height="28" fill="#7C2530" rx="3"/>
  <text x="190" y="273" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">Best Answer ✓</text>
  <line x1="190" y1="234" x2="190" y2="254" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr2)"/>

  <text x="190" y="305" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Scales as O(log N) — parallel</text>
  <text x="190" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">P(correct) = 1 − (1−p)^N</text>

  <!-- ── RIGHT PANEL: Sequential / Chain of Thought ── -->
  <rect x="440" y="60" width="340" height="260" fill="#F5F0E8" stroke="#C4A87A" stroke-width="1.5" rx="4"/>
  <text x="610" y="82" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Sequential Chain of Thought</text>

  <!-- Thinking chain — expanding bars -->
  <text x="460" y="102" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Thinking tokens (budget grows with difficulty):</text>

  <!-- Step 1 -->
  <rect x="460" y="110" width="60"  height="18" fill="#2D5A8E" rx="2" opacity="0.5"/>
  <text x="527" y="123" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Step 1</text>

  <!-- Step 2 -->
  <rect x="460" y="134" width="110" height="18" fill="#2D5A8E" rx="2" opacity="0.65"/>
  <text x="577" y="147" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Step 2</text>

  <!-- Step 3 -->
  <rect x="460" y="158" width="165" height="18" fill="#2D5A8E" rx="2" opacity="0.78"/>
  <text x="632" y="171" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Step 3</text>

  <!-- Step 4 -->
  <rect x="460" y="182" width="230" height="18" fill="#2D5A8E" rx="2" opacity="0.9"/>
  <text x="697" y="195" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Step 4 …</text>

  <!-- Arrow to final answer -->
  <line x1="610" y1="200" x2="610" y2="225" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr3)"/>
  <rect x="540" y="225" width="140" height="28" fill="#2D5A8E" rx="3"/>
  <text x="610" y="244" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">Final Answer ✓</text>

  <text x="610" y="272" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Scales as O(T^α) — sequential</text>
  <text x="610" y="285" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Used in OpenAI o1 / o3</text>

  <!-- ── BOTTOM GRAPH ── -->
  <!-- Graph box -->
  <rect x="100" y="332" width="600" height="58" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1" rx="3"/>
  <text x="400" y="346" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Inference Compute vs. Accuracy (log-linear improvement)</text>

  <!-- Axes -->
  <line x1="130" y1="380" x2="680" y2="380" stroke="#5C3D1E" stroke-width="1.2"/>
  <line x1="130" y1="355" x2="130" y2="380" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="405" y="391" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Compute (log scale)</text>
  <text x="118" y="370" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,118,370)">Acc.</text>

  <!-- Log-linear curve (Best-of-N) -->
  <polyline points="130,378 180,373 240,368 310,363 400,358 500,355 620,353 680,352"
            fill="none" stroke="#7C2530" stroke-width="2"/>
  <text x="685" y="354" font-family="Georgia, serif" font-size="8" fill="#7C2530">BoN</text>

  <!-- Log-linear curve (CoT) -->
  <polyline points="130,379 180,375 240,371 310,366 400,361 500,357 620,354 680,352"
            fill="none" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="685" y="360" font-family="Georgia, serif" font-size="8" fill="#2D5A8E">CoT</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arr3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>
