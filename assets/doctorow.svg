<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="265" y1="20" x2="265" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="535" y1="20" x2="535" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL: Timeline ===== -->
  <text x="132" y="42" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Biography &amp; Career</text>
  <line x1="132" y1="48" x2="132" y2="370" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <circle cx="132" cy="72" r="5" fill="#2D5A8E"/>
  <text x="145" y="69" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Born Toronto · 1971</text>
  <text x="145" y="82" font-family="Georgia, serif" font-size="9" fill="#888">Canadian-British author</text>
  <text x="145" y="93" font-family="Georgia, serif" font-size="9" fill="#888">and activist</text>

  <circle cx="132" cy="118" r="5" fill="#2D5A8E"/>
  <text x="145" y="115" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">EFF — Electronic Frontier</text>
  <text x="145" y="128" font-family="Georgia, serif" font-size="9" fill="#888">Foundation · 2000s onward</text>
  <text x="145" y="139" font-family="Georgia, serif" font-size="9" fill="#888">Special Advisor, then Fellow</text>

  <circle cx="132" cy="165" r="5" fill="#7C2530"/>
  <text x="145" y="162" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Little Brother · 2008</text>
  <text x="145" y="175" font-family="Georgia, serif" font-size="9" fill="#888">YA novel; surveillance state;</text>
  <text x="145" y="186" font-family="Georgia, serif" font-size="9" fill="#888">NYT bestseller</text>

  <circle cx="132" cy="210" r="5" fill="#7C2530"/>
  <text x="145" y="207" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Boing Boing co-editor</text>
  <text x="145" y="220" font-family="Georgia, serif" font-size="9" fill="#888">One of the web's largest blogs;</text>
  <text x="145" y="231" font-family="Georgia, serif" font-size="9" fill="#888">tech culture commentary</text>

  <circle cx="132" cy="256" r="5" fill="#7C2530"/>
  <text x="145" y="253" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Walkaway · 2017</text>
  <text x="145" y="266" font-family="Georgia, serif" font-size="9" fill="#888">Post-scarcity utopia novel;</text>
  <text x="145" y="277" font-family="Georgia, serif" font-size="9" fill="#888">co-operative futures</text>

  <circle cx="132" cy="305" r="5" fill="#7C2530"/>
  <text x="145" y="302" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Enshittification coined · 2022</text>
  <text x="145" y="315" font-family="Georgia, serif" font-size="9" fill="#888">"Pluralistic" newsletter;</text>
  <text x="145" y="326" font-family="Georgia, serif" font-size="9" fill="#888">The Internet Con · 2023</text>

  <!-- ===== CENTER PANEL: Enshittification Cycle ===== -->
  <text x="400" y="42" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">The Enshittification Cycle</text>

  <!-- Descending stair-step diagram -->
  <!-- Step 1 - top / good for users -->
  <rect x="295" y="70" width="210" height="46" rx="5" fill="#2D5A8E" opacity="0.85"/>
  <text x="400" y="89" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Phase 1: Good for Users</text>
  <text x="400" y="103" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">Platform attracts users with genuine value</text>

  <!-- Arrow down-right -->
  <polygon points="400,116 396,128 404,128" fill="#7C2530"/>
  <line x1="400" y1="116" x2="400" y2="128" stroke="#7C2530" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="295" y="130" width="210" height="46" rx="5" fill="#C4A87A" opacity="0.85"/>
  <text x="400" y="149" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Phase 2: Lock In Users</text>
  <text x="400" y="163" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Switches value toward business customers</text>

  <polygon points="400,176 396,188 404,188" fill="#7C2530"/>
  <line x1="400" y1="176" x2="400" y2="188" stroke="#7C2530" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="295" y="190" width="210" height="46" rx="5" fill="#5C3D1E" opacity="0.75"/>
  <text x="400" y="209" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Phase 3: Squeeze Business</text>
  <text x="400" y="223" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">Extracts from business customers too</text>

  <polygon points="400,236 396,248 404,248" fill="#7C2530"/>
  <line x1="400" y1="236" x2="400" y2="248" stroke="#7C2530" stroke-width="2"/>

  <!-- Step 4 - collapse / bad for all -->
  <rect x="295" y="250" width="210" height="46" rx="5" fill="#7C2530" opacity="0.85"/>
  <text x="400" y="269" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Phase 4: Enshittification</text>
  <text x="400" y="283" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">Platform degrades; users trapped; ads surge</text>

  <!-- Loopback arrow suggestion -->
  <text x="400" y="322" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">(Monopoly power prevents exit)</text>

  <!-- Key driver labels -->
  <text x="285" y="95" font-family="Georgia, serif" font-size="8" fill="#2D5A8E" text-anchor="end">capital</text>
  <text x="285" y="155" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="end">lock-in</text>
  <text x="285" y="215" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="end">capture</text>
  <text x="285" y="273" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="end">decay</text>

  <text x="400" y="368" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Cure: interoperability + antitrust enforcement</text>

  <!-- ===== RIGHT PANEL: Key Works & Ideas ===== -->
  <text x="667" y="42" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Key Works &amp; Concepts</text>

  <rect x="548" y="60" width="238" height="58" rx="5" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="667" y="79" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Little Brother (2008)</text>
  <text x="667" y="92" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Teen resists surveillance state</text>
  <text x="667" y="104" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">post-9/11; YA / civil liberties</text>

  <rect x="548" y="128" width="238" height="58" rx="5" fill="#5C3D1E" opacity="0.10" stroke="#5C3D1E" stroke-width="1"/>
  <text x="667" y="147" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Walkaway (2017)</text>
  <text x="667" y="160" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Post-scarcity future; people opt</text>
  <text x="667" y="172" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">out of capitalism to "walk away"</text>

  <rect x="548" y="196" width="238" height="58" rx="5" fill="#7C2530" opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="667" y="215" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">The Internet Con (2023)</text>
  <text x="667" y="228" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">How to seize the means of</text>
  <text x="667" y="240" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">computation; interoperability</text>

  <rect x="548" y="264" width="238" height="58" rx="5" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1"/>
  <text x="667" y="283" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Enshittification</text>
  <text x="667" y="296" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Coined 2022; ADS Word of the</text>
  <text x="667" y="308" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Year 2023; global currency</text>

  <text x="667" y="354" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Pluralistic newsletter · EFF Fellow</text>
  <text x="667" y="368" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Creative Commons · Anti-DRM advocate</text>
</svg>
