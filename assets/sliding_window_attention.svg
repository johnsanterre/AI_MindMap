<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2.5"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E">Sliding Window Attention</text>

  <!-- === Section 1: Attention Matrix with Diagonal Band === -->
  <text x="130" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E">Attention Matrix</text>

  <!-- Grid background -->
  <rect x="40" y="68" width="180" height="180" fill="#fff" stroke="#D4C5A9" stroke-width="1.5" rx="4"/>

  <!-- Row/column labels -->
  <text x="30" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" transform="rotate(-90 30 140)">Queries</text>
  <text x="130" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Keys</text>

  <!-- Grid lines -->
  <line x1="40" y1="98" x2="220" y2="98" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="40" y1="128" x2="220" y2="128" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="40" y1="158" x2="220" y2="158" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="40" y1="188" x2="220" y2="188" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="40" y1="218" x2="220" y2="218" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="70" y1="68" x2="70" y2="248" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="100" y1="68" x2="100" y2="248" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="130" y1="68" x2="130" y2="248" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="160" y1="68" x2="160" y2="248" stroke="#D4C5A9" stroke-width="0.5"/>
  <line x1="190" y1="68" x2="190" y2="248" stroke="#D4C5A9" stroke-width="0.5"/>

  <!-- Diagonal band (window W=3) — highlighted cells -->
  <!-- Row 0 -->
  <rect x="40" y="68" width="30" height="30" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 1 -->
  <rect x="40" y="98" width="30" height="30" fill="#2D5A8E" opacity="0.45"/>
  <rect x="70" y="98" width="30" height="30" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 2 -->
  <rect x="40" y="128" width="30" height="30" fill="#2D5A8E" opacity="0.25"/>
  <rect x="70" y="128" width="30" height="30" fill="#2D5A8E" opacity="0.45"/>
  <rect x="100" y="128" width="30" height="30" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 3 -->
  <rect x="70" y="158" width="30" height="30" fill="#2D5A8E" opacity="0.25"/>
  <rect x="100" y="158" width="30" height="30" fill="#2D5A8E" opacity="0.45"/>
  <rect x="130" y="158" width="30" height="30" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 4 -->
  <rect x="100" y="188" width="30" height="30" fill="#2D5A8E" opacity="0.25"/>
  <rect x="130" y="188" width="30" height="30" fill="#2D5A8E" opacity="0.45"/>
  <rect x="160" y="188" width="30" height="30" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 5 -->
  <rect x="130" y="218" width="30" height="30" fill="#2D5A8E" opacity="0.25"/>
  <rect x="160" y="218" width="30" height="30" fill="#2D5A8E" opacity="0.45"/>
  <rect x="190" y="218" width="30" height="30" fill="#2D5A8E" opacity="0.7"/>

  <!-- W bracket -->
  <line x1="72" y1="272" x2="132" y2="272" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="72" y1="268" x2="72" y2="276" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="132" y1="268" x2="132" y2="276" stroke="#7C2530" stroke-width="1.5"/>
  <text x="102" y="286" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530">W</text>

  <text x="130" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">O(L x W) not O(L&#xB2;)</text>

  <!-- === Section 2: Receptive Field Growth === -->
  <text x="430" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E">Receptive Field Growth</text>

  <!-- Layer labels -->
  <text x="290" y="100" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Layer 3</text>
  <text x="290" y="155" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Layer 2</text>
  <text x="290" y="210" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Layer 1</text>
  <text x="290" y="255" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Input</text>

  <!-- Input tokens -->
  <rect x="305" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="331" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="357" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="383" y="242" width="22" height="18" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.2"/>
  <rect x="409" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="435" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="461" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="487" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="513" y="242" width="22" height="18" rx="3" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="0.8"/>

  <!-- Layer 1: W=3 window around center token -->
  <rect x="357" y="197" width="22" height="18" rx="3" fill="#2D5A8E" opacity="0.3" stroke="#2D5A8E" stroke-width="0.8"/>
  <rect x="383" y="197" width="22" height="18" rx="3" fill="#2D5A8E" opacity="0.6" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="409" y="197" width="22" height="18" rx="3" fill="#2D5A8E" opacity="0.3" stroke="#2D5A8E" stroke-width="0.8"/>

  <!-- Layer 2: expanded field -->
  <rect x="331" y="142" width="22" height="18" rx="3" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="357" y="142" width="22" height="18" rx="3" fill="#7C2530" opacity="0.35" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="383" y="142" width="22" height="18" rx="3" fill="#7C2530" opacity="0.6" stroke="#7C2530" stroke-width="1"/>
  <rect x="409" y="142" width="22" height="18" rx="3" fill="#7C2530" opacity="0.35" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="435" y="142" width="22" height="18" rx="3" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="0.8"/>

  <!-- Layer 3: further expanded -->
  <rect x="305" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.15" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="331" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.25" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="357" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.4" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="383" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.6" stroke="#5C3D1E" stroke-width="1"/>
  <rect x="409" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.4" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="435" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.25" stroke="#5C3D1E" stroke-width="0.8"/>
  <rect x="461" y="87" width="22" height="18" rx="3" fill="#5C3D1E" opacity="0.15" stroke="#5C3D1E" stroke-width="0.8"/>

  <!-- Connecting lines (representative) -->
  <line x1="394" y1="242" x2="368" y2="215" stroke="#2D5A8E" stroke-width="0.7" opacity="0.5"/>
  <line x1="394" y1="242" x2="394" y2="215" stroke="#2D5A8E" stroke-width="0.7" opacity="0.5"/>
  <line x1="394" y1="242" x2="420" y2="215" stroke="#2D5A8E" stroke-width="0.7" opacity="0.5"/>

  <line x1="394" y1="197" x2="342" y2="160" stroke="#7C2530" stroke-width="0.7" opacity="0.4"/>
  <line x1="394" y1="197" x2="394" y2="160" stroke="#7C2530" stroke-width="0.7" opacity="0.4"/>
  <line x1="394" y1="197" x2="446" y2="160" stroke="#7C2530" stroke-width="0.7" opacity="0.4"/>

  <line x1="394" y1="142" x2="316" y2="105" stroke="#5C3D1E" stroke-width="0.7" opacity="0.3"/>
  <line x1="394" y1="142" x2="394" y2="105" stroke="#5C3D1E" stroke-width="0.7" opacity="0.3"/>
  <line x1="394" y1="142" x2="472" y2="105" stroke="#5C3D1E" stroke-width="0.7" opacity="0.3"/>

  <!-- Receptive field annotation -->
  <text x="430" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">Effective field = L &#xD7; W</text>
  <text x="430" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">32 layers &#xD7; 4096 = 131K tokens</text>

  <!-- === Section 3: Rolling KV Cache Buffer === -->
  <text x="670" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E">Rolling KV Cache</text>

  <!-- Circular buffer -->
  <circle cx="670" cy="165" r="75" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <circle cx="670" cy="165" r="50" fill="none" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Buffer segments (W slots around the ring) -->
  <!-- Filled slots (older to newer) -->
  <path d="M670,90 A75,75 0 0,1 739,130" fill="none" stroke="#2D5A8E" stroke-width="12" opacity="0.35"/>
  <path d="M739,130 A75,75 0 0,1 735,210" fill="none" stroke="#2D5A8E" stroke-width="12" opacity="0.5"/>
  <path d="M735,210 A75,75 0 0,1 670,240" fill="none" stroke="#2D5A8E" stroke-width="12" opacity="0.65"/>
  <path d="M670,240 A75,75 0 0,1 600,200" fill="none" stroke="#2D5A8E" stroke-width="12" opacity="0.8"/>
  <!-- Newest slot -->
  <path d="M600,200 A75,75 0 0,1 598,130" fill="none" stroke="#7C2530" stroke-width="12" opacity="0.9"/>
  <!-- Overwrite slot -->
  <path d="M598,130 A75,75 0 0,1 670,90" fill="none" stroke="#C4A87A" stroke-width="12" opacity="0.5"/>

  <!-- Write head arrow -->
  <polygon points="598,122 588,130 594,122" fill="#7C2530"/>
  <text x="572" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-weight="bold">write</text>

  <!-- Overwrite indicator -->
  <text x="660" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#C4A87A">overwrite</text>

  <!-- Center label -->
  <text x="670" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E">size W</text>
  <text x="670" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">circular</text>

  <!-- Labels -->
  <text x="670" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Fixed memory: O(W &#xD7; d)</text>
  <text x="670" y="286" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">Oldest KV pairs evicted</text>
  <text x="670" y="302" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">as new tokens arrive</text>

  <!-- Bottom summary -->
  <line x1="60" y1="340" x2="740" y2="340" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Each token attends to </text>
  <text x="400" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Each token attends to <tspan font-weight="bold" fill="#7C2530">W nearest neighbors</tspan> &#x2014; complexity <tspan font-weight="bold" fill="#2D5A8E">O(L&#xD7;W)</tspan> instead of O(L&#xB2;)</text>
  <text x="400" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Mistral &#xB7; Gemma &#xB7; Longformer &#xB7; StreamingLLM</text>
</svg>