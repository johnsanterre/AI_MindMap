<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#5C3D1E">Spectral Graph Theory: Fiedler Vector Partitioning</text>

  <!-- Graph section -->
  <text x="240" y="68" text-anchor="middle" font-size="14" fill="#5C3D1E">Graph colored by sign of Fiedler vector (v&#x2082;)</text>

  <!-- Partition A nodes (positive Fiedler values) - red -->
  <circle cx="100" cy="150" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="100" y="155" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">1</text>
  <text x="100" y="180" text-anchor="middle" font-size="9" fill="#7C2530">+0.41</text>

  <circle cx="180" cy="110" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="180" y="115" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">2</text>
  <text x="180" y="140" text-anchor="middle" font-size="9" fill="#7C2530">+0.37</text>

  <circle cx="190" cy="200" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="190" y="205" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">3</text>
  <text x="190" y="228" text-anchor="middle" font-size="9" fill="#7C2530">+0.52</text>

  <circle cx="100" cy="240" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="100" y="245" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">4</text>
  <text x="100" y="268" text-anchor="middle" font-size="9" fill="#7C2530">+0.29</text>

  <!-- Partition B nodes (negative Fiedler values) - navy -->
  <circle cx="320" cy="130" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="320" y="135" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">5</text>
  <text x="320" y="158" text-anchor="middle" font-size="9" fill="#2D5A8E">-0.35</text>

  <circle cx="390" cy="170" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="390" y="175" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">6</text>
  <text x="390" y="198" text-anchor="middle" font-size="9" fill="#2D5A8E">-0.50</text>

  <circle cx="340" cy="240" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="340" y="245" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">7</text>
  <text x="340" y="268" text-anchor="middle" font-size="9" fill="#2D5A8E">-0.44</text>

  <circle cx="410" cy="110" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="410" y="115" text-anchor="middle" font-size="12" fill="#FDFAF4" font-weight="bold">8</text>
  <text x="410" y="138" text-anchor="middle" font-size="9" fill="#2D5A8E">-0.31</text>

  <!-- Edges within partition A -->
  <line x1="100" y1="150" x2="180" y2="110" stroke="#C4A87A" stroke-width="2"/>
  <line x1="100" y1="150" x2="190" y2="200" stroke="#C4A87A" stroke-width="2"/>
  <line x1="180" y1="110" x2="190" y2="200" stroke="#C4A87A" stroke-width="2"/>
  <line x1="100" y1="240" x2="190" y2="200" stroke="#C4A87A" stroke-width="2"/>
  <line x1="100" y1="240" x2="100" y2="150" stroke="#C4A87A" stroke-width="2"/>

  <!-- Edges within partition B -->
  <line x1="320" y1="130" x2="390" y2="170" stroke="#C4A87A" stroke-width="2"/>
  <line x1="320" y1="130" x2="410" y2="110" stroke="#C4A87A" stroke-width="2"/>
  <line x1="390" y1="170" x2="340" y2="240" stroke="#C4A87A" stroke-width="2"/>
  <line x1="390" y1="170" x2="410" y2="110" stroke="#C4A87A" stroke-width="2"/>
  <line x1="320" y1="130" x2="340" y2="240" stroke="#C4A87A" stroke-width="2"/>

  <!-- Bridge edge (cut edge) - dashed -->
  <line x1="190" y1="200" x2="320" y2="130" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="180" y1="110" x2="320" y2="130" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Cut label -->
  <text x="250" y="108" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">cut</text>

  <!-- Legend -->
  <rect x="60" y="295" width="14" height="14" fill="#7C2530" rx="3"/>
  <text x="80" y="307" font-size="11" fill="#5C3D1E">v&#x2082; &gt; 0 (Partition A)</text>
  <rect x="220" y="295" width="14" height="14" fill="#2D5A8E" rx="3"/>
  <text x="240" y="307" font-size="11" fill="#5C3D1E">v&#x2082; &lt; 0 (Partition B)</text>
  <line x1="390" y1="302" x2="420" y2="302" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="426" y="307" font-size="11" fill="#5C3D1E">Cut edges</text>

  <!-- Laplacian matrix section -->
  <text x="640" y="68" text-anchor="middle" font-size="14" fill="#5C3D1E" font-weight="bold">Graph Laplacian L = D - A</text>

  <!-- Matrix bracket left -->
  <line x1="545" y1="82" x2="545" y2="280" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="545" y1="82" x2="555" y2="82" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="545" y1="280" x2="555" y2="280" stroke="#5C3D1E" stroke-width="2"/>

  <!-- Matrix bracket right -->
  <line x1="735" y1="82" x2="735" y2="280" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="725" y1="82" x2="735" y2="82" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="725" y1="280" x2="735" y2="280" stroke="#5C3D1E" stroke-width="2"/>

  <!-- Column headers -->
  <g font-size="9" fill="#C4A87A" text-anchor="middle">
    <text x="572" y="95">1</text>
    <text x="595" y="95">2</text>
    <text x="618" y="95">3</text>
    <text x="641" y="95">4</text>
    <text x="664" y="95">5</text>
    <text x="687" y="95">6</text>
    <text x="710" y="95">7</text>
  </g>

  <!-- Laplacian matrix (7x7 simplified view) -->
  <g font-size="10" text-anchor="middle" fill="#5C3D1E">
    <!-- Row 1: node 1 deg=2 -->
    <text x="572" y="115" fill="#7C2530" font-weight="bold">2</text>
    <text x="595" y="115">-1</text>
    <text x="618" y="115">-1</text>
    <text x="641" y="115">0</text>
    <text x="664" y="115">0</text>
    <text x="687" y="115">0</text>
    <text x="710" y="115">0</text>
    <!-- Row 2: node 2 deg=3 -->
    <text x="572" y="138">-1</text>
    <text x="595" y="138" fill="#7C2530" font-weight="bold">3</text>
    <text x="618" y="138">-1</text>
    <text x="641" y="138">0</text>
    <text x="664" y="138">-1</text>
    <text x="687" y="138">0</text>
    <text x="710" y="138">0</text>
    <!-- Row 3: node 3 deg=3 -->
    <text x="572" y="161">-1</text>
    <text x="595" y="161">-1</text>
    <text x="618" y="161" fill="#7C2530" font-weight="bold">4</text>
    <text x="641" y="161">-1</text>
    <text x="664" y="161">-1</text>
    <text x="687" y="161">0</text>
    <text x="710" y="161">0</text>
    <!-- Row 4: node 4 deg=2 -->
    <text x="572" y="184">0</text>
    <text x="595" y="184">0</text>
    <text x="618" y="184">-1</text>
    <text x="641" y="184" fill="#7C2530" font-weight="bold">2</text>
    <text x="664" y="184">0</text>
    <text x="687" y="184">0</text>
    <text x="710" y="184">-1</text>
    <!-- Row 5: node 5 deg=3 -->
    <text x="572" y="207">0</text>
    <text x="595" y="207">-1</text>
    <text x="618" y="207">-1</text>
    <text x="641" y="207">0</text>
    <text x="664" y="207" fill="#2D5A8E" font-weight="bold">3</text>
    <text x="687" y="207">-1</text>
    <text x="710" y="207">0</text>
    <!-- Row 6: node 6 deg=2 -->
    <text x="572" y="230">0</text>
    <text x="595" y="230">0</text>
    <text x="618" y="230">0</text>
    <text x="641" y="230">0</text>
    <text x="664" y="230">-1</text>
    <text x="687" y="230" fill="#2D5A8E" font-weight="bold">3</text>
    <text x="710" y="230">-1</text>
    <!-- Row 7: node 7 deg=2 -->
    <text x="572" y="253">0</text>
    <text x="595" y="253">0</text>
    <text x="618" y="253">0</text>
    <text x="641" y="253">-1</text>
    <text x="664" y="253">0</text>
    <text x="687" y="253">-1</text>
    <text x="710" y="253" fill="#2D5A8E" font-weight="bold">2</text>
  </g>

  <!-- Diagonal label -->
  <text x="640" y="300" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">Diagonal = degree; Off-diagonal = -adjacency</text>

  <!-- Bottom note -->
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#5C3D1E">The second-smallest eigenvalue (&#x03BB;&#x2082;, the ''Fiedler value'') measures how easily the graph splits.</text>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#5C3D1E">Its eigenvector (the ''Fiedler vector'') assigns each node a value whose sign determines the partition.</text>
  <text x="400" y="380" text-anchor="middle" font-size="11" fill="#C4A87A">Small &#x03BB;&#x2082; &#x2192; easy to cut    |    Large &#x03BB;&#x2082; &#x2192; well-connected (expander)</text>
</svg>