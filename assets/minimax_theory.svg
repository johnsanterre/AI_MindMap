<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="saddle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5A8E;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#C4A87A;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7C2530;stop-opacity:0.25"/>
    </linearGradient>
  </defs>

  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect x="3" y="3" width="794" height="394" fill="none" stroke="#D4C5A9" stroke-width="2" rx="5"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Minimax Theory: The Saddle Point</text>

  <!-- Axes -->
  <!-- Vertical axis (Payoff) -->
  <line x1="150" y1="350" x2="150" y2="60" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="150,55 145,65 155,65" fill="#5C3D1E"/>
  <text x="85" y="200" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,85,200)">Payoff f(x, y)</text>

  <!-- Horizontal axis (Player 1) -->
  <line x1="150" y1="350" x2="580" y2="350" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="585,350 575,345 575,355" fill="#5C3D1E"/>
  <text x="365" y="385" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle">Player 1 Strategy (x) - Minimizer</text>

  <!-- Depth axis (Player 2) -->
  <line x1="150" y1="350" x2="80" y2="300" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="60" y="340" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" transform="rotate(-35,60,340)">Player 2 (y) - Maximizer</text>

  <!-- Saddle surface - rendered as curved paths -->
  <!-- Bottom curve (concave up - Player 1 minimizes) -->
  <path d="M 200,260 Q 300,320 365,270 Q 430,220 530,260" fill="none" stroke="#2D5A8E" stroke-width="2.5" opacity="0.6"/>
  <path d="M 210,240 Q 310,300 365,250 Q 420,200 520,240" fill="none" stroke="#2D5A8E" stroke-width="2" opacity="0.4"/>
  <path d="M 220,220 Q 320,280 365,230 Q 410,180 510,220" fill="none" stroke="#2D5A8E" stroke-width="1.5" opacity="0.3"/>

  <!-- Top curve (concave down - Player 2 maximizes) -->
  <path d="M 280,310 Q 330,260 365,230 Q 400,260 450,310" fill="none" stroke="#7C2530" stroke-width="2.5" opacity="0.6"/>
  <path d="M 260,290 Q 310,240 365,210 Q 420,240 470,290" fill="none" stroke="#7C2530" stroke-width="2" opacity="0.4"/>
  <path d="M 240,270 Q 300,220 365,190 Q 430,220 490,270" fill="none" stroke="#7C2530" stroke-width="1.5" opacity="0.3"/>

  <!-- Saddle surface mesh -->
  <path d="M 200,280 Q 280,310 365,250 Q 450,190 530,220" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <path d="M 200,240 Q 280,270 365,250 Q 450,230 530,260" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <path d="M 280,330 Q 320,270 365,250 Q 410,270 450,330" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <path d="M 300,310 Q 330,260 365,250 Q 400,260 430,310" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>

  <!-- Saddle point -->
  <circle cx="365" cy="250" r="7" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="365" y="238" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">Saddle Point</text>
  <text x="365" y="222" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">min max = max min</text>

  <!-- Direction arrows at saddle point -->
  <!-- Player 1 minimizes (curves down along x) -->
  <path d="M 310,270 Q 335,285 355,275" fill="none" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M 420,270 Q 395,285 375,275" fill="none" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Player 2 maximizes (curves up along y) -->
  <path d="M 345,290 Q 350,270 355,255" fill="none" stroke="#7C2530" stroke-width="2"/>
  <path d="M 385,290 Q 380,270 375,255" fill="none" stroke="#7C2530" stroke-width="2"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="600" y="80" width="175" height="130" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <text x="688" y="100" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Legend</text>

  <line x1="615" y1="118" x2="650" y2="118" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="658" y="122" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Player 1: min over x</text>

  <line x1="615" y1="143" x2="650" y2="143" stroke="#7C2530" stroke-width="2.5"/>
  <text x="658" y="147" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Player 2: max over y</text>

  <circle cx="632" cy="168" r="5" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="658" y="172" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Saddle point (x*, y*)</text>

  <text x="688" y="197" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">min max f = max min f</text>

  <!-- Annotation: concave up along x -->
  <text x="210" y="300" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-style="italic">concave up in x</text>
  <text x="210" y="312" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-style="italic">(Player 1 finds min)</text>

  <!-- Annotation: concave down along y -->
  <text x="460" y="170" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">concave down in y</text>
  <text x="460" y="182" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">(Player 2 finds max)</text>
</svg>