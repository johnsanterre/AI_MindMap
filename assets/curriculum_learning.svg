<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Curriculum Learning: Easy to Hard Training</text>

  <!-- Timeline arrow -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="746,210 732,205 732,215" fill="#5C3D1E"/>
  <text x="400" y="240" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">Training Progress</text>

  <!-- Phase 1: Easy examples -->
  <rect x="80" y="80" width="180" height="110" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="170" y="105" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Phase 1: Easy</text>

  <!-- Simple shapes representing easy examples -->
  <circle cx="120" cy="145" r="16" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="1"/>
  <text x="120" y="150" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">cat</text>
  <circle cx="170" cy="145" r="16" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="1"/>
  <text x="170" y="150" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">dog</text>
  <circle cx="220" cy="145" r="16" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="1"/>
  <text x="220" y="150" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">car</text>
  <text x="170" y="180" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#2D5A8E" text-anchor="middle">Clear, prototypical</text>

  <!-- Arrow between phases -->
  <line x1="270" y1="135" x2="305" y2="135" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="311,135 301,130 301,140" fill="#C4A87A"/>

  <!-- Phase 2: Medium examples -->
  <rect x="315" y="80" width="180" height="110" rx="8" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="405" y="105" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Phase 2: Medium</text>

  <!-- Medium difficulty shapes -->
  <rect x="340" y="128" width="30" height="30" rx="4" fill="#C4A87A" fill-opacity="0.4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="355" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">cat?</text>
  <rect x="385" y="128" width="30" height="30" rx="4" fill="#C4A87A" fill-opacity="0.4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="400" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">fox?</text>
  <rect x="430" y="128" width="30" height="30" rx="4" fill="#C4A87A" fill-opacity="0.4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="445" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">van?</text>
  <text x="405" y="180" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5C3D1E" text-anchor="middle">Ambiguous, partial</text>

  <!-- Arrow between phases -->
  <line x1="505" y1="135" x2="540" y2="135" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="546,135 536,130 536,140" fill="#C4A87A"/>

  <!-- Phase 3: Hard examples -->
  <rect x="550" y="80" width="180" height="110" rx="8" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="640" y="105" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530" text-anchor="middle">Phase 3: Hard</text>

  <!-- Hard difficulty shapes -->
  <polygon points="585,160 575,140 595,140" fill="#7C2530" fill-opacity="0.3" stroke="#7C2530" stroke-width="1"/>
  <text x="585" y="153" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="middle">!?</text>
  <polygon points="635,160 625,140 645,140" fill="#7C2530" fill-opacity="0.3" stroke="#7C2530" stroke-width="1"/>
  <text x="635" y="153" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="middle">!?</text>
  <polygon points="685,160 675,140 695,140" fill="#7C2530" fill-opacity="0.3" stroke="#7C2530" stroke-width="1"/>
  <text x="685" y="153" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="middle">!?</text>
  <text x="640" y="180" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#7C2530" text-anchor="middle">Noisy, adversarial</text>

  <!-- Loss curve comparison -->
  <text x="400" y="275" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Convergence Comparison</text>

  <!-- Mini axes for loss curves -->
  <line x1="120" y1="290" x2="120" y2="370" stroke="#5C3D1E" stroke-width="1.2"/>
  <line x1="120" y1="370" x2="350" y2="370" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="235" y="388" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">epochs</text>
  <text x="112" y="330" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="end" transform="rotate(-90,112,330)">loss</text>

  <!-- Random order curve (slower convergence) -->
  <path d="M 125,295 C 160,310 200,340 240,352 C 270,358 310,360 345,358" fill="none" stroke="#C4A87A" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Curriculum curve (faster convergence) -->
  <path d="M 125,295 C 150,330 180,352 220,360 C 250,364 300,365 345,364" fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Legend for curves -->
  <line x1="420" y1="310" x2="460" y2="310" stroke="#7C2530" stroke-width="2.5"/>
  <text x="468" y="314" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Curriculum (easy-to-hard)</text>
  <line x1="420" y1="335" x2="460" y2="335" stroke="#C4A87A" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="468" y="339" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Random order</text>

  <!-- Annotation: faster -->
  <text x="510" y="365" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#7C2530">Curriculum converges faster</text>

  <!-- Bengio 2009 reference -->
  <text x="700" y="390" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="end">Bengio et al. 2009</text>
</svg>
