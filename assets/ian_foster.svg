<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Center hub -->
  <ellipse cx="400" cy="200" rx="95" ry="40" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FDFAF4" font-weight="bold">Ian T Foster</text>
  <text x="400" y="213" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C4A87A">Grid Computing Pioneer</text>

  <!-- Spoke lines -->
  <line x1="310" y1="185" x2="155" y2="95" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="490" y1="185" x2="645" y2="95" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="310" y1="215" x2="145" y2="310" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="490" y1="215" x2="655" y2="310" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="400" y1="240" x2="400" y2="340" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Node: Grid Computing (top left) -->
  <ellipse cx="120" cy="80" rx="85" ry="30" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="120" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" font-weight="bold">Grid</text>
  <text x="120" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" font-weight="bold">Computing</text>

  <!-- Node: Globus Toolkit (top right) -->
  <ellipse cx="680" cy="80" rx="90" ry="30" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="680" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" font-weight="bold">Globus</text>
  <text x="680" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" font-weight="bold">Toolkit</text>

  <!-- Node: Argonne National Lab (bottom left) -->
  <ellipse cx="120" cy="320" rx="100" ry="30" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="120" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" font-weight="bold">Argonne</text>
  <text x="120" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" font-weight="bold">National Lab</text>

  <!-- Node: University of Chicago (bottom right) -->
  <ellipse cx="680" cy="320" rx="100" ry="30" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="680" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" font-weight="bold">University of</text>
  <text x="680" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" font-weight="bold">Chicago</text>

  <!-- Node: Distributed Computing for Science (bottom center) -->
  <ellipse cx="400" cy="355" rx="115" ry="30" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="351" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">Distributed Computing</text>
  <text x="400" y="367" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">for Science</text>
</svg>