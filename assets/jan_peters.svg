  <text x="650" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4">Motor Skill</text>
  <text x="650" y="99" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4">Learning</text>

  <!-- Policy Search node -->
  <ellipse cx="140" cy="320" rx="95" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
