  <text x="400" y="193" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#FDFAF4" font-weight="bold">Jan</text>
  <text x="400" y="213" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#FDFAF4" font-weight="bold">Peters</text>

  <!-- Spoke lines -->
  <line x1="340" y1="175" x2="185" y2="100" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="460" y1="175" x2="615" y2="100" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="340" y1="225" x2="170" y2="310" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="460" y1="225" x2="630" y2="310" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="400" y1="262" x2="400" y2="340" stroke="#C4A87A" stroke-width="2.5"/>

