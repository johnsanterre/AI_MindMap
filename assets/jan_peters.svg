  <!-- Max Planck Institute node -->
  <ellipse cx="660" cy="320" rx="110" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="660" y="317" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Max Planck</text>
  <text x="660" y="334" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Institute</text>
