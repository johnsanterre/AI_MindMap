<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" rx="6" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="38" text-anchor="middle" fill="#5C3D1E" font-size="19" font-weight="bold">AI Watermarking: Hidden Signals in Generated Text</text>

  <!-- LLM box -->
  <rect x="40" y="70" width="160" height="80" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="2"/>
  <text x="120" y="105" text-anchor="middle" fill="#2D5A8E" font-size="15" font-weight="bold">Language Model</text>
  <text x="120" y="128" text-anchor="middle" fill="#2D5A8E" font-size="12">next-token logits</text>

  <!-- Arrow from LLM to split -->
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <line x1="200" y1="110" x2="260" y2="110" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Secret key + hash -->
  <rect x="265" y="65" width="150" height="40" rx="6" fill="#C4A87A" fill-opacity="0.3" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="340" y="90" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Secret Key + Hash</text>

  <!-- Token partition box -->
  <rect x="265" y="115" width="150" height="90" rx="8" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="2"/>
  <text x="340" y="140" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">Token Partition</text>

  <!-- Green/Red list visual -->
  <rect x="280" y="152" width="55" height="24" rx="4" fill="#4A7C59" fill-opacity="0.25" stroke="#4A7C59" stroke-width="1"/>
  <text x="307" y="169" text-anchor="middle" fill="#4A7C59" font-size="11" font-weight="bold">Green</text>
  <rect x="345" y="152" width="55" height="24" rx="4" fill="#7C2530" fill-opacity="0.25" stroke="#7C2530" stroke-width="1"/>
  <text x="372" y="169" text-anchor="middle" fill="#7C2530" font-size="11" font-weight="bold">Red</text>

  <text x="340" y="196" text-anchor="middle" fill="#5C3D1E" font-size="11">Bias green tokens by +&delta;</text>

  <!-- Arrow down from key to partition -->
  <line x1="340" y1="105" x2="340" y2="115" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Arrow to output -->
  <line x1="415" y1="160" x2="475" y2="160" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Output text box -->
  <rect x="480" y="75" width="280" height="120" rx="8" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="620" y="98" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">Generated Text</text>
  <!-- Simulated token coloring -->
  <text x="500" y="125" fill="#4A7C59" font-size="12" font-weight="bold">The</text>
  <text x="530" y="125" fill="#4A7C59" font-size="12" font-weight="bold">quick</text>
  <text x="572" y="125" fill="#7C2530" font-size="12">brown</text>
  <text x="614" y="125" fill="#4A7C59" font-size="12" font-weight="bold">fox</text>
  <text x="641" y="125" fill="#4A7C59" font-size="12" font-weight="bold">jumps</text>
  <text x="688" y="125" fill="#7C2530" font-size="12">over</text>
  <text x="720" y="125" fill="#4A7C59" font-size="12" font-weight="bold">the</text>

  <text x="500" y="148" fill="#4A7C59" font-size="12" font-weight="bold">lazy</text>
  <text x="532" y="148" fill="#4A7C59" font-size="12" font-weight="bold">dog</text>
  <text x="560" y="148" fill="#7C2530" font-size="12">near</text>
  <text x="593" y="148" fill="#4A7C59" font-size="12" font-weight="bold">a</text>
  <text x="610" y="148" fill="#4A7C59" font-size="12" font-weight="bold">bright</text>
  <text x="655" y="148" fill="#7C2530" font-size="12">warm</text>
  <text x="695" y="148" fill="#4A7C59" font-size="12" font-weight="bold">sunny</text>

  <text x="620" y="180" text-anchor="middle" fill="#5C3D1E" font-size="11" font-style="italic">Green tokens statistically over-represented</text>

  <!-- Detection section -->
  <text x="400" y="245" text-anchor="middle" fill="#5C3D1E" font-size="16" font-weight="bold">Detection (Statistical Test)</text>

  <!-- Detection flow -->
  <rect x="60" y="265" width="160" height="55" rx="8" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="140" y="288" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Suspect Text</text>
  <text x="140" y="306" text-anchor="middle" fill="#2D5A8E" font-size="11">T tokens total</text>

  <line x1="220" y1="292" x2="280" y2="292" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="285" y="265" width="170" height="55" rx="8" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="370" y="288" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Count Green Tokens</text>
  <text x="370" y="306" text-anchor="middle" fill="#5C3D1E" font-size="11">|G| out of T</text>

  <line x1="455" y1="292" x2="515" y2="292" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="520" y="265" width="230" height="55" rx="8" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="635" y="285" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">z-score Test</text>
  <text x="635" y="306" text-anchor="middle" fill="#7C2530" font-size="12">z = (|G| - T/2) / sqrt(T/4)</text>

  <!-- Result labels -->
  <text x="250" y="360" text-anchor="middle" fill="#4A7C59" font-size="14" font-weight="bold">z >> threshold  -->  AI-generated</text>
  <text x="620" y="360" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">z &lt; threshold  -->  Human-written</text>

  <!-- Dashed separator -->
  <line x1="40" y1="228" x2="760" y2="228" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="6,4"/>
</svg>