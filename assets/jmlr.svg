<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="267" y1="20" x2="267" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="533" y1="20" x2="533" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ═══════════════ LEFT PANEL ═══════════════ -->
  <!-- JMLR Large Title -->
  <text x="133" y="62" font-family="Georgia, serif" font-size="42" font-weight="bold"
        fill="#7C2530" text-anchor="middle" letter-spacing="4">JMLR</text>

  <!-- Subtitle -->
  <text x="133" y="84" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E"
        text-anchor="middle">Journal of Machine Learning Research</text>

  <!-- Divider under title -->
  <line x1="30" y1="94" x2="237" y2="94" stroke="#C4A87A" stroke-width="1.2"/>

  <!-- Facts -->
  <text x="133" y="116" font-family="Georgia, serif" font-size="10" fill="#2D5A8E"
        text-anchor="middle" font-style="italic">Founded 2000 · Open Access · Free to read</text>

  <!-- Fact rows -->
  <rect x="26" y="126" width="222" height="22" rx="3" fill="#F0EAD8"/>
  <text x="36" y="141" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Format:</text>
  <text x="88" y="141" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Journal — rolling submissions</text>

  <rect x="26" y="152" width="222" height="22" rx="3" fill="#F0EAD8"/>
  <text x="36" y="167" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Deadlines:</text>
  <text x="96" y="167" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">None — submit anytime</text>

  <rect x="26" y="178" width="222" height="22" rx="3" fill="#F0EAD8"/>
  <text x="36" y="193" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Page limit:</text>
  <text x="99" y="193" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">None — full proofs welcome</text>

  <rect x="26" y="204" width="222" height="22" rx="3" fill="#F0EAD8"/>
  <text x="36" y="219" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Review:</text>
  <text x="83" y="219" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Multi-round, 6–18 months</text>

  <rect x="26" y="230" width="222" height="22" rx="3" fill="#F0EAD8"/>
  <text x="36" y="245" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Impact:</text>
  <text x="83" y="245" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Highest-impact ML journal</text>

  <!-- PMLR note box -->
  <rect x="26" y="262" width="222" height="44" rx="4" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="137" y="278" font-family="Georgia, serif" font-size="9" fill="#2D5A8E"
        text-anchor="middle" font-style="italic">Sister publication:</text>
  <text x="137" y="292" font-family="Georgia, serif" font-size="10" fill="#2D5A8E"
        text-anchor="middle" font-weight="bold">PMLR = conference proceedings arm</text>
  <text x="137" y="305" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle">(proceedings.mlr.press)</text>

  <!-- jmlr.org -->
  <text x="133" y="345" font-family="Georgia, serif" font-size="10" fill="#7C2530"
        text-anchor="middle" font-style="italic">jmlr.org — all papers free</text>

  <!-- ═══════════════ CENTER PANEL ═══════════════ -->
  <text x="400" y="50" font-family="Georgia, serif" font-size="13" font-weight="bold"
        fill="#7C2530" text-anchor="middle">Journal vs. Conference</text>
  <line x1="285" y1="58" x2="515" y2="58" stroke="#C4A87A" stroke-width="1.2"/>

  <!-- Column headers -->
  <rect x="283" y="64" width="114" height="20" rx="2" fill="#7C2530"/>
  <text x="340" y="78" font-family="Georgia, serif" font-size="10" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">JMLR (Journal)</text>

  <rect x="403" y="64" width="122" height="20" rx="2" fill="#2D5A8E"/>
  <text x="464" y="78" font-family="Georgia, serif" font-size="10" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">NeurIPS / ICML</text>

  <!-- Row 1 -->
  <rect x="283" y="88" width="114" height="18" fill="#FAF5EC"/>
  <text x="340" y="101" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">No deadline</text>
  <rect x="403" y="88" width="122" height="18" fill="#F0EAD8"/>
  <text x="464" y="101" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Annual deadline</text>

  <!-- Row 2 -->
  <rect x="283" y="108" width="114" height="18" fill="#F4EDE0"/>
  <text x="340" y="121" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">No page limit</text>
  <rect x="403" y="108" width="122" height="18" fill="#EDE3D0"/>
  <text x="464" y="121" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">8–10 pages typical</text>

  <!-- Row 3 -->
  <rect x="283" y="128" width="114" height="18" fill="#FAF5EC"/>
  <text x="340" y="141" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Multi-round review</text>
  <rect x="403" y="128" width="122" height="18" fill="#F0EAD8"/>
  <text x="464" y="141" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Single-round review</text>

  <!-- Row 4 -->
  <rect x="283" y="148" width="114" height="18" fill="#F4EDE0"/>
  <text x="340" y="161" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">6–18 month timeline</text>
  <rect x="403" y="148" width="122" height="18" fill="#EDE3D0"/>
  <text x="464" y="161" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">3–6 month timeline</text>

  <!-- Row 5 -->
  <rect x="283" y="168" width="114" height="18" fill="#FAF5EC"/>
  <text x="340" y="181" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Permanent archival</text>
  <rect x="403" y="168" width="122" height="18" fill="#F0EAD8"/>
  <text x="464" y="181" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Community event</text>

  <!-- Row 6 -->
  <rect x="283" y="188" width="114" height="18" fill="#F4EDE0"/>
  <text x="340" y="201" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Revisions allowed</text>
  <rect x="403" y="188" width="122" height="18" fill="#EDE3D0"/>
  <text x="464" y="201" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Accept / reject only</text>

  <!-- Row 7 -->
  <rect x="283" y="208" width="114" height="18" fill="#FAF5EC"/>
  <text x="340" y="221" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">High prestige per paper</text>
  <rect x="403" y="208" width="122" height="18" fill="#F0EAD8"/>
  <text x="464" y="221" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Fast community exposure</text>

  <!-- arXiv note -->
  <rect x="283" y="238" width="242" height="38" rx="4" fill="#F0EAD8" stroke="#C4A87A" stroke-width="1"/>
  <text x="404" y="253" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">Many landmark papers appear first on arXiv,</text>
  <text x="404" y="266" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">then in JMLR for permanent archival record.</text>

  <!-- MLOSS note -->
  <rect x="283" y="285" width="242" height="50" rx="4" fill="none" stroke="#7C2530" stroke-width="1.2"/>
  <text x="404" y="302" font-family="Georgia, serif" font-size="9.5" fill="#7C2530"
        text-anchor="middle" font-weight="bold">JMLR MLOSS Track</text>
  <text x="404" y="316" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle">Peer-reviewed ML software papers —</text>
  <text x="404" y="329" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle">gives academic credit for open-source code</text>

  <!-- ═══════════════ RIGHT PANEL ═══════════════ -->
  <text x="666" y="50" font-family="Georgia, serif" font-size="13" font-weight="bold"
        fill="#7C2530" text-anchor="middle">Notable JMLR Papers</text>
  <line x1="548" y1="58" x2="784" y2="58" stroke="#C4A87A" stroke-width="1.2"/>

  <!-- Paper entries -->
  <!-- 1 -->
  <rect x="548" y="66" width="236" height="34" rx="3" fill="#F0EAD8"/>
  <text x="558" y="80" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">scikit-learn</text>
  <text x="558" y="93" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Pedregosa et al. (2011) — most-cited</text>
  <text x="558" y="95" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"> ML software paper</text>

  <!-- 2 -->
  <rect x="548" y="104" width="236" height="34" rx="3" fill="#FAF5EC"/>
  <text x="558" y="118" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">LibSVM / LIBLINEAR</text>
  <text x="558" y="131" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Chang &amp; Lin (2011) — SVM library</text>

  <!-- 3 -->
  <rect x="548" y="142" width="236" height="34" rx="3" fill="#F0EAD8"/>
  <text x="558" y="156" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">Gaussian Processes for ML</text>
  <text x="558" y="169" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Williams &amp; Rasmussen — GP bible</text>

  <!-- 4 -->
  <rect x="548" y="180" width="236" height="34" rx="3" fill="#FAF5EC"/>
  <text x="558" y="194" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">Lasso Path (LARS)</text>
  <text x="558" y="207" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Efron et al. (2004) — sparse methods</text>

  <!-- 5 -->
  <rect x="548" y="218" width="236" height="34" rx="3" fill="#F0EAD8"/>
  <text x="558" y="232" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">SVM Theory Papers</text>
  <text x="558" y="245" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Bartlett, Schölkopf, Vapnik et al.</text>

  <!-- 6 -->
  <rect x="548" y="256" width="236" height="34" rx="3" fill="#FAF5EC"/>
  <text x="558" y="270" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">Bayesian Nonparametrics</text>
  <text x="558" y="283" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Ghahramani, Teh, Jordan et al.</text>

  <!-- 7 -->
  <rect x="548" y="294" width="236" height="34" rx="3" fill="#F0EAD8"/>
  <text x="558" y="308" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-weight="bold">Online Learning / Bandits</text>
  <text x="558" y="321" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Auer, Cesa-Bianchi, Bubeck et al.</text>

  <!-- Founded note at bottom -->
  <text x="666" y="360" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E"
        text-anchor="middle" font-style="italic">Founded 2000 in protest against</text>
  <text x="666" y="372" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E"
        text-anchor="middle" font-style="italic">expensive subscription journals</text>

  <!-- Bottom label -->
  <text x="133" y="372" font-family="Georgia, serif" font-size="9" fill="#5C3D1E"
        text-anchor="middle" font-style="italic">Est. 2000 · Cambridge, MA</text>
</svg>
