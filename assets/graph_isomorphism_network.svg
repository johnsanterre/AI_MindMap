<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#5C3D1E">Graph Isomorphism Network (GIN): Maximally Expressive GNN</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-brown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT PANEL: WL Test vs GIN parallel             -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="12" y="40" width="240" height="330" fill="#F5EFE4" rx="6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="132" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C2530">WL Test Analogy</text>

  <!-- Step 1: Color/label nodes -->
  <text x="132" y="78" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">Step 1: Initial labels</text>
  <!-- Two small graphs -->
  <!-- Graph A -->
  <circle cx="50" cy="110" r="12" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="50" y="114" text-anchor="middle" font-size="9" fill="white">a</text>
  <circle cx="90" cy="95" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="99" text-anchor="middle" font-size="9" fill="#5C3D1E">b</text>
  <circle cx="90" cy="125" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="129" text-anchor="middle" font-size="9" fill="#5C3D1E">b</text>
  <line x1="62" y1="105" x2="78" y2="98" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="62" y1="115" x2="78" y2="122" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="90" y1="107" x2="90" y2="113" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Graph B -->
  <circle cx="160" cy="110" r="12" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="160" y="114" text-anchor="middle" font-size="9" fill="white">a</text>
  <circle cx="200" cy="95" r="12" fill="#7C2530" stroke="#7C2530" stroke-width="1.5"/>
  <text x="200" y="99" text-anchor="middle" font-size="9" fill="white">c</text>
  <circle cx="200" cy="125" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="200" y="129" text-anchor="middle" font-size="9" fill="#5C3D1E">b</text>
  <line x1="172" y1="105" x2="188" y2="98" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="172" y1="115" x2="188" y2="122" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="200" y1="107" x2="200" y2="113" stroke="#5C3D1E" stroke-width="1.5"/>

  <text x="125" y="108" text-anchor="middle" font-size="10" fill="#5C3D1E">vs</text>

  <!-- Step 2: Aggregate neighbor labels -->
  <text x="132" y="158" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">Step 2: Aggregate neighbors</text>

  <rect x="24" y="168" width="216" height="52" rx="4" fill="#EDE4D3" stroke="#D4C5A9" stroke-width="1"/>
  <text x="132" y="185" text-anchor="middle" font-size="9" fill="#5C3D1E">Node a in G1: neighbors = {b, b}</text>
  <text x="132" y="199" text-anchor="middle" font-size="9" fill="#5C3D1E">Node a in G2: neighbors = {c, b}</text>
  <text x="132" y="213" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Different multisets = different labels!</text>

  <!-- Step 3: Repeat & compare -->
  <text x="132" y="240" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">Step 3: Hash &amp; relabel</text>
  <rect x="24" y="250" width="216" height="40" rx="4" fill="#EDE4D3" stroke="#D4C5A9" stroke-width="1"/>
  <text x="132" y="267" text-anchor="middle" font-size="9" fill="#5C3D1E">new_label(v) = HASH(label(v), {{label(u) : u in N(v)}})</text>
  <text x="132" y="281" text-anchor="middle" font-size="9" fill="#2D5A8E" font-style="italic">Injective hash preserves all information</text>

  <!-- Key insight box -->
  <rect x="24" y="300" width="216" height="62" rx="4" fill="#7C2530"/>
  <text x="132" y="318" text-anchor="middle" font-size="10" fill="white" font-weight="bold">GIN = Neural WL Test</text>
  <text x="132" y="334" text-anchor="middle" font-size="9" fill="white">Replace HASH with a learned</text>
  <text x="132" y="348" text-anchor="middle" font-size="9" fill="white">MLP that is provably injective</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CENTER PANEL: GIN update rule                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="268" y="40" width="260" height="330" fill="#F5EFE4" rx="6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="398" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C2530">GIN Update Rule</text>

  <!-- Central node diagram -->
  <!-- Neighbor nodes -->
  <circle cx="340" cy="110" r="14" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="340" y="114" text-anchor="middle" font-size="8" fill="#5C3D1E">u1</text>
  <circle cx="398" cy="85" r="14" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="398" y="89" text-anchor="middle" font-size="8" fill="#5C3D1E">u2</text>
  <circle cx="456" cy="110" r="14" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="456" y="114" text-anchor="middle" font-size="8" fill="#5C3D1E">u3</text>
  <!-- Center node v -->
  <circle cx="398" cy="140" r="16" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="2"/>
  <text x="398" y="144" text-anchor="middle" font-size="9" fill="white" font-weight="bold">v</text>
  <!-- Edges -->
  <line x1="352" y1="118" x2="384" y2="132" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="398" y1="99" x2="398" y2="124" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="444" y1="118" x2="412" y2="132" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Update formula -->
  <rect x="280" y="170" width="236" height="70" rx="4" fill="#EDE4D3" stroke="#D4C5A9" stroke-width="1"/>
  <text x="398" y="190" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">GIN aggregation:</text>
  <text x="398" y="210" text-anchor="middle" font-size="10" fill="#2D5A8E">h_v' = MLP( (1+e) h_v + SUM h_u )</text>
  <text x="398" y="228" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">e is a learnable parameter</text>

  <!-- Why SUM not MEAN -->
  <rect x="280" y="250" width="236" height="110" rx="4" fill="#EDE4D3" stroke="#D4C5A9" stroke-width="1"/>
  <text x="398" y="268" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Why SUM, not MEAN or MAX?</text>

  <text x="288" y="288" font-size="9" fill="#7C2530" font-weight="bold">SUM:</text>
  <text x="320" y="288" font-size="9" fill="#5C3D1E">{a, a, b} vs {a, b} = different</text>
  <text x="330" y="302" font-size="9" fill="#2D5A8E" font-style="italic">injective on multisets</text>

  <text x="288" y="320" font-size="9" fill="#7C2530" font-weight="bold">MEAN:</text>
  <text x="330" y="320" font-size="9" fill="#5C3D1E">{a, a, b} vs {a, b} = same!</text>

  <text x="288" y="338" font-size="9" fill="#7C2530" font-weight="bold">MAX:</text>
  <text x="326" y="338" font-size="9" fill="#5C3D1E">{a, a, b} vs {a, b} = same!</text>

  <text x="398" y="355" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">Both lose multiplicity information</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Expressiveness hierarchy           -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="542" y="40" width="246" height="330" fill="#F5EFE4" rx="6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="665" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C2530">GNN Expressiveness</text>

  <!-- Hierarchy boxes stacked -->
  <rect x="570" y="72" width="190" height="36" rx="6" fill="#7C2530"/>
  <text x="665" y="88" text-anchor="middle" font-size="10" fill="white" font-weight="bold">GIN (SUM + MLP)</text>
  <text x="665" y="102" text-anchor="middle" font-size="9" fill="white">= WL test power</text>

  <line x1="665" y1="108" x2="665" y2="120" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-brown)"/>
  <text x="700" y="117" font-size="8" fill="#5C3D1E" font-style="italic">strictly more</text>
  <text x="700" y="127" font-size="8" fill="#5C3D1E" font-style="italic">powerful than</text>

  <rect x="570" y="132" width="190" height="36" rx="6" fill="#2D5A8E"/>
  <text x="665" y="148" text-anchor="middle" font-size="10" fill="white" font-weight="bold">GCN (MEAN)</text>
  <text x="665" y="162" text-anchor="middle" font-size="9" fill="white">loses multiplicity</text>

  <line x1="665" y1="168" x2="665" y2="180" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-brown)"/>

  <rect x="570" y="182" width="190" height="36" rx="6" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="665" y="198" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">GraphSAGE (MAX)</text>
  <text x="665" y="212" text-anchor="middle" font-size="9" fill="#5C3D1E">ignores distribution</text>

  <!-- Graph readout -->
  <rect x="558" y="236" width="218" height="56" rx="4" fill="#EDE4D3" stroke="#D4C5A9" stroke-width="1"/>
  <text x="667" y="254" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Graph-level readout:</text>
  <text x="667" y="270" text-anchor="middle" font-size="9" fill="#5C3D1E">READOUT = concat( SUM(h_v^(k)) )</text>
  <text x="667" y="284" text-anchor="middle" font-size="9" fill="#2D5A8E" font-style="italic">across ALL layers k (not just final)</text>

  <!-- Architecture summary -->
  <rect x="558" y="300" width="218" height="62" rx="4" fill="#EDE4D3" stroke="#D4C5A9" stroke-width="1"/>
  <text x="667" y="316" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">GIN Architecture</text>
  <text x="667" y="332" text-anchor="middle" font-size="9" fill="#5C3D1E">5 GIN layers, each with 2-layer MLP</text>
  <text x="667" y="348" text-anchor="middle" font-size="9" fill="#5C3D1E">Batch norm + SUM pooling + dropout</text>

  <!-- Bottom caption -->
  <text x="400" y="392" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">Xu, Hu, Leskovec, Jegelka (ICLR 2019) — How Powerful are Graph Neural Networks?</text>
</svg>
