<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Combinatorics: The Art of Counting Structure</text>

  <!-- Central hub -->
  <circle cx="400" cy="200" r="52" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="400" y="195" font-family="Georgia,serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">Combinatorics</text>
  <text x="400" y="212" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">How many ways?</text>

  <!-- Spoke 1: Counting (top-left) -->
  <line x1="358" y1="167" x2="175" y2="82" stroke="#C4A87A" stroke-width="1.8"/>
  <ellipse cx="130" cy="70" rx="72" ry="28" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="130" y="65" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Counting</text>
  <text x="130" y="80" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Sum &amp; Product Rules</text>

  <!-- Spoke 2: Graph Theory (top-right) -->
  <line x1="442" y1="167" x2="630" y2="82" stroke="#C4A87A" stroke-width="1.8"/>
  <ellipse cx="675" cy="70" rx="72" ry="28" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="675" y="65" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Graph Theory</text>
  <text x="675" y="80" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Networks &amp; Trees</text>

  <!-- Spoke 3: Design Theory (left) -->
  <line x1="348" y1="200" x2="175" y2="200" stroke="#C4A87A" stroke-width="1.8"/>
  <ellipse cx="120" cy="200" rx="72" ry="28" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="120" y="195" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Design Theory</text>
  <text x="120" y="210" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Block Designs, Latin Sq.</text>

  <!-- Spoke 4: Coding Theory (right) -->
  <line x1="452" y1="200" x2="625" y2="200" stroke="#C4A87A" stroke-width="1.8"/>
  <ellipse cx="680" cy="200" rx="72" ry="28" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="680" y="195" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Coding Theory</text>
  <text x="680" y="210" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Error Correction</text>

  <!-- Spoke 5: Extremal Combinatorics (bottom-left) -->
  <line x1="362" y1="237" x2="185" y2="325" stroke="#C4A87A" stroke-width="1.8"/>
  <ellipse cx="140" cy="335" rx="84" ry="28" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="2"/>
  <text x="140" y="330" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Extremal</text>
  <text x="140" y="345" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Combinatorics</text>

  <!-- Key formulas in bottom-right region -->
  <rect x="460" y="280" width="300" height="95" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="610" y="300" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Key Formulas</text>
  <text x="610" y="318" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">P(n,k) = n! / (n-k)!</text>
  <text x="610" y="336" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">C(n,k) = n! / (k!(n-k)!)</text>
  <text x="610" y="354" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">(1+x)^n = Sum C(n,k) x^k</text>
  <line x1="452" y1="220" x2="460" y2="300" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom caption -->
  <text x="400" y="388" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">Combinatorics underpins feature counting, architecture search, and optimization bounds in ML.</text>
</svg>