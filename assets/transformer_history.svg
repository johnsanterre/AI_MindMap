<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">The Transformer Timeline: From Attention to Foundation Models</text>

  <!-- Timeline spine -->
  <line x1="40" y1="200" x2="770" y2="200" stroke="#C4A87A" stroke-width="2.5"/>
  <polygon points="766,195 776,200 766,205" fill="#C4A87A"/>

  <!-- Era bands -->
  <rect x="40"  y="185" width="130" height="30" fill="#2D5A8E" rx="3" opacity="0.15"/>
  <rect x="170" y="185" width="180" height="30" fill="#7C2530" rx="3" opacity="0.15"/>
  <rect x="350" y="185" width="200" height="30" fill="#5C3D1E" rx="3" opacity="0.15"/>
  <rect x="550" y="185" width="220" height="30" fill="#7C2530" rx="3" opacity="0.12"/>

  <!-- Era labels -->
  <text x="105" y="178" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Origins</text>
  <text x="260" y="178" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">Pre-training Revolution</text>
  <text x="450" y="178" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">Scaling Era</text>
  <text x="660" y="178" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">Foundation Models</text>

  <!-- 2017: Transformer -->
  <circle cx="70" cy="200" r="9" fill="#2D5A8E"/>
  <line x1="70" y1="191" x2="70" y2="120" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="70" y="112" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2017</text>
  <text x="70" y="100" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Transformer</text>
  <text x="70" y="88" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle" font-style="italic">"Attention Is</text>
  <text x="70" y="78" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle" font-style="italic">All You Need"</text>

  <!-- 2018: GPT-1 -->
  <circle cx="175" cy="200" r="7" fill="#7C2530"/>
  <line x1="175" y1="209" x2="175" y2="265" stroke="#7C2530" stroke-width="1"/>
  <text x="175" y="280" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2018</text>
  <text x="175" y="293" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">GPT-1</text>
  <text x="175" y="305" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle">117M params</text>

  <!-- 2018: BERT -->
  <circle cx="225" cy="200" r="8" fill="#2D5A8E"/>
  <line x1="225" y1="191" x2="225" y2="120" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="225" y="112" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2018</text>
  <text x="225" y="100" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">BERT</text>
  <text x="225" y="88" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle">Bidirectional</text>

  <!-- 2019: GPT-2 / T5 -->
  <circle cx="300" cy="200" r="7" fill="#7C2530"/>
  <line x1="300" y1="209" x2="300" y2="265" stroke="#7C2530" stroke-width="1"/>
  <text x="300" y="280" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2019</text>
  <text x="300" y="293" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">GPT-2 / T5</text>
  <text x="300" y="305" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle">1.5B params</text>

  <!-- 2020: GPT-3 -->
  <circle cx="400" cy="200" r="10" fill="#5C3D1E"/>
  <line x1="400" y1="191" x2="400" y2="110" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="102" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2020</text>
  <text x="400" y="90" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">GPT-3</text>
  <text x="400" y="78" font-family="Georgia,serif" font-size="8" fill="#5C3D1E" text-anchor="middle">175B params</text>
  <text x="400" y="66" font-family="Georgia,serif" font-size="8" fill="#5C3D1E" text-anchor="middle" font-style="italic">In-context learning</text>

  <!-- 2022: Chinchilla / ChatGPT -->
  <circle cx="510" cy="200" r="8" fill="#5C3D1E"/>
  <line x1="510" y1="209" x2="510" y2="275" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="510" y="290" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2022</text>
  <text x="510" y="303" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Chinchilla</text>
  <text x="510" y="316" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">ChatGPT</text>

  <!-- 2023: GPT-4 / LLaMA -->
  <circle cx="620" cy="200" r="9" fill="#7C2530"/>
  <line x1="620" y1="191" x2="620" y2="110" stroke="#7C2530" stroke-width="2"/>
  <text x="620" y="102" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2023</text>
  <text x="620" y="90" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">GPT-4 / LLaMA</text>
  <text x="620" y="78" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle" font-style="italic">Multimodal + Open</text>

  <!-- 2024+: Modern LLMs -->
  <circle cx="730" cy="200" r="8" fill="#7C2530"/>
  <line x1="730" y1="209" x2="730" y2="275" stroke="#7C2530" stroke-width="1.5"/>
  <text x="730" y="290" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2024+</text>
  <text x="730" y="303" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Reasoning LLMs</text>
  <text x="730" y="316" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle" font-style="italic">MoE, long context</text>

  <!-- Scaling arrow annotation -->
  <rect x="350" y="330" width="260" height="34" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="480" y="348" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">Parameters: 117M (2018) to trillions (2024)</text>
  <text x="480" y="360" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">~10,000x growth in 6 years</text>

  <!-- Architecture branch note -->
  <rect x="50" y="330" width="220" height="34" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="160" y="348" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Three branches: Encoder (BERT),</text>
  <text x="160" y="360" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Decoder (GPT), Enc-Dec (T5)</text>
</svg>
