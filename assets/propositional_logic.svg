<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Propositional Logic — Truth Tables &amp; Gates</text>

  <!-- ===== AND Gate ===== -->
  <text x="120" y="62" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">AND (∧)</text>
  <!-- Gate shape -->
  <path d="M60,80 L60,140 Q60,160 80,160 L100,160 Q140,160 140,140 L140,80 Q140,70 120,70 L80,70 Q60,70 60,80 Z" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <line x1="75" y1="70" x2="75" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="125" y1="70" x2="125" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="100" y2="175" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="75" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">A</text>
  <text x="125" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">B</text>
  <text x="100" y="186" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Out</text>
  <!-- Truth table -->
  <rect x="40" y="195" width="160" height="100" rx="4" fill="#F5EDD8" stroke="#C4A87A" stroke-width="1"/>
  <text x="65" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">A</text>
  <text x="105" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">B</text>
  <text x="155" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">A∧B</text>
  <line x1="40" y1="217" x2="200" y2="217" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="65" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="105" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="160" y="232" font-family="Georgia, serif" font-size="10" fill="#7C2530">0</text>
  <text x="65" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="105" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="160" y="248" font-family="Georgia, serif" font-size="10" fill="#7C2530">0</text>
  <text x="65" y="264" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="105" y="264" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="160" y="264" font-family="Georgia, serif" font-size="10" fill="#7C2530">0</text>
  <text x="65" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="105" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="160" y="280" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>

  <!-- ===== OR Gate ===== -->
  <text x="310" y="62" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">OR (∨)</text>
  <!-- Gate shape -->
  <path d="M250,80 Q280,120 250,160 Q310,140 340,160 Q320,120 340,80 Q310,100 280,80 Z" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <line x1="270" y1="80" x2="270" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="320" y1="80" x2="320" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="295" y1="160" x2="295" y2="175" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="270" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">A</text>
  <text x="320" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">B</text>
  <text x="295" y="186" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Out</text>
  <!-- Truth table -->
  <rect x="230" y="195" width="160" height="100" rx="4" fill="#F5EDD8" stroke="#C4A87A" stroke-width="1"/>
  <text x="255" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">A</text>
  <text x="295" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">B</text>
  <text x="345" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">A∨B</text>
  <line x1="230" y1="217" x2="390" y2="217" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="255" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="295" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="350" y="232" font-family="Georgia, serif" font-size="10" fill="#7C2530">0</text>
  <text x="255" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="295" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="350" y="248" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>
  <text x="255" y="264" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="295" y="264" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="350" y="264" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>
  <text x="255" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="295" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="350" y="280" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>

  <!-- ===== NOT Gate ===== -->
  <text x="500" y="62" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">NOT (¬)</text>
  <!-- Gate shape: triangle with bubble -->
  <polygon points="465,80 535,120 465,160" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <circle cx="540" cy="120" r="5" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <line x1="500" y1="80" x2="500" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="545" y1="120" x2="560" y2="120" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="500" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">A</text>
  <text x="568" y="123" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Out</text>
  <!-- Truth table -->
  <rect x="445" y="195" width="110" height="100" rx="4" fill="#F5EDD8" stroke="#C4A87A" stroke-width="1"/>
  <text x="470" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">A</text>
  <text x="525" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">¬A</text>
  <line x1="445" y1="217" x2="555" y2="217" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="470" y="240" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="528" y="240" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>
  <text x="470" y="265" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="528" y="265" font-family="Georgia, serif" font-size="10" fill="#7C2530">0</text>

  <!-- ===== IMPLIES ===== -->
  <text x="680" y="62" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">IMPLIES (→)</text>
  <!-- Gate shape: stylized arrow -->
  <rect x="630" y="80" width="100" height="80" rx="10" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <text x="680" y="125" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" text-anchor="middle">⇒</text>
  <line x1="655" y1="80" x2="655" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="705" y1="80" x2="705" y2="55" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="680" y1="160" x2="680" y2="175" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="655" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">A</text>
  <text x="705" y="52" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">B</text>
  <text x="680" y="186" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Out</text>
  <!-- Truth table -->
  <rect x="610" y="195" width="160" height="100" rx="4" fill="#F5EDD8" stroke="#C4A87A" stroke-width="1"/>
  <text x="635" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">A</text>
  <text x="675" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">B</text>
  <text x="730" y="212" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">A→B</text>
  <line x1="610" y1="217" x2="770" y2="217" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="635" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="675" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="735" y="232" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>
  <text x="635" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="675" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="735" y="248" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>
  <text x="635" y="264" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="675" y="264" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0</text>
  <text x="735" y="264" font-family="Georgia, serif" font-size="10" fill="#7C2530">0</text>
  <text x="635" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="675" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1</text>
  <text x="735" y="280" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">1</text>

  <!-- De Morgan's Laws at bottom -->
  <rect x="100" y="320" width="600" height="60" rx="6" fill="#F5EDD8" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="340" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">De Morgan's Laws</text>
  <text x="400" y="358" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">¬(A ∧ B) ≡ ¬A ∨ ¬B          ¬(A ∨ B) ≡ ¬A ∧ ¬B</text>
  <text x="400" y="374" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">Negation distributes over connectives by flipping AND ↔ OR</text>
</svg>