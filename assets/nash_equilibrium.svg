<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>

  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Prisoner's Dilemma — Nash Equilibrium</text>

  <!-- Row/Column labels -->
  <text x="240" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" font-weight="bold">Player B</text>
  <text x="340" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2D5A8E">Cooperate</text>
  <text x="520" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2D5A8E">Defect</text>

  <text x="135" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold" transform="rotate(-90, 135, 200)">Player A</text>
  <text x="175" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530">Cooperate</text>
  <text x="175" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530">Defect</text>

  <!-- Grid lines -->
  <rect x="250" y="115" width="360" height="200" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="430" y1="115" x2="430" y2="315" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="250" y1="215" x2="610" y2="215" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Cell: Cooperate/Cooperate -->
  <rect x="251" y="116" width="178" height="98" fill="#FDFAF4"/>
  <text x="340" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7C2530">A: -1</text>
  <text x="340" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E">B: -1</text>

  <!-- Cell: Cooperate/Defect -->
  <rect x="431" y="116" width="178" height="98" fill="#FDFAF4"/>
  <text x="520" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7C2530">A: -3</text>
  <text x="520" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E">B: 0</text>

  <!-- Cell: Defect/Cooperate -->
  <rect x="251" y="216" width="178" height="98" fill="#FDFAF4"/>
  <text x="340" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7C2530">A: 0</text>
  <text x="340" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E">B: -3</text>

  <!-- Cell: Defect/Defect — Nash Equilibrium highlighted -->
  <rect x="431" y="216" width="178" height="98" fill="#C4A87A" fill-opacity="0.35" stroke="#7C2530" stroke-width="3" rx="4"/>
  <text x="520" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7C2530" font-weight="bold">A: -2</text>
  <text x="520" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-weight="bold">B: -2</text>

  <!-- Nash Equilibrium label -->
  <line x1="612" y1="265" x2="660" y2="340" stroke="#7C2530" stroke-width="2"/>
  <text x="665" y="345" font-family="Georgia, serif" font-size="14" fill="#7C2530" font-weight="bold">Nash Equilibrium</text>
  <text x="665" y="365" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">(Neither player gains by</text>
  <text x="665" y="382" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">switching unilaterally)</text>

  <!-- Arrows showing "no incentive to deviate" -->
  <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
  </marker>

  <!-- Arrow from Cooperate/Defect down to Defect/Defect (Player A's best response) -->
  <line x1="490" y1="200" x2="490" y2="225" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,3"/>

  <!-- Arrow from Defect/Cooperate right to Defect/Defect (Player B's best response) -->
  <line x1="418" y1="260" x2="440" y2="260" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <text x="50" y="355" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Payoffs = years in prison (lower is better)</text>
  <text x="50" y="375" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Dashed arrows = best-response deviations</text>
</svg>