<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Generating Functions: Three Views</text>

  <!-- ===== LEFT PANEL: Sequence → Power Series ===== -->
  <rect x="16" y="48" width="230" height="200" rx="6" fill="#FFF8EE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="131" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Sequence → Function</text>

  <!-- Sequence boxes -->
  <rect x="28" y="78" width="36" height="28" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="46" y="97" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">a₀</text>

  <rect x="70" y="78" width="36" height="28" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="88" y="97" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">a₁</text>

  <rect x="112" y="78" width="36" height="28" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="130" y="97" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">a₂</text>

  <rect x="154" y="78" width="36" height="28" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="172" y="97" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">a₃</text>

  <text x="204" y="97" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">…</text>

  <!-- Arrow down -->
  <line x1="131" y1="112" x2="131" y2="130" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="125,128 131,140 137,128" fill="#C4A87A"/>

  <!-- Power series labels -->
  <text x="131" y="160" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">G(x) = a₀ + a₁x + a₂x² + …</text>

  <line x1="28" y1="172" x2="215" y2="172" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Coefficient arrows -->
  <text x="131" y="192" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">coefficient of xⁿ  ←→  aₙ</text>
  <text x="131" y="210" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">differentiate  →  shift index</text>
  <text x="131" y="226" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">multiply  →  convolve</text>
  <text x="131" y="242" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">evaluate at 1  →  sum aₙ</text>

  <!-- ===== MIDDLE PANEL: Comparison Table ===== -->
  <rect x="258" y="48" width="290" height="200" rx="6" fill="#FFF8EE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="403" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">The Zoo of Generating Functions</text>

  <!-- Table header -->
  <rect x="266" y="74" width="274" height="20" rx="2" fill="#C4A87A" opacity="0.4"/>
  <text x="300" y="87" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Type</text>
  <text x="415" y="87" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Formula</text>
  <text x="510" y="87" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Use</text>

  <!-- Row 1: OGF -->
  <rect x="266" y="94" width="274" height="22" fill="#FDFAF4"/>
  <text x="300" y="109" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold" text-anchor="middle">OGF</text>
  <text x="415" y="109" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Σ aₙ xⁿ</text>
  <text x="510" y="109" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Counting (unlabeled)</text>

  <!-- Row 2: EGF -->
  <rect x="266" y="116" width="274" height="22" fill="#F5F0E8"/>
  <text x="300" y="131" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold" text-anchor="middle">EGF</text>
  <text x="415" y="131" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Σ aₙ xⁿ/n!</text>
  <text x="510" y="131" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Counting (labeled)</text>

  <!-- Row 3: PGF -->
  <rect x="266" y="138" width="274" height="22" fill="#FDFAF4"/>
  <text x="300" y="153" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold" text-anchor="middle">PGF</text>
  <text x="415" y="153" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">E[z^X] = Σ P(X=n) zⁿ</text>
  <text x="510" y="153" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Integer r.v.</text>

  <!-- Row 4: MGF -->
  <rect x="266" y="160" width="274" height="22" fill="#F5F0E8"/>
  <text x="300" y="175" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold" text-anchor="middle">MGF</text>
  <text x="415" y="175" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">E[e^{tX}]</text>
  <text x="510" y="175" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Moments M^(k)(0)</text>

  <!-- Row 5: CF -->
  <rect x="266" y="182" width="274" height="22" fill="#FDFAF4"/>
  <text x="300" y="197" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold" text-anchor="middle">CF</text>
  <text x="415" y="197" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">E[e^{itX}]</text>
  <text x="510" y="197" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Always exists; CLT</text>

  <!-- Row 6: CGF -->
  <rect x="266" y="204" width="274" height="22" fill="#F5F0E8"/>
  <text x="300" y="219" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold" text-anchor="middle">CGF</text>
  <text x="415" y="219" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">log E[e^{tX}]</text>
  <text x="510" y="219" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Cumulants κₙ</text>

  <!-- vertical dividers -->
  <line x1="332" y1="74" x2="332" y2="226" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="464" y1="74" x2="464" y2="226" stroke="#D4C5A9" stroke-width="1"/>

  <!-- ===== RIGHT PANEL: Multiplication = Convolution ===== -->
  <rect x="560" y="48" width="222" height="200" rx="6" fill="#FFF8EE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="671" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Multiply = Convolve</text>

  <!-- G_A box -->
  <rect x="574" y="80" width="80" height="32" rx="5" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="614" y="100" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-style="italic">G_A(x)</text>

  <!-- × symbol -->
  <text x="665" y="100" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle">×</text>

  <!-- G_B box -->
  <rect x="676" y="80" width="80" height="32" rx="5" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="716" y="100" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-style="italic">G_B(x)</text>

  <!-- Arrow down -->
  <line x1="671" y1="118" x2="671" y2="133" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="665,131 671,143 677,131" fill="#C4A87A"/>

  <!-- G_C box -->
  <rect x="611" y="143" width="120" height="32" rx="5" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="671" y="163" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">G_C(x)</text>

  <line x1="571" y1="183" x2="762" y2="183" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="671" y="198" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Cₙ = Σ Aₖ B_{n−k}</text>
  <text x="671" y="214" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle" font-style="italic">convolution of sequences</text>
  <text x="671" y="230" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">e.g. sum of indep. r.v.</text>

  <!-- ===== BOTTOM PANEL: CLT via MGF ===== -->
  <rect x="16" y="262" width="766" height="112" rx="6" fill="#FFF8EE" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="50" y="280" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530">CLT via MGFs</text>

  <!-- Step 1 -->
  <rect x="28" y="288" width="160" height="68" rx="4" fill="#2D5A8E" opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="108" y="306" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">i.i.d. X₁,…,Xₙ</text>
  <text x="108" y="320" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">MGF: M(t)</text>
  <text x="108" y="334" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">mean μ, var σ²</text>
  <text x="108" y="348" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">log M(t) ≈ μt + σ²t²/2</text>

  <!-- Arrow -->
  <line x1="196" y1="322" x2="218" y2="322" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="215,316 228,322 215,328" fill="#C4A87A"/>
  <text x="207" y="315" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">standardize</text>

  <!-- Step 2 -->
  <rect x="228" y="288" width="200" height="68" rx="4" fill="#7C2530" opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="328" y="306" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">MGF of Sₙ = (ΣXᵢ − nμ)/(σ√n)</text>
  <text x="328" y="322" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">= [M(t/σ√n) · e^{−μt/σ√n}]ⁿ</text>
  <text x="328" y="338" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">log → n · [t²/2n + O(n⁻³/²)]</text>
  <text x="328" y="354" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">= t²/2 as n → ∞</text>

  <!-- Arrow -->
  <line x1="436" y1="322" x2="458" y2="322" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="455,316 468,322 455,328" fill="#C4A87A"/>
  <text x="447" y="315" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">n → ∞</text>

  <!-- Step 3 -->
  <rect x="468" y="288" width="160" height="68" rx="4" fill="#5C3D1E" opacity="0.08" stroke="#5C3D1E" stroke-width="1"/>
  <text x="548" y="306" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">MGF → e^{t²/2}</text>
  <text x="548" y="322" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">= Gaussian MGF</text>
  <text x="548" y="338" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">∴ Sₙ → N(0,1)</text>
  <text x="548" y="354" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">CLT proved!</text>

  <!-- Cumulant note -->
  <rect x="644" y="288" width="126" height="68" rx="4" fill="#C4A87A" opacity="0.15" stroke="#C4A87A" stroke-width="1"/>
  <text x="707" y="304" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Gaussian cumulants</text>
  <text x="707" y="319" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">κ₁ = μ</text>
  <text x="707" y="333" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">κ₂ = σ²</text>
  <text x="707" y="347" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle">κₙ = 0 for n ≥ 3</text>
  <text x="707" y="360" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">(characterizes Gaussian)</text>
</svg>
