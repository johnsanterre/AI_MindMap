<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="42" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Bernhard Schölkopf</text>
  <line x1="200" y1="52" x2="600" y2="52" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Central hub -->
  <ellipse cx="400" cy="200" rx="90" ry="40" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Bernhard</text>
  <text x="400" y="213" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Schölkopf</text>

  <!-- Spoke lines -->
  <line x1="310" y1="190" x2="170" y2="120" stroke="#C4A87A" stroke-width="2"/>
  <line x1="490" y1="190" x2="640" y2="120" stroke="#C4A87A" stroke-width="2"/>
  <line x1="340" y1="230" x2="140" y2="310" stroke="#C4A87A" stroke-width="2"/>
  <line x1="460" y1="230" x2="620" y2="310" stroke="#C4A87A" stroke-width="2"/>
  <line x1="400" y1="240" x2="400" y2="330" stroke="#C4A87A" stroke-width="2"/>

  <!-- Node 1: Kernel Methods / SVM (top-left) -->
  <ellipse cx="130" cy="105" rx="85" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="130" y="100" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Kernel Methods</text>
  <text x="130" y="117" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">&amp; SVMs</text>

  <!-- Node 2: Causal Inference (top-right) -->
  <ellipse cx="680" cy="105" rx="80" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="680" y="100" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Causal</text>
  <text x="680" y="117" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Inference</text>

  <!-- Node 3: Independent Component Analysis (bottom-left) -->
  <ellipse cx="110" cy="320" rx="85" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="110" y="315" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Independent</text>
  <text x="110" y="332" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Component Analysis</text>

  <!-- Node 4: Tübingen AI (bottom-right) -->
  <ellipse cx="650" cy="320" rx="75" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="650" y="315" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Tübingen</text>
  <text x="650" y="332" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">AI Ecosystem</text>

  <!-- Node 5: Max Planck Institute (bottom-center) -->
  <ellipse cx="400" cy="350" rx="95" ry="32" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="345" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Max Planck Institute</text>
  <text x="400" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">for Intelligent Systems</text>

  <!-- Decorative arc connecting kernel methods and causal inference through the top -->
  <path d="M 215 95 Q 400 30 600 95" fill="none" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="65" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">from kernels to causality</text>
</svg>