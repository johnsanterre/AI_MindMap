<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">Bellman Equation: Recursive Value Decomposition</text>

  <!-- State s node -->
  <circle cx="120" cy="190" r="40" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="3"/>
  <text x="120" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#2D5A8E" font-weight="bold">s</text>
  <text x="120" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">state</text>

  <!-- Action a -->
  <rect x="230" y="160" width="80" height="50" rx="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <text x="270" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C3D1E" font-weight="bold">a</text>
  <text x="270" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">action</text>

  <!-- Arrow s -> a -->
  <line x1="160" y1="188" x2="228" y2="185" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Reward r -->
  <rect x="370" y="100" width="80" height="44" rx="8" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="410" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">r</text>
  <text x="410" y="137" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">reward</text>

  <!-- Arrow a -> r -->
  <line x1="300" y1="165" x2="370" y2="130" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Next state s' -->
  <circle cx="500" cy="190" r="40" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="3"/>
  <text x="500" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#2D5A8E" font-weight="bold">s'</text>
  <text x="500" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">next state</text>

  <!-- Arrow a -> s' -->
  <line x1="310" y1="185" x2="458" y2="188" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Transition probability label -->
  <text x="390" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-style="italic">P(s'|s,a)</text>

  <!-- Arrow from s' to V(s') -->
  <path d="M 540 190 Q 600 190 620 190" fill="none" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- V(s') box -->
  <rect x="622" y="164" width="90" height="52" rx="10" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="2"/>
  <text x="667" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#FDFAF4" font-weight="bold">V(s')</text>
  <text x="667" y="204" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C4A87A">future value</text>

  <!-- Gamma discount label -->
  <text x="582" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-style="italic">&gamma;</text>

  <!-- Recursive loop arrow from V(s') curving back to s -->
  <path d="M 667 164 Q 667 60 120 60 Q 50 60 80 150" fill="none" stroke="#C4A87A" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowTan)"/>
  <text x="390" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-style="italic">recursive decomposition</text>

  <!-- Bellman equation at bottom -->
  <rect x="120" y="280" width="560" height="70" rx="10" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#7C2530" font-weight="bold">V(s) = max [ R(s,a) + &gamma; &Sigma; P(s'|s,a) V(s') ]</text>
  <text x="400" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">immediate reward + discounted future value = total value</text>

  <!-- Plus sign between r and gamma*V -->
  <text x="410" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">+</text>
  <text x="355" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530">r</text>
  <text x="465" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2D5A8E">&gamma;V(s')</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
    <marker id="arrowTan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>