<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" />
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#D4C5A9" stroke-width="2" />

  <!-- Panel dividers -->
  <line x1="270" y1="10" x2="270" y2="390" stroke="#D4C5A9" stroke-width="1.5" />
  <line x1="530" y1="10" x2="530" y2="390" stroke="#D4C5A9" stroke-width="1.5" />

  <!-- ===== LEFT PANEL ===== -->
  <!-- Title -->
  <text x="140" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#7C2530">ICLR</text>
  <text x="140" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">International Conference on</text>
  <text x="140" y="93" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Learning Representations</text>

  <!-- Divider under title -->
  <line x1="20" y1="103" x2="258" y2="103" stroke="#C4A87A" stroke-width="1" />

  <!-- Key facts -->
  <text x="140" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E">Key Facts</text>

  <text x="25" y="141" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Founded:</text>
  <text x="100" y="141" font-family="Georgia, serif" font-size="10.5" fill="#1a1a1a">2013</text>

  <text x="25" y="158" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Founders:</text>
  <text x="100" y="158" font-family="Georgia, serif" font-size="10.5" fill="#1a1a1a">Bengio &amp; LeCun</text>

  <text x="25" y="175" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Timing:</text>
  <text x="100" y="175" font-family="Georgia, serif" font-size="10.5" fill="#1a1a1a">April / May</text>

  <text x="25" y="192" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Location:</text>
  <text x="100" y="192" font-family="Georgia, serif" font-size="10.5" fill="#1a1a1a">Varies (rotating)</text>

  <!-- Divider -->
  <line x1="20" y1="203" x2="258" y2="203" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="4,3" />

  <!-- Scale stats heading -->
  <text x="140" y="221" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E">Scale (2024)</text>

  <!-- Submission bar -->
  <text x="25" y="240" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Submissions</text>
  <rect x="105" y="228" width="145" height="14" rx="2" fill="#D4C5A9" />
  <rect x="105" y="228" width="145" height="14" rx="2" fill="#7C2530" opacity="0.85" />
  <text x="253" y="240" text-anchor="end" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#FDFAF4">~9,000</text>

  <!-- Accepted bar -->
  <text x="25" y="262" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Accepted</text>
  <rect x="105" y="250" width="145" height="14" rx="2" fill="#D4C5A9" />
  <rect x="105" y="250" width="38" height="14" rx="2" fill="#2D5A8E" opacity="0.85" />
  <text x="148" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#FDFAF4">~1,800</text>

  <!-- Acceptance rate callout -->
  <rect x="60" y="278" width="160" height="26" rx="4" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="0.8" />
  <text x="140" y="291" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Acceptance rate:</text>
  <text x="140" y="302" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530">~26% (2024)</text>

  <!-- Review model note -->
  <text x="140" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Review system:</text>
  <text x="140" y="347" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E">OpenReview (public)</text>

  <!-- Tier badge -->
  <rect x="60" y="360" width="160" height="22" rx="11" fill="#7C2530" />
  <text x="140" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#FDFAF4">Top-3 ML Venue</text>

  <!-- ===== CENTER PANEL ===== -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530">OpenReview Model</text>
  <line x1="280" y1="43" x2="520" y2="43" stroke="#C4A87A" stroke-width="1" />

  <text x="400" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" font-style="italic" fill="#5C3D1E">Unprecedented transparency in academic peer review</text>

  <!-- Step 1: Paper Submitted -->
  <rect x="310" y="75" width="180" height="38" rx="5" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1.2" />
  <text x="400" y="91" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E">1. Paper Submitted</text>
  <text x="400" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">to OpenReview.net</text>

  <!-- Arrow -->
  <line x1="400" y1="113" x2="400" y2="128" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Step 2: Public Reviews -->
  <rect x="310" y="130" width="180" height="38" rx="5" fill="#7C2530" opacity="0.10" stroke="#7C2530" stroke-width="1.2" />
  <text x="400" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530">2. Reviews Posted</text>
  <text x="400" y="161" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Publicly visible to all</text>

  <!-- Arrow -->
  <line x1="400" y1="168" x2="400" y2="183" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Step 3: Author Response + Community -->
  <rect x="310" y="185" width="180" height="50" rx="5" fill="#5C3D1E" opacity="0.09" stroke="#5C3D1E" stroke-width="1.2" />
  <text x="400" y="201" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E">3. Open Discussion</text>
  <text x="400" y="216" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Authors respond to reviewers</text>
  <text x="400" y="229" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Community may comment</text>

  <!-- Arrow -->
  <line x1="400" y1="235" x2="400" y2="250" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Step 4: Decision -->
  <rect x="310" y="252" width="180" height="38" rx="5" fill="#C4A87A" opacity="0.30" stroke="#C4A87A" stroke-width="1.5" />
  <text x="400" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E">4. Decision &amp; Archive</text>
  <text x="400" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Accept / Reject (all visible)</text>

  <!-- Contrast note -->
  <rect x="285" y="305" width="230" height="40" rx="4" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" />
  <text x="400" y="319" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">vs. traditional journals:</text>
  <text x="400" y="333" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#7C2530">closed, anonymous, no appeal</text>

  <!-- Even rejected papers label -->
  <text x="400" y="363" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#5C3D1E">Rejected papers remain publicly archived —</text>
  <text x="400" y="377" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#5C3D1E">a unique educational resource</text>

  <!-- ===== RIGHT PANEL ===== -->
  <text x="660" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530">Landmark Papers</text>
  <line x1="540" y1="43" x2="790" y2="43" stroke="#C4A87A" stroke-width="1" />

  <!-- Paper entries -->
  <!-- VAE 2014 -->
  <rect x="545" y="55" width="238" height="42" rx="4" fill="#2D5A8E" opacity="0.08" stroke="#2D5A8E" stroke-width="0.8" />
  <text x="558" y="71" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">VAE</text>
  <text x="775" y="71" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" font-weight="bold">2014</text>
  <text x="558" y="86" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Kingma &amp; Welling — latent variable</text>
  <text x="558" y="97" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">generative models with reparameterization</text>

  <!-- GAN follow-ups 2015 -->
  <rect x="545" y="103" width="238" height="42" rx="4" fill="#7C2530" opacity="0.07" stroke="#7C2530" stroke-width="0.8" />
  <text x="558" y="119" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">DCGAN</text>
  <text x="775" y="119" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" font-weight="bold">2016</text>
  <text x="558" y="134" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Radford et al. — deep convolutional</text>
  <text x="558" y="145" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">GAN architecture &amp; training tricks</text>

  <!-- NAS 2017 -->
  <rect x="545" y="151" width="238" height="42" rx="4" fill="#5C3D1E" opacity="0.08" stroke="#5C3D1E" stroke-width="0.8" />
  <text x="558" y="167" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">Neural Architecture Search</text>
  <text x="775" y="167" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" font-weight="bold">2017</text>
  <text x="558" y="182" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Zoph &amp; Le — learning model architectures</text>
  <text x="558" y="193" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">with reinforcement learning</text>

  <!-- BERT 2019 -->
  <rect x="545" y="199" width="238" height="42" rx="4" fill="#2D5A8E" opacity="0.08" stroke="#2D5A8E" stroke-width="0.8" />
  <text x="558" y="215" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">BERT</text>
  <text x="775" y="215" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" font-weight="bold">2019</text>
  <text x="558" y="230" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Devlin et al. — bidirectional transformer</text>
  <text x="558" y="241" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">pretraining redefined NLP</text>

  <!-- ViT 2021 -->
  <rect x="545" y="247" width="238" height="42" rx="4" fill="#7C2530" opacity="0.07" stroke="#7C2530" stroke-width="0.8" />
  <text x="558" y="263" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530">Vision Transformer (ViT)</text>
  <text x="775" y="263" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" font-weight="bold">2021</text>
  <text x="558" y="278" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Dosovitskiy et al. — pure transformer</text>
  <text x="558" y="289" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">beats CNNs on image classification</text>

  <!-- DDPM 2021 -->
  <rect x="545" y="295" width="238" height="42" rx="4" fill="#5C3D1E" opacity="0.08" stroke="#5C3D1E" stroke-width="0.8" />
  <text x="558" y="311" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E">DDPM (Diffusion)</text>
  <text x="775" y="311" text-anchor="end" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" font-weight="bold">2021</text>
  <text x="558" y="326" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Ho et al. — denoising diffusion models</text>
  <text x="558" y="337" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">that power modern image synthesis</text>

  <!-- Footer note -->
  <text x="664" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#5C3D1E">All papers publicly archived with</text>
  <text x="664" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#5C3D1E">full reviewer discussions on OpenReview</text>

</svg>
