<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Instruction Tuning Pipeline</text>

  <!-- ===== Stage 1: Pre-trained LLM ===== -->
  <rect x="30" y="70" width="190" height="200" rx="8" fill="#EAE3D2" stroke="#C4A87A" stroke-width="2"/>
  <text x="125" y="96" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Pre-trained LLM</text>
  <line x1="60" y1="104" x2="190" y2="104" stroke="#C4A87A" stroke-width="1"/>
  <text x="125" y="124" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Trained on trillions of</text>
  <text x="125" y="140" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">tokens from the web</text>
  <!-- Example prompt box -->
  <rect x="48" y="152" width="154" height="50" rx="4" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1"/>
  <text x="125" y="169" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">Input: "The capital of"</text>
  <text x="125" y="185" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">Output: "France is Paris,</text>
  <text x="125" y="198" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">a city known for…"</text>
  <text x="125" y="236" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">predicts next token</text>
  <text x="125" y="252" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">(no instruction sense)</text>

  <!-- Arrow 1 -->
  <line x1="222" y1="170" x2="270" y2="170" stroke="#5C3D1E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 2: Instruction Fine-tuning ===== -->
  <rect x="272" y="70" width="256" height="200" rx="8" fill="#D9E8F5" stroke="#2D5A8E" stroke-width="2"/>
  <text x="400" y="96" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Instruction Fine-tuning</text>
  <line x1="295" y1="104" x2="505" y2="104" stroke="#2D5A8E" stroke-width="1"/>
  <text x="400" y="122" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Supervised fine-tuning on</text>
  <text x="400" y="137" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">(instruction → response) pairs</text>

  <!-- Example pair boxes -->
  <rect x="288" y="148" width="232" height="40" rx="4" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1"/>
  <text x="404" y="164" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Summarize: [article text]</text>
  <text x="404" y="180" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">→ [concise summary]</text>

  <rect x="288" y="196" width="232" height="40" rx="4" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1"/>
  <text x="404" y="212" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Translate to French: "Hello"</text>
  <text x="404" y="228" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">→ "Bonjour"</text>

  <text x="400" y="254" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Small curated dataset (1K–100K pairs)</text>

  <!-- Arrow 2 -->
  <line x1="530" y1="170" x2="578" y2="170" stroke="#5C3D1E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3: Instruction-Following Model ===== -->
  <rect x="580" y="70" width="190" height="200" rx="8" fill="#EAF2E8" stroke="#5C3D1E" stroke-width="2"/>
  <text x="675" y="90" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Instruction-Following</text>
  <text x="675" y="107" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Model</text>
  <line x1="600" y1="115" x2="750" y2="115" stroke="#5C3D1E" stroke-width="1"/>
  <rect x="598" y="124" width="154" height="50" rx="4" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="675" y="141" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">Input: "Summarize this</text>
  <text x="675" y="154" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">article in 2 sentences"</text>
  <text x="675" y="168" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">→ [2-sentence summary]</text>

  <text x="675" y="198" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">follows instructions</text>
  <text x="675" y="214" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">concisely &amp; on-topic</text>

  <!-- Optional RLHF arrow at bottom -->
  <text x="675" y="248" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">↓ optional next step</text>
  <text x="675" y="262" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">RLHF / DPO</text>

  <!-- Bottom legend -->
  <rect x="30" y="294" width="740" height="80" rx="6" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="316" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Key Milestones</text>
  <text x="130" y="338" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">FLAN (2021)</text>
  <text x="130" y="354" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">60+ NLP tasks</text>
  <text x="130" y="368" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">zero-shot generalization</text>
  <text x="400" y="338" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">InstructGPT (2022)</text>
  <text x="400" y="354" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Human demos + RLHF</text>
  <text x="400" y="368" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">GPT-3 → ChatGPT-era</text>
  <text x="660" y="338" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Alpaca (2023)</text>
  <text x="660" y="354" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">52K synthetic pairs</text>
  <text x="660" y="368" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">quality &gt; quantity</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>
