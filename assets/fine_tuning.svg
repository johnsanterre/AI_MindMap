<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#5C3D1E">Fine-Tuning &mdash; Adapting a Pretrained Model to a Downstream Task</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- ===== TOP: Pipeline from Pretrained to Downstream ===== -->

  <!-- Pretrained Model (large box) -->
  <rect x="30" y="55" width="180" height="100" rx="8" fill="#B0C8E8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="120" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D5A8E">Pretrained Model</text>
  <text x="120" y="96" text-anchor="middle" font-size="10" fill="#2D5A8E">General knowledge</text>
  <text x="120" y="112" text-anchor="middle" font-size="10" fill="#2D5A8E">from massive corpus</text>
  <text x="120" y="130" text-anchor="middle" font-size="10" font-style="italic" fill="#2D5A8E">All parameters frozen</text>

  <!-- Arrow: pretrained to fine-tuning -->
  <line x1="210" y1="105" x2="270" y2="105" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arw)"/>
  <text x="240" y="96" text-anchor="middle" font-size="9" fill="#5C3D1E">adapt</text>

  <!-- Fine-Tuning Process (central box) -->
  <rect x="272" y="50" width="230" height="110" rx="8" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="387" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fine-Tuning</text>

  <!-- Inner boxes for methods -->
  <rect x="284" y="84" width="96" height="32" rx="4" fill="#A84555"/>
  <text x="332" y="104" text-anchor="middle" font-size="10" fill="white">Full Fine-Tuning</text>

  <rect x="390" y="84" width="100" height="32" rx="4" fill="#A84555"/>
  <text x="440" y="104" text-anchor="middle" font-size="10" fill="white">PEFT (LoRA, etc.)</text>

  <!-- Task-specific data label -->
  <rect x="310" y="126" width="130" height="24" rx="4" fill="#F5ECD7" stroke="#C4A87A" stroke-width="1"/>
  <text x="375" y="142" text-anchor="middle" font-size="10" fill="#5C3D1E">+ Task-Specific Data</text>

  <!-- Arrow: fine-tuning to downstream -->
  <line x1="502" y1="105" x2="562" y2="105" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Downstream Task (result) -->
  <rect x="564" y="55" width="210" height="100" rx="8" fill="#EAF3E0" stroke="#5C3D1E" stroke-width="2"/>
  <text x="669" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E">Adapted Model</text>

  <!-- Four example downstream tasks -->
  <rect x="578" y="92" width="84" height="22" rx="3" fill="#D4E8C4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="620" y="107" text-anchor="middle" font-size="9" fill="#5C3D1E">Sentiment</text>

  <rect x="578" y="120" width="84" height="22" rx="3" fill="#D4E8C4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="620" y="135" text-anchor="middle" font-size="9" fill="#5C3D1E">Medical QA</text>

  <rect x="676" y="92" width="84" height="22" rx="3" fill="#D4E8C4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="718" y="107" text-anchor="middle" font-size="9" fill="#5C3D1E">Code Gen</text>

  <rect x="676" y="120" width="84" height="22" rx="3" fill="#D4E8C4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="718" y="135" text-anchor="middle" font-size="9" fill="#5C3D1E">Chatbot</text>

  <!-- ===== Divider ===== -->
  <line x1="10" y1="178" x2="790" y2="178" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E">Full Fine-Tuning vs Parameter-Efficient Fine-Tuning (PEFT)</text>

  <!-- ===== LEFT: Full Fine-Tuning ===== -->
  <rect x="30" y="212" width="350" height="140" rx="6" fill="none" stroke="#7C2530" stroke-width="2"/>
  <text x="205" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C2530">Full Fine-Tuning</text>

  <!-- Weight matrix representation -->
  <rect x="50" y="248" width="120" height="80" rx="4" fill="#7C2530" opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="80" y1="248" x2="80" y2="328" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="110" y1="248" x2="110" y2="328" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="140" y1="248" x2="140" y2="328" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="268" x2="170" y2="268" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="288" x2="170" y2="288" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="308" x2="170" y2="308" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <text x="110" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C2530">W</text>
  <text x="110" y="344" text-anchor="middle" font-size="9" fill="#7C2530">All params updated</text>

  <!-- Bullet points -->
  <text x="195" y="258" font-size="10" fill="#5C3D1E">&#x2022; Updates every parameter</text>
  <text x="195" y="276" font-size="10" fill="#5C3D1E">&#x2022; Maximum expressiveness</text>
  <text x="195" y="294" font-size="10" fill="#5C3D1E">&#x2022; Risk: catastrophic forgetting</text>
  <text x="195" y="312" font-size="10" fill="#5C3D1E">&#x2022; High GPU memory cost</text>
  <text x="195" y="330" font-size="10" fill="#5C3D1E">&#x2022; Needs full optimizer states</text>

  <!-- ===== RIGHT: PEFT / LoRA ===== -->
  <rect x="420" y="212" width="360" height="140" rx="6" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <text x="600" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D5A8E">Parameter-Efficient (LoRA / Prefix / Adapter)</text>

  <!-- Frozen weight matrix -->
  <rect x="440" y="248" width="90" height="80" rx="4" fill="#E8E8E8" stroke="#999" stroke-width="1.5"/>
  <text x="485" y="282" text-anchor="middle" font-size="10" fill="#777">W (frozen)</text>

  <!-- Plus sign -->
  <text x="543" y="292" text-anchor="middle" font-size="18" font-weight="bold" fill="#2D5A8E">+</text>

  <!-- LoRA low-rank matrices B and A -->
  <rect x="558" y="248" width="24" height="80" rx="3" fill="#2D5A8E"/>
  <text x="570" y="292" text-anchor="middle" font-size="10" font-weight="bold" fill="white">B</text>

  <rect x="590" y="270" width="56" height="24" rx="3" fill="#2D5A8E"/>
  <text x="618" y="286" text-anchor="middle" font-size="10" font-weight="bold" fill="white">A</text>

  <text x="604" y="258" text-anchor="middle" font-size="9" fill="#2D5A8E">rank r</text>
  <text x="570" y="344" text-anchor="middle" font-size="9" fill="#2D5A8E">Low-rank adapters</text>

  <!-- Bullet points -->
  <text x="660" y="262" font-size="10" fill="#5C3D1E">&#x2022; 0.1&#x2013;1% params</text>
  <text x="660" y="280" font-size="10" fill="#5C3D1E">&#x2022; No forgetting</text>
  <text x="660" y="298" font-size="10" fill="#5C3D1E">&#x2022; Low memory</text>
  <text x="660" y="316" font-size="10" fill="#5C3D1E">&#x2022; Composable</text>

  <!-- Legend bar -->
  <rect x="10" y="362" width="780" height="30" rx="5" fill="#F5ECD7" stroke="#C4A87A" stroke-width="1"/>
  <rect x="22" y="372" width="12" height="12" rx="2" fill="#7C2530"/>
  <text x="40" y="382" font-size="10" fill="#5C3D1E">Updated weights</text>
  <rect x="160" y="372" width="12" height="12" rx="2" fill="#E8E8E8" stroke="#999" stroke-width="1"/>
  <text x="178" y="382" font-size="10" fill="#5C3D1E">Frozen weights</text>
  <rect x="290" y="372" width="12" height="12" rx="2" fill="#2D5A8E"/>
  <text x="308" y="382" font-size="10" fill="#5C3D1E">LoRA adapters (trainable)</text>
  <rect x="470" y="372" width="12" height="12" rx="2" fill="#EAF3E0" stroke="#5C3D1E" stroke-width="1"/>
  <text x="488" y="382" font-size="10" fill="#5C3D1E">Downstream task</text>
  <text x="700" y="382" text-anchor="middle" font-size="9" font-style="italic" fill="#888">W' = W + BA</text>
</svg>
