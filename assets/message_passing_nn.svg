<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Message Passing Neural Networks</text>

  <!-- Section dividers -->
  <line x1="280" y1="45" x2="280" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="540" y1="45" x2="540" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== SECTION 1: Graph with messages ===== -->
  <text x="140" y="62" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">1. Gather Messages</text>

  <!-- Edges -->
  <line x1="90" y1="130" x2="190" y2="110" stroke="#C4A87A" stroke-width="2"/>
  <line x1="90" y1="130" x2="90"  y2="230" stroke="#C4A87A" stroke-width="2"/>
  <line x1="90" y1="130" x2="190" y2="230" stroke="#C4A87A" stroke-width="2"/>
  <line x1="190" y1="110" x2="190" y2="230" stroke="#C4A87A" stroke-width="2"/>
  <line x1="90"  y1="230" x2="190" y2="230" stroke="#C4A87A" stroke-width="2"/>

  <!-- Message arrows toward center node (node v) -->
  <polygon points="118,140 108,136 112,146" fill="#7C2530"/>
  <polygon points="162,122 168,132 158,128" fill="#7C2530"/>
  <polygon points="96,195  86,195  92,185"  fill="#7C2530"/>

  <!-- Nodes -->
  <circle cx="90"  cy="130" r="16" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="190" cy="110" r="16" fill="#C4A87A" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="90"  cy="230" r="16" fill="#C4A87A" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="190" cy="230" r="16" fill="#C4A87A" stroke="#FDFAF4" stroke-width="2"/>

  <text x="90"  y="134" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">v</text>
  <text x="190" y="114" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">u&#8321;</text>
  <text x="90"  y="234" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">u&#8322;</text>
  <text x="190" y="234" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">u&#8323;</text>

  <!-- Message labels -->
  <text x="155" y="105" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">m&#8321;</text>
  <text x="72"  y="183" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">m&#8322;</text>
  <text x="152" y="195" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">m&#8323;</text>

  <!-- Formula box -->
  <rect x="40" y="270" width="200" height="50" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="290" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">m&#7522;&#8594;v = MSG(h&#7522;, h&#7525;, e&#7522;&#7525;)</text>
  <text x="140" y="308" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">message function</text>

  <!-- ===== SECTION 2: Aggregate ===== -->
  <text x="410" y="62" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">2. Aggregate</text>

  <!-- Incoming message arrows converging -->
  <line x1="310" y1="110" x2="390" y2="170" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="310" y1="180" x2="390" y2="175" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="310" y1="250" x2="390" y2="180" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Message labels -->
  <text x="300" y="108" font-family="Georgia, serif" font-size="10" fill="#7C2530">m&#8321;</text>
  <text x="300" y="178" font-family="Georgia, serif" font-size="10" fill="#7C2530">m&#8322;</text>
  <text x="300" y="248" font-family="Georgia, serif" font-size="10" fill="#7C2530">m&#8323;</text>

  <!-- Aggregation circle -->
  <circle cx="410" cy="175" r="28" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="410" y="171" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">AGG</text>
  <text x="410" y="185" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">(&#931; or max)</text>

  <!-- Output arrow -->
  <line x1="438" y1="175" x2="500" y2="175" stroke="#2D5A8E" stroke-width="2"/>
  <polygon points="500,175 492,170 492,180" fill="#2D5A8E"/>

  <!-- Aggregated result -->
  <rect x="500" y="160" width="30" height="30" rx="3" fill="#FFF8EC" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="515" y="180" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">M&#7525;</text>

  <!-- Formula box -->
  <rect x="310" y="270" width="200" height="50" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="410" y="290" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">M&#7525; = AGG({m&#7522;&#8594;v})</text>
  <text x="410" y="308" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">permutation invariant</text>

  <!-- ===== SECTION 3: Update ===== -->
  <text x="670" y="62" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">3. Update</text>

  <!-- Old state -->
  <rect x="580" y="120" width="40" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="600" y="140" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">h&#7525;</text>

  <!-- Aggregated messages -->
  <rect x="580" y="200" width="40" height="30" rx="3" fill="#FFF8EC" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="600" y="220" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">M&#7525;</text>

  <!-- Arrows to update box -->
  <line x1="620" y1="135" x2="660" y2="170" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="620" y1="215" x2="660" y2="180" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Update function box -->
  <rect x="660" y="157" width="60" height="36" rx="4" fill="#7C2530" stroke="#5C3D1E" stroke-width="1"/>
  <text x="690" y="172" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">UPDATE</text>
  <text x="690" y="186" font-family="Georgia, serif" font-size="9"  fill="#FDFAF4" text-anchor="middle">(MLP)</text>

  <!-- Output arrow -->
  <line x1="690" y1="193" x2="690" y2="240" stroke="#7C2530" stroke-width="2"/>
  <polygon points="690,245 685,237 695,237" fill="#7C2530"/>

  <!-- New state -->
  <rect x="665" y="245" width="50" height="32" rx="4" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="690" y="266" font-family="Georgia, serif" font-size="11" fill="white" text-anchor="middle">h&#7525;&#8242;</text>

  <!-- Formula box -->
  <rect x="570" y="300" width="200" height="50" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="670" y="320" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">h&#7525;&#8242; = UPD(h&#7525;, M&#7525;)</text>
  <text x="670" y="338" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">new node embedding</text>

  <!-- Bottom caption -->
  <text x="400" y="385" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">One message-passing layer: gather neighbor messages, aggregate, update each node</text>
</svg>