<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Probabilistic Graphical Models</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="380" stroke="#D4C5A9" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- Left: Directed (Bayesian Network) -->
  <text x="200" y="75" font-family="Georgia, serif" font-size="17" fill="#7C2530" text-anchor="middle" font-weight="bold">Directed (Bayesian Network)</text>

  <!-- Nodes -->
  <circle cx="200" cy="130" r="28" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="200" y="135" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle">A</text>

  <circle cx="120" cy="230" r="28" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="120" y="235" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle">B</text>

  <circle cx="280" cy="230" r="28" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="280" y="235" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle">C</text>

  <circle cx="200" cy="330" r="28" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="200" y="335" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle">D</text>

  <!-- Directed arrows -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#7C2530">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>
  <line x1="180" y1="153" x2="138" y2="207" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="220" y1="153" x2="262" y2="207" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="136" y1="253" x2="182" y2="307" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="264" y1="253" x2="218" y2="307" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Labels -->
  <text x="90" y="290" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">P(B|A)</text>
  <text x="310" y="290" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">P(C|A)</text>
  <text x="200" y="375" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">P(A)P(B|A)P(C|A)P(D|B,C)</text>

  <!-- Right: Undirected (Markov Random Field) -->
  <text x="600" y="75" font-family="Georgia, serif" font-size="17" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Undirected (Markov Random Field)</text>

  <!-- Nodes -->
  <circle cx="600" cy="130" r="28" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="600" y="135" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle">X</text>

  <circle cx="520" cy="230" r="28" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="520" y="235" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle">Y</text>

  <circle cx="680" cy="230" r="28" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="680" y="235" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle">Z</text>

  <circle cx="600" cy="330" r="28" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="600" y="335" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle">W</text>

  <!-- Undirected edges -->
  <line x1="580" y1="153" x2="538" y2="207" stroke="#2D5A8E" stroke-width="2.5"/>
  <line x1="620" y1="153" x2="662" y2="207" stroke="#2D5A8E" stroke-width="2.5"/>
  <line x1="536" y1="253" x2="582" y2="307" stroke="#2D5A8E" stroke-width="2.5"/>
  <line x1="664" y1="253" x2="618" y2="307" stroke="#2D5A8E" stroke-width="2.5"/>
  <line x1="548" y1="230" x2="652" y2="230" stroke="#2D5A8E" stroke-width="2.5"/>

  <!-- Clique shading -->
  <polygon points="600,158 538,207 662,207" fill="#2D5A8E" fill-opacity="0.07" stroke="none"/>
  <polygon points="538,253 662,253 600,302" fill="#2D5A8E" fill-opacity="0.07" stroke="none"/>

  <!-- Labels -->
  <text x="600" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">clique</text>
  <text x="600" y="375" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">P(X,Y,Z,W) = (1/Z) prod of potentials</text>
</svg>