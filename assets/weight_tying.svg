<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Weight Tying: Shared Parameters Across Layers</text>

  <!-- Left side: Without weight tying -->
  <text x="200" y="65" font-family="Georgia,serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">Without Weight Tying</text>

  <!-- Input tokens -->
  <text x="200" y="90" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">input tokens</text>
  <rect x="120" y="100" width="160" height="28" rx="4" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="200" y="118" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Embedding W_e</text>

  <!-- Arrow down -->
  <line x1="200" y1="128" x2="200" y2="155" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="196,152 200,160 204,152" fill="#C4A87A"/>

  <!-- Transformer body -->
  <rect x="140" y="160" width="120" height="60" rx="6" fill="#F5F0E5" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="200" y="185" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Transformer</text>
  <text x="200" y="200" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Layers</text>

  <!-- Arrow down -->
  <line x1="200" y1="220" x2="200" y2="247" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="196,244 200,252 204,244" fill="#C4A87A"/>

  <!-- Output projection -->
  <rect x="120" y="252" width="160" height="28" rx="4" fill="#F2E0E2" stroke="#7C2530" stroke-width="1.5"/>
  <text x="200" y="270" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">Output W_o</text>

  <!-- Separate weight labels -->
  <text x="85" y="118" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="end" font-style="italic">V x d</text>
  <text x="85" y="270" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="end" font-style="italic">d x V</text>

  <!-- X mark showing separate -->
  <text x="200" y="310" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">2V x d parameters</text>

  <!-- Right side: With weight tying -->
  <text x="580" y="65" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">With Weight Tying</text>

  <!-- Input tokens -->
  <text x="580" y="90" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">input tokens</text>
  <rect x="500" y="100" width="160" height="28" rx="4" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="580" y="118" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Shared W</text>

  <!-- Arrow down -->
  <line x1="580" y1="128" x2="580" y2="155" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="576,152 580,160 584,152" fill="#C4A87A"/>

  <!-- Transformer body -->
  <rect x="520" y="160" width="120" height="60" rx="6" fill="#F5F0E5" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="580" y="185" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Transformer</text>
  <text x="580" y="200" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Layers</text>

  <!-- Arrow down -->
  <line x1="580" y1="220" x2="580" y2="247" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="576,244 580,252 584,244" fill="#C4A87A"/>

  <!-- Output projection (same color as input = shared) -->
  <rect x="500" y="252" width="160" height="28" rx="4" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="580" y="270" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Shared W^T</text>

  <!-- Curved arrow showing tying -->
  <path d="M 670,114 Q 720,190 670,266" fill="none" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="672,262 670,270 666,262" fill="#7C2530"/>
  <text x="735" y="190" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">tied</text>

  <!-- Shared weight label -->
  <text x="490" y="118" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="end" font-style="italic">V x d</text>
  <text x="490" y="270" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="end" font-style="italic">V x d</text>
  <text x="580" y="310" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">V x d parameters</text>

  <!-- Bottom: examples bar -->
  <line x1="40" y1="340" x2="760" y2="340" stroke="#D4C5A9" stroke-width="1"/>
  <text x="130" y="365" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Language Models</text>
  <text x="130" y="380" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">embed / output</text>
  <text x="400" y="365" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Encoder-Decoder</text>
  <text x="400" y="380" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">shared vocabulary</text>
  <text x="670" y="365" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Siamese Networks</text>
  <text x="670" y="380" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">twin branches</text>

  <!-- Divider -->
  <line x1="390" y1="330" x2="390" y2="345" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,2"/>
</svg>