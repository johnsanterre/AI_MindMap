<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- ===== LEFT PANEL: Ergodic trajectory ===== -->
  <!-- Panel background -->
  <rect x="20" y="50" width="330" height="300" fill="#F5F0E8" rx="5" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Phase space oval -->
  <ellipse cx="185" cy="200" rx="130" ry="110" fill="none" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Dense winding trajectory (ergodic) -->
  <!-- Spiral-like path that densely covers the ellipse interior -->
  <path d="M 185 110
    C 220 112, 275 140, 290 180
    C 305 220, 280 270, 245 285
    C 210 300, 155 295, 125 270
    C 95 245, 85 200, 100 165
    C 115 130, 150 118, 185 120
    C 218 122, 255 145, 268 178
    C 281 211, 262 252, 235 268
    C 208 284, 168 280, 145 260
    C 122 240, 115 208, 128 180
    C 141 152, 165 140, 190 142
    C 215 144, 242 162, 252 188
    C 262 214, 248 243, 228 255
    C 208 267, 180 263, 162 247
    C 144 231, 140 208, 150 188
    C 160 168, 178 158, 197 160
    C 216 162, 233 178, 238 198
    C 243 218, 234 238, 218 247
    C 202 256, 182 251, 170 238
    C 158 225, 157 208, 165 195
    C 173 182, 186 175, 200 177
    C 214 179, 224 192, 224 207"
    fill="none" stroke="#2D5A8E" stroke-width="1.4" opacity="0.75"/>

  <!-- Arrow at end of trajectory -->
  <polygon points="224,207 218,200 231,202" fill="#2D5A8E" opacity="0.75"/>

  <!-- Starting point marker -->
  <circle cx="185" cy="110" r="4" fill="#7C2530"/>
  <text x="185" y="100" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">start</text>

  <!-- Panel label -->
  <text x="185" y="38" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Ergodic System</text>
  <text x="185" y="370" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">time average → space average</text>

  <!-- Phase space label -->
  <text x="295" y="145" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">phase</text>
  <text x="295" y="157" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">space</text>


  <!-- ===== MIDDLE PANEL: Non-ergodic (two basins) ===== -->
  <rect x="375" y="50" width="240" height="300" fill="#F5F0E8" rx="5" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Left basin -->
  <ellipse cx="445" cy="200" rx="52" ry="65" fill="#EDE3D0" stroke="#7C2530" stroke-width="1.5"/>
  <!-- Right basin -->
  <ellipse cx="565" cy="200" rx="52" ry="65" fill="#DDE8F0" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- Barrier between basins -->
  <line x1="498" y1="130" x2="498" y2="270" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="498" y="125" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">barrier</text>

  <!-- Trajectory stuck in left basin (swirling arrows) -->
  <path d="M 445 155 C 470 155, 485 170, 485 195 C 485 222, 468 238, 445 238 C 422 238, 408 222, 408 195 C 408 170, 422 155, 445 155"
    fill="none" stroke="#7C2530" stroke-width="1.8"/>
  <polygon points="445,155 438,162 452,163" fill="#7C2530"/>

  <!-- Blocked arrow (cannot cross) -->
  <line x1="480" y1="200" x2="510" y2="200" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="504" y1="193" x2="516" y2="200" stroke="#7C2530" stroke-width="1.5" opacity="0.5"/>
  <line x1="504" y1="207" x2="516" y2="200" stroke="#7C2530" stroke-width="1.5" opacity="0.5"/>
  <!-- X mark blocking crossing -->
  <line x1="493" y1="193" x2="503" y2="203" stroke="#7C2530" stroke-width="2"/>
  <line x1="503" y1="193" x2="493" y2="203" stroke="#7C2530" stroke-width="2"/>

  <!-- Basin labels -->
  <text x="445" y="290" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">mode 1</text>
  <text x="565" y="290" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">mode 2</text>
  <text x="565" y="200" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" opacity="0.5">never</text>
  <text x="565" y="213" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" opacity="0.5">visited</text>

  <!-- Panel label -->
  <text x="495" y="38" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Non-Ergodic</text>
  <text x="495" y="370" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">chain stuck in one basin</text>


  <!-- ===== RIGHT PANEL: Mixing time convergence curve ===== -->
  <rect x="635" y="50" width="145" height="300" fill="#F5F0E8" rx="5" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Axes -->
  <line x1="660" y1="310" x2="760" y2="310" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="660" y1="100" x2="660" y2="310" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="710" y="330" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">time</text>
  <text x="647" y="310" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="end">0</text>

  <!-- Target dashed line -->
  <line x1="660" y1="160" x2="760" y2="160" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="762" y="163" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="start">μ</text>

  <!-- Convergence curve (time average) -->
  <path d="M 660 290 C 668 265, 672 230, 680 210 C 688 190, 695 172, 705 165 C 715 160, 725 160, 760 160"
    fill="none" stroke="#2D5A8E" stroke-width="2"/>

  <!-- Mixing time marker -->
  <line x1="700" y1="160" x2="700" y2="310" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="700" y="350" font-family="Georgia, serif" font-size="0">spacer</text>

  <!-- Mixing time brace annotation -->
  <text x="675" y="348" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">t</text>
  <text x="680" y="348" font-family="Georgia, serif" font-size="7" fill="#7C2530" text-anchor="start">mix</text>

  <!-- Vertical arrow for y-axis label -->
  <text x="648" y="210" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,648,210)">time avg</text>

  <!-- Panel label -->
  <text x="707" y="38" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Mixing Time</text>
  <text x="707" y="370" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">O(1/gap)</text>

  <!-- ===== TITLE ===== -->
  <text x="400" y="22" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Ergodic Theory: Time Average = Space Average</text>
</svg>
