<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C3D1E" font-weight="bold">Contraction Mapping</text>

  <!-- Left side: two points getting closer -->
  <text x="160" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Before: two points far apart</text>

  <!-- Two initial points -->
  <circle cx="80" cy="140" r="6" fill="#7C2530"/>
  <text x="80" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">x</text>
  <circle cx="240" cy="140" r="6" fill="#2D5A8E"/>
  <text x="240" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">y</text>

  <!-- Distance bracket -->
  <line x1="80" y1="165" x2="240" y2="165" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="80" y1="160" x2="80" y2="170" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="240" y1="160" x2="240" y2="170" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="160" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">d(x, y)</text>

  <!-- Arrow down: apply T -->
  <line x1="160" y1="195" x2="160" y2="230" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="218" font-family="Georgia, serif" font-size="12" fill="#C4A87A" font-style="italic">apply T</text>

  <!-- After: closer together -->
  <text x="160" y="258" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">After: points closer</text>

  <circle cx="120" cy="300" r="6" fill="#7C2530"/>
  <text x="120" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">T(x)</text>
  <circle cx="200" cy="300" r="6" fill="#2D5A8E"/>
  <text x="200" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">T(y)</text>

  <!-- Shorter distance bracket -->
  <line x1="120" y1="325" x2="200" y2="325" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="120" y1="320" x2="120" y2="330" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="200" y1="320" x2="200" y2="330" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="160" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">d(T(x), T(y)) &lt; d(x, y)</text>

  <!-- Dividing line -->
  <line x1="340" y1="55" x2="340" y2="385" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Right side: iteration converging to fixed point -->
  <text x="570" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Iteration converges to fixed point</text>

  <!-- Spiral/convergence visualization -->
  <!-- Number line with iterates -->
  <line x1="390" y1="200" x2="750" y2="200" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Fixed point star -->
  <circle cx="560" cy="200" r="8" fill="none" stroke="#7C2530" stroke-width="2"/>
  <circle cx="560" cy="200" r="3" fill="#7C2530"/>
  <text x="560" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-weight="bold">x*</text>

  <!-- Iterates approaching fixed point -->
  <circle cx="720" cy="200" r="5" fill="#2D5A8E"/>
  <text x="720" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x_0</text>

  <line x1="715" y1="200" x2="640" y2="200" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <circle cx="635" cy="200" r="4.5" fill="#2D5A8E"/>
  <text x="635" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x_1</text>

  <line x1="630" y1="200" x2="595" y2="200" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <circle cx="590" cy="200" r="4" fill="#2D5A8E"/>
  <text x="590" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">x_2</text>

  <line x1="586" y1="200" x2="575" y2="200" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <circle cx="573" cy="200" r="3.5" fill="#2D5A8E"/>
  <text x="573" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">x_3</text>

  <!-- Key equation -->
  <rect x="400" y="270" width="330" height="50" rx="8" fill="none" stroke="#7C2530" stroke-width="1.5"/>
  <text x="565" y="293" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530">d(T(x), T(y))  ≤  q · d(x, y)</text>
  <text x="565" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">where 0 ≤ q &lt; 1</text>

  <!-- Bottom label -->
  <text x="565" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#C4A87A" font-style="italic">Banach Fixed-Point Theorem (1922)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C4A87A"/>
    </marker>
    <marker id="arrow2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>