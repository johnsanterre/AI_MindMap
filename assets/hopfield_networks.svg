<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E">Hopfield Networks: Associative Memory</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="385" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT PANEL: Classical Hopfield ===== -->
  <text x="200" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530">Classical Hopfield Network (1982)</text>

  <!-- Fully connected binary neurons (hexagon layout) -->
  <!-- 6 neurons in a ring -->
  <!-- Center: 150, 175 -->
  <!-- Neuron positions: top, top-right, bottom-right, bottom, bottom-left, top-left -->
  <!-- Connections (all pairs) -->
  <!-- Top(150,110) TopRight(210,140) BottomRight(210,200) Bottom(150,235) BottomLeft(90,200) TopLeft(90,140) -->

  <!-- Draw all 15 edges -->
  <g stroke="#C4A87A" stroke-width="1.2" opacity="0.7">
    <line x1="150" y1="110" x2="210" y2="140"/>
    <line x1="150" y1="110" x2="210" y2="200"/>
    <line x1="150" y1="110" x2="150" y2="235"/>
    <line x1="150" y1="110" x2="90" y2="200"/>
    <line x1="150" y1="110" x2="90" y2="140"/>
    <line x1="210" y1="140" x2="210" y2="200"/>
    <line x1="210" y1="140" x2="150" y2="235"/>
    <line x1="210" y1="140" x2="90" y2="200"/>
    <line x1="210" y1="140" x2="90" y2="140"/>
    <line x1="210" y1="200" x2="150" y2="235"/>
    <line x1="210" y1="200" x2="90" y2="200"/>
    <line x1="210" y1="200" x2="90" y2="140"/>
    <line x1="150" y1="235" x2="90" y2="200"/>
    <line x1="150" y1="235" x2="90" y2="140"/>
    <line x1="90" y1="200" x2="90" y2="140"/>
  </g>

  <!-- Neurons -->
  <circle cx="150" cy="110" r="12" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="150" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">+1</text>

  <circle cx="210" cy="140" r="12" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="210" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">-1</text>

  <circle cx="210" cy="200" r="12" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="210" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">+1</text>

  <circle cx="150" cy="235" r="12" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="150" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">+1</text>

  <circle cx="90" cy="200" r="12" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">-1</text>

  <circle cx="90" cy="140" r="12" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">+1</text>

  <text x="150" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">W=Wᵀ</text>

  <!-- Label -->
  <text x="150" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Symmetric weights,</text>
  <text x="150" y="276" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">binary neurons {-1,+1}</text>

  <!-- Energy landscape -->
  <!-- Two wells representing stored memories -->
  <text x="150" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E">Energy Landscape</text>

  <!-- Landscape curve path -->
  <path d="M 60 370 Q 90 315 115 355 Q 140 385 155 345 Q 165 320 185 355 Q 205 380 230 340 Q 250 310 270 370"
        fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Memory wells labels -->
  <text x="115" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">mem₁</text>
  <text x="230" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">mem₂</text>

  <!-- Ball (corrupted input) rolling to memory -->
  <circle cx="170" cy="340" r="6" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="170" y="333" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">corrupted</text>
  <!-- Arrow showing convergence -->
  <path d="M 168 346 Q 158 360 148 365" fill="none" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="130" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">→ nearest memory</text>

  <!-- Capacity label -->
  <text x="150" y="313" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Capacity ≈ 0.14N patterns</text>

  <!-- ===== RIGHT PANEL: Modern Continuous Hopfield ===== -->
  <text x="600" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E">Modern Continuous Hopfield (2020)</text>

  <!-- Attention mechanism illustration -->
  <!-- Query box -->
  <rect x="450" y="90" width="80" height="32" rx="5" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="490" y="111" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="white">Query ξ</text>

  <!-- Stored patterns (keys) boxes -->
  <rect x="570" y="75" width="70" height="26" rx="4" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="605" y="93" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white">Key x₁</text>

  <rect x="570" y="108" width="70" height="26" rx="4" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="605" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white">Key x₂</text>

  <rect x="570" y="141" width="70" height="26" rx="4" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="605" y="159" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white">Key x₃</text>

  <!-- Similarity arrows -->
  <line x1="530" y1="106" x2="570" y2="88" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="530" y1="106" x2="570" y2="121" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="530" y1="106" x2="570" y2="154" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="550" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#C4A87A">βXᵀξ</text>

  <!-- Softmax box -->
  <rect x="655" y="100" width="75" height="30" rx="5" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="692" y="119" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white">softmax</text>

  <!-- Arrow from keys to softmax -->
  <line x1="640" y1="121" x2="655" y2="115" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow-tan)"/>

  <!-- Output arrow -->
  <line x1="730" y1="115" x2="755" y2="115" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="765" y="119" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">ξ'</text>

  <!-- Equation label -->
  <text x="600" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">ξ_new = X · softmax(βXᵀξ)</text>

  <!-- Highlight box -->
  <rect x="450" y="200" width="320" height="36" rx="6" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="610" y="221" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E">Modern Hopfield = Attention</text>

  <!-- Capacity comparison -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E">Capacity Comparison</text>

  <!-- Bar chart -->
  <!-- Classical bar -->
  <rect x="480" y="310" width="40" height="40" fill="#7C2530" rx="3"/>
  <text x="500" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">0.14N</text>
  <text x="500" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Classical</text>

  <!-- Modern bar (much taller) -->
  <rect x="570" y="270" width="40" height="80" fill="#2D5A8E" rx="3"/>
  <text x="590" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">exp(d/2)</text>
  <text x="590" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Modern</text>

  <!-- Baseline -->
  <line x1="460" y1="350" x2="740" y2="350" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Key properties -->
  <text x="660" y="285" text-anchor="start" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Exponential capacity</text>
  <text x="660" y="300" text-anchor="start" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Continuous states</text>
  <text x="660" y="315" text-anchor="start" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">One-step retrieval</text>
  <text x="660" y="330" text-anchor="start" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">= Transformer attention</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrow-tan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>
