<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="15" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Nucleus Sampling (Top-p): Adaptive Truncation</text>

  <!-- Subtitle -->
  <text x="400" y="56" font-family="Georgia,serif" font-size="11" fill="#888" text-anchor="middle" font-style="italic">Keep the smallest set of tokens whose cumulative probability exceeds p, then renormalize</text>

  <!-- Full distribution (left side) -->
  <text x="200" y="82" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Original Distribution</text>

  <!-- Bar chart - full distribution -->
  <rect x="60" y="100" width="40" height="120" rx="2" fill="#2D5A8E" opacity="0.9"/>
  <text x="80" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"the"</text>
  <text x="80" y="96" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">0.35</text>

  <rect x="110" y="140" width="40" height="80" rx="2" fill="#2D5A8E" opacity="0.9"/>
  <text x="130" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"a"</text>
  <text x="130" y="136" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">0.25</text>

  <rect x="160" y="170" width="40" height="50" rx="2" fill="#2D5A8E" opacity="0.9"/>
  <text x="180" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"one"</text>
  <text x="180" y="166" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">0.15</text>

  <rect x="210" y="190" width="40" height="30" rx="2" fill="#C4A87A" opacity="0.7"/>
  <text x="230" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"an"</text>
  <text x="230" y="186" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">0.10</text>

  <rect x="260" y="200" width="40" height="20" rx="2" fill="#C4A87A" opacity="0.5"/>
  <text x="280" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"its"</text>
  <text x="280" y="196" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">0.05</text>

  <rect x="310" y="206" width="40" height="14" rx="2" fill="#D4C5A9" opacity="0.5"/>
  <text x="330" y="232" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">...</text>
  <text x="330" y="202" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">0.10</text>

  <!-- Arrow -->
  <line x1="380" y1="160" x2="420" y2="160" stroke="#7C2530" stroke-width="2.5"/>
  <polygon points="417,155 428,160 417,165" fill="#7C2530"/>
  <text x="404" y="148" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">p = 0.9</text>

  <!-- Nucleus (right side) -->
  <text x="600" y="82" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Nucleus (After Truncation)</text>

  <!-- Bar chart - nucleus only, renormalized -->
  <rect x="460" y="93" width="50" height="127" rx="2" fill="#7C2530" opacity="0.9"/>
  <text x="485" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"the"</text>
  <text x="485" y="89" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">0.41</text>

  <rect x="525" y="127" width="50" height="93" rx="2" fill="#7C2530" opacity="0.9"/>
  <text x="550" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"a"</text>
  <text x="550" y="123" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">0.29</text>

  <rect x="590" y="162" width="50" height="58" rx="2" fill="#7C2530" opacity="0.9"/>
  <text x="615" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"one"</text>
  <text x="615" y="158" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">0.18</text>

  <rect x="655" y="185" width="50" height="35" rx="2" fill="#7C2530" opacity="0.9"/>
  <text x="680" y="232" font-family="Georgia,serif" font-size="9" fill="#2C2C2C" text-anchor="middle">"an"</text>
  <text x="680" y="181" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">0.12</text>

  <!-- Dashed box around nucleus bars -->
  <rect x="450" y="80" width="295" height="165" rx="6" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Cumulative probability annotation -->
  <text x="598" y="260" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">cumulative: 0.35 + 0.25 + 0.15 + 0.10 = 0.85</text>
  <text x="598" y="275" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">+ "an" pushes past p = 0.9 threshold</text>

  <!-- Bottom comparison -->
  <line x1="30" y1="295" x2="770" y2="295" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="315" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Why Nucleus Beats Fixed Top-k</text>

  <!-- Confident case -->
  <rect x="40" y="325" width="220" height="55" rx="4" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="150" y="343" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Confident prediction</text>
  <text x="150" y="358" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Nucleus shrinks to 2-3 tokens</text>
  <text x="150" y="372" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Top-k still samples from k tokens</text>

  <!-- Uncertain case -->
  <rect x="290" y="325" width="220" height="55" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="343" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Uncertain prediction</text>
  <text x="400" y="358" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Nucleus expands to 50+ tokens</text>
  <text x="400" y="372" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Top-k may cut off valid options</text>

  <!-- Adaptive label -->
  <rect x="540" y="325" width="220" height="55" rx="4" fill="#FAE8E8" stroke="#7C2530" stroke-width="1.2"/>
  <text x="650" y="343" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Adaptive = better text</text>
  <text x="650" y="358" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Nucleus size tracks model</text>
  <text x="650" y="372" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">confidence at each step</text>
</svg>