<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Gradient Checkpointing: Trading Compute for Memory</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="370" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ===== LEFT PANEL: Standard Backprop ===== -->
  <text x="200" y="72" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#7C2530" text-anchor="middle">Standard Backpropagation</text>
  <text x="200" y="89" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">All activations stored in memory</text>

  <!-- Layer boxes left (8 layers, all filled = stored) -->
  <!-- Layer labels -->
  <text x="108" y="118" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Layer</text>

  <!-- 8 stacked activation boxes -->
  <rect x="60" y="120" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="135" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₁ (stored)</text>

  <rect x="60" y="148" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="163" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₂ (stored)</text>

  <rect x="60" y="176" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="191" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₃ (stored)</text>

  <rect x="60" y="204" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="219" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₄ (stored)</text>

  <rect x="60" y="232" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="247" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₅ (stored)</text>

  <rect x="60" y="260" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="275" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₆ (stored)</text>

  <rect x="60" y="288" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="303" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₇ (stored)</text>

  <rect x="60" y="316" width="80" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.75" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="100" y="331" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₈ (stored)</text>

  <!-- Memory brace / label left -->
  <line x1="150" y1="120" x2="160" y2="120" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="160" y1="120" x2="160" y2="338" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="150" y1="338" x2="160" y2="338" stroke="#7C2530" stroke-width="1.5"/>
  <text x="230" y="218" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Memory</text>
  <text x="230" y="236" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">= O(N)</text>
  <text x="230" y="258" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">HIGH</text>

  <!-- ===== RIGHT PANEL: Gradient Checkpointing ===== -->
  <text x="600" y="72" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Gradient Checkpointing</text>
  <text x="600" y="89" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Only checkpoint activations kept; rest recomputed</text>

  <!-- 8 layers right: checkpoints (filled), non-checkpoints (outline only) -->
  <!-- a₁ checkpoint -->
  <rect x="460" y="120" width="80" height="22" rx="3" fill="#7C2530" fill-opacity="0.80" stroke="#7C2530" stroke-width="1.5"/>
  <text x="500" y="135" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₁ ✓ checkpoint</text>

  <!-- a₂ discarded -->
  <rect x="460" y="148" width="80" height="22" rx="3" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="500" y="163" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">a₂ (discarded)</text>

  <!-- a₃ discarded -->
  <rect x="460" y="176" width="80" height="22" rx="3" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="500" y="191" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">a₃ (discarded)</text>

  <!-- a₄ checkpoint -->
  <rect x="460" y="204" width="80" height="22" rx="3" fill="#7C2530" fill-opacity="0.80" stroke="#7C2530" stroke-width="1.5"/>
  <text x="500" y="219" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₄ ✓ checkpoint</text>

  <!-- a₅ discarded -->
  <rect x="460" y="232" width="80" height="22" rx="3" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="500" y="247" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">a₅ (discarded)</text>

  <!-- a₆ discarded -->
  <rect x="460" y="260" width="80" height="22" rx="3" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="500" y="275" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">a₆ (discarded)</text>

  <!-- a₇ checkpoint (could also be last) -->
  <rect x="460" y="288" width="80" height="22" rx="3" fill="#7C2530" fill-opacity="0.80" stroke="#7C2530" stroke-width="1.5"/>
  <text x="500" y="303" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">a₇ ✓ checkpoint</text>

  <!-- a₈ discarded -->
  <rect x="460" y="316" width="80" height="22" rx="3" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="500" y="331" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">a₈ (discarded)</text>

  <!-- Recompute arrow from a₄ checkpoint back up through a₅/a₆ toward a₇ -->
  <path d="M 550 215 Q 620 248 550 299" fill="none" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="655" y="248" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">recompute</text>
  <text x="655" y="261" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">on backward</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Memory brace / label right -->
  <line x1="550" y1="120" x2="558" y2="120" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="558" y1="120" x2="558" y2="338" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="550" y1="338" x2="558" y2="338" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- Only checkpoint lines -->
  <line x1="558" y1="131" x2="564" y2="131" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="558" y1="215" x2="564" y2="215" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="558" y1="299" x2="564" y2="299" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Tradeoff banner at bottom -->
  <rect x="40" y="355" width="720" height="34" rx="5" fill="#2D5A8E" fill-opacity="0.10" stroke="#2D5A8E" stroke-width="1"/>
  <text x="400" y="369" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Tradeoff:  Memory O(N) → O(√N)   |   Compute overhead: +33%   |   Optimal checkpoint interval k* = √N layers</text>
  <text x="400" y="383" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Chen et al. 2016 — enables training models 10× larger on the same GPU</text>
</svg>
