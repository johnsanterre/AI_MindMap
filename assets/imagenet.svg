<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">ImageNet: The Dataset That Proved Scale Changes Everything</text>

  <!-- Left: scale stats -->
  <text x="180" y="60" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">What ImageNet Contains</text>
  <rect x="30" y="70" width="300" height="170" rx="5" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1"/>
  <text x="180" y="92" font-family="Georgia,serif" font-size="28" fill="#2D5A8E" text-anchor="middle" font-weight="bold">14M</text>
  <text x="180" y="108" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">labelled images</text>
  <line x1="50" y1="118" x2="310" y2="118" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="180" y="136" font-family="Georgia,serif" font-size="20" fill="#5040A0" text-anchor="middle" font-weight="bold">21,841</text>
  <text x="180" y="150" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">synset categories (WordNet)</text>
  <line x1="50" y1="160" x2="310" y2="160" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="180" y="178" font-family="Georgia,serif" font-size="20" fill="#7C2530" text-anchor="middle" font-weight="bold">1.2M</text>
  <text x="180" y="192" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">ILSVRC training images</text>
  <text x="180" y="206" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">(1000 classes, competition subset)</text>
  <line x1="50" y1="218" x2="310" y2="218" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="180" y="234" font-family="Georgia,serif" font-size="11" fill="#888" text-anchor="middle" font-style="italic">labelled via Amazon Mechanical Turk</text>

  <!-- ILSVRC error progress -->
  <text x="570" y="60" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">ILSVRC Top-5 Error Rate</text>
  <rect x="360" y="70" width="420" height="170" rx="5" fill="#F9F5EF" stroke="#C4A87A" stroke-width="1"/>
  <!-- axes -->
  <line x1="400" y1="82" x2="400" y2="225" stroke="#888" stroke-width="1"/>
  <line x1="400" y1="225" x2="760" y2="225" stroke="#888" stroke-width="1"/>
  <!-- y labels -->
  <text x="395" y="90" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="end">30%</text>
  <text x="395" y="130" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="end">20%</text>
  <text x="395" y="170" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="end">10%</text>
  <line x1="398" y1="88" x2="762" y2="88" stroke="#DDD" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="398" y1="128" x2="762" y2="128" stroke="#DDD" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="398" y1="168" x2="762" y2="168" stroke="#DDD" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Data points: 2010=28%, 2011=26%, 2012=15.3% AlexNet, 2013=11%, 2014=6.7% VGG, 2015=3.6% ResNet -->
  <!-- Scale: 30% = y=88, 0% = y=228; 1% = (228-88)/30 = 4.67px -->
  <!-- 2010: 28% → y = 88 + (30-28)*4.67 = 97 -->
  <circle cx="430" cy="97" r="5" fill="#888"/>
  <text x="430" y="240" font-family="Georgia,serif" font-size="9" fill="#555" text-anchor="middle">2010</text>
  <!-- 2011: 26% → y = 88 + 4*4.67 = 107 -->
  <circle cx="490" cy="107" r="5" fill="#888"/>
  <text x="490" y="240" font-family="Georgia,serif" font-size="9" fill="#555" text-anchor="middle">2011</text>
  <!-- 2012: 15.3% → y = 88 + 14.7*4.67 = 157 -->
  <circle cx="550" cy="156" r="8" fill="#7C2530"/>
  <text x="550" y="240" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">2012</text>
  <text x="560" y="148" font-family="Georgia,serif" font-size="9" fill="#7C2530">AlexNet</text>
  <!-- 2013: 11% → y = 88 + 19*4.67 = 177 -->
  <circle cx="610" cy="177" r="6" fill="#5040A0"/>
  <text x="610" y="240" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle">2013</text>
  <!-- 2014: 6.7% → y = 88 + 23.3*4.67 = 197 -->
  <circle cx="670" cy="197" r="6" fill="#2D5A8E"/>
  <text x="670" y="240" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">2014</text>
  <text x="660" y="190" font-family="Georgia,serif" font-size="8" fill="#2D5A8E">VGG/GoogLeNet</text>
  <!-- 2015: 3.6% → y = 88 + 26.4*4.67 = 211 -->
  <circle cx="730" cy="211" r="7" fill="#5C3D1E"/>
  <text x="730" y="240" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2015</text>
  <text x="730" y="204" font-family="Georgia,serif" font-size="8" fill="#5C3D1E">ResNet</text>
  <!-- Connect dots -->
  <polyline points="430,97 490,107 550,156 610,177 670,197 730,211" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Human performance line -->
  <line x1="400" y1="214" x2="760" y2="214" stroke="#888" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="762" y="218" font-family="Georgia,serif" font-size="8" fill="#888">~5% human</text>

  <!-- Bottom: significance -->
  <rect x="30" y="258" width="740" height="55" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="277" font-family="Georgia,serif" font-size="12" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Why ImageNet Mattered Beyond the Benchmark</text>
  <text x="400" y="296" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Pre-training on ImageNet + fine-tuning became the dominant paradigm in computer vision for a decade.</text>
  <text x="400" y="311" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">Features learned from ImageNet transferred to medical imaging, satellite imagery, autonomous driving — and proved that scale generalises.</text>

  <!-- Scale note -->
  <text x="400" y="345" font-family="Georgia,serif" font-size="11" fill="#2C2C2C" text-anchor="middle">ImageNet didn't just benchmark AI — it trained it. The dataset //was// the model.</text>
  <text x="400" y="362" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">Fei-Fei Li spent 2 years convincing the community that data scale was worth the effort. She was right.</text>
</svg>
