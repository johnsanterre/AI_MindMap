<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Latent Dirichlet Allocation — Generative Process</text>

  <!-- Documents on the left -->
  <text x="90" y="70" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Documents</text>

  <!-- Doc 1 -->
  <rect x="20" y="80" width="140" height="55" rx="6" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="98" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Doc 1</text>
  <!-- mixture bar -->
  <rect x="30" y="105" width="72" height="12" fill="#7C2530" rx="2"/>
  <rect x="102" y="105" width="30" height="12" fill="#2D5A8E" rx="2"/>
  <rect x="132" y="105" width="18" height="12" fill="#C4A87A" rx="2"/>
  <text x="90" y="128" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">60% T1 · 25% T2 · 15% T3</text>

  <!-- Doc 2 -->
  <rect x="20" y="145" width="140" height="55" rx="6" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="163" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Doc 2</text>
  <rect x="30" y="170" width="24" height="12" fill="#7C2530" rx="2"/>
  <rect x="54" y="170" width="78" height="12" fill="#2D5A8E" rx="2"/>
  <rect x="132" y="170" width="18" height="12" fill="#C4A87A" rx="2"/>
  <text x="90" y="193" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">20% T1 · 65% T2 · 15% T3</text>

  <!-- Doc 3 -->
  <rect x="20" y="210" width="140" height="55" rx="6" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="90" y="228" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Doc 3</text>
  <rect x="30" y="235" width="18" height="12" fill="#7C2530" rx="2"/>
  <rect x="48" y="235" width="18" height="12" fill="#2D5A8E" rx="2"/>
  <rect x="66" y="235" width="84" height="12" fill="#C4A87A" rx="2"/>
  <text x="90" y="258" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">15% T1 · 15% T2 · 70% T3</text>

  <!-- Central Topics -->
  <text x="370" y="70" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Topics</text>

  <!-- Topic 1 -->
  <circle cx="320" cy="120" r="35" fill="#7C2530" opacity="0.15" stroke="#7C2530" stroke-width="2"/>
  <text x="320" y="116" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Topic 1</text>
  <text x="320" y="130" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">"neural"</text>

  <!-- Topic 2 -->
  <circle cx="420" cy="120" r="35" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="420" y="116" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Topic 2</text>
  <text x="420" y="130" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">"Bayes"</text>

  <!-- Topic 3 -->
  <circle cx="370" cy="210" r="35" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="2"/>
  <text x="370" y="206" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Topic 3</text>
  <text x="370" y="220" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">"kernel"</text>

  <!-- Arrows from docs to topics -->
  <line x1="160" y1="107" x2="285" y2="115" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="160" y1="107" x2="385" y2="118" stroke="#2D5A8E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <line x1="160" y1="172" x2="385" y2="122" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="160" y1="172" x2="285" y2="118" stroke="#7C2530" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <line x1="160" y1="237" x2="340" y2="207" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="160" y1="237" x2="285" y2="125" stroke="#7C2530" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Words on the right -->
  <text x="640" y="70" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Words</text>

  <!-- Word columns for Topic 1 -->
  <rect x="560" y="82" width="160" height="70" rx="5" fill="#7C2530" opacity="0.07" stroke="#7C2530" stroke-width="1"/>
  <text x="640" y="97" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">From Topic 1:</text>
  <text x="640" y="112" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">neural 0.18  layer 0.14</text>
  <text x="640" y="126" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">weight 0.11  gradient 0.09</text>
  <text x="640" y="140" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">activation 0.07  ...</text>

  <!-- Word columns for Topic 2 -->
  <rect x="560" y="160" width="160" height="70" rx="5" fill="#2D5A8E" opacity="0.07" stroke="#2D5A8E" stroke-width="1"/>
  <text x="640" y="175" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">From Topic 2:</text>
  <text x="640" y="190" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">prior 0.15  posterior 0.12</text>
  <text x="640" y="204" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Bayes 0.10  sample 0.08</text>
  <text x="640" y="218" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">likelihood 0.07  ...</text>

  <!-- Word columns for Topic 3 -->
  <rect x="560" y="238" width="160" height="70" rx="5" fill="#C4A87A" opacity="0.15" stroke="#C4A87A" stroke-width="1"/>
  <text x="640" y="253" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">From Topic 3:</text>
  <text x="640" y="268" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">kernel 0.16  margin 0.13</text>
  <text x="640" y="282" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">support 0.10  vector 0.09</text>
  <text x="640" y="296" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">hyperplane 0.06  ...</text>

  <!-- Arrows from topics to words -->
  <line x1="355" y1="120" x2="558" y2="115" stroke="#7C2530" stroke-width="1.5" opacity="0.5"/>
  <line x1="455" y1="120" x2="558" y2="192" stroke="#2D5A8E" stroke-width="1.5" opacity="0.5"/>
  <line x1="405" y1="210" x2="558" y2="270" stroke="#C4A87A" stroke-width="1.5" opacity="0.5"/>

  <!-- Plate notation box at bottom -->
  <rect x="140" y="290" width="520" height="95" rx="8" fill="none" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="650" y="305" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Plate: D documents</text>

  <!-- Dirichlet priors -->
  <circle cx="210" cy="340" r="20" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="210" y="344" font-family="Georgia, serif" font-size="14" fill="#7C2530" text-anchor="middle" font-style="italic">&#x3B1;</text>
  <text x="210" y="370" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Doc-topic</text>
  <text x="210" y="380" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">prior</text>

  <!-- Theta -->
  <circle cx="320" cy="340" r="20" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="2"/>
  <text x="320" y="344" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">&#x3B8;</text>
  <text x="320" y="370" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Topic</text>
  <text x="320" y="380" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">mixture</text>

  <!-- z -->
  <circle cx="430" cy="340" r="20" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="430" y="344" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">z</text>
  <text x="430" y="370" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Topic</text>
  <text x="430" y="380" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">assignment</text>

  <!-- w -->
  <circle cx="540" cy="340" r="20" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="540" y="344" font-family="Georgia, serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-style="italic">w</text>
  <text x="540" y="370" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Observed</text>
  <text x="540" y="380" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">word</text>

  <!-- Beta prior (outside plate) -->
  <circle cx="80" cy="340" r="20" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="80" y="344" font-family="Georgia, serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-style="italic">&#x3B2;</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Word-topic</text>
  <text x="80" y="380" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">prior</text>

  <!-- Arrows in plate -->
  <line x1="230" y1="340" x2="298" y2="340" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="340" x2="408" y2="340" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="340" x2="518" y2="340" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="100" y1="340" x2="188" y2="340" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowhead2)"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>