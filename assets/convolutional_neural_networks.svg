<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="32" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Convolution: Filter Sliding Over Input to Produce Feature Map</text>

  <!-- Input grid (5x5) -->
  <text x="120" y="65" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">Input Image</text>
  <g transform="translate(50,75)">
    <rect x="0" y="0" width="140" height="140" fill="none" stroke="#2D5A8E" stroke-width="2" rx="3"/>
    <!-- Grid lines -->
    <line x1="28" y1="0" x2="28" y2="140" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="56" y1="0" x2="56" y2="140" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="84" y1="0" x2="84" y2="140" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="112" y1="0" x2="112" y2="140" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="28" x2="140" y2="28" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="56" x2="140" y2="56" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="84" x2="140" y2="84" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="112" x2="140" y2="112" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <!-- Pixel values -->
    <text x="14" y="20" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="42" y="20" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="70" y="20" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="98" y="20" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="126" y="20" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="14" y="48" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="42" y="48" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="70" y="48" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="98" y="48" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="126" y="48" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="14" y="76" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="42" y="76" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="70" y="76" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="98" y="76" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="126" y="76" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="14" y="104" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="42" y="104" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="70" y="104" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="98" y="104" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="126" y="104" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <text x="14" y="132" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="42" y="132" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="70" y="132" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="98" y="132" text-anchor="middle" fill="#2D5A8E" font-size="11">0</text>
    <text x="126" y="132" text-anchor="middle" fill="#2D5A8E" font-size="11">1</text>
    <!-- Highlight 3x3 filter region -->
    <rect x="28" y="28" width="84" height="84" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="2.5" rx="2"/>
  </g>

  <!-- Filter (3x3) -->
  <text x="310" y="65" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">3x3 Filter</text>
  <g transform="translate(248,75)">
    <rect x="0" y="0" width="124" height="124" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="2" rx="3"/>
    <!-- Grid lines -->
    <line x1="41" y1="0" x2="41" y2="124" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
    <line x1="82" y1="0" x2="82" y2="124" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="41" x2="124" y2="41" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="82" x2="124" y2="82" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
    <!-- Filter values -->
    <text x="20" y="28" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">1</text>
    <text x="62" y="28" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">0</text>
    <text x="103" y="28" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">-1</text>
    <text x="20" y="68" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">1</text>
    <text x="62" y="68" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">0</text>
    <text x="103" y="68" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">-1</text>
    <text x="20" y="110" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">1</text>
    <text x="62" y="110" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">0</text>
    <text x="103" y="110" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">-1</text>
  </g>

  <!-- Convolution arrow -->
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5C3D1E"/>
    </marker>
  </defs>
  <text x="430" y="140" text-anchor="middle" fill="#5C3D1E" font-size="28" font-weight="bold">*</text>
  <line x1="400" y1="150" x2="460" y2="150" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arw)"/>
  <text x="430" y="170" text-anchor="middle" fill="#5C3D1E" font-size="12">convolve</text>

  <!-- Output feature map (3x3) -->
  <text x="570" y="65" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">Feature Map</text>
  <g transform="translate(508,75)">
    <rect x="0" y="0" width="124" height="124" fill="#C4A87A" fill-opacity="0.25" stroke="#5C3D1E" stroke-width="2" rx="3"/>
    <line x1="41" y1="0" x2="41" y2="124" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
    <line x1="82" y1="0" x2="82" y2="124" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="41" x2="124" y2="41" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="82" x2="124" y2="82" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
    <!-- Output values -->
    <text x="20" y="28" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">1</text>
    <text x="62" y="28" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">-1</text>
    <text x="103" y="28" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">0</text>
    <text x="20" y="68" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">2</text>
    <text x="62" y="68" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">0</text>
    <text x="103" y="68" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">-2</text>
    <text x="20" y="110" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">1</text>
    <text x="62" y="110" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">0</text>
    <text x="103" y="110" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">-1</text>
  </g>

  <!-- Pooling illustration below -->
  <text x="700" y="65" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">Pooled</text>
  <line x1="632" y1="130" x2="660" y2="130" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arw)"/>
  <g transform="translate(660,85)">
    <rect x="0" y="0" width="80" height="80" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="2" rx="3"/>
    <line x1="40" y1="0" x2="40" y2="80" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="40" x2="80" y2="40" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
    <text x="20" y="28" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">2</text>
    <text x="60" y="28" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">0</text>
    <text x="20" y="68" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">2</text>
    <text x="60" y="68" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">-1</text>
  </g>

  <!-- Feature hierarchy at bottom -->
  <text x="400" y="250" text-anchor="middle" fill="#5C3D1E" font-size="16" font-weight="bold">Feature Hierarchy</text>

  <!-- Layer 1: edges -->
  <rect x="60" y="270" width="130" height="55" rx="8" fill="#2D5A8E"/>
  <text x="125" y="293" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Layer 1</text>
  <text x="125" y="313" text-anchor="middle" fill="white" font-size="11">Edges, Gradients</text>

  <!-- Arrow -->
  <line x1="190" y1="297" x2="230" y2="297" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Layer 2: textures -->
  <rect x="235" y="270" width="130" height="55" rx="8" fill="#7C2530"/>
  <text x="300" y="293" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Layer 2</text>
  <text x="300" y="313" text-anchor="middle" fill="white" font-size="11">Textures, Corners</text>

  <!-- Arrow -->
  <line x1="365" y1="297" x2="405" y2="297" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Layer 3: parts -->
  <rect x="410" y="270" width="130" height="55" rx="8" fill="#C4A87A"/>
  <text x="475" y="293" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">Layer 3</text>
  <text x="475" y="313" text-anchor="middle" fill="#5C3D1E" font-size="11">Parts, Shapes</text>

  <!-- Arrow -->
  <line x1="540" y1="297" x2="580" y2="297" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Layer 4: objects -->
  <rect x="585" y="270" width="155" height="55" rx="8" fill="#5C3D1E"/>
  <text x="662" y="293" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Layer 4+</text>
  <text x="662" y="313" text-anchor="middle" fill="white" font-size="11">Objects, Scenes</text>

  <!-- Bottom annotation -->
  <text x="400" y="365" text-anchor="middle" fill="#888" font-size="12">Shared weights (filter) slide across the entire input — translation equivariance</text>
  <text x="400" y="385" text-anchor="middle" fill="#888" font-size="12">Each layer composes lower-level features into higher-level representations</text>
</svg>