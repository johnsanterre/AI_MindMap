<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Balanced Trees: Keeping Search Depth Logarithmic</text>

  <!-- Unbalanced tree (left side) -->
  <text x="185" y="62" font-family="Georgia,serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">Unbalanced BST</text>
  <text x="185" y="78" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">O(n) worst case</text>

  <!-- Unbalanced nodes -->
  <circle cx="185" cy="105" r="16" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="185" y="109" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">10</text>

  <line x1="197" y1="118" x2="225" y2="142" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="230" cy="155" r="16" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="230" y="159" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">20</text>

  <line x1="242" y1="168" x2="265" y2="192" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="270" cy="205" r="16" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="270" y="209" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">30</text>

  <line x1="282" y1="218" x2="305" y2="242" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="310" cy="255" r="16" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="310" y="259" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">40</text>

  <line x1="322" y1="268" x2="345" y2="292" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="350" cy="305" r="16" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="350" y="309" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">50</text>

  <!-- Depth label -->
  <line x1="130" y1="100" x2="130" y2="310" stroke="#7C2530" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="120" y="210" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" transform="rotate(-90,120,210)">depth = n</text>

  <!-- Arrow between trees -->
  <text x="410" y="195" font-family="Georgia,serif" font-size="22" fill="#C4A87A" text-anchor="middle">&#x27A1;</text>
  <text x="410" y="215" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">rebalance</text>

  <!-- Balanced AVL tree (right side) -->
  <text x="600" y="62" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Balanced (AVL) Tree</text>
  <text x="600" y="78" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">O(log n) guaranteed</text>

  <!-- Level 0: root -->
  <circle cx="600" cy="110" r="18" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="600" y="115" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">30</text>

  <!-- Edges to level 1 -->
  <line x1="585" y1="125" x2="530" y2="170" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="615" y1="125" x2="670" y2="170" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- Level 1 -->
  <circle cx="525" cy="185" r="16" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="525" y="189" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">10</text>

  <circle cx="675" cy="185" r="16" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="675" y="189" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">40</text>

  <!-- Edges to level 2 -->
  <line x1="537" y1="198" x2="565" y2="240" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="663" y1="198" x2="640" y2="240" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="687" y1="198" x2="710" y2="240" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- Level 2 -->
  <circle cx="570" cy="255" r="16" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="570" y="259" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">20</text>

  <circle cx="635" cy="255" r="16" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="635" y="259" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">35</text>

  <circle cx="715" cy="255" r="16" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="715" y="259" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">50</text>

  <!-- Depth label -->
  <line x1="760" y1="105" x2="760" y2="270" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="772" y="190" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" transform="rotate(90,772,190)">depth = log n</text>

  <!-- Balance factor annotations -->
  <rect x="460" y="320" width="280" height="55" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="600" y="340" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Balance Invariant (AVL)</text>
  <text x="600" y="358" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">|height(left) - height(right)| &#x2264; 1 at every node</text>

  <!-- Rotation box -->
  <rect x="50" y="340" width="290" height="40" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="195" y="358" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Rotations restore balance after insert/delete</text>
  <text x="195" y="372" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">Left, Right, Left-Right, Right-Left</text>
</svg>