<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="233" y1="20" x2="233" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="533" y1="20" x2="533" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL: Identity Facts ===== -->
  <text x="116" y="52" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#7C2530" text-anchor="middle">Argonne</text>
  <text x="116" y="70" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">National Laboratory</text>

  <line x1="30" y1="80" x2="202" y2="80" stroke="#C4A87A" stroke-width="1"/>
  <text x="116" y="96" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">— Quick Facts —</text>

  <text x="36" y="116" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Type:</text>
  <text x="72" y="116" font-family="Georgia, serif" font-size="9.5" fill="#333">DOE National Laboratory</text>

  <text x="36" y="132" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Operator:</text>
  <text x="88" y="132" font-family="Georgia, serif" font-size="9.5" fill="#333">UChicago Argonne LLC</text>

  <text x="36" y="148" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Founded:</text>
  <text x="84" y="148" font-family="Georgia, serif" font-size="9.5" fill="#333">1946</text>

  <text x="36" y="164" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Location:</text>
  <text x="84" y="164" font-family="Georgia, serif" font-size="9.5" fill="#333">Lemont, IL (near Chicago)</text>

  <text x="36" y="180" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Staff:</text>
  <text x="64" y="180" font-family="Georgia, serif" font-size="9.5" fill="#333">~3,500 employees</text>

  <line x1="30" y1="192" x2="202" y2="192" stroke="#D4C5A9" stroke-width="1"/>
  <text x="116" y="208" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">— Mission Areas —</text>

  <circle cx="42" cy="224" r="3" fill="#7C2530"/>
  <text x="50" y="228" font-family="Georgia, serif" font-size="9" fill="#333">Energy Research</text>
  <circle cx="42" cy="240" r="3" fill="#7C2530"/>
  <text x="50" y="244" font-family="Georgia, serif" font-size="9" fill="#333">Basic Science</text>
  <circle cx="42" cy="256" r="3" fill="#7C2530"/>
  <text x="50" y="260" font-family="Georgia, serif" font-size="9" fill="#333">National Security</text>
  <circle cx="42" cy="272" r="3" fill="#7C2530"/>
  <text x="50" y="276" font-family="Georgia, serif" font-size="9" fill="#333">Computing / HPC</text>
  <circle cx="42" cy="288" r="3" fill="#7C2530"/>
  <text x="50" y="292" font-family="Georgia, serif" font-size="9" fill="#333">Transportation</text>

  <line x1="30" y1="304" x2="202" y2="304" stroke="#D4C5A9" stroke-width="1"/>
  <text x="116" y="322" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle" font-style="italic">One of 17 DOE National Labs</text>
  <text x="116" y="336" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Descended from Manhattan Project</text>
  <text x="116" y="350" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Metallurgical Laboratory</text>
  <text x="116" y="368" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="middle">anl.gov</text>

  <!-- ===== CENTER PANEL: AI for Science ===== -->
  <text x="383" y="42" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">AI for Science</text>
  <line x1="253" y1="50" x2="513" y2="50" stroke="#C4A87A" stroke-width="1"/>

  <!-- Materials Science box -->
  <rect x="253" y="60" width="120" height="50" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.2" rx="4"/>
  <text x="313" y="80" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Materials Science</text>
  <text x="313" y="93" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">ML-guided synthesis</text>
  <text x="313" y="104" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">&amp; property prediction</text>

  <!-- Drug Discovery box -->
  <rect x="383" y="60" width="120" height="50" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.2" rx="4"/>
  <text x="443" y="80" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Drug Discovery</text>
  <text x="443" y="93" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">CANDLE project:</text>
  <text x="443" y="104" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">DL for cancer research</text>

  <!-- Climate / Energy box -->
  <rect x="253" y="120" width="120" height="50" fill="#5C3D1E" fill-opacity="0.1" stroke="#5C3D1E" stroke-width="1.2" rx="4"/>
  <text x="313" y="140" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Climate / Energy</text>
  <text x="313" y="153" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Grid modernization,</text>
  <text x="313" y="164" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">climate emulators</text>

  <!-- Physics / HEP box -->
  <rect x="383" y="120" width="120" height="50" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.2" rx="4"/>
  <text x="443" y="140" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Physics / HEP</text>
  <text x="443" y="153" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Collab. w/ Fermilab,</text>
  <text x="443" y="164" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">particle reconstruction</text>

  <!-- National Security box (centered) -->
  <rect x="318" y="180" width="130" height="50" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.2" rx="4"/>
  <text x="383" y="200" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">National Security</text>
  <text x="383" y="213" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Autonomous vehicle sim,</text>
  <text x="383" y="224" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">threat analysis</text>

  <!-- HPC + AI convergence note -->
  <line x1="253" y1="242" x2="513" y2="242" stroke="#D4C5A9" stroke-width="1"/>
  <text x="383" y="258" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">HPC + AI Convergence</text>
  <text x="383" y="272" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Polaris (petascale) · Aurora (exascale)</text>
  <text x="383" y="285" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">AI workflows run at scale on same iron</text>
  <text x="383" y="298" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">as simulation — key design principle</text>

  <!-- INCITE note -->
  <line x1="253" y1="312" x2="513" y2="312" stroke="#D4C5A9" stroke-width="1"/>
  <text x="383" y="328" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">INCITE Program</text>
  <text x="383" y="341" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Competitive allocations of ALCF time</text>
  <text x="383" y="354" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">open to universities &amp; industry</text>
  <text x="383" y="367" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="middle">alcf.anl.gov/science/incite-program</text>

  <!-- ===== RIGHT PANEL: Notable Projects / Contributions ===== -->
  <!-- Aurora callout -->
  <rect x="550" y="28" width="230" height="88" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.5" rx="4"/>
  <text x="665" y="48" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Aurora Supercomputer</text>
  <text x="665" y="63" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Intel Xe GPU · &gt;1 ExaFLOP</text>
  <text x="665" y="76" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">One of first US exascale systems</text>
  <text x="665" y="89" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">2024 debut — designed for</text>
  <text x="665" y="102" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">AI + simulation convergence</text>

  <!-- ALCF description -->
  <rect x="550" y="128" width="230" height="72" fill="#2D5A8E" fill-opacity="0.07" stroke="#2D5A8E" stroke-width="1.2" rx="4"/>
  <text x="665" y="147" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">ALCF</text>
  <text x="665" y="161" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Argonne Leadership Computing Facility</text>
  <text x="665" y="174" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">One of DOE's premier HPC centers</text>
  <text x="665" y="187" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Hosts Polaris (petascale) + Aurora</text>

  <!-- CANDLE project -->
  <rect x="550" y="212" width="230" height="72" fill="#5C3D1E" fill-opacity="0.07" stroke="#5C3D1E" stroke-width="1.2" rx="4"/>
  <text x="665" y="231" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">CANDLE Project</text>
  <text x="665" y="245" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Cancer Distributed Learning Environment</text>
  <text x="665" y="258" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Deep learning for cancer response</text>
  <text x="665" y="271" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">prediction — DOE/NCI collaboration</text>

  <!-- Polaris note + bottom facts -->
  <line x1="550" y1="296" x2="780" y2="296" stroke="#D4C5A9" stroke-width="1"/>
  <text x="665" y="312" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Other Notable Work</text>
  <circle cx="558" cy="328" r="3" fill="#C4A87A"/>
  <text x="566" y="332" font-family="Georgia, serif" font-size="8.5" fill="#333">Fermilab physics ML partnership</text>
  <circle cx="558" cy="344" r="3" fill="#C4A87A"/>
  <text x="566" y="348" font-family="Georgia, serif" font-size="8.5" fill="#333">Autonomous vehicle simulation</text>
  <circle cx="558" cy="360" r="3" fill="#C4A87A"/>
  <text x="566" y="364" font-family="Georgia, serif" font-size="8.5" fill="#333">Power grid optimization ML</text>
  <circle cx="558" cy="376" r="3" fill="#C4A87A"/>
  <text x="566" y="380" font-family="Georgia, serif" font-size="8.5" fill="#333">Advanced Light Source user facility</text>
</svg>
