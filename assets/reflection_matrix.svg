<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia,serif" font-size="17" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Reflection Matrices</text>

  <!-- ─── LEFT PANEL: 2D reflections across axes ─── -->
  <text x="193" y="62" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2D Axis Reflections</text>

  <!-- Axes -->
  <line x1="80" y1="230" x2="310" y2="230" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="193" y1="100" x2="193" y2="330" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="314" y="234" font-family="Georgia,serif" font-size="12" fill="#5C3D1E">x</text>
  <text x="196" y="96" font-family="Georgia,serif" font-size="12" fill="#5C3D1E">y</text>

  <!-- Original vector v -->
  <line x1="193" y1="230" x2="268" y2="155" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="274" y="150" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" font-weight="bold">v</text>
  <text x="246" y="182" font-family="Georgia,serif" font-size="11" fill="#2D5A8E">(3, 3)</text>

  <!-- Reflect across x-axis: (3,-3) -->
  <line x1="193" y1="230" x2="268" y2="305" stroke="#7C2530" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="274" y="316" font-family="Georgia,serif" font-size="13" fill="#7C2530" font-weight="bold">v'</text>
  <text x="246" y="298" font-family="Georgia,serif" font-size="11" fill="#7C2530">(3,−3)</text>
  <text x="310" y="275" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">reflect</text>
  <text x="310" y="288" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">across x</text>

  <!-- Reflect across y-axis: (-3,3) -->
  <line x1="193" y1="230" x2="118" y2="155" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowBrown)"/>
  <text x="98" y="150" font-family="Georgia,serif" font-size="13" fill="#5C3D1E" font-weight="bold">v''</text>
  <text x="98" y="166" font-family="Georgia,serif" font-size="11" fill="#5C3D1E">(−3,3)</text>
  <text x="87" y="260" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">reflect</text>
  <text x="87" y="273" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">across y</text>

  <!-- Dashed mirror lines -->
  <line x1="80" y1="230" x2="310" y2="230" stroke="#7C2530" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.5"/>
  <line x1="193" y1="100" x2="193" y2="330" stroke="#5C3D1E" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.5"/>

  <!-- Matrices below left panel -->
  <text x="130" y="350" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle">x-axis:</text>
  <text x="130" y="366" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle">[1,0; 0,−1]</text>
  <text x="255" y="350" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">y-axis:</text>
  <text x="255" y="366" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">[−1,0; 0,1]</text>

  <!-- ─── MIDDLE PANEL: Householder ─── -->
  <line x1="370" y1="50" x2="370" y2="385" stroke="#D4C5A9" stroke-width="1"/>
  <text x="530" y="62" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Householder Reflection</text>

  <!-- Arbitrary mirror line at ~40° -->
  <line x1="390" y1="320" x2="580" y2="100" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="586" y="96" font-family="Georgia,serif" font-size="12" fill="#5C3D1E">mirror</text>
  <text x="586" y="110" font-family="Georgia,serif" font-size="12" fill="#5C3D1E">line</text>

  <!-- n-hat label on mirror line -->
  <line x1="485" y1="210" x2="530" y2="160" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrowTan)"/>
  <text x="537" y="155" font-family="Georgia,serif" font-size="13" fill="#5C3D1E" font-weight="bold">n̂</text>
  <text x="530" y="170" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">(normal)</text>

  <!-- Axes for Householder -->
  <line x1="390" y1="80" x2="390" y2="330" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="380" y1="210" x2="580" y2="210" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>

  <!-- v vector -->
  <line x1="390" y1="210" x2="480" y2="130" stroke="#2D5A8E" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="487" y="125" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" font-weight="bold">v</text>

  <!-- Hv vector (reflected across mirror line) -->
  <line x1="390" y1="210" x2="430" y2="270" stroke="#7C2530" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="436" y="282" font-family="Georgia,serif" font-size="13" fill="#7C2530" font-weight="bold">Hv</text>

  <!-- Perpendicular tick at reflection -->
  <line x1="448" y1="187" x2="458" y2="200" stroke="#888" stroke-width="1"/>
  <line x1="458" y1="200" x2="446" y2="208" stroke="#888" stroke-width="1"/>

  <!-- Formula box -->
  <rect x="385" y="295" width="220" height="72" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="495" y="313" font-family="Georgia,serif" font-size="12" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Householder matrix</text>
  <text x="495" y="333" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle">H = I − 2n̂n̂ᵀ</text>
  <text x="495" y="353" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">n̂ = unit normal to mirror</text>

  <!-- ─── RIGHT PANEL: Properties ─── -->
  <line x1="625" y1="50" x2="625" y2="385" stroke="#D4C5A9" stroke-width="1"/>
  <text x="712" y="62" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Key Properties</text>

  <text x="635" y="90"  font-family="Georgia,serif" font-size="12" fill="#7C2530" font-weight="bold">Symmetry</text>
  <text x="635" y="107" font-family="Georgia,serif" font-size="12" fill="#2C2C2C">Hᵀ = H</text>
  <text x="635" y="122" font-family="Georgia,serif" font-size="11" fill="#888" font-style="italic">H is its own transpose</text>

  <text x="635" y="148" font-family="Georgia,serif" font-size="12" fill="#7C2530" font-weight="bold">Involution</text>
  <text x="635" y="165" font-family="Georgia,serif" font-size="12" fill="#2C2C2C">H² = I</text>
  <text x="635" y="180" font-family="Georgia,serif" font-size="11" fill="#888" font-style="italic">reflect twice = identity</text>

  <text x="635" y="206" font-family="Georgia,serif" font-size="12" fill="#7C2530" font-weight="bold">Determinant</text>
  <text x="635" y="223" font-family="Georgia,serif" font-size="12" fill="#2C2C2C">det(H) = −1</text>
  <text x="635" y="238" font-family="Georgia,serif" font-size="11" fill="#888" font-style="italic">flips orientation</text>

  <text x="635" y="264" font-family="Georgia,serif" font-size="12" fill="#7C2530" font-weight="bold">Orthogonality</text>
  <text x="635" y="281" font-family="Georgia,serif" font-size="12" fill="#2C2C2C">HᵀH = I</text>
  <text x="635" y="296" font-family="Georgia,serif" font-size="11" fill="#888" font-style="italic">preserves lengths &amp; angles</text>

  <text x="635" y="322" font-family="Georgia,serif" font-size="12" fill="#7C2530" font-weight="bold">Eigenvalues</text>
  <text x="635" y="339" font-family="Georgia,serif" font-size="12" fill="#2C2C2C">+1 (along mirror)</text>
  <text x="635" y="356" font-family="Georgia,serif" font-size="12" fill="#2C2C2C">−1 (across mirror)</text>
  <text x="635" y="373" font-family="Georgia,serif" font-size="11" fill="#888" font-style="italic">n-1 dims fixed, 1 flipped</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowBrown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowTan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>
