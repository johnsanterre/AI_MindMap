<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Divide and Conquer Strategy</text>

  <!-- ===== TOP: Original Problem ===== -->
  <rect x="300" y="50" width="200" height="44" rx="8" fill="#C8D8E8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="400" y="70" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Problem</text>
  <text x="400" y="84" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">size n</text>

  <!-- Arrows from Problem down to subproblems -->
  <line x1="340" y1="94" x2="180" y2="140" stroke="#7C2530" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="400" y1="94" x2="400" y2="140" stroke="#7C2530" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="460" y1="94" x2="620" y2="140" stroke="#7C2530" stroke-width="2" marker-end="url(#arw)"/>

  <!-- DIVIDE label -->
  <text x="510" y="118" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">DIVIDE</text>

  <!-- ===== MIDDLE: Subproblems ===== -->
  <rect x="100" y="145" width="160" height="44" rx="8" fill="#EDE3D0" stroke="#C4A87A" stroke-width="2"/>
  <text x="180" y="165" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Subproblem 1</text>
  <text x="180" y="180" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">size n/2</text>

  <rect x="320" y="145" width="160" height="44" rx="8" fill="#EDE3D0" stroke="#C4A87A" stroke-width="2"/>
  <text x="400" y="165" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Subproblem 2</text>
  <text x="400" y="180" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">size n/2</text>

  <rect x="540" y="145" width="160" height="44" rx="8" fill="#EDE3D0" stroke="#C4A87A" stroke-width="2"/>
  <text x="620" y="165" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Subproblem k</text>
  <text x="620" y="180" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">size n/2</text>

  <!-- CONQUER label -->
  <text x="70" y="220" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530">CONQUER</text>
  <text x="70" y="234" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">(solve recursively)</text>

  <!-- Arrows from subproblems down to solved -->
  <line x1="180" y1="189" x2="180" y2="250" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arw2)"/>
  <line x1="400" y1="189" x2="400" y2="250" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arw2)"/>
  <line x1="620" y1="189" x2="620" y2="250" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arw2)"/>

  <!-- Solved subproblems -->
  <rect x="120" y="255" width="120" height="34" rx="6" fill="#B8D4B0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="180" y="276" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Solution 1</text>

  <rect x="340" y="255" width="120" height="34" rx="6" fill="#B8D4B0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="400" y="276" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Solution 2</text>

  <rect x="560" y="255" width="120" height="34" rx="6" fill="#B8D4B0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="620" y="276" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Solution k</text>

  <!-- Arrows from solved down to combined -->
  <line x1="180" y1="289" x2="340" y2="340" stroke="#7C2530" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="400" y1="289" x2="400" y2="340" stroke="#7C2530" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="620" y1="289" x2="460" y2="340" stroke="#7C2530" stroke-width="2" marker-end="url(#arw)"/>

  <!-- COMBINE label -->
  <text x="690" y="325" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530">COMBINE</text>

  <!-- Final combined solution -->
  <rect x="300" y="345" width="200" height="40" rx="8" fill="#C8D8E8" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="400" y="370" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Final Solution</text>

  <!-- Recurrence formula on the right -->
  <text x="710" y="80" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Recurrence</text>
  <text x="710" y="100" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">T(n) = aT(n/b) + f(n)</text>
  <text x="710" y="118" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">a = subproblems</text>
  <text x="710" y="134" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">b = shrink factor</text>
  <text x="710" y="150" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">f(n) = combine cost</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arw2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>