  <!-- ===== DECODER BOX (below sparse vector) — compact ===== -->
  <rect x="270" y="355" width="128" height="32" fill="#C4A87A" rx="5" opacity="0.7"/>
  <text x="334" y="367" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Decoder W_dec</text>
  <text x="334" y="381" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">reconstruct x̂ ≈ x</text>

  <!-- Arrow decoder -> reconstructed -->
  <line x1="270" y1="371" x2="188" y2="371" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="188,366 178,371 188,376" fill="#5C3D1E"/>

