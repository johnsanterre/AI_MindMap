  <text x="203" y="260" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">superposition</text>
  <text x="203" y="272" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">→ monosemantic</text>
  <text x="203" y="284" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">features</text>

