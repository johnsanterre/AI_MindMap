  <text x="203" y="193" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Encoder</text>
  <text x="203" y="210" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">W_enc</text>
  <text x="203" y="227" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">+ ReLU</text>

