<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Inductive Bias: Constraining the Hypothesis Space</text>

  <!-- Full hypothesis space (large ellipse, background) -->
  <ellipse cx="400" cy="220" rx="340" ry="155" fill="none" stroke="#D4C5A9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="385" font-family="Georgia, serif" font-size="13" fill="#D4C5A9" text-anchor="middle" font-style="italic">All Possible Functions</text>

  <!-- CNN bias region -->
  <ellipse cx="200" cy="200" rx="130" ry="100" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="200" y="145" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle" font-weight="bold">CNNs</text>
  <text x="200" y="165" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-style="italic">Translation</text>
  <text x="200" y="180" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-style="italic">Equivariance</text>

  <!-- Locality icon: small grid -->
  <rect x="165" y="200" width="20" height="20" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="185" y="200" width="20" height="20" fill="#2D5A8E" fill-opacity="0.45" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="205" y="200" width="20" height="20" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="165" y="220" width="20" height="20" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="185" y="220" width="20" height="20" fill="#2D5A8E" fill-opacity="0.7" stroke="#2D5A8E" stroke-width="1"/>
  <rect x="205" y="220" width="20" height="20" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="200" y="260" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Local Receptive Fields</text>

  <!-- Transformer bias region -->
  <ellipse cx="430" cy="195" rx="120" ry="105" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="2.5"/>
  <text x="430" y="140" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle" font-weight="bold">Transformers</text>
  <text x="430" y="160" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-style="italic">Permutation</text>
  <text x="430" y="175" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-style="italic">Equivariance</text>

  <!-- Attention icon: arrows converging -->
  <circle cx="430" cy="220" r="5" fill="#7C2530" fill-opacity="0.6"/>
  <line x1="395" y1="210" x2="425" y2="218" stroke="#7C2530" stroke-width="1.5" marker-end="none"/>
  <line x1="395" y1="240" x2="425" y2="224" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="465" y1="210" x2="435" y2="218" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="465" y1="240" x2="435" y2="224" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="395" cy="210" r="3" fill="#7C2530" fill-opacity="0.35"/>
  <circle cx="395" cy="240" r="3" fill="#7C2530" fill-opacity="0.35"/>
  <circle cx="465" cy="210" r="3" fill="#7C2530" fill-opacity="0.35"/>
  <circle cx="465" cy="240" r="3" fill="#7C2530" fill-opacity="0.35"/>
  <text x="430" y="265" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Global Attention</text>

  <!-- Linear models bias region -->
  <ellipse cx="640" cy="210" rx="105" ry="80" fill="#5C3D1E" fill-opacity="0.1" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="640" y="165" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Linear Models</text>
  <text x="640" y="185" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Linearity</text>

  <!-- Linear icon: a line through points -->
  <line x1="590" y1="250" x2="690" y2="210" stroke="#5C3D1E" stroke-width="2"/>
  <circle cx="605" cy="244" r="3.5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <circle cx="630" cy="238" r="3.5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <circle cx="650" cy="225" r="3.5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <circle cx="675" cy="215" r="3.5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="640" y="275" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Hyperplane Decision</text>

  <!-- Target function star -->
  <polygon points="335,230 338,240 348,240 340,247 343,257 335,251 327,257 330,247 322,240 332,240" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="335" y="275" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">True Function</text>

  <!-- Legend -->
  <text x="42" y="365" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Stronger bias</text>
  <line x1="140" y1="361" x2="210" y2="361" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="210,357 220,361 210,365" fill="#5C3D1E"/>
  <text x="228" y="365" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Smaller hypothesis space</text>
  <line x1="415" y1="361" x2="485" y2="361" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="485,357 495,361 485,365" fill="#5C3D1E"/>
  <text x="503" y="365" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Faster learning (if correct)</text>

  <!-- Overlap region label -->
  <text x="310" y="310" font-family="Georgia, serif" font-size="10" fill="#D4C5A9" text-anchor="middle" font-style="italic">Overlap: shared reachable functions</text>
</svg>