<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Lyapunov Function: Contour Plot and Converging Trajectories</text>

  <!-- ── Left panel: contour ellipses + trajectories ── -->
  <!-- Panel label -->
  <text x="210" y="62" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">State space (x₁, x₂)</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="360" y2="340" stroke="#D4C5A9" stroke-width="1.2"/>
  <line x1="210" y1="70" x2="210" y2="345" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="362" y="344" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">x₁</text>
  <text x="213" y="68" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">x₂</text>

  <!-- Contour ellipses (level sets of V), center at (210, 210) -->
  <!-- Outermost — lightest tan -->
  <ellipse cx="210" cy="210" rx="130" ry="100" fill="none" stroke="#C4A87A" stroke-width="1.4" stroke-dasharray="5,3"/>
  <!-- Second -->
  <ellipse cx="210" cy="210" rx="98" ry="75" fill="none" stroke="#C4A87A" stroke-width="1.4" stroke-dasharray="5,3"/>
  <!-- Third -->
  <ellipse cx="210" cy="210" rx="68" ry="52" fill="none" stroke="#C4A87A" stroke-width="1.4" stroke-dasharray="5,3"/>
  <!-- Fourth -->
  <ellipse cx="210" cy="210" rx="40" ry="30" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Innermost -->
  <ellipse cx="210" cy="210" rx="16" ry="12" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Level set labels -->
  <text x="342" y="213" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="start">V = c₄</text>
  <text x="310" y="213" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="start">c₃</text>
  <text x="280" y="213" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="start">c₂</text>
  <text x="252" y="213" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="start">c₁</text>

  <!-- Spiraling trajectory 1 (from upper-right, spiraling inward) -->
  <!-- Approximated as arc segments with arrowheads -->
  <path d="M 325 130 Q 360 210 310 270 Q 265 320 210 300 Q 155 280 160 240 Q 162 218 185 210"
        fill="none" stroke="#7C2530" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrowhead near end of trajectory 1 -->
  <polygon points="185,210 178,200 193,202" fill="#7C2530"/>

  <!-- Spiraling trajectory 2 (from lower-left) -->
  <path d="M 95 295 Q 70 210 110 155 Q 148 105 210 120 Q 258 132 268 170 Q 275 195 252 208"
        fill="none" stroke="#2D5A8E" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrowhead near end of trajectory 2 -->
  <polygon points="252,208 260,198 258,212" fill="#2D5A8E"/>

  <!-- Stable equilibrium dot at center -->
  <circle cx="210" cy="210" r="6" fill="#5C3D1E"/>
  <text x="210" y="232" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">x* = 0</text>
  <text x="210" y="247" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">(stable equilibrium)</text>

  <!-- ── Right panel: bowl surface schematic ── -->
  <!-- Panel separator -->
  <line x1="430" y1="55" x2="430" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Panel label -->
  <text x="615" y="62" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">V(x): generalized energy surface</text>

  <!-- Bowl outline (parabola shape using quadratic bezier) -->
  <path d="M 470 340 Q 615 90 760 340" fill="#E8DFC8" stroke="#C4A87A" stroke-width="1.8"/>
  <!-- Bowl floor line -->
  <line x1="470" y1="340" x2="760" y2="340" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Vertical axis for V -->
  <line x1="615" y1="75" x2="615" y2="345" stroke="#D4C5A9" stroke-width="1"/>
  <text x="618" y="72" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">V(x)</text>

  <!-- Minimum point of bowl -->
  <circle cx="615" cy="340" r="5" fill="#5C3D1E"/>
  <text x="615" y="360" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">x = 0</text>
  <text x="615" y="374" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">V(0) = 0</text>

  <!-- Descending arrow on bowl surface showing dV/dt < 0 -->
  <path d="M 700 250 Q 680 290 655 315" fill="none" stroke="#7C2530" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="655,315 648,302 661,308" fill="#7C2530"/>
  <text x="720" y="246" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="start">dV/dt &lt; 0</text>
  <text x="720" y="262" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="start" font-style="italic">(decreasing)</text>

  <!-- V(x) > 0 label on bowl wall -->
  <text x="510" y="200" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">V(x) &gt; 0</text>
  <text x="510" y="216" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">for x ≠ 0</text>

  <!-- ── Bottom annotation bar ── -->
  <rect x="60" y="378" width="680" height="18" fill="#FDFAF4"/>
  <text x="400" y="391" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">
    Left: state-space trajectories spiral into x* = 0 as V decreases along each path (level sets shown dashed). Right: V acts as a bowl — energy can only drain downward.
  </text>
</svg>
