  <line x1="104" y1="198" x2="118" y2="212" stroke="#7C2530" stroke-width="3" stroke-linecap="round"/>
  <line x1="118" y1="198" x2="104" y2="212" stroke="#7C2530" stroke-width="3" stroke-linecap="round"/>

  <line x1="138" y1="148" x2="152" y2="162" stroke="#2D5A8E" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="148" x2="138" y2="162" stroke="#2D5A8E" stroke-width="3" stroke-linecap="round"/>

  <line x1="168" y1="318" x2="182" y2="332" stroke="#5C3D1E" stroke-width="3" stroke-linecap="round"/>
  <line x1="182" y1="318" x2="168" y2="332" stroke="#5C3D1E" stroke-width="3" stroke-linecap="round"/>

  <text x="134" y="355" text-anchor="middle" font-size="8" fill="#5C3D1E">place K centroids randomly</text>

  <!-- ====== PANEL 2: ASSIGN ====== -->
  <text x="400" y="52" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1.2">2. ASSIGN</text>

  <!-- Axes -->
  <line x1="290" y1="340" x2="520" y2="340" stroke="#C4A87A" stroke-width="1" marker-end="url(#ax-arr)"/>
  <line x1="290" y1="344" x2="290" y2="64" stroke="#C4A87A" stroke-width="1" marker-end="url(#ax-arr)"/>

  <!-- Cluster 1 points (red) - upper left -->
  <circle cx="328" cy="110" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="348" cy="95" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="340" cy="125" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="363" cy="105" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="323" cy="135" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>

  <!-- Cluster 2 points (brown) - lower center -->
  <circle cx="428" cy="265" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="453" cy="280" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="443" cy="250" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="463" cy="300" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="413" cy="290" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>

  <!-- Cluster 3 points (blue) - right center -->
  <circle cx="463" cy="155" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="483" cy="175" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="493" cy="145" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="473" cy="190" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="503" cy="165" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>

  <!-- Assignment lines to centroids -->
  <line x1="328" y1="110" x2="340" y2="114" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="348" y1="95" x2="340" y2="114" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="363" y1="105" x2="340" y2="114" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>
  <line x1="323" y1="135" x2="340" y2="114" stroke="#7C2530" stroke-width="0.5" opacity="0.4"/>

  <line x1="428" y1="265" x2="440" y2="277" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
  <line x1="453" y1="280" x2="440" y2="277" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
  <line x1="463" y1="300" x2="440" y2="277" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>
  <line x1="413" y1="290" x2="440" y2="277" stroke="#5C3D1E" stroke-width="0.5" opacity="0.4"/>

  <line x1="463" y1="155" x2="483" y2="166" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="493" y1="145" x2="483" y2="166" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="473" y1="190" x2="483" y2="166" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="503" y1="165" x2="483" y2="166" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>

  <!-- Centroids (X marks) -->
  <line x1="334" y1="108" x2="346" y2="120" stroke="#7C2530" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="346" y1="108" x2="334" y2="120" stroke="#7C2530" stroke-width="2.8" stroke-linecap="round"/>

  <line x1="477" y1="160" x2="489" y2="172" stroke="#2D5A8E" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="489" y1="160" x2="477" y2="172" stroke="#2D5A8E" stroke-width="2.8" stroke-linecap="round"/>

  <line x1="434" y1="271" x2="446" y2="283" stroke="#5C3D1E" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="446" y1="271" x2="434" y2="283" stroke="#5C3D1E" stroke-width="2.8" stroke-linecap="round"/>

  <text x="400" y="350" text-anchor="middle" font-size="8" fill="#5C3D1E">each point to nearest centroid</text>
  <text x="400" y="362" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">argmin&#x2096; &#x2016;x&#x1D62; &#x2212; &#x03BC;&#x2096;&#x2016;&#x00B2;</text>

  <!-- ====== PANEL 3: UPDATE ====== -->
  <text x="666" y="52" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1.2">3. UPDATE</text>

  <!-- Axes -->
  <line x1="556" y1="340" x2="786" y2="340" stroke="#C4A87A" stroke-width="1" marker-end="url(#ax-arr)"/>
  <line x1="556" y1="344" x2="556" y2="64" stroke="#C4A87A" stroke-width="1" marker-end="url(#ax-arr)"/>

  <!-- Same cluster points shifted +266 -->
  <!-- Cluster 1 (red) -->
  <circle cx="594" cy="110" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="614" cy="95" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="606" cy="125" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="629" cy="105" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>
  <circle cx="589" cy="135" r="4.5" fill="#7C2530" fill-opacity="0.4" stroke="#7C2530" stroke-width="0.8"/>

  <!-- Cluster 2 (brown) -->
  <circle cx="694" cy="265" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="719" cy="280" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="709" cy="250" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="729" cy="300" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>
  <circle cx="679" cy="290" r="4.5" fill="#5C3D1E" fill-opacity="0.45" stroke="#5C3D1E" stroke-width="0.8"/>

  <!-- Cluster 3 (blue) -->
  <circle cx="729" cy="155" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="749" cy="175" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="759" cy="145" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="739" cy="190" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>
  <circle cx="769" cy="165" r="4.5" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8"/>

  <!-- Old centroids (faded small X) -->
  <line x1="602" y1="110" x2="610" y2="118" stroke="#7C2530" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <line x1="610" y1="110" x2="602" y2="118" stroke="#7C2530" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <line x1="745" y1="162" x2="753" y2="170" stroke="#2D5A8E" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <line x1="753" y1="162" x2="745" y2="170" stroke="#2D5A8E" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <line x1="702" y1="273" x2="710" y2="281" stroke="#5C3D1E" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <line x1="710" y1="273" x2="702" y2="281" stroke="#5C3D1E" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Arrows from old to new centroids -->
  <!-- Red: old ~(606,114) new mean=(606,114) => small shift to (606,114) -->
  <line x1="606" y1="114" x2="607" y2="113" stroke="#7C2530" stroke-width="1.2" marker-end="url(#mv-red)" opacity="0.7"/>
  <!-- New red centroid at mean: (594+614+606+629+589)/5=606.4, (110+95+125+105+135)/5=114 -->
  <line x1="600" y1="108" x2="614" y2="120" stroke="#7C2530" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="614" y1="108" x2="600" y2="120" stroke="#7C2530" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Blue: old ~(749,166) new mean=(749,166) -->
  <line x1="749" y1="166" x2="749" y2="166" stroke="#2D5A8E" stroke-width="1.2" opacity="0.7"/>
  <!-- New blue centroid at mean: (729+749+759+739+769)/5=749, (155+175+145+190+165)/5=166 -->
  <line x1="743" y1="160" x2="755" y2="172" stroke="#2D5A8E" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="755" y1="160" x2="743" y2="172" stroke="#2D5A8E" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Brown: old ~(706,277) new mean=(706,277) -->
  <line x1="706" y1="277" x2="706" y2="277" stroke="#5C3D1E" stroke-width="1.2" opacity="0.7"/>
  <!-- New brown centroid at mean: (694+719+709+729+679)/5=706, (265+280+250+300+290)/5=277 -->
  <line x1="700" y1="271" x2="712" y2="283" stroke="#5C3D1E" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="712" y1="271" x2="700" y2="283" stroke="#5C3D1E" stroke-width="2.8" stroke-linecap="round"/>

  <text x="666" y="350" text-anchor="middle" font-size="8" fill="#5C3D1E">recompute centroids as means</text>
  <text x="666" y="362" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">&#x03BC;&#x2096; = (1/|C&#x2096;|) &#x2211; x&#x1D62;</text>

  <!-- Bottom caption -->
  <text x="400" y="388" text-anchor="middle" font-size="9.5" fill="#6B5D4F">repeat steps 2&#x2013;3 until centroids stabilize &#x2014; minimizes within-cluster sum of squares (WCSS)</text>
</svg>