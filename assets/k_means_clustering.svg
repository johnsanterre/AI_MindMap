  <circle cx="145" cy="290" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>

  <circle cx="195" cy="155" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="215" cy="175" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="225" cy="145" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="205" cy="190" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="235" cy="165" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>

