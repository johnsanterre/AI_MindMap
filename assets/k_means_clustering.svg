  <text x="134" y="52" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1.2">1. INITIALIZE</text>

  <!-- Axes -->
  <line x1="22" y1="340" x2="252" y2="340" stroke="#C4A87A" stroke-width="1" marker-end="url(#ax-arr)"/>
  <line x1="22" y1="344" x2="22" y2="64" stroke="#C4A87A" stroke-width="1" marker-end="url(#ax-arr)"/>

  <!-- Uncolored data points (gray) -->
  <circle cx="60" cy="110" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="80" cy="95" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="72" cy="125" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="95" cy="105" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="55" cy="135" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>

  <circle cx="160" cy="265" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="185" cy="280" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
  <circle cx="175" cy="250" r="4.5" fill="#999" fill-opacity="0.35" stroke="#777" stroke-width="0.7"/>
