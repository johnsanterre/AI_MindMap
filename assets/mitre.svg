<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="233" y1="20" x2="233" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="533" y1="20" x2="533" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL: Identity Facts ===== -->
  <text x="116" y="52" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#7C2530" text-anchor="middle">MITRE</text>
  <text x="116" y="68" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Federally Funded R&amp;D Center</text>

  <line x1="30" y1="78" x2="202" y2="78" stroke="#C4A87A" stroke-width="1"/>
  <text x="116" y="94" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">— Quick Facts —</text>

  <text x="36" y="113" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Type:</text>
  <text x="66" y="113" font-family="Georgia, serif" font-size="9.5" fill="#333">Non-profit FFRDC operator</text>

  <text x="36" y="129" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Founded:</text>
  <text x="82" y="129" font-family="Georgia, serif" font-size="9.5" fill="#333">1958 (MIT spin-out)</text>

  <text x="36" y="145" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">HQ:</text>
  <text x="56" y="145" font-family="Georgia, serif" font-size="9.5" fill="#333">McLean VA &amp; Bedford MA</text>

  <text x="36" y="161" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Staff:</text>
  <text x="64" y="161" font-family="Georgia, serif" font-size="9.5" fill="#333">~10,000 employees</text>

  <text x="36" y="177" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" font-weight="bold">Revenue:</text>
  <text x="82" y="177" font-family="Georgia, serif" font-size="9.5" fill="#333">~$2B (govt. contracts)</text>

  <line x1="30" y1="190" x2="202" y2="190" stroke="#D4C5A9" stroke-width="1"/>
  <text x="116" y="206" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">— What is an FFRDC? —</text>

  <text x="36" y="222" font-family="Georgia, serif" font-size="8.5" fill="#333">Not a contractor — can't compete</text>
  <text x="36" y="235" font-family="Georgia, serif" font-size="8.5" fill="#333">for commercial work. Fully</text>
  <text x="36" y="248" font-family="Georgia, serif" font-size="8.5" fill="#333">independent of profit motive.</text>
  <text x="36" y="263" font-family="Georgia, serif" font-size="8.5" fill="#333">Can access classified data</text>
  <text x="36" y="276" font-family="Georgia, serif" font-size="8.5" fill="#333">across multiple agencies.</text>
  <text x="36" y="291" font-family="Georgia, serif" font-size="8.5" fill="#333">Publishes open standards &amp;</text>
  <text x="36" y="304" font-family="Georgia, serif" font-size="8.5" fill="#333">frameworks freely.</text>

  <line x1="30" y1="318" x2="202" y2="318" stroke="#D4C5A9" stroke-width="1"/>
  <text x="116" y="335" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle" font-style="italic">Spun from MIT Lincoln Lab —</text>
  <text x="116" y="349" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle" font-style="italic">itself an FFRDC for the Air Force</text>
  <text x="116" y="368" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="middle">mitre.org</text>

  <!-- ===== CENTER PANEL: ATT&CK and ATLAS ===== -->
  <text x="383" y="40" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">ATT&amp;CK &amp; ATLAS Frameworks</text>
  <line x1="253" y1="48" x2="513" y2="48" stroke="#C4A87A" stroke-width="1"/>

  <!-- ATT&CK box -->
  <rect x="258" y="58" width="240" height="130" fill="#7C2530" fill-opacity="0.07" stroke="#7C2530" stroke-width="1.5" rx="5"/>
  <text x="378" y="78" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">MITRE ATT&amp;CK</text>
  <text x="378" y="92" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Adversarial Tactics, Techniques</text>
  <text x="378" y="104" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">&amp; Common Knowledge</text>
  <line x1="270" y1="112" x2="490" y2="112" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="378" y="126" font-family="Georgia, serif" font-size="8.5" fill="#333" text-anchor="middle">Gold-standard taxonomy of real-world</text>
  <text x="378" y="139" font-family="Georgia, serif" font-size="8.5" fill="#333" text-anchor="middle">adversary behaviors. 14 tactic categories,</text>
  <text x="378" y="152" font-family="Georgia, serif" font-size="8.5" fill="#333" text-anchor="middle">hundreds of techniques. Widely used in</text>
  <text x="378" y="165" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E" text-anchor="middle">ML-based threat detection &amp; SOC tooling.</text>
  <text x="378" y="180" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="middle" font-style="italic">attack.mitre.org — freely downloadable</text>

  <!-- Arrow between frameworks -->
  <line x1="383" y1="194" x2="383" y2="210" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="383" y="205" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="middle">extends to AI</text>

  <!-- ATLAS box -->
  <rect x="258" y="214" width="240" height="120" fill="#2D5A8E" fill-opacity="0.07" stroke="#2D5A8E" stroke-width="1.5" rx="5"/>
  <text x="378" y="234" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">MITRE ATLAS</text>
  <text x="378" y="248" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Adversarial Threat Landscape</text>
  <text x="378" y="260" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">for AI Systems</text>
  <line x1="270" y1="268" x2="490" y2="268" stroke="#D4C5A9" stroke-width="0.8"/>
  <text x="378" y="282" font-family="Georgia, serif" font-size="8.5" fill="#333" text-anchor="middle">Extends ATT&amp;CK to ML/AI attacks:</text>
  <text x="378" y="295" font-family="Georgia, serif" font-size="8.5" fill="#333" text-anchor="middle">adversarial examples, model inversion,</text>
  <text x="378" y="308" font-family="Georgia, serif" font-size="8.5" fill="#333" text-anchor="middle">data poisoning, model extraction.</text>
  <text x="378" y="325" font-family="Georgia, serif" font-size="8" fill="#C4A87A" text-anchor="middle" font-style="italic">atlas.mitre.org — open access</text>

  <!-- Bottom note -->
  <line x1="253" y1="342" x2="513" y2="342" stroke="#D4C5A9" stroke-width="1"/>
  <text x="383" y="358" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Both frameworks are living documents —</text>
  <text x="383" y="371" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">community contributions accepted</text>

  <!-- ===== RIGHT PANEL: Agency FFRDCs ===== -->
  <text x="665" y="40" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Agencies Served (FFRDCs)</text>
  <line x1="550" y1="48" x2="780" y2="48" stroke="#C4A87A" stroke-width="1"/>

  <!-- DoD box -->
  <rect x="555" y="58" width="220" height="44" fill="#7C2530" fill-opacity="0.09" stroke="#7C2530" stroke-width="1.1" rx="3"/>
  <text x="665" y="76" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">DoD / DoD AT&amp;L</text>
  <text x="665" y="91" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Systems engineering, cybersecurity</text>

  <!-- FAA box -->
  <rect x="555" y="110" width="220" height="44" fill="#2D5A8E" fill-opacity="0.09" stroke="#2D5A8E" stroke-width="1.1" rx="3"/>
  <text x="665" y="128" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">FAA FFRDC</text>
  <text x="665" y="143" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Aviation AI safety, NextGen ATC</text>

  <!-- DHS box -->
  <rect x="555" y="162" width="220" height="44" fill="#5C3D1E" fill-opacity="0.09" stroke="#5C3D1E" stroke-width="1.1" rx="3"/>
  <text x="665" y="180" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">DHS HSSEDI</text>
  <text x="665" y="195" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Homeland security, border, biometrics</text>

  <!-- IRS box -->
  <rect x="555" y="214" width="220" height="44" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.1" rx="3"/>
  <text x="665" y="232" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">IRS FFRDC</text>
  <text x="665" y="247" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Tax systems modernization, fraud ML</text>

  <!-- CMS box -->
  <rect x="555" y="266" width="220" height="44" fill="#7C2530" fill-opacity="0.07" stroke="#7C2530" stroke-width="1.1" rx="3"/>
  <text x="665" y="284" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">CMS Alliance (Health IT)</text>
  <text x="665" y="299" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Medicare/Medicaid systems, health AI</text>

  <!-- Bottom note -->
  <line x1="550" y1="320" x2="780" y2="320" stroke="#D4C5A9" stroke-width="1"/>
  <text x="665" y="337" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Unique advantage: MITRE can work</text>
  <text x="665" y="350" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">on classified problems that span</text>
  <text x="665" y="363" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle" font-style="italic">agency boundaries — no contractor can</text>
</svg>
