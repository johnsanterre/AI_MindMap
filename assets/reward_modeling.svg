<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Reward Modeling Pipeline (RLHF)</text>

  <!-- ── Step 1: Prompt + LLM → two responses ── -->
  <!-- Prompt box -->
  <rect x="30" y="60" width="100" height="44" rx="6" fill="#FDFAF4" stroke="#C4A87A" stroke-width="2"/>
  <text x="80" y="82" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">prompt x</text>
  <text x="80" y="97" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">"Explain gravity"</text>

  <!-- Arrow prompt → LLM -->
  <line x1="130" y1="82" x2="165" y2="82" stroke="#C4A87A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LLM box -->
  <rect x="165" y="55" width="105" height="54" rx="8" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="217" y="78" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle" font-weight="bold">LLM</text>
  <text x="217" y="97" font-family="Georgia, serif" font-size="11" fill="#C4C4E0" text-anchor="middle">(policy π)</text>

  <!-- Arrows LLM → y_A (up) and y_B (down) -->
  <line x1="270" y1="72" x2="310" y2="52" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="270" y1="92" x2="310" y2="115" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Response A box -->
  <rect x="310" y="34" width="110" height="40" rx="6" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="365" y="51" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Response y&#x2090;</text>
  <text x="365" y="67" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">"Objects attract…"</text>

  <!-- Response B box -->
  <rect x="310" y="98" width="110" height="40" rx="6" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.8"/>
  <text x="365" y="115" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Response y&#x2098;</text>
  <text x="365" y="131" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">"Gravity is magic…"</text>

  <!-- ── Step 2: Human annotator ── -->
  <!-- Arrows → human -->
  <line x1="420" y1="54" x2="460" y2="80" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="420" y1="118" x2="460" y2="95" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Human circle -->
  <circle cx="490" cy="84" r="26" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="490" y="81" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Human</text>
  <text x="490" y="95" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">annotator</text>

  <!-- Preference label -->
  <text x="490" y="123" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">y&#x2090; ≻ y&#x2098;</text>
  <text x="490" y="139" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">(preferred)</text>

  <!-- Arrow human → preference data store -->
  <line x1="516" y1="84" x2="558" y2="84" stroke="#C4A87A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Step 3: Preference data + Bradley-Terry training ── -->
  <rect x="558" y="54" width="130" height="62" rx="8" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="2"/>
  <text x="623" y="74" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Preference Data</text>
  <text x="623" y="90" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">(x, y&#x2090;, y&#x2098;) pairs</text>
  <text x="623" y="106" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Bradley-Terry loss</text>

  <!-- Arrow → RM training -->
  <line x1="623" y1="116" x2="623" y2="152" stroke="#C4A87A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Reward Model box (transformer + scalar head) ── -->
  <rect x="530" y="152" width="190" height="110" rx="10" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="2"/>
  <text x="625" y="175" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Reward Model r&#x03D5;</text>
  <!-- Transformer layers schematic -->
  <rect x="548" y="185" width="154" height="16" rx="3" fill="#FDFAF4" fill-opacity="0.15" stroke="#C4A87A" stroke-width="1"/>
  <text x="625" y="197" font-family="Georgia, serif" font-size="10" fill="#C4C4E0" text-anchor="middle">Transformer backbone</text>
  <rect x="548" y="205" width="154" height="14" rx="3" fill="#FDFAF4" fill-opacity="0.12" stroke="#C4A87A" stroke-width="1"/>
  <text x="625" y="216" font-family="Georgia, serif" font-size="10" fill="#C4C4E0" text-anchor="middle">… attention layers …</text>
  <!-- Scalar head -->
  <rect x="580" y="223" width="90" height="18" rx="4" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="625" y="236" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">scalar head</text>
  <!-- Arrow out -->
  <line x1="625" y1="262" x2="625" y2="295" stroke="#C4A87A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Step 4: Scalar score output ── -->
  <rect x="540" y="295" width="170" height="44" rx="8" fill="#7C2530" stroke="#7C2530" stroke-width="1.5"/>
  <text x="625" y="316" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle" font-weight="bold">r(x, y) ∈ ℝ</text>
  <text x="625" y="332" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">scalar reward score</text>

  <!-- ── Bottom label strip ── -->
  <rect x="30" y="358" width="740" height="30" rx="5" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="400" y="378" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">preference data → reward model → scalar proxy for human approval</text>

  <!-- ── Left-side flow labels ── -->
  <text x="80" y="155" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">① Generate</text>
  <text x="80" y="168" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">responses</text>

  <text x="365" y="175" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">② Human</text>
  <text x="365" y="188" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">comparison</text>

  <text x="217" y="175" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">③ Collect</text>
  <text x="217" y="188" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">& train RM</text>

  <!-- ── Usage arrow: RM → PPO ── -->
  <line x1="530" y1="210" x2="440" y2="248" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrd)"/>
  <rect x="290" y="232" width="148" height="36" rx="6" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5"/>
  <text x="364" y="250" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">④ RL training (PPO)</text>
  <text x="364" y="263" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">RM drives policy update</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
    <marker id="arrd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
