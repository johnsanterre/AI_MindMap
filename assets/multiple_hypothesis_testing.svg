<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Multiple Hypothesis Testing: The Multiple Comparisons Problem</text>

  <!-- LEFT: Uncorrected p-values -->
  <rect x="30" y="50" width="235" height="310" rx="8" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="147" y="72" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">No Correction</text>
  <text x="147" y="88" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">20 tests, alpha = 0.05</text>

  <!-- 20 small circles representing tests; red = false positive -->
  <!-- Row 1 -->
  <circle cx="65" cy="115" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="95" cy="115" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="125" cy="115" r="10" fill="#7C2530" opacity="0.9"/>
  <circle cx="155" cy="115" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="185" cy="115" r="10" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 2 -->
  <circle cx="65" cy="145" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="95" cy="145" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="125" cy="145" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="155" cy="145" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="185" cy="145" r="10" fill="#7C2530" opacity="0.9"/>
  <!-- Row 3 -->
  <circle cx="65" cy="175" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="95" cy="175" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="125" cy="175" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="155" cy="175" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="185" cy="175" r="10" fill="#2D5A8E" opacity="0.7"/>
  <!-- Row 4 -->
  <circle cx="65" cy="205" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="95" cy="205" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="125" cy="205" r="10" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="155" cy="205" r="10" fill="#7C2530" opacity="0.9"/>
  <circle cx="185" cy="205" r="10" fill="#2D5A8E" opacity="0.7"/>

  <!-- Legend -->
  <circle cx="60" cy="240" r="6" fill="#7C2530" opacity="0.9"/>
  <text x="72" y="244" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">False positive</text>
  <circle cx="60" cy="258" r="6" fill="#2D5A8E" opacity="0.7"/>
  <text x="72" y="262" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">True negative</text>

  <text x="147" y="290" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">P(at least 1 false positive)</text>
  <text x="147" y="308" font-family="Georgia, serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">= 64%</text>
  <text x="147" y="326" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">1 - (1 - 0.05)^20</text>
  <text x="147" y="348" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">Far too many false alarms!</text>

  <!-- CENTER: Correction Methods -->
  <rect x="285" y="50" width="230" height="310" rx="8" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="72" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Correction Methods</text>

  <!-- Bonferroni -->
  <rect x="305" y="90" width="190" height="68" rx="5" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="108" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Bonferroni</text>
  <text x="400" y="124" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">alpha_adj = alpha / m</text>
  <text x="400" y="140" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">0.05 / 20 = 0.0025</text>
  <text x="400" y="153" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Controls FWER (strict)</text>

  <!-- Holm -->
  <rect x="305" y="168" width="190" height="68" rx="5" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="186" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Holm Step-Down</text>
  <text x="400" y="202" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">alpha / (m - k + 1)</text>
  <text x="400" y="218" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">More powerful than Bonferroni</text>
  <text x="400" y="231" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Controls FWER (less strict)</text>

  <!-- BH -->
  <rect x="305" y="246" width="190" height="68" rx="5" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="264" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Benjamini-Hochberg</text>
  <text x="400" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">p_(k) vs k/m * alpha</text>
  <text x="400" y="296" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Controls false discovery rate</text>
  <text x="400" y="309" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Controls FDR (most powerful)</text>

  <!-- Arrow from left to center -->
  <line x1="268" y1="200" x2="283" y2="200" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- RIGHT: Strictness spectrum -->
  <rect x="535" y="50" width="235" height="310" rx="8" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="652" y="72" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Strictness vs. Power</text>

  <!-- Vertical arrow / spectrum -->
  <line x1="580" y1="95" x2="580" y2="320" stroke="#5C3D1E" stroke-width="2"/>
  <text x="575" y="92" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="end" font-weight="bold">Strict</text>
  <text x="575" y="328" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="end" font-weight="bold">Lenient</text>

  <!-- Bonferroni marker -->
  <circle cx="580" cy="115" r="5" fill="#7C2530"/>
  <text x="595" y="112" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Bonferroni</text>
  <text x="595" y="126" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">Few false positives,</text>
  <text x="595" y="138" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">many missed truths</text>

  <!-- Holm marker -->
  <circle cx="580" cy="185" r="5" fill="#C4A87A"/>
  <text x="595" y="182" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Holm</text>
  <text x="595" y="196" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-style="italic">Uniformly better</text>
  <text x="595" y="208" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-style="italic">than Bonferroni</text>

  <!-- BH marker -->
  <circle cx="580" cy="270" r="5" fill="#2D5A8E"/>
  <text x="595" y="267" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Benjamini-Hochberg</text>
  <text x="595" y="281" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-style="italic">More discoveries,</text>
  <text x="595" y="293" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-style="italic">controlled FDR</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Bottom caption -->
  <text x="400" y="388" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">FWER = P(any false positive)   |   FDR = E[false positives / discoveries]</text>
</svg>