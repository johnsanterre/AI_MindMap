<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#5C3D1E" letter-spacing="2">SCALED DOT-PRODUCT ATTENTION</text>

  <!-- ═══ Input Vectors ═══ -->
  <!-- Input embedding label -->
  <text x="80" y="70" text-anchor="middle" font-size="10" fill="#6B5D4F" font-style="italic">Input Embedding</text>

  <!-- Input vector x -->
  <rect x="50" y="80" width="60" height="100" rx="4" fill="#EDE5D0" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="80" y="105" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">x</text>
  <text x="80" y="120" text-anchor="middle" font-size="8" fill="#6B5D4F">token</text>
  <text x="80" y="132" text-anchor="middle" font-size="8" fill="#6B5D4F">vector</text>
  <text x="80" y="148" text-anchor="middle" font-size="7.5" fill="#6B5D4F" font-style="italic">d-dim</text>

  <!-- Three projection arrows from x -->
  <line x1="110" y1="110" x2="170" y2="85" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="110" y1="130" x2="170" y2="135" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="110" y1="150" x2="170" y2="185" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-brown)"/>

  <!-- Weight matrix labels on arrows -->
  <text x="145" y="88" text-anchor="middle" font-size="8" fill="#7C2530" font-style="italic">W_Q</text>
  <text x="148" y="128" text-anchor="middle" font-size="8" fill="#2D5A8E" font-style="italic">W_K</text>
  <text x="145" y="178" text-anchor="middle" font-size="8" fill="#5C3D1E" font-style="italic">W_V</text>

  <!-- Q box -->
  <rect x="175" y="60" width="75" height="50" rx="5" fill="#EDE5D0" stroke="#7C2530" stroke-width="2"/>
  <text x="212" y="80" text-anchor="middle" font-size="14" fill="#7C2530" font-weight="bold">Q</text>
  <text x="212" y="95" text-anchor="middle" font-size="8" fill="#5C3D1E">Query</text>
  <text x="212" y="106" text-anchor="middle" font-size="7" fill="#6B5D4F" font-style="italic">"what am I looking for?"</text>

  <!-- K box -->
  <rect x="175" y="115" width="75" height="50" rx="5" fill="#EDE5D0" stroke="#2D5A8E" stroke-width="2"/>
  <text x="212" y="135" text-anchor="middle" font-size="14" fill="#2D5A8E" font-weight="bold">K</text>
  <text x="212" y="150" text-anchor="middle" font-size="8" fill="#5C3D1E">Key</text>
  <text x="212" y="161" text-anchor="middle" font-size="7" fill="#6B5D4F" font-style="italic">"what do I contain?"</text>

  <!-- V box -->
  <rect x="175" y="170" width="75" height="50" rx="5" fill="#EDE5D0" stroke="#5C3D1E" stroke-width="2"/>
  <text x="212" y="190" text-anchor="middle" font-size="14" fill="#5C3D1E" font-weight="bold">V</text>
  <text x="212" y="205" text-anchor="middle" font-size="8" fill="#5C3D1E">Value</text>
  <text x="212" y="216" text-anchor="middle" font-size="7" fill="#6B5D4F" font-style="italic">"what do I actually say?"</text>

  <!-- ═══ Dot Product Step ═══ -->
  <!-- Arrow Q to dot product -->
  <line x1="250" y1="85" x2="320" y2="130" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow K to dot product -->
  <line x1="250" y1="140" x2="320" y2="140" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Dot product box -->
  <rect x="325" y="115" width="120" height="50" rx="5" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="385" y="135" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Q . K^T</text>
  <text x="385" y="152" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">score = Q . K^T / sqrt(d_k)</text>

  <!-- ═══ Scale + Softmax ═══ -->
  <line x1="445" y1="140" x2="490" y2="140" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Softmax box -->
  <rect x="495" y="115" width="100" height="50" rx="5" fill="#F5EDE0" stroke="#7C2530" stroke-width="1.8"/>
  <text x="545" y="135" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Softmax</text>
  <text x="545" y="152" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">normalize to</text>
  <text x="545" y="162" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">probabilities</text>

  <!-- ═══ Weighted Sum with V ═══ -->
  <!-- Arrow softmax to multiply -->
  <line x1="595" y1="140" x2="640" y2="170" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow V to multiply -->
  <line x1="250" y1="195" x2="640" y2="185" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-brown)" stroke-dasharray="6,3"/>

  <!-- Multiply box -->
  <rect x="645" y="160" width="110" height="50" rx="5" fill="#EDE5D0" stroke="#7C2530" stroke-width="2"/>
  <text x="700" y="178" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Weighted Sum</text>
  <text x="700" y="194" text-anchor="middle" font-size="8" fill="#6B5D4F">attention . V</text>
  <text x="700" y="206" text-anchor="middle" font-size="7" fill="#6B5D4F" font-style="italic">context-aware output</text>

  <!-- ═══ Score Matrix Visualization ═══ -->
  <text x="400" y="250" text-anchor="middle" font-size="11" fill="#5C3D1E" letter-spacing="1">ATTENTION SCORE MATRIX</text>

  <!-- Column headers -->
  <text x="270" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">The</text>
  <text x="320" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">cat</text>
  <text x="370" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">sat</text>
  <text x="420" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">on</text>
  <text x="470" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">the</text>
  <text x="520" y="270" text-anchor="middle" font-size="8" fill="#6B5D4F">mat</text>
  <text x="555" y="265" text-anchor="start" font-size="7" fill="#6B5D4F" font-style="italic">keys</text>

  <!-- Row header for highlighted row -->
  <text x="238" y="300" text-anchor="end" font-size="8" fill="#7C2530" font-weight="bold">cat</text>
  <text x="220" y="310" text-anchor="end" font-size="7" fill="#6B5D4F" font-style="italic">query</text>

  <!-- Score row for "cat" query -->
  <rect x="245" y="280" width="50" height="30" fill="#F5EAEA" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="270" y="300" text-anchor="middle" font-size="9" fill="#5C3D1E">0.05</text>

  <rect x="295" y="280" width="50" height="30" fill="#7C2530" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="320" y="300" text-anchor="middle" font-size="9" fill="#FDFAF4" font-weight="bold">0.45</text>

  <rect x="345" y="280" width="50" height="30" fill="#D4A0A8" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="370" y="300" text-anchor="middle" font-size="9" fill="#5C3D1E">0.25</text>

  <rect x="395" y="280" width="50" height="30" fill="#F5EAEA" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="420" y="300" text-anchor="middle" font-size="9" fill="#5C3D1E">0.03</text>

  <rect x="445" y="280" width="50" height="30" fill="#F5EAEA" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="470" y="300" text-anchor="middle" font-size="9" fill="#5C3D1E">0.02</text>

  <rect x="495" y="280" width="50" height="30" fill="#B85060" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="520" y="300" text-anchor="middle" font-size="9" fill="#FDFAF4">0.20</text>

  <!-- Color legend -->
  <text x="260" y="340" font-size="7.5" fill="#6B5D4F">low</text>
  <rect x="278" y="332" width="14" height="8" fill="#F5EAEA"/>
  <rect x="292" y="332" width="14" height="8" fill="#EDD5D8"/>
  <rect x="306" y="332" width="14" height="8" fill="#D4A0A8"/>
  <rect x="320" y="332" width="14" height="8" fill="#B85060"/>
  <rect x="334" y="332" width="14" height="8" fill="#7C2530"/>
  <text x="352" y="340" font-size="7.5" fill="#6B5D4F">high attention</text>

  <!-- Interpretation -->
  <text x="500" y="340" text-anchor="start" font-size="8" fill="#6B5D4F" font-style="italic">"cat" attends most to itself and "mat"</text>
  <text x="500" y="352" text-anchor="start" font-size="8" fill="#6B5D4F" font-style="italic">-- learning semantic relationships</text>

  <!-- Bottom caption -->
  <text x="400" y="385" text-anchor="middle" font-size="10" fill="#6B5D4F">
    Each token queries all keys, softmax normalizes scores, then retrieves a weighted blend of values
  </text>
</svg>