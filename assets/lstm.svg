<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2" rx="5"/>

  <defs>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arw-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7C2530"/>
    </marker>
    <marker id="arw-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#5C3D1E" font-size="16" font-weight="bold" letter-spacing="1">LSTM CELL</text>
  <text x="660" y="30" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold" letter-spacing="1">UNROLLED</text>

  <!-- Divider -->
  <line x1="520" y1="40" x2="520" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT PANEL: LSTM Cell Detail ===== -->

  <!-- Cell body background -->
  <rect x="40" y="55" width="440" height="280" fill="#F8F4EC" stroke="#D4C5A9" stroke-width="1.5" rx="10"/>

  <!-- Cell state highway (top) -->
  <line x1="40" y1="95" x2="480" y2="95" stroke="#7C2530" stroke-width="3"/>
  <polygon points="474,91 482,95 474,99" fill="#7C2530"/>
  <text x="260" y="78" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">Cell State Cₜ  (the highway)</text>
  <text x="30" y="99" font-size="10" fill="#7C2530">Cₜ₋₁</text>
  <text x="488" y="99" font-size="10" fill="#7C2530">Cₜ</text>

  <!-- Hidden state line (bottom) -->
  <line x1="40" y1="270" x2="480" y2="270" stroke="#2D5A8E" stroke-width="2.5"/>
  <polygon points="474,267 482,270 474,273" fill="#2D5A8E"/>
  <text x="30" y="274" font-size="10" fill="#2D5A8E">hₜ₋₁</text>
  <text x="488" y="274" font-size="10" fill="#2D5A8E">hₜ</text>

  <!-- ---- Forget Gate ---- -->
  <rect x="80" y="160" width="80" height="50" rx="8" fill="#7C2530" stroke="#5a1a22" stroke-width="1.5"/>
  <text x="120" y="182" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Forget</text>
  <text x="120" y="200" text-anchor="middle" fill="#e8c0c5" font-size="11">fₜ = σ</text>
  <!-- Arrow from hidden state up to forget gate -->
  <line x1="120" y1="270" x2="120" y2="212" stroke="#6B5D4F" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="117,214 120,207 123,214" fill="#6B5D4F"/>
  <!-- Forget multiply on cell state -->
  <circle cx="120" cy="95" r="12" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" fill="#7C2530" font-size="14" font-weight="bold">x</text>
  <line x1="120" y1="160" x2="120" y2="109" stroke="#7C2530" stroke-width="1.5"/>
  <polygon points="117,111 120,104 123,111" fill="#7C2530"/>

  <!-- ---- Input Gate ---- -->
  <rect x="200" y="160" width="80" height="50" rx="8" fill="#2D5A8E" stroke="#1e3f63" stroke-width="1.5"/>
  <text x="240" y="182" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Input</text>
  <text x="240" y="200" text-anchor="middle" fill="#b8d0e8" font-size="11">iₜ = σ</text>
  <!-- Arrow from hidden state up to input gate -->
  <line x1="240" y1="270" x2="240" y2="212" stroke="#6B5D4F" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="237,214 240,207 243,214" fill="#6B5D4F"/>

  <!-- Candidate box -->
  <rect x="200" y="232" width="80" height="32" rx="6" fill="#2D5A8E" stroke="#1e3f63" stroke-width="1" opacity="0.5"/>
  <text x="240" y="253" text-anchor="middle" fill="white" font-size="10">c̃ₜ = tanh</text>

  <!-- Input add on cell state -->
  <circle cx="260" cy="95" r="12" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="260" y="100" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">+</text>
  <line x1="240" y1="160" x2="240" y2="128" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="240" y1="128" x2="260" y2="128" stroke="#2D5A8E" stroke-width="1"/>
  <line x1="260" y1="128" x2="260" y2="109" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="257,111 260,104 263,111" fill="#2D5A8E"/>

  <!-- ---- Output Gate ---- -->
  <rect x="360" y="160" width="80" height="50" rx="8" fill="#5C3D1E" stroke="#3d2914" stroke-width="1.5"/>
  <text x="400" y="182" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Output</text>
  <text x="400" y="200" text-anchor="middle" fill="#d4c5a0" font-size="11">oₜ = σ</text>
  <!-- Arrow from hidden state up to output gate -->
  <line x1="400" y1="270" x2="400" y2="212" stroke="#6B5D4F" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="397,214 400,207 403,214" fill="#6B5D4F"/>

  <!-- Output tanh on cell state -->
  <circle cx="400" cy="95" r="12" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="99" text-anchor="middle" fill="#5C3D1E" font-size="9">tanh</text>
  <line x1="400" y1="160" x2="400" y2="109" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="397,111 400,104 403,111" fill="#5C3D1E"/>

  <!-- xₜ input from below -->
  <line x1="260" y1="355" x2="260" y2="338" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="257,340 260,333 263,340" fill="#C4A87A"/>
  <text x="260" y="370" text-anchor="middle" fill="#C4A87A" font-size="13" font-weight="bold">xₜ (input)</text>

  <!-- hₜ output upward -->
  <line x1="440" y1="270" x2="440" y2="240" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="440" y1="240" x2="460" y2="240" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="490" y="244" fill="#2D5A8E" font-size="10" font-weight="bold">hₜ output</text>

  <!-- ===== RIGHT PANEL: Unrolled LSTM ===== -->

  <!-- Cell state flow -->
  <line x1="545" y1="105" x2="778" y2="105" stroke="#7C2530" stroke-width="2"/>
  <polygon points="772,102 780,105 772,108" fill="#7C2530"/>
  <text x="660" y="85" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">cell state C</text>

  <!-- Hidden state flow -->
  <line x1="545" y1="255" x2="778" y2="255" stroke="#2D5A8E" stroke-width="2"/>
  <polygon points="772,252 780,255 772,258" fill="#2D5A8E"/>
  <text x="660" y="282" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">hidden state h</text>

  <!-- LSTM cell t-1 -->
  <rect x="555" y="135" width="70" height="85" fill="#F8F4EC" stroke="#C4A87A" stroke-width="1.5" rx="6"/>
  <text x="590" y="172" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">LSTM</text>
  <text x="590" y="192" text-anchor="middle" fill="#6B5D4F" font-size="10">t-1</text>

  <!-- LSTM cell t -->
  <rect x="640" y="135" width="70" height="85" fill="#F8F4EC" stroke="#C4A87A" stroke-width="1.5" rx="6"/>
  <text x="675" y="172" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">LSTM</text>
  <text x="675" y="192" text-anchor="middle" fill="#6B5D4F" font-size="10">t</text>

  <!-- LSTM cell t+1 -->
  <rect x="725" y="135" width="52" height="85" fill="#F8F4EC" stroke="#C4A87A" stroke-width="1.5" rx="6"/>
  <text x="751" y="172" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">LSTM</text>
  <text x="751" y="192" text-anchor="middle" fill="#6B5D4F" font-size="10">t+1</text>

  <!-- Input arrows -->
  <line x1="590" y1="320" x2="590" y2="222" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="587,224 590,217 593,224" fill="#C4A87A"/>
  <text x="590" y="336" text-anchor="middle" fill="#C4A87A" font-size="11">xₜ₋₁</text>

  <line x1="675" y1="320" x2="675" y2="222" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="672,224 675,217 678,224" fill="#C4A87A"/>
  <text x="675" y="336" text-anchor="middle" fill="#C4A87A" font-size="11">xₜ</text>

  <line x1="751" y1="320" x2="751" y2="222" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="748,224 751,217 754,224" fill="#C4A87A"/>
  <text x="751" y="336" text-anchor="middle" fill="#C4A87A" font-size="11">xₜ₊₁</text>

  <!-- Output arrows -->
  <line x1="590" y1="135" x2="590" y2="60" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="587,62 590,55 593,62" fill="#2D5A8E"/>
  <text x="590" y="50" text-anchor="middle" fill="#2D5A8E" font-size="10">yₜ₋₁</text>

  <line x1="675" y1="135" x2="675" y2="60" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="672,62 675,55 678,62" fill="#2D5A8E"/>
  <text x="675" y="50" text-anchor="middle" fill="#2D5A8E" font-size="10">yₜ</text>

  <line x1="751" y1="135" x2="751" y2="60" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="748,62 751,55 754,62" fill="#2D5A8E"/>
  <text x="751" y="50" text-anchor="middle" fill="#2D5A8E" font-size="10">yₜ₊₁</text>

  <!-- Legend -->
  <rect x="40" y="378" width="10" height="10" fill="#7C2530" rx="2"/>
  <text x="55" y="387" fill="#5C3D1E" font-size="10">Forget</text>
  <rect x="100" y="378" width="10" height="10" fill="#2D5A8E" rx="2"/>
  <text x="115" y="387" fill="#5C3D1E" font-size="10">Input</text>
  <rect x="155" y="378" width="10" height="10" fill="#5C3D1E" rx="2"/>
  <text x="170" y="387" fill="#5C3D1E" font-size="10">Output</text>
  <rect x="220" y="378" width="10" height="10" fill="#C4A87A" rx="2"/>
  <text x="235" y="387" fill="#5C3D1E" font-size="10">Cell state highway</text>

  <!-- Caption -->
  <text x="400" y="397" text-anchor="middle" fill="#6B5D4F" font-size="9">Gates learn what to remember, forget, and output — preserving gradients across hundreds of timesteps</text>
</svg>