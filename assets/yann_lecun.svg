<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Yann LeCun: From Convolutions to World Models</text>

  <!-- Timeline spine -->
  <line x1="60" y1="200" x2="760" y2="200" stroke="#C4A87A" stroke-width="2.5"/>
  <polygon points="756,195 766,200 756,205" fill="#C4A87A"/>

  <!-- Era bands -->
  <rect x="60"  y="185" width="160" height="30" fill="#2D5A8E" rx="3" opacity="0.15"/>
  <rect x="220" y="185" width="140" height="30" fill="#5C3D1E" rx="3" opacity="0.12"/>
  <rect x="360" y="185" width="170" height="30" fill="#7C2530" rx="3" opacity="0.12"/>
  <rect x="530" y="185" width="230" height="30" fill="#2D5A8E" rx="3" opacity="0.10"/>

  <!-- Era labels -->
  <text x="140" y="178" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Bell Labs Era</text>
  <text x="290" y="178" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">NYU &amp; Energy Models</text>
  <text x="445" y="178" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">FAIR / Deep Learning</text>
  <text x="645" y="178" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Self-Supervised Vision</text>

  <!-- 1989: LeNet / Backprop on CNNs -->
  <circle cx="90" cy="200" r="8" fill="#2D5A8E"/>
  <line x1="90" y1="192" x2="90" y2="120" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="90" y="112" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1989</text>
  <text x="90" y="101" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Backprop</text>
  <text x="90" y="90" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">applied to CNNs</text>

  <!-- 1998: LeNet-5 -->
  <circle cx="180" cy="200" r="9" fill="#2D5A8E"/>
  <line x1="180" y1="208" x2="180" y2="270" stroke="#2D5A8E" stroke-width="2"/>
  <text x="180" y="284" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1998</text>
  <text x="180" y="297" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">LeNet-5</text>
  <text x="180" y="310" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Handwritten digit</text>
  <text x="180" y="322" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">recognition</text>

  <!-- 2003: NYU + Energy-Based Models -->
  <circle cx="270" cy="200" r="7" fill="#5C3D1E"/>
  <line x1="270" y1="192" x2="270" y2="120" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="270" y="112" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2003</text>
  <text x="270" y="101" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">NYU Professor</text>

  <!-- 2006: Energy-Based Models -->
  <circle cx="340" cy="200" r="7" fill="#5C3D1E"/>
  <line x1="340" y1="208" x2="340" y2="268" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="340" y="282" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2006</text>
  <text x="340" y="295" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Energy-Based</text>
  <text x="340" y="308" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Models</text>

  <!-- 2013: FAIR Founded -->
  <circle cx="430" cy="200" r="9" fill="#7C2530"/>
  <line x1="430" y1="192" x2="430" y2="115" stroke="#7C2530" stroke-width="2"/>
  <text x="430" y="107" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2013</text>
  <text x="430" y="96" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">FAIR Founded</text>
  <text x="430" y="85" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Chief AI Scientist</text>

  <!-- 2018: Turing Award -->
  <circle cx="540" cy="200" r="10" fill="#7C2530"/>
  <line x1="540" y1="208" x2="540" y2="270" stroke="#7C2530" stroke-width="2"/>
  <text x="540" y="284" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2018</text>
  <text x="540" y="298" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Turing Award</text>
  <text x="540" y="312" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">with Hinton &amp; Bengio</text>

  <!-- 2022+: Self-Supervised / World Models -->
  <circle cx="680" cy="200" r="8" fill="#2D5A8E"/>
  <line x1="680" y1="192" x2="680" y2="115" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="680" y="107" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2022+</text>
  <text x="680" y="96" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Self-Supervised</text>
  <text x="680" y="85" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Learning &amp;</text>
  <text x="680" y="74" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">World Models</text>

  <!-- Convolution callout box -->
  <rect x="40" y="335" width="210" height="42" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="145" y="353" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">Core idea: local receptive fields +</text>
  <text x="145" y="367" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">weight sharing = translation invariance</text>
  <line x1="180" y1="322" x2="165" y2="335" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Philosophy callout box -->
  <rect x="555" y="335" width="220" height="42" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="665" y="353" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">"Prediction is the essence of</text>
  <text x="665" y="367" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">intelligence." — Yann LeCun</text>
  <line x1="680" y1="208" x2="670" y2="335" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom caption -->
  <text x="400" y="55" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">A career arc from practical pattern recognition to a unified theory of machine intelligence.</text>
</svg>