<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="4"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Graph Theory: Three Fundamental Graph Types</text>

  <!-- ============ UNDIRECTED GRAPH ============ -->
  <text x="145" y="75" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle" font-style="italic">Undirected Graph</text>

  <!-- Vertices -->
  <circle cx="80" cy="140" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="80" y="145" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">A</text>

  <circle cx="210" cy="110" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="210" y="115" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">B</text>

  <circle cx="210" cy="220" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="210" y="225" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">C</text>

  <circle cx="80" cy="260" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="80" y="265" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">D</text>

  <circle cx="145" cy="330" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="145" y="335" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">E</text>

  <!-- Edges (undirected) -->
  <line x1="97" y1="134" x2="192" y2="116" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="97" y1="150" x2="192" y2="212" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="210" y1="128" x2="210" y2="202" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="80" y1="158" x2="80" y2="242" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="92" y1="272" x2="132" y2="318" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="158" y1="318" x2="198" y2="232" stroke="#C4A87A" stroke-width="2.5"/>

  <!-- Edge labels -->
  <text x="145" y="170" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">edge</text>
  <text x="55" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">edge</text>

  <!-- ============ DIRECTED GRAPH ============ -->
  <text x="410" y="75" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle" font-style="italic">Directed Graph (Digraph)</text>

  <defs>
    <marker id="arrowRed" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Vertices -->
  <circle cx="340" cy="140" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="340" y="145" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">F</text>

  <circle cx="480" cy="110" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="480" y="115" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">G</text>

  <circle cx="480" cy="240" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="480" y="245" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">H</text>

  <circle cx="340" cy="270" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="340" y="275" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">I</text>

  <circle cx="410" cy="340" r="18" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="410" y="345" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">J</text>

  <!-- Directed edges -->
  <line x1="358" y1="134" x2="462" y2="116" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <line x1="480" y1="128" x2="480" y2="220" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <line x1="462" y1="240" x2="358" y2="268" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <line x1="340" y1="158" x2="340" y2="252" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <line x1="354" y1="282" x2="396" y2="328" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Arc label -->
  <text x="425" y="100" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">arc</text>
  <text x="315" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">arc</text>

  <!-- ============ WEIGHTED GRAPH ============ -->
  <text x="670" y="75" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle" font-style="italic">Weighted Graph</text>

  <!-- Vertices -->
  <circle cx="600" cy="150" r="18" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="600" y="155" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">K</text>

  <circle cx="740" cy="120" r="18" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="740" y="125" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">L</text>

  <circle cx="740" cy="260" r="18" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="740" y="265" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">M</text>

  <circle cx="600" cy="290" r="18" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="600" y="295" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">N</text>

  <circle cx="670" cy="360" r="18" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="670" y="365" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">O</text>

  <!-- Weighted edges -->
  <line x1="617" y1="143" x2="722" y2="127" stroke="#C4A87A" stroke-width="3"/>
  <line x1="740" y1="138" x2="740" y2="242" stroke="#C4A87A" stroke-width="3"/>
  <line x1="722" y1="267" x2="618" y2="284" stroke="#C4A87A" stroke-width="3"/>
  <line x1="600" y1="168" x2="600" y2="272" stroke="#C4A87A" stroke-width="3"/>
  <line x1="613" y1="302" x2="657" y2="348" stroke="#C4A87A" stroke-width="3"/>
  <line x1="683" y1="348" x2="727" y2="272" stroke="#C4A87A" stroke-width="3"/>

  <!-- Weight labels -->
  <rect x="655" y="120" width="28" height="18" fill="#FDFAF4" rx="3"/>
  <text x="669" y="134" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">3</text>

  <rect x="748" y="180" width="28" height="18" fill="#FDFAF4" rx="3"/>
  <text x="762" y="194" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">7</text>

  <rect x="655" y="268" width="28" height="18" fill="#FDFAF4" rx="3"/>
  <text x="669" y="282" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2</text>

  <rect x="574" y="210" width="28" height="18" fill="#FDFAF4" rx="3"/>
  <text x="588" y="224" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">5</text>

  <rect x="618" y="325" width="28" height="18" fill="#FDFAF4" rx="3"/>
  <text x="632" y="339" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1</text>

  <rect x="710" y="310" width="28" height="18" fill="#FDFAF4" rx="3"/>
  <text x="724" y="324" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">4</text>
</svg>