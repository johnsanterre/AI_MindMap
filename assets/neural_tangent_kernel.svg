<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" font-weight="bold">Neural Tangent Kernel</text>

  <!-- Left: Finite-Width Network -->
  <rect x="40" y="60" width="220" height="280" rx="8" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="150" y="84" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">Finite-Width Network</text>

  <!-- Neural net nodes - input layer -->
  <circle cx="80" cy="140" r="10" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="80" cy="190" r="10" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="80" cy="240" r="10" fill="#2D5A8E" opacity="0.8"/>

  <!-- Hidden layer -->
  <circle cx="150" cy="120" r="9" fill="#7C2530" opacity="0.8"/>
  <circle cx="150" cy="160" r="9" fill="#7C2530" opacity="0.8"/>
  <circle cx="150" cy="200" r="9" fill="#7C2530" opacity="0.8"/>
  <circle cx="150" cy="240" r="9" fill="#7C2530" opacity="0.8"/>
  <circle cx="150" cy="270" r="7" fill="#7C2530" opacity="0.4"/>
  <text x="150" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">width m</text>

  <!-- Output -->
  <circle cx="220" cy="190" r="10" fill="#5C3D1E" opacity="0.8"/>

  <!-- Connections input to hidden -->
  <line x1="90" y1="140" x2="141" y2="120" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="140" x2="141" y2="160" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="140" x2="141" y2="200" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="140" x2="141" y2="240" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="190" x2="141" y2="120" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="190" x2="141" y2="160" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="190" x2="141" y2="200" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="190" x2="141" y2="240" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="240" x2="141" y2="120" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="240" x2="141" y2="160" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="240" x2="141" y2="200" stroke="#C4A87A" stroke-width="1"/>
  <line x1="90" y1="240" x2="141" y2="240" stroke="#C4A87A" stroke-width="1"/>

  <!-- Connections hidden to output -->
  <line x1="159" y1="120" x2="210" y2="190" stroke="#C4A87A" stroke-width="1"/>
  <line x1="159" y1="160" x2="210" y2="190" stroke="#C4A87A" stroke-width="1"/>
  <line x1="159" y1="200" x2="210" y2="190" stroke="#C4A87A" stroke-width="1"/>
  <line x1="159" y1="240" x2="210" y2="190" stroke="#C4A87A" stroke-width="1"/>

  <!-- Arrow: width -> infinity -->
  <text x="310" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-style="italic">width</text>
  <line x1="285" y1="170" x2="335" y2="170" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <text x="310" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">m -> inf</text>

  <!-- Right: Kernel Regression -->
  <rect x="370" y="60" width="400" height="280" rx="8" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="570" y="84" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">Kernel Regression with Fixed NTK</text>

  <!-- Kernel matrix visualization -->
  <rect x="400" y="105" width="120" height="120" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="460" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">K(x, x')</text>

  <!-- Matrix grid lines -->
  <line x1="440" y1="105" x2="440" y2="225" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="480" y1="105" x2="480" y2="225" stroke="#2D5A8E" stroke-width="0.4" opacity="0.4"/>
  <line x1="400" y1="145" x2="520" y2="145" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="400" y1="185" x2="520" y2="185" stroke="#2D5A8E" stroke-width="0.4" opacity="0.4"/>

  <!-- Diagonal highlight -->
  <line x1="400" y1="105" x2="520" y2="225" stroke="#7C2530" stroke-width="2" opacity="0.6"/>

  <!-- NTK formula -->
  <text x="660" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">NTK kernel:</text>
  <text x="660" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-style="italic">K(x, x') =</text>
  <text x="660" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-style="italic">&lt;grad f(x), grad f(x')&gt;</text>

  <!-- Key properties -->
  <text x="460" y="258" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Kernel stays fixed during training</text>
  <text x="460" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E">Training = solving linear system</text>
  <text x="460" y="298" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530">Prediction = kernel regression</text>
  <text x="460" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Global convergence guaranteed</text>

  <!-- Bottom note -->
  <text x="400" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#C4A87A" font-style="italic">Jacot, Gabriel, Hongler (2018): infinite-width networks linearize around initialization</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowBrown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>