<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">Jure Leskovec</text>

  <!-- Center hub -->
  <ellipse cx="400" cy="210" rx="100" ry="36" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Graph</text>
  <text x="400" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Representation Learning</text>

  <!-- Spokes -->
  <!-- node2vec (top-left) -->
  <line x1="320" y1="185" x2="165" y2="105" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="130" cy="90" rx="75" ry="28" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="130" y="86" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">node2vec</text>
  <text x="130" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FDFAF4">Random Walk Embeddings</text>

  <!-- GraphSAGE (top-right) -->
  <line x1="480" y1="185" x2="635" y2="105" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="670" cy="90" rx="80" ry="28" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="670" y="86" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">GraphSAGE</text>
  <text x="670" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FDFAF4">Inductive Node Learning</text>

  <!-- SNAP (left) -->
  <line x1="305" y1="218" x2="165" y2="230" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="120" cy="230" rx="85" ry="28" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="120" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">SNAP</text>
  <text x="120" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FDFAF4">Network Analysis Tools</text>

  <!-- Stanford (bottom-left) -->
  <line x1="340" y1="240" x2="225" y2="340" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="190" cy="350" rx="70" ry="28" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="190" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">Stanford</text>
  <text x="190" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">CS Department</text>

  <!-- Pinterest (bottom-right) -->
  <line x1="460" y1="240" x2="575" y2="340" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="610" cy="350" rx="70" ry="28" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="610" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">Pinterest</text>
  <text x="610" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Industry ML at Scale</text>

  <!-- Network Evolution (right) -->
  <line x1="495" y1="218" x2="635" y2="230" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="680" cy="230" rx="85" ry="28" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="680" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Network Evolution</text>
  <text x="680" y="242" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FDFAF4">Community Detection</text>

  <!-- Small decorative graph nodes around hub -->
  <circle cx="355" cy="155" r="4" fill="#7C2530" opacity="0.4"/>
  <circle cx="445" cy="155" r="4" fill="#7C2530" opacity="0.4"/>
  <circle cx="340" cy="265" r="4" fill="#7C2530" opacity="0.4"/>
  <circle cx="460" cy="265" r="4" fill="#7C2530" opacity="0.4"/>
  <line x1="355" y1="155" x2="445" y2="155" stroke="#7C2530" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="265" x2="460" y2="265" stroke="#7C2530" stroke-width="1" opacity="0.3"/>
  <line x1="355" y1="155" x2="340" y2="265" stroke="#7C2530" stroke-width="1" opacity="0.2"/>
  <line x1="445" y1="155" x2="460" y2="265" stroke="#7C2530" stroke-width="1" opacity="0.2"/>
</svg>