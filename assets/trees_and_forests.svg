<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Section dividers -->
  <line x1="270" y1="20" x2="270" y2="350" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="20" x2="530" y2="350" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== SECTION 1: Rooted Tree ===== -->
  <text x="135" y="38" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Rooted Tree</text>

  <!-- Root -->
  <circle cx="135" cy="80" r="12" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <text x="135" y="84" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">r</text>

  <!-- Level 1 edges -->
  <line x1="135" y1="92" x2="80" y2="140" stroke="#C4A87A" stroke-width="2"/>
  <line x1="135" y1="92" x2="190" y2="140" stroke="#C4A87A" stroke-width="2"/>

  <!-- Level 1 nodes -->
  <circle cx="80" cy="150" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="80" y="154" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">a</text>
  <circle cx="190" cy="150" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="190" y="154" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">b</text>

  <!-- Level 2 edges -->
  <line x1="80" y1="162" x2="45" y2="210" stroke="#C4A87A" stroke-width="2"/>
  <line x1="80" y1="162" x2="115" y2="210" stroke="#C4A87A" stroke-width="2"/>
  <line x1="190" y1="162" x2="210" y2="210" stroke="#C4A87A" stroke-width="2"/>

  <!-- Level 2 nodes -->
  <circle cx="45" cy="220" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="45" y="224" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">c</text>
  <circle cx="115" cy="220" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="115" y="224" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">d</text>
  <circle cx="210" cy="220" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <text x="210" y="224" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">e</text>

  <!-- Labels -->
  <text x="135" y="270" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">5 nodes, 4 edges</text>
  <text x="135" y="286" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">n &#8722; 1 = 4</text>
  <text x="135" y="306" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">unique path: r &#8594; a &#8594; c</text>

  <!-- ===== SECTION 2: Binary Tree ===== -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Binary Tree</text>

  <!-- Root -->
  <circle cx="400" cy="80" r="12" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>

  <!-- Level 1 edges -->
  <line x1="400" y1="92" x2="340" y2="130" stroke="#C4A87A" stroke-width="2"/>
  <line x1="400" y1="92" x2="460" y2="130" stroke="#C4A87A" stroke-width="2"/>

  <!-- Level 1 nodes -->
  <circle cx="340" cy="140" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="460" cy="140" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>

  <!-- Level 2 edges -->
  <line x1="340" y1="152" x2="310" y2="190" stroke="#C4A87A" stroke-width="2"/>
  <line x1="340" y1="152" x2="370" y2="190" stroke="#C4A87A" stroke-width="2"/>
  <line x1="460" y1="152" x2="430" y2="190" stroke="#C4A87A" stroke-width="2"/>
  <line x1="460" y1="152" x2="490" y2="190" stroke="#C4A87A" stroke-width="2"/>

  <!-- Level 2 nodes -->
  <circle cx="310" cy="200" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="370" cy="200" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="430" cy="200" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="490" cy="200" r="12" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>

  <!-- Labels -->
  <text x="400" y="245" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">each node &#8804; 2 children</text>
  <text x="400" y="261" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">depth = 2, leaves = 4</text>

  <!-- Traversal order labels -->
  <rect x="310" y="280" width="180" height="42" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="296" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Traversals</text>
  <text x="400" y="312" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Pre: root &#8594; L &#8594; R | In: L &#8594; root &#8594; R</text>

  <!-- ===== SECTION 3: Forest ===== -->
  <text x="665" y="38" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Forest</text>
  <text x="665" y="55" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">(disjoint union of trees)</text>

  <!-- Tree 1 in forest -->
  <circle cx="580" cy="95" r="10" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <line x1="580" y1="105" x2="560" y2="140" stroke="#C4A87A" stroke-width="2"/>
  <line x1="580" y1="105" x2="600" y2="140" stroke="#C4A87A" stroke-width="2"/>
  <circle cx="560" cy="150" r="10" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="600" cy="150" r="10" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <line x1="560" y1="160" x2="545" y2="195" stroke="#C4A87A" stroke-width="2"/>
  <circle cx="545" cy="205" r="10" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>

  <!-- Tree 2 in forest -->
  <circle cx="680" cy="95" r="10" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <line x1="680" y1="105" x2="680" y2="140" stroke="#C4A87A" stroke-width="2"/>
  <circle cx="680" cy="150" r="10" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>

  <!-- Tree 3 in forest -->
  <circle cx="755" cy="95" r="10" fill="#7C2530" stroke="#FDFAF4" stroke-width="2"/>
  <line x1="755" y1="105" x2="735" y2="140" stroke="#C4A87A" stroke-width="2"/>
  <line x1="755" y1="105" x2="775" y2="140" stroke="#C4A87A" stroke-width="2"/>
  <circle cx="735" cy="150" r="10" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>
  <circle cx="775" cy="150" r="10" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="2"/>

  <!-- Forest labels -->
  <text x="665" y="245" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">3 trees, 9 nodes, 6 edges</text>
  <text x="665" y="261" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">acyclic, disconnected</text>

  <!-- Cayley's formula box -->
  <rect x="555" y="280" width="220" height="42" rx="4" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>
  <text x="665" y="296" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Cayley&#8217;s Formula</text>
  <text x="665" y="312" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">labeled trees on n nodes = n&#8319;&#8315;&#178;</text>

  <!-- Bottom caption -->
  <text x="400" y="370" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Trees: connected acyclic graphs with n&#8722;1 edges and unique paths between all node pairs</text>
</svg>