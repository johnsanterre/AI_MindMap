<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">Geoffrey Hinton — A Timeline</text>

  <!-- Timeline line -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#C4A87A" stroke-width="3" stroke-linecap="round"/>

  <!-- 1985: Boltzmann Machines -->
  <circle cx="100" cy="200" r="8" fill="#7C2530"/>
  <line x1="100" y1="192" x2="100" y2="120" stroke="#7C2530" stroke-width="2"/>
  <rect x="35" y="70" width="130" height="48" rx="6" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="100" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-weight="bold">1985</text>
  <text x="100" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Boltzmann Machines</text>

  <!-- 1986: Backpropagation -->
  <circle cx="215" cy="200" r="8" fill="#2D5A8E"/>
  <line x1="215" y1="208" x2="215" y2="280" stroke="#2D5A8E" stroke-width="2"/>
  <rect x="145" y="282" width="140" height="48" rx="6" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="215" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-weight="bold">1986</text>
  <text x="215" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Backprop Popularized</text>

  <!-- 2006: Deep Belief Networks -->
  <circle cx="365" cy="200" r="8" fill="#5C3D1E"/>
  <line x1="365" y1="192" x2="365" y2="120" stroke="#5C3D1E" stroke-width="2"/>
  <rect x="293" y="70" width="144" height="48" rx="6" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="365" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">2006</text>
  <text x="365" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Deep Belief Networks</text>

  <!-- 2012: AlexNet / ImageNet -->
  <circle cx="500" cy="200" r="8" fill="#2D5A8E"/>
  <line x1="500" y1="208" x2="500" y2="280" stroke="#2D5A8E" stroke-width="2"/>
  <rect x="430" y="282" width="140" height="48" rx="6" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="500" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-weight="bold">2012</text>
  <text x="500" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">AlexNet / ImageNet</text>

  <!-- 2017: Capsule Networks -->
  <circle cx="615" cy="200" r="8" fill="#7C2530"/>
  <line x1="615" y1="192" x2="615" y2="120" stroke="#7C2530" stroke-width="2"/>
  <rect x="548" y="70" width="134" height="48" rx="6" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="615" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-weight="bold">2017</text>
  <text x="615" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Capsule Networks</text>

  <!-- 2024: Nobel Prize -->
  <circle cx="720" cy="200" r="10" fill="#C4A87A" stroke="#7C2530" stroke-width="2"/>
  <line x1="720" y1="208" x2="720" y2="280" stroke="#C4A87A" stroke-width="2"/>
  <rect x="650" y="282" width="140" height="48" rx="6" fill="#C4A87A" opacity="0.25" stroke="#7C2530" stroke-width="1.5"/>
  <text x="720" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-weight="bold">2024</text>
  <text x="720" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">Nobel Prize in Physics</text>

  <!-- Decorative: era labels -->
  <text x="158" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C4A87A" font-style="italic">AI Winters</text>
  <line x1="80" y1="375" x2="235" y2="375" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="550" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C4A87A" font-style="italic">Deep Learning Revolution</text>
  <line x1="420" y1="375" x2="680" y2="375" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Star on Nobel -->
  <polygon points="720,170 724,180 734,180 726,186 729,196 720,190 711,196 714,186 706,180 716,180" fill="#C4A87A" stroke="#7C2530" stroke-width="1"/>
</svg>