<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="3" y="3" width="794" height="394" rx="6" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="32" text-anchor="middle" fill="#5C3D1E" font-size="17" font-weight="bold">Random processes evolving over time</text>

  <!-- Axes for Random Walk (top-left) -->
  <line x1="40" y1="160" x2="200" y2="160" stroke="#999" stroke-width="1"/>
  <line x1="40" y1="60" x2="40" y2="160" stroke="#999" stroke-width="1"/>
  <text x="120" y="178" text-anchor="middle" fill="#7C2530" font-size="12" font-weight="bold">Random Walk</text>
  <!-- Random walk jagged steps -->
  <polyline points="40,120 55,110 70,120 85,110 100,120 115,100 130,110 145,90 160,100 175,110 190,100" fill="none" stroke="#7C2530" stroke-width="2" stroke-linejoin="round"/>
  <text x="40" y="55" fill="#999" font-size="9">X(t)</text>
  <text x="195" y="155" fill="#999" font-size="9">t</text>

  <!-- Axes for Brownian Motion (top-right) -->
  <line x1="240" y1="160" x2="400" y2="160" stroke="#999" stroke-width="1"/>
  <line x1="240" y1="60" x2="240" y2="160" stroke="#999" stroke-width="1"/>
  <text x="320" y="178" text-anchor="middle" fill="#2D5A8E" font-size="12" font-weight="bold">Brownian Motion</text>
  <!-- Brownian motion smooth-ish path -->
  <path d="M240,120 C250,115 255,105 265,108 C275,112 280,95 290,90 C300,85 305,100 315,95 C325,90 330,75 340,80 C350,85 355,70 365,68 C375,65 380,80 390,75" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <!-- Second sample path -->
  <path d="M240,120 C250,125 258,135 268,130 C278,125 282,140 292,145 C302,148 308,135 318,140 C328,145 335,130 345,135 C355,140 360,150 370,145 C380,140 385,148 395,150" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="240" y="55" fill="#999" font-size="9">W(t)</text>
  <text x="395" y="155" fill="#999" font-size="9">t</text>

  <!-- Markov Chain (bottom-left) -->
  <text x="120" y="210" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">Markov Chain</text>
  <!-- States -->
  <circle cx="60" cy="280" r="20" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <text x="60" y="285" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">A</text>
  <circle cx="150" cy="240" r="20" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <text x="150" y="245" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">B</text>
  <circle cx="150" cy="320" r="20" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <text x="150" y="325" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">C</text>
  <!-- Arrows -->
  <defs>
    <marker id="arr1" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#5C3D1E"/>
    </marker>
    <marker id="arr2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#C4A87A"/>
    </marker>
  </defs>
  <!-- A to B -->
  <line x1="78" y1="268" x2="132" y2="248" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="95" y="250" fill="#5C3D1E" font-size="9">0.6</text>
  <!-- A to C -->
  <line x1="78" y1="292" x2="132" y2="312" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="95" y="310" fill="#5C3D1E" font-size="9">0.4</text>
  <!-- B to C -->
  <line x1="150" y1="262" x2="150" y2="298" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="158" y="282" fill="#5C3D1E" font-size="9">0.3</text>
  <!-- C to A -->
  <path d="M132,330 Q60,360 52,302" fill="none" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="75" y="348" fill="#C4A87A" font-size="9">0.5</text>
  <!-- B self-loop -->
  <path d="M168,230 C185,210 185,250 168,248" fill="none" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="188" y="232" fill="#C4A87A" font-size="9">0.7</text>

  <!-- Poisson Process (bottom-right) -->
  <text x="520" y="210" text-anchor="middle" fill="#7C2530" font-size="12" font-weight="bold">Poisson Process</text>
  <line x1="420" y1="260" x2="620" y2="260" stroke="#999" stroke-width="1"/>
  <text x="620" y="255" fill="#999" font-size="9">t</text>
  <!-- Event ticks -->
  <line x1="445" y1="250" x2="445" y2="270" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="470" y1="250" x2="470" y2="270" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="510" y1="250" x2="510" y2="270" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="520" y1="250" x2="520" y2="270" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="560" y1="250" x2="560" y2="270" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="600" y1="250" x2="600" y2="270" stroke="#7C2530" stroke-width="2.5"/>
  <!-- Counting process step function -->
  <polyline points="420,240 445,240 445,232 470,232 470,224 510,224 510,216 520,216 520,208 560,208 560,200 600,200 600,192 620,192" fill="none" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="628" y="195" fill="#2D5A8E" font-size="9">N(t)</text>
  <text x="430" y="282" fill="#999" font-size="9">events</text>

  <!-- ML connections box -->
  <rect x="420" y="300" width="350" height="80" rx="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="595" y="320" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">These underpin key ML methods:</text>
  <text x="595" y="340" text-anchor="middle" fill="#2D5A8E" font-size="11">Brownian Motion + SDEs &#8594; Diffusion Models</text>
  <text x="595" y="356" text-anchor="middle" fill="#5C3D1E" font-size="11">Markov Chains &#8594; MCMC Sampling, RL (MDPs)</text>
  <text x="595" y="372" text-anchor="middle" fill="#7C2530" font-size="11">Poisson Process &#8594; Event Modeling, Survival Analysis</text>
</svg>