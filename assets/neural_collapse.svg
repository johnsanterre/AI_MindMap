<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="370" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT PANEL: Early Training — Messy Clusters ===== -->
  <text x="200" y="58" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-style="italic">Early Training</text>
  <text x="200" y="76" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">scattered class features</text>

  <!-- Class A scatter (deep red) -->
  <circle cx="130" cy="160" r="6" fill="#7C2530" opacity="0.75"/>
  <circle cx="148" cy="145" r="5" fill="#7C2530" opacity="0.7"/>
  <circle cx="115" cy="178" r="5" fill="#7C2530" opacity="0.65"/>
  <circle cx="160" cy="168" r="6" fill="#7C2530" opacity="0.8"/>
  <circle cx="138" cy="190" r="4" fill="#7C2530" opacity="0.6"/>
  <circle cx="122" cy="148" r="5" fill="#7C2530" opacity="0.7"/>
  <circle cx="155" cy="152" r="4" fill="#7C2530" opacity="0.65"/>
  <circle cx="143" cy="200" r="5" fill="#7C2530" opacity="0.6"/>
  <!-- Loose ellipse for class A -->
  <ellipse cx="138" cy="170" rx="38" ry="32" fill="none" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="138" y="222" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Class A</text>

  <!-- Class B scatter (navy) -->
  <circle cx="240" cy="210" r="6" fill="#2D5A8E" opacity="0.75"/>
  <circle cx="258" cy="195" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="225" cy="228" r="5" fill="#2D5A8E" opacity="0.65"/>
  <circle cx="270" cy="218" r="6" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="248" cy="240" r="4" fill="#2D5A8E" opacity="0.6"/>
  <circle cx="232" cy="198" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="265" cy="200" r="4" fill="#2D5A8E" opacity="0.65"/>
  <circle cx="252" cy="255" r="5" fill="#2D5A8E" opacity="0.55"/>
  <!-- Loose ellipse for class B -->
  <ellipse cx="248" cy="222" rx="38" ry="34" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="248" y="272" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Class B</text>

  <!-- Class C scatter (warm brown) -->
  <circle cx="175" cy="270" r="6" fill="#5C3D1E" opacity="0.75"/>
  <circle cx="193" cy="255" r="5" fill="#5C3D1E" opacity="0.7"/>
  <circle cx="160" cy="285" r="5" fill="#5C3D1E" opacity="0.65"/>
  <circle cx="205" cy="278" r="6" fill="#5C3D1E" opacity="0.8"/>
  <circle cx="183" cy="298" r="4" fill="#5C3D1E" opacity="0.6"/>
  <circle cx="168" cy="260" r="5" fill="#5C3D1E" opacity="0.7"/>
  <circle cx="198" cy="262" r="4" fill="#5C3D1E" opacity="0.65"/>
  <!-- Loose ellipse for class C -->
  <ellipse cx="183" cy="275" rx="36" ry="30" fill="none" stroke="#5C3D1E" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="183" y="322" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Class C</text>

  <!-- Axes hint left panel -->
  <line x1="60" y1="340" x2="360" y2="340" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="340" x2="60" y2="110" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <text x="210" y="358" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle" opacity="0.9">feature dim 1</text>
  <text x="44" y="230" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle" opacity="0.9" transform="rotate(-90,44,230)">feature dim 2</text>

  <!-- ===== RIGHT PANEL: Terminal Phase — ETF Collapse ===== -->
  <text x="600" y="58" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-style="italic">Terminal Phase</text>
  <text x="600" y="76" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">class means → ETF vertices</text>

  <!-- ETF triangle vertices for 3 classes — equilateral triangle, centered at (600, 210) -->
  <!-- Vertex A (top): (600, 118) -->
  <!-- Vertex B (bottom-left): (530, 248) -->
  <!-- Vertex C (bottom-right): (670, 248) -->

  <!-- ETF triangle edges -->
  <line x1="600" y1="118" x2="530" y2="248" stroke="#C4A87A" stroke-width="1.8" opacity="0.7"/>
  <line x1="530" y1="248" x2="670" y2="248" stroke="#C4A87A" stroke-width="1.8" opacity="0.7"/>
  <line x1="670" y1="248" x2="600" y2="118" stroke="#C4A87A" stroke-width="1.8" opacity="0.7"/>

  <!-- Global mean at centroid -->
  <circle cx="600" cy="205" r="4" fill="#C4A87A" opacity="0.8"/>
  <text x="620" y="209" font-family="Georgia, serif" font-size="11" fill="#C4A87A" font-style="italic">global mean</text>

  <!-- Lines from centroid to vertices (collapse direction) -->
  <line x1="600" y1="205" x2="600" y2="118" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="600" y1="205" x2="530" y2="248" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="600" y1="205" x2="670" y2="248" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Class A: collapsed to a single point at vertex top — tight cluster -->
  <circle cx="600" cy="118" r="14" fill="#7C2530" opacity="0.12"/>
  <circle cx="600" cy="118" r="9" fill="#7C2530" opacity="0.2"/>
  <circle cx="600" cy="118" r="7" fill="#7C2530" opacity="0.85"/>
  <text x="600" y="100" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">Class A</text>
  <text x="600" y="89" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">var → 0</text>

  <!-- Class B: collapsed to bottom-left vertex -->
  <circle cx="530" cy="248" r="14" fill="#2D5A8E" opacity="0.12"/>
  <circle cx="530" cy="248" r="9" fill="#2D5A8E" opacity="0.2"/>
  <circle cx="530" cy="248" r="7" fill="#2D5A8E" opacity="0.85"/>
  <text x="510" y="274" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Class B</text>
  <text x="510" y="286" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">var → 0</text>

  <!-- Class C: collapsed to bottom-right vertex -->
  <circle cx="670" cy="248" r="14" fill="#5C3D1E" opacity="0.12"/>
  <circle cx="670" cy="248" r="9" fill="#5C3D1E" opacity="0.2"/>
  <circle cx="670" cy="248" r="7" fill="#5C3D1E" opacity="0.85"/>
  <text x="690" y="274" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Class C</text>
  <text x="690" y="286" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">var → 0</text>

  <!-- Equal angle annotation -->
  <path d="M 600 118 A 30 30 0 0 1 622 135" fill="none" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="632" y="132" font-family="Georgia, serif" font-size="10" fill="#C4A87A">120°</text>

  <!-- Axes hint right panel -->
  <line x1="460" y1="340" x2="760" y2="340" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <line x1="460" y1="340" x2="460" y2="110" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>

  <!-- ===== Bottom label ===== -->
  <rect x="100" y="368" width="600" height="22" fill="#FDFAF4"/>
  <text x="400" y="383" font-family="Georgia, serif" font-size="12.5" fill="#5C3D1E" text-anchor="middle">
    Neural Collapse (NC): class means → ETF vertices, within-class variance → 0
  </text>
</svg>
