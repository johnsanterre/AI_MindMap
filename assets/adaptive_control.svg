<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="18" ry="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="42" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#7C2530" text-anchor="middle">Adaptive Control</text>

  <!-- Plant box -->
  <rect x="440" y="130" width="180" height="70" rx="10" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="530" y="162" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle">Plant</text>
  <text x="530" y="182" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">(unknown / changing)</text>

  <!-- Controller box -->
  <rect x="120" y="130" width="180" height="70" rx="10" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="210" y="162" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle">Controller</text>
  <text x="210" y="182" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">u(t) = f(e, &theta;)</text>

  <!-- Adaptation Mechanism box -->
  <rect x="220" y="280" width="200" height="60" rx="10" fill="#C4A87A" fill-opacity="0.3" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="320" y="308" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">Adaptation Law</text>
  <text x="320" y="326" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">d&theta;/dt = g(e, x)</text>

  <!-- Reference Model box -->
  <rect x="440" y="280" width="180" height="60" rx="10" fill="#FDFAF4" stroke="#C4A87A" stroke-width="2.5"/>
  <text x="530" y="308" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">Reference Model</text>
  <text x="530" y="326" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">y_m(t)</text>

  <!-- Arrows: Controller to Plant -->
  <line x1="300" y1="165" x2="440" y2="165" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="370" y="155" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">u(t)</text>

  <!-- Plant output going right then down -->
  <line x1="620" y1="165" x2="700" y2="165" stroke="#2D5A8E" stroke-width="2"/>
  <text x="670" y="155" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">y(t)</text>

  <!-- Feedback line: right side down, then left to error summing junction -->
  <line x1="700" y1="165" x2="700" y2="80" stroke="#7C2530" stroke-width="2"/>
  <line x1="700" y1="80" x2="80" y2="80" stroke="#7C2530" stroke-width="2"/>
  <line x1="80" y1="80" x2="80" y2="165" stroke="#7C2530" stroke-width="2"/>
  <line x1="80" y1="165" x2="120" y2="165" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Reference input -->
  <text x="30" y="70" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle">r(t)</text>
  <line x1="30" y1="80" x2="80" y2="80" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Error signal down to adaptation -->
  <line x1="700" y1="165" x2="700" y2="370" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="700" y1="370" x2="420" y2="370" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="420" y1="370" x2="420" y2="310" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBrown)"/>

  <!-- Error comparison arrow from reference model to adaptation -->
  <line x1="440" y1="310" x2="420" y2="310" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Adaptation to Controller -->
  <line x1="270" y1="280" x2="240" y2="200" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <text x="232" y="248" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">&theta;(t)</text>

  <!-- Error label -->
  <text x="680" y="265" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">e(t)</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
    <marker id="arrowBrown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>