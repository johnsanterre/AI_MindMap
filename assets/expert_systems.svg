<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Expert Systems: Knowledge Base + Inference Engine</text>

  <!-- LEFT: Knowledge Base -->
  <rect x="30" y="55" width="240" height="230" rx="5" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="150" y="75" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Knowledge Base</text>
  <text x="150" y="92" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">hand-crafted IF-THEN rules</text>
  <rect x="45" y="100" width="210" height="24" rx="3" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="150" y="116" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">IF fever &gt; 38 AND cough THEN flu</text>
  <rect x="45" y="132" width="210" height="24" rx="3" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="150" y="148" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">IF flu AND age &gt; 65 THEN high-risk</text>
  <rect x="45" y="164" width="210" height="24" rx="3" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="150" y="180" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">IF high-risk THEN prescribe-tamiflu</text>
  <text x="150" y="210" font-family="Georgia,serif" font-size="20" fill="#888" text-anchor="middle">⋮</text>
  <text x="150" y="235" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">MYCIN: 600 rules</text>
  <text x="150" y="250" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">XCON: 10,000+ rules</text>
  <text x="150" y="268" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">maintained by domain experts</text>

  <!-- MIDDLE: Inference Engine -->
  <rect x="300" y="80" width="200" height="175" rx="5" fill="#F5EFE4" stroke="#C4A87A" stroke-width="2"/>
  <text x="400" y="100" font-family="Georgia,serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Inference Engine</text>
  <line x1="320" y1="108" x2="480" y2="108" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="126" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Forward Chaining</text>
  <text x="400" y="140" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">facts → conclusions</text>
  <line x1="320" y1="150" x2="480" y2="150" stroke="#C4A87A" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="400" y="168" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Backward Chaining</text>
  <text x="400" y="182" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">goal → needed facts</text>
  <line x1="320" y1="192" x2="480" y2="192" stroke="#C4A87A" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="400" y="210" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Certainty Factors</text>
  <text x="400" y="224" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">crude uncertainty handling</text>
  <text x="400" y="247" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">no learning · deterministic</text>

  <!-- RIGHT: Output + Problems -->
  <rect x="530" y="55" width="240" height="230" rx="5" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="650" y="75" font-family="Georgia,serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">Why They Failed</text>
  <text x="545" y="98" font-family="Georgia,serif" font-size="11" fill="#7C2530">① Knowledge bottleneck</text>
  <text x="545" y="112" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" font-style="italic">  experts can't articulate all they know</text>
  <text x="545" y="134" font-family="Georgia,serif" font-size="11" fill="#7C2530">② Brittleness</text>
  <text x="545" y="148" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" font-style="italic">  one missing rule → wrong answer</text>
  <text x="545" y="170" font-family="Georgia,serif" font-size="11" fill="#7C2530">③ Maintenance nightmare</text>
  <text x="545" y="184" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" font-style="italic">  rules conflict as system grows</text>
  <text x="545" y="206" font-family="Georgia,serif" font-size="11" fill="#7C2530">④ No uncertainty</text>
  <text x="545" y="220" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" font-style="italic">  real world is probabilistic</text>
  <text x="545" y="242" font-family="Georgia,serif" font-size="11" fill="#7C2530">⑤ Can't learn from data</text>
  <text x="545" y="256" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" font-style="italic">  improvement requires manual editing</text>

  <!-- Arrows -->
  <line x1="270" y1="167" x2="300" y2="167" stroke="#2D5A8E" stroke-width="2"/>
  <polygon points="297,163 305,167 297,171" fill="#2D5A8E"/>
  <line x1="500" y1="167" x2="530" y2="167" stroke="#C4A87A" stroke-width="2"/>
  <polygon points="527,163 535,167 527,171" fill="#C4A87A"/>

  <!-- Bottom -->
  <text x="400" y="320" font-family="Georgia,serif" font-size="12" fill="#2C2C2C" text-anchor="middle">The dream: bottle expert knowledge. The reality: knowledge resists bottling.</text>
  <rect x="30" y="330" width="350" height="40" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="205" y="347" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">MYCIN (1972): </text>
  <text x="205" y="361" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">bacterial infection diagnosis, outperformed senior MDs</text>
  <rect x="420" y="330" width="350" height="40" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="595" y="347" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">XCON (1980): </text>
  <text x="595" y="361" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">DEC computer config, saved $40M/yr — then unmaintainable</text>
</svg>
