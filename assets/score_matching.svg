<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="2" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Score Matching: Learning the Gradient of Log-Density</text>

  <!-- ===== Panel 1: Data Distribution with Score Vectors ===== -->
  <text x="133" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Data Distribution p(x)</text>
  <text x="133" y="72" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">score = ∇ₓ log p(x)</text>

  <!-- Density blob (two modes) -->
  <ellipse cx="100" cy="190" rx="52" ry="38" fill="#C4A87A" fill-opacity="0.35" stroke="#C4A87A" stroke-width="1.5"/>
  <ellipse cx="100" cy="190" rx="30" ry="22" fill="#C4A87A" fill-opacity="0.55"/>
  <ellipse cx="168" cy="210" rx="40" ry="30" fill="#C4A87A" fill-opacity="0.35" stroke="#C4A87A" stroke-width="1.5"/>
  <ellipse cx="168" cy="210" rx="22" ry="18" fill="#C4A87A" fill-opacity="0.55"/>

  <!-- Mode labels -->
  <text x="100" y="193" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">mode 1</text>
  <text x="168" y="213" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">mode 2</text>

  <!-- Score vectors (arrows pointing toward high-density) -->
  <!-- Grid of score arrows around mode 1 -->
  <defs>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Arrows toward mode 1 -->
  <line x1="55" y1="160" x2="72" y2="172" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="55" y1="200" x2="72" y2="196" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="55" y1="228" x2="70" y2="215" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="100" y1="145" x2="100" y2="160" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="140" y1="158" x2="126" y2="168" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="145" y1="188" x2="130" y2="188" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="100" y1="237" x2="100" y2="220" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="70" y1="237" x2="80" y2="222" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Arrows toward mode 2 -->
  <line x1="130" y1="248" x2="142" y2="238" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="168" y1="254" x2="168" y2="238" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="205" y1="248" x2="195" y2="238" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="210" y1="215" x2="198" y2="215" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="210" y1="185" x2="200" y2="196" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="175" y1="175" x2="175" y2="190" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <text x="133" y="295" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">arrows = score vectors</text>
  <text x="133" y="308" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">point toward peaks</text>

  <!-- Divider -->
  <line x1="268" y1="50" x2="268" y2="370" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== Panel 2: Neural Network Learning Scores ===== -->
  <text x="400" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Neural Network s_θ(x)</text>
  <text x="400" y="72" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">learns to predict score vectors</text>

  <!-- Input node -->
  <circle cx="310" cy="190" r="18" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="310" y="186" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">noisy</text>
  <text x="310" y="197" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">x̃</text>

  <!-- Hidden layer 1 -->
  <circle cx="365" cy="155" r="12" fill="#C4A87A" fill-opacity="0.5" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="365" cy="190" r="12" fill="#C4A87A" fill-opacity="0.5" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="365" cy="225" r="12" fill="#C4A87A" fill-opacity="0.5" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Hidden layer 2 -->
  <circle cx="420" cy="167" r="12" fill="#C4A87A" fill-opacity="0.7" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="420" cy="213" r="12" fill="#C4A87A" fill-opacity="0.7" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Output node -->
  <circle cx="475" cy="190" r="18" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="475" y="186" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">s_θ</text>
  <text x="475" y="197" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">(x̃)</text>

  <!-- Connections input→h1 -->
  <line x1="328" y1="183" x2="353" y2="160" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="328" y1="190" x2="353" y2="190" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="328" y1="197" x2="353" y2="220" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Connections h1→h2 -->
  <line x1="377" y1="158" x2="408" y2="170" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="377" y1="188" x2="408" y2="170" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="377" y1="192" x2="408" y2="210" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="377" y1="222" x2="408" y2="210" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Connections h2→output -->
  <line x1="432" y1="170" x2="457" y2="184" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="432" y1="210" x2="457" y2="196" stroke="#5C3D1E" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Loss label -->
  <rect x="318" y="250" width="160" height="36" rx="5" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1"/>
  <text x="398" y="264" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">minimize ‖s_θ(x̃) − (x−x̃)/σ²‖²</text>
  <text x="398" y="278" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">denoising score matching loss</text>

  <!-- Divider -->
  <line x1="532" y1="50" x2="532" y2="370" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== Panel 3: Langevin Dynamics Sampling ===== -->
  <text x="666" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Langevin Dynamics Sampling</text>
  <text x="666" y="72" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">noise → data, step by step</text>

  <!-- Target distribution (ghost) -->
  <ellipse cx="630" cy="195" rx="45" ry="33" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <ellipse cx="705" cy="210" rx="38" ry="28" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="630" y="198" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">p(x)</text>
  <text x="705" y="213" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">p(x)</text>

  <!-- Sampling trajectory: start from noise (top right) curve toward mode -->
  <!-- Start point: noise -->
  <circle cx="760" cy="110" r="7" fill="#7C2530" fill-opacity="0.8"/>
  <text x="760" y="100" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">x₀~N(0,I)</text>
  <text x="760" y="90" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="middle">noise</text>

  <!-- Trajectory steps (curved path with dots) -->
  <polyline points="760,110 748,125 735,140 720,155 710,168 700,180 693,193 688,202 680,207 665,207 650,203 638,198" fill="none" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="5,3"/>

  <!-- Intermediate step dots -->
  <circle cx="748" cy="125" r="4" fill="#7C2530" fill-opacity="0.5"/>
  <circle cx="735" cy="140" r="4" fill="#7C2530" fill-opacity="0.6"/>
  <circle cx="720" cy="155" r="4" fill="#7C2530" fill-opacity="0.7"/>
  <circle cx="705" cy="170" r="4" fill="#7C2530" fill-opacity="0.75"/>
  <circle cx="695" cy="183" r="4" fill="#7C2530" fill-opacity="0.8"/>
  <circle cx="688" cy="196" r="5" fill="#7C2530" fill-opacity="0.9"/>

  <!-- End point: sample -->
  <circle cx="638" cy="198" r="8" fill="#2D5A8E"/>
  <text x="618" y="230" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">x_T ≈ sample</text>
  <text x="618" y="242" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">from p(x)</text>

  <!-- Step equation -->
  <rect x="545" y="265" width="238" height="42" rx="5" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="664" y="280" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">x_{t+1} = x_t + (ε/2)·s_θ(x_t) + √ε·z_t</text>
  <text x="664" y="295" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">z_t ~ N(0,I)   follow score + noise</text>

  <!-- Bottom label -->
  <rect x="200" y="340" width="400" height="24" rx="5" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1"/>
  <text x="400" y="356" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">score = gradient of log-density   |   foundation of diffusion models</text>
</svg>
