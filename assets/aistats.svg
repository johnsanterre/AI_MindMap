<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="44" fill="#2D5A8E" opacity="0.92"/>
  <text x="400" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#FDFAF4" text-anchor="middle">AISTATS — Artificial Intelligence and Statistics</text>

  <!-- ═══════════════ LEFT PANEL: Key Facts ═══════════════ -->
  <rect x="12" y="56" width="192" height="320" rx="6" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <rect x="12" y="56" width="192" height="30" rx="6" fill="#7C2530"/>
  <rect x="12" y="74" width="192" height="12" fill="#7C2530"/>
  <text x="108" y="77" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Key Facts</text>

  <!-- Fact rows -->
  <line x1="12" y1="105" x2="204" y2="105" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="100" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Founded</text>
  <text x="198" y="100" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">1985</text>

  <line x1="12" y1="125" x2="204" y2="125" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="120" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Frequency</text>
  <text x="198" y="120" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">Annual</text>

  <line x1="12" y1="145" x2="204" y2="145" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="140" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Timing</text>
  <text x="198" y="140" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">April / May</text>

  <line x1="12" y1="165" x2="204" y2="165" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="160" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Attendees</text>
  <text x="198" y="160" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">~800</text>

  <line x1="12" y1="185" x2="204" y2="185" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="180" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Papers accepted</text>
  <text x="198" y="180" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">~500</text>

  <line x1="12" y1="205" x2="204" y2="205" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Acceptance rate</text>
  <text x="198" y="200" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">~25%</text>

  <line x1="12" y1="225" x2="204" y2="225" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="220" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Review style</text>
  <text x="198" y="220" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">Double-blind</text>

  <line x1="12" y1="245" x2="204" y2="245" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="240" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Location</text>
  <text x="198" y="240" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">Varies (global)</text>

  <line x1="12" y1="265" x2="204" y2="265" stroke="#D4C5A9" stroke-width="1"/>
  <text x="22" y="260" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Proceedings</text>
  <text x="198" y="260" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="end">PMLR</text>

  <!-- Format label -->
  <rect x="22" y="274" width="172" height="36" rx="4" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1"/>
  <text x="108" y="289" font-family="Georgia, serif" font-size="10.5" fill="#2D5A8E" text-anchor="middle">Hybrid: oral + poster</text>
  <text x="108" y="303" font-family="Georgia, serif" font-size="10.5" fill="#2D5A8E" text-anchor="middle">+ virtual track</text>

  <!-- Intimacy badge -->
  <rect x="22" y="318" width="172" height="46" rx="4" fill="#7C2530" opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="108" y="334" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">"The intimate conference"</text>
  <text x="108" y="350" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Smaller than NeurIPS/ICML;</text>
  <text x="108" y="362" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">higher theory bar</text>

  <!-- ═══════════════ CENTER PANEL: Venn Diagram ═══════════════ -->
  <rect x="214" y="56" width="366" height="320" rx="6" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <rect x="214" y="56" width="366" height="30" rx="6" fill="#5C3D1E"/>
  <rect x="214" y="74" width="366" height="12" fill="#5C3D1E"/>
  <text x="397" y="77" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">What Makes AISTATS Different</text>

  <!-- Venn circles -->
  <!-- Statistics circle (left) -->
  <circle cx="345" cy="215" r="102" fill="#2D5A8E" opacity="0.14" stroke="#2D5A8E" stroke-width="2"/>
  <!-- ML circle (right) -->
  <circle cx="449" cy="215" r="102" fill="#7C2530" opacity="0.14" stroke="#7C2530" stroke-width="2"/>

  <!-- Circle labels -->
  <text x="298" y="145" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Statistics</text>
  <text x="496" y="145" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">ML / AI</text>

  <!-- Left-only topics (Statistics) -->
  <text x="288" y="195" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">Hypothesis testing</text>
  <text x="288" y="210" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">Frequentist inference</text>
  <text x="288" y="225" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">Experimental design</text>
  <text x="288" y="240" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle">Survival analysis</text>

  <!-- Right-only topics (ML) -->
  <text x="506" y="195" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle">Deep learning</text>
  <text x="506" y="210" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle">Reinforcement learning</text>
  <text x="506" y="225" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle">Computer vision</text>
  <text x="506" y="240" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle">NLP systems</text>

  <!-- AISTATS center label -->
  <text x="397" y="172" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">AISTATS</text>

  <!-- Overlap topics -->
  <text x="397" y="192" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Bayesian inference</text>
  <text x="397" y="206" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Variational methods</text>
  <text x="397" y="220" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">MCMC &amp; sampling</text>
  <text x="397" y="234" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Gaussian processes</text>
  <text x="397" y="248" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Causal inference</text>
  <text x="397" y="262" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Convergence theory</text>

  <!-- Bottom note -->
  <text x="397" y="340" font-family="Georgia, serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">Papers must satisfy both communities:</text>
  <text x="397" y="355" font-family="Georgia, serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">statistical rigor + algorithmic contribution</text>

  <!-- ═══════════════ RIGHT PANEL: Landmark Papers ═══════════════ -->
  <rect x="590" y="56" width="198" height="320" rx="6" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <rect x="590" y="56" width="198" height="30" rx="6" fill="#C4A87A"/>
  <rect x="590" y="74" width="198" height="12" fill="#C4A87A"/>
  <text x="689" y="77" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Landmark Papers</text>

  <!-- Paper entries -->
  <!-- 1 -->
  <rect x="600" y="96" width="178" height="52" rx="3" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1"/>
  <text x="689" y="111" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Gaussian Process Regression</text>
  <text x="689" y="124" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Williams &amp; Rasmussen (1996)</text>
  <text x="689" y="137" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Foundations of GP models for ML</text>

  <!-- 2 -->
  <rect x="600" y="156" width="178" height="52" rx="3" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1"/>
  <text x="689" y="171" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#7C2530" text-anchor="middle">Expectation Propagation</text>
  <text x="689" y="184" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Minka (2001)</text>
  <text x="689" y="197" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Approx. Bayesian inference</text>

  <!-- 3 -->
  <rect x="600" y="216" width="178" height="52" rx="3" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="1"/>
  <text x="689" y="231" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Stochastic Variational Inference</text>
  <text x="689" y="244" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Hoffman et al. (2013)</text>
  <text x="689" y="257" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Scaling VI to large datasets</text>

  <!-- 4 -->
  <rect x="600" y="276" width="178" height="52" rx="3" fill="#C4A87A" opacity="0.3" stroke="#C4A87A" stroke-width="1"/>
  <text x="689" y="291" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Causal Discovery (PC Alg.)</text>
  <text x="689" y="304" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Spirtes et al. variants</text>
  <text x="689" y="317" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Structure learning from data</text>

  <!-- 5 -->
  <rect x="600" y="334" width="178" height="34" rx="3" fill="#2D5A8E" opacity="0.07" stroke="#2D5A8E" stroke-width="1"/>
  <text x="689" y="348" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">SGLD / Langevin Dynamics</text>
  <text x="689" y="361" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Welling &amp; Teh (2011)</text>
</svg>
