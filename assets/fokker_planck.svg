  <text x="28" y="72" font-size="12" fill="#5C3D1E" text-anchor="middle">p</text>

  <!-- Tick marks on x-axis -->
  <line x1="110" y1="317" x2="110" y2="323" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="180" y1="317" x2="180" y2="323" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="250" y1="317" x2="250" y2="323" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="320" y1="317" x2="320" y2="323" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="390" y1="317" x2="390" y2="323" stroke="#5C3D1E" stroke-width="1"/>

  <!--
    Gaussian at t=0: mean=110, sigma=22 в†’ tall, narrow, leftmost
    Gaussian at t=1: mean=165, sigma=33
    Gaussian at t=2: mean=220, sigma=44
    Gaussian at t=3: mean=280, sigma=58 в†’ short, wide, rightmost
    Baseline y=320. Height scales with 1/sigma for area preservation.
    Peak height in px: H = 200 * (22/sigma)
    Cubic Bezier approximation of each Gaussian.
  -->

  <!-- t=0: mean=110, sigma=22, H=200 => peak y=120 -->
  <!-- Gaussian path via polyline approximation (sampled points) -->
  <polyline
    fill="none" stroke="#7C2530" stroke-width="2.2" opacity="0.95"
    points="
      40,320
      55,319.5
      66,317
      77,308
      88,284
      99,244
      110,120
      121,244
      132,284
      143,308
      154,317
      165,319.5
      180,320
    "
  />

