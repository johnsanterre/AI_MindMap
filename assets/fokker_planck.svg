  <text x="192" y="330" text-anchor="middle" font-size="11" fill="#7C2530">drift Ој</text>

  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <!-- CENTER DIVIDER -->
  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <line x1="445" y1="50" x2="445" y2="380" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <!-- RIGHT TOP PANEL: FPE formula breakdown -->
  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <text x="622" y="65" text-anchor="middle" font-size="13" fill="#5C3D1E" font-style="italic">The Equation</text>

  <!-- FPE formula box -->
  <rect x="460" y="75" width="320" height="52" rx="5" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="620" y="96" text-anchor="middle" font-size="13" fill="#5C3D1E">в€‚p/в€‚t  =  в€’в€‚(Ојp)/в€‚x  +  ВЅ в€‚ВІ(ПѓВІp)/в€‚xВІ</text>
  <text x="620" y="118" text-anchor="middle" font-size="11" fill="#888">Fokker-Planck (forward Kolmogorov) equation</text>

  <!-- Drift term label -->
  <rect x="460" y="140" width="148" height="42" rx="4" fill="#FFF0F0" stroke="#7C2530" stroke-width="1.2"/>
  <text x="534" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C2530">Drift term</text>
  <text x="534" y="175" text-anchor="middle" font-size="11" fill="#7C2530">в€’в€‚(Ојp)/в€‚x</text>

  <!-- Arrow between -->
  <text x="618" y="166" text-anchor="middle" font-size="13" fill="#5C3D1E">+</text>

  <!-- Diffusion term label -->
  <rect x="632" y="140" width="148" height="42" rx="4" fill="#EEF4FF" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="706" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D5A8E">Diffusion term</text>
  <text x="706" y="175" text-anchor="middle" font-size="11" fill="#2D5A8E">ВЅ в€‚ВІ(ПѓВІp)/в€‚xВІ</text>

  <!-- Descriptions -->
  <text x="534" y="200" text-anchor="middle" font-size="10.5" fill="#7C2530">Advects density</text>
  <text x="534" y="213" text-anchor="middle" font-size="10.5" fill="#7C2530">in direction of Ој</text>
  <text x="706" y="200" text-anchor="middle" font-size="10.5" fill="#2D5A8E">Spreads density</text>
  <text x="706" y="213" text-anchor="middle" font-size="10.5" fill="#2D5A8E">outward over time</text>

  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <!-- RIGHT BOTTOM PANEL: Stationary / Boltzmann dist -->
  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <text x="622" y="242" text-anchor="middle" font-size="13" fill="#5C3D1E" font-style="italic">Stationary Distribution (Langevin)</text>

  <!-- Boltzmann formula -->
  <rect x="460" y="250" width="320" height="36" rx="5" fill="#FFF8EE" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="620" y="273" text-anchor="middle" font-size="13" fill="#5C3D1E">pв€ћ(x) в€ќ exp(в€’U(x) / T)</text>

  <!-- Mini axes for double-well -->
  <!-- x-axis -->
  <line x1="465" y1="360" x2="775" y2="360" stroke="#5C3D1E" stroke-width="1.2"/>
  <!-- y-axis -->
  <line x1="465" y1="296" x2="465" y2="360" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="460" y="294" font-size="10" fill="#5C3D1E" text-anchor="middle">p</text>
  <text x="778" y="364" font-size="10" fill="#5C3D1E">x</text>

  <!--
    Double-well potential U(x) = (x^2-1)^2 scaled for display
    Boltzmann: p в€ќ exp(-U/T) вЂ” two peaks, suppressed in the middle
    Map x in [-2.2, 2.2] в†’ px in [465, 775], center=620, scale=70
    Peaks at x=В±1 в†’ px=550 and 690
    At x=0 (px=620): U=1, p в€ќ exp(-1/T) в†’ moderate dip
    We'll use T=0.5 so exp(-1/0.5)=exp(-2)в‰€0.135 (noticeable dip)
    Peak height: p в€ќ exp(0)=1 в†’ y_peak = 296+10 = 306 px above axis
    Peak y in SVG: 360 - scale*p_normalized. Max p=1в†’ 60px height
    p_mid = exp(-2) в‰€ 0.135 в†’ height = 8px
    x values and their p values (T=0.5):
      px=470 (x=-2.1): U=(4.41-1)^2=11.6, pв‰€0 в†’ yв‰€360
      px=490 (x=-1.85): U=(3.42-1)^2=5.86, pв‰€exp(-11.7)в‰€0 в†’ yв‰€360
      px=515 (x=-1.5): U=(2.25-1)^2=1.56, pв‰€exp(-3.12)=0.044 в†’ yв‰€357
      px=535 (x=-1.24): U=(1.54-1)^2=0.29, pв‰€exp(-0.58)=0.560 в†’ yв‰€326
      px=550 (x=-1.0): U=0, p=1.0 в†’ y=300
      px=565 (x=-0.76): U=(0.58-1)^2=0.18, pв‰€exp(-0.36)=0.698 в†’ yв‰€318
      px=580 (x=-0.5): U=(0.25-1)^2=0.5625, pв‰€exp(-1.125)=0.325 в†’ yв‰€340
      px=595 (x=-0.24): U=(0.058-1)^2=0.888, pв‰€exp(-1.78)=0.169 в†’ yв‰€350
      px=620 (x=0): U=1, pв‰€exp(-2)=0.135 в†’ yв‰€352
      px=645 (x=0.24): U=0.888, pв‰€0.169 в†’ yв‰€350
      px=660 (x=0.5): U=0.5625, pв‰€0.325 в†’ yв‰€340
      px=675 (x=0.76): U=0.18, pв‰€0.698 в†’ yв‰€318
      px=690 (x=1.0): U=0, p=1.0 в†’ y=300
      px=705 (x=1.24): U=0.29, pв‰€0.560 в†’ yв‰€326
      px=725 (x=1.5): U=1.56, pв‰€0.044 в†’ yв‰€357
      px=750 (x=1.85): Uв‰€5.86, pв‰€0 в†’ yв‰€360
      px=770 (x=2.1): pв‰€0 в†’ yв‰€360
    scale=60px for height (y = 360 - 60*p)
  -->
  <polyline
    fill="none" stroke="#5C3D1E" stroke-width="2"
    points="
