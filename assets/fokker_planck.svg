  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#5C3D1E">Fokker-Planck Equation: Probability Density Evolution</text>

  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <!-- LEFT PANEL: Evolving density curves -->
  <!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->
  <text x="220" y="60" text-anchor="middle" font-size="13" fill="#5C3D1E" font-style="italic">Forward Evolution: Drift + Diffusion</text>

  <!-- Axes -->
  <!-- x-axis -->
