<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-ax" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
    <marker id="arr-shrink" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" fill="#5C3D1E" font-weight="bold" letter-spacing="1">EMPIRICAL BAYES: LEARNING THE PRIOR FROM DATA</text>

  <!-- Divider -->
  <line x1="400" y1="38" x2="400" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ LEFT PANEL: SHRINKAGE DIAGRAM ══ -->
  <text x="200" y="52" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">JAMES-STEIN SHRINKAGE</text>

  <!-- Axes -->
  <line x1="40" y1="340" x2="370" y2="340" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-ax)"/>
  <line x1="40" y1="344" x2="40" y2="62" stroke="#C4A87A" stroke-width="1.3" marker-end="url(#arr-ax)"/>
  <text x="365" y="355" font-size="8.5" fill="#6B5D4F">observed value</text>
  <text x="28" y="62" font-size="8.5" fill="#6B5D4F">true</text>
  <text x="28" y="72" font-size="8.5" fill="#6B5D4F">value</text>

  <!-- Grand mean line (horizontal dashed) -->
  <line x1="40" y1="200" x2="370" y2="200" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="372" y="204" font-size="7.5" fill="#C4A87A">grand mean</text>

  <!-- Individual observations (blue dots) scattered -->
  <circle cx="95" cy="120" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="140" cy="290" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="185" cy="105" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="230" cy="310" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="275" cy="140" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="320" cy="260" r="5" fill="#2D5A8E" opacity="0.7"/>

  <!-- Shrunk estimates (red dots, pulled toward grand mean) -->
  <circle cx="95" cy="152" r="5" fill="#7C2530"/>
  <circle cx="140" cy="264" r="5" fill="#7C2530"/>
  <circle cx="185" cy="138" r="5" fill="#7C2530"/>
  <circle cx="230" cy="276" r="5" fill="#7C2530"/>
  <circle cx="275" cy="158" r="5" fill="#7C2530"/>
  <circle cx="320" cy="244" r="5" fill="#7C2530"/>

  <!-- Arrows from observed to shrunk -->
  <line x1="95" y1="125" x2="95" y2="148" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arr-shrink)"/>
  <line x1="140" y1="285" x2="140" y2="268" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arr-shrink)"/>
  <line x1="185" y1="110" x2="185" y2="142" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arr-shrink)"/>
  <line x1="230" y1="305" x2="230" y2="280" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arr-shrink)"/>
  <line x1="275" y1="135" x2="275" y2="162" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arr-shrink)"/>
  <line x1="320" y1="255" x2="320" y2="248" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arr-shrink)"/>

  <!-- Legend -->
  <circle cx="55" cy="365" r="4" fill="#2D5A8E" opacity="0.7"/>
  <text x="63" y="369" font-size="8" fill="#2D5A8E">observed (MLE)</text>
  <circle cx="175" cy="365" r="4" fill="#7C2530"/>
  <text x="183" y="369" font-size="8" fill="#7C2530">shrunk (EB estimate)</text>

  <!-- Caption -->
  <text x="200" y="390" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">Extreme values pulled toward the grand mean</text>

  <!-- ══ RIGHT PANEL: ROBBINS' WORKFLOW ══ -->
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">ROBBINS' RECIPE</text>

  <!-- Step boxes -->
  <!-- Step 1: Observe many groups -->
  <rect x="440" y="70" width="320" height="55" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="460" y="88" font-size="9" fill="#2D5A8E" font-weight="bold">1. Observe many similar problems</text>
  <text x="460" y="103" font-size="8" fill="#5C3D1E">Batting averages, disease rates, gene effects...</text>
  <text x="460" y="115" font-size="8" fill="#5C3D1E">Each has its own unknown parameter theta_i</text>

  <!-- Arrow down -->
  <line x1="600" y1="125" x2="600" y2="142" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-shrink)"/>

  <!-- Step 2: Estimate the prior -->
  <rect x="440" y="145" width="320" height="55" rx="4" fill="#C4A87A" fill-opacity="0.15" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="460" y="163" font-size="9" fill="#5C3D1E" font-weight="bold">2. Estimate prior from the data itself</text>
  <text x="460" y="178" font-size="8" fill="#5C3D1E">Fit G(theta) to the marginal distribution of</text>
  <text x="460" y="190" font-size="8" fill="#5C3D1E">all observations (parametric or nonparametric)</text>

  <!-- Arrow down -->
  <line x1="600" y1="200" x2="600" y2="217" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-shrink)"/>

  <!-- Step 3: Compute posterior -->
  <rect x="440" y="220" width="320" height="55" rx="4" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.2"/>
  <text x="460" y="238" font-size="9" fill="#7C2530" font-weight="bold">3. Compute posterior for each unit</text>
  <text x="460" y="253" font-size="8" fill="#5C3D1E">Combine individual likelihood with estimated</text>
  <text x="460" y="265" font-size="8" fill="#5C3D1E">prior: shrink extreme values toward the mean</text>

  <!-- Arrow down -->
  <line x1="600" y1="275" x2="600" y2="292" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr-shrink)"/>

  <!-- Step 4: Result -->
  <rect x="440" y="295" width="320" height="50" rx="4" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="460" y="313" font-size="9" fill="#5C3D1E" font-weight="bold">4. Better estimates for everyone</text>
  <text x="460" y="328" font-size="8" fill="#5C3D1E">Lower total MSE than individual MLEs</text>
  <text x="460" y="340" font-size="8" fill="#5C3D1E" font-style="italic">Borrow strength across groups</text>

  <!-- Key equation at bottom right -->
  <text x="600" y="370" text-anchor="middle" font-size="9" fill="#7C2530" font-style="italic">theta_i^EB = (1 - B) * x_i + B * grand_mean</text>
  <text x="600" y="384" text-anchor="middle" font-size="8" fill="#6B5D4F">B = shrinkage factor estimated from all data</text>
</svg>
