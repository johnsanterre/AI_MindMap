<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#2D5A8E"/>
  <text x="400" y="31" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FDFAF4" text-anchor="middle">NASA Ames Research Center</text>

  <!-- Panel dividers -->
  <line x1="260" y1="48" x2="260" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="540" y1="48" x2="540" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- LEFT PANEL: Identity Facts -->
  <text x="130" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">CENTER PROFILE</text>
  <line x1="20" y1="80" x2="240" y2="80" stroke="#C4A87A" stroke-width="1"/>

  <!-- Fact blocks -->
  <rect x="20" y="90" width="220" height="34" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="130" y="104" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Founded</text>
  <text x="130" y="118" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1939</text>

  <rect x="20" y="132" width="220" height="34" rx="4" fill="#7C2530" opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="130" y="146" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Location</text>
  <text x="130" y="160" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Mountain View, CA · Moffett Field</text>

  <rect x="20" y="174" width="220" height="34" rx="4" fill="#5C3D1E" opacity="0.10" stroke="#5C3D1E" stroke-width="1"/>
  <text x="130" y="188" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Region</text>
  <text x="130" y="202" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Silicon Valley</text>

  <rect x="20" y="216" width="220" height="34" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="130" y="230" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Workforce</text>
  <text x="130" y="244" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">~2,500 civil servants + contractors</text>

  <rect x="20" y="258" width="220" height="50" rx="4" fill="#C4A87A" opacity="0.20" stroke="#C4A87A" stroke-width="1"/>
  <text x="130" y="273" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Primary Focus Areas</text>
  <text x="130" y="289" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">IT Research · Aeronautics</text>
  <text x="130" y="302" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Astrobiology · AI Systems</text>

  <!-- Supercomputer note -->
  <rect x="20" y="318" width="220" height="34" rx="4" fill="#7C2530" opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="130" y="332" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Pleiades Supercomputer</text>
  <text x="130" y="346" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Aerospace &amp; climate simulations</text>

  <!-- CENTER PANEL: AI/ML Research -->
  <text x="400" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">SILICON VALLEY AI FOCUS</text>
  <line x1="270" y1="80" x2="530" y2="80" stroke="#C4A87A" stroke-width="1"/>

  <!-- AI Research boxes -->
  <rect x="275" y="90" width="250" height="36" rx="4" fill="#2D5A8E" opacity="0.85"/>
  <text x="400" y="105" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">UTM · Drone Traffic Management</text>
  <text x="400" y="119" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">AI-managed low-altitude airspace</text>

  <rect x="275" y="134" width="250" height="36" rx="4" fill="#7C2530" opacity="0.80"/>
  <text x="400" y="149" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Urban Air Mobility (CAS)</text>
  <text x="400" y="163" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">AI for eVTOL &amp; advanced air traffic</text>

  <rect x="275" y="178" width="250" height="36" rx="4" fill="#5C3D1E" opacity="0.80"/>
  <text x="400" y="193" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Earth Science ML</text>
  <text x="400" y="207" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Wildfire · climate · air quality</text>

  <rect x="275" y="222" width="250" height="36" rx="4" fill="#C4A87A" opacity="0.80"/>
  <text x="400" y="237" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Astrobiology AI</text>
  <text x="400" y="251" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Life-signature detection in mission data</text>

  <rect x="275" y="266" width="250" height="36" rx="4" fill="#2D5A8E" opacity="0.70"/>
  <text x="400" y="281" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Quantum Computing</text>
  <text x="400" y="295" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Google partnership · NASA campus</text>

  <rect x="275" y="310" width="250" height="36" rx="4" fill="#7C2530" opacity="0.65"/>
  <text x="400" y="325" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Intelligent Autonomous Systems</text>
  <text x="400" y="339" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Space exploration · expert systems since 1980s</text>

  <!-- RIGHT PANEL: Tech Ecosystem -->
  <text x="670" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">TECH ECOSYSTEM</text>
  <line x1="550" y1="80" x2="790" y2="80" stroke="#C4A87A" stroke-width="1"/>

  <!-- NASA Research Park central node -->
  <ellipse cx="670" cy="150" rx="80" ry="34" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="670" y="145" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">NASA</text>
  <text x="670" y="160" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Research Park</text>

  <!-- Spokes to partners -->
  <line x1="595" y1="128" x2="560" y2="105" stroke="#C4A87A" stroke-width="1.2"/>
  <rect x="548" y="88" width="70" height="28" rx="3" fill="#7C2530" opacity="0.80"/>
  <text x="583" y="100" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Google</text>
  <text x="583" y="111" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">Moffett lease</text>

  <line x1="750" y1="128" x2="775" y2="105" stroke="#C4A87A" stroke-width="1.2"/>
  <rect x="740" y="88" width="50" height="28" rx="3" fill="#5C3D1E" opacity="0.80"/>
  <text x="765" y="100" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Stanford</text>
  <text x="765" y="111" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">Research</text>

  <line x1="670" y1="184" x2="670" y2="205" stroke="#C4A87A" stroke-width="1.2"/>
  <rect x="605" y="205" width="130" height="28" rx="3" fill="#C4A87A" opacity="0.80"/>
  <text x="670" y="218" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Tech Startup Incubator</text>
  <text x="670" y="229" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Industry partnerships on-campus</text>

  <!-- Open source / platforms -->
  <rect x="555" y="255" width="110" height="40" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="610" y="271" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Code.NASA.gov</text>
  <text x="610" y="284" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Open-source ML tools</text>

  <rect x="675" y="255" width="110" height="40" rx="4" fill="#7C2530" opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="730" y="271" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">OpenNEX Platform</text>
  <text x="730" y="284" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">Climate data for research</text>

  <!-- Culture note -->
  <rect x="555" y="310" width="230" height="50" rx="4" fill="#C4A87A" opacity="0.20" stroke="#C4A87A" stroke-width="1"/>
  <text x="670" y="326" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Culture: Most startup-adjacent</text>
  <text x="670" y="340" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">NASA center. Proximity to Valley</text>
  <text x="670" y="353" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">drives rapid tech transfer.</text>
</svg>
