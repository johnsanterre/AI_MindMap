<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="38" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Nonnegative Matrix Factorization: V ≈ W × H</text>

  <!-- Matrix V -->
  <text x="110" y="72" font-family="Georgia,serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-weight="bold">V</text>
  <text x="110" y="88" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">(n × m)</text>
  <rect x="40" y="100" width="140" height="180" fill="none" stroke="#5C3D1E" stroke-width="2" rx="3"/>
  <!-- Grid cells for V -->
  <rect x="45"  y="105" width="30" height="25" fill="#7C2530" opacity="0.8" rx="2"/>
  <rect x="80"  y="105" width="30" height="25" fill="#7C2530" opacity="0.3" rx="2"/>
  <rect x="115" y="105" width="30" height="25" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="115" y="105" width="30" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="150" y="105" width="25" height="25" fill="#7C2530" opacity="0.5" rx="2"/>

  <rect x="45"  y="135" width="30" height="25" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="45"  y="135" width="30" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="80"  y="135" width="30" height="25" fill="#7C2530" opacity="0.6" rx="2"/>
  <rect x="115" y="135" width="30" height="25" fill="#7C2530" opacity="0.9" rx="2"/>
  <rect x="150" y="135" width="25" height="25" fill="#7C2530" opacity="0.2" rx="2"/>

  <rect x="45"  y="165" width="30" height="25" fill="#7C2530" opacity="0.4" rx="2"/>
  <rect x="80"  y="165" width="30" height="25" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="80"  y="165" width="30" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="115" y="165" width="30" height="25" fill="#7C2530" opacity="0.1" rx="2"/>
  <rect x="150" y="165" width="25" height="25" fill="#7C2530" opacity="0.7" rx="2"/>

  <rect x="45"  y="195" width="30" height="25" fill="#7C2530" opacity="0.6" rx="2"/>
  <rect x="80"  y="195" width="30" height="25" fill="#7C2530" opacity="0.3" rx="2"/>
  <rect x="115" y="195" width="30" height="25" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="115" y="195" width="30" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="150" y="195" width="25" height="25" fill="#7C2530" opacity="0.4" rx="2"/>

  <rect x="45"  y="225" width="30" height="25" fill="#7C2530" opacity="0.1" rx="2"/>
  <rect x="80"  y="225" width="30" height="25" fill="#7C2530" opacity="0.7" rx="2"/>
  <rect x="115" y="225" width="30" height="25" fill="#7C2530" opacity="0.5" rx="2"/>
  <rect x="150" y="225" width="25" height="25" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="150" y="225" width="25" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>

  <!-- "≥ 0" labels -->
  <text x="110" y="295" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">all entries ≥ 0</text>

  <!-- Approx symbol -->
  <text x="210" y="195" font-family="Georgia,serif" font-size="28" fill="#C4A87A" text-anchor="middle">≈</text>

  <!-- Matrix W -->
  <text x="300" y="72" font-family="Georgia,serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-weight="bold">W</text>
  <text x="300" y="88" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">(n × r)</text>
  <rect x="260" y="100" width="80" height="180" fill="none" stroke="#2D5A8E" stroke-width="2" rx="3"/>
  <!-- Grid cells for W — tall and narrow (parts/basis) -->
  <rect x="265" y="105" width="33" height="25" fill="#2D5A8E" opacity="0.8" rx="2"/>
  <rect x="302" y="105" width="33" height="25" fill="#2D5A8E" opacity="0.1" rx="2"/>

  <rect x="265" y="135" width="33" height="25" fill="#2D5A8E" opacity="0.0" rx="2"/>
  <rect x="265" y="135" width="33" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="302" y="135" width="33" height="25" fill="#2D5A8E" opacity="0.7" rx="2"/>

  <rect x="265" y="165" width="33" height="25" fill="#2D5A8E" opacity="0.5" rx="2"/>
  <rect x="302" y="165" width="33" height="25" fill="#2D5A8E" opacity="0.0" rx="2"/>
  <rect x="302" y="165" width="33" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>

  <rect x="265" y="195" width="33" height="25" fill="#2D5A8E" opacity="0.6" rx="2"/>
  <rect x="302" y="195" width="33" height="25" fill="#2D5A8E" opacity="0.2" rx="2"/>

  <rect x="265" y="225" width="33" height="25" fill="#2D5A8E" opacity="0.0" rx="2"/>
  <rect x="265" y="225" width="33" height="25" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="302" y="225" width="33" height="25" fill="#2D5A8E" opacity="0.6" rx="2"/>

  <text x="300" y="295" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">basis (parts)</text>

  <!-- Multiply symbol -->
  <text x="365" y="195" font-family="Georgia,serif" font-size="24" fill="#C4A87A" text-anchor="middle">×</text>

  <!-- Matrix H -->
  <text x="450" y="72" font-family="Georgia,serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">H</text>
  <text x="450" y="88" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">(r × m)</text>
  <rect x="395" y="100" width="110" height="60" fill="none" stroke="#7C2530" stroke-width="2" rx="3"/>
  <!-- Grid cells for H — short and wide (activations) -->
  <rect x="400" y="105" width="24" height="22" fill="#7C2530" opacity="0.9" rx="2"/>
  <rect x="428" y="105" width="24" height="22" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="428" y="105" width="24" height="22" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="456" y="105" width="24" height="22" fill="#7C2530" opacity="0.3" rx="2"/>
  <rect x="476" y="105" width="24" height="22" fill="#7C2530" opacity="0.6" rx="2"/>

  <rect x="400" y="132" width="24" height="22" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="400" y="132" width="24" height="22" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>
  <rect x="428" y="132" width="24" height="22" fill="#7C2530" opacity="0.7" rx="2"/>
  <rect x="456" y="132" width="24" height="22" fill="#7C2530" opacity="0.5" rx="2"/>
  <rect x="476" y="132" width="24" height="22" fill="#7C2530" opacity="0.0" rx="2"/>
  <rect x="476" y="132" width="24" height="22" fill="none" stroke="#D4C5A9" stroke-width="0.5" rx="2"/>

  <text x="450" y="185" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">activations (weights)</text>

  <!-- Parts-based decomposition illustration -->
  <text x="640" y="72" font-family="Georgia,serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Parts-Based Decomposition</text>

  <!-- Face example: sum of parts -->
  <!-- Part 1: eyes -->
  <rect x="555" y="90" width="60" height="60" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="585" y="105" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Part 1</text>
  <ellipse cx="575" cy="125" rx="6" ry="4" fill="#2D5A8E" opacity="0.6"/>
  <ellipse cx="595" cy="125" rx="6" ry="4" fill="#2D5A8E" opacity="0.6"/>

  <!-- Plus -->
  <text x="625" y="125" font-family="Georgia,serif" font-size="16" fill="#C4A87A" text-anchor="middle">+</text>

  <!-- Part 2: nose -->
  <rect x="638" y="90" width="60" height="60" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="668" y="105" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Part 2</text>
  <line x1="668" y1="115" x2="665" y2="135" stroke="#2D5A8E" stroke-width="1.5" opacity="0.6"/>
  <line x1="665" y1="135" x2="671" y2="135" stroke="#2D5A8E" stroke-width="1.5" opacity="0.6"/>

  <!-- Plus -->
  <text x="708" y="125" font-family="Georgia,serif" font-size="16" fill="#C4A87A" text-anchor="middle">+</text>

  <!-- Part 3: mouth -->
  <rect x="720" y="90" width="60" height="60" fill="#F5EDE0" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="750" y="105" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Part 3</text>
  <path d="M738,130 Q750,142 762,130" fill="none" stroke="#2D5A8E" stroke-width="1.5" opacity="0.6"/>

  <!-- Arrow down to combined face -->
  <line x1="668" y1="155" x2="668" y2="170" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="664,168 668,176 672,168" fill="#C4A87A"/>

  <!-- Combined face -->
  <rect x="630" y="180" width="76" height="76" fill="#F5EDE0" stroke="#5C3D1E" stroke-width="1.5" rx="5"/>
  <text x="668" y="197" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Reconstruction</text>
  <ellipse cx="653" cy="218" rx="6" ry="4" fill="#2D5A8E" opacity="0.7"/>
  <ellipse cx="683" cy="218" rx="6" ry="4" fill="#2D5A8E" opacity="0.7"/>
  <line x1="668" y1="222" x2="665" y2="236" stroke="#2D5A8E" stroke-width="1.5" opacity="0.7"/>
  <line x1="665" y1="236" x2="671" y2="236" stroke="#2D5A8E" stroke-width="1.5" opacity="0.7"/>
  <path d="M656,243 Q668,252 680,243" fill="none" stroke="#2D5A8E" stroke-width="1.5" opacity="0.7"/>

  <!-- Key insight text -->
  <text x="400" y="330" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Non-negativity constraint forces additive, parts-based representation:</text>
  <text x="400" y="350" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">each observation = non-negative sum of non-negative parts</text>

  <!-- Contrast note -->
  <text x="400" y="375" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">(Unlike PCA, parts cannot cancel — no subtraction allowed)</text>
</svg>