<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">The Arc of Modern AI: From Winter to Transformer</text>

  <!-- Timeline spine -->
  <line x1="50" y1="200" x2="760" y2="200" stroke="#C4A87A" stroke-width="2.5"/>
  <polygon points="756,195 766,200 756,205" fill="#C4A87A"/>

  <!-- Era bands -->
  <rect x="50"  y="185" width="120" height="30" fill="#DDDDDD" rx="3" opacity="0.5"/>
  <rect x="170" y="185" width="130" height="30" fill="#AABBCC" rx="3" opacity="0.4"/>
  <rect x="300" y="185" width="160" height="30" fill="#7788BB" rx="3" opacity="0.35"/>
  <rect x="460" y="185" width="300" height="30" fill="#5566AA" rx="3" opacity="0.3"/>

  <!-- Era labels (above spine) -->
  <text x="110" y="178" font-family="Georgia,serif" font-size="9" fill="#555" text-anchor="middle" font-style="italic">AI Winter</text>
  <text x="235" y="178" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Statistical Thaw</text>
  <text x="380" y="178" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle" font-style="italic">Deep Learning Ignition</text>
  <text x="610" y="178" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">Attention Era</text>

  <!-- Events — nodes on timeline -->
  <!-- 1986: Backprop popularised -->
  <circle cx="80"  cy="200" r="6" fill="#888"/>
  <line x1="80"  y1="194" x2="80"  y2="135" stroke="#888" stroke-width="1"/>
  <text x="80"  y="130" font-family="Georgia,serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">1986</text>
  <text x="80"  y="120" font-family="Georgia,serif" font-size="9" fill="#555" text-anchor="middle">Backprop</text>
  <text x="80"  y="110" font-family="Georgia,serif" font-size="9" fill="#555" text-anchor="middle">(& Winter)</text>

  <!-- 1995: SVM -->
  <circle cx="185" cy="200" r="6" fill="#2D5A8E"/>
  <line x1="185" y1="206" x2="185" y2="265" stroke="#2D5A8E" stroke-width="1"/>
  <text x="185" y="280" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1995</text>
  <text x="185" y="291" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">SVM</text>
  <text x="185" y="302" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">(Vapnik)</text>

  <!-- 1997: LSTM -->
  <circle cx="240" cy="200" r="6" fill="#2D5A8E"/>
  <line x1="240" y1="194" x2="240" y2="135" stroke="#2D5A8E" stroke-width="1"/>
  <text x="240" y="130" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1997</text>
  <text x="240" y="120" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">LSTM</text>

  <!-- 1998: LeNet -->
  <circle cx="285" cy="200" r="6" fill="#5040A0"/>
  <line x1="285" y1="206" x2="285" y2="265" stroke="#5040A0" stroke-width="1"/>
  <text x="285" y="280" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle" font-weight="bold">1998</text>
  <text x="285" y="291" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle">LeNet-5</text>
  <text x="285" y="302" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle">(LeCun)</text>

  <!-- 2006: Hinton DBN -->
  <circle cx="380" cy="200" r="7" fill="#5040A0"/>
  <line x1="380" y1="194" x2="380" y2="130" stroke="#5040A0" stroke-width="1.5"/>
  <text x="380" y="125" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle" font-weight="bold">2006</text>
  <text x="380" y="115" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle">Deep Belief</text>
  <text x="380" y="105" font-family="Georgia,serif" font-size="9" fill="#5040A0" text-anchor="middle">Nets (Hinton)</text>

  <!-- 2012: AlexNet -->
  <circle cx="480" cy="200" r="9" fill="#7C2530"/>
  <line x1="480" y1="206" x2="480" y2="275" stroke="#7C2530" stroke-width="2"/>
  <text x="480" y="290" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2012</text>
  <text x="480" y="303" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">AlexNet</text>
  <text x="480" y="316" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">GPU revolution</text>

  <!-- 2015: Attention (Bahdanau) -->
  <circle cx="580" cy="200" r="7" fill="#7C2530"/>
  <line x1="580" y1="194" x2="580" y2="130" stroke="#7C2530" stroke-width="1.5"/>
  <text x="580" y="125" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">2015</text>
  <text x="580" y="115" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Attention</text>
  <text x="580" y="105" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">(Bahdanau)</text>

  <!-- 2017: Transformer -->
  <circle cx="700" cy="200" r="10" fill="#7C2530"/>
  <line x1="700" y1="206" x2="700" y2="265" stroke="#7C2530" stroke-width="2"/>
  <text x="700" y="280" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">2017</text>
  <text x="700" y="293" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Transformer</text>
  <text x="700" y="306" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">"Attention Is</text>
  <text x="700" y="318" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">All You Need"</text>

  <!-- Hardware lottery note -->
  <rect x="430" y="50" width="200" height="38" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="530" y="66" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">The Hardware Lottery:</text>
  <text x="530" y="79" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">ideas win when hardware fits them</text>
  <line x1="480" y1="191" x2="500" y2="88" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom caption -->
  <text x="400" y="365" font-family="Georgia,serif" font-size="11" fill="#2C2C2C" text-anchor="middle">Each breakthrough needed: the right idea · the right data · the right hardware.</text>
  <text x="400" y="382" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">History of AI is not linear progress — it is a sequence of unlocked constraints.</text>
</svg>
