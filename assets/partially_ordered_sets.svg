<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowBrown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowNavy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- ===== SECTION 1: A Poset (Hasse Diagram of divisors of 12) ===== -->
  <text x="185" y="28" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Hasse Diagram: Divisors of 12</text>
  <line x1="30" y1="35" x2="340" y2="35" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Node: 1 (bottom) -->
  <circle cx="185" cy="320" r="22" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="185" y="325" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">1</text>

  <!-- Node: 2 -->
  <circle cx="100" cy="240" r="22" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="100" y="245" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2</text>

  <!-- Node: 3 -->
  <circle cx="270" cy="240" r="22" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="270" y="245" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">3</text>

  <!-- Node: 4 -->
  <circle cx="60" cy="150" r="22" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="60" y="155" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">4</text>

  <!-- Node: 6 -->
  <circle cx="185" cy="150" r="22" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <text x="185" y="155" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">6</text>

  <!-- Node: 12 (top) -->
  <circle cx="130" cy="65" r="22" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="2"/>
  <text x="130" y="70" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle" font-weight="bold">12</text>

  <!-- Edges (Hasse diagram lines, no arrows) -->
  <!-- 1 -> 2 -->
  <line x1="168" y1="304" x2="117" y2="258" stroke="#5C3D1E" stroke-width="2"/>
  <!-- 1 -> 3 -->
  <line x1="202" y1="304" x2="253" y2="258" stroke="#5C3D1E" stroke-width="2"/>
  <!-- 2 -> 4 -->
  <line x1="86" y1="222" x2="74" y2="170" stroke="#5C3D1E" stroke-width="2"/>
  <!-- 2 -> 6 -->
  <line x1="120" y1="226" x2="166" y2="168" stroke="#5C3D1E" stroke-width="2"/>
  <!-- 3 -> 6 -->
  <line x1="252" y1="224" x2="204" y2="168" stroke="#5C3D1E" stroke-width="2"/>
  <!-- 4 -> 12 -->
  <line x1="78" y1="133" x2="113" y2="83" stroke="#7C2530" stroke-width="2"/>
  <!-- 6 -> 12 -->
  <line x1="168" y1="133" x2="147" y2="83" stroke="#7C2530" stroke-width="2"/>

  <!-- Label -->
  <text x="185" y="360" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">a &#x2264; b means "a divides b"</text>
  <text x="185" y="376" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Not every pair is comparable: 4 and 3 are incomparable</text>

  <!-- Divider -->
  <line x1="365" y1="20" x2="365" y2="350" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== SECTION 2: Poset Axioms ===== -->
  <text x="510" y="28" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Three Axioms of a Partial Order</text>
  <line x1="375" y1="35" x2="645" y2="35" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Reflexive -->
  <rect x="390" y="55" width="240" height="65" rx="6" fill="#2D5A8E" opacity="0.08" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="510" y="76" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Reflexive</text>
  <text x="510" y="97" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">a &#x2264; a for all a</text>
  <text x="510" y="112" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">Every element relates to itself</text>

  <!-- Antisymmetric -->
  <rect x="390" y="135" width="240" height="75" rx="6" fill="#7C2530" opacity="0.08" stroke="#7C2530" stroke-width="1.5"/>
  <text x="510" y="156" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">Antisymmetric</text>
  <text x="510" y="177" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">a &#x2264; b and b &#x2264; a implies a = b</text>
  <text x="510" y="200" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">No two distinct elements dominate each other</text>

  <!-- Transitive -->
  <rect x="390" y="225" width="240" height="75" rx="6" fill="#5C3D1E" opacity="0.08" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="510" y="246" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Transitive</text>
  <text x="510" y="267" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">a &#x2264; b and b &#x2264; c implies a &#x2264; c</text>
  <text x="510" y="290" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">Order chains propagate</text>

  <!-- Divider -->
  <line x1="655" y1="20" x2="655" y2="350" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== SECTION 3: Key Concepts ===== -->
  <text x="728" y="28" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Key Concepts</text>
  <line x1="660" y1="35" x2="795" y2="35" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Chain -->
  <rect x="668" y="52" width="120" height="55" rx="5" fill="#C4A87A" opacity="0.15" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="728" y="72" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Chain</text>
  <text x="728" y="89" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Totally ordered</text>
  <text x="728" y="101" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">subset</text>

  <!-- Antichain -->
  <rect x="668" y="118" width="120" height="55" rx="5" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="728" y="138" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Antichain</text>
  <text x="728" y="155" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">No two elements</text>
  <text x="728" y="167" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">comparable</text>

  <!-- Lattice -->
  <rect x="668" y="184" width="120" height="55" rx="5" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="728" y="204" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Lattice</text>
  <text x="728" y="221" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Every pair has</text>
  <text x="728" y="233" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">meet and join</text>

  <!-- Maximal / Minimal -->
  <rect x="668" y="250" width="120" height="55" rx="5" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="728" y="270" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Extremal</text>
  <text x="728" y="287" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Maximal, minimal,</text>
  <text x="728" y="299" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">greatest, least</text>

  <!-- ===== Bottom caption bar ===== -->
  <rect x="0" y="360" width="800" height="40" fill="#F0EAD8" rx="0"/>
  <rect x="0" y="360" width="800" height="40" fill="none" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="376" font-family="Georgia, serif" font-size="11.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">
    A partially ordered set imposes structure without requiring every pair of elements to be comparable.
  </text>
  <text x="400" y="392" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">
    Posets unify divisibility, subset inclusion, logical implication, and topological sorting.
  </text>
</svg>