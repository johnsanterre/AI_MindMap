<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Restricted Boltzmann Machine: Bipartite Energy Model</text>

  <!-- LEFT: RBM bipartite graph -->
  <text x="185" y="58" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">RBM Structure</text>
  <!-- Hidden units (top) -->
  <text x="40" y="92" font-family="Georgia,serif" font-size="11" fill="#5040A0">hidden h</text>
  <circle cx="95"  cy="120" r="18" fill="#E8D4F8" stroke="#5040A0" stroke-width="2"/>
  <text x="95"  cy="120" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" dominant-baseline="middle">h₁</text>
  <circle cx="155" cy="120" r="18" fill="#E8D4F8" stroke="#5040A0" stroke-width="2"/>
  <text x="155" cy="120" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" dominant-baseline="middle">h₂</text>
  <circle cx="215" cy="120" r="18" fill="#E8D4F8" stroke="#5040A0" stroke-width="2"/>
  <text x="215" cy="120" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" dominant-baseline="middle">h₃</text>
  <circle cx="275" cy="120" r="18" fill="#E8D4F8" stroke="#5040A0" stroke-width="2"/>
  <text x="275" cy="120" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" dominant-baseline="middle">h₄</text>
  <!-- Visible units (bottom) -->
  <text x="40" y="238" font-family="Georgia,serif" font-size="11" fill="#2D5A8E">visible v</text>
  <circle cx="95"  cy="255" r="18" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="95"  cy="255" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" dominant-baseline="middle">v₁</text>
  <circle cx="155" cy="255" r="18" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="155" cy="255" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" dominant-baseline="middle">v₂</text>
  <circle cx="215" cy="255" r="18" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="215" cy="255" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" dominant-baseline="middle">v₃</text>
  <circle cx="275" cy="255" r="18" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="275" cy="255" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" dominant-baseline="middle">v₄</text>
  <circle cx="335" cy="255" r="18" fill="#D4E8F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="335" cy="255" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" dominant-baseline="middle">v₅</text>
  <!-- Bipartite connections (every h to every v) -->
  <line x1="95"  y1="138" x2="95"  y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="95"  y1="138" x2="155" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="95"  y1="138" x2="215" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.4"/>
  <line x1="155" y1="138" x2="95"  y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.4"/>
  <line x1="155" y1="138" x2="155" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="138" x2="215" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="215" y1="138" x2="155" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.4"/>
  <line x1="215" y1="138" x2="215" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="215" y1="138" x2="275" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="275" y1="138" x2="215" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.4"/>
  <line x1="275" y1="138" x2="275" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <line x1="275" y1="138" x2="335" y2="237" stroke="#C4A87A" stroke-width="0.8" opacity="0.6"/>
  <!-- No within-layer connections label -->
  <text x="185" y="192" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">no connections within layers</text>
  <text x="185" y="204" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">(the "restricted" part)</text>
  <!-- W label -->
  <text x="362" y="192" font-family="Georgia,serif" font-size="14" fill="#C4A87A" font-weight="bold">W</text>

  <!-- Divider -->
  <line x1="390" y1="50" x2="390" y2="385" stroke="#D4C5A9" stroke-width="1"/>

  <!-- RIGHT: Energy + Training -->
  <text x="595" y="58" font-family="Georgia,serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Energy Function &amp; Training</text>

  <rect x="405" y="68" width="370" height="75" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="590" y="86" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Energy</text>
  <text x="590" y="106" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle">E(v,h) = −bᵀv − cᵀh − vᵀWh</text>
  <text x="590" y="126" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">b = visible bias, c = hidden bias, W = weights</text>

  <rect x="405" y="155" width="370" height="60" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="590" y="173" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Joint Distribution</text>
  <text x="590" y="196" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle">P(v,h) = e^{−E(v,h)} / Z</text>

  <!-- Gibbs sampling -->
  <rect x="405" y="228" width="370" height="85" rx="4" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1"/>
  <text x="590" y="246" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Contrastive Divergence Training</text>
  <text x="415" y="264" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">1. Given v, sample h ~ P(h|v)  (positive phase)</text>
  <text x="415" y="280" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">2. Given h, reconstruct v' ~ P(v|h)  (negative phase)</text>
  <text x="415" y="296" font-family="Georgia,serif" font-size="10" fill="#5C3D1E">3. ΔW ∝ ⟨vh⟩_data − ⟨vh⟩_reconstruct</text>
  <text x="590" y="306" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">approximates max-likelihood without computing Z</text>

  <!-- Conditional independence label -->
  <text x="590" y="340" font-family="Georgia,serif" font-size="11" fill="#5040A0" text-anchor="middle" font-weight="bold">Key: bipartite → conditional independence</text>
  <text x="590" y="356" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">P(h|v) = ∏ᵢ P(hᵢ|v)  and  P(v|h) = ∏ⱼ P(vⱼ|h)</text>
  <text x="590" y="372" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">makes Gibbs sampling tractable</text>
</svg>
