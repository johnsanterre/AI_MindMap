<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Approximating P(A|B): Seven Hacks Against Complexity</text>

  <!-- Growing B bar -->
  <text x="30" y="62" font-family="Georgia,serif" font-size="11" fill="#888" font-style="italic">size of B →</text>
  <rect x="30"  y="66" width="14"  height="14" fill="#CCCCCC" rx="2"/>
  <rect x="30"  y="66" width="30"  height="14" fill="none" stroke="#BBBBBB" stroke-width="1" rx="2"/>
  <rect x="143" y="63" width="40"  height="20" fill="#BBBBCC" rx="2"/>
  <rect x="255" y="60" width="60"  height="23" fill="#AABBCC" rx="2"/>
  <rect x="363" y="57" width="80"  height="26" fill="#99AACC" rx="2"/>
  <rect x="470" y="54" width="100" height="29" fill="#8899CC" rx="2"/>
  <rect x="576" y="50" width="100" height="33" fill="#7788BB" rx="2"/>
  <rect x="678" y="44" width="108" height="39" fill="#5566AA" rx="2" opacity="0.7"/>

  <text x="37"  y="77" font-family="Georgia,serif" font-size="9" fill="#555">"rain?"</text>
  <text x="147" y="75" font-family="Georgia,serif" font-size="9" fill="#444">bag of words</text>
  <text x="259" y="72" font-family="Georgia,serif" font-size="9" fill="#333">tabular features</text>
  <text x="367" y="70" font-family="Georgia,serif" font-size="9" fill="#222">non-linear data</text>
  <text x="474" y="67" font-family="Georgia,serif" font-size="9" fill="#111">structured data</text>
  <text x="580" y="63" font-family="Georgia,serif" font-size="9" fill="#222">images / pixels</text>
  <text x="682" y="58" font-family="Georgia,serif" font-size="9" fill="#FFF">100k-word docs</text>

  <!-- 7 technique boxes -->
  <!-- Box 1 -->
  <rect x="20" y="100" width="98" height="115" rx="5" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="1.5"/>
  <text x="69" y="118" font-family="Georgia,serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">① Just Count</text>
  <text x="69" y="133" font-family="Georgia,serif" font-size="18" fill="#888" text-anchor="middle">÷</text>
  <text x="69" y="158" font-family="Georgia,serif" font-size="10" fill="#666" text-anchor="middle">count(A∩B)</text>
  <text x="69" y="171" font-family="Georgia,serif" font-size="10" fill="#666" text-anchor="middle">──────</text>
  <text x="69" y="184" font-family="Georgia,serif" font-size="10" fill="#666" text-anchor="middle">count(B)</text>
  <text x="69" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">trivial if B is simple</text>

  <!-- Box 2 -->
  <rect x="128" y="100" width="98" height="115" rx="5" fill="#EEF2F8" stroke="#8AAAC8" stroke-width="1.5"/>
  <text x="177" y="118" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">② Naive Bayes</text>
  <text x="177" y="135" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">assume independence</text>
  <text x="177" y="155" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">∏ P(bᵢ|A)</text>
  <text x="177" y="175" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">hack: features don't</text>
  <text x="177" y="187" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">interact</text>
  <text x="177" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">spam filters, 1990s</text>

  <!-- Box 3 -->
  <rect x="236" y="100" width="98" height="115" rx="5" fill="#EEF0F8" stroke="#7060A0" stroke-width="1.5"/>
  <text x="285" y="116" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" font-weight="bold">③ Logistic</text>
  <text x="285" y="128" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" font-weight="bold">Regression</text>
  <text x="285" y="148" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle">σ(wᵀB)</text>
  <text x="285" y="168" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">hack: force into</text>
  <text x="285" y="180" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">a straight line</text>
  <text x="285" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">fails if non-linear</text>

  <!-- Box 4 -->
  <rect x="344" y="100" width="98" height="115" rx="5" fill="#EEF5EE" stroke="#509050" stroke-width="1.5"/>
  <text x="393" y="116" font-family="Georgia,serif" font-size="10" fill="#306030" text-anchor="middle" font-weight="bold">④ Decision</text>
  <text x="393" y="128" font-family="Georgia,serif" font-size="10" fill="#306030" text-anchor="middle" font-weight="bold">Trees</text>
  <text x="393" y="148" font-family="Georgia,serif" font-size="14" fill="#306030" text-anchor="middle">if / else</text>
  <text x="393" y="168" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">hack: chop B into</text>
  <text x="393" y="180" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">local boxes</text>
  <text x="393" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">XGBoost, forests</text>

  <!-- Box 5 -->
  <rect x="452" y="100" width="98" height="115" rx="5" fill="#F5EEE8" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="501" y="116" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">⑤ Ensemble</text>
  <text x="501" y="128" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Methods</text>
  <text x="501" y="148" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">avg(trees)</text>
  <text x="501" y="168" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">hack: average many</text>
  <text x="501" y="180" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">imperfect hacks</text>
  <text x="501" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">reduces overfitting</text>

  <!-- Box 6 -->
  <rect x="560" y="100" width="98" height="115" rx="5" fill="#F5ECEC" stroke="#9C4040" stroke-width="1.5"/>
  <text x="609" y="116" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">⑥ Deep</text>
  <text x="609" y="128" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Learning</text>
  <text x="609" y="148" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">B → B' (compress)</text>
  <text x="609" y="168" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">hack: learn a smaller</text>
  <text x="609" y="180" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">representation B'</text>
  <text x="609" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">needs GPUs</text>

  <!-- Box 7 -->
  <rect x="668" y="100" width="108" height="115" rx="5" fill="#F9ECEC" stroke="#7C2530" stroke-width="2"/>
  <text x="722" y="116" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">⑦ Attention</text>
  <text x="722" y="128" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">/ Transformers</text>
  <text x="722" y="148" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">filter B dynamically</text>
  <text x="722" y="168" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">hack: don't compress —</text>
  <text x="722" y="180" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">attend selectively</text>
  <text x="722" y="204" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">LLMs today</text>

  <!-- Arrows between boxes -->
  <line x1="118" y1="157" x2="128" y2="157" stroke="#AAA" stroke-width="1.5"/>
  <polygon points="125,153 133,157 125,161" fill="#AAA"/>
  <line x1="226" y1="157" x2="236" y2="157" stroke="#8AAAC8" stroke-width="1.5"/>
  <polygon points="233,153 241,157 233,161" fill="#8AAAC8"/>
  <line x1="334" y1="157" x2="344" y2="157" stroke="#7060A0" stroke-width="1.5"/>
  <polygon points="341,153 349,157 341,161" fill="#7060A0"/>
  <line x1="442" y1="157" x2="452" y2="157" stroke="#509050" stroke-width="1.5"/>
  <polygon points="449,153 457,157 449,161" fill="#509050"/>
  <line x1="550" y1="157" x2="560" y2="157" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="557,153 565,157 557,161" fill="#C4A87A"/>
  <line x1="658" y1="157" x2="668" y2="157" stroke="#9C4040" stroke-width="1.5"/>
  <polygon points="665,153 673,157 665,161" fill="#9C4040"/>

  <!-- Bottom section: the core insight -->
  <rect x="20" y="228" width="760" height="50" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="248" font-family="Georgia,serif" font-size="12" fill="#2C2C2C" text-anchor="middle">The denominator problem: when the exact context <tspan font-style="italic">B</tspan> has never occurred before, count(B) = 0.</text>
  <text x="400" y="267" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Every technique above is a different answer to: <tspan font-style="italic">how do we approximate the denominator?</tspan></text>

  <!-- Bottom timeline -->
  <line x1="30" y1="310" x2="770" y2="310" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="69"  y="328" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">pre-compute</text>
  <text x="177" y="328" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">1990s</text>
  <text x="285" y="328" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">early 2000s</text>
  <text x="393" y="328" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">2000s</text>
  <text x="501" y="328" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">2000s–2010s</text>
  <text x="609" y="328" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">2012–present</text>
  <text x="722" y="328" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">2017–present</text>

  <text x="400" y="360" font-family="Georgia,serif" font-size="13" fill="#2C2C2C" text-anchor="middle" font-weight="bold">As compute scaled, so did our tolerance for the true complexity of B.</text>
  <text x="400" y="378" font-family="Georgia,serif" font-size="11" fill="#888" text-anchor="middle" font-style="italic">AI isn't machines waking up — it's the denominator getting bigger.</text>
</svg>
