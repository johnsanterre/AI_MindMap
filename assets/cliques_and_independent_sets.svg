<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Cliques and Independent Sets</text>

  <!-- Divider -->
  <line x1="100" y1="52" x2="700" y2="52" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Left label: Clique -->
  <text x="200" y="80" font-family="Georgia, serif" font-size="16" fill="#7C2530" text-anchor="middle" font-weight="bold">Clique (K4)</text>
  <text x="200" y="98" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">every pair connected</text>

  <!-- Clique nodes (4-clique) -->
  <!-- Node positions: top=200,130  left=140,210  right=260,210  bottom=200,280 -->
  <!-- All edges in clique (6 edges for K4) -->
  <line x1="200" y1="130" x2="140" y2="210" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>
  <line x1="200" y1="130" x2="260" y2="210" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>
  <line x1="200" y1="130" x2="200" y2="280" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>
  <line x1="140" y1="210" x2="260" y2="210" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>
  <line x1="140" y1="210" x2="200" y2="280" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>
  <line x1="260" y1="210" x2="200" y2="280" stroke="#7C2530" stroke-width="2.5" opacity="0.7"/>

  <!-- Clique highlight region -->
  <polygon points="200,120 130,215 200,290 270,215" fill="#7C2530" opacity="0.08" stroke="none"/>

  <!-- Clique nodes -->
  <circle cx="200" cy="130" r="14" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="200" y="135" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">a</text>

  <circle cx="140" cy="210" r="14" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="140" y="215" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">b</text>

  <circle cx="260" cy="210" r="14" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="260" y="215" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">c</text>

  <circle cx="200" cy="280" r="14" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="200" y="285" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">d</text>

  <!-- Extra non-clique nodes attached loosely -->
  <line x1="260" y1="210" x2="320" y2="170" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="200" y1="280" x2="280" y2="330" stroke="#D4C5A9" stroke-width="1.5"/>
  <circle cx="320" cy="170" r="10" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="320" y="174" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">e</text>
  <circle cx="280" cy="330" r="10" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="280" y="334" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f</text>

  <!-- Center divider -->
  <line x1="400" y1="70" x2="400" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right label: Independent Set -->
  <text x="600" y="80" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Independent Set</text>
  <text x="600" y="98" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">no pair connected</text>

  <!-- Independent set graph: same topology, highlight non-adjacent nodes -->
  <!-- Graph edges (background) -->
  <line x1="500" y1="150" x2="550" y2="230" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="500" y1="150" x2="650" y2="150" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="550" y1="230" x2="650" y2="230" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="650" y1="150" x2="700" y2="230" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="650" y1="230" x2="700" y2="230" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="550" y1="230" x2="530" y2="310" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="650" y1="230" x2="620" y2="310" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="530" y1="310" x2="620" y2="310" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="500" y1="150" x2="530" y2="310" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Non-independent nodes (gray) -->
  <circle cx="550" cy="230" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="550" y="234" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">2</text>

  <circle cx="650" cy="230" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="650" y="234" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">4</text>

  <circle cx="620" cy="310" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="620" y="314" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">6</text>

  <!-- Independent set nodes (highlighted navy) -->
  <circle cx="500" cy="150" r="14" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="500" y="155" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">1</text>

  <circle cx="650" cy="150" r="14" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="650" y="155" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">3</text>

  <circle cx="530" cy="310" r="14" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="530" y="315" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">5</text>

  <circle cx="700" cy="230" r="14" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="700" y="235" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">7</text>

  <!-- Legend -->
  <rect x="200" y="355" width="14" height="14" fill="#7C2530" rx="3"/>
  <text x="220" y="367" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">= Clique members</text>

  <rect x="460" y="355" width="14" height="14" fill="#2D5A8E" rx="3"/>
  <text x="480" y="367" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">= Independent set members</text>
</svg>