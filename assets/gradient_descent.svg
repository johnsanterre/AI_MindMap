<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="4"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Gradient Descent on a Loss Landscape</text>

  <!-- Contour lines representing loss surface -->
  <ellipse cx="390" cy="275" rx="320" ry="140" fill="none" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>
  <ellipse cx="390" cy="275" rx="260" ry="115" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <ellipse cx="390" cy="275" rx="200" ry="90" fill="none" stroke="#C4A87A" stroke-width="2"/>
  <ellipse cx="390" cy="275" rx="140" ry="65" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <ellipse cx="390" cy="275" rx="80" ry="40" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <ellipse cx="390" cy="275" rx="30" ry="15" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>

  <!-- Global minimum point -->
  <circle cx="390" cy="275" r="5" fill="#7C2530"/>
  <text x="390" y="305" font-family="Georgia, serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">Global Minimum</text>

  <!-- Gradient descent path with arrows -->
  <circle cx="148" cy="178" r="6" fill="#7C2530"/>
  <text x="135" y="166" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">Start</text>

  <!-- Step 1 -->
  <line x1="154" y1="182" x2="200" y2="205" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <circle cx="205" cy="208" r="4" fill="#7C2530"/>

  <!-- Step 2 -->
  <line x1="210" y1="211" x2="255" y2="230" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <circle cx="260" cy="232" r="4" fill="#7C2530"/>

  <!-- Step 3 -->
  <line x1="265" y1="235" x2="305" y2="248" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <circle cx="309" cy="250" r="4" fill="#7C2530"/>

  <!-- Step 4 -->
  <line x1="314" y1="252" x2="342" y2="260" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <circle cx="346" cy="262" r="3.5" fill="#7C2530"/>

  <!-- Step 5 (converging) -->
  <line x1="350" y1="264" x2="370" y2="270" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <circle cx="373" cy="271" r="3" fill="#7C2530"/>

  <!-- Step 6 -->
  <line x1="376" y1="272" x2="386" y2="274" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Local minimum -->
  <ellipse cx="600" cy="248" rx="28" ry="18" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="600" cy="248" r="4" fill="#5C3D1E"/>
  <text x="600" y="228" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Local Minimum</text>

  <!-- Saddle point -->
  <circle cx="470" cy="215" r="3" fill="#5C3D1E" fill-opacity="0.5"/>
  <text x="470" y="205" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Saddle Point</text>

  <!-- Annotations -->
  <text x="680" y="78" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">Step size =</text>
  <text x="680" y="96" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" text-anchor="middle" font-style="italic">learning rate</text>

  <text x="185" y="140" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">Negative gradient</text>
  <text x="185" y="155" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">points downhill</text>

  <text x="680" y="170" font-family="Georgia, serif" font-size="12" fill="#C4A87A" text-anchor="middle">Contour lines =</text>
  <text x="680" y="187" font-family="Georgia, serif" font-size="12" fill="#C4A87A" text-anchor="middle">equal loss</text>

  <text x="680" y="360" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">Inner rings = lower loss</text>

  <!-- Update rule -->
  <text x="400" y="380" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle" font-style="italic">w = w - lr * dL/dw</text>
</svg>
