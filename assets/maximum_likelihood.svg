<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#5C3D1E" font-size="20" font-weight="bold">Maximum Likelihood Estimation</text>

  <!-- Axes -->
  <line x1="90" y1="310" x2="720" y2="310" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="90" y1="60" x2="90" y2="310" stroke="#5C3D1E" stroke-width="2"/>
  <text x="730" y="315" fill="#5C3D1E" font-size="14">θ</text>
  <text x="55" y="75" fill="#5C3D1E" font-size="14">L(θ)</text>

  <!-- Axis ticks -->
  <line x1="200" y1="310" x2="200" y2="316" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="350" y1="310" x2="350" y2="316" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="450" y1="310" x2="450" y2="316" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="600" y1="310" x2="600" y2="316" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Likelihood curve - bell shape peaking at MLE -->
  <path d="M 110,305 C 150,300 200,285 250,250 C 300,210 340,140 380,100 C 400,82 420,72 440,70 C 460,72 480,82 500,100 C 540,140 580,210 620,255 C 660,285 690,300 710,305" fill="none" stroke="#2D5A8E" stroke-width="3.5"/>

  <!-- Shaded region under peak -->
  <path d="M 360,310 L 360,108 C 380,88 400,76 420,72 C 440,70 460,76 480,88 L 520,310 Z" fill="#2D5A8E" fill-opacity="0.12"/>

  <!-- MLE vertical dashed line -->
  <line x1="440" y1="70" x2="440" y2="310" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="7,4"/>

  <!-- Peak marker -->
  <circle cx="440" cy="70" r="7" fill="#7C2530"/>

  <!-- MLE label -->
  <text x="440" y="340" text-anchor="middle" fill="#7C2530" font-size="16" font-weight="bold">θ̂  (MLE)</text>
  <text x="440" y="358" text-anchor="middle" fill="#7C2530" font-size="12">Maximum of L(θ)</text>

  <!-- Annotation box -->
  <rect x="560" y="80" width="210" height="100" rx="6" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="665" y="105" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Key Idea</text>
  <text x="665" y="128" text-anchor="middle" fill="#2D5A8E" font-size="13">θ̂ = arg max L(θ)</text>
  <text x="665" y="150" text-anchor="middle" fill="#2D5A8E" font-size="13">= arg max Π p(xᵢ | θ)</text>
  <text x="665" y="172" text-anchor="middle" fill="#5C3D1E" font-size="12" font-style="italic">Find θ making data</text>
  <text x="665" y="186" text-anchor="middle" fill="#5C3D1E" font-size="12" font-style="italic">most probable</text>

  <!-- Data points along x-axis -->
  <circle cx="300" cy="310" r="4" fill="#C4A87A"/>
  <circle cx="370" cy="310" r="4" fill="#C4A87A"/>
  <circle cx="420" cy="310" r="4" fill="#C4A87A"/>
  <circle cx="455" cy="310" r="4" fill="#C4A87A"/>
  <circle cx="490" cy="310" r="4" fill="#C4A87A"/>
  <circle cx="530" cy="310" r="4" fill="#C4A87A"/>
  <circle cx="395" cy="310" r="4" fill="#C4A87A"/>
  <text x="415" y="380" text-anchor="middle" fill="#C4A87A" font-size="12">observed data points x₁, x₂, ..., xₙ</text>

  <!-- Arrows showing "wrong" parameter values -->
  <text x="200" y="270" text-anchor="middle" fill="#5C3D1E" font-size="11" font-style="italic">low likelihood</text>
  <text x="640" y="270" text-anchor="middle" fill="#5C3D1E" font-size="11" font-style="italic">low likelihood</text>
  <text x="440" y="58" text-anchor="middle" fill="#7C2530" font-size="12" font-weight="bold">peak = best fit</text>
</svg>