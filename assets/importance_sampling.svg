<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia" font-size="20" fill="#7C2530" font-weight="bold">Importance Sampling: Reweighting from q(x) to p(x)</text>

  <!-- Axes -->
  <line x1="80" y1="310" x2="720" y2="310" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="80" y1="310" x2="80" y2="60" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" font-family="Georgia" font-size="14" fill="#5C3D1E">x</text>
  <text x="60" y="185" text-anchor="middle" font-family="Georgia" font-size="13" fill="#5C3D1E" transform="rotate(-90,60,185)">density</text>

  <!-- Target distribution p(x) — tall, shifted right -->
  <path d="M 120,310 C 160,310 200,305 240,290 C 280,270 320,200 360,120 C 380,90 400,80 420,85 C 440,90 460,120 480,180 C 520,260 560,300 600,308 C 640,310 680,310 700,310" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <!-- Label p(x) -->
  <text x="415" y="72" text-anchor="middle" font-family="Georgia" font-size="15" fill="#7C2530" font-weight="bold">p(x)</text>
  <text x="415" y="88" text-anchor="middle" font-family="Georgia" font-size="11" fill="#7C2530">target</text>

  <!-- Proposal distribution q(x) — wider, shifted left -->
  <path d="M 120,310 C 150,308 180,295 220,260 C 260,220 290,170 320,145 C 340,135 360,132 380,135 C 400,140 430,160 460,195 C 500,240 540,275 580,295 C 620,305 660,310 700,310" fill="none" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- Label q(x) -->
  <text x="325" y="125" text-anchor="middle" font-family="Georgia" font-size="15" fill="#2D5A8E" font-weight="bold">q(x)</text>
  <text x="325" y="141" text-anchor="middle" font-family="Georgia" font-size="11" fill="#2D5A8E">proposal</text>

  <!-- Importance weight bars w = p(x)/q(x) -->
  <!-- Where p>q: tall bars (right side) -->
  <rect x="440" y="235" width="12" height="75" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="460" y="210" width="12" height="100" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="480" y="225" width="12" height="85" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="500" y="250" width="12" height="60" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="520" y="265" width="12" height="45" fill="#C4A87A" opacity="0.7" rx="1"/>

  <!-- Where p≈q: medium bars (center) -->
  <rect x="360" y="270" width="12" height="40" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="380" y="260" width="12" height="50" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="400" y="250" width="12" height="60" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="420" y="245" width="12" height="65" fill="#C4A87A" opacity="0.7" rx="1"/>

  <!-- Where p<q: short bars (left side) -->
  <rect x="220" y="295" width="12" height="15" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="240" y="292" width="12" height="18" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="260" y="288" width="12" height="22" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="280" y="285" width="12" height="25" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="300" y="280" width="12" height="30" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="320" y="276" width="12" height="34" fill="#C4A87A" opacity="0.7" rx="1"/>
  <rect x="340" y="273" width="12" height="37" fill="#C4A87A" opacity="0.7" rx="1"/>

  <!-- Weight label -->
  <text x="465" y="200" text-anchor="middle" font-family="Georgia" font-size="13" fill="#5C3D1E" font-weight="bold">w = p/q</text>
  <text x="465" y="215" text-anchor="middle" font-family="Georgia" font-size="10" fill="#5C3D1E">(large weights)</text>

  <text x="250" y="278" text-anchor="middle" font-family="Georgia" font-size="10" fill="#5C3D1E">w = p/q</text>
  <text x="250" y="290" text-anchor="middle" font-family="Georgia" font-size="9" fill="#5C3D1E">(small)</text>

  <!-- Legend box -->
  <rect x="560" y="55" width="210" height="95" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <line x1="575" y1="78" x2="610" y2="78" stroke="#7C2530" stroke-width="2.5"/>
  <text x="618" y="82" font-family="Georgia" font-size="12" fill="#5C3D1E">p(x) target dist.</text>
  <line x1="575" y1="100" x2="610" y2="100" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="618" y="104" font-family="Georgia" font-size="12" fill="#5C3D1E">q(x) proposal dist.</text>
  <rect x="580" y="115" width="20" height="14" fill="#C4A87A" opacity="0.7" rx="1"/>
  <text x="618" y="127" font-family="Georgia" font-size="12" fill="#5C3D1E">weight w = p/q</text>

  <!-- Bottom annotation -->
  <text x="400" y="370" text-anchor="middle" font-family="Georgia" font-size="13" fill="#5C3D1E" font-style="italic">Samples drawn from q(x) are reweighted by p(x)/q(x) to estimate expectations under p(x)</text>
  <text x="400" y="390" text-anchor="middle" font-family="Georgia" font-size="12" fill="#7C2530">E&#x2080;[f(X)] = E_q[f(X) w(X)]</text>
</svg>