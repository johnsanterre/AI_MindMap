<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="8" ry="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">P vs NP: Complexity Class Relationships</text>
  <text x="400" y="58" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">(assuming P ≠ NP)</text>

  <!-- PSPACE ellipse (outermost) -->
  <ellipse cx="380" cy="220" rx="330" ry="155" fill="none" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="700" y="90" font-family="Georgia, serif" font-size="16" fill="#C4A87A" font-weight="bold">PSPACE</text>

  <!-- NP ellipse -->
  <ellipse cx="350" cy="225" rx="240" ry="125" fill="rgba(45,90,142,0.08)" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="530" y="125" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" font-weight="bold">NP</text>

  <!-- P ellipse (innermost) -->
  <ellipse cx="280" cy="230" rx="140" ry="85" fill="rgba(124,37,48,0.08)" stroke="#7C2530" stroke-width="2.5"/>
  <text x="220" y="195" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">P</text>

  <!-- NP-Complete region (crescent at boundary of NP) -->
  <path d="M 470 145 Q 545 225 470 310 Q 420 280 410 225 Q 400 170 470 145 Z" fill="rgba(92,61,30,0.15)" stroke="#5C3D1E" stroke-width="2"/>
  <text x="465" y="215" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold" text-anchor="middle">NP-</text>
  <text x="465" y="233" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold" text-anchor="middle">Complete</text>

  <!-- NP-Intermediate region label -->
  <text x="365" y="170" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">NP-</text>
  <text x="365" y="184" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">Intermediate</text>

  <!-- Example problems in P -->
  <text x="240" y="225" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Sorting</text>
  <text x="260" y="245" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Shortest Path</text>
  <text x="235" y="265" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Linear Programming</text>
  <text x="300" y="285" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Primality Testing</text>

  <!-- Example problems NP-Complete -->
  <text x="465" y="260" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">SAT</text>
  <text x="465" y="278" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Traveling Salesman</text>
  <text x="465" y="296" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Graph Coloring</text>

  <!-- Arrow showing "If any NPC in P, then P=NP" -->
  <line x1="420" y1="340" x2="350" y2="340" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>
  <text x="500" y="345" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="start">If any NP-Complete</text>
  <text x="500" y="358" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="start">problem is in P → P = NP</text>

  <!-- PSPACE-complete label -->
  <text x="130" y="105" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">TQBF</text>
  <text x="130" y="120" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">(PSPACE-complete)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowBrown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Key insight box -->
  <rect x="60" y="350" rx="4" ry="4" width="240" height="35" fill="#FDFAF4" stroke="#7C2530" stroke-width="1"/>
  <text x="180" y="365" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Millennium Prize Problem</text>
  <text x="180" y="379" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">$1,000,000 — Does P = NP?</text>
</svg>
