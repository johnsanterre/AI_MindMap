<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#7C2530"/>
  <text x="400" y="31" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FDFAF4" text-anchor="middle">NASA Goddard Space Flight Center</text>

  <!-- Panel dividers -->
  <line x1="260" y1="48" x2="260" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="540" y1="48" x2="540" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- LEFT PANEL: Identity Facts -->
  <text x="130" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">CENTER PROFILE</text>
  <line x1="20" y1="80" x2="240" y2="80" stroke="#C4A87A" stroke-width="1"/>

  <rect x="20" y="90" width="220" height="34" rx="4" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="130" y="104" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Founded</text>
  <text x="130" y="118" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle" font-weight="bold">1959</text>

  <rect x="20" y="132" width="220" height="34" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="130" y="146" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Location</text>
  <text x="130" y="160" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Greenbelt, Maryland · near DC</text>

  <rect x="20" y="174" width="220" height="34" rx="4" fill="#5C3D1E" opacity="0.10" stroke="#5C3D1E" stroke-width="1"/>
  <text x="130" y="188" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Named after</text>
  <text x="130" y="202" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Robert Goddard (rocket pioneer)</text>

  <rect x="20" y="216" width="220" height="34" rx="4" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="130" y="230" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Workforce</text>
  <text x="130" y="244" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">~10,000 employees</text>

  <rect x="20" y="258" width="220" height="34" rx="4" fill="#C4A87A" opacity="0.20" stroke="#C4A87A" stroke-width="1"/>
  <text x="130" y="272" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Scale</text>
  <text x="130" y="286" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">NASA's largest research center</text>

  <rect x="20" y="300" width="220" height="50" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="130" y="315" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Primary Focus Areas</text>
  <text x="130" y="330" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Earth Science · Astrophysics</text>
  <text x="130" y="344" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">JWST &amp; Hubble Operations</text>

  <!-- CENTER PANEL: Two-column Earth + Space AI -->
  <text x="400" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">EARTH + SPACE AI</text>
  <line x1="270" y1="80" x2="530" y2="80" stroke="#C4A87A" stroke-width="1"/>

  <!-- Sub-headers -->
  <rect x="275" y="88" width="118" height="22" rx="3" fill="#5C3D1E" opacity="0.80"/>
  <text x="334" y="103" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Earth Science</text>

  <rect x="401" y="88" width="122" height="22" rx="3" fill="#7C2530" opacity="0.80"/>
  <text x="462" y="103" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Astrophysics</text>

  <!-- Earth Science column -->
  <rect x="275" y="118" width="118" height="32" rx="3" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1"/>
  <text x="334" y="131" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Land Use &amp;</text>
  <text x="334" y="143" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Deforestation (Landsat)</text>

  <rect x="275" y="158" width="118" height="32" rx="3" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1"/>
  <text x="334" y="171" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Hurricane Track</text>
  <text x="334" y="183" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Prediction (ML)</text>

  <rect x="275" y="198" width="118" height="32" rx="3" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1"/>
  <text x="334" y="211" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Ocean Surface</text>
  <text x="334" y="223" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Wind (satellite ML)</text>

  <rect x="275" y="238" width="118" height="32" rx="3" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1"/>
  <text x="334" y="251" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Climate Modeling</text>
  <text x="334" y="263" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">EOSDIS data archive</text>

  <!-- Astrophysics column -->
  <rect x="401" y="118" width="122" height="32" rx="3" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="462" y="131" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">JWST Image</text>
  <text x="462" y="143" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Processing &amp; denoising</text>

  <rect x="401" y="158" width="122" height="32" rx="3" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="462" y="171" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Exoplanet Detection</text>
  <text x="462" y="183" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">TESS light curve ML</text>

  <rect x="401" y="198" width="122" height="32" rx="3" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="462" y="211" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Space Weather</text>
  <text x="462" y="223" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Solar flare / CME prediction</text>

  <rect x="401" y="238" width="122" height="32" rx="3" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="462" y="251" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Source Detection</text>
  <text x="462" y="263" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Hubble archive mining</text>

  <!-- Data volume callout -->
  <rect x="275" y="282" width="248" height="46" rx="4" fill="#2D5A8E" opacity="0.85"/>
  <text x="399" y="298" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Data at Scale</text>
  <text x="399" y="313" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">JWST: 57 GB/day · Earth obs: petabytes/yr</text>
  <text x="399" y="325" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">ML essential for processing at this scale</text>

  <!-- RIGHT PANEL: Key Missions -->
  <text x="670" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">KEY MISSIONS</text>
  <line x1="550" y1="80" x2="790" y2="80" stroke="#C4A87A" stroke-width="1"/>

  <!-- Mission cards -->
  <rect x="555" y="90" width="230" height="46" rx="4" fill="#7C2530" opacity="0.80"/>
  <text x="670" y="107" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">James Webb Space Telescope</text>
  <text x="670" y="121" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Image ML · deconvolution · source detection</text>
  <text x="670" y="131" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">57 GB/day data · Goddard operations</text>

  <rect x="555" y="144" width="230" height="40" rx="4" fill="#2D5A8E" opacity="0.80"/>
  <text x="670" y="160" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Hubble Space Telescope</text>
  <text x="670" y="175" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Archive mining · noise reduction</text>

  <rect x="555" y="192" width="230" height="40" rx="4" fill="#5C3D1E" opacity="0.80"/>
  <text x="670" y="208" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">TESS</text>
  <text x="670" y="223" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Exoplanet ML via light curve analysis</text>

  <rect x="555" y="240" width="110" height="40" rx="4" fill="#C4A87A" opacity="0.80"/>
  <text x="610" y="256" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Landsat Series</text>
  <text x="610" y="271" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Earth surface ML</text>

  <rect x="675" y="240" width="110" height="40" rx="4" fill="#C4A87A" opacity="0.60"/>
  <text x="730" y="256" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">GRACE / GPM</text>
  <text x="730" y="271" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Gravity &amp; precipitation</text>

  <!-- Interop note -->
  <rect x="555" y="290" width="230" height="46" rx="4" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="670" y="306" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Data Interoperability</text>
  <text x="670" y="320" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">EOSDIS archive · NOAA · ESA</text>
  <text x="670" y="332" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">AstroPy + ML integration toolchain</text>
</svg>
