<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-size="17" font-weight="bold" fill="#7C2530" text-anchor="middle">Reward Hacking — Goodhart's Law in RL</text>

  <!-- ===== LEFT SIDE: Intended Optimization ===== -->
  <rect x="30" y="52" width="340" height="22" rx="3" fill="#2D5A8E"/>
  <text x="200" y="67" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Intended Optimization</text>

  <!-- Agent box -->
  <rect x="50" y="90" width="120" height="50" rx="6" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="110" y="113" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Agent</text>
  <text x="110" y="128" font-size="9.5" fill="#5C3D1E" text-anchor="middle">policy π(a|s)</text>

  <!-- Arrow Agent → Task -->
  <line x1="170" y1="115" x2="218" y2="115" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Task box -->
  <rect x="220" y="90" width="130" height="50" rx="6" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="285" y="113" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Intended Task</text>
  <text x="285" y="128" font-size="9.5" fill="#5C3D1E" text-anchor="middle">solve the real problem</text>

  <!-- Reward Model box -->
  <rect x="130" y="165" width="150" height="45" rx="6" fill="#F0EBE0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="205" y="184" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Reward Model R(s,a)</text>
  <text x="205" y="199" font-size="9.5" fill="#5C3D1E" text-anchor="middle">proxy for human intent</text>

  <!-- Arrow Task → Reward (aligned) -->
  <line x1="285" y1="140" x2="260" y2="165" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Arrow Reward → Agent (feedback) -->
  <line x1="130" y1="187" x2="110" y2="140" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="85" y="168" font-size="9" fill="#2D5A8E">reward</text>

  <!-- Checkmark -->
  <text x="200" y="240" font-size="14" fill="#2D5A8E" text-anchor="middle" font-style="italic">Proxy ≈ True objective</text>

  <!-- ===== RIGHT SIDE: Reward Hacking ===== -->
  <rect x="430" y="52" width="340" height="22" rx="3" fill="#7C2530"/>
  <text x="600" y="67" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Reward Hacking (Goodhart's Law)</text>

  <!-- Agent box (hacking) -->
  <rect x="450" y="90" width="120" height="50" rx="6" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="510" y="113" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Agent</text>
  <text x="510" y="128" font-size="9.5" fill="#5C3D1E" text-anchor="middle">exploits proxy</text>

  <!-- Bypass arrow (agent skips task) -->
  <path d="M 570 105 Q 640 80 700 105" fill="none" stroke="#7C2530" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="640" y="78" font-size="9" fill="#7C2530" text-anchor="middle">bypasses task</text>

  <!-- Task box (neglected) -->
  <rect x="620" y="90" width="130" height="50" rx="6" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5" opacity="0.5"/>
  <text x="685" y="113" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle" opacity="0.5">Intended Task</text>
  <text x="685" y="128" font-size="9.5" fill="#5C3D1E" text-anchor="middle" opacity="0.5">ignored</text>

  <!-- Reward Model box (hacked) -->
  <rect x="530" y="165" width="150" height="45" rx="6" fill="#F0EBE0" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="605" y="184" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Reward Model R(s,a)</text>
  <text x="605" y="199" font-size="9.5" fill="#7C2530" text-anchor="middle">flawed proxy exploited</text>

  <!-- Arrow Agent directly to Reward (shortcut) -->
  <line x1="510" y1="140" x2="555" y2="165" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Arrow Reward → Agent (high reward) -->
  <line x1="530" y1="187" x2="510" y2="140" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="485" y="168" font-size="9" fill="#7C2530">high reward!</text>

  <!-- X mark -->
  <text x="600" y="240" font-size="14" fill="#7C2530" text-anchor="middle" font-style="italic">Proxy ≠ True objective</text>

  <!-- ===== BOTTOM: Goodhart's Law ===== -->
  <rect x="100" y="268" width="600" height="55" rx="8" fill="#FFF8E7" stroke="#C4A87A" stroke-width="2"/>
  <text x="400" y="290" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Goodhart's Law</text>
  <text x="400" y="310" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">"When a measure becomes a target, it ceases to be a good measure."</text>

  <!-- Examples bar -->
  <text x="140" y="350" font-size="10" fill="#7C2530">Verbose padding</text>
  <text x="310" y="350" font-size="10" fill="#7C2530">Sycophantic flattery</text>
  <text x="490" y="350" font-size="10" fill="#7C2530">Gibberish exploits</text>
  <text x="660" y="350" font-size="10" fill="#7C2530">Gaming benchmarks</text>

  <text x="400" y="375" font-size="9.5" fill="#5C3D1E" text-anchor="middle">Common reward hacking patterns in language models</text>

  <!-- Divider line -->
  <line x1="400" y1="52" x2="400" y2="250" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>