<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">PointNet: From Unordered Point Sets to Global Features</text>

  <!-- Left: Raw 3D Point Cloud -->
  <text x="120" y="68" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Raw Point Cloud</text>
  <text x="120" y="84" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">{(x, y, z)} unordered</text>

  <!-- Scattered points forming a car-like shape -->
  <circle cx="70" cy="180" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="85" cy="165" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="95" cy="195" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="105" cy="155" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="110" cy="180" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="120" cy="200" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="125" cy="160" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="135" cy="175" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="140" cy="195" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="150" cy="165" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="155" cy="185" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="165" cy="175" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="80" cy="200" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="160" cy="155" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="100" cy="175" r="4" fill="#2D5A8E" opacity="0.8"/>
  <circle cx="145" cy="145" r="4" fill="#2D5A8E" opacity="0.8"/>

  <!-- N x 3 label -->
  <text x="120" y="230" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">N x 3 matrix</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="180" x2="230" y2="180" stroke="#888" stroke-width="1.5"/>
  <polygon points="227,176 235,180 227,184" fill="#888"/>

  <!-- Middle: Per-point MLP (shared weights) -->
  <text x="320" y="68" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">Per-Point MLP</text>
  <text x="320" y="84" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">(shared weights)</text>

  <!-- MLP block -->
  <rect x="240" y="110" width="160" height="140" rx="6" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Individual point processing arrows -->
  <rect x="260" y="125" width="120" height="22" rx="3" fill="#F5E6E8" stroke="#7C2530" stroke-width="1"/>
  <text x="320" y="140" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">h(x1) = MLP(x1)</text>

  <rect x="260" y="155" width="120" height="22" rx="3" fill="#F5E6E8" stroke="#7C2530" stroke-width="1"/>
  <text x="320" y="170" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">h(x2) = MLP(x2)</text>

  <rect x="260" y="185" width="120" height="22" rx="3" fill="#F5E6E8" stroke="#7C2530" stroke-width="1"/>
  <text x="320" y="200" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">h(x3) = MLP(x3)</text>

  <text x="320" y="228" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle">...</text>

  <text x="320" y="268" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">N x 1024 features</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="180" x2="445" y2="180" stroke="#888" stroke-width="1.5"/>
  <polygon points="442,176 450,180 442,184" fill="#888"/>

  <!-- Symmetric aggregation (max pool) -->
  <text x="530" y="68" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Symmetric Function</text>
  <text x="530" y="84" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">(order-invariant)</text>

  <rect x="455" y="130" width="150" height="100" rx="6" fill="#FFF5E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="530" y="160" font-family="Georgia,serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-weight="bold">MAX POOL</text>
  <text x="530" y="180" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">across N points</text>
  <text x="530" y="200" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">element-wise max</text>

  <text x="530" y="250" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">1 x 1024 global</text>

  <!-- Arrow 3 -->
  <line x1="610" y1="180" x2="650" y2="180" stroke="#888" stroke-width="1.5"/>
  <polygon points="647,176 655,180 647,184" fill="#888"/>

  <!-- Output: Classification / Segmentation -->
  <rect x="655" y="120" width="115" height="55" rx="6" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="712" y="142" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Classification</text>
  <text x="712" y="158" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">k class scores</text>

  <rect x="655" y="190" width="115" height="55" rx="6" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="712" y="212" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Segmentation</text>
  <text x="712" y="228" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">N per-point labels</text>

  <!-- Key insight callout -->
  <rect x="100" y="290" width="600" height="70" rx="8" fill="#FDF8F0" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="312" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Key Insight: Permutation Invariance</text>
  <text x="400" y="330" font-family="Georgia,serif" font-size="10" fill="#2C2C2C" text-anchor="middle">f({x1, x2, ..., xN}) = g( MAX( h(x1), h(x2), ..., h(xN) ) )</text>
  <text x="400" y="348" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">Any permutation of input points produces the same output</text>
</svg>