<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="34" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Flash Attention: IO-Aware Attention Computation</text>

  <!-- ===== LEFT PANEL: Standard Attention ===== -->
  <rect x="20" y="50" width="360" height="330" fill="#F5EFE4" rx="6" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="200" y="74" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530" text-anchor="middle">Standard Attention</text>

  <!-- HBM label -->
  <rect x="36" y="85" width="328" height="280" fill="#E8DFC8" rx="4" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="200" y="103" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">HBM (High Bandwidth Memory) — 80 GB, SLOW</text>

  <!-- Q, K, V matrices -->
  <rect x="52" y="112" width="60" height="50" fill="#2D5A8E" rx="3" opacity="0.85"/>
  <text x="82" y="142" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Q</text>

  <rect x="130" y="112" width="60" height="50" fill="#2D5A8E" rx="3" opacity="0.85"/>
  <text x="160" y="142" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">K</text>

  <rect x="208" y="112" width="60" height="50" fill="#2D5A8E" rx="3" opacity="0.85"/>
  <text x="238" y="142" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">V</text>

  <text x="82" y="174" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">N×d</text>
  <text x="160" y="174" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">N×d</text>
  <text x="238" y="174" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">N×d</text>

  <!-- Arrow down -->
  <line x1="200" y1="178" x2="200" y2="196" stroke="#7C2530" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- N×N attention matrix -->
  <rect x="90" y="198" width="110" height="80" fill="#7C2530" rx="3" opacity="0.80"/>
  <text x="145" y="233" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">S = QKᵀ</text>
  <text x="145" y="252" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">N × N matrix</text>
  <text x="145" y="268" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">(fully materialized)</text>

  <!-- Bottleneck label -->
  <rect x="52" y="288" width="296" height="34" fill="#7C2530" rx="4" opacity="0.15"/>
  <text x="200" y="307" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">⚠ Bottleneck: O(N²) reads/writes to HBM</text>

  <!-- Repeated read/write arrows -->
  <path d="M 90 238 C 60 238 52 195 82 185" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <path d="M 200 278 C 200 310 290 310 310 278" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="56" y="218" font-family="Georgia, serif" font-size="9" fill="#7C2530">read</text>
  <text x="270" y="308" font-family="Georgia, serif" font-size="9" fill="#7C2530">write back</text>

  <!-- Output -->
  <rect x="130" y="332" width="60" height="36" fill="#5C3D1E" rx="3" opacity="0.80"/>
  <text x="160" y="355" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">O</text>
  <line x1="160" y1="280" x2="160" y2="330" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowBrown)"/>

  <!-- ===== RIGHT PANEL: Flash Attention ===== -->
  <rect x="420" y="50" width="360" height="330" fill="#F5EFE4" rx="6" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="600" y="74" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Flash Attention</text>

  <!-- HBM on right -->
  <rect x="436" y="85" width="328" height="160" fill="#E8DFC8" rx="4" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="103" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">HBM — Q, K, V stored (80 GB)</text>

  <!-- Q K V blocks in HBM right -->
  <rect x="452" y="110" width="44" height="36" fill="#2D5A8E" rx="2" opacity="0.75"/>
  <text x="474" y="132" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Q</text>
  <rect x="506" y="110" width="44" height="36" fill="#2D5A8E" rx="2" opacity="0.75"/>
  <text x="528" y="132" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">K</text>
  <rect x="560" y="110" width="44" height="36" fill="#2D5A8E" rx="2" opacity="0.75"/>
  <text x="582" y="132" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">V</text>

  <!-- Thin arrows up from HBM to SRAM -->
  <line x1="530" y1="206" x2="530" y2="248" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
  <text x="548" y="232" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">tile</text>

  <!-- HBM output row -->
  <text x="600" y="168" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Loaded tile-by-tile into SRAM →</text>
  <rect x="452" y="175" width="296" height="22" fill="#C4A87A" rx="2" opacity="0.40"/>
  <text x="600" y="191" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Output O written back in tiles (no N×N matrix)</text>

  <!-- SRAM box -->
  <rect x="436" y="258" width="328" height="106" fill="#D8ECD4" rx="4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="600" y="276" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">SRAM (Fast On-Chip) — ~20 MB</text>

  <!-- Tiling grid inside SRAM -->
  <rect x="452" y="284" width="36" height="30" fill="#2D5A8E" rx="2" opacity="0.80"/>
  <text x="470" y="303" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">tile</text>
  <rect x="492" y="284" width="36" height="30" fill="#2D5A8E" rx="2" opacity="0.55"/>
  <text x="510" y="303" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">tile</text>
  <rect x="532" y="284" width="36" height="30" fill="#2D5A8E" rx="2" opacity="0.30"/>
  <text x="550" y="303" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">…</text>

  <rect x="452" y="318" width="36" height="30" fill="#7C2530" rx="2" opacity="0.55"/>
  <text x="470" y="337" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">tile</text>
  <rect x="492" y="318" width="36" height="30" fill="#7C2530" rx="2" opacity="0.30"/>
  <text x="510" y="337" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">…</text>

  <text x="600" y="304" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="start">Compute softmax</text>
  <text x="600" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="start">tile-by-tile (online)</text>
  <text x="600" y="332" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="start">O(N) memory</text>
  <text x="600" y="346" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="start">2–4× faster</text>

  <!-- Divider line between panels -->
  <line x1="400" y1="55" x2="400" y2="375" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Footer note -->
  <text x="400" y="393" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">IO complexity: O(N²/M) reads vs O(N²) standard — where M = SRAM size (Dao et al. 2022)</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowBrown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>
