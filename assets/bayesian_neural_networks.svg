<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Bayesian Neural Networks</text>
  <text x="400" y="56" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">Distributions over weights instead of point estimates</text>

  <!-- Left: Standard NN -->
  <text x="185" y="90" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#7C2530" text-anchor="middle">Standard NN</text>
  <text x="185" y="108" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Point Estimate: w = 2.4</text>

  <!-- Standard NN nodes - input layer -->
  <circle cx="110" cy="165" r="14" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="110" cy="215" r="14" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="1.5"/>

  <!-- Standard NN nodes - hidden layer -->
  <circle cx="185" cy="150" r="14" fill="#7C2530" opacity="0.3" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="185" cy="190" r="14" fill="#7C2530" opacity="0.3" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="185" cy="230" r="14" fill="#7C2530" opacity="0.3" stroke="#7C2530" stroke-width="1.5"/>

  <!-- Standard NN nodes - output -->
  <circle cx="260" cy="190" r="14" fill="#7C2530" opacity="0.4" stroke="#7C2530" stroke-width="2"/>

  <!-- Standard NN connections (single lines = fixed weights) -->
  <line x1="124" y1="165" x2="171" y2="150" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="124" y1="165" x2="171" y2="190" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="124" y1="165" x2="171" y2="230" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="124" y1="215" x2="171" y2="150" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="124" y1="215" x2="171" y2="190" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="124" y1="215" x2="171" y2="230" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="199" y1="150" x2="246" y2="190" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="199" y1="190" x2="246" y2="190" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="199" y1="230" x2="246" y2="190" stroke="#7C2530" stroke-width="1.5"/>

  <!-- Single prediction arrow -->
  <line x1="274" y1="190" x2="310" y2="190" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="325" y="194" font-family="Georgia, serif" font-size="11" fill="#7C2530">y = 3.7</text>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="290" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Right: Bayesian NN -->
  <text x="610" y="90" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Bayesian NN</text>
  <text x="610" y="108" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Distribution: p(w|D)</text>

  <!-- BNN nodes - input layer -->
  <circle cx="535" cy="165" r="14" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1.5"/>
  <circle cx="535" cy="215" r="14" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- BNN nodes - hidden layer (with "fuzzy" double rings for uncertainty) -->
  <circle cx="610" cy="150" r="18" fill="none" stroke="#2D5A8E" stroke-width="1" opacity="0.3"/>
  <circle cx="610" cy="150" r="14" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <circle cx="610" cy="190" r="18" fill="none" stroke="#2D5A8E" stroke-width="1" opacity="0.3"/>
  <circle cx="610" cy="190" r="14" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <circle cx="610" cy="230" r="18" fill="none" stroke="#2D5A8E" stroke-width="1" opacity="0.3"/>
  <circle cx="610" cy="230" r="14" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- BNN nodes - output (with uncertainty ring) -->
  <circle cx="685" cy="190" r="18" fill="none" stroke="#2D5A8E" stroke-width="1" opacity="0.3"/>
  <circle cx="685" cy="190" r="14" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="2"/>

  <!-- BNN connections (triple lines = weight distributions) -->
  <line x1="549" y1="163" x2="593" y2="150" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="549" y1="165" x2="596" y2="150" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="549" y1="167" x2="593" y2="152" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>

  <line x1="549" y1="165" x2="596" y2="190" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="549" y1="167" x2="596" y2="192" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>
  <line x1="549" y1="163" x2="596" y2="188" stroke="#2D5A8E" stroke-width="1" opacity="0.4"/>

  <line x1="549" y1="215" x2="596" y2="190" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="549" y1="215" x2="596" y2="150" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="549" y1="215" x2="596" y2="230" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="549" y1="165" x2="596" y2="230" stroke="#2D5A8E" stroke-width="1.5"/>

  <line x1="624" y1="150" x2="671" y2="190" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="624" y1="190" x2="671" y2="190" stroke="#2D5A8E" stroke-width="1.5"/>
  <line x1="624" y1="230" x2="671" y2="190" stroke="#2D5A8E" stroke-width="1.5"/>

  <!-- Multiple prediction arrows (fan-out for uncertainty) -->
  <line x1="699" y1="183" x2="735" y2="170" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="699" y1="190" x2="735" y2="190" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="699" y1="197" x2="735" y2="210" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="752" y="174" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">3.2</text>
  <text x="752" y="194" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">3.7</text>
  <text x="752" y="214" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">4.1</text>

  <!-- Bottom section: Gaussian curves -->
  <text x="200" y="320" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Weight Distribution p(w|D)</text>

  <!-- Gaussian bell curve -->
  <path d="M 100 380 Q 120 378, 135 370 Q 155 350, 170 330 Q 185 310, 200 305 Q 215 310, 230 330 Q 245 350, 265 370 Q 280 378, 300 380" fill="#C4A87A" opacity="0.3" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="200" y1="305" x2="200" y2="380" stroke="#5C3D1E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="394" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">mean</text>

  <!-- Predictive uncertainty fan -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Predictive Uncertainty</text>

  <!-- Confidence band visualization -->
  <path d="M 470 375 Q 520 360, 560 350 Q 600 345, 640 355 Q 680 365, 730 370" fill="none" stroke="#2D5A8E" stroke-width="2.5"/>
  <path d="M 470 375 Q 520 350, 560 335 Q 600 325, 640 340 Q 680 355, 730 365" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M 470 375 Q 520 370, 560 365 Q 600 365, 640 370 Q 680 375, 730 375" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="398" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">mean prediction +/- uncertainty band</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#7C2530"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>