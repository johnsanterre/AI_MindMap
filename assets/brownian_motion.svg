<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Brownian Motion: Sample Paths and Applications</text>

  <!-- LEFT PANEL: Sample paths of 1D Brownian motion -->
  <!-- Panel background -->
  <rect x="20" y="48" width="460" height="310" rx="6" fill="#FAF7EF" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="250" y="70" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#5C3D1E" text-anchor="middle">1D Brownian Motion: W(t)</text>

  <!-- Axes -->
  <!-- x-axis -->
  <line x1="55" y1="250" x2="455" y2="250" stroke="#9B8C70" stroke-width="1.5"/>
  <!-- y-axis -->
  <line x1="55" y1="90" x2="55" y2="310" stroke="#9B8C70" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="460" y="254" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">t</text>
  <text x="38" y="94" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">W</text>
  <text x="55" y="268" font-family="Georgia, serif" font-size="10" fill="#9B8C70" text-anchor="middle">0</text>
  <text x="255" y="268" font-family="Georgia, serif" font-size="10" fill="#9B8C70" text-anchor="middle">T/2</text>
  <text x="455" y="268" font-family="Georgia, serif" font-size="10" fill="#9B8C70" text-anchor="middle">T</text>

  <!-- √t envelope bands (±1σ and ±2σ shading) -->
  <!-- Outer ±2σ band: at T=400px wide, σ=√400*scale ≈ 60px -->
  <path d="M55,250
    C100,250 150,220 200,215 250,210 300,185 355,178 400,170 455,162 455,162
    L455,338
    C400,330 355,322 300,315 250,290 200,285 150,280 100,280 55,250Z"
    fill="#D4C5A9" fill-opacity="0.25" stroke="none"/>
  <!-- Inner ±1σ band -->
  <path d="M55,250
    C100,250 150,232 200,228 250,224 300,210 355,205 400,200 455,196 455,196
    L455,304
    C400,300 355,295 300,290 250,276 200,272 150,268 100,268 55,250Z"
    fill="#C4A87A" fill-opacity="0.22" stroke="none"/>

  <!-- Envelope boundary lines (√t) -->
  <path d="M55,250 C150,244 250,224 355,205 455,196 455,196"
    fill="none" stroke="#C4A87A" stroke-width="1.4" stroke-dasharray="5,4"/>
  <path d="M55,250 C150,256 250,276 355,295 455,304 455,304"
    fill="none" stroke="#C4A87A" stroke-width="1.4" stroke-dasharray="5,4"/>

  <!-- Envelope label -->
  <text x="390" y="188" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#C4A87A">+√t</text>
  <text x="390" y="312" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#C4A87A">−√t</text>

  <!-- Sample path 1: deep red — jagged upward-trending path -->
  <polyline
    points="55,250 68,243 80,251 92,238 105,229 118,237 130,222 143,230 156,218 168,225 180,211 193,220 205,208 218,215 230,203 243,211 255,198 268,207 280,194 293,200 305,188 318,196 330,182 343,191 355,177 368,185 380,171 393,179 405,164 418,173 430,159 443,167 455,155"
    fill="none" stroke="#7C2530" stroke-width="2" stroke-linejoin="round"/>

  <!-- Sample path 2: navy — jagged downward-trending path -->
  <polyline
    points="55,250 68,257 80,248 92,260 105,270 118,262 130,275 143,266 156,278 168,271 180,283 193,274 205,287 218,278 230,292 243,283 255,296 268,286 280,299 293,290 305,304 318,294 330,307 343,297 355,311 368,301 380,314 393,305 405,319 418,309 430,323 443,313 455,327"
    fill="none" stroke="#2D5A8E" stroke-width="2" stroke-linejoin="round"/>

  <!-- Sample path 3: warm brown — oscillating path staying near center -->
  <polyline
    points="55,250 68,244 80,255 92,247 105,257 118,249 130,259 143,251 156,261 168,252 180,263 193,254 205,265 218,257 230,248 243,258 255,249 268,240 280,250 293,242 305,252 318,244 330,254 343,246 355,257 368,249 380,260 393,252 405,242 418,252 430,243 443,253 455,245"
    fill="none" stroke="#5C3D1E" stroke-width="1.6" stroke-linejoin="round" stroke-dasharray="none"/>

  <!-- Legend for paths -->
  <line x1="65" y1="293" x2="95" y2="293" stroke="#7C2530" stroke-width="2"/>
  <text x="100" y="297" font-family="Georgia, serif" font-size="10" fill="#7C2530">Path 1</text>
  <line x1="145" y1="293" x2="175" y2="293" stroke="#2D5A8E" stroke-width="2"/>
  <text x="180" y="297" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Path 2</text>
  <line x1="225" y1="293" x2="255" y2="293" stroke="#5C3D1E" stroke-width="1.6"/>
  <text x="260" y="297" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Path 3</text>
  <rect x="305" y="286" width="20" height="10" fill="#C4A87A" fill-opacity="0.5" stroke="none"/>
  <text x="330" y="297" font-family="Georgia, serif" font-size="10" fill="#9B8C70">±√t band</text>

  <!-- Key formula below axis -->
  <text x="250" y="335" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">W(t)−W(s) ~ N(0, t−s)   |   [W,W]_t = t</text>
  <text x="250" y="350" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#9B8C70" text-anchor="middle">continuous, independent increments, nowhere differentiable</text>

  <!-- RIGHT PANEL: Applications hub -->
  <rect x="498" y="48" width="282" height="310" rx="6" fill="#FAF7EF" stroke="#D4C5A9" stroke-width="1.2"/>
  <text x="639" y="70" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#5C3D1E" text-anchor="middle">Applications</text>

  <!-- Central hub circle -->
  <circle cx="639" cy="200" r="42" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="639" y="196" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Brownian</text>
  <text x="639" y="212" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Motion</text>

  <!-- Spoke: Diffusion Models (top) -->
  <line x1="639" y1="158" x2="639" y2="113" stroke="#7C2530" stroke-width="1.8"/>
  <rect x="585" y="90" width="108" height="26" rx="5" fill="#7C2530" stroke="none"/>
  <text x="639" y="108" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Diffusion Models</text>

  <!-- Spoke: Financial Math (right) -->
  <line x1="681" y1="200" x2="730" y2="200" stroke="#2D5A8E" stroke-width="1.8"/>
  <rect x="727" y="188" width="44" height="26" rx="5" fill="#2D5A8E" stroke="none"/>
  <text x="749" y="200" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Financial</text>
  <text x="749" y="212" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Math</text>

  <!-- Spoke: Langevin Dynamics (bottom-right) -->
  <line x1="668" y1="235" x2="706" y2="268" stroke="#C4A87A" stroke-width="1.8"/>
  <rect x="665" y="265" width="114" height="26" rx="5" fill="#C4A87A" stroke="none"/>
  <text x="722" y="283" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Langevin Dynamics</text>

  <!-- Spoke: Neural SDEs (bottom-left) -->
  <line x1="610" y1="235" x2="572" y2="268" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="4,3"/>
  <rect x="512" y="265" width="90" height="26" rx="5" fill="#FAF7EF" stroke="#7C2530" stroke-width="1.5"/>
  <text x="557" y="283" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Neural SDEs</text>

  <!-- Spoke: MCMC (left) -->
  <line x1="597" y1="200" x2="548" y2="200" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="4,3"/>
  <rect x="508" y="188" width="44" height="26" rx="5" fill="#FAF7EF" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="530" y="204" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">MCMC</text>

  <!-- Key property text at bottom of right panel -->
  <text x="639" y="326" font-family="Georgia, serif" font-size="10" fill="#9B8C70" text-anchor="middle">Ito: df = f'dW + ½f''dt</text>
  <text x="639" y="342" font-family="Georgia, serif" font-size="10" fill="#9B8C70" text-anchor="middle">Wiener 1923 · Einstein 1905 · Bachelier 1900</text>

  <!-- Bottom caption -->
  <text x="400" y="386" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#9B8C70" text-anchor="middle">The canonical continuous-time random process: continuous paths, nowhere differentiable, variance linear in time</text>
</svg>
