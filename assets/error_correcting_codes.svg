<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Error Correcting Codes: Encoding, Transmission, and Recovery</text>

  <!-- ===== LEFT PANEL: Hamming code parity structure ===== -->
  <text x="200" y="62" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">Hamming(7,4) Code Structure</text>

  <!-- 7 data circles in a row -->
  <!-- Positions: d1=p1, d2=p2, d3=m1, d4=p3, d5=m2, d6=m3, d7=m4 -->
  <!-- p = parity, m = message -->
  <circle cx="65" cy="130" r="22" fill="#7C2530" fill-opacity="0.85"/>
  <text x="65" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">p1</text>
  <text x="65" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 1</text>

  <circle cx="115" cy="130" r="22" fill="#7C2530" fill-opacity="0.85"/>
  <text x="115" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">p2</text>
  <text x="115" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 2</text>

  <circle cx="165" cy="130" r="22" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="165" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">m1</text>
  <text x="165" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 3</text>

  <circle cx="215" cy="130" r="22" fill="#7C2530" fill-opacity="0.85"/>
  <text x="215" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">p3</text>
  <text x="215" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 4</text>

  <circle cx="265" cy="130" r="22" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="265" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">m2</text>
  <text x="265" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 5</text>

  <circle cx="315" cy="130" r="22" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="315" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">m3</text>
  <text x="315" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 6</text>

  <circle cx="365" cy="130" r="22" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="365" y="127" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">m4</text>
  <text x="365" y="141" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">bit 7</text>

  <!-- Parity check groupings -->
  <!-- p1 checks bits 1,3,5,7 -->
  <rect x="42" y="168" width="346" height="28" rx="4" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="50" y="186" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">p1 checks:</text>
  <text x="118" y="186" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">bits 1, 3, 5, 7</text>

  <!-- p2 checks bits 2,3,6,7 -->
  <rect x="42" y="200" width="346" height="28" rx="4" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="50" y="218" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">p2 checks:</text>
  <text x="118" y="218" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">bits 2, 3, 6, 7</text>

  <!-- p3 checks bits 4,5,6,7 -->
  <rect x="42" y="232" width="346" height="28" rx="4" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="50" y="250" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">p3 checks:</text>
  <text x="118" y="250" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">bits 4, 5, 6, 7</text>

  <!-- Syndrome annotation -->
  <rect x="42" y="272" width="346" height="36" rx="4" fill="#C4A87A" fill-opacity="0.20" stroke="#C4A87A" stroke-width="1"/>
  <text x="215" y="286" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Syndrome = (s1, s2, s3) points to error bit</text>
  <text x="215" y="300" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">4 data bits + 3 parity bits = 7-bit codeword</text>

  <!-- Legend -->
  <circle cx="80" cy="335" r="8" fill="#7C2530" fill-opacity="0.85"/>
  <text x="93" y="339" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Parity bits</text>
  <circle cx="175" cy="335" r="8" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="188" y="339" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Message bits</text>

  <!-- ===== RIGHT PANEL: Transmission pipeline ===== -->
  <!-- Divider -->
  <line x1="415" y1="50" x2="415" y2="375" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="5,4"/>

  <text x="610" y="62" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">Encode, Transmit, Decode</text>

  <!-- Step 1: Message -->
  <rect x="445" y="85" width="130" height="44" rx="6" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="510" y="103" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Message</text>
  <text x="510" y="119" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">1 0 1 1</text>

  <!-- Arrow down -->
  <line x1="510" y1="129" x2="510" y2="155" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="510,162 505,155 515,155" fill="#5C3D1E"/>
  <text x="540" y="150" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Encode</text>

  <!-- Step 2: Codeword -->
  <rect x="435" y="165" width="150" height="44" rx="6" fill="#5C3D1E" fill-opacity="0.85"/>
  <text x="510" y="183" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Codeword</text>
  <text x="510" y="199" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">0 1 1 0 1 0 1</text>

  <!-- Arrow down with noise -->
  <line x1="510" y1="209" x2="510" y2="235" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="510,242 505,235 515,235" fill="#5C3D1E"/>
  <text x="545" y="227" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">+ Noise</text>

  <!-- Step 3: Received (with error) -->
  <rect x="435" y="245" width="150" height="44" rx="6" fill="#7C2530" fill-opacity="0.85"/>
  <text x="510" y="263" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Received</text>
  <text x="510" y="279" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">0 1 1 0 0 0 1</text>

  <!-- Error marker on bit 5 -->
  <text x="503" y="298" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">^error</text>

  <!-- Arrow down -->
  <line x1="510" y1="289" x2="510" y2="315" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="510,322 505,315 515,315" fill="#5C3D1E"/>
  <text x="545" y="310" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Decode</text>

  <!-- Step 4: Corrected -->
  <rect x="445" y="325" width="130" height="44" rx="6" fill="#2D5A8E" fill-opacity="0.85"/>
  <text x="510" y="343" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Corrected</text>
  <text x="510" y="359" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">1 0 1 1</text>

  <!-- Right side: key parameters -->
  <rect x="620" y="100" width="160" height="160" rx="6" fill="#C4A87A" fill-opacity="0.15" stroke="#C4A87A" stroke-width="1"/>
  <text x="700" y="120" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Key Parameters</text>
  <text x="635" y="143" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">n = codeword length</text>
  <text x="635" y="163" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">k = message length</text>
  <text x="635" y="183" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">d = min distance</text>
  <text x="635" y="203" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">R = k/n (code rate)</text>
  <text x="700" y="228" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Corrects t errors</text>
  <text x="700" y="248" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">where t = floor((d-1)/2)</text>

  <!-- Shannon limit note -->
  <rect x="620" y="280" width="160" height="80" rx="6" fill="#2D5A8E" fill-opacity="0.10" stroke="#2D5A8E" stroke-width="1"/>
  <text x="700" y="300" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Shannon Limit</text>
  <text x="700" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Max rate for reliable</text>
  <text x="700" y="333" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">communication:</text>
  <text x="700" y="350" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">R &lt; C = 1 - H(p)</text>
</svg>