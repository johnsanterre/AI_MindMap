<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <!-- Border -->
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Chain of Thought Prompting</text>

  <!-- DIVIDER -->
  <line x1="400" y1="58" x2="400" y2="380" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT SIDE: Direct Answer ===== -->
  <text x="200" y="76" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530" text-anchor="middle">Direct Answer</text>

  <!-- Question box -->
  <rect x="120" y="88" width="160" height="40" rx="6" fill="#EDE8DC" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="200" y="105" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Q: If a train travels</text>
  <text x="200" y="121" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">60 mph for 2.5 hrs...</text>

  <!-- Arrow down -->
  <line x1="200" y1="128" x2="200" y2="158" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- LLM box -->
  <rect x="140" y="158" width="120" height="36" rx="6" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="200" y="181" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">LLM</text>

  <!-- Arrow down -->
  <line x1="200" y1="194" x2="200" y2="224" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Wrong answer box -->
  <rect x="120" y="224" width="160" height="40" rx="6" fill="#F5E8E8" stroke="#7C2530" stroke-width="2"/>
  <text x="200" y="241" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-weight="bold">✗ Answer: 140 miles</text>
  <text x="200" y="257" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">(incorrect)</text>

  <!-- No trigger phrase label -->
  <rect x="100" y="296" width="200" height="30" rx="4" fill="#EDE8DC" stroke="#C4A87A" stroke-width="1"/>
  <text x="200" y="316" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">No intermediate reasoning</text>


  <!-- ===== RIGHT SIDE: Chain of Thought ===== -->
  <text x="600" y="76" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Chain of Thought</text>

  <!-- Question box -->
  <rect x="520" y="88" width="160" height="40" rx="6" fill="#EDE8DC" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="600" y="105" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Q: If a train travels</text>
  <text x="600" y="121" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">60 mph for 2.5 hrs...</text>

  <!-- Trigger phrase -->
  <rect x="490" y="136" width="220" height="22" rx="4" fill="#2D5A8E"/>
  <text x="600" y="151" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-style="italic">"Let's think step by step"</text>

  <!-- Arrow down -->
  <line x1="600" y1="158" x2="600" y2="176" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Reasoning trace label -->
  <text x="730" y="195" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle" font-style="italic">reasoning</text>
  <text x="730" y="208" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle" font-style="italic">trace</text>
  <line x1="715" y1="185" x2="690" y2="185" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="715" y1="222" x2="690" y2="222" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="715" y1="259" x2="690" y2="259" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="730" y1="185" x2="730" y2="270" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 1 -->
  <rect x="520" y="176" width="160" height="30" rx="5" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="600" y="196" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Step 1: Speed = 60 mph</text>

  <!-- Arrow -->
  <line x1="600" y1="206" x2="600" y2="218" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Step 2 -->
  <rect x="520" y="218" width="160" height="30" rx="5" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="600" y="238" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Step 2: Time = 2.5 hrs</text>

  <!-- Arrow -->
  <line x1="600" y1="248" x2="600" y2="260" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Step 3 -->
  <rect x="520" y="260" width="160" height="30" rx="5" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="600" y="280" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Step 3: 60 × 2.5 = 150</text>

  <!-- Arrow -->
  <line x1="600" y1="290" x2="600" y2="302" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- LLM box -->
  <rect x="540" y="302" width="120" height="28" rx="6" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="600" y="321" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">LLM</text>

  <!-- Arrow -->
  <line x1="600" y1="330" x2="600" y2="342" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Correct answer box -->
  <rect x="520" y="342" width="160" height="30" rx="6" fill="#E8F0E8" stroke="#2D6B2D" stroke-width="2"/>
  <text x="600" y="362" font-family="Georgia, serif" font-size="12" fill="#2D6B2D" text-anchor="middle" font-weight="bold">✓ Answer: 150 miles</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBrown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>
