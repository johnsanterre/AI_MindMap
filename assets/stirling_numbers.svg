<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Stirling Numbers: Cycles and Partitions</text>

  <!-- Dividing line -->
  <line x1="400" y1="50" x2="400" y2="370" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- LEFT SIDE: First Kind -->
  <text x="200" y="68" font-family="Georgia,serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">First Kind: s(n,k)</text>
  <text x="200" y="86" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Permutations into k cycles</text>

  <!-- Cycle diagram: (1 3 4)(2) from S_4 -->
  <text x="200" y="112" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Example: 4 elements, 2 cycles</text>

  <!-- Cycle 1: (1 3 4) -->
  <circle cx="130" cy="175" r="50" fill="none" stroke="#7C2530" stroke-width="1.8"/>
  <circle cx="105" cy="145" r="14" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="105" y="149" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1</text>
  <circle cx="160" cy="150" r="14" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="160" y="154" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">3</text>
  <circle cx="135" cy="205" r="14" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="135" y="209" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">4</text>

  <!-- Arrows for cycle 1 -->
  <path d="M118,143 L148,147" fill="none" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <path d="M162,164 L143,195" fill="none" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <path d="M122,207 L102,160" fill="none" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arrowR)"/>

  <!-- Cycle 2: (2) -->
  <circle cx="260" cy="175" r="22" fill="none" stroke="#7C2530" stroke-width="1.8"/>
  <circle cx="260" cy="175" r="14" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="260" y="179" font-family="Georgia,serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2</text>
  <!-- Self-loop arrow -->
  <path d="M272,165 A8,8 0 1,1 272,168" fill="none" stroke="#7C2530" stroke-width="1"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowR" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- First kind recurrence -->
  <rect x="50" y="240" width="300" height="50" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="200" y="258" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Recurrence</text>
  <text x="200" y="278" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">s(n,k) = s(n-1,k-1) + (n-1) s(n-1,k)</text>

  <!-- Factorial connection -->
  <rect x="50" y="300" width="300" height="50" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="200" y="318" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Falling Factorial Connection</text>
  <text x="200" y="338" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle">x(x-1)...(x-n+1) = Sum s(n,k) x^k</text>

  <!-- RIGHT SIDE: Second Kind -->
  <text x="600" y="68" font-family="Georgia,serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Second Kind: S(n,k)</text>
  <text x="600" y="86" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Set partitions into k non-empty subsets</text>

  <!-- Partition diagram: {1,4}, {2,3} from n=4, k=2 -->
  <text x="600" y="112" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Example: {1,2,3,4} into 2 subsets</text>

  <!-- Subset 1: {1, 4} -->
  <rect x="470" y="130" width="90" height="90" rx="12" fill="none" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="500" cy="160" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="500" y="164" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">1</text>
  <circle cx="540" cy="195" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="540" y="199" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">4</text>

  <!-- Subset 2: {2, 3} -->
  <rect x="640" y="130" width="90" height="90" rx="12" fill="none" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="670" cy="160" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="670" y="164" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2</text>
  <circle cx="710" cy="195" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="710" y="199" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">3</text>

  <!-- Second kind recurrence -->
  <rect x="450" y="240" width="300" height="50" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="600" y="258" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Recurrence</text>
  <text x="600" y="278" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">S(n,k) = S(n-1,k-1) + k S(n-1,k)</text>

  <!-- Bell number connection -->
  <rect x="450" y="300" width="300" height="50" rx="6" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="600" y="318" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Bell Numbers</text>
  <text x="600" y="338" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle">B(n) = Sum_k S(n,k) = total partitions</text>

  <!-- Bottom caption -->
  <text x="400" y="386" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">Stirling numbers count the ways to decompose structure -- cycles for the first kind, partitions for the second.</text>
</svg>