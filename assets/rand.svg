<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#7C2530" rx="8"/>
  <rect x="0" y="36" width="800" height="12" fill="#7C2530"/>
  <text x="400" y="30" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FDFAF4" text-anchor="middle">RAND Corporation</text>

  <!-- Panel dividers -->
  <line x1="265" y1="55" x2="265" y2="390" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="535" y1="55" x2="535" y2="390" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- LEFT PANEL: Identity Facts -->
  <text x="133" y="76" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Identity</text>
  <line x1="40" y1="82" x2="226" y2="82" stroke="#C4A87A" stroke-width="1"/>

  <!-- Fact boxes -->
  <rect x="28" y="92" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="107" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Non-Profit Think Tank</text>
  <text x="140" y="120" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Global policy research org</text>

  <rect x="28" y="132" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="147" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Founded 1948</text>
  <text x="140" y="160" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Spun off from Douglas Aircraft</text>

  <rect x="28" y="172" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="187" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Santa Monica, CA</text>
  <text x="140" y="200" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Headquarters (offices worldwide)</text>

  <rect x="28" y="212" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="227" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">~1,900 Employees</text>
  <text x="140" y="240" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Revenues ~$350M/year</text>

  <rect x="28" y="252" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="267" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Clients: US Government</text>
  <text x="140" y="280" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">+ foreign govts, foundations</text>

  <rect x="28" y="292" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="307" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">RAND = Research ANd</text>
  <text x="140" y="320" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Development</text>

  <rect x="28" y="332" width="224" height="44" fill="#7C2530" rx="4" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="140" y="350" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">"Inventors of the</text>
  <text x="140" y="364" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">think tank model"</text>

  <!-- CENTER PANEL: Research Areas -->
  <text x="400" y="76" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">AI &amp; ML Research Areas</text>
  <line x1="275" y1="82" x2="525" y2="82" stroke="#C4A87A" stroke-width="1"/>

  <!-- Area boxes -->
  <rect x="278" y="92" width="245" height="28" fill="#2D5A8E" rx="4" opacity="0.85"/>
  <text x="400" y="111" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">AI Policy &amp; Governance</text>

  <rect x="278" y="126" width="245" height="28" fill="#7C2530" rx="4" opacity="0.85"/>
  <text x="400" y="145" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Autonomous Weapons Systems</text>

  <rect x="278" y="160" width="245" height="28" fill="#5C3D1E" rx="4" opacity="0.85"/>
  <text x="400" y="179" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Health AI &amp; Insurance</text>

  <rect x="278" y="194" width="245" height="28" fill="#2D5A8E" rx="4" opacity="0.85"/>
  <text x="400" y="213" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Disinformation &amp; Social Media AI</text>

  <rect x="278" y="228" width="245" height="28" fill="#7C2530" rx="4" opacity="0.85"/>
  <text x="400" y="247" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">China AI Competition</text>

  <rect x="278" y="262" width="245" height="28" fill="#5C3D1E" rx="4" opacity="0.85"/>
  <text x="400" y="281" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Workforce &amp; Automation</text>

  <rect x="278" y="296" width="245" height="28" fill="#2D5A8E" rx="4" opacity="0.85"/>
  <text x="400" y="315" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Criminal Justice AI &amp; Bias</text>

  <rect x="278" y="332" width="245" height="44" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="348" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Approach: quantitative analysis,</text>
  <text x="400" y="362" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">scenario planning, wargaming</text>

  <!-- RIGHT PANEL: Methods and Notable Contributions -->
  <text x="668" y="76" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Methods &amp; Firsts</text>
  <line x1="545" y1="82" x2="780" y2="82" stroke="#C4A87A" stroke-width="1"/>

  <rect x="548" y="92" width="236" height="50" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="109" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Delphi Method</text>
  <text x="666" y="123" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Structured expert forecasting</text>
  <text x="666" y="136" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">via iterative rounds</text>

  <rect x="548" y="148" width="236" height="50" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="165" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Monte Carlo Simulation</text>
  <text x="666" y="179" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Early probabilistic modeling</text>
  <text x="666" y="192" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">for uncertainty analysis</text>

  <rect x="548" y="204" width="236" height="50" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="221" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">JOHNNIAC (1953)</text>
  <text x="666" y="235" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Early random-access-memory</text>
  <text x="666" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">computer design</text>

  <rect x="548" y="260" width="236" height="50" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="277" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Game Theory Applications</text>
  <text x="666" y="291" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Early work with von Neumann</text>
  <text x="666" y="304" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">and Nash; nuclear deterrence</text>

  <rect x="548" y="316" width="236" height="60" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="333" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Systems Analysis &amp;</text>
  <text x="666" y="347" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Operations Research</text>
  <text x="666" y="361" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Helped invent these fields</text>
  <text x="666" y="374" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">as formal disciplines</text>
</svg>
