<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Parametric vs Nonparametric</text>

  <!-- Divider line -->
  <line x1="400" y1="50" x2="400" y2="380" stroke="#D4C5A9" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- Left label -->
  <text x="200" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">Parametric</text>
  <text x="200" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">Assumes a fixed shape</text>

  <!-- Right label -->
  <text x="600" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" font-weight="bold">Nonparametric</text>
  <text x="600" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">Follows the data</text>

  <!-- LEFT SIDE: Rigid bell curve -->
  <!-- Axis -->
  <line x1="50" y1="300" x2="360" y2="300" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Data points (scattered, don't match bell curve well) -->
  <circle cx="80" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="100" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="105" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="130" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="140" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="145" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="150" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="160" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="175" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="230" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="240" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="250" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="260" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="270" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="290" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="310" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="330" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>

  <!-- Bell curve (rigid, doesn't match bimodal data) -->
  <path d="M 50 300 Q 80 295, 110 270 Q 140 230, 170 170 Q 190 130, 205 120 Q 220 130, 240 170 Q 270 230, 300 270 Q 330 295, 360 300" fill="none" stroke="#7C2530" stroke-width="3"/>
  <path d="M 50 300 Q 80 295, 110 270 Q 140 230, 170 170 Q 190 130, 205 120 Q 220 130, 240 170 Q 270 230, 300 270 Q 330 295, 360 300" fill="#7C2530" fill-opacity="0.08"/>

  <!-- Mismatch annotation -->
  <text x="120" y="250" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-style="italic">Poor fit!</text>
  <line x1="135" y1="255" x2="135" y2="285" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowRed)"/>

  <!-- Formula -->
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530">f(x) = N(mu, sigma^2)</text>
  <text x="200" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Fixed parameters: mu, sigma</text>

  <!-- RIGHT SIDE: Flexible KDE -->
  <!-- Axis -->
  <line x1="440" y1="300" x2="760" y2="300" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Same data points -->
  <circle cx="470" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="490" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="495" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="520" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="530" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="535" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="540" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="550" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="565" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="620" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="630" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="640" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="650" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="660" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="680" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="700" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>
  <circle cx="720" cy="295" r="4" fill="#C4A87A" opacity="0.7"/>

  <!-- KDE curve (bimodal, follows data) -->
  <path d="M 440 300 Q 460 298, 475 280 Q 490 240, 510 190 Q 525 160, 535 155 Q 545 160, 555 185 Q 570 220, 585 265 Q 595 285, 600 290 Q 610 285, 620 260 Q 635 220, 650 195 Q 660 180, 670 185 Q 680 195, 695 230 Q 710 265, 730 285 Q 745 298, 760 300" fill="none" stroke="#2D5A8E" stroke-width="3"/>
  <path d="M 440 300 Q 460 298, 475 280 Q 490 240, 510 190 Q 525 160, 535 155 Q 545 160, 555 185 Q 570 220, 585 265 Q 595 285, 600 290 Q 610 285, 620 260 Q 635 220, 650 195 Q 660 180, 670 185 Q 680 195, 695 230 Q 710 265, 730 285 Q 745 298, 760 300" fill="#2D5A8E" fill-opacity="0.08"/>

  <!-- Good fit annotation -->
  <text x="540" y="140" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-style="italic">Adapts to data!</text>

  <!-- Formula -->
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E">f(x) = (1/nh) Sum K((x-xi)/h)</text>
  <text x="600" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Shape determined by data</text>

  <!-- Small individual kernels (faint) -->
  <ellipse cx="470" cy="295" rx="20" ry="30" fill="none" stroke="#2D5A8E" stroke-width="0.7" opacity="0.25"/>
  <ellipse cx="495" cy="295" rx="20" ry="35" fill="none" stroke="#2D5A8E" stroke-width="0.7" opacity="0.25"/>
  <ellipse cx="535" cy="295" rx="20" ry="40" fill="none" stroke="#2D5A8E" stroke-width="0.7" opacity="0.25"/>
  <ellipse cx="630" cy="295" rx="20" ry="30" fill="none" stroke="#2D5A8E" stroke-width="0.7" opacity="0.25"/>
  <ellipse cx="660" cy="295" rx="20" ry="32" fill="none" stroke="#2D5A8E" stroke-width="0.7" opacity="0.25"/>
  <ellipse cx="700" cy="295" rx="20" ry="25" fill="none" stroke="#2D5A8E" stroke-width="0.7" opacity="0.25"/>
</svg>