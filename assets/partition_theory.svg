<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="4"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Partitions of 5 — Ferrers &amp; Young Diagrams</text>

  <!-- Helper: each dot is r=8, spacing 24px -->

  <!-- Partition 5 = 5 -->
  <text x="72" y="80" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">5</text>
  <circle cx="24" cy="96" r="8" fill="#7C2530"/><circle cx="48" cy="96" r="8" fill="#7C2530"/><circle cx="72" cy="96" r="8" fill="#7C2530"/><circle cx="96" cy="96" r="8" fill="#7C2530"/><circle cx="120" cy="96" r="8" fill="#7C2530"/>

  <!-- Partition 4+1 -->
  <text x="72" y="140" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">4+1</text>
  <circle cx="24" cy="156" r="8" fill="#2D5A8E"/><circle cx="48" cy="156" r="8" fill="#2D5A8E"/><circle cx="72" cy="156" r="8" fill="#2D5A8E"/><circle cx="96" cy="156" r="8" fill="#2D5A8E"/>
  <circle cx="24" cy="180" r="8" fill="#2D5A8E"/>

  <!-- Partition 3+2 -->
  <text x="72" y="216" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">3+2</text>
  <circle cx="24" cy="232" r="8" fill="#7C2530"/><circle cx="48" cy="232" r="8" fill="#7C2530"/><circle cx="72" cy="232" r="8" fill="#7C2530"/>
  <circle cx="24" cy="256" r="8" fill="#7C2530"/><circle cx="48" cy="256" r="8" fill="#7C2530"/>

  <!-- Partition 3+1+1 -->
  <text x="72" y="292" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">3+1+1</text>
  <circle cx="24" cy="308" r="8" fill="#2D5A8E"/><circle cx="48" cy="308" r="8" fill="#2D5A8E"/><circle cx="72" cy="308" r="8" fill="#2D5A8E"/>
  <circle cx="24" cy="332" r="8" fill="#2D5A8E"/>
  <circle cx="24" cy="356" r="8" fill="#2D5A8E"/>

  <!-- Divider line -->
  <line x1="168" y1="60" x2="168" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Young diagram style (boxes) for remaining partitions -->

  <!-- Partition 2+2+1 as Young diagram -->
  <text x="260" y="80" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2+2+1</text>
  <rect x="212" y="90" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="236" y="90" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="114" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="236" y="114" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="138" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Partition 2+1+1+1 as Young diagram -->
  <text x="260" y="186" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2+1+1+1</text>
  <rect x="212" y="196" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="236" y="196" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="220" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="244" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="268" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Partition 1+1+1+1+1 as Young diagram -->
  <text x="260" y="316" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">1+1+1+1+1</text>
  <rect x="212" y="326" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="350" width="24" height="24" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <rect x="212" y="374" width="24" height="24" fill="none" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="224" y="389" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">...</text>

  <!-- Divider line -->
  <line x1="310" y1="60" x2="310" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Conjugate partition illustration -->
  <text x="500" y="80" font-family="Georgia, serif" font-size="18" fill="#7C2530" text-anchor="middle" font-weight="bold">Conjugate Partitions</text>

  <!-- Original: 4+1 -->
  <text x="400" y="112" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">4 + 1</text>
  <rect x="348" y="120" width="26" height="26" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="374" y="120" width="26" height="26" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="400" y="120" width="26" height="26" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="426" y="120" width="26" height="26" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="348" y="146" width="26" height="26" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>

  <!-- Arrow -->
  <text x="500" y="152" font-family="Georgia, serif" font-size="16" fill="#7C2530" text-anchor="middle">transpose</text>
  <line x1="470" y1="158" x2="530" y2="158" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#7C2530"/></marker></defs>

  <!-- Conjugate: 2+1+1+1 -->
  <text x="610" y="112" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2 + 1 + 1 + 1</text>
  <rect x="570" y="120" width="26" height="26" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="596" y="120" width="26" height="26" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="570" y="146" width="26" height="26" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="570" y="172" width="26" height="26" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>
  <rect x="570" y="198" width="26" height="26" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5" rx="2"/>

  <!-- Generating function -->
  <text x="500" y="260" font-family="Georgia, serif" font-size="16" fill="#7C2530" text-anchor="middle" font-weight="bold">Partition Generating Function</text>

  <text x="500" y="295" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">
    &sum; p(n) x&#x207F; = &prod; 1 / (1 - x&#x1D4F;)
  </text>
  <text x="500" y="318" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">n &ge; 0 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; k &ge; 1</text>

  <!-- p(n) values -->
  <text x="500" y="355" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle">p(1)=1 &nbsp; p(2)=2 &nbsp; p(3)=3 &nbsp; p(4)=5 &nbsp; p(5)=7 &nbsp; p(6)=11 &nbsp; p(7)=15</text>

  <!-- Labels -->
  <text x="84" y="385" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">Ferrers diagrams</text>
  <text x="260" y="385" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">Young diagrams</text>
</svg>