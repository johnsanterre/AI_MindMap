<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Sample Space Omega -->
  <ellipse cx="200" cy="190" rx="150" ry="130" fill="none" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="200" y="52" font-family="Georgia, serif" font-size="18" fill="#5C3D1E" text-anchor="middle" font-style="italic">Sample Space  &#937;</text>

  <!-- Event A -->
  <ellipse cx="170" cy="170" rx="70" ry="55" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="145" y="160" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" font-weight="bold">A</text>
  <text x="145" y="180" font-family="Georgia, serif" font-size="12" fill="#2D5A8E">P(A)</text>

  <!-- Event B -->
  <ellipse cx="230" cy="200" rx="65" ry="50" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="2"/>
  <text x="255" y="195" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">B</text>
  <text x="255" y="215" font-family="Georgia, serif" font-size="12" fill="#7C2530">P(B)</text>

  <!-- Intersection label -->
  <text x="198" y="198" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">A&#8745;B</text>

  <!-- Complement region label -->
  <text x="130" y="290" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-style="italic">P(&#937;) = 1</text>

  <!-- Arrow to distribution -->
  <line x1="355" y1="190" x2="420" y2="190" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C4A87A"/>
    </marker>
  </defs>
  <text x="388" y="175" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">X(&#969;)</text>

  <!-- Probability Distribution (bell curve area) -->
  <rect x="430" y="70" width="340" height="260" rx="8" fill="none" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="95" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Probability Distribution</text>

  <!-- Axes -->
  <line x1="470" y1="280" x2="740" y2="280" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="470" y1="280" x2="470" y2="120" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="745" y="285" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">x</text>
  <text x="462" y="118" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">f(x)</text>

  <!-- Bell curve (Gaussian PDF) -->
  <path d="M 480,278 Q 510,275 530,270 Q 555,255 570,235 Q 585,205 600,160 Q 610,140 615,138 Q 620,140 625,160 Q 640,205 655,235 Q 670,255 695,270 Q 715,275 740,278" fill="#2D5A8E" fill-opacity="0.18" stroke="#2D5A8E" stroke-width="2.5" fill-rule="nonzero"/>

  <!-- Shaded area under curve (probability region) -->
  <path d="M 530,270 Q 555,255 570,235 Q 585,205 600,160 Q 610,140 615,138 Q 620,140 625,160 Q 635,190 640,205 L 640,278 L 530,278 Z" fill="#7C2530" fill-opacity="0.25" stroke="none"/>
  <text x="585" y="298" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">P(a &#8804; X &#8804; b)</text>

  <!-- Tick marks -->
  <line x1="530" y1="278" x2="530" y2="285" stroke="#5C3D1E" stroke-width="1"/>
  <text x="530" y="298" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">a</text>
  <line x1="640" y1="278" x2="640" y2="285" stroke="#5C3D1E" stroke-width="1"/>
  <text x="640" y="298" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">b</text>
  <line x1="615" y1="278" x2="615" y2="285" stroke="#5C3D1E" stroke-width="1"/>
  <text x="615" y="298" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">&#956;</text>

  <!-- Title -->
  <text x="400" y="380" font-family="Georgia, serif" font-size="20" fill="#7C2530" text-anchor="middle" font-weight="bold">Probability Theory</text>

  <!-- Key formula -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" font-style="italic">P(A) = &#8747; f(x) dx</text>
</svg>