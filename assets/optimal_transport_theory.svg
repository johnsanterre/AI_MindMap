<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Optimal Transport: Moving Mass at Minimum Cost</text>

  <!-- Source distribution (left pile) -->
  <ellipse cx="180" cy="280" rx="100" ry="20" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <circle cx="140" cy="260" r="14" fill="#2D5A8E" fill-opacity="0.6"/>
  <circle cx="170" cy="250" r="18" fill="#2D5A8E" fill-opacity="0.7"/>
  <circle cx="205" cy="255" r="12" fill="#2D5A8E" fill-opacity="0.5"/>
  <circle cx="155" cy="235" r="10" fill="#2D5A8E" fill-opacity="0.4"/>
  <circle cx="190" cy="238" r="15" fill="#2D5A8E" fill-opacity="0.6"/>
  <circle cx="175" cy="222" r="11" fill="#2D5A8E" fill-opacity="0.5"/>
  <text x="180" y="320" text-anchor="middle" fill="#2D5A8E" font-size="15" font-weight="bold">Source (mu)</text>

  <!-- Target distribution (right pile) -->
  <ellipse cx="620" cy="280" rx="100" ry="20" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="590" cy="258" r="16" fill="#7C2530" fill-opacity="0.6"/>
  <circle cx="625" cy="250" r="13" fill="#7C2530" fill-opacity="0.5"/>
  <circle cx="655" cy="260" r="11" fill="#7C2530" fill-opacity="0.7"/>
  <circle cx="610" cy="240" r="14" fill="#7C2530" fill-opacity="0.6"/>
  <circle cx="640" cy="235" r="10" fill="#7C2530" fill-opacity="0.4"/>
  <circle cx="625" cy="225" r="12" fill="#7C2530" fill-opacity="0.5"/>
  <text x="620" y="320" text-anchor="middle" fill="#7C2530" font-size="15" font-weight="bold">Target (nu)</text>

  <!-- Transport arrows -->
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C4A87A"/>
    </marker>
  </defs>
  <line x1="250" y1="245" x2="530" y2="250" stroke="#C4A87A" stroke-width="2" marker-end="url(#ah)" stroke-dasharray="6,3"/>
  <line x1="260" y1="260" x2="540" y2="265" stroke="#C4A87A" stroke-width="2" marker-end="url(#ah)" stroke-dasharray="6,3"/>
  <line x1="255" y1="230" x2="535" y2="240" stroke="#C4A87A" stroke-width="2" marker-end="url(#ah)" stroke-dasharray="6,3"/>

  <!-- Cost label on middle arrow -->
  <rect x="355" y="235" width="90" height="22" rx="4" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="252" text-anchor="middle" fill="#5C3D1E" font-size="12" font-style="italic">cost c(x,y)</text>

  <!-- Kantorovich box -->
  <rect x="80" y="345" width="280" height="40" rx="6" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1"/>
  <text x="220" y="370" text-anchor="middle" fill="#2D5A8E" font-size="13">Kantorovich: min over couplings gamma</text>

  <!-- Wasserstein box -->
  <rect x="440" y="345" width="280" height="40" rx="6" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1"/>
  <text x="580" y="370" text-anchor="middle" fill="#7C2530" font-size="13">Wasserstein distance W_p(mu, nu)</text>

  <!-- Top diagram: dual formulation -->
  <rect x="290" y="65" width="220" height="55" rx="8" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="85" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Kantorovich Duality</text>
  <text x="400" y="105" text-anchor="middle" fill="#5C3D1E" font-size="12">inf = sup over 1-Lipschitz f</text>

  <!-- Connecting lines from dual to source/target -->
  <line x1="310" y1="120" x2="200" y2="220" stroke="#5C3D1E" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="490" y1="120" x2="600" y2="220" stroke="#5C3D1E" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Monge label -->
  <text x="400" y="170" text-anchor="middle" fill="#C4A87A" font-size="14" font-weight="bold">T: X -> Y</text>
  <text x="400" y="190" text-anchor="middle" fill="#C4A87A" font-size="12">(Monge map)</text>
</svg>