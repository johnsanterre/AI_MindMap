<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#D4C5A9" stroke-width="2" rx="4"/>
  <text x="400" y="30" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Evaluation Metrics: From Confusion Matrix to Scores</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2D5A8E"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C2530"/>
    </marker>
    <marker id="arrT" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Confusion Matrix -->
  <text x="150" y="52" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Confusion Matrix</text>
  <rect x="40" y="60" width="220" height="220" rx="6" fill="white" stroke="#D4C5A9" stroke-width="2"/>
  <line x1="150" y1="60" x2="150" y2="280" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="40" y1="170" x2="260" y2="170" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Column / row headers -->
  <text x="95" y="77" text-anchor="middle" fill="#2D5A8E" font-size="11">Pred +</text>
  <text x="205" y="77" text-anchor="middle" fill="#2D5A8E" font-size="11">Pred &#x2212;</text>
  <text x="30" y="120" text-anchor="middle" fill="#2D5A8E" font-size="10" transform="rotate(-90,30,120)">Actual +</text>
  <text x="30" y="235" text-anchor="middle" fill="#2D5A8E" font-size="10" transform="rotate(-90,30,235)">Actual &#x2212;</text>

  <!-- TP -->
  <rect x="42" y="82" width="106" height="86" fill="#E8F0E8" rx="3"/>
  <text x="95" y="120" text-anchor="middle" fill="#2D6E2D" font-size="24" font-weight="bold">TP</text>
  <text x="95" y="143" text-anchor="middle" fill="#2D6E2D" font-size="10">True Pos</text>

  <!-- FN -->
  <rect x="152" y="82" width="106" height="86" fill="#FAE6E6" rx="3"/>
  <text x="205" y="120" text-anchor="middle" fill="#7C2530" font-size="24" font-weight="bold">FN</text>
  <text x="205" y="143" text-anchor="middle" fill="#7C2530" font-size="10">False Neg</text>

  <!-- FP -->
  <rect x="42" y="172" width="106" height="106" fill="#FAE6E6" rx="3"/>
  <text x="95" y="222" text-anchor="middle" fill="#7C2530" font-size="24" font-weight="bold">FP</text>
  <text x="95" y="245" text-anchor="middle" fill="#7C2530" font-size="10">False Pos</text>

  <!-- TN -->
  <rect x="152" y="172" width="106" height="106" fill="#E8F0E8" rx="3"/>
  <text x="205" y="222" text-anchor="middle" fill="#2D6E2D" font-size="24" font-weight="bold">TN</text>
  <text x="205" y="245" text-anchor="middle" fill="#2D6E2D" font-size="10">True Neg</text>

  <!-- Arrows to metric boxes -->
  <line x1="262" y1="115" x2="310" y2="95" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="262" y1="130" x2="310" y2="155" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="262" y1="220" x2="310" y2="225" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrT)"/>

  <!-- Precision box -->
  <rect x="315" y="65" width="190" height="50" rx="8" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="410" y="86" text-anchor="middle" fill="#2D5A8E" font-size="15" font-weight="bold">Precision</text>
  <text x="410" y="105" text-anchor="middle" fill="#333" font-size="12">TP / (TP + FP)</text>

  <!-- Recall box -->
  <rect x="315" y="130" width="190" height="50" rx="8" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="410" y="151" text-anchor="middle" fill="#7C2530" font-size="15" font-weight="bold">Recall (Sensitivity)</text>
  <text x="410" y="170" text-anchor="middle" fill="#333" font-size="12">TP / (TP + FN)</text>

  <!-- Accuracy box -->
  <rect x="315" y="200" width="190" height="50" rx="8" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="410" y="221" text-anchor="middle" fill="#5C3D1E" font-size="15" font-weight="bold">Accuracy</text>
  <text x="410" y="240" text-anchor="middle" fill="#333" font-size="12">(TP + TN) / Total</text>

  <!-- Dashed arrows to F1 -->
  <line x1="507" y1="90" x2="560" y2="115" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="507" y1="155" x2="560" y2="130" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- F1 Score box -->
  <rect x="565" y="90" width="195" height="58" rx="10" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="2"/>
  <text x="662" y="114" text-anchor="middle" fill="#5C3D1E" font-size="16" font-weight="bold">F1 Score</text>
  <text x="662" y="136" text-anchor="middle" fill="#333" font-size="12">2 &#xD7; P &#xD7; R / (P + R)</text>

  <!-- Regression metrics -->
  <rect x="315" y="275" width="190" height="105" rx="8" fill="white" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="410" y="296" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Regression Metrics</text>
  <text x="410" y="320" text-anchor="middle" fill="#2D5A8E" font-size="12">MSE = mean(y &#x2212; &#x177;)&#xB2;</text>
  <text x="410" y="342" text-anchor="middle" fill="#7C2530" font-size="12">MAE = mean|y &#x2212; &#x177;|</text>
  <text x="410" y="364" text-anchor="middle" fill="#5C3D1E" font-size="12">R&#xB2; = 1 &#x2212; SS_res / SS_tot</text>

  <!-- Ranking metrics -->
  <rect x="565" y="180" width="195" height="70" rx="8" fill="white" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="662" y="201" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Ranking Metrics</text>
  <text x="662" y="224" text-anchor="middle" fill="#2D5A8E" font-size="12">AUC-ROC</text>
  <text x="662" y="243" text-anchor="middle" fill="#7C2530" font-size="12">NDCG, MAP, MRR</text>

  <!-- Threshold note -->
  <text x="150" y="310" text-anchor="middle" fill="#5C3D1E" font-size="11" font-style="italic">Threshold choice shifts the tradeoff</text>
  <text x="150" y="330" text-anchor="middle" fill="#C4A87A" font-size="11">&#x2191; Threshold &#x2192; &#x2191; Precision, &#x2193; Recall</text>
  <text x="150" y="348" text-anchor="middle" fill="#C4A87A" font-size="11">&#x2193; Threshold &#x2192; &#x2193; Precision, &#x2191; Recall</text>
</svg>
