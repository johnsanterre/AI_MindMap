<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#7C2530" font-weight="bold">The Perceptron: Rise, Fall, and Revival</text>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#C4A87A" stroke-width="3"/>
  <circle cx="130" cy="200" r="8" fill="#2D5A8E"/>
  <text x="130" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">1943</text>
  <text x="130" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">McCulloch-</text>
  <text x="130" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Pitts Neuron</text>
  <rect x="90" y="270" width="80" height="40" rx="6" fill="#2D5A8E" opacity="0.12"/>
  <text x="130" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Binary</text>
  <text x="130" y="303" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">threshold</text>
  <circle cx="310" cy="200" r="10" fill="#7C2530"/>
  <text x="310" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">1958</text>
  <text x="310" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Rosenblatt</text>
  <text x="310" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Perceptron</text>
  <rect x="260" y="270" width="100" height="50" rx="6" fill="#7C2530" opacity="0.12"/>
  <text x="310" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Learnable weights</text>
  <text x="310" y="303" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Convergence</text>
  <text x="310" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">theorem</text>
  <circle cx="490" cy="200" r="10" fill="#5C3D1E"/>
  <text x="490" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">1969</text>
  <text x="490" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Minsky &amp;</text>
  <text x="490" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Papert Critique</text>
  <rect x="440" y="270" width="100" height="50" rx="6" fill="#5C3D1E" opacity="0.12"/>
  <text x="490" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">XOR problem:</text>
  <text x="490" y="303" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">linear limits</text>
  <text x="490" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2192; AI Winter</text>
  <circle cx="670" cy="200" r="10" fill="#2D5A8E"/>
  <text x="670" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">1986</text>
  <text x="670" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Backprop</text>
  <text x="670" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Revival</text>
  <rect x="620" y="270" width="100" height="50" rx="6" fill="#2D5A8E" opacity="0.12"/>
  <text x="670" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Multi-layer</text>
  <text x="670" y="303" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">networks solve</text>
  <text x="670" y="316" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">XOR &amp; beyond</text>
  <rect x="560" y="60" width="180" height="110" rx="8" fill="white" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="650" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-weight="bold">XOR Problem</text>
  <circle cx="605" cy="105" r="5" fill="#2D5A8E"/>
  <circle cx="695" cy="105" r="5" fill="#7C2530"/>
  <circle cx="605" cy="145" r="5" fill="#7C2530"/>
  <circle cx="695" cy="145" r="5" fill="#2D5A8E"/>
  <text x="595" y="100" text-anchor="end" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(0,0)&#x2192;0</text>
  <text x="705" y="100" text-anchor="start" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(1,0)&#x2192;1</text>
  <text x="595" y="155" text-anchor="end" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(0,1)&#x2192;1</text>
  <text x="705" y="155" text-anchor="start" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(1,1)&#x2192;0</text>
  <line x1="590" y1="90" x2="710" y2="160" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="650" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">No single line separates</text>
  <path d="M 200 100 Q 310 60 400 100 Q 490 140 580 100" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="310" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">Hype</text>
  <text x="490" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Winter</text>
  <text x="400" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C4A87A" font-style="italic">One neuron's journey shaped the trajectory of deep learning</text>
</svg>
