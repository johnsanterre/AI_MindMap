<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Monte Carlo Tree Search — Four Phases</text>

  <!-- ============================================================ -->
  <!-- TREE STRUCTURE -->
  <!-- Root node at top-center -->
  <!-- Level 0: Root -->
  <!-- Level 1: 3 children -->
  <!-- Level 2: 2 children under middle-left of level 1 -->
  <!-- ============================================================ -->

  <!-- Highlighted path color: deep red #7C2530 -->
  <!-- Normal edge color: #5C3D1E -->
  <!-- New node color: #C4A87A -->
  <!-- Simulation dashed line: #2D5A8E -->

  <!-- === EDGES (draw before nodes) === -->

  <!-- Root to L1-left (normal) -->
  <line x1="400" y1="80" x2="230" y2="160" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- Root to L1-mid (highlighted path, phase 1) -->
  <line x1="400" y1="80" x2="400" y2="160" stroke="#7C2530" stroke-width="2.5"/>
  <!-- Root to L1-right (normal) -->
  <line x1="400" y1="80" x2="570" y2="160" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- L1-mid to L2-left (highlighted path) -->
  <line x1="400" y1="160" x2="330" y2="250" stroke="#7C2530" stroke-width="2.5"/>
  <!-- L1-mid to L2-right (normal) -->
  <line x1="400" y1="160" x2="460" y2="250" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- L2-left to NEW NODE (expansion, phase 2) — highlighted -->
  <line x1="330" y1="250" x2="280" y2="330" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Simulation dashed line from NEW NODE to terminal -->
  <line x1="280" y1="330" x2="180" y2="375" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="6,4"/>

  <!-- ============================================================ -->
  <!-- NODES -->
  <!-- ============================================================ -->

  <!-- Root node (highlighted, backprop updates shown) -->
  <circle cx="400" cy="80" r="22" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="400" y="77" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">W=7</text>
  <text x="400" y="89" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">N=10</text>

  <!-- L1 left (normal) -->
  <circle cx="230" cy="160" r="18" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="230" y="157" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">W=2</text>
  <text x="230" y="168" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">N=3</text>

  <!-- L1 mid (highlighted) -->
  <circle cx="400" cy="160" r="20" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="400" y="157" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">W=4</text>
  <text x="400" y="169" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">N=5</text>

  <!-- L1 right (normal) -->
  <circle cx="570" cy="160" r="18" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="570" y="157" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">W=1</text>
  <text x="570" y="168" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">N=2</text>

  <!-- L2 left (highlighted, selected leaf) -->
  <circle cx="330" cy="250" r="20" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="330" y="247" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">W=3</text>
  <text x="330" y="259" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">N=4</text>

  <!-- L2 right (normal) -->
  <circle cx="460" cy="250" r="18" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="460" y="247" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">W=1</text>
  <text x="460" y="258" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle">N=1</text>

  <!-- NEW NODE (expansion — tan fill) -->
  <circle cx="280" cy="330" r="20" fill="#C4A87A" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="0"/>
  <text x="280" y="326" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle" font-weight="bold">W=0</text>
  <text x="280" y="338" font-family="Georgia, serif" font-size="8" fill="#5C3D1E" text-anchor="middle" font-weight="bold">N=0</text>

  <!-- Terminal state node (simulation result) -->
  <rect x="148" y="360" width="64" height="28" rx="5" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="180" y="378" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">WIN</text>

  <!-- ============================================================ -->
  <!-- PHASE LABELS (numbered circles + text) -->
  <!-- ============================================================ -->

  <!-- Phase 1: Selection -->
  <circle cx="620" cy="100" r="12" fill="#7C2530"/>
  <text x="620" y="104" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">1</text>
  <text x="638" y="97" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530">Selection</text>
  <text x="638" y="112" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Follow highest UCB1 score</text>
  <text x="638" y="125" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">from root to a leaf node</text>

  <!-- Phase 2: Expansion -->
  <circle cx="620" cy="175" r="12" fill="#5C3D1E"/>
  <text x="620" y="179" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">2</text>
  <text x="638" y="172" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E">Expansion</text>
  <text x="638" y="187" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Add new child node</text>
  <text x="638" y="200" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">at the selected leaf</text>

  <!-- Phase 3: Simulation -->
  <circle cx="620" cy="245" r="12" fill="#2D5A8E"/>
  <text x="620" y="249" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDFAF4" text-anchor="middle">3</text>
  <text x="638" y="242" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E">Simulation</text>
  <text x="638" y="257" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Random rollout to terminal</text>
  <text x="638" y="270" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">state → win / loss signal</text>

  <!-- Phase 4: Backpropagation -->
  <circle cx="620" cy="315" r="12" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="620" y="319" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">4</text>
  <text x="638" y="312" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E">Backpropagation</text>
  <text x="638" y="327" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Update W and N for all</text>
  <text x="638" y="340" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">nodes on path to root</text>

  <!-- Backprop arrows (curved upward on left side of highlighted path) -->
  <path d="M 350 250 Q 360 215 370 185" stroke="#C4A87A" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-tan)"/>
  <path d="M 375 155 Q 385 120 390 95" stroke="#C4A87A" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-tan)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-tan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Legend label: new node -->
  <circle cx="490" cy="340" r="8" fill="#C4A87A" stroke="#7C2530" stroke-width="1.5"/>
  <text x="503" y="344" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">= new node</text>

  <!-- Legend: dashed = simulation -->
  <line x1="482" y1="360" x2="498" y2="360" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="503" y="364" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">= simulation rollout</text>

  <!-- Legend: red path = selection/backprop -->
  <line x1="482" y1="378" x2="498" y2="378" stroke="#7C2530" stroke-width="2.5"/>
  <text x="503" y="382" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">= selected path</text>

</svg>
