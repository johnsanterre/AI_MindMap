<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Backtracking Search Tree</text>

  <!-- Root node -->
  <circle cx="400" cy="90" r="20" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" font-weight="bold">S</text>

  <!-- Level 1 branches -->
  <line x1="400" y1="110" x2="200" y2="170" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="400" y1="110" x2="400" y2="170" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="400" y1="110" x2="600" y2="170" stroke="#D4C5A9" stroke-width="2" stroke-dasharray="6,4"/>

  <circle cx="200" cy="190" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">A</text>

  <circle cx="400" cy="190" r="18" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">B</text>

  <!-- Pruned branch -->
  <circle cx="600" cy="190" r="18" fill="#D4C5A9" stroke="#D4C5A9" stroke-width="2"/>
  <text x="600" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">C</text>
  <line x1="585" y1="175" x2="615" y2="205" stroke="#7C2530" stroke-width="3"/>
  <line x1="615" y1="175" x2="585" y2="205" stroke="#7C2530" stroke-width="3"/>
  <text x="660" y="195" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-style="italic">pruned</text>

  <!-- Level 2 from A -->
  <line x1="200" y1="208" x2="120" y2="268" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="200" y1="208" x2="280" y2="268" stroke="#D4C5A9" stroke-width="2" stroke-dasharray="6,4"/>

  <circle cx="120" cy="285" r="16" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="2"/>
  <text x="120" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FDFAF4">A1</text>

  <circle cx="280" cy="285" r="16" fill="#D4C5A9" stroke="#D4C5A9" stroke-width="2"/>
  <text x="280" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">A2</text>
  <line x1="267" y1="272" x2="293" y2="298" stroke="#7C2530" stroke-width="3"/>
  <line x1="293" y1="272" x2="267" y2="298" stroke="#7C2530" stroke-width="3"/>

  <!-- Level 2 from B -->
  <line x1="400" y1="208" x2="350" y2="268" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="400" y1="208" x2="450" y2="268" stroke="#5C3D1E" stroke-width="2"/>

  <circle cx="350" cy="285" r="16" fill="#D4C5A9" stroke="#D4C5A9" stroke-width="2"/>
  <text x="350" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">B1</text>
  <line x1="337" y1="272" x2="363" y2="298" stroke="#7C2530" stroke-width="3"/>
  <line x1="363" y1="272" x2="337" y2="298" stroke="#7C2530" stroke-width="3"/>

  <circle cx="450" cy="285" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="450" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">B2</text>

  <!-- Solution marker -->
  <text x="450" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">Solution!</text>

  <!-- Level 3 leaf from A1 -->
  <line x1="120" y1="301" x2="80" y2="345" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="120" y1="301" x2="160" y2="345" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="80" cy="358" r="13" fill="#D4C5A9" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="80" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">fail</text>
  <circle cx="160" cy="358" r="13" fill="#D4C5A9" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="160" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">fail</text>

  <!-- Legend -->
  <rect x="20" y="55" width="140" height="90" rx="6" fill="none" stroke="#D4C5A9" stroke-width="1"/>
  <text x="90" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Legend</text>
  <circle cx="40" cy="90" r="7" fill="#2D5A8E"/>
  <text x="55" y="94" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Explored</text>
  <circle cx="40" cy="110" r="7" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="55" y="114" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Solution</text>
  <circle cx="40" cy="130" r="7" fill="#D4C5A9"/>
  <text x="55" y="134" font-family="Georgia, serif" font-size="10" fill="#7C2530">Pruned / Failed</text>

  <!-- Arrow showing backtrack -->
  <path d="M 85 360 Q 30 330 115 305" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="115,308 112,298 122,304" fill="#7C2530"/>
  <text x="28" y="345" font-family="Georgia, serif" font-size="9" fill="#7C2530" font-style="italic">backtrack</text>
</svg>