<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
    <marker id="arrowTan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C4A87A"/>
    </marker>
    <marker id="arrowBrown" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C3D1E" font-weight="bold">Principal Component Analysis</text>

  <!-- ══ LEFT PANEL: Original 2D data with PCA axes ══ -->
  <text x="215" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6B5D4F" letter-spacing="1">ORIGINAL DATA (2D)</text>

  <!-- Faint grid crosshairs -->
  <line x1="215" y1="72" x2="215" y2="370" stroke="#F0E8D8" stroke-width="1"/>
  <line x1="40" y1="220" x2="390" y2="220" stroke="#F0E8D8" stroke-width="1"/>

  <!-- 1-sigma data ellipse (tilted ~35 degrees) -->
  <ellipse cx="215" cy="220" rx="145" ry="50"
           fill="rgba(92,61,30,0.05)" stroke="#D4C5A9" stroke-width="1.5"
           stroke-dasharray="5,4" transform="rotate(-35,215,220)"/>

  <!-- Data cloud: 25 points in a tilted elliptical cluster -->
  <circle cx="310" cy="155" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="295" cy="143" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="300" cy="168" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="278" cy="158" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="285" cy="175" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="265" cy="178" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="258" cy="192" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="245" cy="195" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="240" cy="210" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="225" cy="205" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="220" cy="225" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="210" cy="215" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="200" cy="232" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="190" cy="240" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="180" cy="248" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="172" cy="255" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="160" cy="262" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="148" cy="270" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="137" cy="278" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="125" cy="285" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="252" cy="182" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="195" cy="225" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="232" cy="238" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="270" cy="165" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="155" cy="275" r="4.5" fill="#2D5A8E" opacity="0.55"/>

  <!-- PC1 axis (major direction, tilted ~35 deg through cloud center) -->
  <line x1="85" y1="312" x2="345" y2="128"
        stroke="#7C2530" stroke-width="3" marker-end="url(#arrowRed)"/>

  <!-- PC2 axis (perpendicular to PC1) -->
  <line x1="153" y1="148" x2="277" y2="292"
        stroke="#C4A87A" stroke-width="3" marker-end="url(#arrowTan)"/>

  <!-- Mean point -->
  <circle cx="215" cy="220" r="5" fill="#5C3D1E" stroke="#FDFAF4" stroke-width="2"/>

  <!-- PC labels -->
  <text x="350" y="124" font-family="Georgia, serif" font-size="14" fill="#7C2530" font-weight="bold">PC1</text>
  <text x="350" y="140" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">max variance</text>
  <text x="282" y="304" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">PC2</text>
  <text x="282" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">min variance</text>

  <!-- Eigenvalue annotations -->
  <text x="290" y="108" font-family="Georgia, serif" font-size="10" fill="#7C2530">lambda_1 (large)</text>
  <text x="285" y="330" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">lambda_2 (small)</text>

  <!-- Mean label -->
  <text x="215" y="356" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">mean (center)</text>
  <line x1="215" y1="345" x2="215" y2="228" stroke="#5C3D1E" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Original axes in bottom-left corner -->
  <line x1="55" y1="365" x2="115" y2="365" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>
  <text x="120" y="369" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">x1</text>
  <line x1="55" y1="365" x2="55" y2="310" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>
  <text x="48" y="305" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">x2</text>
  <text x="60" y="382" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">Original axes</text>

  <!-- Panel divider -->
  <line x1="420" y1="50" x2="420" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ RIGHT PANEL: Projected onto PC1 (1D) ══ -->
  <text x="610" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6B5D4F" letter-spacing="1">PROJECTED ONTO PC1 (1D)</text>

  <!-- Horizontal axis -->
  <line x1="445" y1="220" x2="775" y2="220"
        stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Zero tick -->
  <line x1="610" y1="214" x2="610" y2="226" stroke="#C4A87A" stroke-width="1"/>
  <text x="610" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">0</text>

  <!-- Projected points along PC1 axis -->
  <circle cx="755" cy="222" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="740" cy="218" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="722" cy="221" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="705" cy="217" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="690" cy="222" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="672" cy="218" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="655" cy="221" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="638" cy="217" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="625" cy="222" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="610" cy="218" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="595" cy="221" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="578" cy="217" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="562" cy="222" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="548" cy="218" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="533" cy="221" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="518" cy="217" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="503" cy="222" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="490" cy="218" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="475" cy="221" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="462" cy="218" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="660" cy="223" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="585" cy="219" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="620" cy="223" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="695" cy="219" r="4.5" fill="#2D5A8E" opacity="0.55"/>
  <circle cx="510" cy="223" r="4.5" fill="#2D5A8E" opacity="0.55"/>

  <!-- Axis label -->
  <text x="610" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530">PC1 score</text>

  <!-- Info text -->
  <text x="610" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F" font-style="italic">PC2 dimension discarded</text>

  <!-- EVR formula -->
  <text x="610" y="315" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Explained Variance Ratio = lambda_1 / (lambda_1 + lambda_2)</text>

  <!-- Legend box -->
  <rect x="450" y="335" width="320" height="50" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="4"/>
  <circle cx="465" cy="352" r="4" fill="#2D5A8E" opacity="0.55"/>
  <text x="476" y="356" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Data points</text>
  <line x1="545" y1="352" x2="565" y2="352" stroke="#7C2530" stroke-width="2.5"/>
  <text x="572" y="356" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">PC1 (max var.)</text>
  <line x1="660" y1="352" x2="680" y2="352" stroke="#C4A87A" stroke-width="2.5"/>
  <text x="687" y="356" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">PC2 (min var.)</text>
  <text x="610" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#6B5D4F">Dimensionality reduction: 2D to 1D by retaining only PC1 scores</text>
</svg>