<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Conditional Probability: P(A | B)</text>

  <!-- Sample space rectangle -->
  <rect x="120" y="70" width="560" height="280" rx="8" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <text x="140" y="95" font-family="Georgia, serif" font-size="15" fill="#5C3D1E">Sample Space S</text>

  <!-- Circle A -->
  <circle cx="330" cy="210" r="120" fill="rgba(125,37,48,0.12)" stroke="#7C2530" stroke-width="2.5"/>
  <text x="248" y="160" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">A</text>

  <!-- Circle B -->
  <circle cx="460" cy="210" r="120" fill="rgba(45,90,142,0.12)" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="540" y="160" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" font-weight="bold">B</text>

  <!-- Intersection highlight: A ∩ B — the P(A|B) region -->
  <clipPath id="clipB">
    <circle cx="460" cy="210" r="120"/>
  </clipPath>
  <circle cx="330" cy="210" r="120" clip-path="url(#clipB)" fill="rgba(196,168,122,0.55)" stroke="none"/>

  <!-- Intersection border emphasis -->
  <clipPath id="clipA">
    <circle cx="330" cy="210" r="120"/>
  </clipPath>
  <circle cx="460" cy="210" r="120" clip-path="url(#clipA)" fill="none" stroke="#C4A87A" stroke-width="3"/>

  <!-- Labels inside intersection -->
  <text x="395" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" font-weight="bold">A ∩ B</text>
  <text x="395" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">P(A|B) focuses here</text>

  <!-- Annotation arrows and text -->
  <line x1="395" y1="240" x2="395" y2="300" stroke="#C4A87A" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="395" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E">P(A|B) = P(A ∩ B) / P(B)</text>

  <!-- "Given B" bracket -->
  <path d="M340,340 Q400,355 520,340" fill="none" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="430" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-style="italic">B becomes the new universe</text>
</svg>