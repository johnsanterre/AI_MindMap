<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-axis" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#5C3D1E" letter-spacing="1.5">SAMPLE COMPLEXITY</text>

  <!-- ══ LEFT PANEL: Sample Size vs Error ══ -->
  <text x="200" y="55" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">LEARNING CURVE</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="370" y2="340" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>
  <line x1="60" y1="340" x2="60" y2="70" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr-axis)"/>

  <!-- Axis labels -->
  <text x="215" y="365" text-anchor="middle" font-size="9" fill="#6B5D4F">number of training samples (m)</text>
  <text x="30" y="210" font-size="9" fill="#6B5D4F" text-anchor="middle" transform="rotate(-90,30,210)">generalization error</text>

  <!-- Target accuracy epsilon line -->
  <line x1="65" y1="180" x2="365" y2="180" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="368" y="176" font-size="9" fill="#2D5A8E" font-style="italic">target error</text>

  <!-- High complexity hypothesis (red curve - slower descent) -->
  <path d="M 70,100 Q 120,105 160,140 Q 200,170 240,185 Q 290,195 340,198"
        fill="none" stroke="#7C2530" stroke-width="2.2"/>
  <text x="345" y="204" font-size="8" fill="#7C2530">complex H</text>

  <!-- Low complexity hypothesis (brown curve - faster descent) -->
  <path d="M 70,290 Q 120,240 160,210 Q 200,195 240,188 Q 290,183 340,180"
        fill="none" stroke="#5C3D1E" stroke-width="2.2"/>
  <text x="345" y="175" font-size="8" fill="#5C3D1E">simple H</text>

  <!-- Vertical dashed line at sample complexity point -->
  <line x1="230" y1="75" x2="230" y2="340" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="90" text-anchor="middle" font-size="8.5" fill="#5C3D1E">m* (sample</text>
  <text x="230" y="101" text-anchor="middle" font-size="8.5" fill="#5C3D1E">complexity)</text>

  <!-- Annotation: convergence region -->
  <rect x="260" y="168" width="85" height="38" rx="3" fill="none" stroke="#C4A87A" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="302" y="184" text-anchor="middle" font-size="7.5" fill="#6B5D4F">curves converge:</text>
  <text x="302" y="196" text-anchor="middle" font-size="7.5" fill="#6B5D4F">enough samples</text>

  <!-- Panel divider -->
  <line x1="400" y1="45" x2="400" y2="385" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ RIGHT PANEL: PAC Framework ══ -->
  <text x="600" y="55" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">PAC LEARNING BOUND</text>

  <!-- Central formula box -->
  <rect x="440" y="80" width="320" height="60" rx="5" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="600" y="105" text-anchor="middle" font-size="13" fill="#7C2530" font-style="italic">m &gt;= (1 / 2e^2) ln(2|H| / d)</text>
  <text x="600" y="128" text-anchor="middle" font-size="9" fill="#6B5D4F">samples needed for PAC guarantee</text>

  <!-- Parameter boxes -->
  <!-- epsilon -->
  <rect x="445" y="165" width="90" height="55" rx="4" fill="none" stroke="#7C2530" stroke-width="1.2"/>
  <text x="490" y="183" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold" font-style="italic">e (epsilon)</text>
  <text x="490" y="198" text-anchor="middle" font-size="8" fill="#6B5D4F">accuracy</text>
  <text x="490" y="210" text-anchor="middle" font-size="8" fill="#6B5D4F">tolerance</text>

  <!-- delta -->
  <rect x="555" y="165" width="90" height="55" rx="4" fill="none" stroke="#2D5A8E" stroke-width="1.2"/>
  <text x="600" y="183" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold" font-style="italic">d (delta)</text>
  <text x="600" y="198" text-anchor="middle" font-size="8" fill="#6B5D4F">failure</text>
  <text x="600" y="210" text-anchor="middle" font-size="8" fill="#6B5D4F">probability</text>

  <!-- |H| -->
  <rect x="665" y="165" width="90" height="55" rx="4" fill="none" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="710" y="183" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">|H|</text>
  <text x="710" y="198" text-anchor="middle" font-size="8" fill="#6B5D4F">hypothesis</text>
  <text x="710" y="210" text-anchor="middle" font-size="8" fill="#6B5D4F">space size</text>

  <!-- Arrows from formula to parameters -->
  <line x1="520" y1="140" x2="490" y2="163" stroke="#C4A87A" stroke-width="1"/>
  <line x1="600" y1="140" x2="600" y2="163" stroke="#C4A87A" stroke-width="1"/>
  <line x1="680" y1="140" x2="710" y2="163" stroke="#C4A87A" stroke-width="1"/>

  <!-- Tradeoff arrows section -->
  <text x="600" y="250" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">KEY TRADEOFFS</text>

  <!-- Tighter accuracy needs more data -->
  <rect x="435" y="265" width="155" height="45" rx="4" fill="none" stroke="#7C2530" stroke-width="1"/>
  <text x="512" y="282" text-anchor="middle" font-size="8.5" fill="#7C2530">smaller e (tighter)</text>
  <text x="512" y="298" text-anchor="middle" font-size="8.5" fill="#6B5D4F">requires MORE samples</text>
  <text x="512" y="308" text-anchor="middle" font-size="7.5" fill="#6B5D4F">(scales as 1/e^2)</text>

  <!-- Richer hypothesis needs more data -->
  <rect x="610" y="265" width="155" height="45" rx="4" fill="none" stroke="#5C3D1E" stroke-width="1"/>
  <text x="687" y="282" text-anchor="middle" font-size="8.5" fill="#5C3D1E">larger |H| (richer)</text>
  <text x="687" y="298" text-anchor="middle" font-size="8.5" fill="#6B5D4F">requires MORE samples</text>
  <text x="687" y="308" text-anchor="middle" font-size="7.5" fill="#6B5D4F">(scales as ln |H|)</text>

  <!-- VC Dimension note -->
  <rect x="460" y="330" width="280" height="48" rx="5" fill="none" stroke="#2D5A8E" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="600" y="348" text-anchor="middle" font-size="9" fill="#2D5A8E">For infinite |H|: replace ln|H| with</text>
  <text x="600" y="363" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">VC dimension (d_vc)</text>
  <text x="600" y="375" text-anchor="middle" font-size="8" fill="#6B5D4F">a measure of hypothesis class complexity</text>

  <!-- Bottom caption -->
  <text x="400" y="395" text-anchor="middle" font-size="9.5" fill="#6B5D4F">
    More complex hypotheses and tighter accuracy both demand more training data
  </text>
</svg>
