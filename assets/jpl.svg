<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#2D5A8E"/>
  <text x="400" y="32" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Jet Propulsion Laboratory (JPL)</text>

  <!-- Panel dividers -->
  <line x1="240" y1="48" x2="240" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="540" y1="48" x2="540" y2="400" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ═══ LEFT PANEL: Identity Facts ═══ -->
  <text x="120" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Identity</text>

  <rect x="18" y="84" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="101" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Type:</text>
  <text x="68" y="101" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">FFRDC (NASA / Caltech)</text>

  <rect x="18" y="116" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="133" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Managed by:</text>
  <text x="108" y="133" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Caltech for NASA</text>

  <rect x="18" y="148" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="165" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Founded:</text>
  <text x="92" y="165" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">1936</text>

  <rect x="18" y="180" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="197" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Location:</text>
  <text x="90" y="197" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">La Cañada Flintridge / Pasadena, CA</text>

  <rect x="18" y="212" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="229" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Staff:</text>
  <text x="66" y="229" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">~6,000 employees</text>

  <rect x="18" y="244" width="204" height="26" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="28" y="261" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Specialty:</text>
  <text x="90" y="261" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Robotic space missions only</text>

  <!-- Mission box -->
  <rect x="18" y="282" width="204" height="100" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="120" y="299" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Core Focus</text>
  <text x="28" y="316" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; Robotic planetary exploration</text>
  <text x="28" y="331" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; Deep space communications</text>
  <text x="28" y="346" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; Earth observation satellites</text>
  <text x="28" y="361" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x2022; No human spaceflight missions</text>

  <!-- ═══ CENTER PANEL: Autonomous Space AI ═══ -->
  <text x="390" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Autonomous Space AI</text>

  <!-- Mars Surface box -->
  <rect x="300" y="86" width="180" height="38" rx="6" fill="#C4A87A" fill-opacity="0.30" stroke="#C4A87A" stroke-width="2"/>
  <text x="390" y="102" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Mars Surface</text>
  <text x="390" y="116" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Unknown terrain, 100M+ miles away</text>

  <!-- Arrow down -->
  <line x1="390" y1="124" x2="390" y2="142" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Rover AI box -->
  <rect x="295" y="144" width="190" height="52" rx="6" fill="#2D5A8E" fill-opacity="0.14" stroke="#2D5A8E" stroke-width="2"/>
  <text x="390" y="162" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Rover Onboard AI</text>
  <text x="390" y="176" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">AEGIS: autonomous target selection</text>
  <text x="390" y="189" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Hazard avoidance, terrain analysis</text>

  <!-- Two branches -->
  <line x1="345" y1="196" x2="318" y2="218" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="435" y1="196" x2="462" y2="218" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- TRN box -->
  <rect x="258" y="218" width="118" height="44" rx="5" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.5"/>
  <text x="317" y="235" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Terrain-Relative</text>
  <text x="317" y="249" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Navigation (TRN)</text>
  <text x="317" y="257" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Perseverance landing</text>

  <!-- Deep space comms box -->
  <rect x="404" y="218" width="118" height="44" rx="5" fill="#5C3D1E" fill-opacity="0.10" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="463" y="235" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Deep Space</text>
  <text x="463" y="249" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Comms ML</text>
  <text x="463" y="257" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Signal processing</text>

  <!-- Arrow down to Earth -->
  <line x1="390" y1="262" x2="390" y2="278" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Earth comms box -->
  <rect x="300" y="280" width="180" height="36" rx="5" fill="#2D5A8E" fill-opacity="0.10" stroke="#2D5A8E" stroke-width="1"/>
  <text x="390" y="296" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Earth Ground Stations</text>
  <text x="390" y="309" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Anomaly detection in telemetry</text>

  <!-- COSMIC note -->
  <rect x="300" y="326" width="180" height="36" rx="5" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="390" y="341" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">COSMIC — Edge AI Hardware</text>
  <text x="390" y="354" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Radiation-hardened computing</text>

  <!-- Earth obs note -->
  <rect x="300" y="370" width="180" height="22" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="390" y="384" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">SWOT: ML for sea-level &amp; climate</text>

  <!-- ═══ RIGHT PANEL: Notable Missions with AI ═══ -->
  <text x="670" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Notable Missions with AI</text>

  <!-- Perseverance -->
  <rect x="552" y="86" width="232" height="66" rx="5" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="668" y="103" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Perseverance Rover (2021–)</text>
  <text x="562" y="119" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">TRN for autonomous landing; AEGIS</text>
  <text x="562" y="133" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">selects laser targets; terrain navigation</text>

  <!-- Curiosity -->
  <rect x="552" y="162" width="232" height="58" rx="5" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.5"/>
  <text x="668" y="179" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Curiosity Rover (2012–)</text>
  <text x="562" y="195" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">First AEGIS deployment; autonomous</text>
  <text x="562" y="209" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">science target selection on Mars</text>

  <!-- Europa Clipper -->
  <rect x="552" y="230" width="232" height="58" rx="5" fill="#5C3D1E" fill-opacity="0.10" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="668" y="247" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Europa Clipper (2024–)</text>
  <text x="562" y="263" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">ML for icy-moon imagery analysis;</text>
  <text x="562" y="277" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">anomaly detection in Jupiter flyby data</text>

  <!-- SWOT -->
  <rect x="552" y="298" width="232" height="58" rx="5" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="668" y="315" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">SWOT Satellite (2022–)</text>
  <text x="562" y="331" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Earth water observation; ML pipelines</text>
  <text x="562" y="345" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">for sea-level rise &amp; hydrology</text>

  <!-- Voyager footnote -->
  <rect x="552" y="366" width="232" height="24" rx="4" fill="#F0EAE0" stroke="#D4C5A9" stroke-width="1"/>
  <text x="668" y="382" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Also: Voyager 1&amp;2, Cassini, Galileo, Dawn</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>
