<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="34" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Multi-Head Attention: Parallel Heads Concatenated</text>

  <!-- Input block -->
  <rect x="30" y="155" width="100" height="50" fill="#2D5A8E" rx="5"/>
  <text x="80" y="177" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Input X</text>
  <text x="80" y="195" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">n x d_model</text>

  <!-- Linear projections label -->
  <rect x="160" y="145" width="90" height="70" fill="#C4A87A" rx="4" opacity="0.6"/>
  <text x="205" y="176" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Linear</text>
  <text x="205" y="192" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Projections</text>

  <!-- Arrow input to projections -->
  <line x1="130" y1="180" x2="158" y2="180" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Fan-out arrows to heads -->
  <line x1="250" y1="160" x2="310" y2="80" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="250" y1="172" x2="310" y2="162" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="250" y1="188" x2="310" y2="250" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="250" y1="200" x2="310" y2="335" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Head 1 -->
  <rect x="312" y="55" width="150" height="54" fill="#7C2530" rx="5"/>
  <text x="387" y="75" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Head 1</text>
  <text x="387" y="95" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">softmax(Q&#x2081;K&#x2081;&#x1D40;/ &#x221A;d&#x2096;) V&#x2081;</text>

  <!-- Head 2 -->
  <rect x="312" y="140" width="150" height="54" fill="#7C2530" rx="5"/>
  <text x="387" y="160" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Head 2</text>
  <text x="387" y="180" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">softmax(Q&#x2082;K&#x2082;&#x1D40;/ &#x221A;d&#x2096;) V&#x2082;</text>

  <!-- Head ... -->
  <rect x="312" y="225" width="150" height="54" fill="#7C2530" rx="5" opacity="0.55"/>
  <text x="387" y="258" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">. . .</text>

  <!-- Head h -->
  <rect x="312" y="310" width="150" height="54" fill="#7C2530" rx="5"/>
  <text x="387" y="330" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Head h</text>
  <text x="387" y="350" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">softmax(Q&#x2095;K&#x2095;&#x1D40;/ &#x221A;d&#x2096;) V&#x2095;</text>

  <!-- Parallel bracket -->
  <line x1="296" y1="60" x2="296" y2="360" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="286" y="215" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" transform="rotate(-90, 286, 215)">in parallel</text>

  <!-- Arrows from heads to concat -->
  <line x1="462" y1="82" x2="530" y2="172" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowN)"/>
  <line x1="462" y1="167" x2="530" y2="182" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowN)"/>
  <line x1="462" y1="252" x2="530" y2="198" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowN)"/>
  <line x1="462" y1="337" x2="530" y2="208" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowN)"/>

  <!-- Concat box -->
  <rect x="532" y="156" width="90" height="68" fill="#2D5A8E" rx="5"/>
  <text x="577" y="184" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Concat</text>
  <text x="577" y="204" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">n x h&#xB7;d&#x2096;</text>

  <!-- Arrow concat to output linear -->
  <line x1="622" y1="190" x2="660" y2="190" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Output linear -->
  <rect x="662" y="156" width="90" height="68" fill="#C4A87A" rx="5"/>
  <text x="707" y="182" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">W&#x1D3C;</text>
  <text x="707" y="200" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Linear</text>
  <text x="707" y="216" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">d_model x d_model</text>

  <!-- Output label -->
  <text x="707" y="246" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Output</text>
  <text x="707" y="262" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">n x d_model</text>

  <!-- Footer formula -->
  <text x="400" y="390" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">MultiHead(Q, K, V) = Concat(head&#x2081;, ..., head&#x2095;) W&#x1D3C;   where head&#x1D62; = Attention(XW&#x1D62;Q, XW&#x1D62;K, XW&#x1D62;V)</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowN" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>
