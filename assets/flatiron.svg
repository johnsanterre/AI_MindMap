<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4" rx="8"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="#2D5A8E" rx="8"/>
  <rect x="0" y="36" width="800" height="12" fill="#2D5A8E"/>
  <text x="400" y="30" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Flatiron Institute</text>

  <!-- Panel dividers -->
  <line x1="265" y1="55" x2="265" y2="390" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="535" y1="55" x2="535" y2="390" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- LEFT PANEL: Identity Facts -->
  <text x="133" y="76" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Identity</text>
  <line x1="40" y1="82" x2="226" y2="82" stroke="#C4A87A" stroke-width="1"/>

  <rect x="28" y="92" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="107" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Simons Foundation</text>
  <text x="140" y="120" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Jim &amp; Marilyn Simons, funders</text>

  <rect x="28" y="132" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="147" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Founded 2016</text>
  <text x="140" y="160" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">New York City, NY</text>

  <rect x="28" y="172" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="187" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">~300 Researchers</text>
  <text x="140" y="200" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Private non-profit</text>

  <rect x="28" y="212" width="224" height="44" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="229" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Industry Salaries,</text>
  <text x="140" y="243" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Academic Freedom</text>
  <text x="140" y="250" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">No grants. No deliverables.</text>

  <rect x="28" y="262" width="224" height="34" fill="#F5F0E8" rx="4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="140" y="277" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Basic Research Focus</text>
  <text x="140" y="290" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Computational science</text>

  <rect x="28" y="302" width="224" height="74" fill="#2D5A8E" rx="4" opacity="0.10" stroke="#2D5A8E" stroke-width="1"/>
  <text x="140" y="320" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Jim Simons: mathematician,</text>
  <text x="140" y="334" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">founder of Renaissance</text>
  <text x="140" y="348" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Technologies — the quant</text>
  <text x="140" y="362" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">hedge fund that redefined</text>
  <text x="140" y="376" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">algorithmic trading</text>

  <!-- CENTER PANEL: Five Centers -->
  <text x="400" y="76" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">The Five Centers</text>
  <line x1="275" y1="82" x2="525" y2="82" stroke="#C4A87A" stroke-width="1"/>

  <!-- CCB -->
  <rect x="278" y="92" width="245" height="52" fill="#7C2530" rx="5" opacity="0.88"/>
  <text x="400" y="111" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">CCB — Computational Biology</text>
  <text x="400" y="126" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">ML for genomics, single-cell analysis,</text>
  <text x="400" y="139" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">protein structure prediction</text>

  <!-- CCQ -->
  <rect x="278" y="150" width="245" height="52" fill="#2D5A8E" rx="5" opacity="0.88"/>
  <text x="400" y="169" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">CCQ — Computational Quantum</text>
  <text x="400" y="184" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Tensor networks, many-body physics</text>
  <text x="400" y="197" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">simulation</text>

  <!-- CCM -->
  <rect x="278" y="208" width="245" height="52" fill="#5C3D1E" rx="5" opacity="0.88"/>
  <text x="400" y="227" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">CCM — Computational Math</text>
  <text x="400" y="242" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Numerical algorithms, optimization,</text>
  <text x="400" y="255" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">applied mathematics</text>

  <!-- CCA -->
  <rect x="278" y="266" width="245" height="52" fill="#7C2530" rx="5" opacity="0.88"/>
  <text x="400" y="285" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">CCA — Computational Astrophysics</text>
  <text x="400" y="300" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Cosmological simulations, exoplanet</text>
  <text x="400" y="313" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">detection, ML for astronomy</text>

  <!-- CCN -->
  <rect x="278" y="324" width="245" height="52" fill="#2D5A8E" rx="5" opacity="0.88"/>
  <text x="400" y="343" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">CCN — Computational Neuroscience</text>
  <text x="400" y="358" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Neural data analysis,</text>
  <text x="400" y="371" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">brain-machine interfaces</text>

  <!-- RIGHT PANEL: Notable Tools and Work -->
  <text x="668" y="76" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Notable Tools &amp; Work</text>
  <line x1="545" y1="82" x2="780" y2="82" stroke="#C4A87A" stroke-width="1"/>

  <rect x="548" y="92" width="236" height="54" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="110" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">scVI</text>
  <text x="666" y="124" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Single-cell Variational Inference</text>
  <text x="666" y="138" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Deep learning for genomics</text>

  <rect x="548" y="152" width="236" height="54" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="170" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Physics-Informed NNs</text>
  <text x="666" y="184" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Neural nets that respect</text>
  <text x="666" y="198" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">physical laws as constraints</text>

  <rect x="548" y="212" width="236" height="54" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="230" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Diffusion Models</text>
  <text x="666" y="244" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">For scientific inverse problems</text>
  <text x="666" y="258" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">(imaging, structure prediction)</text>

  <rect x="548" y="272" width="236" height="54" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="290" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">GNNs for Molecules</text>
  <text x="666" y="304" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Graph neural networks for</text>
  <text x="666" y="318" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">molecular simulation</text>

  <rect x="548" y="332" width="236" height="54" fill="#F5F0E8" rx="4" stroke="#C4A87A" stroke-width="1"/>
  <text x="666" y="350" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">JAX Scientific Libraries</text>
  <text x="666" y="364" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">High-performance computing</text>
  <text x="666" y="378" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">tools for science</text>
</svg>
