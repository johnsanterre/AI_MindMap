<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2.5"/>

  <text x="400" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#7C2530" font-weight="bold">Graph Attention Networks</text>

  <!-- Left side: standard GNN (equal weights) -->
  <text x="200" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E">Standard GNN (equal weights)</text>

  <!-- Center node -->
  <circle cx="200" cy="180" r="26" fill="#2D5A8E" stroke="#1A3D5C" stroke-width="2"/>
  <text x="200" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">v</text>

  <!-- Neighbor nodes (left side) -->
  <circle cx="100" cy="110" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="100" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n1</text>

  <circle cx="300" cy="110" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="300" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n2</text>

  <circle cx="100" cy="260" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="100" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n3</text>

  <circle cx="300" cy="260" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="300" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n4</text>

  <!-- Equal-weight edges (left) -->
  <line x1="118" y1="122" x2="176" y2="164" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="none"/>
  <text x="135" y="135" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.25</text>

  <line x1="282" y1="122" x2="224" y2="164" stroke="#5C3D1E" stroke-width="2"/>
  <text x="258" y="135" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.25</text>

  <line x1="118" y1="248" x2="176" y2="196" stroke="#5C3D1E" stroke-width="2"/>
  <text x="135" y="233" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.25</text>

  <line x1="282" y1="248" x2="224" y2="196" stroke="#5C3D1E" stroke-width="2"/>
  <text x="258" y="233" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.25</text>

  <!-- Divider -->
  <line x1="400" y1="60" x2="400" y2="340" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Right side: GAT (learned weights) -->
  <text x="600" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530">GAT (learned attention weights)</text>

  <!-- Center node -->
  <circle cx="600" cy="180" r="26" fill="#7C2530" stroke="#5A1A22" stroke-width="2"/>
  <text x="600" y="186" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">v</text>

  <!-- Neighbor nodes (right side) -->
  <circle cx="500" cy="110" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="500" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n1</text>

  <circle cx="700" cy="110" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="700" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n2</text>

  <circle cx="500" cy="260" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="500" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n3</text>

  <circle cx="700" cy="260" r="20" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="700" y="266" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">n4</text>

  <!-- Attention-weighted edges (right) - varying thickness -->
  <line x1="518" y1="122" x2="576" y2="164" stroke="#7C2530" stroke-width="5"/>
  <text x="530" y="133" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-weight="bold">0.52</text>

  <line x1="682" y1="122" x2="624" y2="164" stroke="#7C2530" stroke-width="3"/>
  <text x="660" y="133" font-family="Georgia, serif" font-size="11" fill="#7C2530">0.30</text>

  <line x1="518" y1="248" x2="576" y2="196" stroke="#7C2530" stroke-width="1.5"/>
  <text x="530" y="237" font-family="Georgia, serif" font-size="11" fill="#7C2530">0.11</text>

  <line x1="682" y1="248" x2="624" y2="196" stroke="#7C2530" stroke-width="1.5"/>
  <text x="660" y="237" font-family="Georgia, serif" font-size="11" fill="#7C2530">0.07</text>

  <!-- Bottom annotation -->
  <text x="200" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">All neighbors contribute equally</text>
  <text x="600" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-style="italic">Neighbors weighted by relevance</text>

  <!-- Alpha formula -->
  <text x="600" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E">alpha_ij = softmax( LeakyReLU( a^T [Wh_i || Wh_j] ) )</text>
</svg>