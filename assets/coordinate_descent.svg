<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Coordinate Descent: Optimize One Variable at a Time</text>

  <!-- ======= LEFT: 2D Contour Plot with Staircase Path ======= -->
  <rect x="30" y="55" width="350" height="300" rx="8" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="205" y="80" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#7C2530" text-anchor="middle">Cyclic Coordinate Descent</text>

  <!-- Contour ellipses (loss surface) -->
  <ellipse cx="220" cy="235" rx="140" ry="95" fill="none" stroke="#C4A87A" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="220" cy="235" rx="105" ry="70" fill="none" stroke="#C4A87A" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="220" cy="235" rx="70" ry="45" fill="none" stroke="#C4A87A" stroke-width="1.3" opacity="0.7"/>
  <ellipse cx="220" cy="235" rx="35" ry="20" fill="none" stroke="#C4A87A" stroke-width="1.5" opacity="0.8"/>

  <!-- Staircase path: alternating horizontal then vertical moves -->
  <polyline points="100,155 185,155 185,200 215,200 215,225 222,225 222,233 220,233"
            fill="none" stroke="#7C2530" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Start point -->
  <circle cx="100" cy="155" r="5" fill="#7C2530"/>
  <text x="90" y="145" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Start</text>

  <!-- Optimum star -->
  <polygon points="220,225 222,231 228,233 223,237 224,243 220,239 216,243 217,237 212,233 218,231" fill="#2D5A8E"/>
  <text x="240" y="248" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-weight="bold">x*</text>

  <!-- Axis labels -->
  <text x="205" y="345" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">x&#x2081;</text>
  <text x="45" y="210" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">x&#x2082;</text>

  <!-- Arrows showing axis-aligned moves -->
  <text x="145" y="148" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">fix x&#x2082;</text>
  <text x="192" y="192" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">fix x&#x2081;</text>

  <!-- ======= RIGHT: Algorithm Steps + Variants ======= -->
  <rect x="420" y="55" width="350" height="300" rx="8" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="595" y="80" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Algorithm &amp; Variants</text>

  <!-- Algorithm box -->
  <rect x="440" y="92" width="310" height="100" rx="5" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="455" y="112" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">Repeat until convergence:</text>
  <text x="465" y="132" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">for j = 1, 2, ..., p :</text>
  <text x="480" y="152" font-family="Georgia, serif" font-size="11" fill="#7C2530">x_j := argmin f(x) w.r.t. x_j</text>
  <text x="480" y="172" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">(all other x_k fixed)</text>

  <!-- Variant boxes -->
  <rect x="440" y="205" width="145" height="55" rx="5" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5"/>
  <text x="512" y="225" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Cyclic</text>
  <text x="512" y="242" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">j = 1, 2, ..., p, 1, ...</text>

  <rect x="605" y="205" width="145" height="55" rx="5" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="677" y="225" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Randomized</text>
  <text x="677" y="242" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">j ~ Uniform{1..p}</text>

  <rect x="440" y="275" width="145" height="55" rx="5" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="512" y="295" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Block</text>
  <text x="512" y="312" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Update groups of x_j</text>

  <rect x="605" y="275" width="145" height="55" rx="5" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="677" y="295" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#C4A87A" text-anchor="middle">Greedy</text>
  <text x="677" y="312" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Pick j with max gain</text>

  <!-- Bottom caption -->
  <text x="400" y="388" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Axis-aligned steps converge for convex, separable problems   |   Key solver for Lasso (L1)</text>
</svg>