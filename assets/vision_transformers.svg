<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" rx="10" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="35" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Vision Transformer (ViT) Pipeline</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Step 1: Input Image -->
  <rect x="30" y="70" width="120" height="120" rx="6" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <!-- Grid lines to show patches -->
  <line x1="60" y1="70" x2="60" y2="190" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="90" y1="70" x2="90" y2="190" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="120" y1="70" x2="120" y2="190" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="30" y1="100" x2="150" y2="100" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="30" y1="130" x2="150" y2="130" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="30" y1="160" x2="150" y2="160" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Color some patches -->
  <rect x="30" y="70" width="30" height="30" fill="#7C2530" opacity="0.15"/>
  <rect x="60" y="100" width="30" height="30" fill="#2D5A8E" opacity="0.15"/>
  <rect x="90" y="130" width="30" height="30" fill="#C4A87A" opacity="0.2"/>
  <rect x="120" y="160" width="30" height="30" fill="#7C2530" opacity="0.15"/>
  <text x="90" y="215" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Image</text>
  <text x="90" y="230" text-anchor="middle" fill="#7C2530" font-size="11">(split into patches)</text>

  <!-- Arrow 1 -->
  <line x1="155" y1="130" x2="190" y2="130" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Patch Embeddings (vertical stack) -->
  <rect x="195" y="60" width="90" height="20" rx="4" fill="#7C2530"/>
  <text x="240" y="74" text-anchor="middle" fill="white" font-size="9">[CLS] token</text>
  <rect x="195" y="85" width="90" height="16" rx="3" fill="#2D5A8E"/>
  <text x="240" y="97" text-anchor="middle" fill="white" font-size="8">Patch 1</text>
  <rect x="195" y="105" width="90" height="16" rx="3" fill="#2D5A8E"/>
  <text x="240" y="117" text-anchor="middle" fill="white" font-size="8">Patch 2</text>
  <rect x="195" y="125" width="90" height="16" rx="3" fill="#2D5A8E"/>
  <text x="240" y="137" text-anchor="middle" fill="white" font-size="8">Patch 3</text>
  <text x="240" y="157" text-anchor="middle" fill="#2D5A8E" font-size="12">...</text>
  <rect x="195" y="163" width="90" height="16" rx="3" fill="#2D5A8E"/>
  <text x="240" y="175" text-anchor="middle" fill="white" font-size="8">Patch N</text>
  <!-- Position embeddings label -->
  <text x="240" y="200" text-anchor="middle" fill="#5C3D1E" font-size="10">+ Position</text>
  <text x="240" y="213" text-anchor="middle" fill="#5C3D1E" font-size="10">Embeddings</text>
  <text x="240" y="230" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Linear</text>
  <text x="240" y="243" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Embedding</text>

  <!-- Arrow 2 -->
  <line x1="290" y1="130" x2="330" y2="130" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Transformer Encoder -->
  <rect x="335" y="55" width="180" height="195" rx="10" fill="#EDE8DC" stroke="#2D5A8E" stroke-width="2"/>
  <text x="425" y="78" text-anchor="middle" fill="#2D5A8E" font-size="14" font-weight="bold">Transformer Encoder</text>
  <!-- MHSA block -->
  <rect x="355" y="90" width="140" height="35" rx="6" fill="#2D5A8E"/>
  <text x="425" y="112" text-anchor="middle" fill="white" font-size="11">Multi-Head</text>
  <text x="425" y="122" text-anchor="middle" fill="white" font-size="11">Self-Attention</text>
  <!-- Add & Norm -->
  <rect x="355" y="132" width="140" height="22" rx="4" fill="#C4A87A"/>
  <text x="425" y="147" text-anchor="middle" fill="#5C3D1E" font-size="10">Add &amp; Norm</text>
  <!-- FFN block -->
  <rect x="355" y="160" width="140" height="28" rx="6" fill="#2D5A8E"/>
  <text x="425" y="178" text-anchor="middle" fill="white" font-size="11">Feed-Forward (MLP)</text>
  <!-- Add & Norm -->
  <rect x="355" y="194" width="140" height="22" rx="4" fill="#C4A87A"/>
  <text x="425" y="209" text-anchor="middle" fill="#5C3D1E" font-size="10">Add &amp; Norm</text>
  <text x="425" y="240" text-anchor="middle" fill="#2D5A8E" font-size="11">x L layers</text>

  <!-- Arrow 3 -->
  <line x1="520" y1="130" x2="560" y2="130" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: CLS output -->
  <rect x="565" y="100" width="80" height="55" rx="8" fill="#7C2530"/>
  <text x="605" y="123" text-anchor="middle" fill="white" font-size="11">[CLS]</text>
  <text x="605" y="140" text-anchor="middle" fill="white" font-size="11">Output</text>

  <!-- Arrow 4 -->
  <line x1="650" y1="130" x2="685" y2="130" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: MLP Head / Classification -->
  <rect x="690" y="90" width="85" height="75" rx="8" fill="#5C3D1E"/>
  <text x="732" y="118" text-anchor="middle" fill="white" font-size="11">MLP</text>
  <text x="732" y="133" text-anchor="middle" fill="white" font-size="11">Head</text>
  <text x="732" y="155" text-anchor="middle" fill="#C4A87A" font-size="10">Class label</text>

  <!-- Bottom annotations -->
  <rect x="30" y="280" width="740" height="95" rx="8" fill="none" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="300" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Key Idea</text>
  <text x="400" y="320" text-anchor="middle" fill="#5C3D1E" font-size="12">Split image into fixed-size patches (e.g. 16x16). Flatten and linearly project each patch.</text>
  <text x="400" y="338" text-anchor="middle" fill="#5C3D1E" font-size="12">Prepend a learnable [CLS] token. Add position embeddings. Feed to a standard Transformer.</text>
  <text x="400" y="356" text-anchor="middle" fill="#5C3D1E" font-size="12">The [CLS] output token is passed through an MLP head for classification.</text>
</svg>