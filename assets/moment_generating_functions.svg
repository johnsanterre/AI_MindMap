<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#333" font-size="19" font-weight="bold">Moment Generating Functions: The Moment Extractor</text>

  <!-- Central MGF box -->
  <rect x="280" y="60" width="240" height="60" rx="10" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" fill="#2D5A8E" font-size="17" font-weight="bold">M(t) = E[e^tX]</text>
  <text x="400" y="108" text-anchor="middle" fill="#5C3D1E" font-size="13" font-style="italic">encodes all moments in one function</text>

  <!-- Arrow down from MGF to derivative chain -->
  <line x1="400" y1="120" x2="400" y2="148" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="430" y="140" fill="#7C2530" font-size="12" font-style="italic">differentiate</text>

  <!-- Derivative chain boxes -->
  <!-- M'(0) -->
  <rect x="80" y="155" width="190" height="55" rx="8" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="175" y="177" text-anchor="middle" fill="#7C2530" font-size="15" font-weight="bold">M'(0) = E[X]</text>
  <text x="175" y="199" text-anchor="middle" fill="#5C3D1E" font-size="12">1st moment (mean)</text>

  <!-- M''(0) -->
  <rect x="305" y="155" width="190" height="55" rx="8" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="177" text-anchor="middle" fill="#7C2530" font-size="15" font-weight="bold">M''(0) = E[X²]</text>
  <text x="400" y="199" text-anchor="middle" fill="#5C3D1E" font-size="12">2nd moment (variance via)</text>

  <!-- M'''(0) -->
  <rect x="530" y="155" width="190" height="55" rx="8" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="625" y="177" text-anchor="middle" fill="#7C2530" font-size="15" font-weight="bold">M'''(0) = E[X³]</text>
  <text x="625" y="199" text-anchor="middle" fill="#5C3D1E" font-size="12">3rd moment (skewness)</text>

  <!-- Connecting lines from MGF to derivative boxes -->
  <line x1="320" y1="120" x2="175" y2="155" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="400" y1="120" x2="400" y2="155" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="480" y1="120" x2="625" y2="155" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- t=0 label -->
  <text x="68" y="140" fill="#7C2530" font-size="12" font-weight="bold">evaluate at t=0</text>

  <!-- Separator line -->
  <line x1="40" y1="230" x2="760" y2="230" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Key property: sum = product -->
  <text x="400" y="258" text-anchor="middle" fill="#2D5A8E" font-size="15" font-weight="bold">Key Property: Independence → Product</text>
  <text x="400" y="280" text-anchor="middle" fill="#5C3D1E" font-size="14">If X, Y independent: M_{X+Y}(t) = M_X(t) · M_Y(t)</text>

  <!-- Example distributions -->
  <text x="70" y="315" fill="#333" font-size="13" font-weight="bold">Examples:</text>

  <!-- Gaussian -->
  <rect x="70" y="325" width="200" height="48" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="170" y="345" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Gaussian</text>
  <text x="170" y="365" text-anchor="middle" fill="#5C3D1E" font-size="12">M(t) = exp(μt + σ²t²/2)</text>

  <!-- Poisson -->
  <rect x="300" y="325" width="200" height="48" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="400" y="345" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Poisson</text>
  <text x="400" y="365" text-anchor="middle" fill="#5C3D1E" font-size="12">M(t) = exp(λ(e^t − 1))</text>

  <!-- Bernoulli -->
  <rect x="530" y="325" width="200" height="48" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="630" y="345" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Bernoulli</text>
  <text x="630" y="365" text-anchor="middle" fill="#5C3D1E" font-size="12">M(t) = 1 − p + pe^t</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>