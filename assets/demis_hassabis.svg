<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2" rx="4"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Demis Hassabis — From Games to Scientific Discovery</text>

  <!-- Timeline axis -->
  <line x1="80" y1="220" x2="720" y2="220" stroke="#D4C5A9" stroke-width="2"/>
  <!-- Arrow tip -->
  <polygon points="720,215 735,220 720,225" fill="#D4C5A9"/>

  <!-- Year markers and tick marks -->
  <!-- 2010 -->
  <line x1="120" y1="210" x2="120" y2="230" stroke="#5C3D1E" stroke-width="2"/>
  <text x="120" y="250" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2010</text>

  <!-- 2013 -->
  <line x1="248" y1="210" x2="248" y2="230" stroke="#5C3D1E" stroke-width="2"/>
  <text x="248" y="250" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2013</text>

  <!-- 2016 -->
  <line x1="376" y1="210" x2="376" y2="230" stroke="#5C3D1E" stroke-width="2"/>
  <text x="376" y="250" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2016</text>

  <!-- 2018/2020 -->
  <line x1="525" y1="210" x2="525" y2="230" stroke="#5C3D1E" stroke-width="2"/>
  <text x="525" y="250" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2018/2020</text>

  <!-- 2024 -->
  <line x1="670" y1="210" x2="670" y2="230" stroke="#5C3D1E" stroke-width="2"/>
  <text x="670" y="250" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2024</text>

  <!-- Event nodes -->
  <!-- DeepMind Founded -->
  <circle cx="120" cy="140" r="32" fill="#2D5A8E" opacity="0.9"/>
  <text x="120" y="135" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">DeepMind</text>
  <text x="120" y="150" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Founded</text>
  <line x1="120" y1="172" x2="120" y2="210" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Atari DQN -->
  <circle cx="248" cy="140" r="32" fill="#7C2530" opacity="0.9"/>
  <text x="248" y="135" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Atari</text>
  <text x="248" y="150" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">DQN</text>
  <line x1="248" y1="172" x2="248" y2="210" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- AlphaGo -->
  <circle cx="376" cy="130" r="38" fill="#2D5A8E" opacity="0.9"/>
  <text x="376" y="125" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">AlphaGo</text>
  <text x="376" y="142" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">defeats</text>
  <text x="376" y="155" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Lee Sedol</text>
  <line x1="376" y1="168" x2="376" y2="210" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- AlphaFold -->
  <circle cx="525" cy="125" r="42" fill="#7C2530" opacity="0.9"/>
  <text x="525" y="118" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle" font-weight="bold">AlphaFold</text>
  <text x="525" y="134" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Protein Structure</text>
  <text x="525" y="148" font-family="Georgia, serif" font-size="10" fill="#FDFAF4" text-anchor="middle">Prediction</text>
  <line x1="525" y1="167" x2="525" y2="210" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Nobel Prize -->
  <circle cx="670" cy="130" r="38" fill="#C4A87A" opacity="0.95"/>
  <text x="670" y="122" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Nobel Prize</text>
  <text x="670" y="137" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">in Chemistry</text>
  <text x="670" y="152" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">2024</text>
  <line x1="670" y1="168" x2="670" y2="210" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Connecting arc labels below timeline -->
  <!-- Games to Science arc -->
  <path d="M 160,270 Q 300,340 480,270" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="325" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Games as AI testbed</text>

  <path d="M 460,270 Q 580,350 680,270" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="570" y="340" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle" font-style="italic">AI for Science</text>

  <!-- Subtitle -->
  <text x="400" y="385" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">From chess prodigy to Nobel laureate — intelligence as the ultimate meta-solution</text>
</svg>