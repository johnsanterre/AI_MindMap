<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#7C2530" text-anchor="middle">The Jackson Laboratory (JAX)</text>

  <!-- Dividers -->
  <line x1="267" y1="50" x2="267" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="533" y1="50" x2="533" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- === LEFT PANEL: Identity Facts === -->
  <text x="133" y="70" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Identity</text>

  <rect x="18" y="82" width="228" height="30" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="132" y="97" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Non-Profit Independent Institute</text>
  <text x="132" y="110" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">No university affiliation</text>

  <rect x="18" y="120" width="228" height="30" rx="4" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="132" y="135" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Founded 1929 · Bar Harbor, Maine</text>
  <text x="132" y="148" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">~2,500 employees</text>

  <rect x="18" y="158" width="228" height="30" rx="4" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1"/>
  <text x="132" y="173" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Mouse Genetics + Genomics</text>
  <text x="132" y="186" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">World's largest inbred mouse supplier</text>

  <rect x="18" y="196" width="228" height="30" rx="4" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1"/>
  <text x="132" y="211" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">~3 million mice/year</text>
  <text x="132" y="224" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">To research institutions worldwide</text>

  <!-- Campuses -->
  <text x="132" y="248" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Campuses</text>
  <text x="132" y="263" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Bar Harbor ME — mouse genetics HQ</text>
  <text x="132" y="277" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Farmington CT — genomic medicine</text>
  <text x="132" y="291" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Sacramento CA — branch campus</text>

  <!-- MGI note -->
  <rect x="18" y="302" width="228" height="30" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="132" y="317" font-family="Georgia, serif" font-size="10.5" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Mouse Genome Informatics (MGI)</text>
  <text x="132" y="330" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">One of biology's largest curated databases</text>

  <!-- === CENTER PANEL: Computational Biology Focus === -->
  <text x="400" y="70" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Computational Biology Focus</text>

  <rect x="278" y="82" width="245" height="40" rx="5" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="98" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Single-Cell RNA-seq Analysis</text>
  <text x="400" y="114" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Deep learning for cell type classification</text>

  <rect x="278" y="130" width="245" height="40" rx="5" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="400" y="146" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Cancer Genomics</text>
  <text x="400" y="162" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">ML for cancer driver gene identification</text>

  <rect x="278" y="178" width="245" height="40" rx="5" fill="#5C3D1E" fill-opacity="0.1" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="194" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Clinical Variant Interpretation</text>
  <text x="400" y="210" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">ML for diagnostic genomics (JAX-GM, CT)</text>

  <rect x="278" y="226" width="245" height="40" rx="5" fill="#C4A87A" fill-opacity="0.3" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="400" y="242" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Mouse Phenotyping</text>
  <text x="400" y="258" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Computer vision for behavioral analysis</text>

  <rect x="278" y="274" width="245" height="40" rx="5" fill="#7C2530" fill-opacity="0.07" stroke="#7C2530" stroke-width="1"/>
  <text x="400" y="290" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">GWAS Analysis</text>
  <text x="400" y="306" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">ML for genome-wide association studies</text>

  <!-- Collaborators -->
  <text x="400" y="332" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Collaborators: Broad Institute · NCI · NIH</text>

  <!-- === RIGHT PANEL: The JAX Model === -->
  <text x="667" y="70" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">The JAX Model</text>

  <!-- Revenue box -->
  <rect x="562" y="82" width="210" height="40" rx="5" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="2"/>
  <text x="667" y="98" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Mouse Sales Revenue</text>
  <text x="667" y="113" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">$350M+/year · 3M mice to labs</text>

  <!-- Arrow down -->
  <line x1="667" y1="122" x2="667" y2="140" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="667,144 661,134 673,134" fill="#5C3D1E"/>

  <!-- Research Funding box -->
  <rect x="562" y="148" width="210" height="40" rx="5" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="2"/>
  <text x="667" y="164" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Research Funding</text>
  <text x="667" y="179" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Mouse revenue + NIH grants</text>

  <!-- Arrow down -->
  <line x1="667" y1="188" x2="667" y2="206" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="667,210 661,200 673,200" fill="#5C3D1E"/>

  <!-- ML Research box -->
  <rect x="562" y="214" width="210" height="40" rx="5" fill="#5C3D1E" fill-opacity="0.12" stroke="#5C3D1E" stroke-width="2"/>
  <text x="667" y="230" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Genomics ML Research</text>
  <text x="667" y="245" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Independent · no commercialization pressure</text>

  <!-- Arrow down -->
  <line x1="667" y1="254" x2="667" y2="272" stroke="#5C3D1E" stroke-width="2"/>
  <polygon points="667,276 661,266 673,266" fill="#5C3D1E"/>

  <!-- Open Data box -->
  <rect x="562" y="280" width="210" height="40" rx="5" fill="#C4A87A" fill-opacity="0.3" stroke="#C4A87A" stroke-width="2"/>
  <text x="667" y="296" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Open Data Resources</text>
  <text x="667" y="311" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">MGI · public genomics databases</text>

  <!-- Freedom note -->
  <text x="667" y="343" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle" font-style="italic">Non-profit model = academic freedom</text>
  <text x="667" y="357" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" text-anchor="middle" font-style="italic">without university politics</text>
</svg>
