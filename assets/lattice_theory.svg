<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="26" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Lattice Theory: Partial Orders with Meets and Joins</text>

  <!-- ═══════════════════════════════════════
       PANEL 1: A Small Lattice (Hasse Diagram)
       Left panel x: 18–280
  ════════════════════════════════════════ -->
  <rect x="18" y="38" width="262" height="322" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="149" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Hasse Diagram: Divisors of 12</text>

  <!-- Nodes: 1, 2, 3, 4, 6, 12 arranged as lattice -->
  <!-- Bottom: 1 -->
  <circle cx="149" cy="320" r="16" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="149" y="324" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">1</text>
  <text x="149" y="348" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">bottom (⊥)</text>

  <!-- Level 2: 2 and 3 -->
  <circle cx="99" cy="250" r="16" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="99" y="254" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">2</text>

  <circle cx="199" cy="250" r="16" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="199" y="254" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">3</text>

  <!-- Level 3: 4 and 6 -->
  <circle cx="69" cy="170" r="16" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.8"/>
  <text x="69" y="174" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">4</text>

  <circle cx="169" cy="170" r="16" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.8"/>
  <text x="169" y="174" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">6</text>

  <!-- Top: 12 -->
  <circle cx="119" cy="90" r="16" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="119" y="94" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">12</text>
  <text x="119" y="76" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">top (⊤)</text>

  <!-- Edges (covering relations) -->
  <!-- 1 -> 2 -->
  <line x1="137" y1="307" x2="111" y2="263" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- 1 -> 3 -->
  <line x1="161" y1="307" x2="187" y2="263" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- 2 -> 4 -->
  <line x1="90" y1="235" x2="78" y2="185" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- 2 -> 6 -->
  <line x1="114" y1="238" x2="154" y2="183" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- 3 -> 6 -->
  <line x1="184" y1="238" x2="184" y2="183" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- 4 -> 12 -->
  <line x1="82" y1="157" x2="106" y2="103" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- 6 -> 12 -->
  <line x1="156" y1="157" x2="132" y2="103" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Meet/Join labels -->
  <text x="230" y="95" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">4 ∨ 6 = 12 (join)</text>
  <text x="230" y="110" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">4 ∧ 6 = 2 (meet)</text>
  <text x="230" y="135" font-family="Georgia, serif" font-size="8" fill="#7C2530">meet = gcd</text>
  <text x="230" y="148" font-family="Georgia, serif" font-size="8" fill="#7C2530">join = lcm</text>

  <!-- ═══════════════════════════════════════
       PANEL 2: Meet and Join Operations
       Middle panel x: 290–530
  ════════════════════════════════════════ -->
  <rect x="290" y="38" width="240" height="155" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="410" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Meet (∧) and Join (∨)</text>

  <!-- Meet diagram: V shape -->
  <circle cx="340" cy="90" r="11" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="340" y="94" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">a</text>
  <circle cx="400" cy="90" r="11" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="94" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">b</text>
  <circle cx="370" cy="140" r="11" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="370" y="144" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">a∧b</text>
  <line x1="345" y1="100" x2="365" y2="130" stroke="#5C3D1E" stroke-width="1.3"/>
  <line x1="395" y1="100" x2="375" y2="130" stroke="#5C3D1E" stroke-width="1.3"/>
  <text x="370" y="170" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">greatest lower bound</text>
  <text x="370" y="183" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle">(infimum)</text>

  <!-- Join diagram: inverted V shape -->
  <circle cx="460" cy="140" r="11" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="460" y="144" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">a</text>
  <circle cx="520" cy="140" r="11" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.5"/>
  <text x="520" y="144" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">b</text>
  <circle cx="490" cy="90" r="11" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="490" y="94" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">a∨b</text>
  <line x1="465" y1="130" x2="485" y2="100" stroke="#5C3D1E" stroke-width="1.3"/>
  <line x1="515" y1="130" x2="495" y2="100" stroke="#5C3D1E" stroke-width="1.3"/>
  <text x="490" y="170" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">least upper bound</text>
  <text x="490" y="183" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">(supremum)</text>

  <!-- ═══════════════════════════════════════
       PANEL 3: Types of Lattices
       Middle-bottom panel x: 290–530
  ════════════════════════════════════════ -->
  <rect x="290" y="200" width="240" height="160" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="410" y="220" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Lattice Hierarchy</text>

  <text x="310" y="242" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Poset</text>
  <text x="320" y="260" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">⊇ Lattice</text>
  <text x="330" y="278" font-family="Georgia, serif" font-size="10" fill="#7C2530">⊇ Bounded Lattice</text>
  <text x="340" y="296" font-family="Georgia, serif" font-size="10" fill="#7C2530">⊇ Distributive</text>
  <text x="350" y="314" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">⊇ Boolean Algebra</text>
  <text x="350" y="332" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">(complemented + distributive)</text>
  <text x="350" y="348" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">⊇ Complete Lattice</text>

  <!-- ═══════════════════════════════════════
       PANEL 4: Applications
       Right panel x: 540–782
  ════════════════════════════════════════ -->
  <rect x="540" y="38" width="244" height="322" rx="8" fill="#F5F0E6" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="662" y="58" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Applications</text>

  <!-- Concept lattice mini-diagram -->
  <text x="662" y="80" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Formal Concept Analysis</text>

  <!-- Small diamond lattice -->
  <circle cx="662" cy="100" r="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.2"/>
  <circle cx="625" cy="130" r="8" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.2"/>
  <circle cx="662" cy="130" r="8" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.2"/>
  <circle cx="699" cy="130" r="8" fill="#BBCCE0" stroke="#2D5A8E" stroke-width="1.2"/>
  <circle cx="662" cy="160" r="8" fill="#D4B8C0" stroke="#7C2530" stroke-width="1.2"/>
  <line x1="656" y1="107" x2="631" y2="123" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="662" y1="108" x2="662" y2="122" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="668" y1="107" x2="693" y2="123" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="631" y1="137" x2="656" y2="153" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="662" y1="138" x2="662" y2="152" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="693" y1="137" x2="668" y2="153" stroke="#5C3D1E" stroke-width="1"/>

  <text x="662" y="180" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Objects + attributes = concept hierarchy</text>

  <!-- Divider -->
  <line x1="555" y1="195" x2="769" y2="195" stroke="#C4A87A" stroke-width="1"/>

  <!-- Fixed Point -->
  <text x="662" y="215" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Fixed-Point Theorems</text>
  <text x="555" y="235" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Tarski: monotone f on complete lattice</text>
  <text x="555" y="250" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">⟹ least fixed point exists</text>
  <text x="555" y="268" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">lfp(f) = ∧{x : f(x) ≤ x}</text>

  <!-- Divider -->
  <line x1="555" y1="280" x2="769" y2="280" stroke="#C4A87A" stroke-width="1"/>

  <!-- More applications list -->
  <text x="662" y="298" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">In CS and AI</text>
  <text x="555" y="316" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Abstract interpretation (program analysis)</text>
  <text x="555" y="332" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Knowledge representation</text>
  <text x="555" y="348" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">• Type systems (subtyping lattices)</text>

  <!-- Bottom credit -->
  <text x="400" y="392" font-family="Georgia, serif" font-size="9" fill="#A09080" text-anchor="middle">Birkhoff (1940): foundational treatise on lattice theory</text>
</svg>
