<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">Takeo Kanade — Key Contributions</text>

  <!-- Central node -->
  <ellipse cx="400" cy="200" rx="90" ry="36" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FDFAF4" font-weight="bold">Takeo</text>
  <text x="400" y="213" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FDFAF4" font-weight="bold">Kanade</text>

  <!-- Spokes -->
  <!-- Lucas-Kanade (top-left) -->
  <line x1="330" y1="175" x2="170" y2="100" stroke="#C4A87A" stroke-width="2"/>
  <rect x="70" y="72" width="200" height="56" rx="10" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1"/>
  <text x="170" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Lucas-Kanade</text>
  <text x="170" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">Optical Flow (1981)</text>

  <!-- Face Detection (top-right) -->
  <line x1="470" y1="175" x2="630" y2="100" stroke="#C4A87A" stroke-width="2"/>
  <rect x="530" y="72" width="200" height="56" rx="10" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1"/>
  <text x="630" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Face Detection</text>
  <text x="630" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">& Tracking (1990s)</text>

  <!-- CMU Robotics Institute (left) -->
  <line x1="310" y1="200" x2="170" y2="220" stroke="#C4A87A" stroke-width="2"/>
  <rect x="50" y="196" width="200" height="56" rx="10" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1"/>
  <text x="150" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">CMU Robotics</text>
  <text x="150" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">Institute Director</text>

  <!-- Navlab (right) -->
  <line x1="490" y1="200" x2="630" y2="220" stroke="#C4A87A" stroke-width="2"/>
  <rect x="550" y="196" width="200" height="56" rx="10" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1"/>
  <text x="650" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Navlab</text>
  <text x="650" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">Autonomous Driving</text>

  <!-- EyeVision (bottom-left) -->
  <line x1="345" y1="230" x2="200" y2="330" stroke="#C4A87A" stroke-width="2"/>
  <rect x="100" y="308" width="200" height="56" rx="10" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="200" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">EyeVision</text>
  <text x="200" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Multi-Camera (2001)</text>

  <!-- 3D Reconstruction (bottom-right) -->
  <line x1="455" y1="230" x2="600" y2="330" stroke="#C4A87A" stroke-width="2"/>
  <rect x="500" y="308" width="200" height="56" rx="10" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="600" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">3D Reconstruction</text>
  <text x="600" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Shape from Shading</text>
</svg>