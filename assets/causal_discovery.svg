<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arrow-navy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arrow-brown" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#5C3D1E" letter-spacing="1.5">CAUSAL DISCOVERY: FROM DATA TO DAG</text>

  <!-- Divider lines for 3 panels -->
  <line x1="267" y1="42" x2="267" y2="360" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="533" y1="42" x2="533" y2="360" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ PANEL 1: CONSTRAINT-BASED (PC) ═══ -->
  <text x="134" y="56" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Constraint-Based (PC)</text>
  <text x="134" y="70" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">Test conditional independences</text>

  <!-- Step 1: Complete graph -->
  <text x="134" y="92" text-anchor="middle" font-size="8" fill="#5C3D1E">Step 1: Start fully connected</text>
  <circle cx="80" cy="120" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="80" y="124" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">X</text>
  <circle cx="188" cy="120" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="188" y="124" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Y</text>
  <circle cx="134" cy="170" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="134" y="174" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Z</text>
  <line x1="96" y1="120" x2="172" y2="120" stroke="#2D5A8E" stroke-width="1.4"/>
  <line x1="86" y1="134" x2="120" y2="160" stroke="#2D5A8E" stroke-width="1.4"/>
  <line x1="182" y1="134" x2="148" y2="160" stroke="#2D5A8E" stroke-width="1.4"/>

  <!-- Step 2: Remove edge -->
  <text x="134" y="208" text-anchor="middle" font-size="8" fill="#5C3D1E">Step 2: X ⊥ Y | Z → remove edge</text>
  <circle cx="80" cy="236" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="80" y="240" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">X</text>
  <circle cx="188" cy="236" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="188" y="240" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Y</text>
  <circle cx="134" cy="286" r="16" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="134" y="290" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">Z</text>
  <!-- removed X-Y edge shown as dashed red -->
  <line x1="96" y1="236" x2="172" y2="236" stroke="#7C2530" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="134" y="230" text-anchor="middle" font-size="7" fill="#7C2530">removed</text>
  <line x1="86" y1="250" x2="120" y2="276" stroke="#2D5A8E" stroke-width="1.4" marker-end="url(#arrow-navy)"/>
  <line x1="182" y1="250" x2="148" y2="276" stroke="#2D5A8E" stroke-width="1.4" marker-start="url(#arrow-navy)"/>

  <!-- Step 3: Orient -->
  <text x="134" y="324" text-anchor="middle" font-size="8" fill="#5C3D1E">Step 3: Orient v-structures</text>
  <text x="134" y="348" text-anchor="middle" font-size="9" fill="#2D5A8E">X → Z ← Y</text>

  <!-- ═══ PANEL 2: SCORE-BASED (GES) ═══ -->
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Score-Based (GES)</text>
  <text x="400" y="70" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">Maximize BIC / penalized likelihood</text>

  <!-- Score landscape -->
  <line x1="300" y1="310" x2="500" y2="310" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="300" y1="310" x2="300" y2="90" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="500" y="325" font-size="8" fill="#6B5D4F">DAG space</text>
  <text x="290" y="90" font-size="8" fill="#6B5D4F" text-anchor="end">Score</text>

  <!-- Score curve with peak -->
  <path d="M 310,280 C 325,260 340,220 355,180 C 365,155 375,120 395,105 C 415,120 430,155 440,180 C 455,210 470,250 490,280"
        fill="#7C2530" fill-opacity="0.08"
        stroke="#7C2530" stroke-width="2"/>

  <!-- Peak marker -->
  <line x1="395" y1="105" x2="395" y2="310" stroke="#7C2530" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <circle cx="395" cy="105" r="4" fill="#7C2530"/>
  <text x="395" y="96" text-anchor="middle" font-size="8" fill="#7C2530" font-weight="bold">best DAG</text>

  <!-- Forward phase arrow -->
  <line x1="320" y1="270" x2="370" y2="140" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow-brown)"/>
  <text x="330" y="195" font-size="7.5" fill="#5C3D1E" transform="rotate(-60,330,195)">add edges</text>

  <!-- Backward phase arrow -->
  <line x1="470" y1="260" x2="420" y2="130" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow-brown)"/>
  <text x="460" y="185" font-size="7.5" fill="#5C3D1E" transform="rotate(60,460,185)">delete edges</text>

  <!-- Small DAG examples along bottom -->
  <!-- Empty DAG -->
  <circle cx="325" cy="340" r="4" fill="none" stroke="#C4A87A" stroke-width="1"/>
  <circle cx="335" cy="340" r="4" fill="none" stroke="#C4A87A" stroke-width="1"/>
  <text x="330" y="360" text-anchor="middle" font-size="6.5" fill="#6B5D4F">empty</text>

  <!-- Optimal DAG -->
  <circle cx="390" cy="336" r="4" fill="#7C2530" fill-opacity="0.3" stroke="#7C2530" stroke-width="1"/>
  <circle cx="400" cy="336" r="4" fill="#7C2530" fill-opacity="0.3" stroke="#7C2530" stroke-width="1"/>
  <line x1="394" y1="336" x2="396" y2="336" stroke="#7C2530" stroke-width="1"/>
  <text x="395" y="360" text-anchor="middle" font-size="6.5" fill="#7C2530" font-weight="bold">optimal</text>

  <!-- Full DAG -->
  <circle cx="455" cy="340" r="4" fill="none" stroke="#C4A87A" stroke-width="1"/>
  <circle cx="465" cy="340" r="4" fill="none" stroke="#C4A87A" stroke-width="1"/>
  <line x1="459" y1="340" x2="461" y2="340" stroke="#C4A87A" stroke-width="1"/>
  <line x1="455" y1="336" x2="465" y2="344" stroke="#C4A87A" stroke-width="0.8"/>
  <text x="460" y="360" text-anchor="middle" font-size="6.5" fill="#6B5D4F">dense</text>

  <!-- ═══ PANEL 3: HYBRID / CONTINUOUS (NOTEARS) ═══ -->
  <text x="666" y="56" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Continuous (NOTEARS)</text>
  <text x="666" y="70" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">Optimize W with acyclicity constraint</text>

  <!-- Weighted adjacency matrix W -->
  <rect x="600" y="90" width="130" height="100" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.2" rx="3"/>
  <text x="665" y="82" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">W (adjacency matrix)</text>

  <!-- Matrix entries -->
  <text x="625" y="115" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>
  <text x="665" y="115" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">w</text>
  <text x="705" y="115" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>
  <text x="625" y="145" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>
  <text x="665" y="145" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>
  <text x="705" y="145" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">w</text>
  <text x="625" y="175" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>
  <text x="665" y="175" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>
  <text x="705" y="175" text-anchor="middle" font-size="11" fill="#6B5D4F">0</text>

  <!-- Acyclicity constraint -->
  <rect x="590" y="210" width="152" height="40" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1" rx="3"/>
  <text x="666" y="228" text-anchor="middle" font-size="9" fill="#5C3D1E">DAG constraint:</text>
  <text x="666" y="242" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">tr(e^(W*W)) - d = 0</text>

  <!-- Arrow from matrix to resulting DAG -->
  <line x1="666" y1="260" x2="666" y2="278" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow-brown)"/>

  <!-- Resulting DAG -->
  <circle cx="620" cy="310" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="620" y="314" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">X</text>
  <circle cx="710" cy="310" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="710" y="314" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Y</text>
  <circle cx="666" cy="355" r="14" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.8"/>
  <text x="666" y="359" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">Z</text>
  <line x1="634" y1="310" x2="696" y2="310" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arrow-navy)"/>
  <line x1="716" y1="322" x2="678" y2="345" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- Bottom caption -->
  <text x="400" y="392" text-anchor="middle" font-size="9" fill="#6B5D4F">Three paradigms for learning causal DAG structure from observational data</text>
</svg>