<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Markov Chain: State Transitions and Convergence to Stationary Distribution</title>

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Section divider -->
  <line x1="430" y1="30" x2="430" y2="370" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT PANEL: Markov Chain Diagram ===== -->

  <!-- Panel label -->
  <text x="215" y="52" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">Markov Chain (4 states)</text>

  <!-- State nodes -->
  <!-- S (Sunny) top-left area -->
  <circle cx="130" cy="150" r="34" fill="#FDFAF4" stroke="#7C2530" stroke-width="2.5"/>
  <text x="130" y="145" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#7C2530" text-anchor="middle">S</text>
  <text x="130" y="163" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Sunny</text>

  <!-- C (Cloudy) top-right area -->
  <circle cx="310" cy="150" r="34" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="310" y="145" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2D5A8E" text-anchor="middle">C</text>
  <text x="310" y="163" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Cloudy</text>

  <!-- R (Rainy) bottom-right area -->
  <circle cx="310" cy="300" r="34" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="310" y="295" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">R</text>
  <text x="310" y="313" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Rainy</text>

  <!-- W (Windy) bottom-left area -->
  <circle cx="130" cy="300" r="34" fill="#FDFAF4" stroke="#C4A87A" stroke-width="2.5"/>
  <text x="130" y="295" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#C4A87A" text-anchor="middle">W</text>
  <text x="130" y="313" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">Windy</text>

  <!-- Arrows and transition probabilities -->

  <!-- S → C (right, top) -->
  <line x1="165" y1="143" x2="275" y2="143" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="220" y="133" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">0.6</text>

  <!-- C → S (left, below S→C) -->
  <line x1="276" y1="158" x2="166" y2="158" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arrowNavy)"/>
  <text x="220" y="175" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">0.3</text>

  <!-- S → W (down, left) -->
  <line x1="123" y1="184" x2="123" y2="265" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="100" y="228" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">0.3</text>

  <!-- W → S (up, right of S→W) -->
  <line x1="137" y1="266" x2="137" y2="185" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arrowTan)"/>
  <text x="160" y="228" font-family="Georgia, serif" font-size="12" fill="#C4A87A" text-anchor="middle">0.4</text>

  <!-- C → R (down) -->
  <line x1="303" y1="184" x2="303" y2="265" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arrowNavy)"/>
  <text x="282" y="228" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">0.5</text>

  <!-- R → C (up) -->
  <line x1="317" y1="266" x2="317" y2="185" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#arrowBrown)"/>
  <text x="340" y="228" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">0.3</text>

  <!-- W → R (right, bottom) -->
  <line x1="165" y1="307" x2="275" y2="307" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arrowTan)"/>
  <text x="220" y="325" font-family="Georgia, serif" font-size="12" fill="#C4A87A" text-anchor="middle">0.4</text>

  <!-- R → W (left, above W→R) -->
  <line x1="276" y1="293" x2="166" y2="293" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#arrowBrown)"/>
  <text x="220" y="285" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">0.3</text>

  <!-- S self-loop (top) -->
  <path d="M 116 117 C 100 80 155 75 148 117" fill="none" stroke="#7C2530" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="128" y="80" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">0.1</text>

  <!-- C self-loop (top) -->
  <path d="M 296 117 C 280 80 335 75 328 117" fill="none" stroke="#2D5A8E" stroke-width="1.8" marker-end="url(#arrowNavy)"/>
  <text x="308" y="80" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle">0.2</text>

  <!-- R self-loop (right) -->
  <path d="M 343 310 C 385 295 385 335 343 325" fill="none" stroke="#5C3D1E" stroke-width="1.8" marker-end="url(#arrowBrown)"/>
  <text x="395" y="318" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">0.4</text>

  <!-- W self-loop (left) -->
  <path d="M 97 290 C 55 278 52 322 96 315" fill="none" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arrowTan)"/>
  <text x="40" y="307" font-family="Georgia, serif" font-size="12" fill="#C4A87A" text-anchor="middle">0.2</text>

  <!-- ===== RIGHT PANEL: Convergence to Stationary Distribution ===== -->

  <!-- Panel label -->
  <text x="615" y="52" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">Convergence to Stationary π</text>

  <!-- Axes -->
  <line x1="470" y1="340" x2="770" y2="340" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="470" y1="340" x2="470" y2="70" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="453" y="210" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,453,210)">Probability</text>

  <!-- X axis label -->
  <text x="620" y="368" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Time steps (n)</text>

  <!-- X axis ticks and labels -->
  <line x1="470" y1="340" x2="470" y2="346" stroke="#5C3D1E" stroke-width="1"/>
  <text x="470" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">0</text>
  <line x1="530" y1="340" x2="530" y2="346" stroke="#5C3D1E" stroke-width="1"/>
  <text x="530" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">2</text>
  <line x1="590" y1="340" x2="590" y2="346" stroke="#5C3D1E" stroke-width="1"/>
  <text x="590" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">4</text>
  <line x1="650" y1="340" x2="650" y2="346" stroke="#5C3D1E" stroke-width="1"/>
  <text x="650" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">6</text>
  <line x1="710" y1="340" x2="710" y2="346" stroke="#5C3D1E" stroke-width="1"/>
  <text x="710" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">8</text>
  <line x1="760" y1="340" x2="760" y2="346" stroke="#5C3D1E" stroke-width="1"/>
  <text x="760" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10</text>

  <!-- Y axis ticks -->
  <line x1="470" y1="340" x2="464" y2="340" stroke="#5C3D1E" stroke-width="1"/>
  <text x="460" y="344" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="end">0</text>
  <line x1="470" y1="205" x2="464" y2="205" stroke="#5C3D1E" stroke-width="1"/>
  <text x="460" y="209" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="end">.5</text>
  <line x1="470" y1="70" x2="464" y2="70" stroke="#5C3D1E" stroke-width="1"/>
  <text x="460" y="74" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="end">1</text>

  <!-- Stationary distribution dashed reference lines -->
  <!-- π(S) ≈ 0.28 → y = 340 - 0.28*270 = 340 - 75.6 = 264 -->
  <line x1="470" y1="264" x2="770" y2="264" stroke="#7C2530" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- π(C) ≈ 0.34 → y = 340 - 0.34*270 = 340 - 91.8 = 248 -->
  <line x1="470" y1="248" x2="770" y2="248" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- π(R) ≈ 0.22 → y = 340 - 0.22*270 = 340 - 59.4 = 281 -->
  <line x1="470" y1="281" x2="770" y2="281" stroke="#5C3D1E" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- π(W) ≈ 0.16 → y = 340 - 0.16*270 = 340 - 43.2 = 297 -->
  <line x1="470" y1="297" x2="770" y2="297" stroke="#C4A87A" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Convergence curves: S starts at 1.0, others at 0. Exponential decay toward stationary -->
  <!-- S: starts y=70 (prob=1), converges to y=264 (prob≈0.28) -->
  <polyline points="470,70 530,148 590,213 650,245 710,258 760,263" fill="none" stroke="#7C2530" stroke-width="2.2"/>
  <!-- C: starts y=340 (prob=0), converges to y=248 (prob≈0.34) -->
  <polyline points="470,340 530,262 590,242 650,247 710,249 760,249" fill="none" stroke="#2D5A8E" stroke-width="2.2"/>
  <!-- R: starts y=340 (prob=0), converges to y=281 (prob≈0.22) -->
  <polyline points="470,340 530,306 590,290 650,284 710,282 760,281" fill="none" stroke="#5C3D1E" stroke-width="2.2"/>
  <!-- W: starts y=340 (prob=0), converges to y=297 (prob≈0.16) -->
  <polyline points="470,340 530,320 590,306 650,300 710,298 760,297" fill="none" stroke="#C4A87A" stroke-width="2.2"/>

  <!-- Legend -->
  <rect x="472" y="76" width="10" height="10" fill="#7C2530"/>
  <text x="487" y="86" font-family="Georgia, serif" font-size="11" fill="#7C2530">S (starts at 1)</text>
  <rect x="472" y="94" width="10" height="10" fill="#2D5A8E"/>
  <text x="487" y="104" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">C (starts at 0)</text>
  <rect x="472" y="112" width="10" height="10" fill="#5C3D1E"/>
  <text x="487" y="122" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">R (starts at 0)</text>
  <rect x="472" y="130" width="10" height="10" fill="#C4A87A"/>
  <text x="487" y="140" font-family="Georgia, serif" font-size="11" fill="#C4A87A">W (starts at 0)</text>

  <!-- π label near stationary lines -->
  <text x="756" y="258" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-style="italic">π</text>
  <text x="756" y="243" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-style="italic">π</text>
  <text x="756" y="276" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">π</text>
  <text x="756" y="292" font-family="Georgia, serif" font-size="10" fill="#C4A87A" font-style="italic">π</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowNavy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowBrown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowTan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>
