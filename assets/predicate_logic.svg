<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#7C2530" letter-spacing="1">PREDICATE LOGIC: QUANTIFIERS &amp; DOMAINS</text>

  <!-- Left Panel: Universal Quantifier -->
  <rect x="40" y="55" width="340" height="155" fill="none" stroke="#2D5A8E" stroke-width="1.5" rx="8"/>
  <text x="210" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D5A8E">Universal Quantifier</text>

  <!-- Forall symbol -->
  <text x="80" y="135" text-anchor="middle" font-size="52" fill="#2D5A8E" font-weight="bold">&#x2200;</text>
  <text x="80" y="158" text-anchor="middle" font-size="10" fill="#5C3D1E">for all</text>

  <!-- Formula -->
  <text x="230" y="115" text-anchor="middle" font-size="13" fill="#5C3D1E">&#x2200;x (Student(x) &#x2192; Learns(x))</text>
  <text x="230" y="138" text-anchor="middle" font-size="11" fill="#6B5D4F" font-style="italic">"Every student learns"</text>

  <!-- Domain circles for universal -->
  <circle cx="160" cy="175" r="10" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <circle cx="190" cy="175" r="10" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <circle cx="220" cy="175" r="10" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <circle cx="250" cy="175" r="10" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <circle cx="280" cy="175" r="10" fill="#2D5A8E" opacity="0.25" stroke="#2D5A8E" stroke-width="1"/>
  <text x="160" y="179" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">&#x2713;</text>
  <text x="190" y="179" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">&#x2713;</text>
  <text x="220" y="179" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">&#x2713;</text>
  <text x="250" y="179" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">&#x2713;</text>
  <text x="280" y="179" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">&#x2713;</text>
  <text x="320" y="179" text-anchor="middle" font-size="10" fill="#5C3D1E">all true</text>

  <!-- Right Panel: Existential Quantifier -->
  <rect x="420" y="55" width="340" height="155" fill="none" stroke="#7C2530" stroke-width="1.5" rx="8"/>
  <text x="590" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#7C2530">Existential Quantifier</text>

  <!-- Exists symbol -->
  <text x="460" y="135" text-anchor="middle" font-size="52" fill="#7C2530" font-weight="bold">&#x2203;</text>
  <text x="460" y="158" text-anchor="middle" font-size="10" fill="#5C3D1E">there exists</text>

  <!-- Formula -->
  <text x="610" y="115" text-anchor="middle" font-size="13" fill="#5C3D1E">&#x2203;x (Network(x) &#x2227; Deep(x))</text>
  <text x="610" y="138" text-anchor="middle" font-size="11" fill="#6B5D4F" font-style="italic">"Some network is deep"</text>

  <!-- Domain circles for existential -->
  <circle cx="540" cy="175" r="10" fill="#C4A87A" opacity="0.3" stroke="#C4A87A" stroke-width="1"/>
  <circle cx="570" cy="175" r="10" fill="#C4A87A" opacity="0.3" stroke="#C4A87A" stroke-width="1"/>
  <circle cx="600" cy="175" r="10" fill="#7C2530" opacity="0.3" stroke="#7C2530" stroke-width="1.5"/>
  <circle cx="630" cy="175" r="10" fill="#C4A87A" opacity="0.3" stroke="#C4A87A" stroke-width="1"/>
  <circle cx="660" cy="175" r="10" fill="#C4A87A" opacity="0.3" stroke="#C4A87A" stroke-width="1"/>
  <text x="540" y="179" text-anchor="middle" font-size="9" fill="#C4A87A" font-weight="bold">&#x2717;</text>
  <text x="570" y="179" text-anchor="middle" font-size="9" fill="#C4A87A" font-weight="bold">&#x2717;</text>
  <text x="600" y="179" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">&#x2713;</text>
  <text x="630" y="179" text-anchor="middle" font-size="9" fill="#C4A87A" font-weight="bold">&#x2717;</text>
  <text x="660" y="179" text-anchor="middle" font-size="9" fill="#C4A87A" font-weight="bold">&#x2717;</text>
  <text x="700" y="179" text-anchor="middle" font-size="10" fill="#5C3D1E">&#x2265;1 true</text>

  <!-- Bottom Panel: Predicate Structure -->
  <rect x="40" y="230" width="720" height="150" fill="none" stroke="#5C3D1E" stroke-width="1.2" rx="8" stroke-dasharray="6,3"/>
  <text x="400" y="253" text-anchor="middle" font-size="13" font-weight="bold" fill="#5C3D1E">From Propositional to Predicate Logic</text>

  <!-- Propositional side -->
  <rect x="70" y="268" width="200" height="45" fill="#C4A87A" opacity="0.2" stroke="#C4A87A" stroke-width="1" rx="5"/>
  <text x="170" y="285" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Propositional Logic</text>
  <text x="170" y="303" text-anchor="middle" font-size="11" fill="#5C3D1E">P, Q, P &#x2227; Q, P &#x2192; Q</text>

  <!-- Arrow -->
  <line x1="285" y1="290" x2="365" y2="290" stroke="#7C2530" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="325" y="282" text-anchor="middle" font-size="9" fill="#7C2530">add variables,</text>
  <text x="325" y="294" text-anchor="middle" font-size="9" fill="#7C2530">predicates,</text>
  <text x="325" y="306" text-anchor="middle" font-size="9" fill="#7C2530">quantifiers</text>

  <!-- Predicate side -->
  <rect x="380" y="268" width="250" height="45" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1" rx="5"/>
  <text x="505" y="285" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Predicate (First-Order) Logic</text>
  <text x="505" y="303" text-anchor="middle" font-size="11" fill="#2D5A8E">&#x2200;x &#x2203;y P(x,y) &#x2227; Q(x)</text>

  <!-- Key components below -->
  <text x="100" y="345" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Predicates</text>
  <text x="100" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F">P(x), Likes(x,y)</text>

  <text x="260" y="345" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Variables</text>
  <text x="260" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F">x, y, z &#x2208; Domain</text>

  <text x="420" y="345" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Functions</text>
  <text x="420" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F">f(x), mother(x)</text>

  <text x="580" y="345" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Scope</text>
  <text x="580" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F">&#x2200;x(&#x2203;y P(x,y))</text>

  <text x="710" y="345" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Constants</text>
  <text x="710" y="360" text-anchor="middle" font-size="10" fill="#6B5D4F">a, b, Alice</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
