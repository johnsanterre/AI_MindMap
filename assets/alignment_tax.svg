<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">The Alignment Tax: Capability vs. Safety Tradeoff</text>

  <!-- Axis area: origin at (100, 330), x to 700, y to 50 -->

  <!-- Axes -->
  <line x1="100" y1="330" x2="700" y2="330" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="100" y1="330" x2="100" y2="50" stroke="#5C3D1E" stroke-width="2"/>

  <!-- Arrowheads -->
  <polygon points="700,330 690,325 690,335" fill="#5C3D1E"/>
  <polygon points="100,50 95,60 105,60" fill="#5C3D1E"/>

  <!-- Axis labels -->
  <text x="400" y="365" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle">Capability / Helpfulness →</text>
  <text x="28" y="190" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,28,190)">Safety / Alignment →</text>

  <!-- Axis tick labels -->
  <text x="100" y="346" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Low</text>
  <text x="690" y="346" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">High</text>
  <text x="88" y="334" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">Low</text>
  <text x="88" y="60" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="end">High</text>

  <!-- Pareto frontier curve: from (low-capability, high-alignment) to (high-capability, low-alignment) -->
  <!-- Curve points roughly: (150,95) -> (240,115) -> (360,155) -> (480,210) -> (580,280) -> (650,320) -->
  <path d="M 155,90 C 230,100 320,135 420,175 S 560,265 655,320"
        fill="none" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="none"/>
  <!-- Frontier label -->
  <text x="500" y="195" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-style="italic">Pareto Frontier</text>

  <!-- Infeasible region (above/right of frontier) shaded lightly -->
  <path d="M 155,90 C 230,100 320,135 420,175 S 560,265 655,320 L 655,60 L 155,60 Z"
        fill="#2D5A8E" fill-opacity="0.07"/>
  <text x="430" y="90" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" fill-opacity="0.7" text-anchor="middle">Infeasible region</text>

  <!-- === KEY MODELS === -->

  <!-- 1. Base Model: high capability, low alignment — (620, 315) approx on frontier low end -->
  <circle cx="625" cy="308" r="10" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="625" y="295" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Base Model</text>
  <text x="625" y="281" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">(high capability,</text>
  <text x="625" y="269" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">low alignment)</text>

  <!-- 2. Over-aligned model: low capability, high alignment — off-frontier, (190, 100) area -->
  <circle cx="190" cy="108" r="10" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="190" y="96" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Over-aligned</text>
  <text x="190" y="82" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">(low capability,</text>
  <text x="190" y="70" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">high alignment)</text>

  <!-- 3. Ideal model: on frontier, both high — approx (420, 175) -->
  <circle cx="420" cy="175" r="10" fill="#5C3D1E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="440" y="165" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="start">Ideal Model</text>
  <text x="440" y="179" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="start">(frontier — balanced)</text>

  <!-- === ALIGNMENT TAX annotation === -->
  <!-- Horizontal arrow from Ideal (420,175) showing capability drop to Over-aligned (190,175) -->
  <!-- Vertical brace between Base and Over-aligned on capability axis -->
  <!-- Show alignment tax as horizontal distance: from base ~620 to over-aligned ~190, at y=310 -->
  <line x1="190" y1="310" x2="625" y2="310" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="195,310 205,306 205,314" fill="#7C2530"/>
  <polygon points="620,310 610,306 610,314" fill="#7C2530"/>
  <rect x="340" y="298" width="122" height="18" rx="3" fill="#FDFAF4" opacity="0.85"/>
  <text x="401" y="311" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">← Alignment Tax →</text>
  <text x="401" y="327" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">(capability cost of alignment)</text>

  <!-- === METHOD ARROWS along frontier === -->
  <!-- RLHF: from base model direction toward ideal, short arrow -->
  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-navy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-tan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- RLHF arrow: along frontier from (560,255) toward (470,205) -->
  <path d="M 570,258 C 535,238 500,218 475,203"
        fill="none" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="550" y="222" width="42" height="16" rx="3" fill="#FDFAF4" opacity="0.9"/>
  <text x="571" y="234" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">RLHF</text>

  <!-- CAI arrow: along frontier from (370,162) toward (300,143) -->
  <path d="M 378,165 C 352,155 330,148 308,142"
        fill="none" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arr-navy)"/>
  <rect x="310" y="143" width="34" height="16" rx="3" fill="#FDFAF4" opacity="0.9"/>
  <text x="327" y="155" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">CAI</text>

  <!-- DPO arrow: along frontier from (470,205) toward (420,181) offset slightly off-path -->
  <path d="M 465,208 C 450,200 438,192 425,184"
        fill="none" stroke="#C4A87A" stroke-width="2" marker-end="url(#arr-tan)"/>
  <rect x="444" y="208" width="36" height="16" rx="3" fill="#FDFAF4" opacity="0.9"/>
  <text x="462" y="220" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#C4A87A" text-anchor="middle">DPO</text>

  <!-- Legend -->
  <rect x="104" y="340" width="590" height="46" rx="4" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <circle cx="130" cy="357" r="6" fill="#7C2530"/>
  <text x="142" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Key models</text>
  <line x1="200" y1="357" x2="225" y2="357" stroke="#2D5A8E" stroke-width="2"/>
  <text x="230" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Pareto frontier</text>
  <line x1="305" y1="357" x2="330" y2="357" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="335" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Alignment tax (capability cost)</text>
  <line x1="510" y1="357" x2="525" y2="357" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="530" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">RLHF / CAI / DPO (frontier moves)</text>

  <!-- Second legend row -->
  <rect x="200" y="367" width="18" height="10" rx="2" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="0.8"/>
  <text x="222" y="377" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Infeasible: cannot achieve simultaneously without better methods</text>
</svg>
