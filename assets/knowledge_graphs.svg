<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="28" font-size="11" fill="#6B5D4F" letter-spacing="1.5" text-anchor="middle">KNOWLEDGE GRAPH: ENTITY-RELATION TRIPLES</text>

  <!-- Entity nodes -->
  <!-- Albert Einstein -->
  <ellipse cx="140" cy="150" rx="65" ry="22" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="140" y="154" font-size="11" fill="#2D5A8E" text-anchor="middle">Albert Einstein</text>

  <!-- General Relativity -->
  <ellipse cx="400" cy="80" rx="72" ry="22" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="84" font-size="11" fill="#7C2530" text-anchor="middle">General Relativity</text>

  <!-- Physics -->
  <ellipse cx="660" cy="150" rx="55" ry="22" fill="#5C3D1E" fill-opacity="0.12" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="660" y="154" font-size="11" fill="#5C3D1E" text-anchor="middle">Physics</text>

  <!-- Germany -->
  <ellipse cx="140" cy="300" rx="50" ry="22" fill="#5C3D1E" fill-opacity="0.12" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="140" y="304" font-size="11" fill="#5C3D1E" text-anchor="middle">Germany</text>

  <!-- Nobel Prize -->
  <ellipse cx="400" cy="250" rx="55" ry="22" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="400" y="254" font-size="11" fill="#5C3D1E" text-anchor="middle">Nobel Prize</text>

  <!-- 1921 -->
  <ellipse cx="660" cy="300" rx="35" ry="22" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="660" y="304" font-size="11" fill="#5C3D1E" text-anchor="middle">1921</text>

  <!-- Spacetime -->
  <ellipse cx="400" cy="160" rx="50" ry="22" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="164" font-size="11" fill="#7C2530" text-anchor="middle">Spacetime</text>

  <!-- Edge: Einstein → General Relativity (developed) -->
  <line x1="205" y1="140" x2="328" y2="90" stroke="#2D5A8E" stroke-width="1.5"/>
  <polygon points="325,94 332,88 330,97" fill="#2D5A8E"/>
  <text x="255" y="105" font-size="9.5" fill="#2D5A8E" font-style="italic">developed</text>

  <!-- Edge: General Relativity → Physics (field) -->
  <line x1="472" y1="80" x2="605" y2="142" stroke="#7C2530" stroke-width="1.5"/>
  <polygon points="602,138 609,144 601,146" fill="#7C2530"/>
  <text x="545" y="100" font-size="9.5" fill="#7C2530" font-style="italic">field_of</text>

  <!-- Edge: Einstein → Germany (born_in) -->
  <line x1="140" y1="172" x2="140" y2="278" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="137,275 140,282 143,275" fill="#5C3D1E"/>
  <text x="152" y="232" font-size="9.5" fill="#5C3D1E" font-style="italic">born_in</text>

  <!-- Edge: Einstein → Nobel Prize (awarded) -->
  <line x1="200" y1="165" x2="345" y2="242" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="342,238 349,244 341,246" fill="#C4A87A"/>
  <text x="245" y="215" font-size="9.5" fill="#5C3D1E" font-style="italic">awarded</text>

  <!-- Edge: Nobel Prize → 1921 (year) -->
  <line x1="455" y1="255" x2="625" y2="295" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="622,291 629,297 621,299" fill="#C4A87A"/>
  <text x="540" y="267" font-size="9.5" fill="#5C3D1E" font-style="italic">year</text>

  <!-- Edge: General Relativity → Spacetime (describes) -->
  <line x1="400" y1="102" x2="400" y2="138" stroke="#7C2530" stroke-width="1.5"/>
  <polygon points="397,135 400,142 403,135" fill="#7C2530"/>
  <text x="415" y="124" font-size="9.5" fill="#7C2530" font-style="italic">describes</text>

  <!-- Triple notation at bottom -->
  <text x="400" y="355" font-size="10" fill="#6B5D4F" text-anchor="middle">(head entity, relation, tail entity)</text>
  <text x="400" y="372" font-size="10" fill="#6B5D4F" text-anchor="middle">(Albert Einstein, developed, General Relativity)</text>
  <text x="400" y="389" font-size="9.5" fill="#6B5D4F" text-anchor="middle" font-style="italic">Structured knowledge as a directed graph of typed relationships</text>
</svg>
