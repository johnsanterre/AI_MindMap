<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="250" y1="20" x2="250" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="550" y1="20" x2="550" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL: Timeline ===== -->
  <text x="125" y="40" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Cosma Rohilla Shalizi</text>
  <text x="125" y="56" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Statistician · Complex Systems</text>

  <!-- Timeline line -->
  <line x1="60" y1="75" x2="60" y2="370" stroke="#C4A87A" stroke-width="2"/>

  <!-- BA Michigan -->
  <circle cx="60" cy="85" r="4" fill="#2D5A8E"/>
  <text x="72" y="82" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">1996</text>
  <text x="72" y="94" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">B.A., Univ. of Michigan</text>

  <!-- PhD Wisconsin -->
  <circle cx="60" cy="125" r="4" fill="#2D5A8E"/>
  <text x="72" y="122" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">2001</text>
  <text x="72" y="134" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Ph.D., Univ. of Wisconsin</text>
  <text x="72" y="144" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(Physics / Complex Sys.)</text>

  <!-- Santa Fe -->
  <circle cx="60" cy="170" r="4" fill="#5C3D1E"/>
  <text x="72" y="167" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">2001–04</text>
  <text x="72" y="179" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Santa Fe Institute</text>
  <text x="72" y="189" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Postdoctoral fellow</text>

  <!-- CMU join -->
  <circle cx="60" cy="212" r="5" fill="#7C2530"/>
  <text x="72" y="209" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">2005</text>
  <text x="72" y="221" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Joins CMU Statistics</text>

  <!-- Three-Toed Sloth blog -->
  <circle cx="60" cy="248" r="4" fill="#5C3D1E"/>
  <text x="72" y="245" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">2003+</text>
  <text x="72" y="257" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Three-Toed Sloth blog</text>

  <!-- ADA textbook -->
  <circle cx="60" cy="286" r="5" fill="#7C2530"/>
  <text x="72" y="283" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">2013+</text>
  <text x="72" y="295" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">ADA textbook (free online)</text>
  <text x="72" y="305" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">~900 pages, ongoing</text>

  <!-- Associate / Full Prof -->
  <circle cx="60" cy="332" r="4" fill="#5C3D1E"/>
  <text x="72" y="329" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">2013</text>
  <text x="72" y="341" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Full Professor, CMU</text>

  <!-- g-factor critique -->
  <circle cx="60" cy="365" r="4" fill="#C4A87A"/>
  <text x="72" y="362" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">ongoing</text>
  <text x="72" y="374" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Causal inference; g-factor</text>

  <!-- ===== CENTER PANEL: Complex Systems Diagram ===== -->
  <text x="400" y="40" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Shalizi's Conceptual Web</text>
  <text x="400" y="56" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Statistical mechanics → Machine learning</text>

  <!-- Stat Mechanics node -->
  <ellipse cx="320" cy="110" rx="55" ry="24" fill="#7C2530" opacity="0.88"/>
  <text x="320" y="106" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Statistical</text>
  <text x="320" y="119" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Mechanics</text>

  <!-- Dynamical Systems node -->
  <ellipse cx="480" cy="110" rx="55" ry="24" fill="#2D5A8E" opacity="0.88"/>
  <text x="480" y="106" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Dynamical</text>
  <text x="480" y="119" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Systems</text>

  <!-- Arrow: Stat Mech → center -->
  <line x1="375" y1="118" x2="390" y2="155" stroke="#C4A87A" stroke-width="1.8"/>
  <!-- Arrow: Dyn Sys → center -->
  <line x1="425" y1="118" x2="410" y2="155" stroke="#C4A87A" stroke-width="1.8"/>
  <!-- Bridge arrow between top two -->
  <line x1="375" y1="110" x2="425" y2="110" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Central hub: Ergodic / Mixing -->
  <ellipse cx="400" cy="185" rx="60" ry="26" fill="#5C3D1E" opacity="0.9"/>
  <text x="400" y="181" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Ergodic Theory</text>
  <text x="400" y="194" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">&amp; Mixing Processes</text>

  <!-- Mixing time annotation -->
  <text x="480" y="180" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="start" font-style="italic">β-mixing,</text>
  <text x="480" y="192" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="start" font-style="italic">α-mixing</text>

  <!-- Down arrows from mixing hub -->
  <line x1="365" y1="211" x2="330" y2="245" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="400" y1="211" x2="400" y2="245" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="435" y1="211" x2="470" y2="245" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Nonparam Time Series -->
  <ellipse cx="310" cy="262" rx="52" ry="20" fill="#2D5A8E" opacity="0.8"/>
  <text x="310" y="258" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">Nonparam.</text>
  <text x="310" y="270" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">Time Series</text>

  <!-- Causal Inference -->
  <ellipse cx="400" cy="262" rx="46" ry="20" fill="#7C2530" opacity="0.8"/>
  <text x="400" y="258" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">Causal</text>
  <text x="400" y="270" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">Inference</text>

  <!-- Learning Theory -->
  <ellipse cx="488" cy="262" rx="50" ry="20" fill="#5C3D1E" opacity="0.8"/>
  <text x="488" y="258" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">Statistical</text>
  <text x="488" y="270" font-family="Georgia, serif" font-size="8.5" fill="white" text-anchor="middle">Learning Theory</text>

  <!-- Info Theory bottom -->
  <ellipse cx="400" cy="325" rx="58" ry="22" fill="#C4A87A" opacity="0.85"/>
  <text x="400" y="321" font-family="Georgia, serif" font-size="9" fill="#3C2010" text-anchor="middle" font-weight="bold">Information Theory</text>
  <text x="400" y="334" font-family="Georgia, serif" font-size="8" fill="#3C2010" text-anchor="middle">&amp; Complexity Measures</text>
  <line x1="330" y1="282" x2="370" y2="308" stroke="#C4A87A" stroke-width="1"/>
  <line x1="400" y1="282" x2="400" y2="303" stroke="#C4A87A" stroke-width="1"/>
  <line x1="470" y1="282" x2="430" y2="308" stroke="#C4A87A" stroke-width="1"/>

  <text x="400" y="367" font-family="Georgia, serif" font-size="8.5" fill="#888" text-anchor="middle" font-style="italic">ε-machines · causal states · effective complexity</text>

  <!-- ===== RIGHT PANEL: Key Works ===== -->
  <text x="675" y="40" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Key Works</text>

  <!-- ADA textbook -->
  <rect x="565" y="58" width="210" height="80" rx="5" fill="#2D5A8E" opacity="0.10" stroke="#2D5A8E" stroke-width="1"/>
  <text x="670" y="76" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Advanced Data Analysis</text>
  <text x="670" y="89" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">from an Elementary</text>
  <text x="670" y="102" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Point of View</text>
  <text x="670" y="117" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">~900 pp, free online; 2013–present</text>
  <text x="670" y="130" font-family="Georgia, serif" font-size="8" fill="#7C2530" text-anchor="middle">Widely used graduate text</text>

  <!-- Complex Systems papers -->
  <rect x="565" y="150" width="210" height="72" rx="5" fill="#7C2530" opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="670" y="168" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Complex Systems Papers</text>
  <text x="670" y="182" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">ε-machine reconstruction;</text>
  <text x="670" y="194" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">computational mechanics;</text>
  <text x="670" y="208" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">mixing-based learning bounds</text>

  <!-- Causal / g-factor -->
  <rect x="565" y="234" width="210" height="62" rx="5" fill="#5C3D1E" opacity="0.10" stroke="#5C3D1E" stroke-width="1"/>
  <text x="670" y="252" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Causal Inference Work</text>
  <text x="670" y="266" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">g-factor critique; graphical</text>
  <text x="670" y="280" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">models; regression &amp; causation</text>

  <!-- Three-Toed Sloth -->
  <rect x="565" y="308" width="210" height="62" rx="5" fill="#C4A87A" opacity="0.18" stroke="#C4A87A" stroke-width="1"/>
  <text x="670" y="326" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Three-Toed Sloth Blog</text>
  <text x="670" y="340" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Statistical commentary since 2003</text>
  <text x="670" y="354" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Philosophy of statistics;</text>
  <text x="670" y="366" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">methodology criticism</text>
</svg>
