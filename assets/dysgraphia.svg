<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">The Writing Pipeline &amp; Where Dysgraphia Disrupts It</text>

  <!-- Brain region boxes (top row) -->
  <!-- Broca's Area -->
  <rect x="30" y="60" width="140" height="55" rx="6" fill="#2D5A8E" opacity="0.9"/>
  <text x="100" y="82" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Broca's Area</text>
  <text x="100" y="100" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">(Language Planning)</text>

  <!-- Angular Gyrus -->
  <rect x="210" y="60" width="140" height="55" rx="6" fill="#2D5A8E" opacity="0.9"/>
  <text x="280" y="82" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Angular Gyrus</text>
  <text x="280" y="100" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">(Letter Retrieval)</text>

  <!-- Motor Cortex -->
  <rect x="390" y="60" width="140" height="55" rx="6" fill="#2D5A8E" opacity="0.9"/>
  <text x="460" y="82" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Motor Cortex</text>
  <text x="460" y="100" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">(Motor Programs)</text>

  <!-- Cerebellum -->
  <rect x="570" y="60" width="140" height="55" rx="6" fill="#2D5A8E" opacity="0.9"/>
  <text x="640" y="82" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle">Cerebellum</text>
  <text x="640" y="100" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">(Fine Coordination)</text>

  <!-- Arrows between brain regions -->
  <line x1="170" y1="87" x2="210" y2="87" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="87" x2="390" y2="87" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="87" x2="570" y2="87" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5C3D1E"/>
    </marker>
    <marker id="redarrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Arrow down to hand -->
  <line x1="640" y1="115" x2="640" y2="145" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Hand / Output box -->
  <rect x="570" y="145" width="140" height="45" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="640" y="173" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" text-anchor="middle">Hand Movement</text>

  <!-- Disruption indicators (lightning bolts / X marks) -->
  <!-- Disruption at Angular Gyrus (dyslexic subtype) -->
  <text x="280" y="140" font-family="Georgia, serif" font-size="16" fill="#7C2530" text-anchor="middle" font-weight="bold">X Dyslexic Type</text>
  <line x1="280" y1="115" x2="280" y2="127" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="3,2"/>

  <!-- Disruption at Motor Cortex (motor subtype) -->
  <text x="460" y="140" font-family="Georgia, serif" font-size="16" fill="#7C2530" text-anchor="middle" font-weight="bold">X Motor Type</text>
  <line x1="460" y1="115" x2="460" y2="127" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="3,2"/>

  <!-- Disruption at spatial (cerebellum/hand) -->
  <text x="715" y="137" font-family="Georgia, serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">X Spatial</text>
  <text x="715" y="152" font-family="Georgia, serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">Type</text>

  <!-- Divider -->
  <line x1="30" y1="200" x2="770" y2="200" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Bottom section: Handwriting samples comparison -->
  <text x="200" y="228" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Typical Handwriting</text>
  <text x="600" y="228" font-family="Georgia, serif" font-size="16" fill="#7C2530" text-anchor="middle" font-weight="bold">Dysgraphia Characteristics</text>

  <!-- Typical handwriting sample box -->
  <rect x="60" y="240" width="280" height="130" rx="6" fill="none" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- Ruled lines -->
  <line x1="70" y1="270" x2="330" y2="270" stroke="#C4A87A" stroke-width="0.5" opacity="0.5"/>
  <line x1="70" y1="300" x2="330" y2="300" stroke="#C4A87A" stroke-width="0.5" opacity="0.5"/>
  <line x1="70" y1="330" x2="330" y2="330" stroke="#C4A87A" stroke-width="0.5" opacity="0.5"/>
  <!-- Neat text -->
  <text x="80" y="268" font-family="Georgia, serif" font-size="18" fill="#2D5A8E">The quick brown</text>
  <text x="80" y="298" font-family="Georgia, serif" font-size="18" fill="#2D5A8E">fox jumps over</text>
  <text x="80" y="328" font-family="Georgia, serif" font-size="18" fill="#2D5A8E">the lazy dog.</text>
  <!-- Consistent spacing indicator -->
  <text x="200" y="362" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">Consistent size, spacing, baseline</text>

  <!-- Dysgraphia characteristics box -->
  <rect x="460" y="240" width="280" height="130" rx="6" fill="none" stroke="#7C2530" stroke-width="1.5"/>
  <!-- Ruled lines -->
  <line x1="470" y1="270" x2="730" y2="270" stroke="#C4A87A" stroke-width="0.5" opacity="0.5"/>
  <line x1="470" y1="300" x2="730" y2="300" stroke="#C4A87A" stroke-width="0.5" opacity="0.5"/>
  <line x1="470" y1="330" x2="730" y2="330" stroke="#C4A87A" stroke-width="0.5" opacity="0.5"/>
  <!-- Irregular text simulating dysgraphia -->
  <text x="480" y="265" font-family="Georgia, serif" font-size="14" fill="#7C2530" transform="rotate(-2,480,265)">T</text>
  <text x="494" y="271" font-family="Georgia, serif" font-size="20" fill="#7C2530">h</text>
  <text x="512" y="264" font-family="Georgia, serif" font-size="12" fill="#7C2530" transform="rotate(3,512,264)">e</text>
  <text x="535" y="270" font-family="Georgia, serif" font-size="17" fill="#7C2530">q</text>
  <text x="550" y="266" font-family="Georgia, serif" font-size="11" fill="#7C2530" transform="rotate(-4,550,266)">u</text>
  <text x="562" y="272" font-family="Georgia, serif" font-size="19" fill="#7C2530">i</text>
  <text x="572" y="264" font-family="Georgia, serif" font-size="14" fill="#7C2530" transform="rotate(2,572,264)">c</text>
  <text x="586" y="271" font-family="Georgia, serif" font-size="22" fill="#7C2530">k</text>

  <text x="480" y="298" font-family="Georgia, serif" font-size="20" fill="#7C2530" transform="rotate(-3,480,298)">b</text>
  <text x="498" y="302" font-family="Georgia, serif" font-size="12" fill="#7C2530">r</text>
  <text x="520" y="295" font-family="Georgia, serif" font-size="18" fill="#7C2530" transform="rotate(4,520,295)">o</text>
  <text x="540" y="303" font-family="Georgia, serif" font-size="15" fill="#7C2530">w</text>
  <text x="558" y="293" font-family="Georgia, serif" font-size="21" fill="#7C2530" transform="rotate(-2,558,293)">n</text>

  <text x="480" y="330" font-family="Georgia, serif" font-size="16" fill="#7C2530" transform="rotate(2,480,330)">f</text>
  <text x="494" y="335" font-family="Georgia, serif" font-size="22" fill="#7C2530">o</text>
  <text x="516" y="327" font-family="Georgia, serif" font-size="13" fill="#7C2530" transform="rotate(-3,516,327)">x</text>
  <text x="545" y="333" font-family="Georgia, serif" font-size="11" fill="#7C2530">...</text>

  <!-- Annotation arrows on right side -->
  <text x="600" y="362" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Variable size, rotation, spacing, baseline drift</text>
</svg>