<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">NeRF: Neural Radiance Field Pipeline</text>

  <!-- ===== LEFT: SCENE / CAMERA SECTION ===== -->
  <!-- Camera icon -->
  <rect x="32" y="155" width="54" height="38" rx="5" fill="#2D5A8E" opacity="0.85"/>
  <rect x="52" y="148" width="14" height="10" rx="2" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="59" cy="174" r="10" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <circle cx="59" cy="174" r="5" fill="#C4A87A"/>
  <text x="59" y="207" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Camera</text>
  <text x="59" y="220" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Viewpoint</text>

  <!-- Ray from camera through pixel toward scene -->
  <!-- Dashed ray line -->
  <line x1="86" y1="174" x2="310" y2="174" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="6,3"/>
  <!-- Arrow head at end of ray -->
  <polygon points="310,174 300,169 300,179" fill="#7C2530"/>
  <!-- Pixel plane -->
  <rect x="118" y="148" width="12" height="52" rx="2" fill="#C4A87A" opacity="0.5" stroke="#C4A87A" stroke-width="1"/>
  <text x="124" y="214" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">pixel</text>

  <!-- Sampled points along the ray -->
  <!-- Point 1 -->
  <circle cx="175" cy="174" r="6" fill="#7C2530" opacity="0.85"/>
  <!-- Point 2 -->
  <circle cx="218" cy="174" r="6" fill="#7C2530" opacity="0.85"/>
  <!-- Point 3 -->
  <circle cx="261" cy="174" r="6" fill="#7C2530" opacity="0.85"/>

  <!-- t_n and t_f labels -->
  <text x="163" y="196" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">t&#8336;</text>
  <text x="280" y="196" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">t&#8337;</text>
  <line x1="145" y1="190" x2="290" y2="190" stroke="#5C3D1E" stroke-width="0.8"/>
  <line x1="145" y1="187" x2="145" y2="193" stroke="#5C3D1E" stroke-width="0.8"/>
  <line x1="290" y1="187" x2="290" y2="193" stroke="#5C3D1E" stroke-width="0.8"/>

  <!-- Ray label -->
  <text x="200" y="160" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">r(t) = o + td</text>

  <!-- Sampled points label -->
  <text x="200" y="240" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Sample 3D points (x, y, z, θ, φ)</text>

  <!-- ===== CENTER: MLP ===== -->
  <!-- MLP box -->
  <rect x="320" y="110" width="130" height="130" rx="10" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="385" y="133" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">MLP f&#x3B8;</text>

  <!-- MLP layer dots -->
  <!-- Layer 1 -->
  <circle cx="345" cy="155" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="345" cy="175" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="345" cy="195" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="345" cy="215" r="5" fill="#2D5A8E" opacity="0.7"/>
  <!-- Layer 2 -->
  <circle cx="385" cy="160" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="385" cy="180" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="385" cy="200" r="5" fill="#2D5A8E" opacity="0.7"/>
  <!-- Layer 3 -->
  <circle cx="425" cy="160" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="425" cy="180" r="5" fill="#2D5A8E" opacity="0.7"/>
  <circle cx="425" cy="200" r="5" fill="#2D5A8E" opacity="0.7"/>

  <!-- Connections layer1->layer2 (sample) -->
  <line x1="350" y1="155" x2="380" y2="160" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="350" y1="175" x2="380" y2="160" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="350" y1="195" x2="380" y2="180" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="350" y1="215" x2="380" y2="200" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <!-- Connections layer2->layer3 -->
  <line x1="390" y1="160" x2="420" y2="160" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="390" y1="180" x2="420" y2="180" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>
  <line x1="390" y1="200" x2="420" y2="200" stroke="#2D5A8E" stroke-width="0.5" opacity="0.4"/>

  <!-- Input label -->
  <text x="385" y="248" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">(x, y, z, θ, φ) → γ(·)</text>
  <text x="385" y="260" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">positional encoding</text>

  <!-- Arrow from sampled points to MLP -->
  <line x1="310" y1="174" x2="318" y2="174" stroke="#7C2530" stroke-width="1.5"/>

  <!-- Arrow from MLP to output -->
  <line x1="450" y1="175" x2="490" y2="175" stroke="#5C3D1E" stroke-width="1.8"/>
  <polygon points="490,175 480,170 480,180" fill="#5C3D1E"/>

  <!-- ===== RIGHT: OUTPUT ===== -->
  <!-- Output box -->
  <rect x="495" y="140" width="110" height="70" rx="8" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="550" y="161" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Output</text>
  <!-- Color swatch -->
  <rect x="510" y="168" width="18" height="14" rx="2" fill="#C4A87A" stroke="#5C3D1E" stroke-width="0.8"/>
  <text x="534" y="179" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">(r, g, b)</text>
  <!-- Density -->
  <text x="510" y="200" font-family="Georgia, serif" font-size="11" fill="#7C2530">σ density</text>

  <!-- ===== VOLUME RENDERING ===== -->
  <!-- Arrow down from output to volume rendering -->
  <line x1="550" y1="213" x2="550" y2="258" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="550,260 545,250 555,250" fill="#7C2530"/>

  <rect x="480" y="262" width="140" height="42" rx="8" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="550" y="280" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Volume Rendering</text>
  <text x="550" y="296" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">∫ T(t) σ c dt  →  pixel color</text>

  <!-- ===== BOTTOM: TRAINING LOOP ===== -->
  <!-- Photos on left -->
  <text x="90" y="310" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Training Photos</text>
  <!-- Small photo icons -->
  <rect x="30" y="318" width="36" height="26" rx="3" fill="#C4A87A" opacity="0.5" stroke="#C4A87A" stroke-width="1"/>
  <rect x="52" y="322" width="36" height="26" rx="3" fill="#C4A87A" opacity="0.5" stroke="#C4A87A" stroke-width="1"/>
  <rect x="74" y="326" width="36" height="26" rx="3" fill="#C4A87A" opacity="0.5" stroke="#C4A87A" stroke-width="1"/>
  <!-- Mountain sketch in photos -->
  <polyline points="38,338 48,326 58,338" fill="none" stroke="#5C3D1E" stroke-width="1"/>
  <polyline points="60,342 70,330 80,342" fill="none" stroke="#5C3D1E" stroke-width="1"/>
  <polyline points="82,346 92,334 102,346" fill="none" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Arrow: photos -> optimize MLP -->
  <line x1="115" y1="337" x2="200" y2="337" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="200,337 190,332 190,342" fill="#5C3D1E"/>

  <!-- Optimize MLP box -->
  <rect x="202" y="320" width="130" height="34" rx="7" fill="#2D5A8E" opacity="0.13" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="267" y="335" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Optimize MLP</text>
  <text x="267" y="348" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">min MSE(rendered, true)</text>

  <!-- Arrow: optimize -> novel view -->
  <line x1="334" y1="337" x2="420" y2="337" stroke="#5C3D1E" stroke-width="1.5"/>
  <polygon points="420,337 410,332 410,342" fill="#5C3D1E"/>

  <!-- Novel view box -->
  <rect x="422" y="320" width="130" height="34" rx="7" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="487" y="335" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">Novel View</text>
  <text x="487" y="348" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Synthesis</text>

  <!-- Rendered image icon -->
  <rect x="568" y="318" width="48" height="36" rx="4" fill="#C4A87A" opacity="0.35" stroke="#7C2530" stroke-width="1.3"/>
  <ellipse cx="581" cy="329" rx="5" ry="5" fill="#2D5A8E" opacity="0.5"/>
  <polyline points="568,346 580,334 592,344 600,336 616,354" fill="none" stroke="#5C3D1E" stroke-width="1.2"/>
  <line x1="554" y1="337" x2="566" y2="337" stroke="#7C2530" stroke-width="1.4"/>
  <polygon points="566,337 558,333 558,341" fill="#7C2530"/>

  <!-- Section labels at very bottom -->
  <text x="90" y="390" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Input images</text>
  <text x="267" y="390" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Scene implicit in weights</text>
  <text x="550" y="390" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Render any viewpoint</text>

  <!-- Top section label -->
  <text x="200" y="90" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Ray casting + point sampling</text>
  <text x="385" y="90" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-style="italic">MLP query</text>
  <text x="590" y="90" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-style="italic">Integration</text>

  <!-- Divider line between top pipeline and bottom training -->
  <line x1="20" y1="300" x2="780" y2="300" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="296" font-family="Georgia, serif" font-size="10" fill="#D4C5A9" text-anchor="middle">Training loop (one scene, many rays)</text>
</svg>
