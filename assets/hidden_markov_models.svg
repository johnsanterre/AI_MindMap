<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" font-weight="bold">Hidden Markov Model</text>

  <!-- Hidden states label -->
  <text x="70" y="130" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-style="italic">Hidden States</text>

  <!-- Hidden state S1 -->
  <circle cx="200" cy="130" r="40" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <text x="200" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">S1</text>

  <!-- Hidden state S2 -->
  <circle cx="420" cy="130" r="40" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <text x="420" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">S2</text>

  <!-- Hidden state S3 -->
  <circle cx="640" cy="130" r="40" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <text x="640" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">S3</text>

  <!-- Transition arrows between hidden states -->
  <!-- S1 -> S2 -->
  <line x1="242" y1="120" x2="378" y2="120" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="310" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530">a12 = 0.6</text>

  <!-- S2 -> S3 -->
  <line x1="462" y1="120" x2="598" y2="120" stroke="#7C2530" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="530" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530">a23 = 0.5</text>

  <!-- S2 -> S1 -->
  <line x1="378" y1="145" x2="242" y2="145" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="310" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">a21 = 0.3</text>

  <!-- Self-loop on S1 -->
  <path d="M 175,95 C 155,60 245,60 225,95" fill="none" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="200" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">a11 = 0.4</text>

  <!-- Self-loop on S3 -->
  <path d="M 615,95 C 595,60 685,60 665,95" fill="none" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="640" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">a33 = 0.5</text>

  <!-- Observations label -->
  <text x="70" y="310" font-family="Georgia, serif" font-size="14" fill="#2D5A8E" font-style="italic">Observations</text>

  <!-- Emission arrows -->
  <!-- S1 -> O1 -->
  <line x1="200" y1="172" x2="200" y2="278" stroke="#C4A87A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowTan)"/>
  <text x="220" y="230" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">b1(O1)=0.7</text>

  <!-- S2 -> O2 -->
  <line x1="420" y1="172" x2="420" y2="278" stroke="#C4A87A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowTan)"/>
  <text x="440" y="230" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">b2(O2)=0.5</text>

  <!-- S3 -> O3 -->
  <line x1="640" y1="172" x2="640" y2="278" stroke="#C4A87A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowTan)"/>
  <text x="660" y="230" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">b3(O3)=0.8</text>

  <!-- Observation nodes -->
  <rect x="160" y="280" width="80" height="40" rx="6" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="2" opacity="0.15"/>
  <rect x="160" y="280" width="80" height="40" rx="6" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <text x="200" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-weight="bold">O1</text>

  <rect x="380" y="280" width="80" height="40" rx="6" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="2" opacity="0.15"/>
  <rect x="380" y="280" width="80" height="40" rx="6" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <text x="420" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-weight="bold">O2</text>

  <rect x="600" y="280" width="80" height="40" rx="6" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="2" opacity="0.15"/>
  <rect x="600" y="280" width="80" height="40" rx="6" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <text x="640" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-weight="bold">O3</text>

  <!-- Legend -->
  <text x="200" y="370" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Solid arrows = transition probabilities (aij)</text>
  <text x="200" y="387" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Dashed arrows = emission probabilities (bi)</text>

  <!-- Time axis -->
  <line x1="150" y1="350" x2="700" y2="350" stroke="#D4C5A9" stroke-width="1"/>
  <text x="160" y="363" font-family="Georgia, serif" font-size="11" fill="#C4A87A">t = 1</text>
  <text x="390" y="363" font-family="Georgia, serif" font-size="11" fill="#C4A87A">t = 2</text>
  <text x="610" y="363" font-family="Georgia, serif" font-size="11" fill="#C4A87A">t = 3</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C2530"/>
    </marker>
    <marker id="arrowTan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>