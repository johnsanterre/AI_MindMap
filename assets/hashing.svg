<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" letter-spacing="0.5">HASHING: KEYS TO BUCKETS</text>

  <!-- Input keys on the left -->
  <text x="60" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">INPUT KEYS</text>

  <rect x="20" y="85" width="80" height="28" rx="4" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5"/>
  <text x="60" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">"alice"</text>

  <rect x="20" y="125" width="80" height="28" rx="4" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="60" y="144" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">"bob"</text>

  <rect x="20" y="165" width="80" height="28" rx="4" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="60" y="184" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">"carol"</text>

  <rect x="20" y="205" width="80" height="28" rx="4" fill="#FDFAF4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="60" y="224" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C4A87A">"dave"</text>

  <!-- Hash function box in the center -->
  <rect x="190" y="100" width="140" height="120" rx="8" fill="#5C3D1E" fill-opacity="0.1" stroke="#5C3D1E" stroke-width="2"/>
  <text x="260" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E">h(key)</text>
  <text x="260" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">= key mod m</text>
  <text x="260" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">deterministic</text>
  <text x="260" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">one-way</text>

  <!-- Arrows from keys to hash function -->
  <line x1="100" y1="99" x2="190" y2="130" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="100" y1="139" x2="190" y2="150" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <line x1="100" y1="179" x2="190" y2="165" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>
  <line x1="100" y1="219" x2="190" y2="185" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#arrowTan)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C2530"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowBrown" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowTan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C4A87A"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6B5D4F"/>
    </marker>
  </defs>

  <!-- Hash table buckets on the right -->
  <text x="480" y="70" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="1" fill="#6B5D4F" font-variant="small-caps">HASH TABLE (m = 5)</text>

  <!-- Bucket 0 -->
  <rect x="430" y="85" width="100" height="28" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="440" y="103" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">0</text>
  <text x="480" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">--</text>

  <!-- Bucket 1 -->
  <rect x="430" y="120" width="100" height="28" rx="3" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.5"/>
  <text x="440" y="138" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">1</text>
  <text x="490" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">"alice"</text>

  <!-- Bucket 2 -->
  <rect x="430" y="155" width="100" height="28" rx="3" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="440" y="173" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">2</text>
  <text x="490" y="173" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">"bob"</text>

  <!-- Bucket 3 - collision! -->
  <rect x="430" y="190" width="100" height="28" rx="3" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="440" y="208" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">3</text>
  <text x="490" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">"carol"</text>

  <!-- Collision chain from bucket 3 -->
  <rect x="545" y="190" width="70" height="28" rx="3" fill="#C4A87A" fill-opacity="0.15" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="580" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C4A87A">"dave"</text>
  <line x1="530" y1="204" x2="545" y2="204" stroke="#6B5D4F" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- Bucket 4 -->
  <rect x="430" y="225" width="100" height="28" rx="3" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="440" y="243" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">4</text>
  <text x="480" y="243" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">--</text>

  <!-- Collision callout -->
  <text x="590" y="232" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#7C2530">collision!</text>

  <!-- Arrows from hash function to buckets -->
  <line x1="330" y1="130" x2="430" y2="134" stroke="#7C2530" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="330" y1="145" x2="430" y2="169" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <line x1="330" y1="165" x2="430" y2="199" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#arrowBrown)"/>
  <line x1="330" y1="185" x2="430" y2="202" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowTan)"/>

  <!-- Properties panel at bottom -->
  <line x1="30" y1="280" x2="770" y2="280" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4,4"/>

  <text x="130" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530">Deterministic</text>
  <text x="130" y="328" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">same key always maps</text>
  <text x="130" y="342" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">to same bucket</text>

  <text x="330" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E">Uniform</text>
  <text x="330" y="328" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">keys spread evenly</text>
  <text x="330" y="342" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">across all buckets</text>

  <text x="530" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E">O(1) Average</text>
  <text x="530" y="328" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">constant-time lookup</text>
  <text x="530" y="342" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#6B5D4F">insert, and delete</text>

  <!-- Dividers for properties -->
  <line x1="230" y1="295" x2="230" y2="355" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="430" y1="295" x2="430" y2="355" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- Bottom note -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#6B5D4F">A hash function compresses arbitrary-size input into a fixed-size index -- trading perfect uniqueness for speed.</text>
</svg>
