<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Network Flow: Source to Sink Through Capacitated Edges</text>

  <!-- ===== LEFT: Flow Network Diagram ===== -->
  <text x="200" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Flow Network</text>

  <!-- Nodes -->
  <circle cx="60" cy="195" r="20" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="60" y="200" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">s</text>

  <circle cx="170" cy="110" r="16" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="170" y="115" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">a</text>

  <circle cx="170" cy="280" r="16" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="170" y="285" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">b</text>

  <circle cx="310" cy="110" r="16" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="310" y="115" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">c</text>

  <circle cx="310" cy="280" r="16" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="310" y="285" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">d</text>

  <circle cx="390" cy="195" r="20" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="390" y="200" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">t</text>

  <!-- Directed edges with flow/capacity labels -->
  <!-- s -> a -->
  <line x1="78" y1="183" x2="155" y2="118" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="100" y="140" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">7/10</text>

  <!-- s -> b -->
  <line x1="78" y1="207" x2="155" y2="272" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="100" y="252" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">5/8</text>

  <!-- a -> c -->
  <line x1="186" y1="110" x2="294" y2="110" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="234" y="102" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">5/6</text>

  <!-- a -> b -->
  <line x1="170" y1="126" x2="170" y2="264" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="178" y="198" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">2/3</text>

  <!-- b -> d -->
  <line x1="186" y1="280" x2="294" y2="280" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="234" y="272" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">7/9</text>

  <!-- c -> t -->
  <line x1="325" y1="118" x2="372" y2="183" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="356" y="142" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">5/7</text>

  <!-- c -> d -->
  <line x1="310" y1="126" x2="310" y2="264" stroke="#C4A87A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="318" y="198" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">0/4</text>

  <!-- d -> t -->
  <line x1="325" y1="272" x2="372" y2="207" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="356" y="252" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">7/8</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="200" y="340" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">flow / capacity</text>
  <text x="200" y="358" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Total flow |f| = 12</text>

  <!-- ===== RIGHT: Min-Cut / Max-Flow Theorem ===== -->
  <line x1="440" y1="55" x2="440" y2="375" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="620" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Max-Flow Min-Cut Theorem</text>

  <!-- Cut illustration -->
  <rect x="470" y="85" width="300" height="160" rx="6" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>

  <!-- S-side -->
  <ellipse cx="540" cy="165" rx="50" ry="60" fill="none" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="540" y="108" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">S-side</text>
  <circle cx="520" cy="145" r="12" fill="#7C2530" stroke="#5C3D1E" stroke-width="1"/>
  <text x="520" y="149" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">s</text>
  <circle cx="550" cy="185" r="10" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1"/>
  <text x="550" y="189" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">a</text>

  <!-- T-side -->
  <ellipse cx="700" cy="165" rx="50" ry="60" fill="none" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="700" y="108" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">T-side</text>
  <circle cx="690" cy="145" r="10" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1"/>
  <text x="690" y="149" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">c</text>
  <circle cx="710" cy="185" r="10" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1"/>
  <text x="710" y="189" font-family="Georgia, serif" font-size="9" fill="white" text-anchor="middle">d</text>
  <circle cx="720" cy="155" r="12" fill="#7C2530" stroke="#5C3D1E" stroke-width="1"/>
  <text x="720" y="159" font-family="Georgia, serif" font-size="10" fill="white" text-anchor="middle">t</text>

  <!-- Cut edges -->
  <line x1="560" y1="185" x2="680" y2="145" stroke="#7C2530" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="185" x2="700" y2="185" stroke="#7C2530" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cut line -->
  <line x1="620" y1="100" x2="620" y2="230" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="620" y="95" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">min cut</text>

  <!-- Key equations -->
  <rect x="470" y="260" width="300" height="110" rx="6" fill="#FFF8EC" stroke="#D4C5A9" stroke-width="1"/>

  <text x="620" y="284" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Key Relationships</text>

  <text x="490" y="308" font-family="Georgia, serif" font-size="11" fill="#7C2530">max |f| = min capacity(S, T)</text>
  <text x="490" y="330" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Ford-Fulkerson: O(E &#183; |f*|)</text>
  <text x="490" y="352" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Edmonds-Karp:  O(V &#183; E&#178;)</text>

  <!-- Bottom caption -->
  <text x="400" y="390" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Network flow optimizes routing through capacitated graphs; max-flow always equals min-cut</text>
</svg>