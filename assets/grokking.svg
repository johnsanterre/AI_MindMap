<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Grokking: Delayed Generalization in Neural Networks</text>

  <!-- Plot area -->
  <!-- Left margin 90, right margin 40, top margin 60, bottom margin 70 -->
  <!-- Plot: x=90 to 740, y=60 to 330 -->
  <rect x="90" y="60" width="650" height="270" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Grid lines (horizontal) -->
  <line x1="90" y1="195" x2="740" y2="195" stroke="#D4C5A9" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="90" y1="330" x2="740" y2="330" stroke="#D4C5A9" stroke-width="0.8"/>
  <line x1="90" y1="60" x2="740" y2="60" stroke="#D4C5A9" stroke-width="0.8"/>

  <!-- Y-axis labels -->
  <text x="82" y="64" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="end">100%</text>
  <text x="82" y="199" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="end">50%</text>
  <text x="82" y="334" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="end">0%</text>

  <!-- Y-axis title -->
  <text x="22" y="195" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle" transform="rotate(-90,22,195)">Accuracy</text>

  <!-- X-axis log scale ticks and labels -->
  <!-- Log scale: 10^1 to 10^6, plot width=650
       x positions: log10 mapped linearly
       10^1 → x=90, 10^6 → x=740
       step per decade = 650/5 = 130 -->
  <!-- Tick at 10^1 = x=90 -->
  <line x1="90" y1="330" x2="90" y2="336" stroke="#5C3D1E" stroke-width="1"/>
  <text x="90" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10¹</text>
  <!-- 10^2 = x=220 -->
  <line x1="220" y1="330" x2="220" y2="336" stroke="#5C3D1E" stroke-width="1"/>
  <text x="220" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10²</text>
  <!-- 10^3 = x=350 -->
  <line x1="350" y1="330" x2="350" y2="336" stroke="#5C3D1E" stroke-width="1"/>
  <text x="350" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10³</text>
  <!-- 10^4 = x=480 -->
  <line x1="480" y1="330" x2="480" y2="336" stroke="#5C3D1E" stroke-width="1"/>
  <text x="480" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10⁴</text>
  <!-- 10^5 = x=610 -->
  <line x1="610" y1="330" x2="610" y2="336" stroke="#5C3D1E" stroke-width="1"/>
  <text x="610" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10⁵</text>
  <!-- 10^6 = x=740 -->
  <line x1="740" y1="330" x2="740" y2="336" stroke="#5C3D1E" stroke-width="1"/>
  <text x="740" y="350" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">10⁶</text>

  <!-- X-axis title -->
  <text x="415" y="378" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">Training Steps (log scale)</text>

  <!-- Phase background shading -->
  <!-- Memorization phase: 10^1 to ~10^2.3 → x=90 to ~x=280 -->
  <rect x="90" y="60" width="190" height="270" fill="#C4A87A" opacity="0.12"/>
  <!-- Grokking gap: 10^2.3 to ~10^5.5 → x=280 to ~x=700 -->
  <rect x="280" y="60" width="390" height="270" fill="#2D5A8E" opacity="0.07"/>
  <!-- Generalization: 10^5.5 to 10^6 → x=700 to 740 -->
  <rect x="700" y="60" width="40" height="270" fill="#5C3D1E" opacity="0.12"/>

  <!-- Phase labels -->
  <text x="185" y="85" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#5C3D1E" text-anchor="middle">Memorization</text>
  <text x="475" y="85" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#2D5A8E" text-anchor="middle">Grokking Gap</text>
  <text x="720" y="85" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5C3D1E" text-anchor="middle">General-</text>
  <text x="720" y="99" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5C3D1E" text-anchor="middle">ization</text>

  <!-- Vertical dividers for phases -->
  <line x1="280" y1="60" x2="280" y2="330" stroke="#D4C5A9" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="700" y1="60" x2="700" y2="330" stroke="#D4C5A9" stroke-width="1.2" stroke-dasharray="6,3"/>

  <!--
    TRAINING ACCURACY curve (deep red #7C2530):
    Rises quickly from (x=90, y=330) [0%] to (x=250, y=65) [~100%], then stays at ~100%.
    Points: (90,330),(140,280),(190,150),(250,68),(350,65),(480,64),(610,64),(700,64),(740,64)
  -->
  <polyline
    points="90,330 130,290 170,180 220,90 280,66 350,64 480,64 610,64 700,64 740,64"
    fill="none" stroke="#7C2530" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!--
    VALIDATION ACCURACY curve (navy #2D5A8E):
    Stays near 0% for a long time, then suddenly jumps near x=700 to ~100%.
    Points: (90,328),(280,326),(480,324),(640,322),(690,320),(705,220),(715,100),(725,67),(740,64)
  -->
  <polyline
    points="90,328 220,327 350,325 480,324 610,323 680,322 700,315 710,180 720,90 735,66 740,64"
    fill="none" stroke="#2D5A8E" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="8,4"/>

  <!-- "Grokking" annotation arrow and label -->
  <!-- Arrow pointing to the sharp rise around x=710 -->
  <line x1="660" y1="150" x2="706" y2="200" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>
  <text x="655" y="142" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Grokking!</text>
  <text x="655" y="157" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">(sudden jump)</text>

  <!-- Legend -->
  <rect x="96" y="105" width="180" height="52" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1" rx="3"/>
  <line x1="106" y1="122" x2="136" y2="122" stroke="#7C2530" stroke-width="2.5"/>
  <text x="142" y="126" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Training Accuracy</text>
  <line x1="106" y1="144" x2="136" y2="144" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="142" y="148" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Validation Accuracy</text>
</svg>
