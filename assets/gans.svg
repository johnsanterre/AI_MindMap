<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="gans-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
    <marker id="gans-arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="gans-arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" fill="#5C3D1E" font-weight="bold" letter-spacing="1">GENERATOR vs DISCRIMINATOR</text>

  <!-- Panel divider -->
  <line x1="400" y1="42" x2="400" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ LEFT PANEL: GENERATOR ══ -->
  <text x="200" y="56" text-anchor="middle" font-size="12" fill="#7C2530" font-weight="bold" letter-spacing="1">GENERATOR (G)</text>
  <text x="200" y="72" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">the forger</text>

  <!-- Latent noise input -->
  <rect x="30" y="110" width="80" height="50" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.5" rx="4"/>
  <text x="70" y="131" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Latent z</text>
  <text x="70" y="146" text-anchor="middle" font-size="9" fill="#5C3D1E">~ N(0, I)</text>
  <!-- Noise squiggle -->
  <path d="M38,155 Q48,148 58,155 Q68,162 78,155 Q88,148 98,155" fill="none" stroke="#C4A87A" stroke-width="1.2"/>

  <!-- Arrow: z -> hidden layers -->
  <line x1="110" y1="135" x2="138" y2="135" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#gans-arr)"/>

  <!-- Generator hidden layers (stacked rectangles) -->
  <rect x="140" y="100" width="28" height="70" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <rect x="174" y="90" width="32" height="90" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <rect x="212" y="80" width="36" height="110" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.2" rx="3"/>
  <text x="153" y="140" text-anchor="middle" font-size="7" fill="#7C2530">FC</text>
  <text x="190" y="140" text-anchor="middle" font-size="7" fill="#7C2530">FC</text>
  <text x="230" y="140" text-anchor="middle" font-size="7" fill="#7C2530">DeConv</text>

  <!-- Arrow: hidden -> output image -->
  <line x1="248" y1="135" x2="276" y2="135" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#gans-arr)"/>

  <!-- Generated output (fake image placeholder) -->
  <rect x="278" y="100" width="70" height="70" fill="#F2EAD8" stroke="#7C2530" stroke-width="2" rx="4"/>
  <text x="313" y="130" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Fake</text>
  <text x="313" y="144" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Image</text>
  <!-- Simple face icon in fake image -->
  <circle cx="300" cy="118" r="3" fill="#7C2530" opacity="0.4"/>
  <circle cx="326" cy="118" r="3" fill="#7C2530" opacity="0.4"/>
  <path d="M298,152 Q313,162 328,152" fill="none" stroke="#7C2530" stroke-width="1" opacity="0.4"/>

  <!-- Goal label -->
  <rect x="100" y="210" width="200" height="36" fill="none" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2" rx="4"/>
  <text x="200" y="226" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">Goal: max log D(G(z))</text>
  <text x="200" y="240" text-anchor="middle" font-size="8" fill="#6B5D4F">Generate data indistinguishable from real</text>

  <!-- Gradient feedback arrow from right panel back to G -->
  <path d="M380,320 Q200,340 160,195 Q158,178 158,170"
        fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#gans-arr-red)"/>
  <text x="200" y="310" text-anchor="middle" font-size="8" fill="#7C2530">adversarial gradient updates G</text>

  <!-- ══ RIGHT PANEL: DISCRIMINATOR ══ -->
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#2D5A8E" font-weight="bold" letter-spacing="1">DISCRIMINATOR (D)</text>
  <text x="600" y="72" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">the detective</text>

  <!-- Real data input -->
  <rect x="430" y="90" width="70" height="50" fill="#E9DEC5" stroke="#C4A87A" stroke-width="1.5" rx="4"/>
  <text x="465" y="112" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Real</text>
  <text x="465" y="126" text-anchor="middle" font-size="10" fill="#5C3D1E" font-weight="bold">Data</text>
  <!-- Data dots -->
  <circle cx="445" cy="132" r="2.5" fill="#8B6B4A"/>
  <circle cx="458" cy="130" r="2.5" fill="#8B6B4A"/>
  <circle cx="472" cy="133" r="2.5" fill="#8B6B4A"/>
  <circle cx="485" cy="131" r="2.5" fill="#8B6B4A"/>

  <!-- Fake data input (from generator) -->
  <rect x="430" y="160" width="70" height="50" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.5" rx="4"/>
  <text x="465" y="182" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Fake</text>
  <text x="465" y="196" text-anchor="middle" font-size="10" fill="#7C2530" font-weight="bold">Data</text>

  <!-- Arrow from fake image across panel -->
  <path d="M348,150 Q390,185 428,185" fill="none" stroke="#5C3D1E" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#gans-arr)"/>
  <text x="388" y="175" text-anchor="middle" font-size="7" fill="#6B5D4F">from G</text>

  <!-- Arrows: real and fake -> D network -->
  <line x1="500" y1="115" x2="540" y2="148" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#gans-arr)"/>
  <line x1="500" y1="185" x2="540" y2="168" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#gans-arr)"/>

  <!-- Discriminator hidden layers -->
  <rect x="542" y="130" width="36" height="60" fill="#DDEEFF" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <rect x="584" y="138" width="32" height="44" fill="#DDEEFF" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <rect x="622" y="146" width="28" height="28" fill="#DDEEFF" stroke="#2D5A8E" stroke-width="1.2" rx="3"/>
  <text x="560" y="165" text-anchor="middle" font-size="7" fill="#2D5A8E">Conv</text>
  <text x="600" y="165" text-anchor="middle" font-size="7" fill="#2D5A8E">FC</text>
  <text x="636" y="164" text-anchor="middle" font-size="7" fill="#2D5A8E">FC</text>

  <!-- Arrow: D -> output -->
  <line x1="650" y1="160" x2="680" y2="160" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#gans-arr)"/>

  <!-- Output: sigmoid -->
  <rect x="682" y="140" width="76" height="40" fill="#DDEEFF" stroke="#2D5A8E" stroke-width="2" rx="4"/>
  <text x="720" y="157" text-anchor="middle" font-size="10" fill="#2D5A8E" font-weight="bold">P(real)</text>
  <text x="720" y="172" text-anchor="middle" font-size="9" fill="#2D5A8E">sigmoid</text>

  <!-- Goal label -->
  <rect x="500" y="210" width="220" height="36" fill="none" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,2" rx="4"/>
  <text x="610" y="226" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">Goal: max log D(x) + log(1 - D(G(z)))</text>
  <text x="610" y="240" text-anchor="middle" font-size="8" fill="#6B5D4F">Correctly classify real vs fake</text>

  <!-- ══ BOTTOM: MINIMAX OBJECTIVE ══ -->
  <rect x="120" y="270" width="560" height="50" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1" rx="5"/>
  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Minimax Objective</text>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#5C3D1E">min_G max_D  E[log D(x)] + E[log(1 - D(G(z)))]</text>

  <!-- Bottom labels -->
  <text x="200" y="350" text-anchor="middle" font-size="9" fill="#7C2530">G improves by making D wrong</text>
  <text x="600" y="350" text-anchor="middle" font-size="9" fill="#2D5A8E">D improves by catching fakes</text>

  <!-- Equilibrium note -->
  <text x="400" y="380" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">At Nash equilibrium: D(x) = 0.5 for all x (generator perfectly mimics real data)</text>
</svg>