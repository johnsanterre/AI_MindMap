<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="266" y1="20" x2="266" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="533" y1="20" x2="533" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL ===== -->
  <!-- KDD large title -->
  <text x="133" y="68" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#7C2530" text-anchor="middle">KDD</text>
  <!-- Subtitle -->
  <text x="133" y="90" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Knowledge Discovery</text>
  <text x="133" y="104" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">and Data Mining</text>
  <!-- Divider line -->
  <line x1="30" y1="116" x2="236" y2="116" stroke="#C4A87A" stroke-width="1"/>

  <!-- Facts block -->
  <text x="133" y="138" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Conference Facts</text>

  <!-- Fact rows -->
  <text x="38" y="160" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x25B8; Founded:</text>
  <text x="100" y="160" font-family="Georgia, serif" font-size="10" fill="#3a3a3a">1995 (workshops 1989)</text>

  <text x="38" y="178" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x25B8; Organizer:</text>
  <text x="105" y="178" font-family="Georgia, serif" font-size="10" fill="#3a3a3a">ACM SIGKDD</text>

  <text x="38" y="196" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x25B8; Timing:</text>
  <text x="94" y="196" font-family="Georgia, serif" font-size="10" fill="#3a3a3a">August (annual)</text>

  <text x="38" y="214" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">&#x25B8; Location:</text>
  <text x="99" y="214" font-family="Georgia, serif" font-size="10" fill="#3a3a3a">Varies (US-heavy)</text>

  <line x1="30" y1="226" x2="236" y2="226" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Scale stats -->
  <text x="133" y="248" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">&#x25B8; ~1,200 accepted papers/year</text>
  <text x="133" y="266" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">&#x25B8; 15–20% acceptance rate</text>

  <line x1="30" y1="278" x2="236" y2="278" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Origins note -->
  <text x="133" y="300" font-family="Georgia, serif" font-size="9.5" font-style="italic" fill="#5C3D1E" text-anchor="middle">Roots in database community —</text>
  <text x="133" y="315" font-family="Georgia, serif" font-size="9.5" font-style="italic" fill="#5C3D1E" text-anchor="middle">KDD = Knowledge Discovery</text>
  <text x="133" y="330" font-family="Georgia, serif" font-size="9.5" font-style="italic" fill="#5C3D1E" text-anchor="middle">in Databases</text>

  <!-- KDD Cup badge -->
  <rect x="52" y="345" width="162" height="26" rx="4" fill="#C4A87A" opacity="0.35"/>
  <text x="133" y="362" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">KDD Cup — annual competition since 1997</text>

  <!-- ===== CENTER PANEL ===== -->
  <text x="399" y="50" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Two-Track System</text>
  <line x1="285" y1="60" x2="515" y2="60" stroke="#C4A87A" stroke-width="1"/>

  <!-- Research Track box -->
  <rect x="285" y="72" width="107" height="148" rx="5" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="338" y="92" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Research Track</text>
  <line x1="293" y1="99" x2="383" y2="99" stroke="#2D5A8E" stroke-width="0.8" opacity="0.5"/>
  <text x="292" y="116" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Novel algorithms</text>
  <text x="292" y="132" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Theoretical proofs</text>
  <text x="292" y="148" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Benchmark evals</text>
  <text x="292" y="164" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Methods papers</text>
  <text x="292" y="180" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Academic rigor</text>
  <text x="338" y="207" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#2D5A8E" text-anchor="middle">Standard academic</text>
  <text x="338" y="218" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#2D5A8E" text-anchor="middle">contribution</text>

  <!-- ADS Track box -->
  <rect x="406" y="72" width="107" height="148" rx="5" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="459" y="89" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530" text-anchor="middle">ADS Track</text>
  <text x="459" y="101" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#7C2530" text-anchor="middle">Applied Data Science</text>
  <line x1="414" y1="108" x2="504" y2="108" stroke="#7C2530" stroke-width="0.8" opacity="0.5"/>
  <text x="413" y="124" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Deployed systems</text>
  <text x="413" y="140" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Real user impact</text>
  <text x="413" y="156" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Business metrics</text>
  <text x="413" y="172" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Scale evidence</text>
  <text x="413" y="188" font-family="Georgia, serif" font-size="9" fill="#3a3a3a">&#x2022; Must show deploy</text>
  <text x="459" y="207" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#7C2530" text-anchor="middle">Must answer: "what</text>
  <text x="459" y="218" font-family="Georgia, serif" font-size="8.5" font-style="italic" fill="#7C2530" text-anchor="middle">did this change?"</text>

  <!-- Bridge label -->
  <rect x="285" y="232" width="228" height="28" rx="4" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1"/>
  <text x="399" y="250" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Bridge between academia and industry</text>

  <!-- Topic coverage -->
  <text x="399" y="284" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Strong Coverage Areas</text>
  <text x="399" y="301" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a" text-anchor="middle">Graph mining · Recommender systems · Tabular data</text>
  <text x="399" y="317" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a" text-anchor="middle">Anomaly detection · Time series · Privacy ML</text>
  <text x="399" y="333" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a" text-anchor="middle">Fairness · Causal inference · A/B testing</text>

  <line x1="285" y1="348" x2="515" y2="348" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="399" y="368" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#5C3D1E" text-anchor="middle">Notable: XGBoost presented here (2016)</text>

  <!-- ===== RIGHT PANEL ===== -->
  <text x="666" y="50" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Heavy Industry Presence</text>
  <line x1="550" y1="60" x2="782" y2="60" stroke="#C4A87A" stroke-width="1"/>

  <!-- Company chips — 7 companies in a grid -->
  <!-- Row 1 -->
  <rect x="555" y="72" width="92" height="26" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="601" y="89" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Amazon</text>

  <rect x="658" y="72" width="92" height="26" rx="4" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="704" y="89" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">Google</text>

  <!-- Row 2 -->
  <rect x="555" y="108" width="92" height="26" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="601" y="125" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Microsoft</text>

  <rect x="658" y="108" width="92" height="26" rx="4" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="704" y="125" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">LinkedIn</text>

  <!-- Row 3 -->
  <rect x="555" y="144" width="92" height="26" rx="4" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1"/>
  <text x="601" y="161" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Uber</text>

  <rect x="658" y="144" width="92" height="26" rx="4" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1"/>
  <text x="704" y="161" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">Airbnb</text>

  <!-- Row 4 -->
  <rect x="606" y="180" width="92" height="26" rx="4" fill="#5C3D1E" opacity="0.12" stroke="#5C3D1E" stroke-width="1"/>
  <text x="652" y="197" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Meta / FB</text>

  <line x1="550" y1="220" x2="782" y2="220" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Why industry submits here -->
  <text x="666" y="242" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Why Industry Chooses KDD</text>
  <text x="557" y="260" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a">&#x25B8; Reviewers value deployed scale</text>
  <text x="557" y="276" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a">&#x25B8; ADS track fits industry work</text>
  <text x="557" y="292" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a">&#x25B8; Recruitment + partnerships</text>
  <text x="557" y="308" font-family="Georgia, serif" font-size="9.5" fill="#3a3a3a">&#x25B8; Academia–industry co-authors</text>

  <line x1="550" y1="322" x2="782" y2="322" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- KDD Cup highlight -->
  <rect x="555" y="333" width="222" height="42" rx="5" fill="#C4A87A" opacity="0.2" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="666" y="351" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">KDD Cup</text>
  <text x="666" y="367" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#5C3D1E" text-anchor="middle">Annual competition · results published · since 1997</text>
</svg>
