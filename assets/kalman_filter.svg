<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="6"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#7C2530" font-weight="bold">The Kalman Filter: Predict-Update Cycle</text>

  <!-- Time axis -->
  <line x1="60" y1="330" x2="750" y2="330" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E">Time Steps</text>
  <!-- Time step labels -->
  <text x="150" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">k-1</text>
  <text x="400" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">k</text>
  <text x="650" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">k+1</text>
  <!-- Tick marks -->
  <line x1="150" y1="325" x2="150" y2="335" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="400" y1="325" x2="400" y2="335" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="650" y1="325" x2="650" y2="335" stroke="#5C3D1E" stroke-width="2"/>

  <!-- === Step k-1: Prior (wide Gaussian) === -->
  <path d="M70,320 Q90,318 110,308 Q130,288 140,250 Q148,210 150,175 Q152,210 160,250 Q170,288 190,308 Q210,318 230,320" fill="none" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="150" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-style="italic">Prior (wide)</text>

  <!-- === Step k: Predict then Update === -->
  <!-- Predicted Gaussian (wide, dashed blue) -->
  <path d="M310,320 Q330,318 350,308 Q370,285 380,245 Q390,200 400,180 Q410,200 420,245 Q430,285 450,308 Q470,318 490,320" fill="none" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="340" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-style="italic">Predicted</text>

  <!-- Measurement Gaussian (medium width, dotted red) -->
  <path d="M345,320 Q360,316 375,300 Q388,270 395,230 Q398,205 405,190 Q412,205 415,230 Q422,270 435,300 Q450,316 465,320" fill="none" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="3,3"/>
  <text x="470" y="200" text-anchor="start" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-style="italic">Measurement</text>

  <!-- Posterior Gaussian (narrow, solid brown, filled) -->
  <path d="M360,320 Q370,317 380,308 Q388,290 394,255 Q398,215 400,120 Q402,215 406,255 Q412,290 420,308 Q430,317 440,320" fill="rgba(196,168,122,0.2)" stroke="#5C3D1E" stroke-width="3"/>
  <text x="400" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">Posterior (narrow)</text>

  <!-- === Step k+1: Posterior carried forward === -->
  <path d="M610,320 Q620,317 630,308 Q638,290 644,255 Q648,215 650,130 Q652,215 656,255 Q662,290 670,308 Q680,317 690,320" fill="rgba(196,168,122,0.2)" stroke="#5C3D1E" stroke-width="3"/>
  <text x="650" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">Updated</text>

  <!-- Arrows: PREDICT between time steps -->
  <line x1="232" y1="275" x2="308" y2="275" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="270" y="267" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-weight="bold">PREDICT</text>

  <line x1="442" y1="275" x2="608" y2="275" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <text x="525" y="267" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">PREDICT</text>

  <!-- UPDATE label at step k -->
  <rect x="365" y="55" width="70" height="26" rx="5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="73" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">UPDATE</text>
  <line x1="400" y1="81" x2="400" y2="102" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Legend box -->
  <rect x="45" y="55" width="190" height="90" rx="5" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="140" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">Legend</text>
  <line x1="55" y1="86" x2="95" y2="86" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="100" y="90" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Prior / Predicted</text>
  <line x1="55" y1="106" x2="95" y2="106" stroke="#7C2530" stroke-width="2.5" stroke-dasharray="3,3"/>
  <text x="100" y="110" font-family="Georgia, serif" font-size="11" fill="#7C2530">Measurement</text>
  <line x1="55" y1="126" x2="95" y2="126" stroke="#5C3D1E" stroke-width="3"/>
  <text x="100" y="130" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Posterior (fused)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowBrown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>