<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="265" y1="16" x2="265" y2="384" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="535" y1="16" x2="535" y2="384" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════ LEFT PANEL ═══════════════════════════════════ -->
  <!-- NIST large title -->
  <text x="132" y="58" font-family="Georgia, serif" font-size="44" font-weight="bold"
        fill="#7C2530" text-anchor="middle" letter-spacing="4">NIST</text>

  <!-- Subtitle -->
  <text x="132" y="76" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle">National Institute of Standards</text>
  <text x="132" y="88" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle">and Technology</text>

  <!-- Thin rule -->
  <line x1="30" y1="98" x2="234" y2="98" stroke="#C4A87A" stroke-width="1"/>

  <!-- Facts block -->
  <text x="30" y="116" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#2D5A8E">Agency Facts</text>

  <text x="38" y="133" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; Founded 1901 (as NBS)</text>
  <text x="38" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; Renamed NIST: 1988</text>
  <text x="38" y="163" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; Gaithersburg, MD + Boulder, CO</text>
  <text x="38" y="178" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; ~3,000 federal employees</text>
  <text x="38" y="193" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; ~6,000 guest researchers</text>
  <text x="38" y="208" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; Part of US Dept of Commerce</text>

  <!-- Rule -->
  <line x1="30" y1="218" x2="234" y2="218" stroke="#C4A87A" stroke-width="1"/>

  <!-- Role note box -->
  <rect x="30" y="226" width="205" height="44" rx="4" fill="#FFF8EC" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="132" y="242" font-family="Georgia, serif" font-size="9" font-style="italic"
        fill="#7C2530" text-anchor="middle">"Sets standards,</text>
  <text x="132" y="257" font-family="Georgia, serif" font-size="9" font-style="italic"
        fill="#7C2530" text-anchor="middle">doesn't regulate."</text>

  <!-- Standards heritage -->
  <text x="30" y="292" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#2D5A8E">Standards Heritage</text>
  <text x="38" y="308" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; Physical constants &amp; time</text>
  <text x="38" y="323" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; DES (1977), AES (2001)</text>
  <text x="38" y="338" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; SHA-2, SHA-3, PQC (2024)</text>
  <text x="38" y="353" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; Cybersecurity Framework</text>
  <text x="38" y="368" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">&#x2022; AI Risk Mgmt Framework</text>

  <!-- ═══════════════════════════════════ CENTER PANEL ═══════════════════════════════════ -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="11.5" font-weight="bold"
        fill="#7C2530" text-anchor="middle">AI Safety &amp; Standards Work</text>

  <!-- AI RMF center box -->
  <rect x="344" y="50" width="112" height="40" rx="5" fill="#7C2530" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="67" font-family="Georgia, serif" font-size="11" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">AI RMF</text>
  <text x="400" y="82" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle">(January 2023)</text>

  <!-- Radiating lines to four functions -->
  <!-- GOVERN — top left -->
  <line x1="369" y1="60" x2="313" y2="130" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- MAP — top right -->
  <line x1="431" y1="60" x2="487" y2="130" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- MEASURE — bottom left -->
  <line x1="369" y1="88" x2="313" y2="178" stroke="#C4A87A" stroke-width="1.5"/>
  <!-- MANAGE — bottom right -->
  <line x1="431" y1="88" x2="487" y2="178" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- GOVERN box -->
  <rect x="277" y="128" width="74" height="28" rx="4" fill="#2D5A8E" stroke="#1a3f66" stroke-width="1"/>
  <text x="314" y="140" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">GOVERN</text>
  <text x="314" y="151" font-family="Georgia, serif" font-size="7.5" fill="#d4e8ff" text-anchor="middle">culture, accountability</text>

  <!-- MAP box -->
  <rect x="449" y="128" width="74" height="28" rx="4" fill="#2D5A8E" stroke="#1a3f66" stroke-width="1"/>
  <text x="486" y="140" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">MAP</text>
  <text x="486" y="151" font-family="Georgia, serif" font-size="7.5" fill="#d4e8ff" text-anchor="middle">context, risks</text>

  <!-- MEASURE box -->
  <rect x="277" y="176" width="74" height="28" rx="4" fill="#5C3D1E" stroke="#3d2810" stroke-width="1"/>
  <text x="314" y="188" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">MEASURE</text>
  <text x="314" y="199" font-family="Georgia, serif" font-size="7.5" fill="#f5e0c8" text-anchor="middle">analyze, assess</text>

  <!-- MANAGE box -->
  <rect x="449" y="176" width="74" height="28" rx="4" fill="#5C3D1E" stroke="#3d2810" stroke-width="1"/>
  <text x="486" y="188" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#FDFAF4" text-anchor="middle">MANAGE</text>
  <text x="486" y="199" font-family="Georgia, serif" font-size="7.5" fill="#f5e0c8" text-anchor="middle">prioritize, respond</text>

  <!-- Voluntary note -->
  <rect x="310" y="218" width="180" height="22" rx="4" fill="#FFF8EC" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="232" font-family="Georgia, serif" font-size="9" font-style="italic"
        fill="#7C2530" text-anchor="middle">Voluntary framework — not regulation</text>

  <!-- Rule -->
  <line x1="278" y1="252" x2="522" y2="252" stroke="#C4A87A" stroke-width="1"/>

  <!-- CSF section -->
  <text x="400" y="270" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#2D5A8E" text-anchor="middle">Related: NIST Cybersecurity Framework (CSF)</text>

  <rect x="295" y="278" width="210" height="50" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="293" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">CSF v1.1 (2018) / CSF 2.0 (2024)</text>
  <text x="400" y="307" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Identify · Protect · Detect</text>
  <text x="400" y="320" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Respond · Recover · Govern</text>

  <!-- Who references AI RMF -->
  <text x="400" y="350" font-family="Georgia, serif" font-size="8.5" font-weight="bold"
        fill="#5C3D1E" text-anchor="middle">Referenced by: EU AI Act · US AI Executive Orders</text>
  <text x="400" y="364" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E"
        text-anchor="middle">FedRAMP · CMMC · corporate AI governance policies</text>

  <!-- ═══════════════════════════════════ RIGHT PANEL ═══════════════════════════════════ -->
  <text x="667" y="38" font-family="Georgia, serif" font-size="11.5" font-weight="bold"
        fill="#7C2530" text-anchor="middle">Key NIST AI Contributions</text>

  <!-- Contribution rows -->
  <!-- AI RMF 1.0 -->
  <rect x="549" y="48" width="232" height="38" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="560" y="62" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#7C2530">AI RMF 1.0 (2023)</text>
  <text x="560" y="76" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Voluntary AI risk governance framework</text>

  <!-- NIST AI 100-1 -->
  <rect x="549" y="93" width="232" height="38" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="560" y="107" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#2D5A8E">NIST AI 100-1</text>
  <text x="560" y="121" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Foundational AI standards document</text>

  <!-- FRVT -->
  <rect x="549" y="138" width="232" height="38" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="560" y="152" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#7C2530">FRVT — Face Recognition Testing</text>
  <text x="560" y="166" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">10–100x error rate disparities found (2019)</text>

  <!-- Adversarial ML -->
  <rect x="549" y="183" width="232" height="38" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="560" y="197" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#2D5A8E">Adversarial ML Taxonomy</text>
  <text x="560" y="211" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">NIST AI 100-2 (2023): evasion, poisoning,</text>
  <!-- second line -->
  <text x="560" y="221" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">privacy attacks — common vocabulary</text>

  <!-- PQC -->
  <rect x="549" y="228" width="232" height="38" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="560" y="242" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#7C2530">Post-Quantum Cryptography (2024)</text>
  <text x="560" y="256" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">CRYSTALS-Kyber, Dilithium, FALCON, SPHINCS+</text>

  <!-- MNIST -->
  <rect x="549" y="273" width="232" height="38" rx="4" fill="#F5EFE6" stroke="#D4C5A9" stroke-width="1"/>
  <text x="560" y="287" font-family="Georgia, serif" font-size="9.5" font-weight="bold"
        fill="#2D5A8E">MNIST Origin</text>
  <text x="560" y="301" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">NIST SD-19 &#x2192; LeCun's Modified NIST (MNIST)</text>

  <!-- SP 800-series note -->
  <rect x="549" y="318" width="232" height="38" rx="4" fill="#FFF8EC" stroke="#C4A87A" stroke-width="1.2"/>
  <text x="560" y="332" font-family="Georgia, serif" font-size="9" font-weight="bold"
        fill="#5C3D1E">SP 800-series · NCCoE guides</text>
  <text x="560" y="346" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E">Practical cybersecurity implementation</text>
</svg>
