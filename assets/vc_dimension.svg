<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>

  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">VC Dimension: Shattering Points</text>

  <!-- Panel 1: 1 point shattered -->
  <rect x="30" y="55" width="160" height="160" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>
  <text x="110" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">1 Point</text>
  <!-- point -->
  <circle cx="110" cy="130" r="8" fill="#7C2530"/>
  <!-- separator line -->
  <line x1="50" y1="100" x2="170" y2="160" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="110" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Shattered</text>
  <text x="110" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">2/2 labelings</text>

  <!-- Panel 2: 2 points shattered -->
  <rect x="210" y="55" width="170" height="160" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>
  <text x="295" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">2 Points</text>
  <circle cx="260" cy="125" r="8" fill="#7C2530"/>
  <circle cx="330" cy="145" r="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <!-- separator -->
  <line x1="295" y1="85" x2="295" y2="195" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="295" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Shattered</text>
  <text x="295" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">4/4 labelings</text>

  <!-- Panel 3: 3 points shattered -->
  <rect x="400" y="55" width="170" height="160" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>
  <text x="485" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">3 Points</text>
  <circle cx="450" cy="120" r="8" fill="#7C2530"/>
  <circle cx="520" cy="110" r="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="485" cy="165" r="8" fill="#7C2530"/>
  <!-- separator -->
  <line x1="410" y1="145" x2="560" y2="130" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="485" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">Shattered</text>
  <text x="485" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">8/8 labelings</text>

  <!-- Panel 4: 4 points NOT shattered -->
  <rect x="590" y="55" width="180" height="160" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>
  <text x="680" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">4 Points</text>
  <circle cx="640" cy="115" r="8" fill="#7C2530"/>
  <circle cx="720" cy="115" r="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="640" cy="170" r="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <circle cx="720" cy="170" r="8" fill="#7C2530"/>
  <!-- XOR pattern - no line works -->
  <line x1="610" y1="140" x2="760" y2="140" stroke="#7C2530" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="680" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-weight="bold">Cannot shatter!</text>
  <text x="680" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">XOR fails</text>

  <!-- Bottom summary -->
  <rect x="30" y="240" width="740" height="140" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <text x="400" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#5C3D1E" font-weight="bold">Linear Classifier in 2D: VC Dimension = 3</text>

  <!-- Legend -->
  <circle cx="120" cy="298" r="8" fill="#7C2530"/>
  <text x="135" y="303" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Class +1</text>
  <circle cx="250" cy="298" r="8" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="265" y="303" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Class -1</text>
  <line x1="380" y1="298" x2="430" y2="298" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="440" y="303" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Linear separator</text>

  <!-- Formula -->
  <text x="400" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2D5A8E">A hypothesis class H shatters a set S if it can realize all 2^|S| labelings.</text>
  <text x="400" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2D5A8E">VC(H) = largest |S| that H can shatter = d + 1 for linear classifiers in d dimensions.</text>
</svg>