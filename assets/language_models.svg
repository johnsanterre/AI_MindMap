<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <!-- Background and border -->
  <rect x="2" y="2" width="796" height="396" rx="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" fill="#5C3D1E" font-weight="bold">Evolution of Language Models</text>

  <!-- Timeline arrow -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#D4C5A9" stroke-width="2"/>
  <polygon points="740,210 730,204 730,216" fill="#D4C5A9"/>

  <!-- Era 1: N-grams -->
  <rect x="40" y="80" width="200" height="100" rx="8" fill="#FDFAF4" stroke="#7C2530" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-size="14" fill="#7C2530" font-weight="bold">N-gram Models</text>
  <text x="140" y="125" text-anchor="middle" font-size="11" fill="#5C3D1E">Count-based statistics</text>
  <text x="140" y="143" text-anchor="middle" font-size="11" fill="#5C3D1E">P(w | w-1, w-2, ...)</text>
  <text x="140" y="163" text-anchor="middle" font-size="10" fill="#C4A87A">1980s - 2000s</text>

  <!-- Arrow 1 to 2 -->
  <line x1="240" y1="130" x2="290" y2="130" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Era 2: Neural LMs -->
  <rect x="290" y="80" width="200" height="100" rx="8" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="390" y="105" text-anchor="middle" font-size="14" fill="#2D5A8E" font-weight="bold">Neural LMs</text>
  <text x="390" y="125" text-anchor="middle" font-size="11" fill="#5C3D1E">Learned embeddings</text>
  <text x="390" y="143" text-anchor="middle" font-size="11" fill="#5C3D1E">RNN / LSTM chains</text>
  <text x="390" y="163" text-anchor="middle" font-size="10" fill="#C4A87A">2003 - 2017</text>

  <!-- Arrow 2 to 3 -->
  <line x1="490" y1="130" x2="540" y2="130" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Era 3: Transformer LMs -->
  <rect x="540" y="80" width="220" height="100" rx="8" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="2.5"/>
  <text x="650" y="105" text-anchor="middle" font-size="14" fill="#5C3D1E" font-weight="bold">Transformer LMs</text>
  <text x="650" y="125" text-anchor="middle" font-size="11" fill="#5C3D1E">Self-attention</text>
  <text x="650" y="143" text-anchor="middle" font-size="11" fill="#5C3D1E">Massive scale + pretraining</text>
  <text x="650" y="163" text-anchor="middle" font-size="10" fill="#C4A87A">2017 - present</text>

  <!-- Key concepts row below timeline -->
  <rect x="55" y="240" width="150" height="55" rx="6" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.5"/>
  <text x="130" y="262" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Smoothing</text>
  <text x="130" y="280" text-anchor="middle" font-size="10" fill="#5C3D1E">Kneser-Ney, Backoff</text>

  <rect x="230" y="240" width="150" height="55" rx="6" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="305" y="262" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Word Vectors</text>
  <text x="305" y="280" text-anchor="middle" font-size="10" fill="#5C3D1E">Word2Vec, GloVe</text>

  <rect x="405" y="240" width="150" height="55" rx="6" fill="#FDFAF4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="480" y="262" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Perplexity</text>
  <text x="480" y="280" text-anchor="middle" font-size="10" fill="#5C3D1E">2^H(p,q) evaluation</text>

  <rect x="580" y="240" width="175" height="55" rx="6" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="667" y="262" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Scaling Laws</text>
  <text x="667" y="280" text-anchor="middle" font-size="10" fill="#5C3D1E">L(N,D) power laws</text>

  <!-- Shared foundation -->
  <rect x="200" y="325" width="400" height="45" rx="8" fill="#FDFAF4" stroke="#C4A87A" stroke-width="2"/>
  <text x="400" y="348" text-anchor="middle" font-size="13" fill="#5C3D1E" font-weight="bold">Core Goal: P(next word | context)</text>
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#C4A87A">Maximize likelihood of observed language</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#C4A87A"/>
    </marker>
  </defs>
</svg>