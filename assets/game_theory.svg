<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#5C3D1E" font-weight="bold">Prisoner's Dilemma — Payoff Matrix</text>

  <!-- Column headers -->
  <text x="480" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" font-weight="bold">Player B: Cooperate</text>
  <text x="670" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" font-weight="bold">Player B: Defect</text>

  <!-- Row headers -->
  <text x="290" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">Player A: Cooperate</text>
  <text x="290" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7C2530" font-weight="bold">Player A: Defect</text>

  <!-- Grid lines -->
  <rect x="390" y="90" width="190" height="100" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <rect x="580" y="90" width="190" height="100" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <rect x="390" y="190" width="190" height="100" fill="none" stroke="#D4C5A9" stroke-width="2"/>
  <rect x="580" y="190" width="190" height="100" fill="none" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Cell: Cooperate/Cooperate -->
  <text x="485" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">A: -1</text>
  <text x="485" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" font-weight="bold">B: -1</text>

  <!-- Cell: Cooperate/Defect -->
  <text x="675" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">A: -3</text>
  <text x="675" y="162" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" font-weight="bold">B: 0</text>

  <!-- Cell: Defect/Cooperate -->
  <text x="485" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">A: 0</text>
  <text x="485" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" font-weight="bold">B: -3</text>

  <!-- Cell: Defect/Defect — Nash Equilibrium -->
  <rect x="582" y="192" width="186" height="96" fill="#C4A87A" fill-opacity="0.25" rx="4"/>
  <text x="675" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#7C2530" font-weight="bold">A: -2</text>
  <text x="675" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" font-weight="bold">B: -2</text>

  <!-- Nash Equilibrium label -->
  <line x1="675" y1="275" x2="675" y2="320" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="575" y="320" width="200" height="30" rx="8" fill="#C4A87A" fill-opacity="0.5" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="675" y="341" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" font-style="italic">Nash Equilibrium</text>

  <!-- Annotation: Pareto optimal -->
  <line x1="485" y1="170" x2="485" y2="320" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="370" y="320" width="200" height="30" rx="8" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="470" y="341" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-style="italic">Pareto Optimal</text>

  <!-- Small legend at bottom left -->
  <text x="40" y="370" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Payoffs = years in prison (lower is better)</text>
</svg>