<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="6"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">Cauchy-Schwarz Inequality</text>

  <!-- Axis origin -->
  <circle cx="140" cy="310" r="4" fill="#5C3D1E"/>

  <!-- Vector u -->
  <line x1="140" y1="310" x2="420" y2="160" stroke="#2D5A8E" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="290" y="210" font-family="Georgia, serif" font-size="20" fill="#2D5A8E" font-weight="bold" transform="rotate(-28, 290, 210)">u</text>

  <!-- Vector v -->
  <line x1="140" y1="310" x2="460" y2="290" stroke="#7C2530" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="320" y="315" font-family="Georgia, serif" font-size="20" fill="#7C2530" font-weight="bold">v</text>

  <!-- Angle arc theta -->
  <path d="M 200,288 A 65,65 0 0,0 185,265" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <text x="210" y="275" font-family="Georgia, serif" font-size="18" fill="#5C3D1E" font-style="italic">&theta;</text>

  <!-- Projection dashed line -->
  <line x1="420" y1="160" x2="348" y2="280" stroke="#C4A87A" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="370" y="235" font-family="Georgia, serif" font-size="14" fill="#C4A87A">proj</text>

  <!-- Projection point on v -->
  <circle cx="348" cy="280" r="4" fill="#C4A87A"/>

  <!-- Right angle mark at projection -->
  <polyline points="340,272 348,265 356,273" fill="none" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Length labels -->
  <text x="145" y="350" font-family="Georgia, serif" font-size="15" fill="#5C3D1E">||u|| = length of u</text>
  <text x="145" y="370" font-family="Georgia, serif" font-size="15" fill="#5C3D1E">||v|| = length of v</text>

  <!-- Main inequality box -->
  <rect x="510" y="70" width="270" height="90" rx="8" fill="none" stroke="#7C2530" stroke-width="2"/>
  <text x="645" y="100" font-family="Georgia, serif" font-size="17" fill="#7C2530" text-anchor="middle" font-weight="bold">The Inequality</text>
  <text x="645" y="128" font-family="Georgia, serif" font-size="19" fill="#2D5A8E" text-anchor="middle">|&lt;u, v&gt;|  &le;  ||u|| &middot; ||v||</text>
  <text x="645" y="150" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">|cos &theta;| &le; 1</text>

  <!-- Equality condition box -->
  <rect x="510" y="185" width="270" height="70" rx="8" fill="none" stroke="#C4A87A" stroke-width="2"/>
  <text x="645" y="210" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Equality holds iff</text>
  <text x="645" y="235" font-family="Georgia, serif" font-size="16" fill="#2D5A8E" text-anchor="middle">u = &lambda;v  (parallel vectors)</text>

  <!-- Geometric meaning -->
  <rect x="510" y="280" width="270" height="70" rx="8" fill="none" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="645" y="305" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Geometric Meaning</text>
  <text x="645" y="325" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">The projection of u onto v</text>
  <text x="645" y="342" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">can never exceed ||u||</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530"/>
    </marker>
  </defs>
</svg>