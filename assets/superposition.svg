<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia,serif">
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="28" font-size="14" fill="#5C3D1E" text-anchor="middle" letter-spacing="1.5">SUPERPOSITION IN NEURAL NETWORKS</text>

  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- LEFT PANEL: Low-dimensional space with many features -->
  <text x="200" y="58" font-size="11" fill="#5C3D1E" text-anchor="middle" letter-spacing="1">MORE FEATURES THAN DIMENSIONS</text>

  <!-- 2D coordinate axes -->
  <line x1="60" y1="340" x2="360" y2="340" stroke="#D4C5A9" stroke-width="1"/>
  <line x1="60" y1="340" x2="60" y2="80" stroke="#D4C5A9" stroke-width="1"/>
  <polygon points="360,337 366,340 360,343" fill="#D4C5A9"/>
  <polygon points="57,80 60,74 63,80" fill="#D4C5A9"/>
  <text x="370" y="344" font-size="8" fill="#6B5D4F">dim 1</text>
  <text x="50" y="72" font-size="8" fill="#6B5D4F">dim 2</text>

  <!-- Origin -->
  <circle cx="180" cy="230" r="3" fill="#5C3D1E"/>

  <!-- Feature vectors radiating from origin (many directions in 2D) -->
  <!-- Orthogonal pair (red) -->
  <line x1="180" y1="230" x2="310" y2="230" stroke="#7C2530" stroke-width="2.5"/>
  <polygon points="308,226 316,230 308,234" fill="#7C2530"/>
  <text x="318" y="228" font-size="9" fill="#7C2530">f₁</text>

  <line x1="180" y1="230" x2="180" y2="100" stroke="#7C2530" stroke-width="2.5"/>
  <polygon points="176,102 180,94 184,102" fill="#7C2530"/>
  <text x="186" y="96" font-size="9" fill="#7C2530">f₂</text>

  <!-- Nearly-orthogonal features (navy blue) -->
  <line x1="180" y1="230" x2="295" y2="140" stroke="#2D5A8E" stroke-width="1.8"/>
  <polygon points="291,144 299,136 297,146" fill="#2D5A8E"/>
  <text x="302" y="138" font-size="9" fill="#2D5A8E">f₃</text>

  <line x1="180" y1="230" x2="100" y2="115" stroke="#2D5A8E" stroke-width="1.8"/>
  <polygon points="96,120 98,111 105,117" fill="#2D5A8E"/>
  <text x="82" y="110" font-size="9" fill="#2D5A8E">f₄</text>

  <line x1="180" y1="230" x2="300" y2="180" stroke="#2D5A8E" stroke-width="1.8"/>
  <polygon points="297,184 305,177 300,175" fill="#2D5A8E"/>
  <text x="308" y="178" font-size="9" fill="#2D5A8E">f₅</text>

  <!-- More features (tan/brown) -->
  <line x1="180" y1="230" x2="110" y2="150" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="106,155 108,146 115,152" fill="#C4A87A"/>
  <text x="90" y="146" font-size="9" fill="#C4A87A">f₆</text>

  <line x1="180" y1="230" x2="270" y2="120" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="266,124 274,116 272,126" fill="#C4A87A"/>
  <text x="276" y="116" font-size="9" fill="#C4A87A">f₇</text>

  <line x1="180" y1="230" x2="85" y2="200" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="82,205 83,196 90,201" fill="#C4A87A"/>
  <text x="68" y="196" font-size="9" fill="#C4A87A">f₈</text>

  <!-- Annotation -->
  <text x="200" y="365" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">8 features packed into 2 dimensions</text>
  <text x="200" y="380" font-size="9" fill="#6B5D4F" text-anchor="middle">nearly-orthogonal directions</text>

  <!-- RIGHT PANEL: Interference and sparsity -->
  <text x="600" y="58" font-size="11" fill="#5C3D1E" text-anchor="middle" letter-spacing="1">SPARSITY CONTROLS INTERFERENCE</text>

  <!-- Dense activation (interference) -->
  <text x="600" y="85" font-size="10" fill="#7C2530" text-anchor="middle">Dense activation: high interference</text>

  <!-- Bar chart for dense -->
  <rect x="440" y="105" width="28" height="40" fill="#7C2530" opacity="0.8"/>
  <rect x="475" y="115" width="28" height="30" fill="#2D5A8E" opacity="0.8"/>
  <rect x="510" y="100" width="28" height="45" fill="#7C2530" opacity="0.8"/>
  <rect x="545" y="108" width="28" height="37" fill="#2D5A8E" opacity="0.8"/>
  <rect x="580" y="118" width="28" height="27" fill="#C4A87A" opacity="0.8"/>
  <rect x="615" y="95" width="28" height="50" fill="#7C2530" opacity="0.8"/>
  <rect x="650" y="112" width="28" height="33" fill="#2D5A8E" opacity="0.8"/>
  <rect x="685" y="102" width="28" height="43" fill="#C4A87A" opacity="0.8"/>
  <line x1="435" y1="145" x2="720" y2="145" stroke="#D4C5A9" stroke-width="1"/>
  <text x="600" y="162" font-size="8.5" fill="#6B5D4F" text-anchor="middle">all features active — signals overlap</text>

  <!-- Sparse activation (clean) -->
  <text x="600" y="195" font-size="10" fill="#2D5A8E" text-anchor="middle">Sparse activation: low interference</text>

  <!-- Bar chart for sparse -->
  <rect x="440" y="215" width="28" height="3" fill="#D4C5A9" opacity="0.5"/>
  <rect x="475" y="215" width="28" height="3" fill="#D4C5A9" opacity="0.5"/>
  <rect x="510" y="180" width="28" height="38" fill="#2D5A8E" opacity="0.9"/>
  <rect x="545" y="215" width="28" height="3" fill="#D4C5A9" opacity="0.5"/>
  <rect x="580" y="215" width="28" height="3" fill="#D4C5A9" opacity="0.5"/>
  <rect x="615" y="215" width="28" height="3" fill="#D4C5A9" opacity="0.5"/>
  <rect x="650" y="190" width="28" height="28" fill="#7C2530" opacity="0.9"/>
  <rect x="685" y="215" width="28" height="3" fill="#D4C5A9" opacity="0.5"/>
  <line x1="435" y1="218" x2="720" y2="218" stroke="#D4C5A9" stroke-width="1"/>
  <text x="600" y="235" font-size="8.5" fill="#6B5D4F" text-anchor="middle">few features active — clean recovery</text>

  <!-- Key formula -->
  <rect x="445" y="255" width="310" height="55" rx="6" fill="none" stroke="#D4C5A9" stroke-width="1"/>
  <text x="600" y="275" font-size="10" fill="#5C3D1E" text-anchor="middle">Key tradeoff:</text>
  <text x="600" y="295" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">N features in d dims, N >> d</text>
  <text x="600" y="305" font-size="8.5" fill="#6B5D4F" text-anchor="middle">works when features are sparse</text>

  <!-- Polysemantic neuron illustration -->
  <rect x="445" y="325" width="310" height="50" rx="6" fill="none" stroke="#D4C5A9" stroke-width="1"/>
  <text x="480" y="345" font-size="9" fill="#5C3D1E">One neuron responds to:</text>
  <circle cx="480" cy="362" r="4" fill="#7C2530"/>
  <text x="490" y="366" font-size="8.5" fill="#7C2530">cats</text>
  <circle cx="540" cy="362" r="4" fill="#2D5A8E"/>
  <text x="550" y="366" font-size="8.5" fill="#2D5A8E">cars</text>
  <circle cx="600" cy="362" r="4" fill="#C4A87A"/>
  <text x="610" y="366" font-size="8.5" fill="#C4A87A">code</text>
  <text x="665" y="366" font-size="8.5" fill="#5C3D1E" font-style="italic">= polysemantic</text>

  <!-- Caption -->
  <text x="400" y="395" font-size="9" fill="#6B5D4F" text-anchor="middle">Networks encode more concepts than they have neurons by using overlapping, nearly-orthogonal directions</text>
</svg>