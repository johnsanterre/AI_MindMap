<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="mm-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#5C3D1E" letter-spacing="1.5">MODEL MERGING</text>

  <!-- === Three source models (top row) === -->

  <!-- Model A -->
  <rect x="60" y="55" width="150" height="80" rx="6" fill="#E9DEC5" stroke="#7C2530" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" font-size="11" fill="#7C2530" font-weight="bold">Model A</text>
  <text x="135" y="95" text-anchor="middle" font-size="9" fill="#5C3D1E">fine-tuned on</text>
  <text x="135" y="110" text-anchor="middle" font-size="9" fill="#5C3D1E">Code Generation</text>
  <!-- Weight bars -->
  <rect x="78" y="118" width="45" height="6" rx="2" fill="#7C2530" opacity="0.6"/>
  <rect x="130" y="118" width="35" height="6" rx="2" fill="#7C2530" opacity="0.4"/>
  <rect x="172" y="118" width="25" height="6" rx="2" fill="#7C2530" opacity="0.8"/>

  <!-- Model B -->
  <rect x="325" y="55" width="150" height="80" rx="6" fill="#E9DEC5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-size="11" fill="#2D5A8E" font-weight="bold">Model B</text>
  <text x="400" y="95" text-anchor="middle" font-size="9" fill="#5C3D1E">fine-tuned on</text>
  <text x="400" y="110" text-anchor="middle" font-size="9" fill="#5C3D1E">Math Reasoning</text>
  <!-- Weight bars -->
  <rect x="343" y="118" width="30" height="6" rx="2" fill="#2D5A8E" opacity="0.5"/>
  <rect x="380" y="118" width="50" height="6" rx="2" fill="#2D5A8E" opacity="0.7"/>
  <rect x="437" y="118" width="25" height="6" rx="2" fill="#2D5A8E" opacity="0.4"/>

  <!-- Model C -->
  <rect x="590" y="55" width="150" height="80" rx="6" fill="#E9DEC5" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="665" y="78" text-anchor="middle" font-size="11" fill="#5C3D1E" font-weight="bold">Model C</text>
  <text x="665" y="95" text-anchor="middle" font-size="9" fill="#5C3D1E">fine-tuned on</text>
  <text x="665" y="110" text-anchor="middle" font-size="9" fill="#5C3D1E">Chat / Safety</text>
  <!-- Weight bars -->
  <rect x="608" y="118" width="40" height="6" rx="2" fill="#5C3D1E" opacity="0.6"/>
  <rect x="655" y="118" width="30" height="6" rx="2" fill="#5C3D1E" opacity="0.8"/>
  <rect x="692" y="118" width="35" height="6" rx="2" fill="#5C3D1E" opacity="0.5"/>

  <!-- Arrows from models down to merge zone -->
  <line x1="135" y1="135" x2="350" y2="195" stroke="#7C2530" stroke-width="1.2" marker-end="url(#mm-arr)" opacity="0.7"/>
  <line x1="400" y1="135" x2="400" y2="195" stroke="#2D5A8E" stroke-width="1.2" marker-end="url(#mm-arr)" opacity="0.7"/>
  <line x1="665" y1="135" x2="450" y2="195" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#mm-arr)" opacity="0.7"/>

  <!-- === Base model reference (left side) === -->
  <rect x="30" y="195" width="130" height="55" rx="5" fill="#F2EAD8" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="95" y="218" text-anchor="middle" font-size="10" fill="#C4A87A">Base Model</text>
  <text x="95" y="233" text-anchor="middle" font-size="8.5" fill="#C4A87A">(pre-trained weights)</text>
  <line x1="160" y1="222" x2="270" y2="222" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#mm-arr)"/>
  <text x="215" y="216" text-anchor="middle" font-size="7.5" fill="#C4A87A">subtract base</text>

  <!-- === Merge operation box (center) === -->
  <rect x="275" y="190" width="250" height="70" rx="8" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="212" text-anchor="middle" font-size="12" fill="#5C3D1E" font-weight="bold">Merge Operation</text>
  <text x="400" y="232" text-anchor="middle" font-size="9" fill="#5C3D1E">TIES  |  DARE  |  SLERP  |  Task Arithmetic</text>
  <text x="400" y="248" text-anchor="middle" font-size="8" fill="#6B5D4F">resolve sign conflicts, prune, interpolate</text>

  <!-- === Method labels (right side) === -->
  <rect x="580" y="185" width="180" height="85" rx="5" fill="#F2EAD8" stroke="#D4C5A9" stroke-width="1"/>
  <text x="670" y="203" text-anchor="middle" font-size="8.5" fill="#7C2530">TIES: trim + elect signs</text>
  <text x="670" y="220" text-anchor="middle" font-size="8.5" fill="#2D5A8E">DARE: random drop + rescale</text>
  <text x="670" y="237" text-anchor="middle" font-size="8.5" fill="#5C3D1E">SLERP: spherical interpolation</text>
  <text x="670" y="254" text-anchor="middle" font-size="8.5" fill="#C4A87A">Task Arith: weighted sum</text>

  <!-- Arrow from merge to merged model -->
  <line x1="400" y1="260" x2="400" y2="305" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#mm-arr)"/>
  <text x="418" y="288" font-size="8" fill="#5C3D1E">no training</text>

  <!-- === Merged model (bottom center) === -->
  <rect x="280" y="310" width="240" height="70" rx="8" fill="#E9DEC5" stroke="#7C2530" stroke-width="2"/>
  <text x="400" y="338" text-anchor="middle" font-size="13" fill="#7C2530" font-weight="bold">Merged Model</text>
  <text x="400" y="358" text-anchor="middle" font-size="9.5" fill="#5C3D1E">code + math + chat capabilities</text>
  <text x="400" y="372" text-anchor="middle" font-size="8" fill="#6B5D4F">single model, no extra inference cost</text>

  <!-- Merged weight bars (multi-color) -->
  <rect x="310" y="340" width="15" height="5" rx="1" fill="#7C2530" opacity="0.6"/>
  <rect x="327" y="340" width="15" height="5" rx="1" fill="#2D5A8E" opacity="0.6"/>
  <rect x="344" y="340" width="15" height="5" rx="1" fill="#5C3D1E" opacity="0.6"/>

  <!-- Key insight label (bottom left) -->
  <text x="50" y="355" font-size="9" fill="#6B5D4F" font-style="italic">combine skills from</text>
  <text x="50" y="370" font-size="9" fill="#6B5D4F" font-style="italic">multiple experts into one</text>
</svg>
