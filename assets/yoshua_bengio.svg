<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Yoshua Bengio: A Career in Deep Learning</text>

  <!-- Timeline spine -->
  <line x1="50" y1="210" x2="760" y2="210" stroke="#C4A87A" stroke-width="2.5"/>
  <polygon points="756,205 766,210 756,215" fill="#C4A87A"/>

  <!-- Era shading -->
  <rect x="50"  y="195" width="180" height="30" fill="#2D5A8E" rx="3" opacity="0.15"/>
  <rect x="230" y="195" width="200" height="30" fill="#7C2530" rx="3" opacity="0.12"/>
  <rect x="430" y="195" width="330" height="30" fill="#5C3D1E" rx="3" opacity="0.12"/>

  <!-- Era labels -->
  <text x="140" y="188" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">Foundations</text>
  <text x="330" y="188" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-style="italic">Deep Learning Revival</text>
  <text x="595" y="188" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">Recognition &amp; New Frontiers</text>

  <!-- 1993: MILA founded -->
  <circle cx="80" cy="210" r="6" fill="#2D5A8E"/>
  <line x1="80" y1="204" x2="80" y2="135" stroke="#2D5A8E" stroke-width="1"/>
  <text x="80" y="128" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">1993</text>
  <text x="80" y="117" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Founds MILA</text>
  <text x="80" y="106" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">(Montr&#233;al)</text>

  <!-- 2003: Neural Language Model -->
  <circle cx="180" cy="210" r="7" fill="#2D5A8E"/>
  <line x1="180" y1="216" x2="180" y2="280" stroke="#2D5A8E" stroke-width="1"/>
  <text x="180" y="293" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-weight="bold">2003</text>
  <text x="180" y="304" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Neural Language</text>
  <text x="180" y="315" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Model (JMLR)</text>

  <!-- 2009: Curriculum Learning -->
  <circle cx="270" cy="210" r="6" fill="#7C2530"/>
  <line x1="270" y1="204" x2="270" y2="135" stroke="#7C2530" stroke-width="1"/>
  <text x="270" y="128" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">2009</text>
  <text x="270" y="117" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Curriculum</text>
  <text x="270" y="106" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Learning</text>

  <!-- 2014: GAN Theory / Seq2Seq -->
  <circle cx="370" cy="210" r="8" fill="#7C2530"/>
  <line x1="370" y1="216" x2="370" y2="280" stroke="#7C2530" stroke-width="1.5"/>
  <text x="370" y="293" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle" font-weight="bold">2014</text>
  <text x="370" y="304" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">GAN Theory &amp;</text>
  <text x="370" y="315" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Seq-to-Seq</text>

  <!-- 2015: Attention Mechanisms -->
  <circle cx="460" cy="210" r="7" fill="#5C3D1E"/>
  <line x1="460" y1="204" x2="460" y2="130" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="460" y="123" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2015</text>
  <text x="460" y="112" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Attention</text>
  <text x="460" y="101" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Mechanisms</text>

  <!-- 2018: Turing Award -->
  <circle cx="580" cy="210" r="10" fill="#C4A87A" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="580" y1="220" x2="580" y2="280" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="580" y="293" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2018</text>
  <text x="580" y="306" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Turing Award</text>
  <text x="580" y="319" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">(w/ Hinton, LeCun)</text>

  <!-- 2021+: GFlowNets -->
  <circle cx="710" cy="210" r="7" fill="#5C3D1E"/>
  <line x1="710" y1="204" x2="710" y2="135" stroke="#5C3D1E" stroke-width="1"/>
  <text x="710" y="128" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-weight="bold">2021+</text>
  <text x="710" y="117" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">GFlowNets &amp;</text>
  <text x="710" y="106" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">AI Safety</text>

  <!-- Connecting theme arc -->
  <path d="M80,85 Q400,50 710,85" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="62" font-family="Georgia,serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-style="italic">Distributed Representations &amp; Compositionality</text>

  <!-- Bottom annotation -->
  <text x="400" y="370" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">From word embeddings to generative flow networks &#8212; learning structure from data</text>
</svg>