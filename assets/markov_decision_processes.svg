<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Markov Decision Process: States, Actions, and Rewards</text>

  <!-- State S0 -->
  <circle cx="130" cy="200" r="42" fill="#F5EFE4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="130" y="195" font-family="Georgia,serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-weight="bold">S0</text>
  <text x="130" y="212" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Start</text>

  <!-- State S1 -->
  <circle cx="400" cy="100" r="42" fill="#F5EFE4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="400" y="95" font-family="Georgia,serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-weight="bold">S1</text>
  <text x="400" y="112" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Risky</text>

  <!-- State S2 -->
  <circle cx="400" cy="300" r="42" fill="#F5EFE4" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="400" y="295" font-family="Georgia,serif" font-size="14" fill="#2D5A8E" text-anchor="middle" font-weight="bold">S2</text>
  <text x="400" y="312" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Safe</text>

  <!-- Terminal State S3 -->
  <circle cx="670" cy="200" r="42" fill="#F5EFE4" stroke="#7C2530" stroke-width="3"/>
  <circle cx="670" cy="200" r="36" fill="none" stroke="#7C2530" stroke-width="1.5"/>
  <text x="670" y="195" font-family="Georgia,serif" font-size="14" fill="#7C2530" text-anchor="middle" font-weight="bold">S3</text>
  <text x="670" y="212" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">Goal</text>

  <!-- Action a1: S0 -> S1 -->
  <line x1="168" y1="175" x2="355" y2="118" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <rect x="220" y="125" width="60" height="22" rx="3" fill="#C4A87A" opacity="0.7"/>
  <text x="250" y="140" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">a1</text>

  <!-- Reward label r=+10 on S0->S1 -->
  <text x="232" y="120" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">r = +10</text>

  <!-- Action a2: S0 -> S2 -->
  <line x1="168" y1="225" x2="355" y2="282" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <rect x="220" y="258" width="60" height="22" rx="3" fill="#C4A87A" opacity="0.7"/>
  <text x="250" y="273" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">a2</text>

  <!-- Reward label r=+2 on S0->S2 -->
  <text x="232" y="295" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">r = +2</text>

  <!-- Transition S1 -> S3 (p=0.4) -->
  <line x1="440" y1="88" x2="625" y2="185" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="545" y="118" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">p = 0.4</text>
  <text x="545" y="132" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">r = +50</text>

  <!-- Transition S1 -> S0 (p=0.6, failure) -->
  <path d="M 360,115 C 280,65 200,65 145,165" fill="none" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="245" y="68" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">p = 0.6</text>
  <text x="245" y="82" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">r = -5</text>

  <!-- Transition S2 -> S3 (p=0.9) -->
  <line x1="440" y1="288" x2="625" y2="215" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="545" y="275" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">p = 0.9</text>
  <text x="545" y="289" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">r = +5</text>

  <!-- Transition S2 -> S0 (p=0.1) -->
  <path d="M 360,315 C 280,355 200,355 145,240" fill="none" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="245" y="358" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">p = 0.1, r = 0</text>

  <!-- Legend -->
  <rect x="30" y="350" width="240" height="30" rx="4" fill="#F5EFE4" stroke="#D4C5A9" stroke-width="1"/>
  <circle cx="50" cy="365" r="5" fill="#F5EFE4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="60" y="369" font-family="Georgia,serif" font-size="9" fill="#2C2C2C">State</text>
  <rect x="100" y="359" width="18" height="12" rx="2" fill="#C4A87A" opacity="0.7"/>
  <text x="122" y="369" font-family="Georgia,serif" font-size="9" fill="#2C2C2C">Action</text>
  <line x1="165" y1="365" x2="190" y2="365" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="195" y="369" font-family="Georgia,serif" font-size="9" fill="#2C2C2C">Transition (prob.)</text>

  <!-- Bottom caption -->
  <text x="400" y="385" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle" font-style="italic">The agent chooses actions; the environment chooses transitions.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBrown" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#7C2530"/>
    </marker>
  </defs>
</svg>