<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D5A8E" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C2530" />
    </marker>
    <marker id="arrow-brown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5C3D1E" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" />
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#D4C5A9" stroke-width="2" />

  <!-- Panel dividers -->
  <line x1="233" y1="20" x2="233" y2="380" stroke="#D4C5A9" stroke-width="1.5" />
  <line x1="567" y1="20" x2="567" y2="380" stroke="#D4C5A9" stroke-width="1.5" />

  <!-- ===== LEFT PANEL: Timeline ===== -->
  <text x="116" y="42" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Richard S. Sutton</text>
  <text x="116" y="58" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">1956 – present</text>

  <!-- Timeline vertical line -->
  <line x1="72" y1="75" x2="72" y2="368" stroke="#C4A87A" stroke-width="2" />

  <!-- 1956 -->
  <circle cx="72" cy="82" r="5" fill="#7C2530" />
  <line x1="72" y1="82" x2="87" y2="82" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="79" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">1956</text>
  <text x="91" y="91" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Born, Charlottesville,</text>
  <text x="91" y="102" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Virginia, USA</text>

  <!-- 1978 -->
  <circle cx="72" cy="128" r="5" fill="#7C2530" />
  <line x1="72" y1="128" x2="87" y2="128" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="125" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">1978</text>
  <text x="91" y="137" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">BA Psychology,</text>
  <text x="91" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Stanford University</text>

  <!-- 1984 -->
  <circle cx="72" cy="174" r="5" fill="#7C2530" />
  <line x1="72" y1="174" x2="87" y2="174" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="171" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">1984</text>
  <text x="91" y="183" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">PhD UMass Amherst;</text>
  <text x="91" y="194" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">temporal credit assignment</text>

  <!-- 1988 -->
  <circle cx="72" cy="222" r="5" fill="#5C3D1E" />
  <line x1="72" y1="222" x2="87" y2="222" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="219" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">1988</text>
  <text x="91" y="231" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">TD(λ) paper published;</text>
  <text x="91" y="242" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">AT&amp;T Bell Labs / GTE</text>

  <!-- 1998 -->
  <circle cx="72" cy="274" r="5" fill="#5C3D1E" />
  <line x1="72" y1="274" x2="87" y2="274" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="271" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">1998</text>
  <text x="91" y="283" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">RL textbook (with Barto)</text>
  <text x="91" y="294" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Univ. of Alberta</text>

  <!-- 2019 -->
  <circle cx="72" cy="324" r="5" fill="#2D5A8E" />
  <line x1="72" y1="324" x2="87" y2="324" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="321" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">2019</text>
  <text x="91" y="333" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">"The Bitter Lesson"</text>
  <text x="91" y="344" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">essay published</text>

  <!-- 2023 -->
  <circle cx="72" cy="360" r="5" fill="#2D5A8E" />
  <line x1="72" y1="360" x2="87" y2="360" stroke="#C4A87A" stroke-width="1.5" />
  <text x="91" y="357" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E">2023</text>
  <text x="91" y="369" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Joins Google DeepMind</text>

  <!-- ===== CENTER PANEL: TD Learning Diagram ===== -->
  <text x="400" y="36" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Temporal Difference Learning</text>
  <text x="400" y="52" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Agent learns by comparing value estimates over time</text>

  <!-- Agent box -->
  <rect x="335" y="90" width="130" height="60" rx="6" fill="#EBF0F8" stroke="#2D5A8E" stroke-width="2" />
  <text x="400" y="115" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">AGENT</text>
  <text x="400" y="132" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">policy π(a|s)</text>

  <!-- Environment box -->
  <rect x="305" y="255" width="190" height="60" rx="6" fill="#F0EBE0" stroke="#7C2530" stroke-width="2" />
  <text x="400" y="280" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">ENVIRONMENT</text>
  <text x="400" y="297" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">transition P(s'|s,a)</text>

  <!-- Action arrow: Agent → Environment (right side down) -->
  <path d="M 465 130 Q 530 130 530 285" fill="none" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrow)" />
  <text x="538" y="205" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E">A</text>
  <text x="536" y="218" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">action</text>

  <!-- State + Reward arrow: Environment → Agent (left side up) -->
  <path d="M 305 270 Q 260 270 260 150" fill="none" stroke="#7C2530" stroke-width="2" marker-end="url(#arrow-red)" />
  <text x="238" y="210" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#7C2530">S, R</text>
  <text x="232" y="223" font-family="Georgia, serif" font-size="9" fill="#7C2530">state,</text>
  <text x="233" y="234" font-family="Georgia, serif" font-size="9" fill="#7C2530">reward</text>

  <!-- Value estimate box inside agent -->
  <rect x="248" y="160" width="110" height="36" rx="4" fill="#FDFAF4" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="303" y="176" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">V(s) estimate</text>
  <text x="303" y="189" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">updated each step</text>

  <!-- TD error formula box -->
  <rect x="290" y="355" width="220" height="38" rx="4" fill="#F8F4E8" stroke="#C4A87A" stroke-width="1.5" />
  <text x="400" y="369" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">TD error: δ = R + γV(s') − V(s)</text>
  <text x="400" y="385" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle">bootstrap from next estimate</text>

  <!-- Bootstrapping arrow (V(s') feeds back) -->
  <path d="M 465 285 Q 545 340 430 355" fill="none" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-brown)" />
  <text x="520" y="335" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-style="italic">bootstrap</text>

  <!-- ===== RIGHT PANEL: Bitter Lesson & Papers ===== -->
  <text x="683" y="38" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Key Works &amp; Ideas</text>

  <!-- Bitter Lesson quote box -->
  <rect x="578" y="52" width="210" height="110" rx="4" fill="#EBF0F8" stroke="#2D5A8E" stroke-width="1.5" />
  <text x="683" y="70" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">"The Bitter Lesson" (2019)</text>
  <text x="590" y="86" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" font-style="italic">"The biggest lesson that can</text>
  <text x="590" y="98" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" font-style="italic"> be read from 70 years of AI</text>
  <text x="590" y="110" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" font-style="italic"> research is that general</text>
  <text x="590" y="122" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" font-style="italic"> methods that leverage</text>
  <text x="590" y="134" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" font-style="italic"> computation always win."</text>
  <text x="683" y="153" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle">— R. Sutton, 2019</text>

  <!-- Paper 1 -->
  <rect x="578" y="174" width="210" height="60" rx="4" fill="#F0EBE0" stroke="#C4A87A" stroke-width="1.2" />
  <text x="683" y="191" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Learning to Predict by the</text>
  <text x="683" y="204" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Methods of TD</text>
  <text x="683" y="217" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Sutton, 1988 — Machine Learning</text>
  <text x="683" y="228" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Foundational TD(λ) paper</text>

  <!-- Paper 2 -->
  <rect x="578" y="245" width="210" height="60" rx="4" fill="#F0EBE0" stroke="#C4A87A" stroke-width="1.2" />
  <text x="683" y="262" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Reinforcement Learning:</text>
  <text x="683" y="275" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">An Introduction</text>
  <text x="683" y="288" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Sutton &amp; Barto, 1998 / 2018</text>
  <text x="683" y="300" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">The defining RL textbook</text>

  <!-- Paper 3 -->
  <rect x="578" y="316" width="210" height="60" rx="4" fill="#F0EBE0" stroke="#C4A87A" stroke-width="1.2" />
  <text x="683" y="333" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Policy Gradient Methods for</text>
  <text x="683" y="346" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">RL with Function Approx.</text>
  <text x="683" y="359" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Sutton et al., 2000 — NIPS</text>
  <text x="683" y="371" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Policy gradient theorem</text>
</svg>
