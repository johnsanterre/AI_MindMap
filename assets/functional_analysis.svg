<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6"/>

  <!-- ===== SECTION 1: Finite vs Infinite Dimensional ===== -->
  <text x="150" y="28" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Finite vs Infinite Dimensions</text>
  <line x1="20" y1="33" x2="280" y2="33" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Finite-dim vector (R^n) -->
  <rect x="40" y="50" width="90" height="120" rx="4" fill="#C4A87A" opacity="0.25" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="85" y="70" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">R&#x207F;</text>
  <!-- Column vector entries -->
  <text x="85" y="92" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle">[ x&#x2081; ]</text>
  <text x="85" y="110" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle">[ x&#x2082; ]</text>
  <text x="85" y="125" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle">&#x22EE;</text>
  <text x="85" y="143" font-family="Georgia, serif" font-size="13" fill="#7C2530" text-anchor="middle">[ x&#x2099; ]</text>
  <text x="85" y="185" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">n components</text>

  <!-- Arrow -->
  <line x1="148" y1="110" x2="188" y2="110" stroke="#2D5A8E" stroke-width="2"/>
  <polygon points="188,110 180,106 180,114" fill="#2D5A8E"/>
  <text x="168" y="100" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">extend</text>

  <!-- Infinite-dim function (Hilbert space) -->
  <!-- Function curve -->
  <path d="M200,145 Q220,55 240,100 Q260,145 280,80" fill="none" stroke="#7C2530" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="195" y="50" width="90" height="120" rx="4" fill="none" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="70" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">L&#xB2;</text>
  <text x="240" y="185" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">&#x221E; components</text>
  <text x="240" y="197" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">f(x)</text>

  <!-- ===== SECTION 2: Key Spaces ===== -->
  <line x1="300" y1="20" x2="300" y2="340" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="28" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Hierarchy of Spaces</text>
  <line x1="305" y1="33" x2="595" y2="33" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Banach space (outer) -->
  <rect x="320" y="50" width="260" height="155" rx="18" fill="#C4A87A" opacity="0.15" stroke="#5C3D1E" stroke-width="2"/>
  <text x="450" y="68" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Banach Space</text>
  <text x="450" y="82" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">complete + normed</text>

  <!-- Hilbert space (inner) -->
  <rect x="355" y="92" width="190" height="100" rx="14" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="2"/>
  <text x="450" y="112" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Hilbert Space</text>
  <text x="450" y="126" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">+ inner product</text>

  <!-- Examples inside Hilbert -->
  <text x="450" y="150" font-family="Georgia, serif" font-size="10.5" fill="#7C2530" text-anchor="middle">L&#xB2;, &#x2113;&#xB2;, RKHS</text>
  <text x="450" y="166" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">&#x27E8;f, g&#x27E9; = &#x222B; f(x)g(x) dx</text>
  <text x="450" y="183" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Geometry + Projection</text>

  <!-- Banach-only examples -->
  <text x="345" y="190" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">L&#xB9;</text>
  <text x="555" y="190" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">L&#x221E;</text>

  <!-- ===== SECTION 3: Operator / Kernel ===== -->
  <line x1="600" y1="20" x2="600" y2="340" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="700" y="28" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Operators &amp; Kernels</text>
  <line x1="605" y1="33" x2="795" y2="33" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Operator T: V -> V -->
  <circle cx="660" cy="105" r="35" fill="#C4A87A" opacity="0.2" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="660" y="100" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">V</text>
  <text x="660" y="115" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">input</text>

  <line x1="698" y1="105" x2="722" y2="105" stroke="#7C2530" stroke-width="2"/>
  <polygon points="722,105 714,101 714,109" fill="#7C2530"/>
  <text x="710" y="95" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">T</text>

  <circle cx="755" cy="105" r="35" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="755" y="100" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">V</text>
  <text x="755" y="115" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">output</text>

  <!-- Kernel mapping below -->
  <text x="700" y="165" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Kernel Trick</text>
  <text x="700" y="182" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">k(x,y) = &#x27E8;&#x3C6;(x), &#x3C6;(y)&#x27E9;</text>
  <text x="700" y="198" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Inner product in RKHS</text>

  <!-- ===== Bottom Row: Key Theorems ===== -->
  <line x1="20" y1="220" x2="780" y2="220" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="240" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-style="italic">Foundational Theorems</text>

  <!-- Theorem boxes -->
  <rect x="30" y="252" width="170" height="65" rx="6" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="115" y="272" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Riesz Representation</text>
  <text x="115" y="289" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Every bounded linear</text>
  <text x="115" y="303" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">functional = inner product</text>

  <rect x="220" y="252" width="170" height="65" rx="6" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="305" y="272" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Spectral Theorem</text>
  <text x="305" y="289" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Self-adjoint operators</text>
  <text x="305" y="303" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">decompose spectrally</text>

  <rect x="410" y="252" width="170" height="65" rx="6" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="495" y="272" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Hahn-Banach</text>
  <text x="495" y="289" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Linear functionals extend</text>
  <text x="495" y="303" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">preserving the norm</text>

  <rect x="600" y="252" width="175" height="65" rx="6" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="688" y="272" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Open Mapping</text>
  <text x="688" y="289" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Surjective bounded ops</text>
  <text x="688" y="303" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">map open sets to open sets</text>

  <!-- ===== Bottom caption bar ===== -->
  <rect x="0" y="360" width="800" height="40" fill="#F0EAD8" rx="0"/>
  <rect x="0" y="360" width="800" height="40" fill="none" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="376" font-family="Georgia, serif" font-size="11.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">
    Functional analysis extends linear algebra to infinite dimensions — where functions become vectors and integrals become inner products.
  </text>
  <text x="400" y="392" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">
    Hilbert and Banach spaces provide the rigorous foundation for kernel methods, PDEs, and quantum mechanics.
  </text>
</svg>