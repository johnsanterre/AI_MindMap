<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Model-based RL: plan in imagination, act in reality.</text>

  <!-- ===== REAL ENVIRONMENT (right) ===== -->
  <rect x="590" y="150" width="150" height="70" rx="8" fill="#D4C5A9" stroke="#5C3D1E" stroke-width="2"/>
  <text x="665" y="179" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Real</text>
  <text x="665" y="196" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Environment</text>
  <text x="665" y="213" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">returns o_{t+1}, r_t</text>

  <!-- ===== WORLD MODEL BOX (center) ===== -->
  <rect x="295" y="110" width="210" height="180" rx="10" fill="#EDE8DC" stroke="#2D5A8E" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="400" y="135" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">World Model (RSSM)</text>

  <!-- Encoder -->
  <rect x="315" y="148" width="80" height="36" rx="5" fill="#2D5A8E" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="355" y="163" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Encoder</text>
  <text x="355" y="177" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">obs → z</text>

  <!-- World Model inner (transition) -->
  <rect x="315" y="198" width="80" height="36" rx="5" fill="#7C2530" stroke="#7C2530" stroke-width="1.5"/>
  <text x="355" y="213" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Transition</text>
  <text x="355" y="227" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">z,a → z'</text>

  <!-- Decoder -->
  <rect x="315" y="248" width="80" height="36" rx="5" fill="#5C3D1E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="355" y="263" font-family="Georgia, serif" font-size="11" fill="#FDFAF4" text-anchor="middle">Decoder</text>
  <text x="355" y="277" font-family="Georgia, serif" font-size="10" fill="#C4A87A" text-anchor="middle">z → obs</text>

  <!-- Actor / Critic (right side inside world model box) -->
  <rect x="410" y="148" width="80" height="36" rx="5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="450" y="163" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Actor</text>
  <text x="450" y="177" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">π(a|z)</text>

  <rect x="410" y="198" width="80" height="36" rx="5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="450" y="213" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Critic</text>
  <text x="450" y="227" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">V(z)</text>

  <!-- Reward pred label -->
  <text x="400" y="268" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#7C2530" text-anchor="middle">predicts r̂, z_{t+1}</text>

  <!-- ===== AGENT (left) ===== -->
  <rect x="50" y="150" width="130" height="70" rx="8" fill="#7C2530" stroke="#7C2530" stroke-width="2"/>
  <text x="115" y="179" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Agent</text>
  <text x="115" y="198" font-family="Georgia, serif" font-size="11" fill="#C4A87A" text-anchor="middle">selects action a_t</text>

  <!-- Arrow: Agent → Real Environment (action) -->
  <!-- Goes up and over -->
  <path d="M 180 165 Q 400 60 590 165" fill="none" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arr-brown)"/>
  <text x="400" y="75" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">action a_t (real)</text>

  <!-- Arrow: Agent → World Model (action) -->
  <path d="M 180 185 L 295 185" fill="none" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arr-navy)"/>
  <text x="237" y="178" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">action a_t</text>

  <!-- Arrow: Real Environment → Agent (obs/reward) -->
  <path d="M 590 200 Q 400 340 180 205" fill="none" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-brown)"/>
  <text x="400" y="358" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">o_{t+1}, r_t (real obs &amp; reward)</text>

  <!-- Arrow: World Model → Agent (imagined z, r̂) -->
  <path d="M 295 230 L 180 230" fill="none" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="237" y="248" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">ẑ, r̂ (dream)</text>

  <!-- Dream loop label inside world model -->
  <text x="400" y="300" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#2D5A8E" text-anchor="middle">"dream" rollouts</text>
  <path d="M 355 292 Q 400 310 450 292" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-navy-sm)"/>

  <!-- ===== LEGEND ===== -->
  <line x1="50" y1="375" x2="80" y2="375" stroke="#5C3D1E" stroke-width="2"/>
  <text x="85" y="379" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Real interaction</text>
  <line x1="200" y1="375" x2="230" y2="375" stroke="#5C3D1E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="235" y="379" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Imagined / dream signal</text>
  <line x1="420" y1="375" x2="450" y2="375" stroke="#2D5A8E" stroke-width="2"/>
  <text x="455" y="379" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Model input</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr-brown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arr-navy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arr-navy-sm" markerWidth="6" markerHeight="6" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L6,2.5 z" fill="#2D5A8E"/>
    </marker>
  </defs>
</svg>
