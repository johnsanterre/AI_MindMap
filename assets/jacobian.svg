<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3" rx="8"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" fill="#7C2530" text-anchor="middle" font-weight="bold">The Jacobian Matrix</text>

  <!-- Input vector -->
  <rect x="40" y="70" width="120" height="260" rx="6" fill="none" stroke="#2D5A8E" stroke-width="2"/>
  <text x="100" y="62" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Inputs</text>
  <text x="92" y="122" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-style="italic">x</text>
  <text x="104" y="130" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">1</text>
  <text x="92" y="172" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-style="italic">x</text>
  <text x="104" y="180" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2</text>
  <text x="100" y="230" font-family="Georgia, serif" font-size="22" fill="#C4A87A" text-anchor="middle">&#x22EE;</text>
  <text x="92" y="290" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-style="italic">x</text>
  <text x="104" y="298" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">n</text>

  <!-- Arrows input to matrix -->
  <line x1="162" y1="140" x2="228" y2="140" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="162" y1="200" x2="228" y2="200" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="162" y1="275" x2="228" y2="275" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Jacobian matrix bracket -->
  <rect x="235" y="70" width="330" height="260" rx="6" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <text x="400" y="62" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle" font-weight="bold">Jacobian  J</text>

  <!-- Matrix entries row 1 -->
  <text x="300" y="130" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2081;/&#x2202;x&#x2081;</text>
  <text x="400" y="130" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2081;/&#x2202;x&#x2082;</text>
  <text x="460" y="130" font-family="Georgia, serif" font-size="15" fill="#C4A87A" text-anchor="middle">&#x22EF;</text>
  <text x="510" y="130" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2081;/&#x2202;x&#x2099;</text>

  <!-- Matrix entries row 2 -->
  <text x="300" y="180" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2082;/&#x2202;x&#x2081;</text>
  <text x="400" y="180" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2082;/&#x2202;x&#x2082;</text>
  <text x="460" y="180" font-family="Georgia, serif" font-size="15" fill="#C4A87A" text-anchor="middle">&#x22EF;</text>
  <text x="510" y="180" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2082;/&#x2202;x&#x2099;</text>

  <!-- Dots row -->
  <text x="300" y="235" font-family="Georgia, serif" font-size="22" fill="#C4A87A" text-anchor="middle">&#x22EE;</text>
  <text x="400" y="235" font-family="Georgia, serif" font-size="22" fill="#C4A87A" text-anchor="middle">&#x22F1;</text>
  <text x="510" y="235" font-family="Georgia, serif" font-size="22" fill="#C4A87A" text-anchor="middle">&#x22EE;</text>

  <!-- Matrix entries row m -->
  <text x="300" y="290" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2098;/&#x2202;x&#x2081;</text>
  <text x="400" y="290" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2098;/&#x2202;x&#x2082;</text>
  <text x="460" y="290" font-family="Georgia, serif" font-size="15" fill="#C4A87A" text-anchor="middle">&#x22EF;</text>
  <text x="510" y="290" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" text-anchor="middle">&#x2202;f&#x2098;/&#x2202;x&#x2099;</text>

  <!-- Arrows matrix to output -->
  <line x1="567" y1="140" x2="633" y2="140" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="567" y1="200" x2="633" y2="200" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="567" y1="275" x2="633" y2="275" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Output vector -->
  <rect x="640" y="70" width="120" height="260" rx="6" fill="none" stroke="#7C2530" stroke-width="2"/>
  <text x="700" y="62" font-family="Georgia, serif" font-size="15" fill="#7C2530" text-anchor="middle" font-weight="bold">Outputs</text>
  <text x="692" y="122" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-style="italic">f</text>
  <text x="704" y="130" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">1</text>
  <text x="692" y="172" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-style="italic">f</text>
  <text x="704" y="180" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">2</text>
  <text x="700" y="230" font-family="Georgia, serif" font-size="22" fill="#C4A87A" text-anchor="middle">&#x22EE;</text>
  <text x="692" y="290" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" text-anchor="middle" font-style="italic">f</text>
  <text x="704" y="298" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" text-anchor="middle">m</text>

  <!-- Caption -->
  <text x="400" y="365" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" text-anchor="middle" font-style="italic">Each row captures how one output changes with respect to all inputs</text>
  <text x="400" y="388" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" text-anchor="middle" font-style="italic">f : R&#x207F; &#x2192; R&#x1D50;</text>
</svg>
