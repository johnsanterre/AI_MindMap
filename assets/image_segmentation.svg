<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#5C3D1E" font-weight="bold" letter-spacing="1.5">IMAGE SEGMENTATION</text>

  <!-- Dividers -->
  <line x1="267" y1="42" x2="267" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="534" y1="42" x2="534" y2="370" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- === PANEL 1: SEMANTIC SEGMENTATION === -->
  <text x="134" y="55" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">SEMANTIC</text>

  <!-- Input image grid 6x6 -->
  <rect x="50" y="75" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="80" y="75" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="110" y="75" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="140" y="75" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="170" y="75" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="50" y="105" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="80" y="105" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="110" y="105" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="140" y="105" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="170" y="105" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="50" y="135" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="80" y="135" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="110" y="135" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="140" y="135" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="170" y="135" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="50" y="165" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="80" y="165" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="110" y="165" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="140" y="165" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>
  <rect x="170" y="165" width="30" height="30" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7"/>

  <!-- Colored class overlay: sky (blue) -->
  <rect x="50" y="75" width="150" height="30" fill="#2D5A8E" fill-opacity="0.25" stroke="none"/>
  <!-- Tree (brown) -->
  <rect x="50" y="105" width="60" height="60" fill="#5C3D1E" fill-opacity="0.3" stroke="none"/>
  <rect x="80" y="75" width="30" height="30" fill="#5C3D1E" fill-opacity="0.3" stroke="none"/>
  <!-- Road (tan) -->
  <rect x="110" y="105" width="90" height="90" fill="#C4A87A" fill-opacity="0.4" stroke="none"/>
  <!-- Car (red) -->
  <rect x="140" y="135" width="60" height="30" fill="#7C2530" fill-opacity="0.25" stroke="none"/>
  <!-- Ground -->
  <rect x="50" y="165" width="60" height="30" fill="#5C3D1E" fill-opacity="0.15" stroke="none"/>

  <text x="134" y="210" text-anchor="middle" font-size="8.5" fill="#6B5D4F">every pixel gets a class</text>

  <!-- Legend -->
  <rect x="55" y="225" width="10" height="10" fill="#2D5A8E" fill-opacity="0.4"/>
  <text x="70" y="234" font-size="8" fill="#6B5D4F">sky</text>
  <rect x="100" y="225" width="10" height="10" fill="#5C3D1E" fill-opacity="0.45"/>
  <text x="115" y="234" font-size="8" fill="#6B5D4F">tree</text>
  <rect x="140" y="225" width="10" height="10" fill="#C4A87A" fill-opacity="0.6"/>
  <text x="155" y="234" font-size="8" fill="#6B5D4F">road</text>
  <rect x="185" y="225" width="10" height="10" fill="#7C2530" fill-opacity="0.4"/>
  <text x="200" y="234" font-size="8" fill="#6B5D4F">car</text>

  <!-- === PANEL 2: INSTANCE SEGMENTATION === -->
  <text x="400" y="55" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">INSTANCE</text>

  <!-- Two separate car-like blobs with different shading -->
  <rect x="300" y="85" width="90" height="70" fill="#F2EAD8" stroke="#C4A87A" stroke-width="0.7" rx="3"/>
  <!-- Car 1 mask -->
  <rect x="310" y="95" width="30" height="22" fill="#7C2530" fill-opacity="0.35" stroke="#7C2530" stroke-width="1.5" rx="3"/>
  <text x="325" y="110" text-anchor="middle" font-size="7.5" fill="#7C2530" font-weight="bold">car #1</text>
  <!-- Car 1 wheels -->
  <rect x="312" y="117" width="8" height="6" fill="#5C3D1E" fill-opacity="0.4" rx="1"/>
  <rect x="328" y="117" width="8" height="6" fill="#5C3D1E" fill-opacity="0.4" rx="1"/>

  <!-- Car 2 mask -->
  <rect x="350" y="100" width="30" height="18" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="1.5" rx="3"/>
  <text x="365" y="113" text-anchor="middle" font-size="7.5" fill="#2D5A8E" font-weight="bold">car #2</text>
  <!-- Car 2 wheels -->
  <rect x="353" y="118" width="6" height="5" fill="#5C3D1E" fill-opacity="0.4" rx="1"/>
  <rect x="370" y="118" width="6" height="5" fill="#5C3D1E" fill-opacity="0.4" rx="1"/>

  <!-- Background label -->
  <text x="375" y="145" text-anchor="end" font-size="7" fill="#6B5D4F">background</text>

  <text x="400" y="175" text-anchor="middle" font-size="8.5" fill="#6B5D4F">same class, different IDs</text>

  <!-- Arrow showing evolution -->
  <text x="400" y="200" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">+</text>

  <!-- Panoptic = semantic + instance -->
  <rect x="310" y="215" width="180" height="30" fill="#FDFAF4" stroke="#7C2530" stroke-width="1.2" rx="4"/>
  <text x="400" y="235" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">panoptic = semantic + instance</text>

  <!-- === PANEL 3: ARCHITECTURE EVOLUTION === -->
  <text x="667" y="55" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">ARCHITECTURE EVOLUTION</text>

  <!-- FCN block -->
  <rect x="570" y="75" width="80" height="32" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.2" rx="4"/>
  <text x="610" y="88" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">FCN</text>
  <text x="610" y="100" text-anchor="middle" font-size="7" fill="#6B5D4F">2015</text>

  <!-- Arrow -->
  <line x1="610" y1="107" x2="610" y2="120" stroke="#7C2530" stroke-width="1.3" marker-end="url(#arr-red)"/>

  <!-- U-Net block -->
  <rect x="570" y="125" width="80" height="32" fill="#E9DEC5" stroke="#2D5A8E" stroke-width="1.2" rx="4"/>
  <text x="610" y="138" text-anchor="middle" font-size="9" fill="#2D5A8E" font-weight="bold">U-Net</text>
  <text x="610" y="150" text-anchor="middle" font-size="7" fill="#6B5D4F">2015</text>

  <!-- Skip connection label -->
  <text x="660" y="140" font-size="7" fill="#2D5A8E">skip connections</text>

  <!-- Arrow -->
  <line x1="610" y1="157" x2="610" y2="170" stroke="#2D5A8E" stroke-width="1.3" marker-end="url(#arr-blue)"/>

  <!-- DeepLab block -->
  <rect x="570" y="175" width="80" height="32" fill="#DCCFA8" stroke="#5C3D1E" stroke-width="1.2" rx="4"/>
  <text x="610" y="188" text-anchor="middle" font-size="9" fill="#5C3D1E" font-weight="bold">DeepLab</text>
  <text x="610" y="200" text-anchor="middle" font-size="7" fill="#6B5D4F">2017</text>

  <!-- Atrous label -->
  <text x="660" y="190" font-size="7" fill="#5C3D1E">atrous convolution</text>

  <!-- Arrow -->
  <line x1="610" y1="207" x2="610" y2="220" stroke="#5C3D1E" stroke-width="1.3"/>

  <!-- Mask R-CNN block -->
  <rect x="670" y="225" width="80" height="32" fill="#F2EAD8" stroke="#7C2530" stroke-width="1.2" rx="4"/>
  <text x="710" y="238" text-anchor="middle" font-size="8" fill="#7C2530" font-weight="bold">Mask R-CNN</text>
  <text x="710" y="250" text-anchor="middle" font-size="7" fill="#6B5D4F">2017 (instance)</text>

  <!-- Branch arrow from DeepLab row -->
  <line x1="650" y1="191" x2="670" y2="240" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- SegFormer block -->
  <rect x="570" y="225" width="80" height="32" fill="#E9DEC5" stroke="#2D5A8E" stroke-width="1.2" rx="4"/>
  <text x="610" y="238" text-anchor="middle" font-size="8" fill="#2D5A8E" font-weight="bold">SegFormer</text>
  <text x="610" y="250" text-anchor="middle" font-size="7" fill="#6B5D4F">2021 (ViT)</text>

  <!-- Arrow -->
  <line x1="610" y1="257" x2="610" y2="270" stroke="#2D5A8E" stroke-width="1.3" marker-end="url(#arr-blue)"/>

  <!-- SAM block -->
  <rect x="570" y="275" width="80" height="32" fill="#7C2530" fill-opacity="0.12" stroke="#7C2530" stroke-width="1.8" rx="4"/>
  <text x="610" y="288" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">SAM</text>
  <text x="610" y="300" text-anchor="middle" font-size="7" fill="#6B5D4F">2023 (promptable)</text>

  <!-- === BOTTOM: U-Net encoder-decoder diagram === -->
  <text x="200" y="268" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">U-NET ENCODER-DECODER</text>

  <!-- Encoder side (contracting) -->
  <rect x="50" y="280" width="50" height="70" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="75" y="370" text-anchor="middle" font-size="7" fill="#2D5A8E">enc1</text>

  <rect x="110" y="290" width="40" height="55" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="1" rx="2"/>
  <text x="130" y="365" text-anchor="middle" font-size="7" fill="#2D5A8E">enc2</text>

  <!-- Bottleneck -->
  <rect x="160" y="300" width="30" height="40" fill="#5C3D1E" fill-opacity="0.3" stroke="#5C3D1E" stroke-width="1.2" rx="2"/>
  <text x="175" y="358" text-anchor="middle" font-size="7" fill="#5C3D1E">bottle</text>

  <!-- Decoder side (expanding) -->
  <rect x="200" y="290" width="40" height="55" fill="#7C2530" fill-opacity="0.15" stroke="#7C2530" stroke-width="1" rx="2"/>
  <text x="220" y="365" text-anchor="middle" font-size="7" fill="#7C2530">dec2</text>

  <rect x="250" y="280" width="50" height="70" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1" rx="2"/>
  <text x="275" y="370" text-anchor="middle" font-size="7" fill="#7C2530">dec1</text>

  <!-- Skip connection arrows -->
  <path d="M 100,300 C 100,275 250,275 250,300" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <text x="175" y="278" text-anchor="middle" font-size="7" fill="#C4A87A" font-weight="bold">skip connections</text>

  <path d="M 145,305 C 145,290 210,290 210,305" fill="none" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Arrows between blocks -->
  <line x1="100" y1="315" x2="108" y2="315" stroke="#2D5A8E" stroke-width="1"/>
  <line x1="150" y1="318" x2="158" y2="318" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="190" y1="318" x2="198" y2="318" stroke="#7C2530" stroke-width="1"/>
  <line x1="240" y1="315" x2="248" y2="315" stroke="#7C2530" stroke-width="1"/>

  <!-- Bottom caption -->
  <text x="400" y="392" text-anchor="middle" font-size="9" fill="#6B5D4F">
    Segmentation assigns a class label to every pixel — from FCN's fully convolutional approach to SAM's promptable foundation model
  </text>
</svg>
