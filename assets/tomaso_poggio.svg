<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="12" ry="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#7C2530" text-anchor="middle">Tomaso Poggio</text>

  <!-- Center hub -->
  <ellipse cx="400" cy="200" rx="90" ry="38" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Tomaso</text>
  <text x="400" y="212" font-family="Georgia, serif" font-size="13" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Poggio</text>

  <!-- Spoke lines -->
  <line x1="310" y1="190" x2="160" y2="110" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="490" y1="190" x2="640" y2="110" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="340" y1="230" x2="140" y2="310" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="460" y1="230" x2="660" y2="310" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="400" y1="238" x2="400" y2="330" stroke="#C4A87A" stroke-width="2.5"/>

  <!-- Node 1: Computational Neuroscience (top-left) -->
  <ellipse cx="130" cy="95" rx="105" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="130" y="90" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Computational</text>
  <text x="130" y="106" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Neuroscience</text>

  <!-- Node 2: Regularization Theory (top-right) -->
  <ellipse cx="670" cy="95" rx="110" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="670" y="90" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Regularization Theory</text>
  <text x="670" y="106" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">of Learning</text>

  <!-- Node 3: CBMM at MIT (bottom-left) -->
  <ellipse cx="120" cy="320" rx="95" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="120" y="315" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">CBMM</text>
  <text x="120" y="331" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">at MIT</text>

  <!-- Node 4: Deep Learning Theory (bottom-right) -->
  <ellipse cx="680" cy="320" rx="100" ry="32" fill="#5C3D1E" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="680" y="315" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Deep Learning</text>
  <text x="680" y="331" font-family="Georgia, serif" font-size="12" fill="#FDFAF4" text-anchor="middle">Theory</text>

  <!-- Node 5: Visual Cortex Models (bottom-center) -->
  <ellipse cx="400" cy="348" rx="100" ry="32" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="343" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Visual Cortex</text>
  <text x="400" y="359" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" text-anchor="middle">Models</text>

  <!-- Decorative dots on spokes -->
  <circle cx="235" cy="150" r="3" fill="#C4A87A"/>
  <circle cx="565" cy="150" r="3" fill="#C4A87A"/>
  <circle cx="240" cy="270" r="3" fill="#C4A87A"/>
  <circle cx="560" cy="270" r="3" fill="#C4A87A"/>
  <circle cx="400" cy="285" r="3" fill="#C4A87A"/>
</svg>