<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="18" ry="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Spokes (lines from center to nodes) -->
  <line x1="400" y1="195" x2="140" y2="90" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="195" x2="660" y2="90" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="195" x2="120" y2="310" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="195" x2="680" y2="310" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="195" x2="400" y2="365" stroke="#C4A87A" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Center hub -->
  <ellipse cx="400" cy="195" rx="120" ry="44" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="189" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#FDFAF4">Christos</text>
  <text x="400" y="211" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#FDFAF4">Faloutsos</text>

  <!-- Node 1: Graph Mining -->
  <ellipse cx="140" cy="90" rx="105" ry="34" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="140" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#FDFAF4">Graph Mining</text>
  <text x="140" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">patterns in massive graphs</text>

  <!-- Node 2: Power Laws -->
  <ellipse cx="660" cy="90" rx="105" ry="34" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="660" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#FDFAF4">Power Laws</text>
  <text x="660" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FDFAF4">in real-world networks</text>

  <!-- Node 3: R-Trees / Spatial Indexing -->
  <ellipse cx="120" cy="310" rx="105" ry="34" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="120" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#FDFAF4">R-Trees &amp;</text>
  <text x="120" y="323" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Spatial Indexing</text>

  <!-- Node 4: Tensor Decomposition -->
  <ellipse cx="680" cy="310" rx="105" ry="34" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="680" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#FDFAF4">Tensor</text>
  <text x="680" y="323" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Decomposition</text>

  <!-- Node 5: CMU -->
  <ellipse cx="400" cy="365" rx="80" ry="28" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E">CMU</text>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-style="italic">Key Contributions</text>
</svg>