<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Boolean Fourier Analysis: Decomposing f:{-1,+1}^n into Frequency Levels</text>

  <!-- Left: Boolean cube with function values -->
  <text x="140" y="62" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Boolean Function on {-1,+1}^3</text>

  <!-- 3D Boolean cube vertices -->
  <!-- Back face -->
  <line x1="70" y1="100" x2="200" y2="100" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="200" y1="100" x2="200" y2="220" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="200" y1="220" x2="70" y2="220" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="70" y1="220" x2="70" y2="100" stroke="#C4A87A" stroke-width="1.2"/>
  <!-- Front face -->
  <line x1="110" y1="140" x2="240" y2="140" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="240" y1="140" x2="240" y2="260" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="240" y1="260" x2="110" y2="260" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="110" y1="260" x2="110" y2="140" stroke="#C4A87A" stroke-width="1.2"/>
  <!-- Connecting edges -->
  <line x1="70" y1="100" x2="110" y2="140" stroke="#C4A87A" stroke-width="1"/>
  <line x1="200" y1="100" x2="240" y2="140" stroke="#C4A87A" stroke-width="1"/>
  <line x1="200" y1="220" x2="240" y2="260" stroke="#C4A87A" stroke-width="1"/>
  <line x1="70" y1="220" x2="110" y2="260" stroke="#C4A87A" stroke-width="1"/>

  <!-- Vertex labels: f(x) values, +1 in navy, -1 in red -->
  <circle cx="70" cy="100" r="12" fill="#2D5A8E"/><text x="70" y="104" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">+1</text>
  <circle cx="200" cy="100" r="12" fill="#7C2530"/><text x="200" y="104" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">-1</text>
  <circle cx="200" cy="220" r="12" fill="#2D5A8E"/><text x="200" y="224" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">+1</text>
  <circle cx="70" cy="220" r="12" fill="#7C2530"/><text x="70" y="224" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">-1</text>
  <circle cx="110" cy="140" r="12" fill="#7C2530"/><text x="110" y="144" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">-1</text>
  <circle cx="240" cy="140" r="12" fill="#2D5A8E"/><text x="240" y="144" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">+1</text>
  <circle cx="240" cy="260" r="12" fill="#7C2530"/><text x="240" y="264" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">-1</text>
  <circle cx="110" cy="260" r="12" fill="#2D5A8E"/><text x="110" y="264" font-family="Georgia,serif" font-size="10" fill="white" text-anchor="middle">+1</text>

  <!-- Arrow from cube to spectrum -->
  <text x="310" y="180" font-family="Georgia,serif" font-size="24" fill="#5C3D1E" text-anchor="middle">=</text>
  <text x="310" y="200" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">decompose</text>

  <!-- Right: Fourier spectrum bar chart by level -->
  <text x="570" y="62" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Fourier Coefficients by Level</text>

  <!-- Axes -->
  <line x1="380" y1="250" x2="760" y2="250" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="380" y1="80" x2="380" y2="250" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="375" y="170" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="end" transform="rotate(-90,375,170)">Coefficient magnitude</text>

  <!-- Level 0: constant term -->
  <rect x="400" y="210" width="30" height="40" rx="2" fill="#C4A87A" opacity="0.8"/>
  <text x="415" y="265" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">f(empty)</text>
  <text x="415" y="205" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">0.25</text>

  <!-- Level 1: single-variable terms -->
  <rect x="460" y="130" width="25" height="120" rx="2" fill="#2D5A8E" opacity="0.8"/>
  <rect x="490" y="190" width="25" height="60" rx="2" fill="#2D5A8E" opacity="0.8"/>
  <rect x="520" y="170" width="25" height="80" rx="2" fill="#2D5A8E" opacity="0.8"/>
  <text x="490" y="265" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">f({1}) f({2}) f({3})</text>
  <text x="472" y="125" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle">0.75</text>
  <text x="502" y="185" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle">0.38</text>
  <text x="532" y="165" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle">0.50</text>

  <!-- Level 2: pairwise terms -->
  <rect x="570" y="200" width="25" height="50" rx="2" fill="#7C2530" opacity="0.8"/>
  <rect x="600" y="220" width="25" height="30" rx="2" fill="#7C2530" opacity="0.8"/>
  <rect x="630" y="230" width="25" height="20" rx="2" fill="#7C2530" opacity="0.8"/>
  <text x="610" y="265" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">f({1,2}) f({1,3}) f({2,3})</text>
  <text x="582" y="195" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle">0.31</text>

  <!-- Level 3: three-way term -->
  <rect x="680" y="235" width="30" height="15" rx="2" fill="#5C3D1E" opacity="0.8"/>
  <text x="695" y="265" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">f({1,2,3})</text>
  <text x="695" y="232" font-family="Georgia,serif" font-size="8" fill="#5C3D1E" text-anchor="middle">0.09</text>

  <!-- Level labels underneath -->
  <text x="415" y="280" font-family="Georgia,serif" font-size="10" fill="#C4A87A" text-anchor="middle" font-weight="bold">Level 0</text>
  <text x="490" y="280" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Level 1</text>
  <text x="610" y="280" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Level 2</text>
  <text x="695" y="280" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Level 3</text>

  <!-- Bottom: key equations -->
  <rect x="30" y="305" width="230" height="72" rx="4" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1"/>
  <text x="145" y="322" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Fourier Expansion</text>
  <text x="145" y="340" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f(x) = Sum over S of</text>
  <text x="145" y="355" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">f-hat(S) * chi_S(x)</text>
  <text x="145" y="370" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">chi_S(x) = product of x_i for i in S</text>

  <rect x="285" y="305" width="230" height="72" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="322" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Parseval's Identity</text>
  <text x="400" y="342" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">E[f(x)^2] = Sum of f-hat(S)^2</text>
  <text x="400" y="360" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">Energy = sum of spectral energies</text>

  <rect x="540" y="305" width="230" height="72" rx="4" fill="#FAF0EE" stroke="#7C2530" stroke-width="1"/>
  <text x="655" y="322" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">Low-Degree Concentration</text>
  <text x="655" y="342" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">"Simple" functions have most</text>
  <text x="655" y="357" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">energy at low Fourier levels</text>
  <text x="655" y="372" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle">Key to PAC learning results</text>
</svg>