<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#5C3D1E" font-weight="bold">KV Cache: Prefill and Decode Phases</text>

  <!-- PREFILL PHASE (left side) -->
  <text x="200" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530" font-weight="bold">Prefill Phase</text>

  <!-- Prompt tokens -->
  <rect x="30" y="78" width="340" height="36" rx="6" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="200" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Prompt Tokens</text>
  <!-- Individual tokens -->
  <rect x="42" y="116" width="52" height="26" rx="4" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="68" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">The</text>
  <rect x="102" y="116" width="52" height="26" rx="4" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="128" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">cat</text>
  <rect x="162" y="116" width="52" height="26" rx="4" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="188" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">sat</text>
  <rect x="222" y="116" width="52" height="26" rx="4" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="248" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">on</text>
  <rect x="282" y="116" width="52" height="26" rx="4" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="308" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">the</text>

  <!-- Arrow down -->
  <line x1="200" y1="148" x2="200" y2="172" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="165" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">compute</text>

  <!-- Q, K, V matrices -->
  <rect x="42" y="178" width="90" height="60" rx="4" fill="#E8D5C4" stroke="#5C3D1E" stroke-width="1"/>
  <text x="87" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">Q</text>
  <text x="87" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(5 × d)</text>

  <rect x="155" y="178" width="90" height="60" rx="4" fill="#D4E3F4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="200" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">K</text>
  <text x="200" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">(5 × d)</text>

  <rect x="268" y="178" width="90" height="60" rx="4" fill="#E4D4D6" stroke="#7C2530" stroke-width="1.5"/>
  <text x="313" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">V</text>
  <text x="313" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">(5 × d)</text>

  <!-- Arrow to cache -->
  <line x1="200" y1="244" x2="200" y2="268" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="232" y="261" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">store</text>

  <!-- KV Cache box -->
  <rect x="80" y="274" width="240" height="50" rx="6" fill="#D4E3F4" stroke="#2D5A8E" stroke-width="2"/>
  <rect x="80" y="274" width="120" height="50" rx="6" fill="#D4E3F4" stroke="#2D5A8E" stroke-width="2"/>
  <text x="140" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-weight="bold">K Cache</text>
  <text x="140" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">(5 × d)</text>
  <rect x="200" y="274" width="120" height="50" rx="6" fill="#E4D4D6" stroke="#7C2530" stroke-width="2"/>
  <text x="260" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-weight="bold">V Cache</text>
  <text x="260" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7C2530">(5 × d)</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="390" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- DECODE PHASE (right side) -->
  <text x="600" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7C2530" font-weight="bold">Decode Phase (step 6: generate "mat")</text>

  <!-- New token -->
  <rect x="555" y="80" width="90" height="30" rx="4" fill="#F0E6D2" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="600" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">New token</text>

  <!-- Arrow down to Q_new -->
  <line x1="600" y1="114" x2="600" y2="134" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Q_new -->
  <rect x="555" y="138" width="90" height="34" rx="4" fill="#E8D5C4" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="600" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-weight="bold">Q_new</text>
  <text x="600" y="166" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">(1 × d)</text>

  <!-- Attention arrow -->
  <path d="M 600 176 L 600 200 L 530 220" fill="none" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="624" y="196" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">attend</text>

  <!-- K Cache (decode) -->
  <rect x="430" y="222" width="200" height="44" rx="5" fill="#D4E3F4" stroke="#2D5A8E" stroke-width="2"/>
  <!-- Existing 5 cells -->
  <rect x="436" y="228" width="28" height="32" rx="2" fill="#B8CCE4" stroke="#2D5A8E" stroke-width="0.8"/>
  <rect x="468" y="228" width="28" height="32" rx="2" fill="#B8CCE4" stroke="#2D5A8E" stroke-width="0.8"/>
  <rect x="500" y="228" width="28" height="32" rx="2" fill="#B8CCE4" stroke="#2D5A8E" stroke-width="0.8"/>
  <rect x="532" y="228" width="28" height="32" rx="2" fill="#B8CCE4" stroke="#2D5A8E" stroke-width="0.8"/>
  <rect x="564" y="228" width="28" height="32" rx="2" fill="#B8CCE4" stroke="#2D5A8E" stroke-width="0.8"/>
  <!-- New K appended -->
  <rect x="596" y="228" width="28" height="32" rx="2" fill="#7CAED4" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="610" y="248" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" font-weight="bold">+K</text>
  <text x="530" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" font-weight="bold">K Cache (6 × d)</text>

  <!-- V Cache (decode) -->
  <rect x="430" y="294" width="200" height="44" rx="5" fill="#E4D4D6" stroke="#7C2530" stroke-width="2"/>
  <rect x="436" y="300" width="28" height="32" rx="2" fill="#D4B8BC" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="468" y="300" width="28" height="32" rx="2" fill="#D4B8BC" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="500" y="300" width="28" height="32" rx="2" fill="#D4B8BC" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="532" y="300" width="28" height="32" rx="2" fill="#D4B8BC" stroke="#7C2530" stroke-width="0.8"/>
  <rect x="564" y="300" width="28" height="32" rx="2" fill="#D4B8BC" stroke="#7C2530" stroke-width="0.8"/>
  <!-- New V appended -->
  <rect x="596" y="300" width="28" height="32" rx="2" fill="#B45A68" stroke="#7C2530" stroke-width="1.5"/>
  <text x="610" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" font-weight="bold">+V</text>
  <text x="530" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-weight="bold">V Cache (6 × d)</text>

  <!-- Output arrow -->
  <path d="M 634 244 L 720 244 L 720 190 L 720 160" fill="none" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="724" y="210" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" writing-mode="tb">output</text>

  <!-- Output token -->
  <rect x="685" y="118" width="66" height="36" rx="6" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="718" y="136" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-weight="bold">"mat"</text>

  <!-- Append arrows -->
  <path d="M 645 170 Q 660 200 624 228" fill="none" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M 645 170 Q 660 270 624 300" fill="none" stroke="#7C2530" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="668" y="232" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">append</text>

  <!-- Key insight at bottom -->
  <text x="400" y="386" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" font-style="italic">Cache grows by one row per token; no recomputation of previous K, V</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>