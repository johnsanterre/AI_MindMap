<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">Michael I. Jordan</text>

  <!-- Central hub -->
  <ellipse cx="400" cy="200" rx="90" ry="38" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Michael I.</text>
  <text x="400" y="213" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FDFAF4" font-weight="bold">Jordan</text>

  <!-- Spoke: Bayesian Methods (top-left) -->
  <line x1="330" y1="175" x2="155" y2="95" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="120" cy="85" rx="80" ry="30" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="120" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Bayesian</text>
  <text x="120" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Methods</text>

  <!-- Spoke: Variational Inference (top-right) -->
  <line x1="470" y1="175" x2="645" y2="95" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="680" cy="85" rx="85" ry="30" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="680" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Variational</text>
  <text x="680" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Inference</text>

  <!-- Spoke: Graphical Models (left) -->
  <line x1="310" y1="200" x2="165" y2="210" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="115" cy="210" rx="85" ry="30" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="115" y="207" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Graphical</text>
  <text x="115" y="223" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Models</text>

  <!-- Spoke: LDA (right) -->
  <line x1="490" y1="200" x2="635" y2="210" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="685" cy="210" rx="85" ry="30" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="685" y="207" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Latent Dirichlet</text>
  <text x="685" y="223" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#FDFAF4">Allocation</text>

  <!-- Spoke: Berkeley (bottom-left) -->
  <line x1="340" y1="230" x2="175" y2="330" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="135" cy="335" rx="80" ry="30" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="135" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5C3D1E" font-weight="bold">UC Berkeley</text>
  <text x="135" y="349" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">BAIR</text>

  <!-- Spoke: Statistics-ML Bridge (bottom-right) -->
  <line x1="460" y1="230" x2="625" y2="330" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="665" cy="335" rx="95" ry="30" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="665" y="332" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">Statistics-ML</text>
  <text x="665" y="349" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E">Bridge</text>

  <!-- Decorative subtitle -->
  <text x="400" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530" font-style="italic">Principled Foundations for Machine Learning</text>
</svg>