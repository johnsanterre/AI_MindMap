<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="34" font-family="Georgia,serif" font-size="15" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Model Compression: Four Paths to a Smaller Network</text>

  <!-- Large model on the left -->
  <rect x="40" y="60" width="140" height="160" rx="6" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="2"/>
  <text x="110" y="82" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Full Model</text>
  <!-- Grid of dots representing dense weights -->
  <circle cx="65" cy="105" r="4" fill="#2D5A8E"/> <circle cx="85" cy="105" r="4" fill="#2D5A8E"/>
  <circle cx="105" cy="105" r="4" fill="#2D5A8E"/> <circle cx="125" cy="105" r="4" fill="#2D5A8E"/>
  <circle cx="145" cy="105" r="4" fill="#2D5A8E"/>
  <circle cx="65" cy="125" r="4" fill="#2D5A8E"/> <circle cx="85" cy="125" r="4" fill="#2D5A8E"/>
  <circle cx="105" cy="125" r="4" fill="#2D5A8E"/> <circle cx="125" cy="125" r="4" fill="#2D5A8E"/>
  <circle cx="145" cy="125" r="4" fill="#2D5A8E"/>
  <circle cx="65" cy="145" r="4" fill="#2D5A8E"/> <circle cx="85" cy="145" r="4" fill="#2D5A8E"/>
  <circle cx="105" cy="145" r="4" fill="#2D5A8E"/> <circle cx="125" cy="145" r="4" fill="#2D5A8E"/>
  <circle cx="145" cy="145" r="4" fill="#2D5A8E"/>
  <circle cx="65" cy="165" r="4" fill="#2D5A8E"/> <circle cx="85" cy="165" r="4" fill="#2D5A8E"/>
  <circle cx="105" cy="165" r="4" fill="#2D5A8E"/> <circle cx="125" cy="165" r="4" fill="#2D5A8E"/>
  <circle cx="145" cy="165" r="4" fill="#2D5A8E"/>
  <text x="110" y="200" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">100% params</text>
  <text x="110" y="214" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">32-bit floats</text>

  <!-- Arrow to four methods -->
  <line x1="185" y1="140" x2="230" y2="90" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="140" x2="230" y2="160" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="140" x2="230" y2="250" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="185" y1="140" x2="230" y2="330" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#C4A87A"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7C2530"/>
    </marker>
  </defs>

  <!-- 1. Pruning -->
  <rect x="240" y="55" width="200" height="70" rx="5" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="340" y="74" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Pruning</text>
  <circle cx="265" cy="98" r="4" fill="#2D5A8E"/> <circle cx="285" cy="98" r="4" fill="#DDD"/>
  <circle cx="305" cy="98" r="4" fill="#2D5A8E"/> <circle cx="325" cy="98" r="4" fill="#DDD"/>
  <circle cx="345" cy="98" r="4" fill="#DDD"/> <circle cx="365" cy="98" r="4" fill="#2D5A8E"/>
  <circle cx="385" cy="98" r="4" fill="#DDD"/> <circle cx="405" cy="98" r="4" fill="#2D5A8E"/>
  <text x="340" y="118" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Remove unimportant weights</text>

  <!-- 2. Quantization -->
  <rect x="240" y="135" width="200" height="70" rx="5" fill="#EEF2F8" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="340" y="154" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Quantization</text>
  <text x="280" y="174" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">FP32</text>
  <text x="310" y="174" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">→</text>
  <text x="340" y="174" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">INT8</text>
  <text x="370" y="174" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">→</text>
  <text x="400" y="174" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-weight="bold">INT4</text>
  <text x="340" y="196" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Fewer bits per weight</text>

  <!-- 3. Knowledge Distillation -->
  <rect x="240" y="215" width="200" height="75" rx="5" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="340" y="234" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Knowledge Distillation</text>
  <rect x="260" y="244" width="50" height="30" rx="3" fill="#2D5A8E" opacity="0.3"/>
  <text x="285" y="263" font-family="Georgia,serif" font-size="9" fill="#2D5A8E" text-anchor="middle">Teacher</text>
  <text x="330" y="263" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">→</text>
  <rect x="350" y="248" width="30" height="22" rx="3" fill="#7C2530" opacity="0.3"/>
  <text x="365" y="263" font-family="Georgia,serif" font-size="9" fill="#7C2530" text-anchor="middle">Student</text>
  <text x="340" y="284" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Transfer soft predictions</text>

  <!-- 4. Low-Rank Factorization -->
  <rect x="240" y="300" width="200" height="70" rx="5" fill="#FAF0EE" stroke="#7C2530" stroke-width="1.5"/>
  <text x="340" y="319" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Low-Rank Factorization</text>
  <rect x="260" y="330" width="35" height="25" rx="2" fill="#2D5A8E" opacity="0.2" stroke="#2D5A8E" stroke-width="1"/>
  <text x="278" y="346" font-family="Georgia,serif" font-size="8" fill="#2D5A8E" text-anchor="middle">m×n</text>
  <text x="310" y="346" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle">≈</text>
  <rect x="325" y="330" width="20" height="25" rx="2" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="1"/>
  <text x="335" y="346" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle">m×r</text>
  <text x="355" y="346" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">×</text>
  <rect x="365" y="330" width="25" height="20" rx="2" fill="#7C2530" opacity="0.2" stroke="#7C2530" stroke-width="1"/>
  <text x="378" y="344" font-family="Georgia,serif" font-size="8" fill="#7C2530" text-anchor="middle">r×n</text>
  <text x="420" y="346" font-family="Georgia,serif" font-size="8" fill="#888" text-anchor="middle" font-style="italic">r ≪ min(m,n)</text>

  <!-- Right side: result -->
  <line x1="445" y1="90" x2="510" y2="185" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="445" y1="170" x2="510" y2="185" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="445" y1="255" x2="510" y2="210" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="445" y1="335" x2="510" y2="220" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="515" y="150" width="140" height="100" rx="6" fill="#EEF5EE" stroke="#509050" stroke-width="2"/>
  <text x="585" y="172" font-family="Georgia,serif" font-size="11" fill="#306030" text-anchor="middle" font-weight="bold">Compressed</text>
  <text x="585" y="186" font-family="Georgia,serif" font-size="11" fill="#306030" text-anchor="middle" font-weight="bold">Model</text>
  <circle cx="550" cy="210" r="4" fill="#509050"/> <circle cx="570" cy="210" r="4" fill="#509050"/>
  <circle cx="590" cy="210" r="4" fill="#509050"/> <circle cx="610" cy="210" r="4" fill="#509050"/>
  <text x="585" y="237" font-family="Georgia,serif" font-size="10" fill="#306030" text-anchor="middle">2-10× smaller</text>

  <!-- Bottom: tradeoff bar -->
  <rect x="480" y="280" width="280" height="90" rx="4" fill="#F5EFE4" stroke="#C4A87A" stroke-width="1"/>
  <text x="620" y="300" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-weight="bold">The Compression Tradeoff</text>
  <text x="620" y="318" font-family="Georgia,serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Size/Speed ←————————→ Accuracy</text>
  <rect x="510" y="330" width="220" height="10" rx="5" fill="#DDD"/>
  <rect x="510" y="330" width="160" height="10" rx="5" fill="#2D5A8E" opacity="0.6"/>
  <circle cx="670" cy="335" r="6" fill="#7C2530"/>
  <text x="620" y="358" font-family="Georgia,serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Goal: push right without losing left</text>
</svg>