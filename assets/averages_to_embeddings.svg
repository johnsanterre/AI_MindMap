<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Georgia,serif" font-size="16" fill="#2C2C2C" text-anchor="middle" font-weight="bold">From Averages to Embeddings: The Arc of Resolution</text>

  <!-- Gradient bar label -->
  <text x="60"  y="68" font-family="Georgia,serif" font-size="12" fill="#888" text-anchor="middle" font-style="italic">Global</text>
  <text x="740" y="68" font-family="Georgia,serif" font-size="12" fill="#7C2530" text-anchor="middle" font-style="italic">Individual</text>
  <line x1="90" y1="63" x2="710" y2="63" stroke="url(#grad)" stroke-width="3"/>
  <polygon points="707,59 716,63 707,67" fill="#7C2530"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#AAAAAA"/>
      <stop offset="100%" stop-color="#7C2530"/>
    </linearGradient>
  </defs>

  <!-- Stage boxes — 6 stages across -->
  <!-- Stage 1: x=48 -->
  <rect x="30"  y="82" width="108" height="90" rx="5" fill="#EBEBEB" stroke="#AAAAAA" stroke-width="1.5"/>
  <text x="84"  y="100" font-family="Georgia,serif" font-size="11" fill="#555" text-anchor="middle" font-weight="bold">① Summary</text>
  <text x="84"  y="114" font-family="Georgia,serif" font-size="11" fill="#555" text-anchor="middle" font-weight="bold">Statistics</text>
  <text x="84"  y="134" font-family="Georgia,serif" font-size="22" fill="#888" text-anchor="middle">μ</text>
  <text x="84"  y="163" font-family="Georgia,serif" font-size="10" fill="#777" text-anchor="middle" font-style="italic">1 number</text>

  <!-- Arrow -->
  <line x1="139" y1="127" x2="155" y2="127" stroke="#AAA" stroke-width="1.5"/>
  <polygon points="152,123 160,127 152,131" fill="#AAA"/>

  <!-- Stage 2: x=160 -->
  <rect x="158" y="82" width="108" height="90" rx="5" fill="#E8EEF5" stroke="#8AAAC8" stroke-width="1.5"/>
  <text x="212" y="100" font-family="Georgia,serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">② Regression</text>
  <text x="212" y="120" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle">ŷ = Xβ</text>
  <text x="212" y="145" font-family="Georgia,serif" font-size="19" fill="#2D5A8E" text-anchor="middle">╱</text>
  <text x="212" y="163" font-family="Georgia,serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-style="italic">1 global line</text>

  <!-- Arrow -->
  <line x1="267" y1="127" x2="283" y2="127" stroke="#8AAAC8" stroke-width="1.5"/>
  <polygon points="280,123 288,127 280,131" fill="#8AAAC8"/>

  <!-- Stage 3: x=288 -->
  <rect x="286" y="82" width="108" height="90" rx="5" fill="#EAE8F2" stroke="#7060A0" stroke-width="1.5"/>
  <text x="340" y="100" font-family="Georgia,serif" font-size="11" fill="#5040A0" text-anchor="middle" font-weight="bold">③ Classification</text>
  <text x="340" y="120" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle">wᵀx + b = 0</text>
  <text x="340" y="148" font-family="Georgia,serif" font-size="16" fill="#5040A0" text-anchor="middle">A | B</text>
  <text x="340" y="163" font-family="Georgia,serif" font-size="10" fill="#5040A0" text-anchor="middle" font-style="italic">1 boundary</text>

  <!-- Arrow -->
  <line x1="395" y1="127" x2="411" y2="127" stroke="#7060A0" stroke-width="1.5"/>
  <polygon points="408,123 416,127 408,131" fill="#7060A0"/>

  <!-- Stage 4: x=416 -->
  <rect x="414" y="82" width="108" height="90" rx="5" fill="#EEF5EE" stroke="#509050" stroke-width="1.5"/>
  <text x="468" y="100" font-family="Georgia,serif" font-size="11" fill="#306030" text-anchor="middle" font-weight="bold">④ Clustering</text>
  <text x="468" y="120" font-family="Georgia,serif" font-size="10" fill="#306030" text-anchor="middle">k-means, GMM</text>
  <text x="468" y="148" font-family="Georgia,serif" font-size="15" fill="#306030" text-anchor="middle">●  ◆  ▲</text>
  <text x="468" y="163" font-family="Georgia,serif" font-size="10" fill="#306030" text-anchor="middle" font-style="italic">k local tribes</text>

  <!-- Arrow -->
  <line x1="523" y1="127" x2="539" y2="127" stroke="#509050" stroke-width="1.5"/>
  <polygon points="536,123 544,127 536,131" fill="#509050"/>

  <!-- Stage 5: x=544 -->
  <rect x="542" y="82" width="108" height="90" rx="5" fill="#F5EEE8" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="596" y="100" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">⑤ Vectors</text>
  <text x="596" y="120" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle">x ∈ ℝⁿ</text>
  <text x="596" y="148" font-family="Georgia,serif" font-size="18" fill="#5C3D1E" text-anchor="middle">→</text>
  <text x="596" y="163" font-family="Georgia,serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">n-dim arrow</text>

  <!-- Arrow -->
  <line x1="651" y1="127" x2="667" y2="127" stroke="#C4A87A" stroke-width="1.5"/>
  <polygon points="664,123 672,127 664,131" fill="#C4A87A"/>

  <!-- Stage 6: x=672 -->
  <rect x="670" y="82" width="108" height="90" rx="5" fill="#F9ECEC" stroke="#7C2530" stroke-width="2"/>
  <text x="724" y="100" font-family="Georgia,serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">⑥ Embeddings</text>
  <text x="724" y="120" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">Word2Vec · LLMs</text>
  <text x="724" y="145" font-family="Georgia,serif" font-size="15" fill="#7C2530" text-anchor="middle">✦</text>
  <text x="724" y="163" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">exact coordinates</text>

  <!-- Compression label -->
  <text x="84"  y="190" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">maximum</text>
  <text x="84"  y="202" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">compression</text>
  <text x="724" y="190" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">zero</text>
  <text x="724" y="202" font-family="Georgia,serif" font-size="10" fill="#7C2530" text-anchor="middle">compression</text>

  <!-- Bottom quote boxes -->
  <rect x="30" y="218" width="232" height="60" rx="4" fill="#F5EFE4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="146" y="235" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">"The average human has one</text>
  <text x="146" y="250" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">breast and one testicle."</text>
  <text x="146" y="268" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">— the cost of global summaries</text>

  <rect x="280" y="218" width="240" height="60" rx="4" fill="#F5EFE4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="400" y="235" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Individual variation was called</text>
  <text x="400" y="250" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">"error" — noise to minimise.</text>
  <text x="400" y="268" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">— the mindset of early regression</text>

  <rect x="538" y="218" width="240" height="60" rx="4" fill="#F5EFE4" stroke="#D4C5A9" stroke-width="1"/>
  <text x="658" y="235" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Distance equals meaning.</text>
  <text x="658" y="250" font-family="Georgia,serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Geometry is the model.</text>
  <text x="658" y="268" font-family="Georgia,serif" font-size="10" fill="#888" text-anchor="middle">— the promise of embeddings</text>

  <!-- GPU note -->
  <text x="400" y="308" font-family="Georgia,serif" font-size="12" fill="#2C2C2C" text-anchor="middle">The leap from vectors to embeddings was not mathematical — it was hardware.</text>
  <text x="400" y="326" font-family="Georgia,serif" font-size="12" fill="#5C3D1E" text-anchor="middle">The gaming industry accidentally built the engine that made ⑥ possible.</text>

  <!-- Arrow labels -->
  <text x="400" y="360" font-family="Georgia,serif" font-size="13" fill="#2C2C2C" text-anchor="middle" font-weight="bold">Global  →  Local  →  Individual</text>
  <text x="400" y="378" font-family="Georgia,serif" font-size="11" fill="#888" text-anchor="middle" font-style="italic">compute was scarce · compute grew · compute became abundant</text>
</svg>
