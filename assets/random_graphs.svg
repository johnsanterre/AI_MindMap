<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      text { font-family: Georgia, serif; }
    </style>
  </defs>

  <!-- Background and border -->
  <rect x="0" y="0" width="800" height="400" rx="6" ry="6" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#5C3D1E">Random Graphs: From Sparse to Connected</text>

  <!-- === Panel 1: G(n,p) subcritical p &lt; 1/n === -->
  <text x="140" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C2530">Subcritical (p &#x226A; 1/n)</text>

  <!-- Scattered nodes, mostly isolated or tiny components -->
  <circle cx="80" cy="110" r="5" fill="#2D5A8E"/>
  <circle cx="120" cy="95" r="5" fill="#2D5A8E"/>
  <circle cx="160" cy="115" r="5" fill="#2D5A8E"/>
  <circle cx="100" cy="145" r="5" fill="#2D5A8E"/>
  <circle cx="180" cy="140" r="5" fill="#2D5A8E"/>
  <circle cx="140" cy="170" r="5" fill="#2D5A8E"/>
  <circle cx="75" cy="175" r="5" fill="#2D5A8E"/>
  <circle cx="195" cy="100" r="5" fill="#2D5A8E"/>
  <circle cx="110" cy="195" r="5" fill="#2D5A8E"/>
  <circle cx="170" cy="185" r="5" fill="#2D5A8E"/>

  <!-- A few isolated edges -->
  <line x1="80" y1="110" x2="120" y2="95" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="140" y1="170" x2="170" y2="185" stroke="#C4A87A" stroke-width="1.5"/>

  <text x="140" y="215" text-anchor="middle" font-size="10" fill="#5C3D1E">Small trees, isolated nodes</text>

  <!-- === Panel 2: G(n,p) critical p = 1/n === -->
  <text x="400" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C2530">Critical (p = 1/n)</text>

  <!-- Nodes with a forming giant component -->
  <circle cx="350" cy="100" r="5" fill="#2D5A8E"/>
  <circle cx="380" cy="90" r="5" fill="#2D5A8E"/>
  <circle cx="420" cy="95" r="5" fill="#2D5A8E"/>
  <circle cx="440" cy="120" r="5" fill="#2D5A8E"/>
  <circle cx="410" cy="140" r="5" fill="#2D5A8E"/>
  <circle cx="370" cy="135" r="5" fill="#2D5A8E"/>
  <circle cx="345" cy="155" r="5" fill="#2D5A8E"/>
  <circle cx="390" cy="170" r="5" fill="#2D5A8E"/>
  <circle cx="445" cy="160" r="5" fill="#2D5A8E"/>
  <circle cx="360" cy="190" r="5" fill="#2D5A8E"/>
  <circle cx="430" cy="185" r="5" fill="#2D5A8E"/>
  <circle cx="460" cy="90" r="5" fill="#2D5A8E"/>

  <!-- Giant component forming (highlighted edges) -->
  <line x1="350" y1="100" x2="380" y2="90" stroke="#7C2530" stroke-width="2"/>
  <line x1="380" y1="90" x2="420" y2="95" stroke="#7C2530" stroke-width="2"/>
  <line x1="420" y1="95" x2="440" y2="120" stroke="#7C2530" stroke-width="2"/>
  <line x1="440" y1="120" x2="410" y2="140" stroke="#7C2530" stroke-width="2"/>
  <line x1="410" y1="140" x2="370" y2="135" stroke="#7C2530" stroke-width="2"/>
  <line x1="370" y1="135" x2="350" y2="100" stroke="#7C2530" stroke-width="2"/>
  <line x1="370" y1="135" x2="345" y2="155" stroke="#7C2530" stroke-width="2"/>
  <line x1="410" y1="140" x2="390" y2="170" stroke="#7C2530" stroke-width="2"/>

  <!-- Separate small component -->
  <line x1="430" y1="185" x2="445" y2="160" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="360" y1="190" x2="390" y2="170" stroke="#C4A87A" stroke-width="1.5"/>

  <text x="400" y="215" text-anchor="middle" font-size="10" fill="#5C3D1E">Giant component emerges</text>
  <text x="400" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#7C2530">&#x2190; Phase Transition &#x2192;</text>

  <!-- === Panel 3: G(n,p) supercritical p &gt; ln(n)/n === -->
  <text x="660" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C2530">Supercritical (p &#x226B; 1/n)</text>

  <!-- Dense connected graph -->
  <circle cx="620" cy="100" r="5" fill="#2D5A8E"/>
  <circle cx="660" cy="88" r="5" fill="#2D5A8E"/>
  <circle cx="700" cy="100" r="5" fill="#2D5A8E"/>
  <circle cx="720" cy="135" r="5" fill="#2D5A8E"/>
  <circle cx="700" cy="170" r="5" fill="#2D5A8E"/>
  <circle cx="660" cy="190" r="5" fill="#2D5A8E"/>
  <circle cx="620" cy="170" r="5" fill="#2D5A8E"/>
  <circle cx="600" cy="135" r="5" fill="#2D5A8E"/>
  <circle cx="640" cy="140" r="5" fill="#2D5A8E"/>
  <circle cx="680" cy="140" r="5" fill="#2D5A8E"/>

  <!-- Many edges — densely connected -->
  <line x1="620" y1="100" x2="660" y2="88" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="660" y1="88" x2="700" y2="100" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="700" y1="100" x2="720" y2="135" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="720" y1="135" x2="700" y2="170" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="700" y1="170" x2="660" y2="190" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="660" y1="190" x2="620" y2="170" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="620" y1="170" x2="600" y2="135" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="600" y1="135" x2="620" y2="100" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="640" y1="140" x2="680" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="620" y1="100" x2="640" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="660" y1="88" x2="680" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="700" y1="100" x2="680" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="720" y1="135" x2="680" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="700" y1="170" x2="680" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="660" y1="190" x2="640" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="620" y1="170" x2="640" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="600" y1="135" x2="640" y2="140" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="620" y1="100" x2="700" y2="170" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="660" y1="88" x2="660" y2="190" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="135" x2="720" y2="135" stroke="#C4A87A" stroke-width="1" opacity="0.5"/>

  <text x="660" y="215" text-anchor="middle" font-size="10" fill="#5C3D1E">Almost surely connected</text>

  <!-- === Bottom: Phase transition diagram === -->
  <rect x="100" y="248" width="600" height="140" rx="4" ry="4" fill="none" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Axes -->
  <line x1="160" y1="365" x2="660" y2="365" stroke="#5C3D1E" stroke-width="1.5"/>
  <line x1="160" y1="365" x2="160" y2="265" stroke="#5C3D1E" stroke-width="1.5"/>

  <!-- X-axis label -->
  <text x="410" y="388" text-anchor="middle" font-size="12" fill="#5C3D1E">Edge probability p (log scale)</text>
  <text x="170" y="380" text-anchor="middle" font-size="9" fill="#5C3D1E">0</text>
  <text x="350" y="380" text-anchor="middle" font-size="9" fill="#5C3D1E">1/n</text>
  <text x="510" y="380" text-anchor="middle" font-size="9" fill="#5C3D1E">ln(n)/n</text>
  <text x="640" y="380" text-anchor="middle" font-size="9" fill="#5C3D1E">1</text>

  <!-- Y-axis label -->
  <text x="145" y="275" text-anchor="end" font-size="9" fill="#5C3D1E">n</text>
  <text x="145" y="365" text-anchor="end" font-size="9" fill="#5C3D1E">0</text>
  <text x="120" y="320" text-anchor="middle" font-size="10" fill="#5C3D1E" transform="rotate(-90,120,320)">Largest component</text>

  <!-- Tick marks -->
  <line x1="350" y1="363" x2="350" y2="367" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="510" y1="363" x2="510" y2="367" stroke="#5C3D1E" stroke-width="1"/>
  <line x1="640" y1="363" x2="640" y2="367" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Giant component curve - S-shaped jump at p=1/n -->
  <polyline points="170,362 220,361 270,360 320,358 340,355 350,340 360,310 380,295 410,285 450,280 490,277 530,275 570,273 610,272 640,271" fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- Second largest component curve - peaks at p=1/n then drops -->
  <polyline points="170,360 220,358 270,355 320,348 340,340 350,335 360,340 380,348 410,352 450,355 490,358 530,360 570,361 610,362 640,363" fill="none" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Phase transition marker -->
  <line x1="350" y1="265" x2="350" y2="363" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="350" y="260" text-anchor="middle" font-size="9" font-weight="bold" fill="#7C2530">Phase transition</text>

  <!-- Connectivity threshold marker -->
  <line x1="510" y1="265" x2="510" y2="363" stroke="#2D5A8E" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="510" y="260" text-anchor="middle" font-size="9" font-weight="bold" fill="#2D5A8E">Connectivity threshold</text>

  <!-- Legend -->
  <line x1="555" y1="290" x2="585" y2="290" stroke="#7C2530" stroke-width="2.5"/>
  <text x="590" y="294" font-size="10" fill="#7C2530">Largest component</text>
  <line x1="555" y1="306" x2="585" y2="306" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="590" y="310" font-size="10" fill="#2D5A8E">2nd largest</text>
</svg>