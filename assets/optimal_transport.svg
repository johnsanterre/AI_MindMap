<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Optimal Transport: Moving Mass from P to Q</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Source distribution P (left) -->
  <text x="150" y="68" text-anchor="middle" fill="#2D5A8E" font-size="15" font-weight="bold">Source P</text>

  <!-- P pile 1 -->
  <ellipse cx="90" cy="160" rx="45" ry="22" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="90" y="165" text-anchor="middle" fill="#2D5A8E" font-size="13">0.4</text>

  <!-- P pile 2 -->
  <ellipse cx="170" cy="240" rx="38" ry="18" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="170" y="245" text-anchor="middle" fill="#2D5A8E" font-size="13">0.35</text>

  <!-- P pile 3 -->
  <ellipse cx="110" cy="320" rx="32" ry="15" fill="#2D5A8E" fill-opacity="0.25" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="110" y="325" text-anchor="middle" fill="#2D5A8E" font-size="13">0.25</text>

  <!-- Target distribution Q (right) -->
  <text x="650" y="68" text-anchor="middle" fill="#7C2530" font-size="15" font-weight="bold">Target Q</text>

  <!-- Q pile 1 -->
  <ellipse cx="630" cy="140" rx="40" ry="20" fill="#7C2530" fill-opacity="0.2" stroke="#7C2530" stroke-width="1.5"/>
  <text x="630" y="145" text-anchor="middle" fill="#7C2530" font-size="13">0.3</text>

  <!-- Q pile 2 -->
  <ellipse cx="690" cy="240" rx="42" ry="20" fill="#7C2530" fill-opacity="0.2" stroke="#7C2530" stroke-width="1.5"/>
  <text x="690" y="245" text-anchor="middle" fill="#7C2530" font-size="13">0.5</text>

  <!-- Q pile 3 -->
  <ellipse cx="640" cy="340" rx="35" ry="16" fill="#7C2530" fill-opacity="0.2" stroke="#7C2530" stroke-width="1.5"/>
  <text x="640" y="345" text-anchor="middle" fill="#7C2530" font-size="13">0.2</text>

  <!-- Transport arrows with mass labels -->
  <!-- P1 -> Q1: 0.3 -->
  <line x1="135" y1="155" x2="588" y2="140" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="138" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">0.3</text>

  <!-- P1 -> Q2: 0.1 -->
  <line x1="135" y1="168" x2="646" y2="232" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="415" y="192" text-anchor="middle" fill="#5C3D1E" font-size="11">0.1</text>

  <!-- P2 -> Q2: 0.35 -->
  <line x1="208" y1="240" x2="646" y2="240" stroke="#C4A87A" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="420" y="255" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">0.35</text>

  <!-- P3 -> Q2: 0.05 -->
  <line x1="142" y1="315" x2="646" y2="248" stroke="#C4A87A" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="375" y="295" text-anchor="middle" fill="#5C3D1E" font-size="11">0.05</text>

  <!-- P3 -> Q3: 0.2 -->
  <line x1="142" y1="325" x2="603" y2="340" stroke="#C4A87A" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <text x="375" y="345" text-anchor="middle" fill="#5C3D1E" font-size="11" font-weight="bold">0.2</text>

  <!-- Center label: Transport Plan -->
  <rect x="330" y="82" width="140" height="26" rx="6" fill="#5C3D1E" fill-opacity="0.1" stroke="#5C3D1E" stroke-width="1"/>
  <text x="400" y="100" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">Transport Plan T</text>

  <!-- Cost annotation -->
  <text x="400" y="370" text-anchor="middle" fill="#5C3D1E" font-size="12" font-style="italic">Arrow thickness = mass moved; total cost = sum of mass x distance</text>

  <!-- Bottom formula -->
  <text x="400" y="392" text-anchor="middle" fill="#5C3D1E" font-size="13">W(P, Q) = min  E  [ c(x, y) ]     subject to marginals = P, Q</text>
</svg>
