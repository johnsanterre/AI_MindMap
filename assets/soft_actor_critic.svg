<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Soft Actor-Critic (SAC): Maximum Entropy Reinforcement Learning</text>

  <!-- ── Replay Buffer ── -->
  <rect x="30" y="155" width="130" height="60" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="2"/>
  <text x="95" y="179" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Replay Buffer</text>
  <text x="95" y="197" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">(s, a, r, s′)</text>
  <text x="95" y="212" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">off-policy data</text>

  <!-- Arrow: Replay Buffer → Critics -->
  <line x1="160" y1="185" x2="218" y2="185" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Two Critics ── -->
  <!-- Q1 -->
  <rect x="220" y="130" width="120" height="52" rx="6" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="280" y="152" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Critic Q₁</text>
  <text x="280" y="170" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Q₁(s, a) → scalar</text>

  <!-- Q2 -->
  <rect x="220" y="198" width="120" height="52" rx="6" fill="#2D5A8E" fill-opacity="0.15" stroke="#2D5A8E" stroke-width="2"/>
  <text x="280" y="220" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Critic Q₂</text>
  <text x="280" y="238" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">Q₂(s, a) → scalar</text>

  <!-- Clipped double-Q note -->
  <text x="280" y="268" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#7C2530" text-anchor="middle">min(Q₁, Q₂) — reduces overestimation</text>

  <!-- Arrow: Critics → min box -->
  <line x1="340" y1="156" x2="388" y2="185" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="224" x2="388" y2="205" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── min(Q1,Q2) node ── -->
  <ellipse cx="408" cy="192" rx="36" ry="22" fill="#2D5A8E" fill-opacity="0.20" stroke="#2D5A8E" stroke-width="1.8"/>
  <text x="408" y="188" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">min</text>
  <text x="408" y="203" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle">(Q₁,Q₂)</text>

  <!-- Arrow: min → Policy update -->
  <line x1="444" y1="192" x2="494" y2="192" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Actor ── -->
  <rect x="496" y="130" width="134" height="68" rx="6" fill="#7C2530" fill-opacity="0.13" stroke="#7C2530" stroke-width="2"/>
  <text x="563" y="153" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Actor  π(a|s)</text>
  <text x="563" y="170" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle">Gaussian: μ(s), σ(s)</text>
  <text x="563" y="186" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">reparameterization trick</text>

  <!-- Arrow: Actor → action distribution -->
  <line x1="630" y1="164" x2="682" y2="164" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Action distribution ── -->
  <!-- Gaussian bell curve rough depiction -->
  <ellipse cx="714" cy="164" rx="44" ry="26" fill="#C4A87A" fill-opacity="0.20" stroke="#C4A87A" stroke-width="1.8"/>
  <text x="714" y="158" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Action Dist.</text>
  <text x="714" y="173" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">𝒩(μ, σ²)</text>

  <!-- ── Entropy term box ── -->
  <rect x="496" y="232" width="134" height="58" rx="6" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="563" y="253" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Entropy Bonus</text>
  <text x="563" y="270" font-family="Georgia, serif" font-size="12" fill="#7C2530" text-anchor="middle">α · H(π(·|s))</text>
  <text x="563" y="284" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">α learned automatically</text>

  <!-- Arrow: entropy → combined reward -->
  <line x1="563" y1="232" x2="563" y2="205" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- ── Target Networks ── -->
  <rect x="220" y="308" width="130" height="52" rx="6" fill="#5C3D1E" fill-opacity="0.12" stroke="#5C3D1E" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="285" y="330" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Target Networks</text>
  <text x="285" y="347" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">Q̄₁, Q̄₂ (soft update τ)</text>

  <!-- Arrow: target → critics (dashed feedback) -->
  <line x1="285" y1="308" x2="285" y2="252" stroke="#5C3D1E" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arr3)"/>

  <!-- ── Environment / reward loop ── -->
  <rect x="30" y="55" width="130" height="52" rx="6" fill="#C4A87A" fill-opacity="0.20" stroke="#C4A87A" stroke-width="1.8"/>
  <text x="95" y="76" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Environment</text>
  <text x="95" y="92" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle">r(s, a) + α·H(π)</text>
  <text x="95" y="107" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">augmented reward</text>

  <!-- Arrow: environment → replay buffer -->
  <line x1="95" y1="107" x2="95" y2="148" stroke="#C4A87A" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- Arrow: Actor action feeds back to environment -->
  <path d="M563,130 Q563,60 400,50 Q230,40 95,55" fill="none" stroke="#7C2530" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr5)"/>

  <!-- ── Key innovation banner ── -->
  <rect x="170" y="365" width="462" height="26" rx="5" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.5"/>
  <text x="401" y="382" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Maximum Entropy RL — reward exploration, not just exploitation</text>

  <!-- ── Arrowhead markers ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
