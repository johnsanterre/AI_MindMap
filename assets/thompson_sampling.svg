<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#5C3D1E" font-weight="bold">Thompson Sampling</text>

  <!-- Three arms as vertical columns -->
  <!-- Arm A -->
  <rect x="60" y="60" width="200" height="280" rx="10" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="160" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" font-weight="bold">Arm A</text>

  <!-- Arm A posterior (Beta distribution curve) -->
  <path d="M 80,220 Q 110,120 140,160 Q 160,185 180,140 Q 200,100 220,180 Q 240,220 240,220" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <path d="M 80,220 Q 120,90 160,130 Q 200,170 240,220" fill="#7C2530" fill-opacity="0.15" stroke="none"/>
  <path d="M 80,220 Q 120,90 160,130 Q 200,170 240,220" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <!-- Sample dot -->
  <circle cx="145" cy="155" r="5" fill="#7C2530"/>
  <text x="145" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7C2530">sample = 0.71</text>

  <text x="80" y="245" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Beta(5, 3)</text>
  <text x="80" y="262" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">wins: 4, losses: 2</text>

  <!-- Arm B -->
  <rect x="300" y="60" width="200" height="280" rx="10" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" font-weight="bold">Arm B</text>

  <!-- Arm B posterior -->
  <path d="M 320,220 Q 370,150 400,180 Q 430,210 480,220" fill="#2D5A8E" fill-opacity="0.15" stroke="none"/>
  <path d="M 320,220 Q 370,150 400,180 Q 430,210 480,220" fill="none" stroke="#2D5A8E" stroke-width="2.5"/>
  <!-- Sample dot -->
  <circle cx="378" cy="168" r="5" fill="#2D5A8E"/>
  <text x="378" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#2D5A8E">sample = 0.54</text>

  <text x="320" y="245" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Beta(3, 4)</text>
  <text x="320" y="262" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">wins: 2, losses: 3</text>

  <!-- Arm C -->
  <rect x="540" y="60" width="200" height="280" rx="10" fill="none" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#5C3D1E" font-weight="bold">Arm C</text>

  <!-- Arm C posterior (wide/uncertain) -->
  <path d="M 560,220 Q 610,100 660,160 Q 700,200 720,220" fill="#C4A87A" fill-opacity="0.25" stroke="none"/>
  <path d="M 560,220 Q 610,100 660,160 Q 700,200 720,220" fill="none" stroke="#C4A87A" stroke-width="2.5"/>
  <!-- Sample dot -->
  <circle cx="618" cy="128" r="5" fill="#5C3D1E"/>
  <text x="618" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">sample = 0.82</text>

  <text x="560" y="245" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Beta(2, 2)</text>
  <text x="560" y="262" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">wins: 1, losses: 1</text>

  <!-- Decision arrow pointing to Arm C (highest sample) -->
  <text x="400" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">Highest sample wins  -->  Play Arm C</text>

  <!-- Arrow to Arm C -->
  <line x1="530" y1="296" x2="600" y2="296" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Bottom annotation -->
  <text x="400" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7C2530" font-style="italic">Uncertain arms (wide posteriors) get explored naturally</text>
  <text x="400" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2D5A8E" font-style="italic">Confident good arms get exploited frequently</text>

  <!-- Axes labels for distributions -->
  <text x="160" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Posterior</text>
  <text x="400" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Posterior</text>
  <text x="640" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-style="italic">Posterior</text>
</svg>