<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="18" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">Retrieval Augmented Generation</text>

  <!-- Query box -->
  <rect x="40" y="70" width="140" height="60" rx="10" fill="#2D5A8E" opacity="0.15" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="110" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2D5A8E" font-weight="bold">User Query</text>
  <text x="110" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">"What causes tides?"</text>

  <!-- Arrow: Query to Encoder -->
  <line x1="180" y1="100" x2="230" y2="100" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Encoder box -->
  <rect x="230" y="70" width="120" height="60" rx="10" fill="#C4A87A" opacity="0.3" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="290" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">Embedding</text>
  <text x="290" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Encoder</text>

  <!-- Arrow: Encoder to Vector DB -->
  <line x1="350" y1="100" x2="400" y2="100" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vector DB -->
  <rect x="400" y="60" width="150" height="80" rx="12" fill="#7C2530" opacity="0.12" stroke="#7C2530" stroke-width="1.5"/>
  <text x="475" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">Vector Store</text>
  <text x="475" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">cosine similarity</text>
  <text x="475" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">search</text>

  <!-- Document corpus (right side) -->
  <rect x="610" y="60" width="150" height="80" rx="10" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="685" y="86" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">Document</text>
  <text x="685" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">Corpus</text>
  <text x="685" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">PDFs, wikis, DBs...</text>

  <!-- Arrow: Corpus to Vector DB -->
  <line x1="610" y1="100" x2="555" y2="100" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="582" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">index</text>

  <!-- Retrieved docs -->
  <rect x="320" y="190" width="180" height="70" rx="10" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="410" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">Retrieved Chunks</text>
  <text x="410" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Top-k relevant passages</text>
  <text x="410" y="248" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">+ relevance scores</text>

  <!-- Arrow: Vector DB down to Retrieved -->
  <line x1="475" y1="140" x2="430" y2="190" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Query down to Prompt -->
  <path d="M110,130 L110,310 L230,310" stroke="#2D5A8E" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="100" y="220" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">original query</text>

  <!-- Augmented Prompt -->
  <rect x="230" y="280" width="180" height="60" rx="10" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="320" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">Augmented Prompt</text>
  <text x="320" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">query + context docs</text>

  <!-- Arrow: Retrieved to Prompt -->
  <line x1="390" y1="260" x2="350" y2="280" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Prompt to LLM -->
  <line x1="410" y1="310" x2="470" y2="310" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="470" y="275" width="140" height="70" rx="12" fill="#2D5A8E" opacity="0.18" stroke="#2D5A8E" stroke-width="2"/>
  <text x="540" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2D5A8E" font-weight="bold">LLM</text>
  <text x="540" y="324" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Transformer</text>

  <!-- Arrow: LLM to Answer -->
  <line x1="610" y1="310" x2="650" y2="310" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Grounded Answer -->
  <rect x="650" y="280" width="120" height="60" rx="10" fill="#7C2530" opacity="0.15" stroke="#7C2530" stroke-width="1.5"/>
  <text x="710" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">Grounded</text>
  <text x="710" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">Answer</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Labels for the flow -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">Retrieve first, then generate: knowledge stays external and updatable</text>
</svg>