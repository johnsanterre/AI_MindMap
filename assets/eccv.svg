<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Panel dividers -->
  <line x1="267" y1="20" x2="267" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="534" y1="20" x2="534" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL ===== -->
  <!-- ECCV title -->
  <text x="133" y="62" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#7C2530" text-anchor="middle">ECCV</text>
  <!-- Subtitle -->
  <text x="133" y="82" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">European Conference on</text>
  <text x="133" y="96" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E" text-anchor="middle">Computer Vision</text>

  <!-- Divider under title -->
  <line x1="30" y1="106" x2="237" y2="106" stroke="#C4A87A" stroke-width="1"/>

  <!-- Facts -->
  <text x="40" y="124" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Founded</text>
  <text x="105" y="124" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">1990 (Antibes, France)</text>

  <text x="40" y="142" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Timing</text>
  <text x="105" y="142" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Sept / Oct — even years</text>

  <text x="40" y="160" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Organizer</text>
  <text x="105" y="160" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">ECVA</text>

  <text x="40" y="178" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Location</text>
  <text x="105" y="178" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Rotating European cities</text>

  <text x="40" y="196" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Scale</text>
  <text x="105" y="196" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">~2,500 accepted papers</text>

  <text x="40" y="214" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" font-weight="bold">Accept rate</text>
  <text x="105" y="214" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">~25–30%</text>

  <!-- Biennial note box -->
  <rect x="28" y="234" width="220" height="36" rx="5" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="138" y="248" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle" font-style="italic">Biennial — alternates with ICCV</text>
  <text x="138" y="262" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">CVPR (annual) · ICCV (odd) · ECCV (even)</text>

  <!-- Host cities -->
  <text x="133" y="296" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Munich · Florence · Amsterdam</text>
  <text x="133" y="310" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Glasgow · Tel Aviv · Paris · Milan</text>

  <!-- ===== CENTER PANEL ===== -->
  <text x="400" y="44" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Computer Vision Conference Triangle</text>
  <line x1="285" y1="52" x2="516" y2="52" stroke="#C4A87A" stroke-width="1"/>

  <!-- Triangle connecting lines -->
  <line x1="400" y1="100" x2="308" y2="220" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="100" x2="492" y2="220" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="308" y1="220" x2="492" y2="220" stroke="#D4C5A9" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- CVPR node (top) -->
  <ellipse cx="400" cy="98" rx="52" ry="26" fill="#2D5A8E" fill-opacity="0.12" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="400" y="94" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E" text-anchor="middle">CVPR</text>
  <text x="400" y="107" font-family="Georgia, serif" font-size="8.5" fill="#2D5A8E" text-anchor="middle">Annual · June · largest</text>

  <!-- ICCV node (bottom-left) -->
  <ellipse cx="308" cy="222" rx="52" ry="26" fill="#5C3D1E" fill-opacity="0.10" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="308" y="218" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">ICCV</text>
  <text x="308" y="231" font-family="Georgia, serif" font-size="8.5" fill="#5C3D1E" text-anchor="middle">Odd years · Oct</text>

  <!-- ECCV node (bottom-right) -->
  <ellipse cx="492" cy="222" rx="52" ry="26" fill="#7C2530" fill-opacity="0.10" stroke="#7C2530" stroke-width="1.5"/>
  <text x="492" y="218" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">ECCV</text>
  <text x="492" y="231" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" text-anchor="middle">Even years · Sept/Oct</text>

  <!-- Notes below triangle -->
  <text x="400" y="274" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">CVPR: ~10,000+ papers — highest volume</text>
  <text x="400" y="289" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">ICCV / ECCV: ~2,000–2,500 — alternating counterparts</text>

  <!-- Badge -->
  <rect x="307" y="306" width="186" height="22" rx="4" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1"/>
  <text x="400" y="321" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">All three = top-tier CV venues</text>

  <!-- ===== RIGHT PANEL ===== -->
  <text x="667" y="44" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#5C3D1E" text-anchor="middle">ECCV Topic Strengths</text>
  <line x1="550" y1="52" x2="782" y2="52" stroke="#C4A87A" stroke-width="1"/>

  <!-- Topic list with colored bullets -->
  <!-- bullet helper: small rect as bullet -->
  <rect x="556" y="70" width="8" height="8" rx="1" fill="#7C2530"/>
  <text x="572" y="79" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">3D reconstruction &amp; SLAM</text>

  <rect x="556" y="96" width="8" height="8" rx="1" fill="#2D5A8E"/>
  <text x="572" y="105" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Object detection &amp; segmentation</text>

  <rect x="556" y="122" width="8" height="8" rx="1" fill="#5C3D1E"/>
  <text x="572" y="131" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Generative models (GAN, diffusion)</text>

  <rect x="556" y="148" width="8" height="8" rx="1" fill="#C4A87A"/>
  <text x="572" y="157" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Vision transformers</text>

  <rect x="556" y="174" width="8" height="8" rx="1" fill="#7C2530"/>
  <text x="572" y="183" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Medical image analysis</text>

  <rect x="556" y="200" width="8" height="8" rx="1" fill="#2D5A8E"/>
  <text x="572" y="209" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Autonomous driving perception</text>

  <rect x="556" y="226" width="8" height="8" rx="1" fill="#5C3D1E"/>
  <text x="572" y="235" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Image restoration &amp; enhancement</text>

  <rect x="556" y="252" width="8" height="8" rx="1" fill="#C4A87A"/>
  <text x="572" y="261" font-family="Georgia, serif" font-size="10.5" fill="#5C3D1E">Vision–language models</text>

  <!-- European research note -->
  <rect x="550" y="284" width="232" height="44" rx="5" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="666" y="300" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle" font-style="italic">European research flavour:</text>
  <text x="666" y="314" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">geometric rigor · 3D foundations</text>
  <text x="666" y="326" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">ETH · Oxford · INRIA · TU Munich</text>

  <!-- Bottom caption -->
  <text x="400" y="370" font-family="Georgia, serif" font-size="9" fill="#9A8A76" text-anchor="middle" font-style="italic">Proceedings open-access via ECVA / SpringerLink · paperswithcode.com</text>
</svg>
