<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#5C3D1E">CLIP: Contrastive Language–Image Pre-Training</text>

  <!-- ===== LEFT: Image Encoder ===== -->
  <rect x="30" y="55" width="160" height="220" rx="8" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="110" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E">Image Encoder</text>
  <text x="110" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">(ViT / ResNet)</text>

  <!-- Image patches -->
  <rect x="50" y="103" width="40" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="70" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">🖼 img₁</text>
  <rect x="50" y="140" width="40" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="70" y="159" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">🖼 img₂</text>
  <rect x="50" y="177" width="40" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="70" y="196" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">🖼 img₃</text>
  <text x="70" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">⋮</text>
  <rect x="50" y="236" width="40" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="70" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">🖼 imgN</text>

  <!-- Arrow: image patches → encoder -->
  <line x1="95" y1="165" x2="125" y2="165" stroke="#5C3D1E" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Encoder box inside image encoder -->
  <rect x="120" y="130" width="55" height="70" rx="5" fill="#2D5A8E" opacity="0.85"/>
  <text x="147" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">ViT</text>
  <text x="147" y="173" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">layers</text>
  <text x="147" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#C4A87A">→ I_i</text>

  <!-- ===== RIGHT: Text Encoder ===== -->
  <rect x="610" y="55" width="160" height="220" rx="8" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="690" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2D5A8E">Text Encoder</text>
  <text x="690" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">(Transformer)</text>

  <!-- Text captions -->
  <rect x="710" y="103" width="45" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="732" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">"a dog"</text>
  <text x="732" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">txt₁</text>
  <rect x="710" y="140" width="45" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="732" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">"a cat"</text>
  <text x="732" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">txt₂</text>
  <rect x="710" y="177" width="45" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="732" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">"a car"</text>
  <text x="732" y="202" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">txt₃</text>
  <text x="732" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E">⋮</text>
  <rect x="710" y="236" width="45" height="30" rx="3" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1"/>
  <text x="732" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5C3D1E">txtN</text>

  <!-- Arrow: text captions → encoder -->
  <line x1="708" y1="165" x2="678" y2="165" stroke="#5C3D1E" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Encoder box inside text encoder -->
  <rect x="623" y="130" width="55" height="70" rx="5" fill="#7C2530" opacity="0.85"/>
  <text x="650" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">Trans-</text>
  <text x="650" y="173" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="white">former</text>
  <text x="650" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#C4A87A">→ T_i</text>

  <!-- ===== CENTER: Shared Embedding Space label ===== -->
  <text x="400" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" font-style="italic">shared 512-d embedding space</text>

  <!-- Arrows from encoders to similarity matrix -->
  <!-- Image encoder → matrix -->
  <line x1="193" y1="165" x2="245" y2="185" stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arb)"/>
  <!-- Text encoder → matrix -->
  <line x1="608" y1="165" x2="558" y2="185" stroke="#7C2530" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- ===== CENTER: NxN Similarity Matrix ===== -->
  <text x="400" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E">N×N Cosine Similarity Matrix</text>

  <!-- Matrix grid: 4x4 cells representing NxN -->
  <!-- Cell size 55x45, top-left at (252, 100) -->
  <!-- Row labels (image embeddings I_i) -->
  <text x="244" y="130" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">I₁</text>
  <text x="244" y="175" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">I₂</text>
  <text x="244" y="220" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">I₃</text>
  <text x="244" y="264" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Iₙ</text>

  <!-- Column labels (text embeddings T_j) -->
  <text x="278" y="107" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">T₁</text>
  <text x="333" y="107" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">T₂</text>
  <text x="388" y="107" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">T₃</text>
  <text x="443" y="107" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Tₙ</text>

  <!-- Row 1 -->
  <rect x="250" y="112" width="55" height="42" fill="#2D5A8E" opacity="0.85" stroke="#FDFAF4" stroke-width="1"/>
  <text x="278" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" font-weight="bold">0.92</text>
  <rect x="305" y="112" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="333" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.11</text>
  <rect x="360" y="112" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="388" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.08</text>
  <rect x="415" y="112" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="443" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.05</text>

  <!-- Row 2 -->
  <rect x="250" y="154" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="278" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.07</text>
  <rect x="305" y="154" width="55" height="42" fill="#2D5A8E" opacity="0.85" stroke="#FDFAF4" stroke-width="1"/>
  <text x="333" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" font-weight="bold">0.89</text>
  <rect x="360" y="154" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="388" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.13</text>
  <rect x="415" y="154" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="443" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.04</text>

  <!-- Row 3 -->
  <rect x="250" y="196" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="278" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.09</text>
  <rect x="305" y="196" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="333" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.06</text>
  <rect x="360" y="196" width="55" height="42" fill="#2D5A8E" opacity="0.85" stroke="#FDFAF4" stroke-width="1"/>
  <text x="388" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" font-weight="bold">0.95</text>
  <rect x="415" y="196" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="443" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.03</text>

  <!-- Row 4 -->
  <rect x="250" y="238" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="278" y="264" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.04</text>
  <rect x="305" y="238" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="333" y="264" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.10</text>
  <rect x="360" y="238" width="55" height="42" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="388" y="264" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">0.07</text>
  <rect x="415" y="238" width="55" height="42" fill="#2D5A8E" opacity="0.85" stroke="#FDFAF4" stroke-width="1"/>
  <text x="443" y="264" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" font-weight="bold">0.91</text>

  <!-- Diagonal highlight border -->
  <rect x="250" y="112" width="55" height="42" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <rect x="305" y="154" width="55" height="42" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <rect x="360" y="196" width="55" height="42" fill="none" stroke="#7C2530" stroke-width="2.5"/>
  <rect x="415" y="238" width="55" height="42" fill="none" stroke="#7C2530" stroke-width="2.5"/>

  <!-- ===== Bottom labels ===== -->
  <rect x="180" y="300" width="440" height="36" rx="6" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1.5"/>
  <text x="400" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530">Contrastive Loss:</text>
  <text x="400" y="333" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">maximize diagonal (matched pairs) · minimize off-diagonal (negatives)</text>

  <!-- Legend -->
  <rect x="250" y="350" width="14" height="14" fill="#2D5A8E" opacity="0.85"/>
  <text x="269" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">positive pair (image i ↔ text i)</text>
  <rect x="470" y="350" width="14" height="14" fill="#EDE8DF" stroke="#D4C5A9" stroke-width="1"/>
  <text x="489" y="362" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">negative pair</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
