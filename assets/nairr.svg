<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#7C2530" text-anchor="middle">National AI Research Resource (NAIRR)</text>

  <!-- Dividers -->
  <line x1="267" y1="50" x2="267" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>
  <line x1="533" y1="50" x2="533" y2="380" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- === LEFT PANEL: Identity Facts === -->
  <text x="133" y="70" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Identity</text>

  <rect x="20" y="82" width="225" height="38" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="132" y="98" font-family="Georgia, serif" font-size="11" fill="#2D5A8E" text-anchor="middle" font-weight="bold">US Government Initiative</text>
  <text x="132" y="113" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Authorized by Congress + Executive Action</text>

  <rect x="20" y="128" width="225" height="30" rx="4" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1"/>
  <text x="132" y="143" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Launched: 2024 (Pilot Phase)</text>
  <text x="132" y="156" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Still being built out</text>

  <rect x="20" y="166" width="225" height="30" rx="4" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1"/>
  <text x="132" y="181" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Administered by NSF + OSTP</text>
  <text x="132" y="194" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">White House Office of Science &amp; Tech Policy</text>

  <rect x="20" y="204" width="225" height="30" rx="4" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1"/>
  <text x="132" y="219" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">Mission: Democratize AI Compute</text>
  <text x="132" y="232" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Open access for all researchers</text>

  <!-- Industry Partners -->
  <text x="133" y="258" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Industry Partners (Contribute Compute)</text>
  <text x="133" y="274" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Microsoft Azure · Google Cloud · AWS</text>
  <text x="133" y="288" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">NVIDIA · AMD · IBM · OpenAI</text>

  <!-- ACCESS note -->
  <rect x="20" y="300" width="225" height="30" rx="4" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1"/>
  <text x="132" y="315" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">Builds on ACCESS Program</text>
  <text x="132" y="328" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">(formerly XSEDE supercomputing)</text>

  <!-- === CENTER PANEL: What NAIRR Provides === -->
  <text x="400" y="70" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">What NAIRR Provides</text>

  <!-- Compute box -->
  <rect x="278" y="82" width="245" height="65" rx="6" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="98" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Compute Access</text>
  <text x="400" y="113" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">GPU / TPU time at NSF supercomputers</text>
  <text x="400" y="126" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Frontera · Delta · Bridges-2 + cloud partners</text>
  <text x="400" y="139" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Allocated via proposal, like telescope time</text>

  <!-- Data box -->
  <rect x="278" y="158" width="245" height="55" rx="6" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="400" y="174" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Data Access</text>
  <text x="400" y="189" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Curated datasets from government agencies</text>
  <text x="400" y="203" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">NSF-funded repositories · open science data</text>

  <!-- Tools box -->
  <rect x="278" y="224" width="245" height="55" rx="6" fill="#5C3D1E" fill-opacity="0.08" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="400" y="240" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Software + Education</text>
  <text x="400" y="255" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Pre-built ML frameworks · open models</text>
  <text x="400" y="269" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Tutorials · workshops · researcher support</text>

  <!-- Cost note -->
  <rect x="278" y="292" width="245" height="50" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="400" y="308" font-family="Georgia, serif" font-size="11" fill="#7C2530" text-anchor="middle" font-weight="bold">Why compute matters:</text>
  <text x="400" y="323" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">GPT-4 training ≈ $100M+</text>
  <text x="400" y="336" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Most researchers can't compete without help</text>

  <!-- === RIGHT PANEL: Why It Matters === -->
  <text x="667" y="70" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Why It Matters</text>

  <!-- Without NAIRR: narrow bar for elite -->
  <text x="667" y="90" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Without NAIRR</text>

  <rect x="590" y="98" width="80" height="22" rx="3" fill="#7C2530" fill-opacity="0.7"/>
  <text x="630" y="113" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle" font-weight="bold">Big Tech + Elite Unis</text>

  <rect x="590" y="124" width="155" height="42" rx="3" fill="#D4C5A9" fill-opacity="0.5" stroke="#D4C5A9"/>
  <text x="668" y="140" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Everyone else —</text>
  <text x="668" y="153" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">community colleges, small labs,</text>

  <!-- Arrow -->
  <text x="667" y="185" font-family="Georgia, serif" font-size="18" fill="#2D5A8E" text-anchor="middle">↓</text>
  <text x="667" y="200" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">NAIRR bridges the gap</text>

  <!-- With NAIRR -->
  <text x="667" y="220" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">With NAIRR</text>

  <!-- Wider access bar -->
  <rect x="555" y="228" width="155" height="22" rx="3" fill="#2D5A8E" fill-opacity="0.7"/>
  <text x="632" y="243" font-family="Georgia, serif" font-size="9" fill="#FDFAF4" text-anchor="middle" font-weight="bold">All researchers get compute access</text>

  <!-- Who benefits -->
  <rect x="555" y="260" width="230" height="80" rx="5" fill="#5C3D1E" fill-opacity="0.07" stroke="#5C3D1E" stroke-width="1"/>
  <text x="667" y="276" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Who benefits:</text>
  <text x="667" y="291" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">· Academic researchers (all fields)</text>
  <text x="667" y="305" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">· Community colleges + HBCUs</text>
  <text x="667" y="319" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">· Non-traditional + under-resourced labs</text>
  <text x="667" y="333" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">· AI safety and social good research</text>

  <!-- Footer note -->
  <text x="400" y="368" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Controversial: does it benefit big tech more than researchers? Still being determined in pilot phase.</text>
</svg>
