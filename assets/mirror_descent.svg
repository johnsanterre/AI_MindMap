<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6" ry="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6" ry="6"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Mirror Descent: Primal-Dual Geometry</text>

  <!-- ===================== TOP ROW: Mirror Descent Flow ===================== -->

  <!-- Primal Space Box -->
  <rect x="30" y="48" width="195" height="165" fill="none" stroke="#2D5A8E" stroke-width="1.5" rx="4"/>
  <text x="128" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Primal Space</text>
  <text x="128" y="83" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">(original parameters)</text>

  <!-- Simplex in primal space -->
  <polygon points="68,190 188,190 128,108" fill="none" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="128" y="205" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">constraint set</text>

  <!-- Point x_t in primal -->
  <circle cx="115" cy="162" r="5" fill="#7C2530" stroke="#FDFAF4" stroke-width="1"/>
  <text x="96" y="158" font-family="Georgia, serif" font-size="10" fill="#7C2530" font-weight="bold">x_t</text>

  <!-- Arrow: primal to dual (mirror map) -->
  <line x1="235" y1="130" x2="308" y2="130" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <text x="272" y="120" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">\u2207\u03C6</text>
  <text x="272" y="148" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">mirror map</text>

  <!-- Dual Space Box -->
  <rect x="318" y="48" width="195" height="165" fill="none" stroke="#7C2530" stroke-width="1.5" rx="4"/>
  <text x="416" y="68" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Dual Space</text>
  <text x="416" y="83" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">(unconstrained gradients)</text>

  <!-- Dual point -->
  <circle cx="380" cy="135" r="5" fill="#7C2530" stroke="#FDFAF4" stroke-width="1"/>
  <text x="358" y="130" font-family="Georgia, serif" font-size="9" fill="#7C2530">\u2207\u03C6(x_t)</text>

  <!-- Gradient step in dual space -->
  <line x1="385" y1="140" x2="438" y2="172" stroke="#2D5A8E" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowNavy)"/>
  <circle cx="443" cy="176" r="5" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1"/>
  <text x="470" y="170" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-weight="bold">\u03B8_{t+1}</text>
  <text x="470" y="185" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" font-style="italic">\u2212\u03B7 g_t</text>

  <!-- Arrow: dual back to primal (inverse mirror map) -->
  <path d="M 523 155 Q 590 195 640 155 Q 670 130 695 135" fill="none" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowBrown)"/>
  <text x="615" y="210" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-weight="bold">(\u2207\u03C6)\u207B\u00B9</text>
  <text x="615" y="226" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle" font-style="italic">inverse mirror map</text>

  <!-- Result back in primal -->
  <rect x="700" y="48" width="85" height="165" fill="none" stroke="#2D5A8E" stroke-width="1.5" rx="4" stroke-dasharray="4,3"/>
  <text x="742" y="68" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Primal</text>
  <circle cx="742" cy="130" r="5" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1"/>
  <text x="742" y="150" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle" font-weight="bold">x_{t+1}</text>
  <text x="742" y="165" font-family="Georgia, serif" font-size="9" fill="#2D5A8E" text-anchor="middle" font-style="italic">feasible!</text>

  <!-- ===================== BOTTOM: Comparison ===================== -->
  <line x1="30" y1="240" x2="770" y2="240" stroke="#D4C5A9" stroke-width="1"/>

  <!-- Standard GD (left) -->
  <text x="200" y="262" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#C4A87A" text-anchor="middle">Standard Gradient Descent</text>
  <text x="200" y="277" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Euclidean geometry assumed</text>

  <!-- Euclidean contours -->
  <circle cx="160" cy="340" r="48" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="340" r="34" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="340" r="18" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="340" r="4" fill="#C4A87A"/>

  <!-- GD step -->
  <circle cx="208" cy="312" r="4" fill="#5C3D1E"/>
  <line x1="208" y1="312" x2="178" y2="332" stroke="#C4A87A" stroke-width="2" marker-end="url(#arrowTan)"/>
  <text x="225" y="307" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">x \u2212 \u03B7\u2207f</text>

  <!-- Divergence label -->
  <text x="200" y="393" font-family="Georgia, serif" font-size="9" fill="#C4A87A" text-anchor="middle">D(x,y) = \u00BD\u2016x\u2212y\u2016\u00B2</text>

  <!-- VS label -->
  <text x="400" y="345" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#D4C5A9" text-anchor="middle">vs.</text>

  <!-- Mirror Descent (right) -->
  <text x="600" y="262" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#7C2530" text-anchor="middle">Mirror Descent</text>
  <text x="600" y="277" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle" font-style="italic">Adapted to problem geometry</text>

  <!-- Warped contours -->
  <ellipse cx="560" cy="340" rx="58" ry="32" fill="none" stroke="#7C2530" stroke-width="1" opacity="0.5" transform="rotate(-20, 560, 340)"/>
  <ellipse cx="560" cy="340" rx="40" ry="22" fill="none" stroke="#7C2530" stroke-width="1" opacity="0.5" transform="rotate(-20, 560, 340)"/>
  <ellipse cx="560" cy="340" rx="20" ry="11" fill="none" stroke="#7C2530" stroke-width="1" opacity="0.5" transform="rotate(-20, 560, 340)"/>
  <circle cx="560" cy="340" r="4" fill="#7C2530"/>

  <!-- MD step -->
  <circle cx="618" cy="318" r="4" fill="#5C3D1E"/>
  <path d="M 618 318 Q 592 326 572 340" fill="none" stroke="#7C2530" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="636" y="313" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">Bregman proj.</text>

  <!-- Bregman divergence label -->
  <text x="600" y="393" font-family="Georgia, serif" font-size="9" fill="#7C2530" text-anchor="middle">D_\u03C6(x,y) = \u03C6(x) \u2212 \u03C6(y) \u2212 \u2207\u03C6(y)\u1D40(x\u2212y)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBrown" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowNavy" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowTan" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#C4A87A"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#7C2530"/>
    </marker>
  </defs>
</svg>
