<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6" ry="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6" ry="6"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Mirror Descent: Geometry-Aware Optimization</text>

  <!-- Divider -->
  <line x1="400" y1="42" x2="400" y2="395" stroke="#D4C5A9" stroke-width="1.2"/>

  <!-- ===================== LEFT PANEL: Euclidean vs Mirror ===================== -->
  <text x="200" y="52" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Euclidean Gradient Descent</text>

  <!-- Simplex triangle -->
  <polygon points="200,340 60,200 340,200" fill="none" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="200" y="360" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" text-anchor="middle">probability simplex</text>

  <!-- Simplex vertex labels -->
  <text x="47" y="195" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">e₁</text>
  <text x="343" y="195" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">e₂</text>
  <text x="200" y="375" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">e₃</text>

  <!-- Euclidean gradient step leaving simplex -->
  <circle cx="180" cy="250" r="5" fill="#7C2530" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="155" y="268" font-family="Georgia, serif" font-size="9" fill="#7C2530">x_t</text>

  <!-- Gradient arrow pointing outside simplex -->
  <line x1="180" y1="250" x2="130" y2="170" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="130,170 136,182 124,180" fill="#7C2530"/>
  <text x="110" y="158" font-family="Georgia, serif" font-size="9" fill="#7C2530">-η∇f</text>

  <!-- Projection arrow back to simplex -->
  <line x1="130" y1="170" x2="148" y2="200" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="148,200 140,192 150,190" fill="#7C2530"/>
  <circle cx="148" cy="200" r="4" fill="#7C2530" opacity="0.5"/>
  <text x="115" y="200" font-family="Georgia, serif" font-size="8.5" fill="#7C2530" font-style="italic">project</text>

  <!-- Problem annotation -->
  <text x="200" y="82" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">Step leaves feasible set;</text>
  <text x="200" y="96" font-family="Georgia, serif" font-size="10" fill="#7C2530" text-anchor="middle">needs projection back</text>

  <!-- ===================== RIGHT PANEL: Mirror Descent ===================== -->
  <text x="600" y="52" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Mirror Descent (Entropic Map)</text>

  <!-- Dual space box -->
  <rect x="430" y="68" width="150" height="100" fill="none" stroke="#2D5A8E" stroke-width="1.2" rx="4" ry="4" stroke-dasharray="4,3"/>
  <text x="505" y="84" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" text-anchor="middle" font-style="italic">Dual Space (unconstrained)</text>

  <!-- Primal simplex -->
  <polygon points="600,340 460,200 740,200" fill="none" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="600" y="360" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" text-anchor="middle">probability simplex</text>

  <!-- Primal point -->
  <circle cx="580" cy="250" r="5" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="555" y="268" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">x_t</text>

  <!-- Mirror map arrow up to dual space -->
  <path d="M 580 245 Q 540 180 490 130" fill="none" stroke="#5C3D1E" stroke-width="1.8"/>
  <polygon points="490,130 496,142 486,140" fill="#5C3D1E"/>
  <text x="520" y="175" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" transform="rotate(-50, 520, 175)">∇φ (mirror map)</text>

  <!-- Dual point -->
  <circle cx="490" cy="125" r="4" fill="#5C3D1E"/>

  <!-- Gradient step in dual space -->
  <line x1="490" y1="125" x2="545" y2="105" stroke="#2D5A8E" stroke-width="2"/>
  <polygon points="545,105 533,106 537,115" fill="#2D5A8E"/>
  <text x="520" y="98" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">-η∇f</text>

  <!-- Dual updated point -->
  <circle cx="545" cy="105" r="4" fill="#5C3D1E"/>

  <!-- Inverse mirror map arrow back down to simplex -->
  <path d="M 545 110 Q 595 170 620 230" fill="none" stroke="#5C3D1E" stroke-width="1.8"/>
  <polygon points="620,230 622,218 614,224" fill="#5C3D1E"/>
  <text x="605" y="170" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" transform="rotate(60, 605, 170)">∇φ* (softmax)</text>

  <!-- New primal point on simplex -->
  <circle cx="620" cy="235" r="5" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="635" y="230" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">x_{t+1}</text>

  <!-- Stays on simplex annotation -->
  <text x="600" y="82" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">Stays on simplex</text>
  <text x="600" y="96" font-family="Georgia, serif" font-size="10" fill="#2D5A8E" text-anchor="middle">automatically via softmax</text>

  <!-- Bottom legend -->
  <text x="200" y="395" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">φ(x) = Σ xᵢ log xᵢ  (neg. entropy)</text>
  <text x="600" y="395" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Bregman div. Dφ replaces ‖·‖²</text>
</svg>