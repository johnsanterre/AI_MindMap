<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="400" rx="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7C2530" font-weight="bold">CVPR — Landmark Papers Timeline</text>

  <!-- Timeline line -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Year markers and dots -->
  <!-- 1983 -->
  <circle cx="100" cy="200" r="8" fill="#5C3D1E"/>
  <text x="100" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">1983</text>
  <text x="100" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">Founded</text>

  <!-- 2012 AlexNet -->
  <circle cx="260" cy="200" r="10" fill="#7C2530"/>
  <text x="260" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">2012</text>
  <rect x="205" y="100" width="110" height="55" rx="6" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="260" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">AlexNet</text>
  <text x="260" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Deep Learning</text>
  <text x="260" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Revolution</text>
  <line x1="260" y1="155" x2="260" y2="190" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2016 ResNet + YOLO -->
  <circle cx="420" cy="200" r="10" fill="#2D5A8E"/>
  <text x="420" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">2016</text>
  <rect x="345" y="248" width="70" height="50" rx="6" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="380" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">ResNet</text>
  <text x="380" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">152 Layers</text>
  <line x1="395" y1="248" x2="410" y2="210" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="425" y="248" width="70" height="50" rx="6" fill="#2D5A8E" opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="460" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2D5A8E" font-weight="bold">YOLO</text>
  <text x="460" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Real-Time</text>
  <line x1="445" y1="248" x2="430" y2="210" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2020 ViT -->
  <circle cx="560" cy="200" r="10" fill="#5C3D1E"/>
  <text x="560" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">2020</text>
  <rect x="505" y="105" width="110" height="55" rx="6" fill="#5C3D1E" opacity="0.1" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="560" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5C3D1E" font-weight="bold">ViT</text>
  <text x="560" y="143" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Transformers</text>
  <text x="560" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">Enter Vision</text>
  <line x1="560" y1="160" x2="560" y2="190" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2023 SAM -->
  <circle cx="700" cy="200" r="10" fill="#7C2530"/>
  <text x="700" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">2023</text>
  <rect x="645" y="248" width="110" height="50" rx="6" fill="#7C2530" opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="700" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7C2530" font-weight="bold">SAM</text>
  <text x="700" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Segment</text>
  <text x="700" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7C2530">Anything</text>
  <line x1="700" y1="248" x2="700" y2="210" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Subtitle -->
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#C4A87A">40 years of advancing computer vision research</text>
</svg>