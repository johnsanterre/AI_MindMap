<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" rx="6" ry="6"/>
  <rect width="800" height="400" fill="none" stroke="#D4C5A9" stroke-width="1.5" rx="6" ry="6"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Euclidean vs Riemannian Gradient on a Curved Surface</text>

  <!-- ===================== LEFT PANEL: Curved Surface ===================== -->
  <text x="200" y="52" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Parameter Space (Curved Manifold)</text>

  <!-- Curved surface mesh lines (horizontal) -->
  <path d="M 30 320 Q 90 280 160 260 Q 230 240 300 250 Q 350 255 390 280" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M 30 285 Q 90 245 160 225 Q 230 205 300 215 Q 350 220 390 245" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M 30 250 Q 90 210 160 190 Q 230 170 300 180 Q 350 185 390 210" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M 30 215 Q 90 175 160 155 Q 230 135 300 145 Q 350 150 390 175" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M 30 180 Q 90 140 160 120 Q 230 100 300 110 Q 350 115 390 140" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Curved surface mesh lines (vertical) -->
  <path d="M 60 175 Q 60 215 55 260 Q 50 290 45 315" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 120 145 Q 118 190 115 235 Q 112 270 110 300" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 185 125 Q 182 170 178 215 Q 175 250 172 280" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 250 115 Q 248 160 246 205 Q 244 240 242 270" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 315 125 Q 314 170 312 215 Q 310 250 308 280" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M 370 148 Q 370 190 370 232 Q 370 262 370 290" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Starting point on manifold -->
  <circle cx="100" cy="270" r="6" fill="#5C3D1E" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="80" y="290" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">start</text>

  <!-- Optimum point -->
  <circle cx="310" cy="180" r="5" fill="#5C3D1E" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="320" y="175" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" font-style="italic">optimum</text>

  <!-- Euclidean gradient path (straight line, overshoots on curved surface) -->
  <path d="M 100 270 L 160 240 L 210 215 L 240 210 L 255 215 L 270 205 L 295 195" fill="none" stroke="#7C2530" stroke-width="2.2" stroke-dasharray="6,3" stroke-linecap="round"/>
  <polygon points="295,195 283,190 285,202" fill="#7C2530"/>

  <!-- Riemannian (natural) gradient path (follows curvature, direct to optimum) -->
  <path d="M 100 270 Q 150 248 190 225 Q 240 195 310 180" fill="none" stroke="#2D5A8E" stroke-width="2.8" stroke-linecap="round"/>
  <polygon points="310,180 298,174 300,186" fill="#2D5A8E"/>

  <!-- Labels for paths -->
  <text x="190" y="250" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-style="italic">Euclidean</text>
  <text x="190" y="261" font-family="Georgia, serif" font-size="9.5" fill="#7C2530" font-style="italic">(zig-zags)</text>
  <text x="138" y="210" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" font-style="italic">Riemannian</text>
  <text x="138" y="221" font-family="Georgia, serif" font-size="9.5" fill="#2D5A8E" font-style="italic">(geodesic)</text>

  <!-- Annotation: metric tensor -->
  <text x="200" y="90" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">Metric: g(θ) = F(θ)</text>
  <text x="200" y="104" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle">(Fisher information)</text>

  <!-- Divider -->
  <line x1="410" y1="42" x2="410" y2="395" stroke="#D4C5A9" stroke-width="1.2"/>

  <!-- ===================== RIGHT PANEL: Update Comparison ===================== -->
  <text x="605" y="52" font-family="Georgia, serif" font-size="11" fill="#5C3D1E" text-anchor="middle" font-style="italic">Update Rule Comparison</text>

  <!-- Axes -->
  <line x1="440" y1="340" x2="770" y2="340" stroke="#5C3D1E" stroke-width="1.2"/>
  <line x1="440" y1="340" x2="440" y2="70" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="773" y="344" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">θ₁</text>
  <text x="430" y="65" font-family="Georgia, serif" font-size="11" fill="#5C3D1E">θ₂</text>

  <!-- Elongated loss contours (highly anisotropic) -->
  <ellipse cx="640" cy="190" rx="130" ry="38" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.8" transform="rotate(-15 640 190)"/>
  <ellipse cx="640" cy="190" rx="100" ry="28" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.7" transform="rotate(-15 640 190)"/>
  <ellipse cx="640" cy="190" rx="68" ry="18" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.6" transform="rotate(-15 640 190)"/>
  <ellipse cx="640" cy="190" rx="34" ry="9" fill="none" stroke="#C4A87A" stroke-width="1" opacity="0.5" transform="rotate(-15 640 190)"/>

  <!-- Loss minimum -->
  <circle cx="640" cy="190" r="3" fill="#5C3D1E"/>
  <text x="648" y="185" font-family="Georgia, serif" font-size="9" fill="#5C3D1E">θ*</text>

  <!-- Starting point -->
  <circle cx="510" cy="290" r="5" fill="#5C3D1E" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="495" y="306" font-family="Georgia, serif" font-size="10" fill="#5C3D1E">θ₀</text>

  <!-- Standard gradient path (zig-zagging along narrow valley) -->
  <path d="M 510 290 L 540 255 L 560 270 L 585 235 L 600 248 L 620 215 L 628 222 L 635 200" fill="none" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>
  <polygon points="635,200 625,198 627,210" fill="#7C2530"/>

  <!-- Natural gradient path (direct to minimum) -->
  <path d="M 510 290 Q 560 255 600 225 Q 625 208 640 190" fill="none" stroke="#2D5A8E" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="640,190 628,186 631,197" fill="#2D5A8E"/>

  <!-- Formulas -->
  <rect x="430" y="350" width="340" height="48" fill="#FDFAF4" stroke="none"/>
  <text x="445" y="365" font-family="Georgia, serif" font-size="10" fill="#7C2530">Standard:  Δθ = -η ∇L(θ)</text>
  <line x1="445" y1="370" x2="660" y2="370" stroke="#D4C5A9" stroke-width="0.5"/>
  <text x="445" y="386" font-family="Georgia, serif" font-size="10" fill="#2D5A8E">Natural:    Δθ = -η F(θ)⁻¹ ∇L(θ)</text>

  <!-- Legend -->
  <line x1="690" y1="362" x2="712" y2="362" stroke="#7C2530" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="716" y="366" font-family="Georgia, serif" font-size="9" fill="#7C2530">zig-zags</text>
  <line x1="690" y1="382" x2="712" y2="382" stroke="#2D5A8E" stroke-width="2.5"/>
  <text x="716" y="386" font-family="Georgia, serif" font-size="9" fill="#2D5A8E">direct</text>

  <!-- Contour label -->
  <text x="748" y="130" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" text-anchor="middle">loss</text>
  <text x="748" y="142" font-family="Georgia, serif" font-size="9.5" fill="#C4A87A" text-anchor="middle">contours</text>
</svg>