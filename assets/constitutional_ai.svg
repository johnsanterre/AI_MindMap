<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Constitutional AI — Two-Phase Training Pipeline</text>

  <!-- ===== CONSTITUTION DOCUMENT (center-left) ===== -->
  <rect x="330" y="52" width="140" height="90" rx="4" fill="#FFF8E7" stroke="#C4A87A" stroke-width="2"/>
  <line x1="330" y1="70" x2="470" y2="70" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="400" y="65" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Constitution</text>
  <text x="344" y="84" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">• Avoid harmful content</text>
  <text x="344" y="97" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">• Be honest &amp; accurate</text>
  <text x="344" y="110" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">• Respect human rights</text>
  <text x="344" y="123" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">• Do not deceive users</text>
  <text x="344" y="136" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">• Promote well-being</text>

  <!-- ===== PHASE 1 LABEL ===== -->
  <rect x="18" y="52" width="285" height="22" rx="3" fill="#7C2530"/>
  <text x="160" y="67" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Phase 1 — SL-CAI (Supervised)</text>

  <!-- Phase 1 boxes -->
  <!-- Box 1: Harmful Prompt -->
  <rect x="18" y="84" width="118" height="42" rx="4" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="77" y="101" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">Harmful Prompt</text>
  <text x="77" y="117" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">adversarial input</text>

  <!-- Arrow 1→2 -->
  <line x1="136" y1="105" x2="158" y2="105" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Box 2: AI Response -->
  <rect x="159" y="84" width="118" height="42" rx="4" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="218" y="101" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">AI Generates</text>
  <text x="218" y="117" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">initial response</text>

  <!-- Arrow 2→3 (down) -->
  <line x1="218" y1="126" x2="218" y2="148" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- Constitution arrow down to Critique -->
  <line x1="400" y1="142" x2="400" y2="165" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTan)"/>

  <!-- Box 3: AI Critiques -->
  <rect x="159" y="149" width="118" height="42" rx="4" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="218" y="166" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">AI Critiques</text>
  <text x="218" y="181" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">vs. constitution</text>

  <!-- Arrow 3→4 (left) -->
  <line x1="218" y1="191" x2="218" y2="214" stroke="#7C2530" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- Box 4: AI Revises -->
  <rect x="159" y="215" width="118" height="42" rx="4" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="218" y="232" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">AI Revises</text>
  <text x="218" y="248" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">improved response</text>

  <!-- Repeat arrow (loop back) -->
  <path d="M 159 236 Q 100 236 100 170 Q 100 105 159 105" fill="none" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTan2)"/>
  <text x="68" y="173" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">repeat</text>
  <text x="68" y="184" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">1–3×</text>

  <!-- Arrow 4→Training Data -->
  <line x1="218" y1="257" x2="218" y2="279" stroke="#5C3D1E" stroke-width="1.5" marker-end="url(#arrowBrown)"/>

  <!-- Box 5: Training Data -->
  <rect x="159" y="280" width="118" height="42" rx="4" fill="#F0EBE0" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="218" y="297" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#5C3D1E" text-anchor="middle">Training Data</text>
  <text x="218" y="313" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">supervised fine-tune</text>

  <!-- ===== PHASE 2 LABEL ===== -->
  <rect x="497" y="52" width="285" height="22" rx="3" fill="#2D5A8E"/>
  <text x="639" y="67" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Phase 2 — RL-CAI (RLAIF)</text>

  <!-- Constitution arrow to Phase 2 critique -->
  <line x1="470" y1="97" x2="550" y2="170" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTan3)"/>

  <!-- Box A: Generate Response Pairs -->
  <rect x="497" y="84" width="140" height="42" rx="4" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="567" y="101" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#7C2530" text-anchor="middle">Generate Pairs</text>
  <text x="567" y="117" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">two candidate responses</text>

  <!-- Arrow A→B -->
  <line x1="567" y1="126" x2="567" y2="148" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowNav)"/>

  <!-- Box B: AI Judge -->
  <rect x="497" y="149" width="140" height="42" rx="4" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="567" y="166" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">AI Judge Scores</text>
  <text x="567" y="181" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">constitution-guided</text>

  <!-- Arrow B→C -->
  <line x1="567" y1="191" x2="567" y2="214" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowNav)"/>

  <!-- Box C: Preference Model -->
  <rect x="497" y="215" width="140" height="42" rx="4" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="567" y="232" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Preference Model</text>
  <text x="567" y="248" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">trained on AI labels</text>

  <!-- Arrow C→D -->
  <line x1="567" y1="257" x2="567" y2="279" stroke="#2D5A8E" stroke-width="1.5" marker-end="url(#arrowNav)"/>

  <!-- Box D: RLAIF / PPO -->
  <rect x="497" y="280" width="140" height="42" rx="4" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="567" y="297" font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#2D5A8E" text-anchor="middle">RL Fine-Tuning</text>
  <text x="567" y="313" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E" text-anchor="middle">RLAIF (PPO)</text>

  <!-- Phase 1 → Phase 2 connection arrow -->
  <line x1="642" y1="84" x2="642" y2="74" stroke="#C4A87A" stroke-width="0"/>
  <line x1="277" y1="301" x2="497" y2="301" stroke="#5C3D1E" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBrown2)"/>
  <text x="387" y="295" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">SL-CAI model used</text>
  <text x="387" y="306" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">to generate pairs</text>

  <!-- Bottom note -->
  <text x="400" y="358" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" text-anchor="middle" font-style="italic">Constitution principles guide AI critique at both phases — no human harmlessness labels required</text>

  <!-- Legend -->
  <rect x="640" y="340" width="12" height="12" fill="#F5E6E8" stroke="#7C2530" stroke-width="1.5"/>
  <text x="656" y="351" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Generation</text>
  <rect x="720" y="340" width="12" height="12" fill="#E8EEF5" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="736" y="351" font-family="Georgia, serif" font-size="9.5" fill="#5C3D1E">Evaluation</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowD" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#7C2530"/>
    </marker>
    <marker id="arrowTan" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#C4A87A"/>
    </marker>
    <marker id="arrowTan2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
    <marker id="arrowTan3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4A87A"/>
    </marker>
    <marker id="arrowNav" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#2D5A8E"/>
    </marker>
    <marker id="arrowBrown" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#5C3D1E"/>
    </marker>
    <marker id="arrowBrown2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5C3D1E"/>
    </marker>
  </defs>
</svg>
