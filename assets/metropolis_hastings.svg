<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="mh-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D5A8E"/>
    </marker>
    <marker id="mh-arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C2530"/>
    </marker>
    <marker id="mh-arr-tan" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Panel dividers -->
  <line x1="275" y1="24" x2="275" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="540" y1="24" x2="540" y2="380" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══ PANEL 1: PROPOSAL & TARGET ══ -->
  <text x="138" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">PROPOSAL vs TARGET</text>

  <!-- Axes -->
  <line x1="28" y1="320" x2="260" y2="320" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#mh-arr-tan)"/>
  <line x1="28" y1="324" x2="28" y2="50" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#mh-arr-tan)"/>
  <text x="255" y="335" font-size="8" fill="#6B5D4F">x</text>
  <text x="14" y="52" font-size="8" fill="#6B5D4F">p(x)</text>

  <!-- Target distribution: bimodal -->
  <path d="M 28,319 C 40,318 50,310 62,290 C 72,274 78,255 85,240 C 90,230 94,222 98,218 C 102,222 106,230 110,240 C 116,255 122,275 130,295 C 138,310 148,318 160,316 C 170,312 178,300 185,280 C 192,260 196,238 200,220 C 203,208 206,198 210,192 C 214,198 217,208 220,220 C 224,238 228,260 232,278 C 236,294 242,310 252,318 L 260,319"
        fill="#7C2530" fill-opacity="0.12"
        stroke="#7C2530" stroke-width="2.2"/>

  <!-- Proposal distribution: broad Gaussian centered at current point x=150 -->
  <path d="M 48,319 C 60,318 75,315 90,308 C 108,298 125,282 140,265 C 148,255 152,245 155,238 C 158,245 162,255 168,265 C 180,282 195,298 212,308 C 228,315 242,318 256,319"
        fill="#2D5A8E" fill-opacity="0.08"
        stroke="#2D5A8E" stroke-width="1.8" stroke-dasharray="6,3"/>

  <!-- Current point -->
  <circle cx="155" cy="238" r="5" fill="#2D5A8E" stroke="#FDFAF4" stroke-width="1.5"/>
  <text x="160" y="232" font-size="7.5" fill="#2D5A8E">x_t</text>

  <!-- Proposed point -->
  <circle cx="208" cy="195" r="5" fill="#C4A87A" stroke="#5C3D1E" stroke-width="1.2"/>
  <text x="213" y="189" font-size="7.5" fill="#5C3D1E">x'</text>

  <!-- Arrow from current to proposed -->
  <line x1="160" y1="236" x2="203" y2="198" stroke="#5C3D1E" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#mh-arr-red)"/>

  <!-- Legend -->
  <line x1="34" y1="60" x2="58" y2="60" stroke="#7C2530" stroke-width="2"/>
  <text x="62" y="64" font-size="8" fill="#7C2530">target p(x)</text>
  <line x1="34" y1="76" x2="58" y2="76" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="62" y="80" font-size="8" fill="#2D5A8E">proposal q(x'|x)</text>

  <!-- Caption -->
  <text x="138" y="355" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">Propose from q, compare</text>
  <text x="138" y="367" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">densities at x' vs x</text>

  <!-- ══ PANEL 2: ACCEPT / REJECT ══ -->
  <text x="408" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">ACCEPT / REJECT</text>

  <!-- Accept box -->
  <rect x="295" y="45" width="226" height="145" fill="#E8F0E4" stroke="#4A7C45" stroke-width="1" rx="4"/>
  <text x="408" y="62" text-anchor="middle" font-size="9" fill="#4A7C45" font-weight="bold">ACCEPT (move to x')</text>

  <!-- Accept ratio explanation -->
  <text x="408" y="88" text-anchor="middle" font-size="10" fill="#5C3D1E">acceptance ratio:</text>
  <text x="408" y="110" text-anchor="middle" font-size="12" fill="#7C2530" font-weight="bold">alpha = min(1, p(x')/p(x))</text>
  <text x="408" y="135" text-anchor="middle" font-size="8.5" fill="#5C3D1E">If p(x') > p(x): always accept</text>
  <text x="408" y="150" text-anchor="middle" font-size="8.5" fill="#5C3D1E">If p(x') &lt; p(x): accept with</text>
  <text x="408" y="165" text-anchor="middle" font-size="8.5" fill="#5C3D1E">probability p(x')/p(x)</text>

  <!-- Green check -->
  <text x="310" y="105" font-size="22" fill="#4A7C45">&#10003;</text>

  <!-- Reject box -->
  <rect x="295" y="205" width="226" height="80" fill="#F0E4E4" stroke="#7C2530" stroke-width="1" rx="4"/>
  <text x="408" y="222" text-anchor="middle" font-size="9" fill="#7C2530" font-weight="bold">REJECT (stay at x)</text>
  <text x="408" y="248" text-anchor="middle" font-size="8.5" fill="#5C3D1E">Draw u ~ Uniform(0,1)</text>
  <text x="408" y="265" text-anchor="middle" font-size="8.5" fill="#5C3D1E">If u > alpha: keep current x_t</text>

  <!-- Red X -->
  <text x="310" y="250" font-size="22" fill="#7C2530">&#10007;</text>

  <!-- Arrow from accept to next iteration -->
  <path d="M 408,300 L 408,325" stroke="#5C3D1E" stroke-width="1.2" marker-end="url(#mh-arr-red)"/>
  <text x="408" y="342" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">x_{t+1} = accepted or current</text>
  <text x="408" y="356" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">Repeat thousands of times</text>

  <!-- ══ PANEL 3: CHAIN CONVERGENCE ══ -->
  <text x="670" y="20" text-anchor="middle" font-size="10" fill="#6B5D4F" letter-spacing="1">CHAIN CONVERGES</text>

  <!-- Trace plot axes -->
  <line x1="558" y1="170" x2="780" y2="170" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#mh-arr-tan)"/>
  <line x1="558" y1="174" x2="558" y2="38" stroke="#C4A87A" stroke-width="1.2" marker-end="url(#mh-arr-tan)"/>
  <text x="774" y="184" font-size="8" fill="#6B5D4F">iteration</text>
  <text x="548" y="40" font-size="8" fill="#6B5D4F">x</text>

  <!-- Trace plot: initial wandering then settling -->
  <polyline points="560,145 568,60 575,80 580,130 586,50 592,70 600,105 608,90 614,110 620,100 626,115 632,105 638,98 644,108 650,102 656,95 662,108 668,100 674,105 680,98 686,103 692,100 698,105 704,98 710,102 716,100 722,104 728,99 734,103 740,100 746,102 752,100 758,101 764,100 770,101"
            fill="none" stroke="#2D5A8E" stroke-width="1.4"/>

  <!-- Burn-in marker -->
  <line x1="618" y1="38" x2="618" y2="170" stroke="#7C2530" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="590" y="35" font-size="7" fill="#7C2530">burn-in</text>
  <text x="688" y="35" font-size="7" fill="#2D5A8E">stationary</text>

  <!-- Histogram of converged samples -->
  <text x="670" y="202" text-anchor="middle" font-size="9" fill="#6B5D4F" font-style="italic">Histogram of samples</text>

  <!-- Histogram bars -->
  <rect x="585" y="340" width="18" height="15" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,594,347)"/>
  <rect x="605" y="310" width="18" height="45" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,614,332)"/>
  <rect x="625" y="290" width="18" height="65" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,634,322)"/>
  <rect x="645" y="270" width="18" height="85" fill="#2D5A8E" fill-opacity="0.5" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,654,312)"/>
  <rect x="665" y="260" width="18" height="95" fill="#2D5A8E" fill-opacity="0.5" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,674,307)"/>
  <rect x="685" y="270" width="18" height="85" fill="#2D5A8E" fill-opacity="0.5" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,694,312)"/>
  <rect x="705" y="295" width="18" height="60" fill="#2D5A8E" fill-opacity="0.4" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,714,325)"/>
  <rect x="725" y="320" width="18" height="35" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,734,337)"/>
  <rect x="745" y="340" width="18" height="15" fill="#2D5A8E" fill-opacity="0.3" stroke="#2D5A8E" stroke-width="0.8" transform="rotate(180,754,347)"/>

  <!-- Axes for histogram -->
  <line x1="580" y1="355" x2="770" y2="355" stroke="#C4A87A" stroke-width="1.2"/>
  <line x1="580" y1="355" x2="580" y2="210" stroke="#C4A87A" stroke-width="1.2"/>

  <!-- Target overlay on histogram -->
  <path d="M 585,354 C 600,348 615,330 630,310 C 645,285 655,268 670,258 C 685,268 695,285 710,310 C 725,330 740,348 755,354"
        fill="none" stroke="#7C2530" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="762" y="352" font-size="7" fill="#7C2530">target</text>

  <!-- Bottom caption -->
  <text x="670" y="378" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">Samples approximate the target</text>
  <text x="670" y="390" text-anchor="middle" font-size="8.5" fill="#5C3D1E" font-style="italic">distribution after convergence</text>
</svg>
