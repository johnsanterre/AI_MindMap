<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif">
  <rect width="800" height="400" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="2"/>
  <text x="400" y="32" text-anchor="middle" fill="#5C3D1E" font-size="18" font-weight="bold">Proximal Operators: Gradient Step + Non-Smooth Penalty</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5C3D1E"/>
    </marker>
  </defs>

  <!-- Left: Smooth loss landscape -->
  <rect x="25" y="50" width="220" height="175" rx="8" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="135" y="73" text-anchor="middle" fill="#2D5A8E" font-size="13" font-weight="bold">Smooth Loss f(x)</text>
  <!-- Parabola curve -->
  <path d="M50,195 Q135,90 220,195" fill="none" stroke="#2D5A8E" stroke-width="2.5"/>
  <!-- Gradient arrow -->
  <line x1="85" y1="160" x2="120" y2="140" stroke="#2D5A8E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="78" y="178" fill="#2D5A8E" font-size="10">-&#x2207;f</text>
  <text x="135" y="215" text-anchor="middle" fill="#5C3D1E" font-size="11">gradient step</text>

  <!-- Arrow between left and center -->
  <line x1="255" y1="135" x2="295" y2="135" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="275" y="125" text-anchor="middle" fill="#7C2530" font-size="10" font-weight="bold">+</text>

  <!-- Center: Non-smooth penalty -->
  <rect x="305" y="50" width="190" height="175" rx="8" fill="#7C2530" fill-opacity="0.08" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="73" text-anchor="middle" fill="#7C2530" font-size="13" font-weight="bold">Non-Smooth g(x)</text>
  <!-- L1 norm V shape -->
  <line x1="330" y1="195" x2="400" y2="105" stroke="#7C2530" stroke-width="2.5"/>
  <line x1="400" y1="105" x2="470" y2="195" stroke="#7C2530" stroke-width="2.5"/>
  <circle cx="400" cy="105" r="4" fill="#7C2530"/>
  <text x="400" y="100" text-anchor="middle" fill="#7C2530" font-size="10">kink</text>
  <text x="400" y="215" text-anchor="middle" fill="#5C3D1E" font-size="11">|x| not differentiable at 0</text>

  <!-- Arrow to right -->
  <line x1="505" y1="135" x2="545" y2="135" stroke="#5C3D1E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="525" y="125" text-anchor="middle" fill="#7C2530" font-size="10" font-weight="bold">=</text>

  <!-- Right: Proximal operator result -->
  <rect x="555" y="50" width="220" height="175" rx="8" fill="#C4A87A" fill-opacity="0.2" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="665" y="73" text-anchor="middle" fill="#5C3D1E" font-size="13" font-weight="bold">prox (Soft Threshold)</text>
  <!-- Soft threshold function -->
  <line x1="580" y1="155" x2="630" y2="155" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="630" y1="155" x2="665" y2="120" stroke="#5C3D1E" stroke-width="2.5"/>
  <line x1="665" y1="155" x2="665" y2="155" stroke="#5C3D1E" stroke-width="2.5"/>
  <line x1="700" y1="155" x2="750" y2="155" stroke="#C4A87A" stroke-width="2.5"/>
  <line x1="665" y1="190" x2="700" y2="155" stroke="#5C3D1E" stroke-width="2.5"/>
  <!-- Dead zone markers -->
  <line x1="630" y1="150" x2="630" y2="160" stroke="#7C2530" stroke-width="1.5"/>
  <line x1="700" y1="150" x2="700" y2="160" stroke="#7C2530" stroke-width="1.5"/>
  <text x="665" y="200" text-anchor="middle" fill="#7C2530" font-size="10">dead zone</text>
  <text x="665" y="215" text-anchor="middle" fill="#5C3D1E" font-size="11">small weights &#x2192; exactly 0</text>

  <!-- Bottom: Algorithm flow -->
  <rect x="25" y="260" width="170" height="55" rx="6" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="110" y="280" text-anchor="middle" fill="#2D5A8E" font-size="12" font-weight="bold">ISTA</text>
  <text x="110" y="298" text-anchor="middle" fill="#5C3D1E" font-size="10">gradient + prox each step</text>
  <text x="110" y="310" text-anchor="middle" fill="#5C3D1E" font-size="10">simple, O(1/k) rate</text>

  <rect x="215" y="260" width="170" height="55" rx="6" fill="#7C2530" fill-opacity="0.1" stroke="#7C2530" stroke-width="1.5"/>
  <text x="300" y="280" text-anchor="middle" fill="#7C2530" font-size="12" font-weight="bold">FISTA</text>
  <text x="300" y="298" text-anchor="middle" fill="#5C3D1E" font-size="10">+ momentum acceleration</text>
  <text x="300" y="310" text-anchor="middle" fill="#5C3D1E" font-size="10">O(1/k&#xB2;) rate</text>

  <rect x="405" y="260" width="170" height="55" rx="6" fill="#C4A87A" fill-opacity="0.25" stroke="#C4A87A" stroke-width="1.5"/>
  <text x="490" y="280" text-anchor="middle" fill="#5C3D1E" font-size="12" font-weight="bold">ADMM</text>
  <text x="490" y="298" text-anchor="middle" fill="#5C3D1E" font-size="10">split into subproblems</text>
  <text x="490" y="310" text-anchor="middle" fill="#5C3D1E" font-size="10">each solved via prox</text>

  <rect x="595" y="260" width="180" height="55" rx="6" fill="#2D5A8E" fill-opacity="0.1" stroke="#2D5A8E" stroke-width="1.5"/>
  <text x="685" y="280" text-anchor="middle" fill="#2D5A8E" font-size="12" font-weight="bold">Proximal Gradient</text>
  <text x="685" y="298" text-anchor="middle" fill="#5C3D1E" font-size="10">general f + g framework</text>
  <text x="685" y="310" text-anchor="middle" fill="#5C3D1E" font-size="10">convergence guaranteed</text>

  <!-- Bottom label -->
  <text x="400" y="350" text-anchor="middle" fill="#5C3D1E" font-size="14" font-weight="bold">min f(x) + g(x): smooth loss + non-smooth regularizer</text>
  <text x="400" y="372" text-anchor="middle" fill="#C4A87A" font-size="11">The proximal operator handles what gradients cannot</text>
</svg>