<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:Georgia,serif;">
  <defs>
    <marker id="mc-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4A87A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="798" height="398" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5" rx="5"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#5C3D1E" letter-spacing="1.5">ESTIMATING PI WITH RANDOM SAMPLING</text>

  <!-- === LEFT PANEL: Square with quarter circle and random points === -->
  <text x="200" y="55" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">RANDOM POINTS IN UNIT SQUARE</text>

  <!-- Unit square -->
  <rect x="60" y="70" width="280" height="280" fill="none" stroke="#5C3D1E" stroke-width="1.8"/>

  <!-- Quarter circle arc from (60,350) radius 280 -->
  <path d="M 60,70 A 280,280 0 0,1 340,350" fill="#2D5A8E" fill-opacity="0.08" stroke="#2D5A8E" stroke-width="2"/>
  <!-- Fill the quarter circle region -->
  <path d="M 60,70 A 280,280 0 0,1 340,350 L 60,350 Z" fill="#2D5A8E" fill-opacity="0.06" stroke="none"/>

  <!-- Points INSIDE the quarter circle (red) -->
  <circle cx="120" cy="300" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="90" cy="250" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="150" cy="280" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="100" cy="180" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="180" cy="320" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="130" cy="220" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="200" cy="300" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="80" cy="310" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="170" cy="250" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="110" cy="140" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="220" cy="330" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="140" cy="190" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="250" cy="340" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="80" cy="120" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="160" cy="160" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="100" cy="340" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="190" cy="210" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="130" cy="330" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="240" cy="290" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="75" cy="280" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="210" cy="260" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="270" cy="340" r="4" fill="#7C2530" opacity="0.8"/>
  <circle cx="160" cy="340" r="4" fill="#7C2530" opacity="0.8"/>

  <!-- Points OUTSIDE the quarter circle (tan) -->
  <circle cx="300" cy="100" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="280" cy="150" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="320" cy="200" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="310" cy="120" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="260" cy="90" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="330" cy="280" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="290" cy="180" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="250" cy="110" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="330" cy="150" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="310" cy="250" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="270" cy="200" r="4" fill="#C4A87A" opacity="0.8"/>
  <circle cx="320" cy="320" r="4" fill="#C4A87A" opacity="0.8"/>

  <!-- Labels on square -->
  <text x="60" y="365" font-size="9" fill="#5C3D1E">(0,0)</text>
  <text x="318" y="365" font-size="9" fill="#5C3D1E">(1,0)</text>
  <text x="60" y="66" font-size="9" fill="#5C3D1E">(0,1)</text>
  <text x="200" y="385" text-anchor="middle" font-size="10" fill="#5C3D1E" font-style="italic">pi/4 = inside / total</text>

  <!-- Legend -->
  <circle cx="75" cy="385" r="4" fill="#7C2530"/>
  <text x="83" y="389" font-size="8" fill="#7C2530">inside arc</text>
  <circle cx="155" cy="385" r="4" fill="#C4A87A"/>
  <text x="163" y="389" font-size="8" fill="#C4A87A">outside arc</text>

  <!-- === RIGHT PANEL: Convergence chart === -->
  <text x="590" y="55" text-anchor="middle" font-size="11" fill="#6B5D4F" letter-spacing="1">CONVERGENCE TO TRUE VALUE</text>

  <!-- Axes -->
  <line x1="430" y1="340" x2="760" y2="340" stroke="#C4A87A" stroke-width="1.4" marker-end="url(#mc-arr)"/>
  <line x1="430" y1="345" x2="430" y2="70" stroke="#C4A87A" stroke-width="1.4" marker-end="url(#mc-arr)"/>
  <text x="595" y="365" text-anchor="middle" font-size="9" fill="#6B5D4F">number of samples (N)</text>
  <text x="420" y="68" font-size="9" fill="#6B5D4F">estimate</text>

  <!-- Axis tick labels -->
  <text x="460" y="355" font-size="8" fill="#6B5D4F">10</text>
  <text x="530" y="355" font-size="8" fill="#6B5D4F">100</text>
  <text x="620" y="355" font-size="8" fill="#6B5D4F">1K</text>
  <text x="710" y="355" font-size="8" fill="#6B5D4F">10K</text>

  <!-- True value line (pi) at y=200 -->
  <line x1="430" y1="200" x2="755" y2="200" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="758" y="197" font-size="10" fill="#2D5A8E" font-weight="bold">pi</text>

  <!-- Convergence band (1/sqrt(N) envelope) -->
  <path d="M 460,100 C 490,140 530,170 580,185 C 620,192 660,196 750,198" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M 460,300 C 490,260 530,230 580,215 C 620,208 660,204 750,202" fill="none" stroke="#C4A87A" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="465" y="95" font-size="7.5" fill="#C4A87A">+1/sqrt(N)</text>
  <text x="465" y="315" font-size="7.5" fill="#C4A87A">-1/sqrt(N)</text>

  <!-- Noisy estimate path converging to pi -->
  <path d="M 460,130 L 475,270 L 490,160 L 505,240 L 520,180 L 535,225 L 550,190 L 570,215 L 590,195 L 610,208 L 630,198 L 650,204 L 670,199 L 690,202 L 710,200 L 730,201 L 750,200"
        fill="none" stroke="#7C2530" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Annotation: 1/sqrt(N) convergence rate -->
  <rect x="550" y="85" width="180" height="36" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="0.8" rx="3"/>
  <text x="640" y="100" text-anchor="middle" font-size="9" fill="#5C3D1E">Error ~ O(1/sqrt(N))</text>
  <text x="640" y="114" text-anchor="middle" font-size="8" fill="#6B5D4F" font-style="italic">regardless of dimension</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="375" stroke="#D4C5A9" stroke-width="1" stroke-dasharray="3,3"/>
</svg>