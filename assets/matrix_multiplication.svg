<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <!-- Background and border -->
  <rect width="800" height="400" fill="#FDFAF4"/>
  <rect x="2" y="2" width="796" height="396" fill="none" stroke="#D4C5A9" stroke-width="2" rx="6"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#5C3D1E">Matrix Multiplication: Row-Column Dot Product</text>

  <!-- Matrix A -->
  <text x="95" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D5A8E">A</text>
  <!-- Bracket left -->
  <path d="M42,72 L36,72 L36,192 L42,192" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Bracket right -->
  <path d="M158,72 L164,72 L164,192 L158,192" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Row 1 -->
  <text x="60" y="100" font-size="13" fill="#5C3D1E">a&#x2081;&#x2081;</text>
  <text x="100" y="100" font-size="13" fill="#5C3D1E">a&#x2081;&#x2082;</text>
  <text x="140" y="100" font-size="13" fill="#5C3D1E">a&#x2081;&#x2083;</text>
  <!-- Row 2 (highlighted) -->
  <rect x="44" y="108" width="114" height="24" rx="3" fill="#7C2530" fill-opacity="0.15"/>
  <text x="60" y="126" font-size="13" font-weight="bold" fill="#7C2530">a&#x2082;&#x2081;</text>
  <text x="100" y="126" font-size="13" font-weight="bold" fill="#7C2530">a&#x2082;&#x2082;</text>
  <text x="140" y="126" font-size="13" font-weight="bold" fill="#7C2530">a&#x2082;&#x2083;</text>
  <!-- Row 3 -->
  <text x="60" y="155" font-size="13" fill="#5C3D1E">a&#x2083;&#x2081;</text>
  <text x="100" y="155" font-size="13" fill="#5C3D1E">a&#x2083;&#x2082;</text>
  <text x="140" y="155" font-size="13" fill="#5C3D1E">a&#x2083;&#x2083;</text>
  <!-- Row 4 -->
  <text x="60" y="184" font-size="13" fill="#5C3D1E">a&#x2084;&#x2081;</text>
  <text x="100" y="184" font-size="13" fill="#5C3D1E">a&#x2084;&#x2082;</text>
  <text x="140" y="184" font-size="13" fill="#5C3D1E">a&#x2084;&#x2083;</text>

  <!-- Multiplication sign -->
  <text x="185" y="135" text-anchor="middle" font-size="20" fill="#5C3D1E">&#xD7;</text>

  <!-- Matrix B -->
  <text x="270" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D5A8E">B</text>
  <!-- Bracket left -->
  <path d="M208,72 L202,72 L202,192 L208,192" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Bracket right -->
  <path d="M338,72 L344,72 L344,192 L338,192" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Col 1 -->
  <text x="220" y="100" font-size="13" fill="#5C3D1E">b&#x2081;&#x2081;</text>
  <text x="220" y="126" font-size="13" fill="#5C3D1E">b&#x2082;&#x2081;</text>
  <text x="220" y="155" font-size="13" fill="#5C3D1E">b&#x2083;&#x2081;</text>
  <!-- Col 2 (highlighted) -->
  <rect x="252" y="82" width="28" height="102" rx="3" fill="#2D5A8E" fill-opacity="0.15"/>
  <text x="260" y="100" font-size="13" font-weight="bold" fill="#2D5A8E">b&#x2081;&#x2082;</text>
  <text x="260" y="126" font-size="13" font-weight="bold" fill="#2D5A8E">b&#x2082;&#x2082;</text>
  <text x="260" y="155" font-size="13" font-weight="bold" fill="#2D5A8E">b&#x2083;&#x2082;</text>
  <!-- Col 3 -->
  <text x="300" y="100" font-size="13" fill="#5C3D1E">b&#x2081;&#x2083;</text>
  <text x="300" y="126" font-size="13" fill="#5C3D1E">b&#x2082;&#x2083;</text>
  <text x="300" y="155" font-size="13" fill="#5C3D1E">b&#x2083;&#x2083;</text>
  <!-- Col 4 -->
  <text x="330" y="100" font-size="13" fill="#5C3D1E">b&#x2081;&#x2084;</text>
  <text x="330" y="126" font-size="13" fill="#5C3D1E">b&#x2082;&#x2084;</text>
  <text x="330" y="155" font-size="13" fill="#5C3D1E">b&#x2083;&#x2084;</text>

  <!-- Equals sign -->
  <text x="365" y="135" text-anchor="middle" font-size="20" fill="#5C3D1E">=</text>

  <!-- Result Matrix C -->
  <text x="460" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D5A8E">C</text>
  <!-- Bracket left -->
  <path d="M388,72 L382,72 L382,192 L388,192" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Bracket right -->
  <path d="M538,72 L544,72 L544,192 L538,192" fill="none" stroke="#5C3D1E" stroke-width="2"/>
  <!-- Entries (dim placeholders) -->
  <text x="410" y="100" font-size="13" fill="#C4A87A">c&#x2081;&#x2081;</text>
  <text x="450" y="100" font-size="13" fill="#C4A87A">c&#x2081;&#x2082;</text>
  <text x="490" y="100" font-size="13" fill="#C4A87A">c&#x2081;&#x2083;</text>
  <text x="520" y="100" font-size="13" fill="#C4A87A">c&#x2081;&#x2084;</text>
  <!-- Row 2 with highlight on (2,2) -->
  <text x="410" y="126" font-size="13" fill="#C4A87A">c&#x2082;&#x2081;</text>
  <rect x="437" y="110" width="30" height="22" rx="4" fill="#7C2530" fill-opacity="0.2" stroke="#7C2530" stroke-width="1.5"/>
  <text x="445" y="126" font-size="13" font-weight="bold" fill="#7C2530">c&#x2082;&#x2082;</text>
  <text x="490" y="126" font-size="13" fill="#C4A87A">c&#x2082;&#x2083;</text>
  <text x="520" y="126" font-size="13" fill="#C4A87A">c&#x2082;&#x2084;</text>
  <!-- Row 3 -->
  <text x="410" y="155" font-size="13" fill="#C4A87A">c&#x2083;&#x2081;</text>
  <text x="450" y="155" font-size="13" fill="#C4A87A">c&#x2083;&#x2082;</text>
  <text x="490" y="155" font-size="13" fill="#C4A87A">c&#x2083;&#x2083;</text>
  <text x="520" y="155" font-size="13" fill="#C4A87A">c&#x2083;&#x2084;</text>
  <!-- Row 4 -->
  <text x="410" y="184" font-size="13" fill="#C4A87A">c&#x2084;&#x2081;</text>
  <text x="450" y="184" font-size="13" fill="#C4A87A">c&#x2084;&#x2082;</text>
  <text x="490" y="184" font-size="13" fill="#C4A87A">c&#x2084;&#x2083;</text>
  <text x="520" y="184" font-size="13" fill="#C4A87A">c&#x2084;&#x2084;</text>

  <!-- Curved arrows showing row i meets column j -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C2530"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2D5A8E"/>
    </marker>
  </defs>

  <!-- Arrow from row 2 of A to c22 -->
  <path d="M160,120 Q 290,55 440,112" fill="none" stroke="#7C2530" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="290" y="50" text-anchor="middle" font-size="11" font-style="italic" fill="#7C2530">row i</text>

  <!-- Arrow from col 2 of B to c22 -->
  <path d="M265,185 Q 360,220 448,132" fill="none" stroke="#2D5A8E" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <text x="350" y="228" text-anchor="middle" font-size="11" font-style="italic" fill="#2D5A8E">col j</text>

  <!-- Explanation box -->
  <rect x="30" y="250" width="740" height="130" rx="8" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="1.5"/>

  <!-- Dot product formula -->
  <text x="400" y="280" text-anchor="middle" font-size="15" font-weight="bold" fill="#7C2530">c&#x2082;&#x2082; = a&#x2082;&#x2081;b&#x2081;&#x2082; + a&#x2082;&#x2082;b&#x2082;&#x2082; + a&#x2082;&#x2083;b&#x2083;&#x2082;</text>
  <text x="400" y="308" text-anchor="middle" font-size="13" fill="#5C3D1E">Each entry (i, j) of the result is the dot product of row i of A with column j of B</text>

  <!-- Dimension rule -->
  <text x="400" y="340" text-anchor="middle" font-size="13" fill="#2D5A8E">(4&#xD7;3) &#xD7; (3&#xD7;4) = (4&#xD7;4)    &#x2014;    inner dimensions must match</text>
  <text x="400" y="365" text-anchor="middle" font-size="12" font-style="italic" fill="#C4A87A">AB &#x2260; BA  &#x2014;  matrix multiplication is not commutative</text>
</svg>