  <rect x="422" y="90" width="88" height="72" rx="6" fill="#2D5A8E" opacity="0.85"/>
  <text x="466" y="115" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Accountability</text>
  <text x="466" y="129" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Legal liability</text>
  <text x="466" y="141" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Redress mechanisms</text>
  <text x="466" y="153" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Enforcement power</text>

