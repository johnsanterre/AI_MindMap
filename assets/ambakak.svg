  <line x1="132" y1="48" x2="132" y2="370" stroke="#C4A87A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Timeline items -->
  <circle cx="132" cy="72" r="5" fill="#2D5A8E"/>
  <text x="145" y="69" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">University of Delhi</text>
  <text x="145" y="82" font-family="Georgia, serif" font-size="9" fill="#888">B.A., Law — foundation in</text>
  <text x="145" y="93" font-family="Georgia, serif" font-size="9" fill="#888">rights &amp; regulation</text>

  <circle cx="132" cy="115" r="5" fill="#2D5A8E"/>
  <text x="145" y="112" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Oxford (Rhodes Scholar)</text>
  <text x="145" y="125" font-family="Georgia, serif" font-size="9" fill="#888">MSc Internet Science · 2014</text>

  <circle cx="132" cy="155" r="5" fill="#2D5A8E"/>
  <text x="145" y="152" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Google Policy Fellow</text>
  <text x="145" y="165" font-family="Georgia, serif" font-size="9" fill="#888">Early tech-policy research</text>

  <circle cx="132" cy="197" r="5" fill="#7C2530"/>
  <text x="145" y="194" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">AI Now Institute (NYU)</text>
  <text x="145" y="207" font-family="Georgia, serif" font-size="9" fill="#888">Director of Global Policy</text>
  <text x="145" y="218" font-family="Georgia, serif" font-size="9" fill="#888">&amp; Programs · 2018–2022</text>

  <circle cx="132" cy="247" r="5" fill="#7C2530"/>
  <text x="145" y="244" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Executive Director</text>
  <text x="145" y="257" font-family="Georgia, serif" font-size="9" fill="#888">AI Now Institute · 2022–</text>

  <circle cx="132" cy="290" r="5" fill="#2D5A8E"/>
  <text x="145" y="287" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Signal Board Member</text>
  <text x="145" y="300" font-family="Georgia, serif" font-size="9" fill="#888">Privacy infrastructure</text>

  <circle cx="132" cy="330" r="5" fill="#2D5A8E"/>
  <text x="145" y="327" font-family="Georgia, serif" font-size="10" fill="#5C3D1E" font-weight="bold">Mozilla Tech Policy Fellow</text>
  <text x="145" y="340" font-family="Georgia, serif" font-size="9" fill="#888">FTC, EU AI Act advisor</text>

