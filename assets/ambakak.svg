  <circle cx="400" cy="210" r="38" fill="#7C2530" opacity="0.9"/>
  <text x="400" y="205" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">AI Now</text>
  <text x="400" y="218" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Institute</text>

