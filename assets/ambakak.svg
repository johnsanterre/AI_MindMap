  <rect x="290" y="258" width="88" height="72" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="334" y="278" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Civil Rights</text>
  <text x="334" y="292" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Bias in hiring</text>
  <text x="334" y="304" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Criminal justice</text>
  <text x="334" y="316" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Biometric bans</text>

  <!-- Bottom-right: Labor Rights -->
  <rect x="422" y="258" width="88" height="72" rx="6" fill="#5C3D1E" opacity="0.85"/>
  <text x="466" y="278" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Labor Rights</text>
  <text x="466" y="292" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Gig economy AI</text>
  <text x="466" y="304" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Worker surveillance</text>
  <text x="466" y="316" font-family="Georgia, serif" font-size="8" fill="#FDFAF4" text-anchor="middle">Automation impact</text>

  <!-- Connector lines from center to quadrants -->
  <line x1="368" y1="180" x2="348" y2="162" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="432" y1="180" x2="452" y2="162" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="368" y1="240" x2="348" y2="258" stroke="#C4A87A" stroke-width="1.5"/>
  <line x1="432" y1="240" x2="452" y2="258" stroke="#C4A87A" stroke-width="1.5"/>

  <!-- Policy output arrow -->
  <text x="400" y="365" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">→ Structural regulation, not just technical fixes</text>

  <!-- ===== RIGHT PANEL: Key Works ===== -->
  <text x="667" y="42" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#7C2530" text-anchor="middle">Key Reports &amp; Impact</text>

  <!-- Report cards -->
  <rect x="548" y="60" width="238" height="58" rx="5" fill="#2D5A8E" opacity="0.12" stroke="#2D5A8E" stroke-width="1"/>
  <text x="667" y="79" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#2D5A8E" text-anchor="middle">Regulating Biometrics (2019)</text>
  <text x="667" y="92" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Called for moratorium on face</text>
  <text x="667" y="104" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">recognition in public spaces</text>

  <rect x="548" y="128" width="238" height="58" rx="5" fill="#7C2530" opacity="0.10" stroke="#7C2530" stroke-width="1"/>
  <text x="667" y="147" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7C2530" text-anchor="middle">Confronting AI (2021)</text>
  <text x="667" y="160" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">AI governance for the public</text>
  <text x="667" y="172" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">interest; civil society lens</text>

  <rect x="548" y="196" width="238" height="58" rx="5" fill="#5C3D1E" opacity="0.10" stroke="#5C3D1E" stroke-width="1"/>
  <text x="667" y="215" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">AI and Power (2023)</text>
  <text x="667" y="228" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Concentration of AI in few</text>
  <text x="667" y="240" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">corporations; antitrust framing</text>

  <rect x="548" y="264" width="238" height="58" rx="5" fill="#C4A87A" opacity="0.25" stroke="#C4A87A" stroke-width="1"/>
  <text x="667" y="283" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#5C3D1E" text-anchor="middle">AI &amp; Climate</text>
  <text x="667" y="296" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">Energy costs of large models;</text>
  <text x="667" y="308" font-family="Georgia, serif" font-size="9" fill="#5C3D1E" text-anchor="middle">environmental externalities</text>

  <text x="667" y="358" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Policy influence: FTC · EU AI Act</text>
  <text x="667" y="372" font-family="Georgia, serif" font-size="9" fill="#888" text-anchor="middle" font-style="italic">UN Advisory Body · The Atlantic</text>
</svg>
