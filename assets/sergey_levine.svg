<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="400" rx="12" ry="12" fill="#FDFAF4" stroke="#D4C5A9" stroke-width="3"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#7C2530" text-anchor="middle">Sergey Levine</text>

  <!-- Central hub -->
  <ellipse cx="400" cy="200" rx="90" ry="40" fill="#7C2530" stroke="#5C3D1E" stroke-width="2"/>
  <text x="400" y="195" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Sergey</text>
  <text x="400" y="213" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Levine</text>

  <!-- Spoke 1: Robotic Learning (top-left) -->
  <line x1="330" y1="170" x2="170" y2="95" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="140" cy="85" rx="85" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="140" y="80" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Robotic</text>
  <text x="140" y="97" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Learning</text>

  <!-- Spoke 2: Offline RL (top-right) -->
  <line x1="470" y1="170" x2="630" y2="95" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="660" cy="85" rx="80" ry="32" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="660" y="80" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Offline</text>
  <text x="660" y="97" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">RL</text>

  <!-- Spoke 3: Model-Based RL (left) -->
  <line x1="315" y1="210" x2="160" y2="240" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="120" cy="250" rx="85" ry="32" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="120" y="245" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Model-Based</text>
  <text x="120" y="262" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">RL</text>

  <!-- Spoke 4: Berkeley RAIL Lab (bottom-center) -->
  <line x1="400" y1="240" x2="400" y2="315" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="400" cy="345" rx="95" ry="32" fill="#5C3D1E" stroke="#7C2530" stroke-width="1.5"/>
  <text x="400" y="340" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Berkeley</text>
  <text x="400" y="357" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FDFAF4" text-anchor="middle">RAIL Lab</text>

  <!-- Spoke 5: Real-World Robot Manipulation (right) -->
  <line x1="485" y1="215" x2="630" y2="250" stroke="#C4A87A" stroke-width="2.5"/>
  <ellipse cx="670" cy="255" rx="95" ry="36" fill="#2D5A8E" stroke="#5C3D1E" stroke-width="1.5"/>
  <text x="670" y="248" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Real-World Robot</text>
  <text x="670" y="266" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDFAF4" text-anchor="middle">Manipulation</text>
</svg>